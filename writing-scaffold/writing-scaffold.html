<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Writing Scaffold</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0f13;
    --surface: #16181f;
    --surface2: #1e2029;
    --border: #2a2d3a;
    --accent: #e8c547;
    --accent2: #5b8af5;
    --accent3: #e05c7a;
    --text: #e8e9f0;
    --muted: #7a7d8e;
    --chip-bg: #1e2029;
    --chip-border: #2f3245;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  #controls {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }

  .app-title {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1rem;
    letter-spacing: 0.08em;
    color: var(--accent);
    text-transform: uppercase;
    white-space: nowrap;
    margin-right: 8px;
  }

  .ctrl-group { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

  label {
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }

  select {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    cursor: pointer;
    outline: none;
    transition: border-color 0.2s;
  }
  select:focus { border-color: var(--accent); }

  .btn {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    border: none;
    border-radius: 6px;
    padding: 7px 14px;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
  }
  .btn:active { transform: scale(0.97); }
  .btn-accent { background: var(--accent); color: #0e0f13; }
  .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--muted); }
  .btn-outline:hover { border-color: var(--accent); color: var(--accent); }

  .sep { width: 1px; height: 28px; background: var(--border); }

  #timer-wrap { display: flex; align-items: center; gap: 8px; }
  #timer-display {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.1rem;
    color: var(--accent);
    min-width: 52px;
    text-align: center;
    display: none;
  }
  #timer-display.active { display: block; }
  #timer-display.urgent { color: var(--accent3); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }

  #stage {
    flex: 1;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 40px 24px 60px;
  }

  #card {
    width: 100%;
    max-width: 900px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    animation: fadeUp 0.35s ease both;
  }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(18px); }
    to   { opacity:1; transform: translateY(0); }
  }

  #card-header {
    padding: 28px 36px 22px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
  }

  .type-tag {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--accent2);
    margin-bottom: 8px;
  }

  #card-title {
    font-family: 'Lora', serif;
    font-size: clamp(1.25rem, 3vw, 1.75rem);
    font-weight: 600;
    line-height: 1.3;
    color: var(--text);
    max-width: 640px;
  }

  .cefr-badge {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    padding: 5px 12px;
    border-radius: 20px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .cefr-A2 { background: #1a3a2a; color: #5dbb85; border: 1px solid #2a5a3a; }
  .cefr-B1 { background: #1a2a3a; color: #5b8af5; border: 1px solid #2a3a5a; }
  .cefr-B2 { background: #2a1a2e; color: #c07af5; border: 1px solid #4a2a5a; }

  #card-body {
    padding: 28px 36px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 28px;
  }

  .section-label {
    font-size: 0.6rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
  }

  #starters { grid-column: 1 / -1; }

  .starter-list { display: flex; flex-direction: column; gap: 10px; }

  .starter-item {
    display: flex;
    align-items: baseline;
    gap: 12px;
    padding: 10px 14px;
    background: var(--surface2);
    border-radius: 8px;
    border-left: 3px solid var(--accent);
  }

  .starter-num {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.7rem;
    color: var(--accent);
    min-width: 18px;
  }

  .starter-text {
    font-family: 'Lora', serif;
    font-style: italic;
    font-size: 1rem;
    color: var(--text);
    line-height: 1.4;
  }

  /* ── WORD CHIPS ── */
  .chip-cloud { display: flex; flex-wrap: wrap; gap: 8px; }

  .word-entry { display: flex; flex-direction: column; gap: 0; }

  .chip {
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    padding: 5px 12px;
    border-radius: 20px;
    background: var(--chip-bg);
    border: 1px solid var(--chip-border);
    color: var(--text);
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
    transition: background 0.15s, border-color 0.15s, color 0.15s, border-radius 0.15s;
  }
  .chip:hover { border-color: var(--accent); color: var(--accent); }
  .chip.open {
    background: #1a1c28;
    border-color: var(--accent);
    color: var(--accent);
    border-radius: 8px 8px 0 0;
    border-bottom-color: transparent;
  }

  .word-detail {
    display: none;
    background: #1a1c28;
    border: 1px solid var(--accent);
    border-top: none;
    border-radius: 0 0 8px 8px;
    padding: 10px 14px;
    font-size: 0.75rem;
    line-height: 1.55;
    max-width: 280px;
  }
  .word-detail.visible { display: block; }

  .def-label {
    font-size: 0.6rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 2px;
  }
  .def-text { color: var(--text); margin-bottom: 8px; }
  .ex-text { color: var(--muted); font-style: italic; }
  .ex-text em { color: var(--accent2); font-style: normal; }

  .chip.connector {
    border-color: #2a3a5a;
    color: var(--accent2);
    background: #13182a;
    cursor: default;
  }
  .chip.connector:hover { border-color: #3a4a6a; color: var(--accent2); }

  #empty {
    width: 100%;
    max-width: 860px;
    text-align: center;
    padding: 80px 24px;
    color: var(--muted);
  }
  #empty h2 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.4rem;
    color: var(--accent);
    margin-bottom: 12px;
  }
  #empty p { font-size: 0.85rem; line-height: 1.6; }

  @media (max-width: 600px) {
    #card-body { grid-template-columns: 1fr; }
    #card-header { flex-direction: column; }
  }
</style>
</head>
<body>

<div id="controls">
  <span class="app-title">Writing Scaffold</span>

  <div class="ctrl-group">
    <label>Level</label>
    <select id="sel-level">
      <option value="">All</option>
      <option value="A2">A2</option>
      <option value="B1">B1</option>
      <option value="B2">B2</option>
    </select>
  </div>

  <div class="ctrl-group">
    <label>Type</label>
    <select id="sel-type">
      <option value="">All</option>
      <option value="Opinion">Opinion</option>
      <option value="Narrative">Narrative</option>
      <option value="Descriptive">Descriptive</option>
      <option value="Email">Formal Email</option>
      <option value="For & Against">For &amp; Against</option>
    </select>
  </div>

  <div class="ctrl-group">
    <label>Prompt</label>
    <select id="sel-prompt"><option value="">— pick —</option></select>
  </div>

  <button class="btn btn-accent" onclick="loadPrompt()">Display</button>
  <button class="btn btn-outline" onclick="randomPrompt()">Random</button>

  <div class="sep"></div>

  <div id="timer-wrap">
    <label>Timer</label>
    <select id="sel-timer">
      <option value="0">Off</option>
      <option value="5">5 min</option>
      <option value="10">10 min</option>
      <option value="15">15 min</option>
      <option value="20">20 min</option>
    </select>
    <button class="btn btn-outline" onclick="startTimer()">Start</button>
    <button class="btn btn-outline" onclick="stopTimer()">Reset</button>
    <span id="timer-display">--:--</span>
  </div>
</div>

<div id="stage">
  <div id="empty">
    <h2>Guided Writing Scaffold</h2>
    <p>Select a level and type, choose a prompt — or hit <strong>Random</strong>.<br>Click any word in the word bank to see its definition and example.</p>
  </div>
  <div id="card" style="display:none">
    <div id="card-header">
      <div>
        <div class="type-tag" id="h-type"></div>
        <div id="card-title"></div>
      </div>
      <span class="cefr-badge" id="h-cefr"></span>
    </div>
    <div id="card-body">
      <div id="starters">
        <div class="section-label">Sentence Starters</div>
        <div class="starter-list" id="starter-list"></div>
      </div>
      <div id="words-wrap">
        <div class="section-label">Word Bank — click a word for definition</div>
        <div class="chip-cloud" id="word-chips"></div>
      </div>
      <div id="conn-wrap">
        <div class="section-label">Connectors</div>
        <div class="chip-cloud" id="conn-chips"></div>
      </div>
    </div>
  </div>
</div>

<script>
// Each word entry: [word, definition, example]
// Definition and example written at the CEFR level of the prompt.

const PROMPTS = [

// ── OPINION A2 ───────────────────────────────────────────────────
{type:"Opinion",level:"A2",title:"Should students use phones in class?",
 starters:["I think that phones in class are…","One reason I believe this is…","For example, I have seen…","On the other hand, some people say…","In my opinion, the best solution is…","To sum up, I believe…"],
 words:[
  ["distraction","something that stops you paying attention","The noise outside was a <em>distraction</em> during the test."],
  ["useful","helpful; good to use","A dictionary is very <em>useful</em> when you write."],
  ["concentrate","to think hard about one thing","It is hard to <em>concentrate</em> when there is a lot of noise."],
  ["lesson","a time when a teacher teaches the class","We have an English <em>lesson</em> every day."],
  ["allowed","permitted; you can do it","Phones are not <em>allowed</em> in the exam room."],
  ["banned","not permitted; you cannot do it","Smoking is <em>banned</em> inside the school building."],
  ["rule","something you must or must not do","There is a <em>rule</em> that says we must be quiet in class."],
  ["responsible","doing the right thing and making good decisions","A <em>responsible</em> student puts their phone away during class."],
  ["message","a short text you send to someone","She sent a <em>message</em> to her friend during lunch."],
  ["learn","to get new knowledge or a new skill","We go to school to <em>learn</em> new things every day."],
 ],
 connectors:["I think","because","but","also","for example","in my opinion"]},

{type:"Opinion",level:"A2",title:"Is it better to live in a big city or a small town?",
 starters:["I think it is better to live in…","One good thing about this is…","For example, people who live there can…","However, some people prefer…","Another reason is…","In conclusion, I think…"],
 words:[
  ["transport","buses, trains, cars — ways to travel","The <em>transport</em> in the city is very good."],
  ["quiet","not loud; peaceful","I like small towns because they are <em>quiet</em>."],
  ["crowded","full of many people","The city centre is very <em>crowded</em> on weekends."],
  ["opportunity","a chance to do something good","The city gives people more <em>opportunity</em> to find work."],
  ["nature","trees, rivers, animals — the natural world","I love walking in <em>nature</em> near my small town."],
  ["expensive","costing a lot of money","Flats in the city are very <em>expensive</em>."],
  ["neighbour","a person who lives near you","My <em>neighbour</em> always says hello in the morning."],
  ["safe","not dangerous","I feel <em>safe</em> in my small town because everyone knows each other."],
  ["traffic","many cars and vehicles on the road","There is a lot of <em>traffic</em> in the city every morning."],
  ["community","a group of people who live and work together","Our small town has a strong <em>community</em>."],
 ],
 connectors:["I think","because","but","also","for example","in conclusion"]},

{type:"Opinion",level:"A2",title:"Should children have homework every night?",
 starters:["I think homework is…","One reason for my opinion is…","For example, when I have homework…","However, some teachers say…","I also believe that…","To finish, I think…"],
 words:[
  ["study","to read and learn from your books","I need to <em>study</em> for my English test tomorrow."],
  ["tired","needing sleep or rest","Children feel <em>tired</em> after a long day at school."],
  ["practice","doing something many times to get better","Homework gives us <em>practice</em> with new grammar."],
  ["free time","time when you do not work or study","Children need <em>free time</em> to play and relax."],
  ["revision","looking at your notes again to remember things","<em>Revision</em> before a test helps you remember more."],
  ["stress","a worried, unhappy feeling because of too much work","Too much homework can cause <em>stress</em> for students."],

  ["parent","a mother or father","My <em>parent</em> helps me when my homework is difficult."],
  ["school","the place where children go to learn","We spend six hours at <em>school</em> every day."],
 ],
 connectors:["I think","because","but","for example","also","to finish"]},

{type:"Opinion",level:"A2",title:"Is fast food good or bad for us?",
 starters:["I think fast food is…","One reason I say this is…","For example, many people eat…","But not everyone agrees because…","I also think…","In my opinion…"],
 words:[
  ["healthy","good for your body","Fruit and vegetables are <em>healthy</em> foods."],
  ["unhealthy","bad for your body","Eating too much fast food is <em>unhealthy</em>."],
  ["cheap","not costing a lot of money","Fast food is often <em>cheap</em> and quick to buy."],
  ["quick","fast; not taking much time","A burger is a <em>quick</em> meal when you are busy."],
  ["calories","the energy in food","Fast food often has too many <em>calories</em>."],
  ["fresh","not cooked a long time ago; not from a tin","I prefer <em>fresh</em> food to fast food."],
  ["delicious","tasting very good","The pizza from that restaurant is really <em>delicious</em>."],
  ["diet","the food you eat every day","A good <em>diet</em> has many fruits and vegetables."],
  ["habit","something you do regularly","Eating fast food every day is a bad <em>habit</em>."],
  ["restaurant","a place where you go to eat a meal","We went to a <em>restaurant</em> for my birthday."],
 ],

{type:"Opinion",level:"A2",title:"Should everyone learn to cook?",

  ["money","what you use to pay for things","You can save <em>money</em> by cooking at home."],
 ],

{type:"Opinion",level:"A2",title:"Are video games good for young people?",

{type:"Opinion",level:"B1",title:"Should social media have a minimum age limit?",

  ["influence","the power to change how people think or behave","Social media has a strong <em>influence</em> on young people's opinions."],

 ],

{type:"Opinion",level:"B1",title:"Is it important to learn a foreign language at school?",

  ["culture","the traditions, values, and way of life of a group of people","Language helps you understand another country's <em>culture</em>."],

 ],

  ["scholarship","money given to help a student pay for education","She received a <em>scholarship</em> to study medicine abroad."],
 ],
 connectors:["I believe","however","furthermore","in addition","on the other hand","in conclusion"]},

{type:"Opinion",level:"B1",title:"Is tourism more harmful than beneficial?",
 starters:["The question of whether tourism is beneficial is…","Supporters of tourism argue that…","However, the negative effects are…","A clear example of this is…","In addition to this…","My view is that…"],
 words:[
  ["economy","the system of money and business in a country","Tourism is very important for the local <em>economy</em>."],

// ═══════════════════════════════════════
// POPULATE SELECTORS
// ═══════════════════════════════════════
const selLevel  = document.getElementById('sel-level');
const selType   = document.getElementById('sel-type');
const selPrompt = document.getElementById('sel-prompt');

function buildPromptList() {
  const lv = selLevel.value;
  const ty = selType.value;
  selPrompt.innerHTML = '<option value="">— pick —</option>';
  PROMPTS.forEach((p, idx) => {
    if ((!lv || p.level === lv) && (!ty || p.type === ty)) {
      const opt = document.createElement('option');
      opt.value = idx;
      opt.textContent = `[${p.level}] ${p.title}`;
      selPrompt.appendChild(opt);
    }
  });
}

selLevel.addEventListener('change', buildPromptList);
selType.addEventListener('change',  buildPromptList);
buildPromptList();

// ═══════════════════════════════════════
// RENDER CARD
// ═══════════════════════════════════════
function loadPrompt() {
  const idx = selPrompt.value;
  if (idx === '') return;
  renderCard(PROMPTS[parseInt(idx)]);
}

function randomPrompt() {
  const lv = selLevel.value;
  const ty = selType.value;
  const pool = PROMPTS.filter(p =>
    (!lv || p.level === lv) && (!ty || p.type === ty)
  );
  if (!pool.length) return;
  renderCard(pool[Math.floor(Math.random() * pool.length)]);
}

function renderCard(p) {
  document.getElementById('empty').style.display = 'none';
  const card = document.getElementById('card');
  card.style.display = 'block';
  card.style.animation = 'none';
  card.offsetHeight;
  card.style.animation = '';

  document.getElementById('h-type').textContent = p.type;
  document.getElementById('card-title').textContent = p.title;
  const cefrEl = document.getElementById('h-cefr');
  cefrEl.textContent = p.level;
  cefrEl.className = 'cefr-badge cefr-' + p.level;

  // starters
  document.getElementById('starter-list').innerHTML = p.starters.map((s,i) =>
    `<div class="starter-item"><span class="starter-num">${i+1}.</span><span class="starter-text">${s}</span></div>`
  ).join('');

  // word bank — each word is [word, def, example]
  document.getElementById('word-chips').innerHTML = p.words.map((w, i) => {
    const id = `wd-${i}`;
    return `<div class="word-entry">
      <span class="chip" onclick="toggleWord('${id}', this)" id="chip-${id}">${w[0]}</span>
      <div class="word-detail" id="${id}">
        <div class="def-label">definition</div>
        <div class="def-text">${w[1]}</div>
        <div class="def-label">example</div>
        <div class="ex-text">${w[2]}</div>
      </div>
    </div>`;
  }).join('');

  // connectors
  document.getElementById('conn-chips').innerHTML = p.connectors.map(c =>
    `<span class="chip connector">${c}</span>`
  ).join('');
}

function toggleWord(id, chipEl) {
  const detail = document.getElementById(id);
  const isOpen = detail.classList.contains('visible');
  // close all
  document.querySelectorAll('.word-detail.visible').forEach(d => d.classList.remove('visible'));
  document.querySelectorAll('.chip.open').forEach(c => c.classList.remove('open'));
  if (!isOpen) {
    detail.classList.add('visible');
    chipEl.classList.add('open');
  }
}

// ═══════════════════════════════════════
// TIMER
// ═══════════════════════════════════════
let timerInterval = null;
let timerSeconds  = 0;

function startTimer() {
  const mins = parseInt(document.getElementById('sel-timer').value);
  if (!mins) return;
  stopTimer();
  timerSeconds = mins * 60;
  const display = document.getElementById('timer-display');
  display.classList.add('active');
  display.classList.remove('urgent');
  updateTimerDisplay();
  timerInterval = setInterval(() => {
    timerSeconds--;
    updateTimerDisplay();
    if (timerSeconds <= 60) display.classList.add('urgent');
    if (timerSeconds <= 0) { clearInterval(timerInterval); display.textContent = 'DONE'; }
  }, 1000);
}

function stopTimer() {
  clearInterval(timerInterval);
  timerInterval = null;
  const display = document.getElementById('timer-display');
  display.classList.remove('active','urgent');
  display.textContent = '--:--';
}

function updateTimerDisplay() {
  const m = Math.floor(timerSeconds / 60).toString().padStart(2,'0');
  const s = (timerSeconds % 60).toString().padStart(2,'0');
  document.getElementById('timer-display').textContent = `${m}:${s}`;
}
</script>
