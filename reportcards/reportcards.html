<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador de Boletim</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #151820;
    --card: #1c2030;
    --card2: #212638;
    --border: #2a3048;
    --border2: #343d5c;
    --text: #e8eaf2;
    --muted: #7a84a8;
    --accent: #5b8dee;
    --accent2: #3d6bd4;
    --c1: #e55555;
    --c2: #e5873a;
    --c3: #d4b93e;
    --c4: #5aaf6e;
    --c5: #3cb8a0;
    --radius: 14px;
    --font-body: 'DM Sans', sans-serif;
    --font-display: 'DM Serif Display', serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    display: flex;
    overflow: hidden;
  }

  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  #topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 32px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  #topbar-title {
    font-family: var(--font-display);
    font-size: 1.4rem;
    font-style: italic;
    color: var(--text);
    letter-spacing: -0.01em;
  }
  #topbar-title span { color: var(--accent); font-style: normal; }

  .btn {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 8px 18px;
    border-radius: 8px;
    font-family: var(--font-body);
    font-size: 0.82rem;
    font-weight: 500;
    cursor: pointer;
    border: none;
    transition: all 0.15s;
    letter-spacing: 0.01em;
  }
  .btn-ghost {
    background: var(--card);
    border: 1px solid var(--border2);
    color: var(--muted);
  }
  .btn-ghost:hover { color: var(--text); border-color: var(--accent); }

  #workspace { flex: 1; display: flex; overflow: hidden; }

  #editor-panel {
    width: 380px;
    min-width: 340px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 28px 26px;
    display: flex;
    flex-direction: column;
    gap: 22px;
  }
  #editor-panel::-webkit-scrollbar { width: 4px; }
  #editor-panel::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .field-group label {
    display: block;
    font-size: 0.73rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .field-group input[type="text"] {
    width: 100%;
    padding: 10px 14px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--font-body);
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.15s;
  }
  .field-group input[type="text"]:focus { border-color: var(--accent); }
  .field-group input[type="text"]::placeholder { color: var(--muted); }

  .slider-block { display: flex; flex-direction: column; gap: 8px; }
  .slider-header { display: flex; align-items: center; justify-content: space-between; }
  .slider-label { font-size: 0.82rem; font-weight: 500; color: var(--text); }
  .slider-badge {
    font-size: 0.72rem;
    font-weight: 600;
    padding: 3px 9px;
    border-radius: 20px;
    color: #fff;
    transition: background 0.2s;
    letter-spacing: 0.02em;
  }

  input[type="range"] {
    -webkit-appearance: none;
    width: 100%;
    height: 6px;
    border-radius: 3px;
    outline: none;
    cursor: pointer;
    transition: background 0.2s;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: #fff;
    cursor: pointer;
    box-shadow: 0 1px 6px rgba(0,0,0,0.4);
    transition: transform 0.1s;
  }
  input[type="range"]::-webkit-slider-thumb:active { transform: scale(1.2); }

  .divider { height: 1px; background: var(--border); }

  #preview-panel {
    flex: 1;
    overflow-y: auto;
    padding: 32px;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  #preview-panel::-webkit-scrollbar { width: 6px; }
  #preview-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  #report-card {
    width: 100%;
    max-width: 580px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }

  .rc-header {
    padding: 28px 32px 22px;
    background: linear-gradient(135deg, #1a2240 0%, #1c2a4a 100%);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
  }
  .rc-school {
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 6px;
  }
  .rc-student {
    font-family: var(--font-display);
    font-size: 1.7rem;
    color: var(--text);
    line-height: 1.1;
  }
  .rc-date { font-size: 0.75rem; color: var(--muted); margin-top: 6px; }
  .rc-avatar {
    width: 52px; height: 52px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-display);
    font-size: 1.4rem;
    color: #fff;
    flex-shrink: 0;
  }

  .rc-scores {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    border-bottom: 1px solid var(--border);
  }
  .rc-score-cell {
    padding: 14px 8px;
    text-align: center;
    border-right: 1px solid var(--border);
  }
  .rc-score-cell:last-child { border-right: none; }
  .rc-score-icon { font-size: 1.1rem; margin-bottom: 4px; }
  .rc-score-val {
    font-family: var(--font-display);
    font-size: 1.5rem;
    line-height: 1;
    font-weight: 400;
  }
  .rc-score-key {
    font-size: 0.6rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 3px;
  }

  .rc-body { padding: 26px 32px 30px; display: flex; flex-direction: column; gap: 20px; }

  .rc-section-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .rc-section-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .rc-section-title {
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    flex: 1;
  }
  .rc-section-stars { display: flex; gap: 2px; }
  .rc-section-star { width: 8px; height: 8px; border-radius: 2px; }
  .rc-section-text {
    font-size: 0.88rem;
    color: #c8cfe8;
    line-height: 1.6;
    padding-left: 18px;
    border-left: 2px solid var(--border);
  }

  .rc-footer {
    padding: 16px 32px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .rc-footer-text { font-size: 0.72rem; color: var(--muted); font-style: italic; }
  #copy-btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 16px;
    background: var(--card2);
    border: 1px solid var(--border2);
    border-radius: 7px;
    color: var(--muted);
    font-family: var(--font-body);
    font-size: 0.78rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
  }
  #copy-btn:hover { color: var(--text); border-color: var(--accent); }
  #copy-btn.copied { color: var(--c5); border-color: var(--c5); }

  #toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--c5);
    color: #0d1a17;
    padding: 10px 22px;
    border-radius: 50px;
    font-size: 0.82rem;
    font-weight: 600;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    z-index: 100;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  * { scrollbar-width: thin; scrollbar-color: var(--border2) transparent; }

  .back-link {
    position: fixed;
    top: 16px;
    left: 16px;
    z-index: 100000;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    background: rgba(0,0,0,0.55);
    color: #fff;
    text-decoration: none;
    border-radius: 999px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, Arial, sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.01em;
    backdrop-filter: blur(6px);
    border: 1px solid rgba(255,255,255,0.18);
    transition: background 0.2s ease, transform 0.2s ease;
  }
  .back-link:hover { background: rgba(0,0,0,0.78); transform: translateX(-2px); }
</style>
</head>
<body>
<a class="back-link" href="../">&#8592; Tool Hub</a>

<main id="main">
  <div id="topbar">
    <div id="topbar-title">Gerador de <span>Boletim</span></div>
    <button class="btn btn-ghost" id="regen-btn">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M2 6.5A4.5 4.5 0 0111 4M11 4V1.5M11 4H8.5M11 6.5A4.5 4.5 0 012 9M2 9v2.5M2 9h2.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Regenerar Texto
    </button>
  </div>

  <div id="workspace">
    <div id="editor-panel">
      <div class="field-group">
        <label>Nome do Aluno(a)</label>
        <input type="text" id="student-name" placeholder="Ex: Maria Silva">
      </div>

      <div class="divider"></div>

      <div class="slider-block">
        <div class="slider-header">
          <span class="slider-label">&#128218; Vocabul&#225;rio</span>
          <span class="slider-badge" id="badge-vocab">Excelente</span>
        </div>
        <input type="range" id="sl-vocab" min="1" max="5" value="5">
      </div>

      <div class="slider-block">
        <div class="slider-header">
          <span class="slider-label">&#128221; Gram&#225;tica</span>
          <span class="slider-badge" id="badge-grammar">Excelente</span>
        </div>
        <input type="range" id="sl-grammar" min="1" max="5" value="5">
      </div>

      <div class="slider-block">
        <div class="slider-header">
          <span class="slider-label">&#11088; Comportamento</span>
          <span class="slider-badge" id="badge-behavior">Excelente</span>
        </div>
        <input type="range" id="sl-behavior" min="1" max="5" value="5">
      </div>

      <div class="slider-block">
        <div class="slider-header">
          <span class="slider-label">&#127463;&#127479; Uso de Portugu&#234;s</span>
          <span class="slider-badge" id="badge-port">Excelente</span>
        </div>
        <input type="range" id="sl-port" min="1" max="5" value="5">
      </div>

      <div class="slider-block">
        <div class="slider-header">
          <span class="slider-label">&#128203; Tarefas de Casa</span>
          <span class="slider-badge" id="badge-homework">Excelente</span>
        </div>
        <input type="range" id="sl-homework" min="1" max="5" value="5">
      </div>
    </div>

    <div id="preview-panel">
      <div id="report-card">
        <div class="rc-header">
          <div class="rc-header-left">
            <div class="rc-school">Relat&#243;rio de Desempenho</div>
            <div class="rc-student" id="rc-name">&#8212;</div>
            <div class="rc-date" id="rc-date"></div>
          </div>
          <div class="rc-avatar" id="rc-avatar"></div>
        </div>
        <div class="rc-scores" id="rc-scores"></div>
        <div class="rc-body" id="rc-body"></div>
        <div class="rc-footer">
          <span class="rc-footer-text">Gerado pelo professor(a)</span>
          <button id="copy-btn">
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><rect x="4.5" y="4.5" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.3"/><path d="M8.5 4.5V3A1.5 1.5 0 007 1.5H3A1.5 1.5 0 001.5 3v4A1.5 1.5 0 003 8.5h1.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
            Copiar Texto
          </button>
        </div>
      </div>
    </div>
  </div>
</main>

<div id="toast"></div>

<script>
const RATINGS = {
  1: "Precisa melhorar muito",
  2: "Precisa melhorar",
  3: "Regular",
  4: "Muito Bom",
  5: "Excelente"
};

const LEVEL_COLORS = {
  1: '#e55555',
  2: '#e5873a',
  3: '#d4b93e',
  4: '#5aaf6e',
  5: '#3cb8a0'
};

const AVATAR_COLORS = [
  '#5b8dee','#9b6de0','#e06d8b','#e07a3a','#3abbe0','#5aaf6e','#e0b03a','#8b5ce0'

var currentComments = {};
var avatarColor = AVATAR_COLORS[Math.floor(Math.random() * AVATAR_COLORS.length)];

function pickComment(cat, level) {
  var pool = COMMENTS[cat][level];
  return pool[Math.floor(Math.random() * pool.length)];
}

// ── INIT ──────────────────────────────────────────────────────────────────────

function init() {
  updateDate();
  updateAllBadges();
  generateAllComments();
  renderPreview();
}

function updateDate() {
  var now = new Date();
  var months = ['janeiro','fevereiro','mar\u00e7o','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
  document.getElementById('rc-date').textContent =
    now.getDate() + ' de ' + months[now.getMonth()] + ' de ' + now.getFullYear();
}

function generateAllComments() {
  var cats = ['vocab','grammar','behavior','port','homework'];
  for (var i = 0; i < cats.length; i++) {
    var cat = cats[i];
    var val = +document.getElementById('sl-' + cat).value;
    currentComments[cat] = pickComment(cat, val);
  }
}

// ── BADGES ───────────────────────────────────────────────────────────────────

var sliderMap = {
  'sl-vocab':    { badge: 'badge-vocab',    cat: 'vocab' },
  'sl-grammar':  { badge: 'badge-grammar',  cat: 'grammar' },
  'sl-behavior': { badge: 'badge-behavior', cat: 'behavior' },
  'sl-port':     { badge: 'badge-port',     cat: 'port' },
  'sl-homework': { badge: 'badge-homework', cat: 'homework' }
};

function updateBadge(sliderId) {
  var info = sliderMap[sliderId];
  var val = +document.getElementById(sliderId).value;
  var el = document.getElementById(info.badge);
  el.textContent = RATINGS[val];
  el.style.background = LEVEL_COLORS[val];
  var pct = ((val - 1) / 4) * 100;
  document.getElementById(sliderId).style.background =
    'linear-gradient(to right, ' + LEVEL_COLORS[val] + ' ' + pct + '%, #2a3048 ' + pct + '%)';
}

function updateAllBadges() {
  var ids = Object.keys(sliderMap);
  for (var i = 0; i < ids.length; i++) {
    updateBadge(ids[i]);
  }
}

  var scoresEl = document.getElementById('rc-scores');
  scoresEl.innerHTML = '';
  for (var i = 0; i < CAT_META.length; i++) {
    var m = CAT_META[i];
    var val = +document.getElementById(m.slId).value;
    var col = LEVEL_COLORS[val];
    var cell = document.createElement('div');
    cell.className = 'rc-score-cell';
    cell.innerHTML =
      '<div class="rc-score-icon">' + m.icon + '</div>' +
      '<div class="rc-score-val" style="color:' + col + '">' + val + '</div>' +
      '<div class="rc-score-key">' + m.label.split(' ')[0] + '</div>';
    scoresEl.appendChild(cell);
  }

  // Body sections
  var bodyEl = document.getElementById('rc-body');
  bodyEl.innerHTML = '';
  for (var j = 0; j < CAT_META.length; j++) {
    var m2 = CAT_META[j];
    var val2 = +document.getElementById(m2.slId).value;
    var col2 = LEVEL_COLORS[val2];
    var text = currentComments[m2.key] || pickComment(m2.key, val2);

    var stars = '';
    for (var s = 1; s <= 5; s++) {
      stars += '<span class="rc-section-star" style="background:' + (s <= val2 ? col2 : '#2a3048') + '"></span>';
    }

    var sec = document.createElement('div');
    sec.className = 'rc-section';
    sec.innerHTML =
      '<div class="rc-section-header">' +
        '<span class="rc-section-dot" style="background:' + col2 + '"></span>' +
        '<span class="rc-section-title">' + m2.label + '</span>' +
        '<div class="rc-section-stars">' + stars + '</div>' +
      '</div>' +
      '<div class="rc-section-text">' + text + '</div>';
    bodyEl.appendChild(sec);
  }
}

function buildPlainText() {
  var name = document.getElementById('student-name').value.trim() || '\u2014';
  var now = new Date();
  var months = ['janeiro','fevereiro','mar\u00e7o','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
  var txt = 'RELAT\u00d3RIO DE DESEMPENHO\n' + name + '\n' +
    now.getDate() + ' de ' + months[now.getMonth()] + ' de ' + now.getFullYear() + '\n\n';
  for (var i = 0; i < CAT_META.length; i++) {
    var m = CAT_META[i];
    var val = +document.getElementById(m.slId).value;
    txt += m.label + ': ' + RATINGS[val] + '\n';
    txt += (currentComments[m.key] || '') + '\n\n';
  }
  return txt.trim();
}

// ── EVENTS ───────────────────────────────────────────────────────────────────

document.getElementById('student-name').addEventListener('input', renderPreview);

(function() {
  var ids = Object.keys(sliderMap);
  for (var i = 0; i < ids.length; i++) {
    (function(slId) {
      document.getElementById(slId).addEventListener('input', function() {
        var cat = sliderMap[slId].cat;
        var val = +document.getElementById(slId).value;
        currentComments[cat] = pickComment(cat, val);
        updateBadge(slId);
        renderPreview();
      });
    })(ids[i]);
  }
})();

document.getElementById('regen-btn').addEventListener('click', function() {
  generateAllComments();
  renderPreview();
  showToast('Textos regenerados!');
});

document.getElementById('copy-btn').addEventListener('click', function() {
  navigator.clipboard.writeText(buildPlainText()).then(function() {
    var btn = document.getElementById('copy-btn');
    btn.classList.add('copied');
    btn.querySelector('svg').innerHTML = '<path d="M2 7l4 4L11 3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>';
    showToast('Boletim copiado!');
    setTimeout(function() {
      btn.classList.remove('copied');
      btn.querySelector('svg').innerHTML = '<rect x="4.5" y="4.5" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.3"/><path d="M8.5 4.5V3A1.5 1.5 0 007 1.5H3A1.5 1.5 0 001.5 3v4A1.5 1.5 0 003 8.5h1.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>';
    }, 2500);
  });
});

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = '\u2713 ' + msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2200);
}

// ── GO ────────────────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
