<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador de Boletim</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #151820;
    --card: #1c2030;
    --card2: #212638;
    --border: #2a3048;
    --border2: #343d5c;
    --text: #e8eaf2;
    --muted: #7a84a8;
    --accent: #5b8dee;
    --accent2: #3d6bd4;

    --c1: #e55555; /* 1 - ruim */
    --c2: #e5873a; /* 2 */
    --c3: #d4b93e; /* 3 */
    --c4: #5aaf6e; /* 4 */
    --c5: #3cb8a0; /* 5 - excelente */

    --radius: 14px;
    --font-body: 'DM Sans', sans-serif;
    --font-display: 'DM Serif Display', serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    display: flex;
    overflow: hidden;
  }

  /* ── SIDEBAR ── */
  #sidebar {
    width: 240px;
    min-width: 240px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    height: 100vh;
    position: sticky;
    top: 0;
  }

  #sidebar-header {
    padding: 24px 20px 16px;
    border-bottom: 1px solid var(--border);
  }
  #sidebar-header h2 {
    font-family: var(--font-display);
    font-size: 1.15rem;
    color: var(--text);
    letter-spacing: 0.01em;
  }
  #sidebar-header p {
    font-size: 0.72rem;
    color: var(--muted);
    margin-top: 2px;
  }

  #student-list {
    flex: 1;
    overflow-y: auto;
    padding: 10px 10px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  #student-list::-webkit-scrollbar { width: 4px; }
  #student-list::-webkit-scrollbar-track { background: transparent; }
  #student-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .student-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.15s;
    border: 1px solid transparent;
    position: relative;
  }
  .student-item:hover { background: var(--card); }
  .student-item.active {
    background: var(--card2);
    border-color: var(--border2);
  }
  .student-avatar {
    width: 30px; height: 30px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.7rem;
    font-weight: 600;
    flex-shrink: 0;
    color: #fff;
    letter-spacing: 0.03em;
  }
  .student-name-label {
    font-size: 0.82rem;
    font-weight: 500;
    color: var(--text);
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .student-delete {
    opacity: 0;
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 1rem;
    line-height: 1;
    padding: 2px 4px;
    border-radius: 4px;
    transition: opacity 0.15s, color 0.15s;
  }
  .student-item:hover .student-delete { opacity: 1; }
  .student-delete:hover { color: var(--c1); }

  #add-student-btn {
    margin: 0 10px 10px;
    padding: 9px;
    background: none;
    border: 1px dashed var(--border2);
    border-radius: 10px;
    color: var(--muted);
    font-family: var(--font-body);
    font-size: 0.82rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 6px;
    transition: border-color 0.15s, color 0.15s, background 0.15s;
  }
  #add-student-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(91,141,238,0.06);
  }

  /* ── MAIN ── */
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  #topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 32px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  #topbar-title {
    font-family: var(--font-display);
    font-size: 1.4rem;
    font-style: italic;
    color: var(--text);
    letter-spacing: -0.01em;
  }
  #topbar-title span { color: var(--accent); font-style: normal; }

  .btn {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 8px 18px;
    border-radius: 8px;
    font-family: var(--font-body);
    font-size: 0.82rem;
    font-weight: 500;
    cursor: pointer;
    border: none;
    transition: all 0.15s;
    letter-spacing: 0.01em;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent2); }
  .btn-ghost {
    background: var(--card);
    border: 1px solid var(--border2);
    color: var(--muted);
  }
  .btn-ghost:hover { color: var(--text); border-color: var(--accent); }
  .btn-success { background: var(--c5); color: #0d1a17; }
  .btn-success:hover { filter: brightness(1.1); }

  #workspace {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  /* ── EDITOR PANEL ── */
  #editor-panel {
    width: 380px;
    min-width: 340px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 28px 26px;
    display: flex;
    flex-direction: column;
    gap: 22px;
  }
  #editor-panel::-webkit-scrollbar { width: 4px; }
  #editor-panel::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .field-group label {
    display: block;
    font-size: 0.73rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .field-group input[type="text"] {
    width: 100%;
    padding: 10px 14px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--font-body);
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.15s;
  }
  .field-group input[type="text"]:focus { border-color: var(--accent); }
  .field-group input[type="text"]::placeholder { color: var(--muted); }

  /* Slider row */
  .slider-block { display: flex; flex-direction: column; gap: 8px; }
  .slider-header {
    display: flex; align-items: center; justify-content: space-between;
  }
  .slider-label {
    font-size: 0.82rem;
    font-weight: 500;
    color: var(--text);
  }
  .slider-badge {
    font-size: 0.72rem;
    font-weight: 600;
    padding: 3px 9px;
    border-radius: 20px;
    color: #fff;
    transition: background 0.2s;
    letter-spacing: 0.02em;
  }

  input[type="range"] {
    -webkit-appearance: none;
    width: 100%;
    height: 6px;
    border-radius: 3px;
    outline: none;
    cursor: pointer;
    transition: background 0.2s;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: #fff;
    cursor: pointer;
    box-shadow: 0 1px 6px rgba(0,0,0,0.4);
    transition: transform 0.1s;
  }
  input[type="range"]::-webkit-slider-thumb:active { transform: scale(1.2); }

  .divider {
    height: 1px;
    background: var(--border);
  }

  #editor-actions {
    display: flex; gap: 10px;
  }

  /* ── PREVIEW PANEL ── */
  #preview-panel {
    flex: 1;
    overflow-y: auto;
    padding: 32px;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  #preview-panel::-webkit-scrollbar { width: 6px; }
  #preview-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ── REPORT CARD ── */
  #report-card {
    width: 100%;
    max-width: 580px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }

  .rc-header {
    padding: 28px 32px 22px;
    background: linear-gradient(135deg, #1a2240 0%, #1c2a4a 100%);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
  }
  .rc-header-left {}
  .rc-school {
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 6px;
  }
  .rc-student {
    font-family: var(--font-display);
    font-size: 1.7rem;
    color: var(--text);
    line-height: 1.1;
  }
  .rc-date {
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 6px;
  }
  .rc-avatar {
    width: 52px; height: 52px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-display);
    font-size: 1.4rem;
    color: #fff;
    flex-shrink: 0;
  }

  .rc-scores {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    border-bottom: 1px solid var(--border);
  }
  .rc-score-cell {
    padding: 14px 8px;
    text-align: center;
    border-right: 1px solid var(--border);
    position: relative;
  }
  .rc-score-cell:last-child { border-right: none; }
  .rc-score-icon { font-size: 1.1rem; margin-bottom: 4px; }
  .rc-score-val {
    font-family: var(--font-display);
    font-size: 1.5rem;
    line-height: 1;
    font-weight: 400;
  }
  .rc-score-key {
    font-size: 0.6rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 3px;
  }

  .rc-body { padding: 26px 32px 30px; display: flex; flex-direction: column; gap: 20px; }

  .rc-section {}
  .rc-section-header {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 8px;
  }
  .rc-section-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .rc-section-title {
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    flex: 1;
  }
  .rc-section-stars {
    display: flex; gap: 2px;
  }
  .rc-section-star {
    width: 8px; height: 8px;
    border-radius: 2px;
  }
  .rc-section-text {
    font-size: 0.88rem;
    color: #c8cfe8;
    line-height: 1.6;
    padding-left: 18px;
    border-left: 2px solid var(--border);
  }

  .rc-footer {
    padding: 16px 32px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .rc-footer-text {
    font-size: 0.72rem;
    color: var(--muted);
    font-style: italic;
  }
  #copy-btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 16px;
    background: var(--card2);
    border: 1px solid var(--border2);
    border-radius: 7px;
    color: var(--muted);
    font-family: var(--font-body);
    font-size: 0.78rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
  }
  #copy-btn:hover { color: var(--text); border-color: var(--accent); }
  #copy-btn.copied { color: var(--c5); border-color: var(--c5); }

  /* ── TOAST ── */
  #toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--c5);
    color: #0d1a17;
    padding: 10px 22px;
    border-radius: 50px;
    font-size: 0.82rem;
    font-weight: 600;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    z-index: 100;
  }
  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ── EMPTY STATE ── */
  #empty-state {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    gap: 12px;
    color: var(--muted);
    text-align: center;
    padding: 40px;
  }
  #empty-state.show { display: flex; }
  #empty-state .es-icon { font-size: 3rem; opacity: 0.4; }
  #empty-state h3 { font-family: var(--font-display); font-size: 1.2rem; color: var(--text); }
  #empty-state p { font-size: 0.83rem; max-width: 260px; }

  /* scrollbar global */
  * { scrollbar-width: thin; scrollbar-color: var(--border2) transparent; }
</style>
</head>
<body>

<!-- SIDEBAR -->
<aside id="sidebar">
  <div id="sidebar-header">
    <h2>Boletim</h2>
    <p>Gerador de Relatórios</p>
  </div>
  <div id="student-list"></div>
  <button id="add-student-btn">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
      <path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </svg>
    Adicionar Aluno
  </button>
</aside>

<!-- MAIN -->
<main id="main">
  <div id="topbar">
    <div id="topbar-title">Gerador de <span>Boletim</span></div>
    <div style="display:flex;gap:10px;">
      <button class="btn btn-ghost" id="regen-btn">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M2 6.5A4.5 4.5 0 0111 4M11 4V1.5M11 4H8.5M11 6.5A4.5 4.5 0 012 9M2 9v2.5M2 9h2.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Regenerar Texto
      </button>
    </div>
  </div>

  <div id="workspace">
    <!-- EDITOR -->
    <div id="editor-panel">
      <div class="field-group">
        <label>Nome do Aluno(a)</label>
        <input type="text" id="student-name" placeholder="Ex: Maria Silva">
      </div>

      <div class="divider"></div>

      <div class="slider-block">
        <div class="slider-header">
          <span class="slider-label">📚 Vocabulário</span>
          <span class="slider-badge" id="badge-vocab">Excelente</span>
        </div>
        <input type="range" id="sl-vocab" min="1" max="5" value="5">
      </div>

      <div class="slider-block">
        <div class="slider-header">
          <span class="slider-label">📝 Gramática</span>
          <span class="slider-badge" id="badge-grammar">Excelente</span>
        </div>
        <input type="range" id="sl-grammar" min="1" max="5" value="5">
      </div>

      <div class="slider-block">
        <div class="slider-header">
          <span class="slider-label">🌟 Comportamento</span>
          <span class="slider-badge" id="badge-behavior">Excelente</span>
        </div>
        <input type="range" id="sl-behavior" min="1" max="5" value="5">
      </div>

      <div class="slider-block">
        <div class="slider-header">
          <span class="slider-label">🇧🇷 Uso de Português</span>
          <span class="slider-badge" id="badge-port">Excelente</span>
        </div>
        <input type="range" id="sl-port" min="1" max="5" value="5">
      </div>

      <div class="slider-block">
        <div class="slider-header">
          <span class="slider-label">📋 Tarefas de Casa</span>
          <span class="slider-badge" id="badge-homework">Excelente</span>
        </div>
        <input type="range" id="sl-homework" min="1" max="5" value="5">
      </div>

      <div class="divider"></div>

      <div id="editor-actions">
        <button class="btn btn-primary" id="save-btn" style="flex:1;">Salvar Aluno</button>
      </div>
    </div>

    <!-- PREVIEW -->
    <div id="preview-panel">
      <div id="report-card">
        <div class="rc-header">
          <div class="rc-header-left">
            <div class="rc-school">Relatório de Desempenho</div>
            <div class="rc-student" id="rc-name">—</div>
            <div class="rc-date" id="rc-date"></div>
          </div>
          <div class="rc-avatar" id="rc-avatar"></div>
        </div>

        <div class="rc-scores" id="rc-scores"></div>

        <div class="rc-body" id="rc-body"></div>

        <div class="rc-footer">
          <span class="rc-footer-text">Gerado pelo professor(a)</span>
          <button id="copy-btn">
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><rect x="4.5" y="4.5" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.3"/><path d="M8.5 4.5V3A1.5 1.5 0 007 1.5H3A1.5 1.5 0 001.5 3v4A1.5 1.5 0 003 8.5h1.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
            Copiar Texto
          </button>
        </div>
      </div>
    </div>
  </div>
</main>

<div id="toast">✓ Copiado com sucesso!</div>

// ── STATE ──────────────────────────────────────────────────────────────────────

let students = [];
let activeId = null;
let currentComments = {};

function newStudent() {
  return {
    id: Date.now() + Math.random(),
    name: '',
    vocab: 5, grammar: 5, behavior: 5, port: 5, homework: 5,
    comments: {}
  };
}

function getStudent() { return students.find(s => s.id === activeId); }

// ── INIT ──────────────────────────────────────────────────────────────────────

function init() {
  const s = newStudent();
  students.push(s);
  activeId = s.id;
  renderSidebar();
  loadStudent(s.id);
  updateDate();
}

function updateDate() {
  const now = new Date();
  const months = ['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
  document.getElementById('rc-date').textContent =
    `${now.getDate()} de ${months[now.getMonth()]} de ${now.getFullYear()}`;
}

// ── SIDEBAR ──────────────────────────────────────────────────────────────────

function renderSidebar() {
  const list = document.getElementById('student-list');
  list.innerHTML = '';
  students.forEach(s => {
    const div = document.createElement('div');
    div.className = 'student-item' + (s.id === activeId ? ' active' : '');
    div.dataset.id = s.id;

    const initials = s.name
      ? s.name.trim().split(' ').slice(0,2).map(w => w[0]).join('').toUpperCase()
      : '?';
    const color = AVATAR_COLORS[students.indexOf(s) % AVATAR_COLORS.length];

    div.innerHTML = `
      <div class="student-avatar" style="background:${color}">${initials}</div>
      <span class="student-name-label">${s.name || 'Novo Aluno'}</span>
      <button class="student-delete" data-id="${s.id}" title="Remover">×</button>
    `;
    div.addEventListener('click', e => {
      if (e.target.classList.contains('student-delete')) return;
      saveCurrentStudent();
      activeId = s.id;
      renderSidebar();
      loadStudent(s.id);
    });
    div.querySelector('.student-delete').addEventListener('click', e => {
      e.stopPropagation();
      removeStudent(s.id);
    });
    list.appendChild(div);
  });
}

function removeStudent(id) {
  if (students.length <= 1) {
    showToast('Deve haver pelo menos um aluno.');
    return;
  }
  students = students.filter(s => s.id !== id);
  if (activeId === id) {
    activeId = students[0].id;
    loadStudent(activeId);
  }
  renderSidebar();
}

// ── LOAD / SAVE ───────────────────────────────────────────────────────────────

function loadStudent(id) {
  const s = students.find(st => st.id === id);
  if (!s) return;
  document.getElementById('student-name').value = s.name;
  document.getElementById('sl-vocab').value = s.vocab;
  document.getElementById('sl-grammar').value = s.grammar;
  document.getElementById('sl-behavior').value = s.behavior;
  document.getElementById('sl-port').value = s.port;
  document.getElementById('sl-homework').value = s.homework;
  updateAllBadges();
  currentComments = { ...s.comments };
  // generate comments if missing
  ['vocab','grammar','behavior','port','homework'].forEach(cat => {
    if (!currentComments[cat]) currentComments[cat] = pickComment(cat, s[cat === 'port' ? 'port' : cat]);
  });
  renderPreview();
}

function saveCurrentStudent() {
  const s = getStudent();
  if (!s) return;
  s.name = document.getElementById('student-name').value.trim();
  s.vocab = +document.getElementById('sl-vocab').value;
  s.grammar = +document.getElementById('sl-grammar').value;
  s.behavior = +document.getElementById('sl-behavior').value;
  s.port = +document.getElementById('sl-port').value;
  s.homework = +document.getElementById('sl-homework').value;
  s.comments = { ...currentComments };
}

function pickComment(cat, level) {
  const pool = COMMENTS[cat][level];
  return pool[Math.floor(Math.random() * pool.length)];
}

// ── BADGES ───────────────────────────────────────────────────────────────────

const sliderMap = {
  'sl-vocab': { badge: 'badge-vocab', cat: 'vocab' },
  'sl-grammar': { badge: 'badge-grammar', cat: 'grammar' },
  'sl-behavior': { badge: 'badge-behavior', cat: 'behavior' },
  'sl-port': { badge: 'badge-port', cat: 'port' },
  'sl-homework': { badge: 'badge-homework', cat: 'homework' }
};

function updateBadge(sliderId) {
  const { badge, cat } = sliderMap[sliderId];
  const val = +document.getElementById(sliderId).value;
  const el = document.getElementById(badge);
  el.textContent = RATINGS[val];
  el.style.background = LEVEL_COLORS[val];

  // update slider track
  const sl = document.getElementById(sliderId);
  const pct = ((val - 1) / 4) * 100;
  sl.style.background = `linear-gradient(to right, ${LEVEL_COLORS[val]} ${pct}%, #2a3048 ${pct}%)`;
}

function updateAllBadges() {
  Object.keys(sliderMap).forEach(updateBadge);
}

// ── PREVIEW ──────────────────────────────────────────────────────────────────

const CAT_META = [
  { key: 'vocab',    label: 'Vocabulário',        icon: '📚', slId: 'sl-vocab' },
  { key: 'grammar',  label: 'Gramática',           icon: '📝', slId: 'sl-grammar' },
  { key: 'behavior', label: 'Comportamento',       icon: '🌟', slId: 'sl-behavior' },
  { key: 'port',     label: 'Uso de Português',    icon: '🇧🇷', slId: 'sl-port' },
  { key: 'homework', label: 'Tarefas de Casa',     icon: '📋', slId: 'sl-homework' }
];

function renderPreview() {
  const name = document.getElementById('student-name').value.trim() || 'Aluno(a)';
  const initials = name.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();
  const s = getStudent();
  const colorIdx = s ? students.indexOf(s) % AVATAR_COLORS.length : 0;

  // Header
  document.getElementById('rc-name').textContent = name;
  const av = document.getElementById('rc-avatar');
  av.textContent = initials;
  av.style.background = AVATAR_COLORS[colorIdx];

  // Scores row
  const scoresEl = document.getElementById('rc-scores');
  scoresEl.innerHTML = '';
  CAT_META.forEach(m => {
    const val = +document.getElementById(m.slId).value;
    const col = LEVEL_COLORS[val];
    const cell = document.createElement('div');
    cell.className = 'rc-score-cell';
    cell.innerHTML = `
      <div class="rc-score-icon">${m.icon}</div>
      <div class="rc-score-val" style="color:${col}">${val}</div>
      <div class="rc-score-key">${m.label.split(' ')[0]}</div>
    `;
    scoresEl.appendChild(cell);
  });

  // Body sections
  const bodyEl = document.getElementById('rc-body');
  bodyEl.innerHTML = '';
  CAT_META.forEach(m => {
    const val = +document.getElementById(m.slId).value;
    const col = LEVEL_COLORS[val];
    const text = currentComments[m.key] || pickComment(m.key, val);

    // Build mini stars (5 squares)
    let stars = '';
    for (let i = 1; i <= 5; i++) {
      stars += `<span class="rc-section-star" style="background:${i<=val?col:'#2a3048'}"></span>`;
    }

    const sec = document.createElement('div');
    sec.className = 'rc-section';
    sec.innerHTML = `
      <div class="rc-section-header">
        <span class="rc-section-dot" style="background:${col}"></span>
        <span class="rc-section-title">${m.label}</span>
        <div class="rc-section-stars">${stars}</div>
      </div>
      <div class="rc-section-text">${text}</div>
    `;
    bodyEl.appendChild(sec);
  });
}

function buildPlainText() {
  const name = document.getElementById('student-name').value.trim() || 'Aluno(a)';
  const now = new Date();
  const months=['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
  let txt = `RELATÓRIO DE DESEMPENHO\n${name}\n${now.getDate()} de ${months[now.getMonth()]} de ${now.getFullYear()}\n\n`;
  CAT_META.forEach(m => {
    const val = +document.getElementById(m.slId).value;
    txt += `${m.label}: ${RATINGS[val]}\n`;
    txt += `${currentComments[m.key] || ''}\n\n`;
  });
  return txt.trim();
}

// ── EVENTS ───────────────────────────────────────────────────────────────────

document.getElementById('student-name').addEventListener('input', () => {
  const s = getStudent();
  if (s) s.name = document.getElementById('student-name').value.trim();
  renderSidebar();
  renderPreview();
});

Object.keys(sliderMap).forEach(slId => {
  document.getElementById(slId).addEventListener('input', () => {
    const { cat } = sliderMap[slId];
    const val = +document.getElementById(slId).value;
    currentComments[cat] = pickComment(cat, val);
    updateBadge(slId);
    renderPreview();
  });
});

document.getElementById('add-student-btn').addEventListener('click', () => {
  saveCurrentStudent();
  const s = newStudent();
  students.push(s);
  activeId = s.id;
  currentComments = {};
  renderSidebar();
  loadStudent(s.id);
});

document.getElementById('save-btn').addEventListener('click', () => {
  saveCurrentStudent();
  renderSidebar();
  showToast('Aluno salvo com sucesso!');
});

document.getElementById('regen-btn').addEventListener('click', () => {
  currentComments = {};
  CAT_META.forEach(m => {
    const val = +document.getElementById(m.slId).value;
    currentComments[m.key] = pickComment(m.key, val);
  });
  renderPreview();
  showToast('Textos regenerados!');
});

document.getElementById('copy-btn').addEventListener('click', () => {
  navigator.clipboard.writeText(buildPlainText()).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.classList.add('copied');
    btn.querySelector('svg').innerHTML = '<path d="M2 7l4 4L11 3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>';
    showToast('Boletim copiado!');
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.querySelector('svg').innerHTML = '<rect x="4.5" y="4.5" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.3"/><path d="M8.5 4.5V3A1.5 1.5 0 007 1.5H3A1.5 1.5 0 001.5 3v4A1.5 1.5 0 003 8.5h1.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>';
    }, 2500);
  });
});

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = '✓ ' + msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ── GO ────────────────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
