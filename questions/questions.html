<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1001 Conversation Questions</title>
<link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fff8f0;
    --ink: #1a1a2e;
    --card-bg: #ffffff;
    --shadow: rgba(0,0,0,0.12);

    --cat1: #ff6b6b;
    --cat2: #ffa94d;
    --cat3: #ffe066;
    --cat4: #69db7c;
    --cat5: #4dabf7;
    --cat6: #cc5de8;
    --cat7: #f06595;
    --cat8: #38d9a9;
    --cat9: #a9e34b;
    --cat10: #ff8787;

    --pill-radius: 999px;
    --card-radius: 24px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    background-image:
      radial-gradient(circle at 10% 20%, rgba(255,107,107,0.08) 0%, transparent 50%),
      radial-gradient(circle at 90% 80%, rgba(77,171,247,0.08) 0%, transparent 50%),
      radial-gradient(circle at 50% 50%, rgba(105,219,124,0.05) 0%, transparent 70%);
    color: var(--ink);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── CONFETTI DOTS ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(circle, #ff6b6b 1.5px, transparent 1.5px),
      radial-gradient(circle, #4dabf7 1.5px, transparent 1.5px),
      radial-gradient(circle, #69db7c 1.5px, transparent 1.5px),
      radial-gradient(circle, #ffe066 1.5px, transparent 1.5px),
      radial-gradient(circle, #cc5de8 1.5px, transparent 1.5px);
    background-size: 120px 120px, 180px 180px, 150px 150px, 200px 200px, 90px 90px;
    background-position: 10px 10px, 60px 90px, 30px 150px, 100px 40px, 50px 200px;
    opacity: 0.25;
    pointer-events: none;
    z-index: 0;
  }

  /* ── HEADER ── */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(255,248,240,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 3px solid var(--ink);
    padding: 0.75rem 1.5rem;
  }

  .header-inner {
    max-width: 1100px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    flex-wrap: wrap;
  }

  .logo {
    font-family: 'Boogaloo', cursive;
    font-size: 1.75rem;
    color: var(--ink);
    line-height: 1;
    letter-spacing: 0.5px;
  }

  .logo span {
    background: linear-gradient(135deg, #ff6b6b, #ffa94d, #ffe066, #69db7c, #4dabf7, #cc5de8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    flex-wrap: wrap;
  }

  /* Progress pill */
  .progress-pill {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    background: #1a1a2e;
    color: #fff;
    border-radius: var(--pill-radius);
    padding: 0.4rem 1rem;
    font-size: 0.875rem;
    font-weight: 700;
    letter-spacing: 0.3px;
    border: 2px solid transparent;
  }

  body.dark .progress-pill {
    background: #ff6b6b;
    color: #fff;
  }

  .progress-emoji { font-size: 1rem; }

  /* Stopwatch */
  .stopwatch {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    background: var(--card-bg);
    border: 2.5px solid var(--ink);
    border-radius: var(--pill-radius);
    padding: 0.35rem 0.75rem;
    box-shadow: 3px 3px 0 var(--ink);
  }

  .sw-time {
    font-family: 'Boogaloo', cursive;
    font-size: 1.1rem;
    min-width: 3.2rem;
    text-align: center;
    color: var(--ink);
  }

  .sw-btn {
    background: none;
    border: 2px solid var(--ink);
    border-radius: var(--pill-radius);
    font-family: 'Nunito', sans-serif;
    font-size: 0.7rem;
    font-weight: 800;
    padding: 0.15rem 0.5rem;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--ink);
  }

  .sw-btn:hover { background: var(--ink); color: #fff; }
  .sw-btn.running { background: #ff6b6b; border-color: #ff6b6b; color: #fff; }

  /* Theme toggle */
  .theme-btn {
    width: 2.2rem;
    height: 2.2rem;
    border-radius: 50%;
    border: 2.5px solid var(--ink);
    background: var(--card-bg);
    cursor: pointer;
    font-size: 1rem;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 3px 3px 0 var(--ink);
    transition: transform 0.15s;
  }
  .theme-btn:hover { transform: rotate(20deg) scale(1.1); }

  /* ── MAIN LAYOUT ── */
  .layout {
    max-width: 1100px;
    margin: 0 auto;
    padding: 1.5rem;
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-rows: 1fr auto auto;
    gap: 1.25rem;
    height: calc(100vh - 68px);
  }

  /* ── GIANT QUESTION CARD ── */
  .card-stage {
    perspective: 1200px;
    cursor: pointer;
    user-select: none;
    min-height: 0;
  }

  .card-flipper {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.6s cubic-bezier(0.4,0,0.2,1);
  }

  .card-flipper.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    border-radius: var(--card-radius);
    border: 3px solid var(--ink);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 3rem;
    flex-direction: column;
    gap: 0.75rem;
    box-shadow: 8px 8px 0 var(--ink);
  }

  .card-front {
    background: linear-gradient(135deg, #fff5f5 0%, #fff8f0 50%, #f0f9ff 100%);
  }

  .card-back {
    transform: rotateY(180deg);
    background: linear-gradient(135deg, #f0fff4 0%, #fffdf0 50%, #fff0fa 100%);
  }

  /* Placeholder state */
  .card-placeholder {
    text-align: center;
  }

  .card-placeholder .big-emoji {
    font-size: 5rem;
    display: block;
    margin-bottom: 0.75rem;
    animation: bounce 2s infinite;
  }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
  }

  .card-placeholder p {
    font-size: 1.25rem;
    font-weight: 700;
    color: #888;
    max-width: 380px;
  }

  /* Active question state */
  .q-category-badge {
    font-size: 0.8rem;
    font-weight: 800;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 0.3rem 0.9rem;
    border-radius: var(--pill-radius);
    border: 2px solid var(--ink);
    color: var(--ink);
    align-self: center;
  }

  .q-text {
    font-family: 'Boogaloo', cursive;
    font-size: clamp(2.4rem, 7vh, 5.5rem);
    line-height: 1.2;
    text-align: center;
    color: var(--ink);
    width: 100%;
  }

  .q-hint {
    font-size: 0.8rem;
    color: #aaa;
    font-weight: 600;
  }

  /* card number badge */
  .q-number {
    position: absolute;
    top: 1.25rem;
    right: 1.5rem;
    font-family: 'Boogaloo', cursive;
    font-size: 1.1rem;
    color: #ccc;
  }

  /* ── BOTTOM CONTROLS ── */
  .controls-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    flex-wrap: wrap;
  }

  .generate-btn {
    font-family: 'Boogaloo', cursive;
    font-size: 1.5rem;
    letter-spacing: 0.5px;
    padding: 0.75rem 2.5rem;
    background: var(--ink);
    color: #fff;
    border: 3px solid var(--ink);
    border-radius: var(--pill-radius);
    cursor: pointer;
    box-shadow: 5px 5px 0 #ff6b6b;
    transition: all 0.15s;
    position: relative;
    overflow: hidden;
  }

  .generate-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.08) 100%);
  }

  .generate-btn:hover:not(:disabled) {
    transform: translate(-2px, -2px);
    box-shadow: 7px 7px 0 #ff6b6b;
  }

  .generate-btn:active:not(:disabled) {
    transform: translate(3px, 3px);
    box-shadow: 2px 2px 0 #ff6b6b;
  }

  .generate-btn:disabled {
    opacity: 0.45;
    cursor: not-allowed;
    box-shadow: 3px 3px 0 #ccc;
  }

  .history-btn {
    font-family: 'Nunito', sans-serif;
    font-size: 0.875rem;
    font-weight: 800;
    padding: 0.7rem 1.5rem;
    background: var(--card-bg);
    color: var(--ink);
    border: 2.5px solid var(--ink);
    border-radius: var(--pill-radius);
    cursor: pointer;
    box-shadow: 4px 4px 0 var(--ink);
    transition: all 0.15s;
  }

  .history-btn:hover { transform: translate(-2px,-2px); box-shadow: 6px 6px 0 var(--ink); }

  /* ── CATEGORY DRAWER ── */
  .cat-drawer-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
    backdrop-filter: blur(4px);
  }

  .cat-drawer-overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  .cat-drawer {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--bg);
    border-top: 3px solid var(--ink);
    border-radius: 20px 20px 0 0;
    padding: 1.5rem 1.5rem 2rem;
    z-index: 201;
    transform: translateY(100%);
    transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    max-height: 80vh;
    overflow-y: auto;
  }

  .cat-drawer.open { transform: translateY(0); }

  .drawer-handle {
    width: 48px;
    height: 5px;
    background: #ccc;
    border-radius: 3px;
    margin: 0 auto 1.25rem;
  }

  .drawer-title {
    font-family: 'Boogaloo', cursive;
    font-size: 1.5rem;
    margin-bottom: 1rem;
    text-align: center;
  }

  .drawer-actions {
    display: flex;
    gap: 0.5rem;
    justify-content: center;
    margin-bottom: 1.25rem;
    flex-wrap: wrap;
  }

  .drawer-action-btn {
    font-family: 'Nunito', sans-serif;
    font-size: 0.8rem;
    font-weight: 700;
    padding: 0.35rem 1rem;
    border: 2px solid var(--ink);
    border-radius: var(--pill-radius);
    background: var(--card-bg);
    cursor: pointer;
    transition: all 0.15s;
    color: var(--ink);
  }

  .drawer-action-btn:hover { background: var(--ink); color: #fff; }

  .categories-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 0.6rem;
    justify-content: center;
  }

  .cat-chip {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    padding: 0.45rem 1rem;
    border-radius: var(--pill-radius);
    border: 2.5px solid var(--ink);
    background: var(--card-bg);
    cursor: pointer;
    font-family: 'Nunito', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--ink);
    transition: all 0.15s;
    box-shadow: 3px 3px 0 var(--ink);
    user-select: none;
  }

  .cat-chip:hover { transform: translate(-1px,-1px); box-shadow: 4px 4px 0 var(--ink); }

  .cat-chip.selected {
    color: #fff;
    box-shadow: 3px 3px 0 var(--ink);
  }

  .cat-chip .chip-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: currentColor;
    opacity: 0.5;
    flex-shrink: 0;
    transition: opacity 0.15s;
  }

  .cat-chip.selected .chip-dot { opacity: 1; background: rgba(255,255,255,0.7); }

  .cat-count {
    font-size: 0.7rem;
    opacity: 0.7;
    margin-left: 0.1rem;
  }

  /* ── HISTORY PANEL ── */
  .history-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
    backdrop-filter: blur(4px);
  }

  .history-overlay.open { opacity: 1; pointer-events: all; }

  .history-panel {
    position: fixed;
    top: 0;
    right: 0;
    bottom: 0;
    width: min(420px, 100vw);
    background: var(--bg);
    border-left: 3px solid var(--ink);
    z-index: 201;
    transform: translateX(100%);
    transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .history-panel.open { transform: translateX(0); }

  .history-header {
    padding: 1.25rem 1.5rem;
    border-bottom: 2.5px solid var(--ink);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .history-title {
    font-family: 'Boogaloo', cursive;
    font-size: 1.4rem;
  }

  .close-btn {
    width: 2rem;
    height: 2rem;
    border-radius: 50%;
    border: 2px solid var(--ink);
    background: var(--card-bg);
    cursor: pointer;
    font-size: 1rem;
    display: flex; align-items: center; justify-content: center;
    font-weight: 800;
    transition: all 0.15s;
    color: var(--ink);
  }

  .close-btn:hover { background: var(--ink); color: #fff; }

  .history-list {
    flex: 1;
    overflow-y: auto;
    padding: 1rem;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }

  .history-empty {
    text-align: center;
    color: #aaa;
    font-weight: 600;
    margin-top: 3rem;
    font-size: 0.95rem;
  }

  .history-item {
    background: var(--card-bg);
    border: 2.5px solid var(--ink);
    border-radius: 14px;
    padding: 0.9rem 1rem;
    cursor: pointer;
    transition: all 0.15s;
    box-shadow: 3px 3px 0 var(--ink);
  }

  .history-item:hover { transform: translate(-2px,-2px); box-shadow: 5px 5px 0 var(--ink); }

  .hi-cat {
    font-size: 0.7rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 0.15rem 0.6rem;
    border-radius: var(--pill-radius);
    border: 1.5px solid currentColor;
    display: inline-block;
    margin-bottom: 0.5rem;
  }

  .hi-q {
    font-size: 0.9rem;
    font-weight: 600;
    line-height: 1.4;
  }

  .hi-num {
    font-size: 0.75rem;
    color: #bbb;
    font-weight: 700;
    margin-top: 0.35rem;
  }

  /* ── DARK MODE ── */
  body.dark {
    --bg: #0f0f1a;
    --ink: #f0f0f0;
    --card-bg: #1e1e30;
    --shadow: rgba(0,0,0,0.4);
  }

  body.dark .card-front {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  }

  body.dark .card-back {
    background: linear-gradient(135deg, #1a2a1a 0%, #2a2a1a 50%, #2a1a2a 100%);
  }

  body.dark header {
    background: rgba(15,15,26,0.92);
  }

  body.dark .generate-btn {
    background: #ff6b6b;
    border-color: #ff6b6b;
    color: #fff;
    box-shadow: 5px 5px 0 #ffa94d;
  }

  body.dark .generate-btn:hover:not(:disabled) {
    box-shadow: 7px 7px 0 #ffa94d;
  }

  body.dark .generate-btn:active:not(:disabled) {
    box-shadow: 2px 2px 0 #ffa94d;
  }

  /* ── KEYBOARD HINT ── */
  .kb-hint {
    text-align: center;
    font-size: 0.75rem;
    color: #bbb;
    font-weight: 600;
    margin-top: -0.5rem;
  }

  kbd {
    background: var(--card-bg);
    border: 1.5px solid #ddd;
    border-radius: 5px;
    padding: 0.1rem 0.4rem;
    font-size: 0.7rem;
    font-family: monospace;
  }

  /* ── CONFETTI BURST ── */
  .confetti-container {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 999;
    overflow: hidden;
  }

  .confetti-piece {
    position: absolute;
    width: 10px;
    height: 10px;
    border-radius: 2px;
    animation: confettiFall 1.2s ease-in forwards;
  }

  @keyframes confettiFall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }

  /* categories toggle button */
  .cat-toggle-btn {
    font-family: 'Nunito', sans-serif;
    font-size: 0.875rem;
    font-weight: 800;
    padding: 0.7rem 1.5rem;
    background: linear-gradient(135deg, #ff6b6b, #ffa94d);
    color: #fff;
    border: 2.5px solid var(--ink);
    border-radius: var(--pill-radius);
    cursor: pointer;
    box-shadow: 4px 4px 0 var(--ink);
    transition: all 0.15s;
  }

  .cat-toggle-btn:hover { transform: translate(-2px,-2px); box-shadow: 6px 6px 0 var(--ink); }

  .selected-summary {
    font-size: 0.8rem;
    font-weight: 700;
    color: #888;
    text-align: center;
  }

  /* ── SPINNER ── */
  .spinner {
    width: 36px; height: 36px;
    border: 4px solid #eee;
    border-top-color: #cc5de8;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    .layout { padding: 0.75rem; height: calc(100vh - 60px); }
    .q-text { font-size: clamp(1.6rem, 6vw, 2.5rem); }
    .card-face { padding: 1.25rem 1rem; }
    .logo { font-size: 1.3rem; }
    .generate-btn { font-size: 1.25rem; padding: 0.65rem 2rem; }
  }
</style>
</head>
<body>

<!-- CONFETTI -->
<div class="confetti-container" id="confettiContainer"></div>

<!-- HEADER -->
<header>
  <div class="header-inner">
    <div class="logo">1001 <span>Conversation</span> Questions</div>
    <div class="header-right">
      <div class="progress-pill">
        <span class="progress-emoji" id="progressEmoji">🎯</span>
        <span id="progressCount">0 asked</span>
      </div>
      <div class="stopwatch">
        <span class="sw-time" id="swTime">00:00</span>
        <button class="sw-btn" id="swStartBtn" onclick="swToggle()">Start</button>
        <button class="sw-btn" onclick="swReset()">Reset</button>
      </div>
      <button class="theme-btn" onclick="toggleTheme()" title="Toggle theme">
        <span id="themeIcon">🌙</span>
      </button>
    </div>
  </div>
</header>

<!-- MAIN -->
<div class="layout">

  <!-- GIANT CARD -->
  <div class="card-stage" onclick="handleCardClick()">
    <div class="card-flipper" id="cardFlipper">
      <div class="card-face card-front" id="cardFront">
        <div class="card-placeholder" id="placeholder">
          <span class="big-emoji">💬</span>
          <p>Pick some categories below, then hit the button to spark a conversation!</p>
        </div>
        <div id="questionContent" style="display:none; flex-direction:column; align-items:center; gap:1rem; text-align:center; width:100%;">
          <div class="q-category-badge" id="qCategoryBadge"></div>
          <div class="q-text" id="qText"></div>
          <div class="q-hint">tap card to flip ↩</div>
          <div class="q-number" id="qNumber"></div>
        </div>
      </div>
      <div class="card-face card-back" id="cardBack">
        <div style="text-align:center; display:flex; flex-direction:column; align-items:center; gap:1rem; width:100%;">
          <div class="q-category-badge" style="background:rgba(204,93,232,0.12); border-color:#cc5de8; color:#cc5de8;">🔁 Follow-up</div>
          <div class="q-text" id="qTextBack"></div>
          <div class="q-hint">tap card to flip back ↩</div>
        </div>
      </div>
    </div>
  </div>

  <!-- CONTROLS ROW -->
  <div class="controls-row">
    <button class="cat-toggle-btn" onclick="openCatDrawer()">
      🎨 Categories <span id="selectedCount">(0)</span>
    </button>
    <button class="generate-btn" id="generateBtn" onclick="generateQuestion()" disabled>
      ✨ Next Question
    </button>
    <button class="history-btn" onclick="openHistory()">📜 History</button>
  </div>
  <div class="kb-hint">press <kbd>Space</kbd> to generate</div>

</div><!-- /layout -->

<!-- CATEGORY DRAWER -->
<div class="cat-drawer-overlay" id="catOverlay" onclick="closeCatDrawer()"></div>
<div class="cat-drawer" id="catDrawer">
  <div class="drawer-handle"></div>
  <div class="drawer-title">Choose Your Categories 🎉</div>
  <div class="drawer-actions">
    <button class="drawer-action-btn" onclick="selectAll()">✅ Select All</button>
    <button class="drawer-action-btn" onclick="clearAll()">🗑️ Clear All</button>
  </div>
  <div class="categories-grid" id="categoriesGrid"></div>
</div>

<!-- HISTORY PANEL -->
<div class="history-overlay" id="historyOverlay" onclick="closeHistory()"></div>
<div class="history-panel" id="historyPanel">
  <div class="history-header">
    <div class="history-title">📜 History</div>
    <button class="close-btn" onclick="closeHistory()">×</button>
  </div>

function swToggle() {

    btn.textContent = 'Start';
    btn.classList.remove('running');
    swRunning = false;
  } else {
    swInterval = setInterval(() => {
      swTime++;
      const m = Math.floor(swTime/60), s = swTime%60;
      document.getElementById('swTime').textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }, 1000);
    btn.textContent = 'Stop';
    btn.classList.add('running');
    swRunning = true;
  }

  list.innerHTML = [...questionHistory].reverse().map((item, i) => {
    const num = questionHistory.length - i;
    const color = categoryColors[item.category] || '#888';
    return `<div class="history-item" onclick="loadFromHistory(${questionHistory.length - 1 - i})">

      <div class="hi-q">${item.question}</div>
      <div class="hi-num">#${num}</div>

  }).join('');
}

function getFollowUp(category, question) {
  const pool = followUpsByCategory[category] || followUpsByCategory["Light & Easy"];
  // Use a hash of the question string to pick consistently but vary across questions
  let hash = 0;
  for (let i = 0; i < question.length; i++) hash = (hash * 31 + question.charCodeAt(i)) | 0;
  return pool[Math.abs(hash) % pool.length];
}

  const cat = catsArr[Math.floor(Math.random() * catsArr.length)];
  const qs = questionsByCategory[cat];
  const q = qs[Math.floor(Math.random() * qs.length)];

  questionCount++;

  // Update progress
  document.getElementById('progressCount').textContent = questionCount + ' asked';
  const emojis = ['🎯','🔥','💫','⚡','🌟','🎲','🎉','💎','🚀','✨'];
  document.getElementById('progressEmoji').textContent = emojis[Math.min(questionCount - 1, emojis.length - 1)];

  questionHistory.push({ category: cat, question: q });
  renderHistory();

  showQuestion(cat, q, true);

  // Reset and restart stopwatch for this question
  swReset();
  swToggle();

  // Confetti burst every 5 questions
  if (questionCount % 5 === 0) confettiBurst();
}

// ── CONFETTI
function confettiBurst() {
  const container = document.getElementById('confettiContainer');
  const colors = COLORS_HEX;
  for (let i = 0; i < 30; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.cssText = `
      left: ${Math.random()*100}%;
      top: -20px;
      background: ${colors[Math.floor(Math.random()*colors.length)]};
      width: ${6 + Math.random()*8}px;
      height: ${6 + Math.random()*8}px;
      border-radius: ${Math.random() > 0.5 ? '50%' : '2px'};
      animation-delay: ${Math.random()*0.5}s;
      animation-duration: ${0.8 + Math.random()*0.8}s;
    `;
    container.appendChild(piece);
    setTimeout(() => piece.remove(), 1600);
  }
}

// ── KEYBOARD
document.addEventListener('keydown', e => {
  if (e.code === 'Space' && !e.target.matches('button,input,textarea')) {
    e.preventDefault();
    if (!document.getElementById('generateBtn').disabled) generateQuestion();
  }
  if (e.code === 'Escape') {
    closeCatDrawer();
    closeHistory();
  }
});

// ── INIT
function init() {
  // Theme
  if (localStorage.getItem('theme') === 'dark') {
    document.body.classList.add('dark');
    document.getElementById('themeIcon').textContent = '☀️';
  }

  // Build category chips
  const grid = document.getElementById('categoriesGrid');
  cats.forEach((cat, i) => {
    const color = COLORS_HEX[i % COLORS_HEX.length];
    const chip = document.createElement('button');
    chip.className = 'cat-chip';
    chip.id = 'chip-' + cat;
    chip.onclick = () => toggleCat(cat);
    const count = questionsByCategory[cat].length;
    chip.innerHTML = `<span class="chip-dot"></span>${cat}<span class="cat-count">${count}</span>`;
    chip.style.setProperty('--chip-color', color);
    grid.appendChild(chip);
  });
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
