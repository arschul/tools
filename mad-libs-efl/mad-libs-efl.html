<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Story Builder — Mad Libs for EFL</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --yellow: #FFD94A;
    --orange: #FF7B39;
    --pink: #FF4F8B;
    --teal: #00C9A7;
    --blue: #3B82F6;
    --purple: #8B5CF6;
    --dark: #1A1A2E;
    --light: #FFFDF5;
    --card: #FFFFFF;
    --shadow: 4px 4px 0px rgba(0,0,0,0.15);
    --shadow-lg: 6px 6px 0px rgba(0,0,0,0.18);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background-color: #FFF8E7;
    background-image:
      radial-gradient(circle at 10% 20%, rgba(255,217,74,0.25) 0%, transparent 40%),
      radial-gradient(circle at 90% 80%, rgba(0,201,167,0.2) 0%, transparent 40%),
      radial-gradient(circle at 50% 50%, rgba(255,79,139,0.1) 0%, transparent 60%);
    min-height: 100vh;
    color: var(--dark);
  }

  /* ── HEADER ── */
  header {
    background: var(--dark);
    padding: 18px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
    border-bottom: 5px solid var(--yellow);
  }
  header h1 {
    font-family: 'Fredoka One', cursive;
    font-size: 2rem;
    color: var(--yellow);
    letter-spacing: 1px;
  }
  header h1 span { color: var(--pink); }
  .tagline {
    font-size: 0.85rem;
    color: rgba(255,255,255,0.6);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  /* ── LAYOUT ── */
  .container { max-width: 960px; margin: 0 auto; padding: 32px 20px 60px; }

  /* ── LEVEL FILTERS ── */
  .level-filters {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 18px;
  }
  .level-btn {
    font-family: 'Fredoka One', cursive;
    font-size: 0.9rem;
    padding: 7px 18px;
    border: 2.5px solid var(--dark);
    border-radius: 30px;
    cursor: pointer;
    background: #fff;
    color: var(--dark);
    box-shadow: 2px 2px 0 rgba(0,0,0,0.12);
    transition: transform 0.12s, box-shadow 0.12s, background 0.12s;
  }
  .level-btn:hover { transform: translate(-1px,-2px); box-shadow: 3px 3px 0 rgba(0,0,0,0.15); }
  .level-btn.active { background: var(--dark); color: var(--yellow); }

  /* ── STORY SELECTOR ── */
  .section-title {
    font-family: 'Fredoka One', cursive;
    font-size: 1.4rem;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-title .pill {
    display: inline-block;
    background: var(--dark);
    color: var(--yellow);
    font-size: 0.75rem;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    padding: 3px 10px;
    border-radius: 20px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .story-cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 14px;
    margin-bottom: 36px;
  }
  .story-card {
    background: var(--card);
    border: 3px solid var(--dark);
    border-radius: 16px;
    padding: 18px 16px;
    cursor: pointer;
    box-shadow: var(--shadow);
    transition: transform 0.15s, box-shadow 0.15s;
    position: relative;
    overflow: hidden;
  }
  .story-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 6px;
    background: var(--color, var(--teal));
  }
  .story-card:hover { transform: translate(-2px,-3px); box-shadow: var(--shadow-lg); }
  .story-card.active {
    background: var(--dark);
    color: #fff;
    transform: translate(-2px,-3px);
    box-shadow: var(--shadow-lg);
  }
  .story-card.active .card-icon { filter: grayscale(0); }
  .card-icon { font-size: 2rem; margin-bottom: 8px; display: block; }
  .card-title { font-family: 'Fredoka One', cursive; font-size: 1.05rem; line-height: 1.2; }
  .card-level {
    display: inline-block;
    margin-top: 6px;
    font-size: 0.7rem;
    font-weight: 800;
    padding: 2px 8px;
    border-radius: 10px;
    background: rgba(0,0,0,0.08);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .story-card.active .card-level { background: rgba(255,255,255,0.15); }

  /* ── ONE-AT-A-TIME PROMPT ── */
  #blanks-section { display: none; }

  .prompt-arena {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    margin-bottom: 28px;
  }

  .prompt-card {
    background: var(--card);
    border: 4px solid var(--dark);
    border-radius: 24px;
    padding: 40px 36px 32px;
    box-shadow: var(--shadow-lg);
    width: 100%;
    max-width: 480px;
    text-align: center;
    position: relative;
    animation: slideIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
  }
  @keyframes slideIn {
    0% { transform: scale(0.88) translateY(16px); opacity: 0; }
    100% { transform: scale(1) translateY(0); opacity: 1; }
  }

  .prompt-counter {
    position: absolute;
    top: -16px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--dark);
    color: var(--yellow);
    font-family: 'Fredoka One', cursive;
    font-size: 0.85rem;
    padding: 4px 16px;
    border-radius: 20px;
    white-space: nowrap;
  }

  .prompt-type-badge {
    display: inline-block;
    padding: 8px 22px;
    border-radius: 30px;
    font-family: 'Fredoka One', cursive;
    font-size: 1.4rem;
    color: #fff;
    background: var(--badge-bg, var(--teal));
    border: 3px solid var(--dark);
    box-shadow: var(--shadow);
    margin-bottom: 20px;
    letter-spacing: 0.5px;
  }

  .prompt-input {
    width: 100%;
    padding: 14px 18px;
    font-family: 'Nunito', sans-serif;
    font-size: 1.2rem;
    font-weight: 800;
    border: 3px solid #ddd;
    border-radius: 14px;
    background: #FAFAFA;
    outline: none;
    text-align: center;
    transition: border-color 0.2s, background 0.2s, transform 0.15s;
  }
  .prompt-input:focus {
    border-color: var(--blue);
    background: #fff;
    transform: scale(1.02);
  }
  .prompt-input.filled { border-color: var(--teal); background: #f0fdf9; }

  .prompt-nav {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .btn-next {
    background: var(--dark);
    color: var(--yellow);
    font-size: 1.1rem;
    padding: 13px 28px;
  }

  /* answered dots */
  .dots-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    justify-content: center;
    max-width: 480px;
    width: 100%;
  }
  .answer-dot {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 2.5px solid var(--dark);
    background: #eee;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.6rem;
    font-weight: 800;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
    position: relative;
  }
  .answer-dot.done { background: var(--teal); color: #fff; }
  .answer-dot.current { background: var(--yellow); border-color: var(--dark); transform: scale(1.2); }
  .answer-dot:hover .dot-tooltip { display: block; }
  .dot-tooltip {
    display: none;
    position: absolute;
    bottom: 34px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--dark);
    color: #fff;
    font-size: 0.7rem;
    padding: 4px 8px;
    border-radius: 6px;
    white-space: nowrap;
    z-index: 10;
    pointer-events: none;
  }

  .type-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 8px;
    font-size: 0.7rem;
    font-weight: 800;
    color: #fff;
    background: var(--badge-color, var(--teal));
  }

  .btn {
    font-family: 'Fredoka One', cursive;
    font-size: 1.2rem;
    padding: 14px 32px;
    border: 3px solid var(--dark);
    border-radius: 14px;
    cursor: pointer;
    box-shadow: var(--shadow);
    transition: transform 0.12s, box-shadow 0.12s;
    letter-spacing: 0.5px;
  }
  .btn:hover { transform: translate(-2px,-2px); box-shadow: var(--shadow-lg); }
  .btn:active { transform: translate(1px,1px); box-shadow: 2px 2px 0 rgba(0,0,0,0.15); }
  .btn-primary { background: var(--yellow); color: var(--dark); }
  .btn-secondary { background: var(--teal); color: #fff; }
  .btn-reset { background: #eee; color: var(--dark); font-size: 1rem; padding: 10px 20px; }

  .btn-row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; margin-top: 8px; }

  .progress-bar {
    height: 8px;
    background: #e9e9e9;
    border-radius: 10px;
    margin-bottom: 20px;
    overflow: hidden;
    border: 2px solid var(--dark);
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--teal), var(--blue));
    border-radius: 10px;
    transition: width 0.4s ease;
  }

  /* ── STORY OUTPUT ── */
  #story-section { display: none; }
  .story-box {
    background: var(--card);
    border: 4px solid var(--dark);
    border-radius: 20px;
    padding: 32px 36px;
    box-shadow: var(--shadow-lg);
    position: relative;
    margin-bottom: 24px;
  }
  .story-box::before {
    content: '📖 YOUR STORY';
    position: absolute;
    top: -17px;
    left: 24px;
    background: var(--yellow);
    border: 3px solid var(--dark);
    border-radius: 8px;
    padding: 3px 14px;
    font-family: 'Fredoka One', cursive;
    font-size: 0.9rem;
    color: var(--dark);
  }
  .story-text {
    font-size: 1.15rem;
    line-height: 2;
    color: var(--dark);
  }
  .filled-word {
    display: inline-block;
    background: var(--yellow);
    border: 2.5px solid var(--dark);
    border-radius: 8px;
    padding: 0 8px;
    margin: 0 2px;
    font-weight: 800;
    color: var(--dark);
    animation: pop 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
  }
  @keyframes pop {
    0% { transform: scale(0.5); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

  /* ── VOCABULARY PANEL ── */
  .vocab-panel {
    background: var(--dark);
    color: #fff;
    border-radius: 16px;
    padding: 20px 24px;
    margin-top: 24px;
    border: 3px solid var(--dark);
  }
  .vocab-panel h3 {
    font-family: 'Fredoka One', cursive;
    font-size: 1.15rem;
    color: var(--yellow);
    margin-bottom: 14px;
  }
  .vocab-chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .vocab-chip {
    background: rgba(255,255,255,0.1);
    border: 1.5px solid rgba(255,255,255,0.2);
    border-radius: 10px;
    padding: 5px 12px;
    font-size: 0.85rem;
    font-weight: 700;
  }
  .vocab-chip em { font-style: normal; color: var(--yellow); font-size: 0.75rem; margin-left: 4px; }

  /* ── CONFETTI ── */
  .confetti-piece {
    position: fixed;
    width: 10px;
    height: 10px;
    border-radius: 2px;
    animation: confettiFall 3s ease-out forwards;
    pointer-events: none;
    z-index: 999;
  }
  @keyframes confettiFall {
    0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    header h1 { font-size: 1.5rem; }
    .story-box { padding: 28px 18px; }
    .story-text { font-size: 1rem; }
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>Story <span>Builder</span> ✏️</h1>
    <div class="tagline">Mad Libs for EFL Classrooms</div>
  </div>
</header>

<div class="container">

  <!-- STEP 1: Choose a story -->
  <div class="section-title">
    Step 1 <span class="pill">Choose a Story</span>
  </div>
  <div class="level-filters" id="level-filters"></div>
  <div class="story-cards" id="story-cards"></div>

  <!-- STEP 2: Fill in the blanks (one at a time) -->
  <div id="blanks-section">
    <div class="section-title">
      Step 2 <span class="pill">Fill in the Blanks</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>

    <div class="prompt-arena">
      <div class="dots-row" id="dots-row"></div>

      <div class="prompt-card" id="prompt-card">
        <div class="prompt-counter" id="prompt-counter">1 / ?</div>
        <div class="prompt-type-badge" id="prompt-badge">Noun</div>
        <input class="prompt-input" id="prompt-input" type="text"
               placeholder="Type your word…" autocomplete="off" spellcheck="false">
      </div>

      <div class="prompt-nav">
        <button class="btn btn-reset" id="btn-prev" onclick="promptPrev()">← Back</button>
        <button class="btn btn-next" id="btn-next" onclick="promptNext()">Next →</button>
        <button class="btn btn-primary" id="btn-finish" onclick="buildStory()" style="display:none">✨ Build My Story!</button>
      </div>
    </div>
  </div>

  <!-- STEP 3: Read the story -->
  <div id="story-section">
    <div class="section-title" style="margin-top:36px;">
      Step 3 <span class="pill">Read Your Story</span>
    </div>
    <div class="story-box">
      <p class="story-text" id="story-output"></p>
    </div>

    <div class="vocab-panel" id="vocab-panel"></div>

    <div class="btn-row" style="margin-top:20px;">
      <button class="btn btn-secondary" onclick="tryAnother()">🔁 Try Another Story</button>
      <button class="btn btn-reset" onclick="refillSame()">📝 Edit My Words</button>
    </div>
  </div>

</div>

<script>
// ─────────────────────────────────────────────
// DATA: Stories + blanks
// ─────────────────────────────────────────────
const STORIES = [
  // ── A1 ──────────────────────────────────────────
  {
    id: 'adventure',
    title: 'The Big Adventure',
    icon: '🏔️',
    level: 'A1–A2',
    levelTag: 'A1',
    color: '#FF7B39',
    template: `One sunny day, {NAME} decided to go on a big adventure. They put on their {ADJECTIVE} backpack and walked to the {PLACE}. Along the way, they saw a {ADJECTIVE2} {ANIMAL} sitting on a {NOUN}. "Hello!" said {NAME}. The {ANIMAL} said "{EXCLAMATION}!" and ran away. Finally, {NAME} arrived at the {PLACE} and felt very {EMOTION}. It was the best day ever!`,
    blanks: [
      { key: 'NAME', type: 'a person (name)', badge: 'noun', color: '#00C9A7', hint: 'A person\'s name (e.g. Maria, Tom)' },
      { key: 'ADJECTIVE', type: 'adjective (describes an object)', badge: 'adj', color: '#8B5CF6', hint: 'Describes the backpack (e.g. big, green, heavy)' },
      { key: 'PLACE', type: 'a place', badge: 'noun', color: '#00C9A7', hint: 'A place (e.g. forest, beach, park)' },
      { key: 'ADJECTIVE2', type: 'adjective (describes an animal)', badge: 'adj', color: '#8B5CF6', hint: 'Describes the animal (e.g. cute, tiny, funny)' },
      { key: 'ANIMAL', type: 'an animal', badge: 'noun', color: '#00C9A7', hint: 'An animal (e.g. rabbit, dog, bear)' },
      { key: 'NOUN', type: 'an object', badge: 'noun', color: '#00C9A7', hint: 'An object (e.g. rock, log, chair)' },
      { key: 'EXCLAMATION', type: 'Exclamation', badge: 'excl', color: '#FF4F8B', hint: 'A surprised sound (e.g. Wow! Yikes! Oh no!)' },
      { key: 'EMOTION', type: 'adjective (feeling / emotion)', badge: 'adj', color: '#8B5CF6', hint: 'A feeling (e.g. happy, excited, proud)' },
    ],
  },
  {
    id: 'school',
    title: 'The Weird School Day',
    icon: '🏫',
    level: 'A1–A2',
    levelTag: 'A1',
    color: '#8B5CF6',
    template: `On Monday morning, {NAME} arrived at school wearing a {COLOR} {CLOTHING}. Their teacher, Mr./Ms. {TEACHER_NAME}, walked in and said, "Today we will learn about {SUBJECT}!" The class was very {ADJECTIVE}. During break time, {NAME} found a {ADJECTIVE2} {NOUN} in the playground. At lunch, the cafeteria served {FOOD} and everyone made a {ADJECTIVE3} face. After school, {NAME} went home, did {NUMBER} hours of homework, and felt {EMOTION}. What a {ADJECTIVE4} day!`,
    blanks: [
      { key: 'NAME', type: 'a person (name)', badge: 'noun', color: '#00C9A7', hint: 'A student\'s name' },
      { key: 'COLOR', type: 'a color', badge: 'adj', color: '#8B5CF6', hint: 'A color (e.g. bright yellow, neon pink)' },
      { key: 'CLOTHING', type: 'an object', badge: 'noun', color: '#00C9A7', hint: 'An item of clothing (e.g. hat, pajamas, cape)' },
      { key: 'TEACHER_NAME', type: 'a person (name)', badge: 'noun', color: '#00C9A7', hint: 'A teacher\'s last name (e.g. Smith, Tanaka)' },
      { key: 'SUBJECT', type: 'a subject / topic', badge: 'noun', color: '#00C9A7', hint: 'A school subject (e.g. Math, Dinosaurs, Magic)' },
      { key: 'ADJECTIVE', type: 'adjective (describes a place)', badge: 'adj', color: '#8B5CF6', hint: 'Describes the class (e.g. boring, exciting, strange)' },
      { key: 'ADJECTIVE2', type: 'adjective (describes an object)', badge: 'adj', color: '#8B5CF6', hint: 'Describes the object (e.g. glowing, slimy, ancient)' },
      { key: 'NOUN', type: 'an object', badge: 'noun', color: '#00C9A7', hint: 'A surprising object (e.g. trophy, sandwich, spaceship)' },
      { key: 'FOOD', type: 'a food / ingredient', badge: 'noun', color: '#00C9A7', hint: 'A weird food (e.g. purple soup, fried bananas)' },
      { key: 'ADJECTIVE3', type: 'adjective (describes an object)', badge: 'adj', color: '#8B5CF6', hint: 'Describes the face (e.g. disgusted, confused, happy)' },
      { key: 'NUMBER', type: 'Number', badge: 'num', color: '#FF7B39', hint: 'Number of hours (e.g. 0, 3, 10)' },
      { key: 'EMOTION', type: 'adjective (feeling / emotion)', badge: 'adj', color: '#8B5CF6', hint: 'A feeling (e.g. exhausted, relieved, proud)' },
      { key: 'ADJECTIVE4', type: 'adjective (describes an object)', badge: 'adj', color: '#8B5CF6', hint: 'Describes the whole day (e.g. crazy, unforgettable, normal)' },
    ],
  },
  {
    id: 'myroom',
    title: 'My Bedroom',
    icon: '🛏️',
    level: 'A1',
    levelTag: 'A1',
    color: '#F59E0B',
    template: `My bedroom is {ADJECTIVE}. The walls are {COLOR} and there is a {ADJECTIVE2} {NOUN} next to my bed. On my desk I have a {NOUN2} and {NUMBER} {PLURAL_NOUN}. My favourite thing in my room is my {NOUN3} because it is very {ADJECTIVE3}. Every morning I wake up and say "{SENTENCE}". I love my bedroom!`,
    blanks: [
      { key: 'ADJECTIVE', type: 'adjective (describes an object)', badge: 'adj', color: '#8B5CF6', hint: 'Describes your room (e.g. small, cosy, messy)' },
      { key: 'COLOR', type: 'a color', badge: 'adj', color: '#8B5CF6', hint: 'A color (e.g. blue, striped, purple)' },
      { key: 'ADJECTIVE2', type: 'adjective (describes an object)', badge: 'adj', color: '#8B5CF6', hint: 'Describes a thing (e.g. old, shiny, giant)' },
      { key: 'NOUN', type: 'an object', badge: 'noun', color: '#00C9A7', hint: 'A piece of furniture (e.g. lamp, plant, poster)' },
      { key: 'NOUN2', type: 'an object', badge: 'noun', color: '#00C9A7', hint: 'An object on a desk (e.g. pencil, book, phone)' },
      { key: 'NUMBER', type: 'Number', badge: 'num', color: '#FF7B39', hint: 'A number (e.g. 3, 10, 100)' },
      { key: 'PLURAL_NOUN', type: 'plural objects', badge: 'noun', color: '#00C9A7', hint: 'Plural objects (e.g. magazines, toys, socks)' },
      { key: 'NOUN3', type: 'an object', badge: 'noun', color: '#00C9A7', hint: 'Your favourite thing (e.g. guitar, football, robot)' },
      { key: 'ADJECTIVE3', type: 'adjective (describes an object)', badge: 'adj', color: '#8B5CF6', hint: 'Why you like it (e.g. fun, comfortable, cool)' },
      { key: 'SENTENCE', type: 'Sentence', badge: 'sent', color: '#FF7B39', hint: 'What you say every morning (e.g. "Good morning, world!")' },
    ],
  },
  {
    id: 'mypet',
    title: 'My Dream Pet',
    icon: '🐾',
    level: 'A1',
    levelTag: 'A1',
    color: '#10B981',
    template: `I want a pet {ANIMAL}. I will call it {NAME}. It will be {COLOR} with {ADJECTIVE} ears. Every day I will feed it {FOOD} and take it to the {PLACE}. My pet will sleep in a {ADJECTIVE2} {NOUN}. When I am sad, my pet will {VERB} to make me feel better. I think it will be the {SUPERLATIVE} pet in the world!`,
    blanks: [
      { key: 'ANIMAL', type: 'an animal', badge: 'noun', color: '#00C9A7', hint: 'Any animal (e.g. dragon, cat, elephant)' },
      { key: 'NAME', type: 'a person (name)', badge: 'noun', color: '#00C9A7', hint: 'A pet name (e.g. Fluffy, Godzilla, Mr. Whiskers)' },
      { key: 'COLOR', type: 'a color', badge: 'adj', color: '#8B5CF6', hint: 'A color (e.g. rainbow-colored, golden, spotted)' },

      { key: 'NOUN', type: 'an abstract concept', badge: 'noun', color: '#00C9A7', hint: 'What they faced (e.g. adversity, convention, moderate criticism)' },
      { key: 'PHILOSOPHICAL_QUOTE', type: 'Sentence', badge: 'sent', color: '#FF7B39', hint: 'Their quote (e.g. "The map is not the territory, but it helps.")' },
      { key: 'ADVERB2', type: 'Adverb', badge: 'adv', color: '#3B82F6', hint: 'How it was misattributed (e.g. erroneously, repeatedly, enthusiastically)' },
      { key: 'FAMOUS_NAME', type: 'an object', badge: 'noun', color: '#00C9A7', hint: 'Who it was attributed to (e.g. Einstein, Churchill, Anonymous)' },
      { key: 'VERB2', type: 'Verb', badge: 'verb', color: '#FF4F8B', hint: 'We shall not… (e.g. see, encounter, fully recover from)' },
      { key: 'ABSTRACT_NOUN', type: 'an abstract concept', badge: 'noun', color: '#00C9A7', hint: 'What remains (e.g. scale, audacity, sheer improbability)' },
      { key: 'ADJECTIVE6', type: 'adjective (describes an object)', badge: 'adj', color: '#8B5CF6', hint: 'Describes their endeavours (e.g. lifetime, creative, profoundly niche)' },
      { key: 'ADVERB3', type: 'Adverb', badge: 'adv', color: '#3B82F6', hint: 'How remarkable is it (e.g. quite, utterly, quietly)' },
      { key: 'ADJECTIVE7', type: 'adjective (describes an object)', badge: 'adj', color: '#8B5CF6', hint: 'The legacy is… (e.g. staggering, underappreciated, unclassifiable)' },
      { key: 'NUMBER', type: 'Number', badge: 'num', color: '#FF7B39', hint: 'What they leave behind (a number) (e.g. three, forty-seven)' },
      { key: 'PLURAL_NOUN2', type: 'plural objects', badge: 'noun', color: '#00C9A7', hint: 'What they leave (e.g. unpublished manuscripts, devoted enemies, orchids)' },
      { key: 'ADJECTIVE8', type: 'adjective (describes an object)', badge: 'adj', color: '#8B5CF6', hint: 'Type of legacy (e.g. complex, indelible, frankly controversial)' },
      { key: 'NOUN2', type: 'a place', badge: 'noun', color: '#00C9A7', hint: 'The lingering question (e.g. the password, where the money went, what they meant)' },
    ],
  },
];

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
let currentStory = null;
let activeFilter = 'All';

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
function init() {
  buildLevelFilters();
  renderStoryCards();
}

function buildLevelFilters() {
  const levels = ['All', 'A1', 'A2', 'B1', 'B2', 'C1'];
  const container = document.getElementById('level-filters');
  levels.forEach(lv => {
    const btn = document.createElement('button');
    btn.className = 'level-btn' + (lv === 'All' ? ' active' : '');
    btn.textContent = lv;
    btn.dataset.level = lv;
    btn.addEventListener('click', () => {
      activeFilter = lv;
      document.querySelectorAll('.level-btn').forEach(b => b.classList.toggle('active', b.dataset.level === lv));
      renderStoryCards();
    });
    container.appendChild(btn);
  });
}

function renderStoryCards() {
  const container = document.getElementById('story-cards');
  container.innerHTML = '';
  const filtered = activeFilter === 'All'
    ? STORIES
    : STORIES.filter(s => s.levelTag === activeFilter);
  filtered.forEach(story => {
    const card = document.createElement('div');
    card.className = 'story-card';
    card.style.setProperty('--color', story.color);
    card.dataset.id = story.id;
    card.innerHTML = `
      <span class="card-icon">${story.icon}</span>
      <div class="card-title">${story.title}</div>
      <div class="card-level">${story.level}</div>
    `;
    if (currentStory && currentStory.id === story.id) card.classList.add('active');
    card.addEventListener('click', () => selectStory(story.id));
    container.appendChild(card);
  });
}

function selectStory(id) {
  currentStory = STORIES.find(s => s.id === id);
  renderStoryCards();
  buildBlanksForm();
  document.getElementById('blanks-section').style.display = 'block';
  document.getElementById('story-section').style.display = 'none';
  document.getElementById('blanks-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ─────────────────────────────────────────────
// BADGE COLOR MAP
// ─────────────────────────────────────────────
const BADGE_COLORS = {
  noun:  '#00C9A7',
  adj:   '#8B5CF6',
  verb:  '#FF4F8B',
  adv:   '#3B82F6',
  num:   '#FF7B39',
  excl:  '#EC4899',
  sent:  '#F59E0B',
  prep:  '#6366F1',
};

// Maps badge → display color, type string → emoji prefix for the big prompt label
const TYPE_EMOJI = {
  'a person (name)':             '🧑',
  'a person (nickname)':         '🎭',
  'a place':                     '📍',
  'a place (name)':              '🏢',
  'a place (landmark)':          '🗽',
  'an object':                   '📦',
  'an animal':                   '🐾',
  'a food / ingredient':         '🍽️',
  'a language':                  '🗣️',
  'a job / profession':          '💼',
  'a subject / topic':           '📚',
  'a name / title':              '✏️',
  'a made-up name':              '🔬',
  'a sound / object':            '🔊',
  'a body part':                 '🫀',
  'a group / organization':      '🏛️',
  'an abstract concept':         '💭',
  'plural objects':              '📦',
  'plural objects (food)':       '🍽️',
  'plural people':               '👥',
  'a color':                     '🎨',
  'adjective (describes a person)':   '🧑',
  'adjective (describes an object)':  '📦',
  'adjective (describes a place)':    '📍',
  'adjective (describes a situation)':'💬',
  'adjective (describes an animal)':  '🐾',
  'adjective (feeling / emotion)':    '😊',
  'superlative adjective':            '🏆',
};

// ─────────────────────────────────────────────
// PROMPT STATE
// ─────────────────────────────────────────────
let shuffledBlanks = [];   // randomized blank order
let promptIndex = 0;       // which blank we're on
let answers = {};          // key → value

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ─────────────────────────────────────────────
// BUILD BLANKS (one-at-a-time)
// ─────────────────────────────────────────────
function buildBlanksForm() {
  shuffledBlanks = shuffle(currentStory.blanks);
  promptIndex = 0;
  answers = {};
  renderDots();
  showPrompt();
}

function renderDots() {
  const row = document.getElementById('dots-row');
  row.innerHTML = '';
  shuffledBlanks.forEach((blank, i) => {
    const dot = document.createElement('div');
    dot.className = 'answer-dot' + (i === promptIndex ? ' current' : '');
    dot.dataset.idx = i;
    dot.innerHTML = `<span class="dot-tooltip">${answers[blank.key] || blank.type}</span>`;
    dot.addEventListener('click', () => jumpToPrompt(i));
    row.appendChild(dot);
  });
}

function updateDots() {
  const dots = document.querySelectorAll('.answer-dot');
  dots.forEach((dot, i) => {
    dot.classList.remove('current', 'done');
    const blank = shuffledBlanks[i];
    if (answers[blank.key]) dot.classList.add('done');
    if (i === promptIndex) dot.classList.add('current');
    dot.querySelector('.dot-tooltip').textContent = answers[blank.key] || blank.type;
  });
}

function showPrompt() {
  const blank = shuffledBlanks[promptIndex];
  const total = shuffledBlanks.length;

  // animate card out/in by removing and re-adding
  const card = document.getElementById('prompt-card');
  card.style.animation = 'none';
  card.offsetHeight; // reflow
  card.style.animation = '';

  document.getElementById('prompt-counter').textContent = `${promptIndex + 1} / ${total}`;

  const badge = document.getElementById('prompt-badge');
  const emoji = TYPE_EMOJI[blank.type] || '';
  badge.textContent = (emoji ? emoji + ' ' : '') + blank.type;
  const bgColor = BADGE_COLORS[blank.badge] || '#00C9A7';
  badge.style.background = bgColor;

  const input = document.getElementById('prompt-input');
  input.value = answers[blank.key] || '';
  input.classList.toggle('filled', !!answers[blank.key]);
  setTimeout(() => input.focus(), 80);

  // button states
  const isLast = promptIndex === total - 1;
  document.getElementById('btn-next').style.display = isLast ? 'none' : '';
  document.getElementById('btn-finish').style.display = isLast ? '' : 'none';
  document.getElementById('btn-prev').style.display = promptIndex === 0 ? 'none' : '';

  // progress bar
  const filled = Object.values(answers).filter(v => v.trim()).length;
  document.getElementById('progress-fill').style.width = Math.round(filled / total * 100) + '%';

  updateDots();
}

function saveCurrentAnswer() {
  const blank = shuffledBlanks[promptIndex];
  const val = document.getElementById('prompt-input').value.trim();
  if (val) answers[blank.key] = val;
  else delete answers[blank.key];
}

function promptNext() {
  saveCurrentAnswer();
  if (promptIndex < shuffledBlanks.length - 1) {
    promptIndex++;
    showPrompt();
  }
}

function promptPrev() {
  saveCurrentAnswer();
  if (promptIndex > 0) {
    promptIndex--;
    showPrompt();
  }
}

function jumpToPrompt(idx) {
  saveCurrentAnswer();
  promptIndex = idx;
  showPrompt();
}

// Enter key advances
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('blanks-section').style.display !== 'none') {
    const isLast = promptIndex === shuffledBlanks.length - 1;
    if (isLast) buildStory();
    else promptNext();
  }
});

// ─────────────────────────────────────────────
// BUILD STORY
// ─────────────────────────────────────────────
function buildStory() {
  saveCurrentAnswer();

  const values = {};
  currentStory.blanks.forEach(blank => {
    values[blank.key] = answers[blank.key] || `[${blank.key}]`;
  });

  let text = currentStory.template;
  currentStory.blanks.forEach(blank => {
    const word = values[blank.key];
    const span = `<span class="filled-word" style="animation-delay:${Math.random()*0.4}s">${escHtml(word)}</span>`;
    text = text.split('{' + blank.key + '}').join(span);
  });

  document.getElementById('story-output').innerHTML = text;
  buildVocabPanel(values);

  document.getElementById('story-section').style.display = 'block';
  document.getElementById('story-section').scrollIntoView({ behavior: 'smooth', block: 'start' });

  const allFilled = currentStory.blanks.every(b => answers[b.key]);
  if (allFilled) launchConfetti();
}

function buildVocabPanel(values) {
  const panel = document.getElementById('vocab-panel');
  // show in original story order, not shuffled
  const chips = currentStory.blanks.map(blank => {
    const word = values[blank.key] || '—';
    return `<div class="vocab-chip">${word} <em>${blank.badge}</em></div>`;
  }).join('');
  panel.innerHTML = `<h3>📚 Your Words</h3><div class="vocab-chips">${chips}</div>`;
}

function tryAnother() {
  currentStory = null;
  answers = {};
  shuffledBlanks = [];
  renderStoryCards();
  document.getElementById('blanks-section').style.display = 'none';
  document.getElementById('story-section').style.display = 'none';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function refillSame() {
  document.getElementById('story-section').style.display = 'none';
  // re-shuffle and restart
  promptIndex = 0;
  shuffledBlanks = shuffle(currentStory.blanks);
  answers = {};
  renderDots();
  showPrompt();
  document.getElementById('blanks-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─────────────────────────────────────────────
// CONFETTI 🎉
// ─────────────────────────────────────────────
function launchConfetti() {
  const colors = ['#FFD94A','#FF7B39','#FF4F8B','#00C9A7','#3B82F6','#8B5CF6'];
  for (let i = 0; i < 60; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.cssText = `
      left: ${Math.random()*100}vw;
      top: -20px;
      background: ${colors[Math.floor(Math.random()*colors.length)]};
      width: ${6 + Math.random()*10}px;
      height: ${6 + Math.random()*10}px;
      border-radius: ${Math.random() > 0.5 ? '50%' : '2px'};
      animation-duration: ${2 + Math.random()*2}s;
      animation-delay: ${Math.random()*1}s;
    `;
    document.body.appendChild(el);
    el.addEventListener('animationend', () => el.remove());
  }
}

init();
</script>
