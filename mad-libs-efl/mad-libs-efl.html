<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Story Builder — Mad Libs for EFL</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --yellow: #FFD94A;
    --orange: #FF7B39;
    --pink: #FF4F8B;
    --teal: #00C9A7;
    --blue: #3B82F6;
    --purple: #8B5CF6;
    --dark: #1A1A2E;
    --light: #FFFDF5;
    --card: #FFFFFF;
    --shadow: 4px 4px 0px rgba(0,0,0,0.15);
    --shadow-lg: 6px 6px 0px rgba(0,0,0,0.18);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background-color: #FFF8E7;
    background-image:
      radial-gradient(circle at 10% 20%, rgba(255,217,74,0.25) 0%, transparent 40%),
      radial-gradient(circle at 90% 80%, rgba(0,201,167,0.2) 0%, transparent 40%),
      radial-gradient(circle at 50% 50%, rgba(255,79,139,0.1) 0%, transparent 60%);
    min-height: 100vh;
    color: var(--dark);
  }

  /* ── HEADER ── */
  header {
    background: var(--dark);
    padding: 18px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
    border-bottom: 5px solid var(--yellow);
  }
  header h1 {
    font-family: 'Fredoka One', cursive;
    font-size: 2rem;
    color: var(--yellow);
    letter-spacing: 1px;
  }
  header h1 span { color: var(--pink); }
  .tagline {
    font-size: 0.85rem;
    color: rgba(255,255,255,0.6);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  /* ── LAYOUT ── */
  .container { max-width: 960px; margin: 0 auto; padding: 32px 20px 60px; }

  /* ── LEVEL FILTERS ── */
  .level-filters {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 18px;
  }
  .level-btn {
    font-family: 'Fredoka One', cursive;
    font-size: 0.9rem;
    padding: 7px 18px;
    border: 2.5px solid var(--dark);
    border-radius: 30px;
    cursor: pointer;
    background: #fff;
    color: var(--dark);
    box-shadow: 2px 2px 0 rgba(0,0,0,0.12);
    transition: transform 0.12s, box-shadow 0.12s, background 0.12s;
  }
  .level-btn:hover { transform: translate(-1px,-2px); box-shadow: 3px 3px 0 rgba(0,0,0,0.15); }
  .level-btn.active { background: var(--dark); color: var(--yellow); }

  /* ── STORY SELECTOR ── */
  .section-title {
    font-family: 'Fredoka One', cursive;
    font-size: 1.4rem;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-title .pill {
    display: inline-block;
    background: var(--dark);
    color: var(--yellow);
    font-size: 0.75rem;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    padding: 3px 10px;
    border-radius: 20px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .story-cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 14px;
    margin-bottom: 36px;
  }
  .story-card {
    background: var(--card);
    border: 3px solid var(--dark);
    border-radius: 16px;
    padding: 18px 16px;
    cursor: pointer;
    box-shadow: var(--shadow);
    transition: transform 0.15s, box-shadow 0.15s;
    position: relative;
    overflow: hidden;
  }
  .story-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 6px;
    background: var(--color, var(--teal));
  }
  .story-card:hover { transform: translate(-2px,-3px); box-shadow: var(--shadow-lg); }
  .story-card.active {
    background: var(--dark);
    color: #fff;
    transform: translate(-2px,-3px);
    box-shadow: var(--shadow-lg);
  }
  .story-card.active .card-icon { filter: grayscale(0); }
  .card-icon { font-size: 2rem; margin-bottom: 8px; display: block; }
  .card-title { font-family: 'Fredoka One', cursive; font-size: 1.05rem; line-height: 1.2; }
  .card-level {
    display: inline-block;
    margin-top: 6px;
    font-size: 0.7rem;
    font-weight: 800;
    padding: 2px 8px;
    border-radius: 10px;
    background: rgba(0,0,0,0.08);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .story-card.active .card-level { background: rgba(255,255,255,0.15); }

  /* ── ONE-AT-A-TIME PROMPT ── */
  #blanks-section { display: none; }

  .prompt-arena {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    margin-bottom: 28px;
  }

  .prompt-card {
    background: var(--card);
    border: 4px solid var(--dark);
    border-radius: 24px;
    padding: 40px 36px 32px;
    box-shadow: var(--shadow-lg);
    width: 100%;
    max-width: 480px;
    text-align: center;
    position: relative;
    animation: slideIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
  }
  @keyframes slideIn {
    0% { transform: scale(0.88) translateY(16px); opacity: 0; }
    100% { transform: scale(1) translateY(0); opacity: 1; }
  }

  .prompt-counter {
    position: absolute;
    top: -16px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--dark);
    color: var(--yellow);
    font-family: 'Fredoka One', cursive;
    font-size: 0.85rem;
    padding: 4px 16px;
    border-radius: 20px;
    white-space: nowrap;
  }

  .prompt-type-badge {
    display: inline-block;
    padding: 8px 22px;
    border-radius: 30px;
    font-family: 'Fredoka One', cursive;
    font-size: 1.4rem;
    color: #fff;
    background: var(--badge-bg, var(--teal));
    border: 3px solid var(--dark);
    box-shadow: var(--shadow);
    margin-bottom: 20px;
    letter-spacing: 0.5px;
  }

  .prompt-input {
    width: 100%;
    padding: 14px 18px;
    font-family: 'Nunito', sans-serif;
    font-size: 1.2rem;
    font-weight: 800;
    border: 3px solid #ddd;
    border-radius: 14px;
    background: #FAFAFA;
    outline: none;
    text-align: center;
    transition: border-color 0.2s, background 0.2s, transform 0.15s;
  }
  .prompt-input:focus {
    border-color: var(--blue);
    background: #fff;
    transform: scale(1.02);
  }
  .prompt-input.filled { border-color: var(--teal); background: #f0fdf9; }

  /* ── mode toggle ── */
  .mode-toggle {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 20px;
  }
  .mode-btn, .chips-btn {
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 0.9rem;
    padding: 8px 16px;
    border: 3px solid var(--dark);
    border-radius: 30px;
    background: #fff;
    color: var(--dark);
    cursor: pointer;
    transition: transform 0.12s, background 0.15s;
  }
  .mode-btn:hover, .chips-btn:hover { transform: translateY(-1px); }
  .mode-btn.active { background: var(--dark); color: var(--yellow); }
  .chips-btn { background: var(--yellow); }
  .chips-btn.off { background: #eee; color: #888; }

  /* ── guided context box ── */
  .story-context {
    display: none;
    width: 100%;
    max-width: 480px;
    background: #fffdf3;
    border: 3px dashed var(--dark);
    border-radius: 16px;
    padding: 18px 22px;
    font-size: 1.02rem;
    line-height: 1.9;
    color: var(--dark);
    text-align: left;
  }
  .story-context.show { display: block; }
  .ctx-done {
    background: var(--teal);
    color: #fff;
    border-radius: 6px;
    padding: 1px 7px;
    font-weight: 800;
  }
  .ctx-current {
    background: var(--yellow);
    border: 2px solid var(--dark);
    border-radius: 6px;
    padding: 1px 8px;
    font-weight: 800;
    color: var(--dark);
  }
  .ctx-future {
    color: #bbb;
    letter-spacing: 2px;
    font-weight: 800;
  }

  /* ── badge + pos pill ── */
  .prompt-badge-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 10px;
  }
  .prompt-type-badge { margin-bottom: 0; }
  .pos-pill {
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #fff;
    background: var(--pos-color, #999);
    border: 2px solid var(--dark);
    border-radius: 20px;
    padding: 3px 10px;
  }

  /* ── play-style flag ── */
  .play-flag {
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
    border-radius: 10px;
    padding: 6px 12px;
    margin-bottom: 16px;
    display: inline-block;
  }
  .play-flag.twist    { background: #fdf0ff; color: #a021c9; border: 1.5px solid #e9c2f5; }
  .play-flag.straight { background: #eef7ff; color: #1d6fd6; border: 1.5px solid #c2ddf5; }

  /* ── hint + chips ── */
  .prompt-hint {
    font-family: 'Nunito', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    color: #777;
    margin-top: 12px;
  }
  .chip-row {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 7px;
    margin-top: 12px;
  }
  .word-chip {
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
    background: #f3f4f6;
    border: 2px solid #e2e4e8;
    border-radius: 20px;
    padding: 5px 13px;
    cursor: pointer;
    transition: transform 0.12s, background 0.15s, border-color 0.15s;
  }
  .word-chip:hover { background: var(--yellow); border-color: var(--dark); transform: translateY(-1px); }

  .prompt-nav {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .btn-next {
    background: var(--dark);
    color: var(--yellow);
    font-size: 1.1rem;
    padding: 13px 28px;
  }

  /* answered dots */
  .dots-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    justify-content: center;
    max-width: 480px;
    width: 100%;
  }
  .answer-dot {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 2.5px solid var(--dark);
    background: #eee;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.6rem;
    font-weight: 800;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
    position: relative;
  }
  .answer-dot.done { background: var(--teal); color: #fff; }
  .answer-dot.current { background: var(--yellow); border-color: var(--dark); transform: scale(1.2); }
  .answer-dot:hover .dot-tooltip { display: block; }
  .dot-tooltip {
    display: none;
    position: absolute;
    bottom: 34px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--dark);
    color: #fff;
    font-size: 0.7rem;
    padding: 4px 8px;
    border-radius: 6px;
    white-space: nowrap;
    z-index: 10;
    pointer-events: none;
  }

  .type-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 8px;
    font-size: 0.7rem;
    font-weight: 800;
    color: #fff;
    background: var(--badge-color, var(--teal));
  }

  .btn {
    font-family: 'Fredoka One', cursive;
    font-size: 1.2rem;
    padding: 14px 32px;
    border: 3px solid var(--dark);
    border-radius: 14px;
    cursor: pointer;
    box-shadow: var(--shadow);
    transition: transform 0.12s, box-shadow 0.12s;
    letter-spacing: 0.5px;
  }
  .btn:hover { transform: translate(-2px,-2px); box-shadow: var(--shadow-lg); }
  .btn:active { transform: translate(1px,1px); box-shadow: 2px 2px 0 rgba(0,0,0,0.15); }
  .btn-primary { background: var(--yellow); color: var(--dark); }
  .btn-secondary { background: var(--teal); color: #fff; }
  .btn-reset { background: #eee; color: var(--dark); font-size: 1rem; padding: 10px 20px; }

  .btn-row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; margin-top: 8px; }

  .progress-bar {
    height: 8px;
    background: #e9e9e9;
    border-radius: 10px;
    margin-bottom: 20px;
    overflow: hidden;
    border: 2px solid var(--dark);
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--teal), var(--blue));
    border-radius: 10px;
    transition: width 0.4s ease;
  }

  /* ── STORY OUTPUT ── */
  #story-section { display: none; }
  .story-box {
    background: var(--card);
    border: 4px solid var(--dark);
    border-radius: 20px;
    padding: 32px 36px;
    box-shadow: var(--shadow-lg);
    position: relative;
    margin-bottom: 24px;
  }
  .story-box::before {
    content: '📖 YOUR STORY';
    position: absolute;
    top: -17px;
    left: 24px;
    background: var(--yellow);
    border: 3px solid var(--dark);
    border-radius: 8px;
    padding: 3px 14px;
    font-family: 'Fredoka One', cursive;
    font-size: 0.9rem;
    color: var(--dark);
  }
  .story-text {
    font-size: 1.15rem;
    line-height: 2;
    color: var(--dark);
  }
  .filled-word {
    display: inline-block;
    background: var(--yellow);
    border: 2.5px solid var(--dark);
    border-radius: 8px;
    padding: 0 8px;
    margin: 0 2px;
    font-weight: 800;
    color: var(--dark);
    animation: pop 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
  }
  @keyframes pop {
    0% { transform: scale(0.5); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

  /* ── VOCABULARY PANEL ── */
  .vocab-panel {
    background: var(--dark);
    color: #fff;
    border-radius: 16px;
    padding: 20px 24px;
    margin-top: 24px;
    border: 3px solid var(--dark);
  }
  .vocab-panel h3 {
    font-family: 'Fredoka One', cursive;
    font-size: 1.15rem;
    color: var(--yellow);
    margin-bottom: 14px;
  }
  .vocab-chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .vocab-chip {
    background: rgba(255,255,255,0.1);
    border: 1.5px solid rgba(255,255,255,0.2);
    border-radius: 10px;
    padding: 5px 12px;
    font-size: 0.85rem;
    font-weight: 700;
  }
  .vocab-chip em { font-style: normal; color: var(--yellow); font-size: 0.75rem; margin-left: 4px; }

  /* ── CONFETTI ── */
  .confetti-piece {
    position: fixed;
    width: 10px;
    height: 10px;
    border-radius: 2px;
    animation: confettiFall 3s ease-out forwards;
    pointer-events: none;
    z-index: 999;
  }
  @keyframes confettiFall {
    0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    header h1 { font-size: 1.5rem; }
    .story-box { padding: 28px 18px; }
    .story-text { font-size: 1rem; }
  }

  .back-link {
    position: fixed;
    top: 16px;
    left: 16px;
    z-index: 100000;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    background: rgba(0,0,0,0.55);
    color: #fff;
    text-decoration: none;
    border-radius: 999px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, Arial, sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.01em;
    backdrop-filter: blur(6px);
    border: 1px solid rgba(255,255,255,0.18);
    transition: background 0.2s ease, transform 0.2s ease;
  }
  .back-link:hover {
    background: rgba(0,0,0,0.78);
    transform: translateX(-2px);
  }
</style>
</head>
<body>
<a class="back-link" href="../">← Tool Hub</a>

<header>
  <div>
    <h1>Story <span>Builder</span> ✏️</h1>
    <div class="tagline">Mad Libs for EFL Classrooms</div>
  </div>
</header>

<div class="container">

  <!-- STEP 1: Choose a story -->
  <div class="section-title">
    Step 1 <span class="pill">Choose a Story</span>
  </div>
  <div class="level-filters" id="level-filters"></div>
  <div class="story-cards" id="story-cards"></div>

  <!-- STEP 2: Fill in the blanks (one at a time) -->
  <div id="blanks-section">
    <div class="section-title">
      Step 2 <span class="pill">Fill in the Blanks</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>

    <div class="mode-toggle" id="mode-toggle">
      <button class="mode-btn active" data-mode="guided" onclick="setMode('guided')">🧭 Guided</button>
      <button class="mode-btn" data-mode="surprise" onclick="setMode('surprise')">🎁 Surprise</button>
      <button class="chips-btn" id="chips-btn" onclick="toggleChips()">💡 Word ideas: On</button>
    </div>

    <div class="prompt-arena">
      <div class="dots-row" id="dots-row"></div>

      <div class="story-context" id="story-context"></div>

      <div class="prompt-card" id="prompt-card">
        <div class="prompt-counter" id="prompt-counter">1 / ?</div>
        <div class="prompt-badge-wrap">
          <div class="prompt-type-badge" id="prompt-badge">Noun</div>
          <span class="pos-pill" id="prompt-pos">noun</span>
        </div>
        <div class="play-flag" id="prompt-play"></div>
        <input class="prompt-input" id="prompt-input" type="text"
               placeholder="Type your word…" autocomplete="off" spellcheck="false">
        <div class="prompt-hint" id="prompt-hint"></div>
        <div class="chip-row" id="chip-row"></div>
      </div>

      <div class="prompt-nav">
        <button class="btn btn-reset" id="btn-prev" onclick="promptPrev()">← Back</button>
        <button class="btn btn-next" id="btn-next" onclick="promptNext()">Next →</button>
        <button class="btn btn-primary" id="btn-finish" onclick="buildStory()" style="display:none">✨ Build My Story!</button>
      </div>
    </div>
  </div>

  <!-- STEP 3: Read the story -->
  <div id="story-section">
    <div class="section-title" style="margin-top:36px;">
      Step 3 <span class="pill">Read Your Story</span>
    </div>
    <div class="story-box">
      <p class="story-text" id="story-output"></p>
    </div>

    <div class="vocab-panel" id="vocab-panel"></div>

    <div class="btn-row" style="margin-top:20px;">
      <button class="btn btn-secondary" onclick="tryAnother()">🔁 Try Another Story</button>
      <button class="btn btn-reset" onclick="refillSame()">📝 Edit My Words</button>
    </div>
  </div>

</div>

<script>
// ─────────────────────────────────────────────
// DATA: Stories + blanks
// ─────────────────────────────────────────────
const STORIES = [
  {
    "id": "adventure",
    "title": "The Big Adventure",
    "icon": "🏔️",
    "level": "A1–A2",
    "levelTag": "A1",
    "color": "#FF7B39",
    "template": "One sunny day, {NAME} decided to go on a big adventure. They put on their {ADJECTIVE} backpack and walked to the {PLACE}. Along the way, they saw a {ADJECTIVE2} {ANIMAL} sitting on a {NOUN}. \"Hello!\" said {NAME}. The {ANIMAL} said \"{EXCLAMATION}!\" and ran away. Finally, {NAME} arrived at the {PLACE} and felt very {EMOTION}. It was the best day ever!",
    "blanks": [
      {
        "key": "NAME",
        "badge": "noun",
        "pos": "noun",
        "slot": "A person's name",
        "emoji": "🧑",
        "examples": [
          "Maria",
          "Tom"
        ],
        "play": "straight"
      },
      {
        "key": "ADJECTIVE",
        "badge": "adj",
        "pos": "adjective",
        "slot": "Describes the backpack",
        "emoji": "📦",
        "examples": [
          "big",
          "green",
          "heavy"
        ],
        "play": "twist"
      },
      {
        "key": "PLACE",
        "badge": "noun",
        "pos": "noun",
        "slot": "A place",
        "emoji": "📍",
        "examples": [
          "forest",
          "beach",
          "park"
        ],
        "play": "straight"
      },
      {
        "key": "ADJECTIVE2",
        "badge": "adj",
        "pos": "adjective",
        "slot": "Describes the animal",
        "emoji": "🐾",
        "examples": [
          "cute",
          "tiny",
          "funny"
        ],
        "play": "twist"
      },
      {
        "key": "ANIMAL",
        "badge": "noun",
        "pos": "noun",
        "slot": "An animal",
        "emoji": "🐾",
        "examples": [
          "rabbit",
          "dog",
          "bear"
        ],
        "play": "twist"
      },
      {
        "key": "NOUN",
        "badge": "noun",
        "pos": "noun",
        "slot": "An object",
        "emoji": "📦",
        "examples": [
          "rock",
          "log",
          "chair"
        ],
        "play": "twist"
      },
      {

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
let currentStory = null;
let activeFilter = 'All';

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
function init() {
  buildLevelFilters();
  renderStoryCards();
}

function buildLevelFilters() {
  const levels = ['All', 'A1', 'A2', 'B1', 'B2', 'C1'];
  const container = document.getElementById('level-filters');
  levels.forEach(lv => {
    const btn = document.createElement('button');
    btn.className = 'level-btn' + (lv === 'All' ? ' active' : '');
    btn.textContent = lv;
    btn.dataset.level = lv;
    btn.addEventListener('click', () => {
      activeFilter = lv;
      document.querySelectorAll('.level-btn').forEach(b => b.classList.toggle('active', b.dataset.level === lv));
      renderStoryCards();
    });
    container.appendChild(btn);
  });
}

function renderStoryCards() {
  const container = document.getElementById('story-cards');
  container.innerHTML = '';
  const filtered = activeFilter === 'All'
    ? STORIES
    : STORIES.filter(s => s.levelTag === activeFilter);
  filtered.forEach(story => {
    const card = document.createElement('div');
    card.className = 'story-card';
    card.style.setProperty('--color', story.color);
    card.dataset.id = story.id;
    card.innerHTML = `
      <span class="card-icon">${story.icon}</span>
      <div class="card-title">${story.title}</div>
      <div class="card-level">${story.level}</div>
    `;
    if (currentStory && currentStory.id === story.id) card.classList.add('active');
    card.addEventListener('click', () => selectStory(story.id));
    container.appendChild(card);
  });
}

function selectStory(id) {
  currentStory = STORIES.find(s => s.id === id);
  renderStoryCards();
  buildBlanksForm();
  document.getElementById('blanks-section').style.display = 'block';
  document.getElementById('story-section').style.display = 'none';
  document.getElementById('blanks-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ─────────────────────────────────────────────
// BADGE COLOR MAP
// ─────────────────────────────────────────────
const BADGE_COLORS = {
  noun:  '#00C9A7',
  adj:   '#8B5CF6',
  verb:  '#FF4F8B',
  adv:   '#3B82F6',
  num:   '#FF7B39',
  excl:  '#EC4899',
  sent:  '#F59E0B',
  prep:  '#6366F1',
};

// Maps badge → display color, type string → emoji prefix for the big prompt label
// pos pill color keyed on badge code
const POS_COLORS = { ...BADGE_COLORS };

// ─────────────────────────────────────────────
// PROMPT STATE
// ─────────────────────────────────────────────
let shuffledBlanks = [];   // randomized blank order (surprise mode)
let orderedBlanks = [];    // template order (guided mode)
let promptIndex = 0;       // which blank we're on
let answers = {};          // key → value
function lsGet(k) { try { return localStorage.getItem(k); } catch (e) { return null; } }
function lsSet(k, v) { try { localStorage.setItem(k, v); } catch (e) {} }
let mode = lsGet('madlibs:mode') || 'guided';
let showChips = lsGet('madlibs:chips') !== 'off';

// the blank list for the active mode
function activeBlanks() {
  return mode === 'guided' ? orderedBlanks : shuffledBlanks;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ─────────────────────────────────────────────
// BUILD BLANKS (one-at-a-time)
// ─────────────────────────────────────────────
function buildBlanksForm() {
  orderedBlanks = [...currentStory.blanks];
  shuffledBlanks = shuffle(currentStory.blanks);
  promptIndex = 0;
  answers = {};
  syncModeButtons();
  renderDots();
  showPrompt();
}

// ── mode + chips controls ──
function syncModeButtons() {
  document.querySelectorAll('.mode-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.mode === mode));
  const cb = document.getElementById('chips-btn');
  cb.textContent = '💡 Word ideas: ' + (showChips ? 'On' : 'Off');
  cb.classList.toggle('off', !showChips);
}

function setMode(m) {
  if (m === mode) return;
  const currentKey = activeBlanks()[promptIndex] && activeBlanks()[promptIndex].key;
  mode = m;
  lsSet('madlibs:mode', m);
  const list = activeBlanks();
  const idx = list.findIndex(b => b.key === currentKey);
  promptIndex = idx >= 0 ? idx : 0;
  syncModeButtons();
  renderDots();
  showPrompt();
}

function toggleChips() {
  showChips = !showChips;
  lsSet('madlibs:chips', showChips ? 'on' : 'off');
  syncModeButtons();
  renderChips(activeBlanks()[promptIndex]);
}

function renderDots() {
  const list = activeBlanks();
  const row = document.getElementById('dots-row');
  row.innerHTML = '';
  list.forEach((blank, i) => {
    const dot = document.createElement('div');
    dot.className = 'answer-dot' + (i === promptIndex ? ' current' : '');
    dot.dataset.idx = i;
    dot.innerHTML = `<span class="dot-tooltip">${answers[blank.key] || blank.slot}</span>`;
    dot.addEventListener('click', () => jumpToPrompt(i));
    row.appendChild(dot);
  });
}

function updateDots() {
  const list = activeBlanks();
  const dots = document.querySelectorAll('.answer-dot');
  dots.forEach((dot, i) => {
    dot.classList.remove('current', 'done');
    const blank = list[i];
    if (answers[blank.key]) dot.classList.add('done');
    if (i === promptIndex) dot.classList.add('current');
    dot.querySelector('.dot-tooltip').textContent = answers[blank.key] || blank.slot;
  });
}

// tappable suggestion chips
function renderChips(blank) {
  const row = document.getElementById('chip-row');
  row.innerHTML = '';
  if (!showChips || !blank.examples || !blank.examples.length) return;
  blank.examples.forEach(word => {
    const chip = document.createElement('button');
    chip.className = 'word-chip';
    chip.type = 'button';
    chip.textContent = word;
    chip.addEventListener('click', () => {
      const input = document.getElementById('prompt-input');
      input.value = word;
      input.classList.add('filled');
      answers[blank.key] = word;
      input.focus();
      updateDots();
      updateProgress();
    });
    row.appendChild(chip);
  });
}

// guided-mode context: show the story with this blank highlighted
function renderContext(activeBlank) {
  const box = document.getElementById('story-context');
  if (mode !== 'guided') { box.classList.remove('show'); return; }
  let html = escHtml(currentStory.template);
  currentStory.blanks.forEach(b => {
    let rep;
    if (b.key === activeBlank.key) {
      rep = `<span class="ctx-current">${escHtml(b.emoji + ' ' + b.slot)}</span>`;
    } else if (answers[b.key]) {
      rep = `<span class="ctx-done">${escHtml(answers[b.key])}</span>`;
    } else {
      rep = `<span class="ctx-future">▢▢▢</span>`;
    }
    html = html.split('{' + b.key + '}').join(rep);
  });
  box.innerHTML = html;
  box.classList.add('show');
}

function updateProgress() {
  const total = activeBlanks().length;
  const filled = Object.values(answers).filter(v => v.trim()).length;
  document.getElementById('progress-fill').style.width = Math.round(filled / total * 100) + '%';
}

function showPrompt() {
  const blank = activeBlanks()[promptIndex];
  const total = activeBlanks().length;

  // animate card out/in by removing and re-adding
  const card = document.getElementById('prompt-card');
  card.style.animation = 'none';
  card.offsetHeight; // reflow
  card.style.animation = '';

  document.getElementById('prompt-counter').textContent = `${promptIndex + 1} / ${total}`;

  const badge = document.getElementById('prompt-badge');
  badge.textContent = (blank.emoji ? blank.emoji + ' ' : '') + blank.slot;
  badge.style.background = BADGE_COLORS[blank.badge] || '#00C9A7';

  const pos = document.getElementById('prompt-pos');
  pos.textContent = blank.pos;
  pos.style.setProperty('--pos-color', POS_COLORS[blank.badge] || '#999');

  const play = document.getElementById('prompt-play');
  if (blank.play === 'straight') {
    play.className = 'play-flag straight';
    play.textContent = '🎯 Keep this one real — a normal word fits best here.';
  } else {
    play.className = 'play-flag twist';
    play.textContent = '🎲 The weirder the better — a surprising word is funnier!';
  }

  const hint = document.getElementById('prompt-hint');
  hint.textContent = blank.examples.length ? 'e.g. ' + blank.examples.join(', ') : '';

  renderChips(blank);
  renderContext(blank);

  const input = document.getElementById('prompt-input');
  input.value = answers[blank.key] || '';
  input.classList.toggle('filled', !!answers[blank.key]);
  setTimeout(() => input.focus(), 80);

  // button states
  const isLast = promptIndex === total - 1;
  document.getElementById('btn-next').style.display = isLast ? 'none' : '';
  document.getElementById('btn-finish').style.display = isLast ? '' : 'none';
  document.getElementById('btn-prev').style.display = promptIndex === 0 ? 'none' : '';

  updateProgress();
  updateDots();
}

function saveCurrentAnswer() {
  const blank = activeBlanks()[promptIndex];
  const val = document.getElementById('prompt-input').value.trim();
  if (val) answers[blank.key] = val;
  else delete answers[blank.key];
}

function promptNext() {
  saveCurrentAnswer();
  if (promptIndex < activeBlanks().length - 1) {
    promptIndex++;
    showPrompt();
  }
}

function promptPrev() {
  saveCurrentAnswer();
  if (promptIndex > 0) {
    promptIndex--;
    showPrompt();
  }
}

function jumpToPrompt(idx) {
  saveCurrentAnswer();
  promptIndex = idx;
  showPrompt();
}

// Enter key advances
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('blanks-section').style.display !== 'none') {
    const isLast = promptIndex === activeBlanks().length - 1;
    if (isLast) buildStory();
    else promptNext();
  }
});

// ─────────────────────────────────────────────
// BUILD STORY
// ─────────────────────────────────────────────
function buildStory() {
  saveCurrentAnswer();

  const values = {};
  currentStory.blanks.forEach(blank => {
    values[blank.key] = answers[blank.key] || `[${blank.key}]`;
  });

  let text = currentStory.template;
  currentStory.blanks.forEach(blank => {
    const word = values[blank.key];
    const span = `<span class="filled-word" style="animation-delay:${Math.random()*0.4}s">${escHtml(word)}</span>`;
    text = text.split('{' + blank.key + '}').join(span);
  });

  document.getElementById('story-output').innerHTML = text;
  buildVocabPanel(values);

  document.getElementById('story-section').style.display = 'block';
  document.getElementById('story-section').scrollIntoView({ behavior: 'smooth', block: 'start' });

  const allFilled = currentStory.blanks.every(b => answers[b.key]);
  if (allFilled) launchConfetti();
}

function buildVocabPanel(values) {
  const panel = document.getElementById('vocab-panel');
  // show in original story order, not shuffled
  const chips = currentStory.blanks.map(blank => {
    const word = values[blank.key] || '—';
    return `<div class="vocab-chip">${word} <em>${blank.badge}</em></div>`;
  }).join('');
  panel.innerHTML = `<h3>📚 Your Words</h3><div class="vocab-chips">${chips}</div>`;
}

function tryAnother() {
  currentStory = null;
  answers = {};
  shuffledBlanks = [];
  orderedBlanks = [];
  renderStoryCards();
  document.getElementById('blanks-section').style.display = 'none';
  document.getElementById('story-section').style.display = 'none';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function refillSame() {
  document.getElementById('story-section').style.display = 'none';
  // re-shuffle and restart
  promptIndex = 0;
  orderedBlanks = [...currentStory.blanks];
  shuffledBlanks = shuffle(currentStory.blanks);
  answers = {};
  syncModeButtons();
  renderDots();
  showPrompt();
  document.getElementById('blanks-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─────────────────────────────────────────────
// CONFETTI 🎉
// ─────────────────────────────────────────────
function launchConfetti() {
  const colors = ['#FFD94A','#FF7B39','#FF4F8B','#00C9A7','#3B82F6','#8B5CF6'];
  for (let i = 0; i < 60; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.cssText = `
      left: ${Math.random()*100}vw;
      top: -20px;
      background: ${colors[Math.floor(Math.random()*colors.length)]};
      width: ${6 + Math.random()*10}px;
      height: ${6 + Math.random()*10}px;
      border-radius: ${Math.random() > 0.5 ? '50%' : '2px'};
      animation-duration: ${2 + Math.random()*2}s;
      animation-delay: ${Math.random()*1}s;
    `;
    document.body.appendChild(el);
    el.addEventListener('animationend', () => el.remove());
  }
}

init();
</script>
