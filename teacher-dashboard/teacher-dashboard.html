/* ================= GROUP REPORT ================= */
function renderGroupReport(){
  const t = T[state.reportLang];
  const cls = classById(state.reportsSelection.classId);
  if(!cls){
    document.getElementById('view-group-report').innerHTML = `
      <div class="topbar"><div><button class="btn-ghost back-btn no-print" onclick="navigate('reports')">← Back to Reports</button></div></div>
      <div class="card empty-card">Select a class on the Reports page first.</div>`;
    return;
  }
  const students = studentsInClass(cls.id);
  const fromVal = state.reportRange.from || cls.startDate || '';
  const toVal   = state.reportRange.to   || cls.endDate   || '';
  const duration = currentDuration(cls);
  const dur = d => durationForDate(cls, d);

  const rows = students.map(s=>{
    const recs = [];
    Object.keys(state.sessions).forEach(key=>{
      const [cid, date] = splitSessionKey(key);
      if(cid===cls.id && state.sessions[key][s.id])
        recs.push({date, ...state.sessions[key][s.id]});
    });
    const filtered = recs.filter(r=>(!fromVal||r.date>=fromVal)&&(!toVal||r.date<=toVal)&&!isHoliday(r.date)&&isSessionCompleted(cls.id, r.date));
    const total   = filtered.length;
    const absent  = filtered.filter(r=>r.attendance==='absent').length;
    const late    = filtered.filter(r=>r.attendance!=='absent'&&(r.lateMin||0)>0).length;
    const present = total - absent - late;
    const lostLate  = filtered.filter(r=>r.attendance!=='absent').reduce((s,r)=>s+(r.lateMin||0),0);
    const lostEarly = filtered.filter(r=>r.attendance!=='absent').reduce((s,r)=>s+(r.leftEarlyMin||0),0);
    const absentMin = filtered.filter(r=>r.attendance==='absent').reduce((s,r)=>s+dur(r.date),0);
    const totalPoss = filtered.reduce((s,r)=>s+dur(r.date),0);
    const inClass   = Math.max(0, totalPoss - lostLate - lostEarly - absentMin);
    const attRate   = total ? Math.round(100*(present+late)/total) : null;
    const hwRecs    = filtered.filter(r=>r.hw!=null);
    const hwAvg     = hwRecs.length ? Math.round(hwRecs.reduce((s,r)=>{ const v=typeof r.hw==='number'?r.hw:(r.hw==='done'?100:0); return s+v; },0)/hwRecs.length) : null;
    const phone     = filtered.reduce((s,r)=>s+(r.phone||0),0);
    const partRecs  = filtered.filter(r=>r.attendance!=='absent'&&r.participation);
    const partAvg   = partRecs.length ? Math.round(100*(partRecs.filter(r=>r.participation==='great').length + partRecs.filter(r=>r.participation==='good').length*0.5)/partRecs.length) : null;
    const expected  = expectedSessionsForClass(cls, fromVal||null, toVal||null);
    const absRate   = expected ? Math.round(100*absent/expected) : null;
    return {s, total, present, late, absent, attRate, absRate, inClass, totalPoss, hwAvg, phone, partAvg};
  });

  // group averages
  const avg = (arr, key) => { const v=arr.filter(r=>r[key]!=null); return v.length?Math.round(v.reduce((s,r)=>s+r[key],0)/v.length):null; };
  const attAvg = avg(rows,'attRate');
  const hwAvg  = avg(rows,'hwAvg');
  const partGroupAvg = avg(rows,'partAvg');
  const phoneTotal = rows.reduce((s,r)=>s+r.phone,0);

  const badgeForPct = (pct, invert=false) => {
    if(pct==null) return '—';
    const good = invert ? pct<=10 : pct>=80;
    const bad  = invert ? pct>=30 : pct<=50;
    const cls2 = good?'green':bad?'red':'amber';
    return `<span class="badge ${cls2}">${pct}%</span>`;
  };

  document.getElementById('view-group-report').innerHTML = `
    <div class="topbar">
      <div>
        <button class="btn-ghost back-btn no-print" onclick="navigate('reports')">← Back to Reports</button>
        <h1>${esc(cls.name)}</h1>
        <div class="meta">${fromVal?formatDateShort(fromVal):'Start'} – ${toVal?formatDateShort(toVal):'Present'} · ${students.length} students</div>
      </div>
      <div style="display:flex;gap:10px;" class="no-print">
        <button class="btn-ghost" onclick="toggleGroupReportLang()">${t.langToggle}</button>
        <button class="btn-accent" onclick="window.print()">🖨️ ${state.reportLang==='pt'?'Imprimir':'Print'}</button>
      </div>
    </div>
    <div class="stat-row">
      <div class="card stat"><div class="stat-num">${students.length}</div><div class="stat-label">${state.reportLang==='pt'?'Alunos':'Students'}</div></div>
      <div class="card stat"><div class="stat-num">${attAvg!=null?attAvg+'%':'—'}</div><div class="stat-label">${t.attendance} (${state.reportLang==='pt'?'média':'avg'})</div></div>
      <div class="card stat"><div class="stat-num">${hwAvg!=null?hwAvg+'%':'—'}</div><div class="stat-label">${t.homeworkDone} (${state.reportLang==='pt'?'média':'avg'})</div></div>
      <div class="card stat"><div class="stat-num">${partGroupAvg!=null?partGroupAvg+'%':'—'}</div><div class="stat-label">${t.participation} (${state.reportLang==='pt'?'média':'avg'})</div></div>
      <div class="card stat"><div class="stat-num">${phoneTotal}</div><div class="stat-label">${t.phoneUses}</div></div>
    </div>
    <div class="card table-wrap">
      <table>
        <thead>
          <tr>
            <th>${state.reportLang==='pt'?'Aluno':'Student'}</th>
            <th>${state.reportLang==='pt'?'Aulas':'Sessions'}</th>
            <th>${t.present}</th>
            <th>${t.late}</th>
            <th>${t.absent}</th>
            <th>${state.reportLang==='pt'?'% Presença':'Att. rate'}</th>
            <th>${state.reportLang==='pt'?'% Ausência':'Abs. rate'}</th>
            <th>${state.reportLang==='pt'?'Tempo em aula':'In class'}</th>
            <th>${t.hw} (${state.reportLang==='pt'?'média':'avg'})</th>
            <th>${t.participation}</th>
            <th>${t.phone}</th>
            <th>English Club</th>
          </tr>
        </thead>
        <tbody>
          ${rows.map(({s,total,present,late,absent,attRate,absRate,inClass,totalPoss,hwAvg,phone,partAvg})=>`
            <tr>
              <td style="font-weight:600;"><button type="button" class="student-name-link" onclick="navigate('student',{studentProfileId:'${s.id}',studentProfileReturn:'reports'})">${esc(s.name)}</button></td>
              <td>${total}</td>
              <td>${present}</td>
              <td>${late}</td>
              <td>${absent}</td>
              <td>${badgeForPct(attRate)}</td>
              <td>${badgeForPct(absRate, true)}</td>
              <td>${total?Math.round(inClass/totalPoss*100)+'%':'—'}</td>
              <td>${hwAvg!=null?badgeForPct(hwAvg):'—'}</td>
              <td>${partAvg!=null?badgeForPct(partAvg):'—'}</td>
              <td>${phone||'—'}</td>
              <td style="text-align:center;">${s.englishClub?'⭐':''}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
    <div style="font-size:11px;color:var(--muted);margin-top:10px;" class="no-print">
      ${state.reportLang==='pt'?'Clique no nome do aluno para ver o relatório individual.':'Click a student name to view their individual report.'}
    </div>
  `;
}

  state.reportLang = state.reportLang==='en' ? 'pt' : 'en';
  refreshView();

function renderCalendar(){
  const {year, month} = state.calendar;
  const firstDay = new Date(year, month, 1);
  const startWeekday = firstDay.getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const monthName = firstDay.toLocaleString('en-US',{month:'long'});

  let cells = '';
  for(let i=0;i<startWeekday;i++) cells += `<div class="cal-cell empty"></div>`;
  for(let d=1; d<=daysInMonth; d++){
    const dateStr = dateToStr(year, month, d);
    const dow = new Date(year, month, d).getDay();
    const classesToday = activeClasses().filter(c=>{
      if(!getClassDays(c).includes(dow)) return false;
      if(c.startDate && dateStr < c.startDate) return false;
      if(c.endDate && dateStr > c.endDate) return false;
      return true;
    });
    const eventsToday = state.events.filter(e=>e.date===dateStr);
    const privToday = state.privateLessons.filter(l=>l.date===dateStr && l.status!=='cancelled')
      .sort((a,b)=>(a.time||'').localeCompare(b.time||''));
    const isToday = dateStr===todayStr();
    const holiday = getHoliday(dateStr);
    cells += `
      <div class="cal-cell ${isToday?'today':''} ${holiday?'holiday':''}" onclick="openDayModal('${dateStr}')">
        <button type="button" class="cal-date" aria-label="${formatDateLong(dateStr)}${holiday?', holiday':''}" onclick="event.stopPropagation();openDayModal('${dateStr}')">${d}</button>
        <div class="cal-items">
          ${holiday?`<div class="cal-tag holiday-tag">🎉 ${esc(holiday.label)}</div>`:''}
          ${!holiday?classesToday.map(c=>{
            const hasInfo = !!(getLessonNote(c.id, dateStr) || getHomework(c.id, dateStr) || getPromise(c.id, dateStr));
            return `<button type="button" class="cal-tag" title="Open class view (attendance, lesson content, homework, promises)" style="background:${c.color}22;color:${c.color};border-color:${c.color}55;cursor:pointer;" onclick="event.stopPropagation();goToRollCall('${c.id}','${dateStr}')">${esc(c.name)}${c.time?' '+c.time:''}${hasInfo?' •':''}</button>`;
          }).join(''):''}
          ${eventsToday.map(e=>`<div class="cal-tag ${e.type}">${esc(e.title)}</div>`).join('')}
          ${privToday.map((l,pi)=>{
            const st = privStudent(l.studentId);
            return `<button type="button" class="cal-tag priv-tag" title="Click to reschedule" onclick="event.stopPropagation();openRescheduleModal('${l.id}')">👤 ${st?esc(st.name.split(' ')[0]):'?'}${l.time?' '+l.time:''}</button>`;
          }).join('')}
        </div>
      </div>`;
  }

  document.getElementById('view-calendar').innerHTML = `
    <div class="topbar">
      <div><h1>Calendar</h1></div>
      <div class="cal-nav">
        <button class="btn-ghost" onclick="changeMonth(-1)">←</button>
        <div class="cal-month-label">${monthName} ${year}</div>
        <button class="btn-ghost" onclick="changeMonth(1)">→</button>
        <button class="btn-ghost" onclick="goToCurrentMonth()">Today</button>
      </div>
    </div>
    <div class="card cal-grid-wrap">
      <div class="cal-weekdays">${['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d=>`<div>${d}</div>`).join('')}</div>
      <div class="cal-grid">${cells}</div>
    </div>
    <div class="cal-legend">
      ${activeClasses().map(c=>`<div class="legend-item"><span class="color-dot" style="background:${c.color}"></span>${esc(c.name)}</div>`).join('')}
      <div class="legend-item"><span class="badge hw">HW</span> Homework due</div>
      <div class="legend-item"><span class="badge test">Test</span> Test</div>
      <div class="legend-item"><span class="badge project">Project</span> Project</div>
      <div class="legend-item"><span class="badge other">Other</span> Other</div>
      <div class="legend-item">🎉 Holiday</div>
      <div class="legend-item"><span class="cal-tag priv-tag" style="padding:1px 6px;">👤</span> Private lesson</div>
    </div>
  `;
}
function changeMonth(delta){
  let {year, month} = state.calendar;
  month += delta;
  if(month<0){ month=11; year--; }
  if(month>11){ month=0; year++; }
  state.calendar = {year, month};
  refreshView();
}
function goToCurrentMonth(){
  const now = new Date();
  state.calendar = {year: now.getFullYear(), month: now.getMonth()};
  refreshView();
}

      <button class="btn-ghost" onclick="closeModal()">Close</button>
      <button class="btn-accent" onclick="addEvent('${dateStr}')">Add event</button>
    </div>
  `);
}
function addEvent(dateStr){
  const title = document.getElementById('ev-title').value.trim();
  if(!title) return;
  const type = document.getElementById('ev-type').value;
  const classId = document.getElementById('ev-class').value || null;
  state.events.push({id:uid(), date:dateStr, title, type, classId});
  scheduleSave('events', state.events);
  closeModal();
  refreshView();
}
function deleteEvent(eventId, dateStr){
  const ev = state.events.find(e=>e.id===eventId);
  if(!ev) return;
  if(!confirm(`Delete "${ev.title}" on ${formatDateShort(ev.date)}?\n\nThis cannot be undone.`)) return;
  state.events = state.events.filter(e=>e.id!==eventId);
  scheduleSave('events', state.events);
  refreshView();
  openDayModal(dateStr);
}
function markHoliday(dateStr){
  const label = document.getElementById('holiday-label').value.trim() || 'Holiday';
  state.holidays.push({id:uid(), date:dateStr, label});
  scheduleSave('holidays', state.holidays);
  refreshView();
  openDayModal(dateStr);
}
function removeHoliday(dateStr){
  const hol = state.holidays.find(h=>h.date===dateStr);
  if(!hol) return;
  if(!confirm(`Remove the holiday "${hol.label}" on ${formatDateShort(dateStr)}?\n\nClasses will be scheduled on this day again.`)) return;
  state.holidays = state.holidays.filter(h=>h.date!==dateStr);
  scheduleSave('holidays', state.holidays);
  refreshView();
  openDayModal(dateStr);
}

/* ---------- private helpers ---------- */
function privStudent(id){ return state.privateStudents.find(s=>s.id===id); }
function round2(n){ return Math.round(n*100)/100; }
function daysBetween(a,b){
  const d1=new Date(a+'T00:00:00'), d2=new Date(b+'T00:00:00');
  return Math.round((d1-d2)/86400000);
}
function money(n){ return 'R$ ' + (Number(n)||0).toFixed(2); }
// Balance is stored as amount OWED (positive = student owes).
// Displayed from the student's perspective: owing shows negative & red, credit positive & green.
function balanceColor(b){ return b > 0.005 ? 'var(--red)' : 'var(--green)'; }
function balanceText(b){
  if(b > 0.005) return '-' + money(b);
  if(b < -0.005) return '+' + money(Math.abs(b));
  return money(0);
}
function balanceDisplay(b){
  return `<span style="color:${balanceColor(b)};font-weight:600;">${balanceText(b)}</span>`;
}
function persistPrivate(){
  scheduleSave('privateStudents', state.privateStudents);
  scheduleSave('privateLessons', state.privateLessons);
  scheduleSave('payments', state.payments);
  scheduleSave('checkpoints', state.checkpoints);
  scheduleSave('learningPoints', state.learningPoints);
  scheduleSave('privateSettings', state.privateSettings);
}
function lessonCost(s){
  if(!s) return 0;
  if(s.pricingType==='package'){
    const size=Number(s.packageSize)||0, price=Number(s.packagePrice)||0;
    return size>0 ? round2(price/size) : 0;
  }
  if(s.pricingType==='hourly'){
    const dur = (s.recurring && s.recurring[0]?.duration) || 60;
    return round2((Number(s.rate)||0) * dur/60);
  }
  return Number(s.rate)||0; // perLesson
}
function computeLedger(studentId){
  const s = privStudent(studentId);
  const billable = state.privateLessons
    .filter(l=>l.studentId===studentId && (l.status==='completed'||l.status==='no-show'))
    .sort((a,b)=> a.date===b.date ? (a.time||'').localeCompare(b.time||'') : a.date.localeCompare(b.date));
  const cost = lessonCost(s);
  const totalBilled = round2(billable.length * cost);
  const totalPaid = round2(state.payments.filter(p=>p.studentId===studentId).reduce((sum,p)=>sum+(Number(p.amount)||0),0));
  const balance = round2(totalBilled - totalPaid);
  let remaining = totalPaid, oldestUnpaidDate = null;
  for(const l of billable){
    if(cost<=0) continue;
    if(remaining >= cost - 0.005){ remaining -= cost; }
    else { oldestUnpaidDate = l.date; break; }
  }
  const threshold = Number(state.privateSettings.overdueThresholdDays)||14;
  let overdue = false;
  if(oldestUnpaidDate && balance > 0.005){
    overdue = daysBetween(todayStr(), oldestUnpaidDate) >= threshold;
  }
  return { totalBilled, totalPaid, balance, oldestUnpaidDate, overdue, lessonsBilled: billable.length, cost };
}
function ledgerStamp(ledger){
  if(ledger.balance > 0.5) return ledger.overdue
    ? '<span class="badge red">Due</span>'
    : '<span class="badge amber">Owes</span>';
  return '<span class="badge green">Even</span>';
}
function addLpToNextClass(lpId, studentId){
  const p = state.learningPoints.find(x=>x.id===lpId);
  if(!p) return;
  const l = nextPrivLesson(studentId);
  if(!l){ alert('No upcoming scheduled class for this student. Schedule one first.'); return; }
  const cur = (l.notes||'').trim();
  const parts = cur ? cur.split(';').map(x=>x.trim()).filter(Boolean) : [];
  if(parts.includes(p.topic)){ alert('"' + p.topic + '" is already in the content of the next class (' + formatDateShort(l.date) + ').'); return; }
  parts.push(p.topic);
  l.notes = parts.join('; ');
  persistPrivate();
  refreshView();
  alert('Added to the class on ' + formatDateShort(l.date) + (l.time ? ' at ' + l.time : '') + '.');
}
function nextLessonAfter(studentId, date, excludeId){
  return state.privateLessons
    .filter(x=>x.studentId===studentId && x.id!==excludeId && x.status!=='cancelled' && x.date>date)
    .sort((a,b)=> a.date===b.date ? (a.time||'').localeCompare(b.time||'') : a.date.localeCompare(b.date))[0] || null;
}
function nextPrivLesson(studentId){
  const today = todayStr();
  return state.privateLessons
    .filter(l=>l.studentId===studentId && l.status==='scheduled' && l.date>=today)
    .sort((a,b)=> a.date===b.date ? (a.time||'').localeCompare(b.time||'') : a.date.localeCompare(b.date))[0] || null;
}

/* ---------- recurring generation ---------- */
/* Recurring occurrences are rebuilt from the student's weekly slots on every
   load. Deleting or moving one leaves its slot empty, so without a record of
   the teacher's intent regeneration would simply put it back. A "skip" is a
   tombstone marking one slot as deliberately vacated.
   Stored on the student, so it rides along with the existing privateStudents key. */
function slotKey(date, time){ return date + '|' + (time || ''); }

function addRecurringSkip(studentId, date, time){
  const s = privStudent(studentId);
  if(!s) return;
  const key = slotKey(date, time);
  s.skips = s.skips || [];
  if(!s.skips.includes(key)) s.skips.push(key);
}

function pruneSkips(s, today){
  // Regeneration only ever touches today onwards, so past skips are dead weight.
  if(!s.skips || !s.skips.length) return;
  s.skips = s.skips.filter(k => k.split('|')[0] >= today);
}

function regenerateRecurring(s){
  const today = todayStr();
  pruneSkips(s, today);
  // remove future auto-generated placeholders for this student
  state.privateLessons = state.privateLessons.filter(l =>
    !(l.studentId===s.id && l.isRecurring && l.status==='scheduled' && l.date >= today)
  );
  if(!s.recurring || !s.recurring.length || s.status!=='active') return;
  // Window: from max(today, startDate) through endDate, or 8 weeks if open-ended
  const startBound = (s.startDate && s.startDate > today) ? s.startDate : today;
  let endBound;
  if(s.endDate){
    endBound = s.endDate;
  } else {
    const e = new Date(startBound+'T00:00:00');
    e.setDate(e.getDate() + RECUR_HORIZON_WEEKS*7);
    endBound = dateToStr(e.getFullYear(), e.getMonth(), e.getDate());
  }
  if(endBound < startBound) return;
  const skips = new Set(s.skips || []);
  const cur = new Date(startBound+'T00:00:00');
  const end = new Date(endBound+'T00:00:00');
  let guard = 0;
  while(cur <= end && guard++ < 800){
    const ds = dateToStr(cur.getFullYear(), cur.getMonth(), cur.getDate());
    const dow = cur.getDay();
    for(const slot of s.recurring){
      if(slot.weekday !== dow) continue;
      if(skips.has(slotKey(ds, slot.time))) continue;   // deliberately vacated
      const dup = state.privateLessons.some(l=>l.studentId===s.id && l.date===ds && (l.time||'')===(slot.time||''));
      if(dup) continue;
      state.privateLessons.push({
        id: uid(), studentId: s.id, date: ds, time: slot.time||'',
        duration: Number(slot.duration)||60, status:'scheduled', notes:'', isRecurring:true
      });
    }
    cur.setDate(cur.getDate()+1);
  }
}

/* ---------- placement bridge ---------- */
/* Auto-import placement Focus Areas as learning points (deduped by ptKey) */
function syncFocusToLearningPoints(s){
  const h = getPlacementHistory(s.id);
  if(!h || !h.length) return;
  const sorted = h.slice().sort((a,b)=>String(b.testDate||b.date||'').localeCompare(String(a.testDate||a.date||'')));
  const place = sorted.find(r => Array.isArray(r.focus) && r.focus.length);
  if(!place) return;
  let changed = false;
  place.focus.forEach(f => {
    const bankQ = (PT_QB[f.lvl]||[])[f.qi];
    const recOutcome = f.outcome || place.scores?.[f.lvl]?.[f.qi]?.outcome || '';
    let topic, outcome;
    if(f.tests){ topic = f.tests; outcome = f.outcome || ''; }
    else if(bankQ && (!recOutcome || bankQ.outcome === recOutcome)){ topic = bankQ.tests; outcome = bankQ.outcome; }
    else if(recOutcome){ topic = recOutcome; outcome = recOutcome; }
    else return;
    const key = 'pt:' + f.lvl + ':' + (outcome || ('q' + f.qi));
    const legacyKey = 'pt:' + f.lvl + ':' + f.qi;
    const existing = state.learningPoints.find(p => p.studentId===s.id && p.ptKey===key);
    if(existing){
      // Re-pinning after a dismissal revives the point
      if(existing.dismissed && f.pinnedAt && f.pinnedAt > (existing.dismissedAt || '')){
        existing.dismissed = false;
        delete existing.dismissedAt;
        changed = true;
      }
      return;
    }
    // Avoid duplicating a live legacy-keyed point for the same slot
    if(state.learningPoints.some(p => p.studentId===s.id && p.ptKey===legacyKey && !p.dismissed)) return;
    const sc = place.scores?.[f.lvl]?.[f.qi]?.score;
    state.learningPoints.push({
      id: uid(), studentId: s.id, ptKey: key,
      topic: topic,
      skill: 'grammar',
      grade: '',
      dateIntroduced: todayStr(),
      notes: 'From placement (' + f.lvl + '): ' + (outcome || topic) + (sc!=null ? ' — scored ' + sc + '%' : ''),
      complete: false
    });
    changed = true;
  });
  if(changed) persistPrivate();
}


function getPlacementHistory(studentId){
  try{
    const raw = localStorage.getItem(PT_SK_PREFIX + studentId);
    if(!raw) return null;
    const data = JSON.parse(raw);
    if(Array.isArray(data.history) && data.history.length) return data.history;
    if(data.placement !== undefined || data.name !== undefined) return [data];
    return null;
  }catch{ return null; }
}
function latestPlacement(studentId){
  const h = getPlacementHistory(studentId);
  if(!h) return null;
  return h.slice().sort((a,b)=>String(b.testDate||b.date||'').localeCompare(String(a.testDate||a.date||'')))[0];
}
function studyPointsForLevel(level){
  return PT_QB[level] || null;
}

function privChangeMonth(delta){
  let {year,month} = state.privCal;
  month += delta;
  if(month<0){month=11;year--;}
  if(month>11){month=0;year++;}
  state.privCal={year,month};
  refreshView();
}
function privGoToday(){
  const n=new Date();
  state.privCal={year:n.getFullYear(),month:n.getMonth()};
  refreshView();
}

function privUpdateDayLabel(d){
  const cb = document.getElementById('ps-day-'+d);
  const lbl = document.getElementById('ps-day-label-'+d);
  if(!cb||!lbl) return;
  lbl.style.background = cb.checked ? 'var(--accent-soft)' : '#fff';
  lbl.style.color = cb.checked ? 'var(--accent)' : 'var(--muted)';
  lbl.style.borderColor = cb.checked ? 'var(--accent)' : 'var(--border)';
}
function privSelectedDays(){
  return [1,2,3,4,5,6,0].filter(d=>document.getElementById('ps-day-'+d)?.checked);
}
function privRenderCustomTimes(existingSlots){
  const box = document.getElementById('ps-custom-box');
  const on = document.getElementById('ps-custom')?.checked;
  if(!box) return;
  box.style.display = on ? 'block' : 'none';
  if(!on){ box.innerHTML=''; return; }
  // preserve anything already typed in the box, then fall back to saved slots
  const typed = {};
  box.querySelectorAll('.ps-ctime').forEach(inp=>{
    const d = inp.dataset.day;
    typed[d] = { time: inp.value, duration: box.querySelector(`.ps-cdur[data-day="${d}"]`)?.value };
  });
  const days = privSelectedDays();
  const defTime = document.getElementById('ps-time').value;
  const defDur = document.getElementById('ps-dur').value || 60;
  box.innerHTML = days.length ? days.map(d=>{
    const prev = typed[d] || (existingSlots||[]).find(sl=>sl.weekday===d);
    return `<div class="field-row" style="align-items:center;margin-bottom:6px;">
      <div style="width:90px;font-size:13px;font-weight:600;color:var(--muted);">${DAY_FULL[d]}</div>
      <input class="ps-ctime" data-day="${d}" type="time" value="${prev?.time||defTime}" style="flex:1;">
      <input class="ps-cdur" data-day="${d}" type="number" min="15" step="15" value="${prev?.duration||defDur}" style="width:80px;" title="minutes">
    </div>`;
  }).join('') : `<div class="empty" style="padding:4px 0;">Select at least one day above.</div>`;
}
function privPricingToggle(){
  const t = document.getElementById('ps-ptype')?.value;
  if(!t) return;
  document.getElementById('ps-rate-box').style.display = t==='package' ? 'none' : 'flex';
  document.getElementById('ps-pkg-box').style.display = t==='package' ? 'flex' : 'none';
  const lbl = document.querySelector('#ps-rate-box label');
  if(lbl) lbl.textContent = t==='hourly' ? 'Hourly rate (R$)' : 'Price per lesson (R$)';
}
function savePrivStudent(id){
  const name = document.getElementById('ps-name').value.trim();
  if(!name){ alert('Name is required.'); return; }
  const days = privSelectedDays();
  const defTime = document.getElementById('ps-time').value;
  const defDur = Number(document.getElementById('ps-dur').value)||60;
  const custom = document.getElementById('ps-custom').checked;
  if(days.length && !custom && !defTime){ alert('Please set a lesson time (or clear the selected days).'); return; }

  let slots = [];
  if(days.length){
    if(custom){
      slots = days.map(d=>{
        const t = document.querySelector(`.ps-ctime[data-day="${d}"]`)?.value || defTime;
        const du = Number(document.querySelector(`.ps-cdur[data-day="${d}"]`)?.value)||defDur;
        return { weekday: d, time: t, duration: du };
      }).filter(sl=>sl.time);
    } else {
      slots = days.map(d=>({ weekday: d, time: defTime, duration: defDur }));
    }
  }

  const startDate = document.getElementById('ps-start').value || todayStr();
  const endDate = document.getElementById('ps-end').value || null;
  if(endDate && endDate < startDate){ alert('Last lesson date cannot be before the first lesson date.'); return; }

  let s = id ? privStudent(id) : null;
  const isNew = !s;
  if(isNew){ s = { id: uid(), pinnedSkills: [], studyPoints: [] }; state.privateStudents.push(s); }
  s.name = name;
  s.contactPhone = document.getElementById('ps-phone').value.trim();
  s.cefr = document.getElementById('ps-cefr').value;
  s.isMinor = document.getElementById('ps-minor').checked;
  s.guardianName = document.getElementById('ps-gname')?.value.trim()||'';
  s.guardianPhone = document.getElementById('ps-gphone')?.value.trim()||'';
  s.status = document.getElementById('ps-status').value;
  s.pricingType = document.getElementById('ps-ptype').value;
  s.rate = document.getElementById('ps-rate').value ? Number(document.getElementById('ps-rate').value) : '';
  s.packageSize = document.getElementById('ps-pkgsize').value ? Number(document.getElementById('ps-pkgsize').value) : '';
  s.packagePrice = document.getElementById('ps-pkgprice').value ? Number(document.getElementById('ps-pkgprice').value) : '';
  s.notes = document.getElementById('ps-notes').value;
  s.startDate = startDate;
  s.endDate = endDate;
  s.recurring = slots.length ? slots : null;
  regenerateRecurring(s);
  persistPrivate();
  closeModal();
  refreshView();
}
function deletePrivStudent(id){
  const s = privStudent(id);
  if(!s) return;
  if(!confirm(`Delete "${s.name}" and ALL their lessons, payments, checkpoints and learning points? This cannot be undone.`)) return;
  state.privateStudents = state.privateStudents.filter(x=>x.id!==id);
  state.privateLessons = state.privateLessons.filter(l=>l.studentId!==id);
  state.payments = state.payments.filter(p=>p.studentId!==id);
  state.checkpoints = state.checkpoints.filter(c=>c.studentId!==id);
  state.learningPoints = state.learningPoints.filter(p=>p.studentId!==id);
  try{ localStorage.removeItem(PT_SK_PREFIX + id); }catch(e){}
  persistPrivate();
  closeModal();
  navigate('private');
}

function rsSetStatus(el, st){
  el.parentElement.querySelectorAll('.pill').forEach(p=>{ p.classList.remove('on'); p.setAttribute('aria-pressed','false'); });
  el.classList.add('on');
  el.setAttribute('aria-pressed','true');
  document.getElementById('rs-status').value = st;
}
function saveReschedule(lessonId){
  const l = state.privateLessons.find(x=>x.id===lessonId);
  if(!l) return;
  const newDate = document.getElementById('rs-date').value;
  if(!newDate){ alert('Pick a date.'); return; }
  const newTime = document.getElementById('rs-time').value;
  const origDate = l.date, origTime = l.time, wasRecurring = !!l.isRecurring;
  // A time-only move vacates the old slot just as surely as a date move does.
  const slotChanged = newDate !== origDate || (newTime||'') !== (origTime||'');
  l.date = newDate;
  l.time = newTime;
  l.duration = Number(document.getElementById('rs-dur').value)||60;
  l.notes = document.getElementById('rs-notes').value;
  l.status = document.getElementById('rs-status').value;
  if(wasRecurring && slotChanged){
    l.isRecurring = false;                                  // detach so regeneration never overwrites it
    addRecurringSkip(l.studentId, origDate, origTime);      // and never refills the slot it left
  }
  persistPrivate();
  closeModal();
  refreshView();
}

function saveLesson(id){
  const studentId = document.getElementById('pl-student').value;
  if(!studentId){ alert('Pick a student.'); return; }
  let l = id ? state.privateLessons.find(x=>x.id===id) : null;
  const isNew = !l;
  const oldDate = l?.date;
  if(isNew){ l = { id: uid(), isRecurring:false }; state.privateLessons.push(l); }
  l.studentId = studentId;
  l.date = document.getElementById('pl-date').value;
  l.time = document.getElementById('pl-time').value;
  l.duration = Number(document.getElementById('pl-dur').value)||60;
  l.status = document.getElementById('pl-status').value;
  l.notes = document.getElementById('pl-notes').value;
  l.homework = document.getElementById('pl-hw').value;
  l.promise = document.getElementById('pl-promise').value;
  const nxHwEl = document.getElementById('pl-next-hw');
  if(nxHwEl){
    const nx = state.privateLessons.find(x=>x.id===nxHwEl.dataset.lessonId);
    if(nx){
      nx.homework = nxHwEl.value;
      nx.promise = document.getElementById('pl-next-promise').value;
    }
  }
  if(!isNew && l.date!==oldDate) l.isRecurring = false;  // detach manually moved lessons
  persistPrivate();
  closeModal();
  refreshView();
}
function deleteLesson(id){
  const l = state.privateLessons.find(x=>x.id===id);
  if(!l) return;
  if(!confirm('Delete this lesson?')) return;
  // A recurring occurrence would be regenerated on next load unless we mark the slot.
  if(l.isRecurring) addRecurringSkip(l.studentId, l.date, l.time);
  state.privateLessons = state.privateLessons.filter(x=>x.id!==id);
  persistPrivate();
  closeModal();

function setLessonStatus(id, status){
  const l = state.privateLessons.find(x=>x.id===id);
  if(!l) return;
  if((status==='completed' || status==='no-show') && l.date > todayStr()){
    alert('This class is on ' + formatDateShort(l.date) + " — it hasn't happened yet.");
    return;
  }
  l.status = status;
  persistPrivate();
  refreshView();
}

function privPayBalanceHint(){
  const sid = document.getElementById('pay-student').value;
  const hint = document.getElementById('pay-hint');
  const amt = document.getElementById('pay-amount');
  if(!sid){ hint.innerHTML=''; return; }
  const led = computeLedger(sid);
  hint.innerHTML = `Current balance: ${balanceDisplay(led.balance)}`;
  if(!amt.value && led.balance>0) amt.value = led.balance;
}
function savePayment(id){
  const studentId = document.getElementById('pay-student').value;
  if(!studentId){ alert('Pick a student.'); return; }
  let p = id ? state.payments.find(x=>x.id===id) : null;
  if(!p){ p = { id: uid() }; state.payments.push(p); }
  p.studentId = studentId;
  p.date = document.getElementById('pay-date').value;
  p.amount = Number(document.getElementById('pay-amount').value)||0;
  p.method = document.getElementById('pay-method').value;
  p.notes = document.getElementById('pay-notes').value;
  persistPrivate();
  closeModal();
  refreshView();
}
function deletePayment(id){
  if(!confirm('Delete this payment?')) return;
  state.payments = state.payments.filter(p=>p.id!==id);
  persistPrivate();
  closeModal();
  refreshView();
}

    <div class="field"><label>Notes</label><textarea id="lp-notes" rows="2">${esc(p?.notes||'')}</textarea></div>
    <div class="modal-actions" style="${p?'justify-content:space-between;':''}">
      ${p?`<button class="icon-btn danger" onclick="deleteLearningPoint('${p.id}')">Delete</button>`:''}
      <div style="display:flex;gap:10px;">
        <button class="btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn-accent" onclick="saveLearningPoint(${p?`'${p.id}'`:'null'},'${studentId}')">Save</button>
      </div>
    </div>
  `);
}
function saveLearningPoint(id, studentId){
  const topic = document.getElementById('lp-topic').value.trim();
  if(!topic){ alert('Topic is required.'); return; }
  let p = id ? state.learningPoints.find(x=>x.id===id) : null;
  if(!p){ p = { id: uid(), studentId }; state.learningPoints.push(p); }
  p.topic = topic;
  p.skill = document.getElementById('lp-skill').value;
  p.grade = document.getElementById('lp-grade').value;
  p.dateIntroduced = document.getElementById('lp-date').value;
  p.notes = document.getElementById('lp-notes').value;
  const wasComplete = p.complete;
  p.complete = document.getElementById('lp-complete').checked;
  if(p.complete && !wasComplete && !p.dateCompleted) p.dateCompleted = todayStr();
  if(!p.complete) p.dateCompleted = '';
  persistPrivate(); closeModal(); refreshView();
}
function deleteLearningPoint(id){
  if(!confirm('Delete this learning point?')) return;
  const p = state.learningPoints.find(x=>x.id===id);
  if(p && p.ptKey){ p.dismissed = true; p.dismissedAt = new Date().toISOString(); }
  else state.learningPoints = state.learningPoints.filter(x=>x.id!==id);
  persistPrivate(); closeModal(); refreshView();
}

/* ================= INIT ================= */
window.state = state;
function showLoadError(err){
  dataReady = false;
  document.getElementById('app-main').innerHTML = `
    <div class="card empty-card" style="max-width:520px;margin:60px auto;text-align:center;">
      <h3 style="color:var(--red);">Couldn't load your data</h3>
      <p class="meta" style="margin:10px 0 4px;">The dashboard did not open, because showing an empty dashboard could overwrite your real records.</p>
      <p class="meta" style="margin:0 0 16px;font-size:12px;">${esc(err?.message || String(err))}</p>
      <button class="btn-accent" onclick="location.reload()">Try again</button>
    </div>`;
}

async function init(){
  // Never proceed on a partial/failed read: an empty state would be written back over good data.
  try{
    loadedBlobs = await loadAllKeys();
  }catch(err){
    console.error('Initial load failed', err);
    showLoadError(err);
    return;
  }
  state.classes = loadKey('classes', []);
  state.students = loadKey('students', []);
  state.sessions = loadKey('sessions', {});
  state.events = loadKey('events', []);
  state.holidays = loadKey('holidays', []);
  state.sessionMeta = loadKey('sessionMeta', {});
  state.lessonNotes = loadKey('lessonNotes', {});
  state.homework = loadKey('homework', {});
  state.promises = loadKey('promises', {});
  state.privateStudents = loadKey('privateStudents', []);
  state.privateLessons = loadKey('privateLessons', []);
  state.payments = loadKey('payments', []);
  state.checkpoints = loadKey('checkpoints', []);
  state.learningPoints = loadKey('learningPoints', []);
  state.privateSettings = loadKey('privateSettings', { overdueThresholdDays: 14 });
  state.grades = loadKey('grades', {});
  state.gradeSettings = loadKey('gradeSettings', { margin: 0 });
  state.backupMeta = loadKey('backupMeta', { lastBackupAt: null });

  dataReady = true;   // writes unlocked only now

  // refresh recurring placeholders for active students on load
  state.privateStudents.filter(x=>x.status==='active').forEach(regenerateRecurring);
  navigate('dashboard');
}

/* ---------- session bootstrap ---------- */
(async function bootstrap(){
  const { data: { session } } = await sb.auth.getSession();
  if(session){
    currentUser = session.user;
    await enterApp();
  }
})();
</script>
