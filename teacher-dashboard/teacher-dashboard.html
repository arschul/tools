<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EFL Teacher Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --sidebar:#1c2436;
    --sidebar-accent:#2a3650;
    --bg:#f4f6fb;
    --card:#ffffff;
    --border:#e3e7f0;
    --text:#1c2436;
    --muted:#7d869c;
    --accent:#4f6df5;
    --accent-soft:#e8ecff;
    --green:#1f9d6f;
    --green-soft:#e3f7ee;
    --amber:#c98a1c;
    --amber-soft:#fbf0dc;
    --red:#d1453d;
    --red-soft:#fbe6e4;
    --purple:#8b5cf6;
    --purple-soft:#efe7ff;
    --gray:#6b7280;
    --gray-soft:#eef0f4;
    --accent-grad: linear-gradient(135deg, #4f6df5 0%, #8b5cf6 100%);
    --radius:16px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Inter',sans-serif;
    background:
      radial-gradient(circle at 100% 0%, #eef1fd 0%, transparent 45%),
      radial-gradient(circle at 0% 100%, #eef7f3 0%, transparent 40%),
      var(--bg);
    color:var(--text);
    display:flex;
    min-height:100vh;
  }
  h1,h2,h3{font-family:'Sora',sans-serif;margin:0;}
  a{color:var(--accent);cursor:pointer;}

  /* Sidebar */
  .sidebar{
    width:230px;
    background:
      radial-gradient(circle at 25% 0%, rgba(79,109,245,.35), transparent 55%),
      radial-gradient(circle at 90% 80%, rgba(139,92,246,.18), transparent 50%),
      linear-gradient(165deg, #1c2436 0%, #20283e 55%, #181f30 100%);
    color:#cfd6e8;
    padding:24px 18px;
    flex-shrink:0;
  }
  .sidebar .brand{
    font-family:'Sora',sans-serif;
    font-weight:700;
    font-size:18px;
    letter-spacing:-.01em;
    color:#fff;
    margin-bottom:28px;
    display:flex;
    align-items:center;
    gap:10px;
  }
  .sidebar .brand .dot{
    width:10px;height:10px;border-radius:50%;
    background:var(--accent-grad);
    box-shadow:0 0 10px rgba(79,109,245,.8);
  }
  .nav-item{
    display:flex;align-items:center;gap:12px;
    padding:9px 12px;border-radius:12px;
    font-size:14px;font-weight:500;
    margin-bottom:4px;cursor:pointer;
    color:#aab3c9;
    transition:background .15s, color .15s;
  }
  .nav-item:hover{color:#fff;background:rgba(255,255,255,.05);}
  .nav-item.active{
    background:rgba(255,255,255,.06);
    color:#fff;
  }
  .nav-icon-badge{
    width:30px;height:30px;border-radius:9px;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    background:rgba(255,255,255,.06);
    color:#aab3c9;
    transition:background .15s, color .15s, box-shadow .15s;
  }
  .nav-icon-badge svg{width:16px;height:16px;}
  .nav-item:hover .nav-icon-badge{background:rgba(255,255,255,.12);color:#fff;}
  .nav-item.active .nav-icon-badge{
    background:var(--accent-grad);
    color:#fff;
    box-shadow:0 4px 14px -2px rgba(79,109,245,.6);
  }
  .sidebar-divider{height:1px;background:rgba(255,255,255,.08);margin:10px 4px 10px;}

  /* Main */
  .main{flex:1;padding:28px 36px;max-width:1180px;}
  .view{display:none;}
  .view.active{display:block;}

  .topbar{
    display:flex;justify-content:space-between;align-items:flex-start;
    margin-bottom:18px;flex-wrap:wrap;gap:12px;
  }
  .topbar h1{font-size:24px;letter-spacing:-.01em;}
  .topbar .meta{color:var(--muted);font-size:13px;margin-top:4px;}
  .back-btn{margin-bottom:8px;}

  /* shared */
  .card{
    background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
    box-shadow:0 1px 2px rgba(28,36,54,.03), 0 10px 30px -16px rgba(28,36,54,.12);
  }
  .badge{font-size:11px;font-weight:600;padding:3px 9px;border-radius:999px;}
  .badge.green{background:var(--green-soft);color:var(--green);}
  .badge.amber{background:var(--amber-soft);color:var(--amber);}
  .badge.red{background:var(--red-soft);color:var(--red);}
  .badge.hw, .cal-tag.hw{background:var(--accent-soft);color:var(--accent);}
  .badge.test, .cal-tag.test{background:var(--red-soft);color:var(--red);}
  .badge.project, .cal-tag.project{background:var(--purple-soft);color:var(--purple);}
  .badge.other, .cal-tag.other{background:var(--gray-soft);color:var(--gray);}

  .btn-accent{
    background:var(--accent-grad);color:#fff;border:none;border-radius:10px;
    padding:10px 18px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;
    box-shadow:0 4px 14px -4px rgba(79,109,245,.5);
    transition:transform .15s, box-shadow .15s, filter .15s;
  }
  .btn-accent:hover{filter:brightness(1.06);transform:translateY(-1px);box-shadow:0 6px 18px -4px rgba(79,109,245,.6);}
  .btn-ghost{background:#fff;border:1px solid var(--border);border-radius:10px;padding:9px 16px;font-size:13px;font-weight:600;cursor:pointer;color:var(--text);font-family:inherit;}
  .btn-ghost:hover{border-color:var(--accent);color:var(--accent);}
  .btn-ghost.small{padding:6px 12px;font-size:12px;}
  .icon-btn{background:none;border:1px solid var(--border);border-radius:8px;padding:5px 10px;font-size:12px;font-weight:600;cursor:pointer;color:var(--muted);font-family:inherit;}
  .icon-btn.danger{color:var(--red);border-color:var(--red-soft);}
  .icon-btn.danger:hover{background:var(--red-soft);}
  .icon-btn.ec-on{color:var(--amber);border-color:var(--amber-soft);background:var(--amber-soft);}

  .empty{color:var(--muted);font-size:13px;padding:8px 0;}
  .empty-card{padding:34px;text-align:center;color:var(--muted);font-size:14px;}
  .empty-card .btn-accent{margin-top:14px;}
  .color-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;display:inline-block;}

  /* stat row */
  .stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin-bottom:18px;}
  .stat{padding:16px;text-align:center;}
  .stat-num{
    font-family:'Sora',sans-serif;font-size:26px;font-weight:700;
    background:var(--accent-grad);-webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .stat-label{font-size:12px;color:var(--muted);margin-top:4px;}

  /* dashboard */
  .dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  .section{padding:18px;}
  .section h3{margin-bottom:12px;font-size:15px;}
  .dash-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);gap:10px;}
  .dash-row:last-child{border-bottom:none;}
  .dash-row-left{display:flex;align-items:center;gap:10px;}
  .dash-row-title{font-weight:600;font-size:13px;}
  .dash-row-sub{font-size:12px;color:var(--muted);margin-top:2px;}
  @media(max-width:900px){.dash-grid{grid-template-columns:1fr;}}

  /* classes & students */
  .class-card{margin-bottom:12px;overflow:hidden;}
  .class-card-head{display:flex;justify-content:space-between;align-items:center;padding:16px;gap:10px;}
  .class-card-head .dash-row-left{flex:1;cursor:pointer;}
  .class-card-actions{display:flex;gap:8px;align-items:center;flex-shrink:0;}
  .chevron{color:var(--muted);font-size:14px;width:14px;text-align:center;}
  .class-card-body{border-top:1px solid var(--border);padding:16px;}
  .add-student-row{display:flex;gap:8px;margin-bottom:12px;}
  .add-student-row input{flex:1;border:1px solid var(--border);border-radius:8px;padding:9px 11px;font-family:inherit;font-size:13px;}
  .student-list-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;}
  .student-list-row:last-child{border-bottom:none;}
  .student-name-link{cursor:pointer;font-weight:500;}
  .student-name-link:hover{color:var(--accent);text-decoration:underline;}

  /* modal */
  .modal-overlay{position:fixed;inset:0;background:rgba(28,36,54,.45);display:flex;align-items:center;justify-content:center;z-index:50;padding:20px;}
  .modal{background:#fff;border-radius:16px;padding:24px;width:100%;max-width:440px;max-height:85vh;overflow-y:auto;}
  .modal h3{margin-bottom:16px;font-size:18px;}
  .modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:18px;}
  .modal-section{margin-bottom:16px;}
  .modal-section-label{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px;}
  .modal-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;gap:10px;}
  .modal-row:last-child{border-bottom:none;}
  .modal-row .color-dot{margin-right:6px;}
  .field-row{display:flex;gap:8px;}
  .field-row select{flex:1;}

  .field{margin-bottom:12px;}
  .field label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px;}
  .field.full{grid-column:1/-1;}
  .field input, .field select, .modal select, .modal input{
    width:100%;border:1px solid var(--border);border-radius:8px;padding:9px 11px;font-family:inherit;font-size:14px;
  }
  .swatches{display:flex;gap:8px;flex-wrap:wrap;}
  .swatch{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent;}
  .swatch.on{border-color:var(--text);}

  /* roll call */
  .rollcall-controls{display:flex;gap:10px;flex-wrap:wrap;}
  .rollcall-controls select, .rollcall-controls input{border:1px solid var(--border);border-radius:10px;padding:8px 12px;font-family:inherit;font-size:13px;background:#fff;}
  .warn-banner{background:var(--amber-soft);color:var(--amber);border-radius:10px;padding:10px 14px;font-size:13px;margin-bottom:14px;font-weight:500;}
  .rollcall-actions{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
  .save-indicator{font-size:12px;color:var(--muted);}

  .roster-list{display:flex;flex-direction:column;padding:6px 0;}
  .roster-row{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;gap:14px;cursor:pointer;}
  .roster-row + .roster-row, .drawer + .roster-row{border-top:1px solid var(--border);}
  .student-name{font-weight:600;font-size:14px;flex:1;}
  .seg{display:flex;border:1px solid var(--border);border-radius:10px;overflow:hidden;}
  .seg button{border:none;background:#fff;padding:7px 14px;font-size:13px;font-weight:600;cursor:pointer;color:var(--muted);font-family:inherit;}
  .seg button + button{border-left:1px solid var(--border);}
  .seg button.present.on{background:var(--green-soft);color:var(--green);}
  .seg button.late.on{background:var(--amber-soft);color:var(--amber);}
  .seg button.absent.on{background:var(--red-soft);color:var(--red);}
  .detail-btn{border:1px solid var(--border);background:#fff;border-radius:10px;padding:7px 12px;font-size:13px;font-weight:600;color:var(--accent);font-family:inherit;}

  .drawer{padding:0 16px;background:var(--bg);display:none;grid-template-columns:repeat(2,1fr);gap:14px;}
  .roster-row.open + .drawer{display:grid;padding:16px;border-top:1px solid var(--border);}

  .stepper{display:flex;align-items:center;gap:10px;}
  .stepper button{width:28px;height:28px;border-radius:8px;border:1px solid var(--border);background:#fff;font-size:15px;cursor:pointer;font-family:inherit;}
  .stepper .val{font-weight:600;min-width:50px;text-align:center;font-size:13px;}
  .quick-num{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
  .num-input{width:64px;height:38px;border:1px solid var(--border);border-radius:8px;padding:6px 8px;font-family:inherit;font-size:14px;font-weight:600;text-align:center;}
  .qbtn{min-width:44px;height:38px;border-radius:8px;border:1px solid var(--border);background:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--accent);}
  .qbtn:hover{background:var(--accent-soft);}
  .qbtn.zero{color:var(--muted);}
  .ro-val{font-size:14px;font-weight:600;padding:7px 0;color:var(--text);}
  .locked-session .seg button[disabled]{opacity:.55;cursor:not-allowed;}
  .pill-group{display:flex;gap:6px;flex-wrap:wrap;}
  .pill{border:1px solid var(--border);background:#fff;border-radius:999px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;color:var(--muted);}
  .pill.on.green{background:var(--green-soft);color:var(--green);border-color:var(--green);}
  .pill.on.amber{background:var(--amber-soft);color:var(--amber);border-color:var(--amber);}
  .pill.on.red{background:var(--red-soft);color:var(--red);border-color:var(--red);}
  textarea{width:100%;border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-family:inherit;font-size:13px;resize:vertical;min-height:50px;}

  /* tables */
  .table-wrap{overflow-x:auto;border-radius:var(--radius);}
  table{width:100%;border-collapse:collapse;font-size:13px;min-width:760px;}
  th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);padding:10px 12px;background:#fafbfd;border-bottom:1px solid var(--border);white-space:nowrap;}
  td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle;}
  td:last-child{white-space:normal;min-width:140px;max-width:260px;word-wrap:break-word;}
  tr:last-child td{border-bottom:none;}

  /* calendar */
  .cal-nav{display:flex;align-items:center;gap:10px;}
  .cal-month-label{font-family:'Sora',sans-serif;font-weight:600;font-size:15px;min-width:140px;text-align:center;}
  .cal-grid-wrap{padding:16px;}
  .cal-weekdays{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:8px;}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
  .cal-cell{border:1px solid var(--border);border-radius:10px;padding:8px;min-height:90px;cursor:pointer;display:flex;flex-direction:column;gap:4px;}
  .cal-cell:hover{border-color:var(--accent);}
  .cal-cell.empty{border:none;cursor:default;background:transparent;}
  .cal-cell.empty:hover{border:none;}
  .cal-cell.today{background:var(--accent-soft);border-color:var(--accent);}
  .cal-date{font-weight:600;font-size:13px;}
  .cal-items{display:flex;flex-direction:column;gap:3px;overflow:hidden;}
  .cal-tag{font-size:10px;font-weight:600;padding:2px 6px;border-radius:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;border:1px solid transparent;}
  .cal-legend{display:flex;gap:16px;flex-wrap:wrap;margin-top:14px;font-size:12px;color:var(--muted);align-items:center;}
  .legend-item{display:flex;align-items:center;gap:6px;}
  .cal-cell.holiday{background:repeating-linear-gradient(45deg, #ffffff 0 8px, #eef0f6 8px 16px);}
  .cal-tag.holiday-tag{background:var(--purple-soft);color:var(--purple);}

  /* charts */
  .charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:18px;}
  .chart-card{padding:18px;}
  .chart-card h3{margin-bottom:6px;font-size:15px;}
  .chart-card .chart-note{font-size:12px;color:var(--muted);margin-bottom:14px;}
  .donut-wrap{display:flex;align-items:center;gap:20px;flex-wrap:wrap;}
  .donut{width:140px;height:140px;border-radius:50%;position:relative;flex-shrink:0;}
  .donut svg{display:block;width:100%;height:100%;}
  .donut-center{position:absolute;inset:18px;background:#fff;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;}
  .donut-num{font-family:'Sora',sans-serif;font-weight:700;font-size:20px;}
  .donut-sub{font-size:11px;color:var(--muted);}
  .donut-legend{display:flex;flex-direction:column;gap:6px;font-size:13px;flex:1;}
  .lost-summary{font-size:13px;line-height:1.7;}
  .lost-summary b{font-family:'Sora',sans-serif;}
  @media(max-width:900px){.charts-grid{grid-template-columns:1fr;}}

  /* print */
  .print-only{display:none;}
  @media print{
    @page{margin:14mm;}
    *{-webkit-print-color-adjust:exact !important;print-color-adjust:exact !important;color-adjust:exact !important;}
    .sidebar, #modal-root, .no-print{display:none !important;}
    body{display:block;background:#fff;}
    .main{padding:0;max-width:none;}
    .view{display:none !important;}
    .view.active{display:block !important;}
    .print-only{display:block !important;}
    .card{box-shadow:none;border:1px solid #ddd;break-inside:avoid;margin-bottom:10px;}
    .stat-row{grid-template-columns:repeat(3,1fr);}
    .stat-num{
      background:none !important;-webkit-background-clip:initial !important;background-clip:initial !important;
      color:var(--accent) !important;-webkit-text-fill-color:var(--accent) !important;
    }
    .charts-grid{grid-template-columns:1fr 1fr;gap:12px;}
    .donut{width:120px;height:120px;}
    .donut-center{inset:15px;}
    .table-wrap{break-inside:auto;}
    .table-wrap table{min-width:0;font-size:11px;table-layout:fixed;width:100%;}
    .table-wrap table th:last-child,
    .table-wrap table td:last-child{width:28%;white-space:normal;word-wrap:break-word;}
    thead{display:table-header-group;}
    tr{break-inside:avoid;}
  }

  @media(max-width:760px){
    body{flex-direction:column;}
    .sidebar{width:100%;display:flex;align-items:center;gap:8px;padding:14px 16px;overflow-x:auto;}
    .sidebar .brand{margin-bottom:0;margin-right:8px;flex-shrink:0;}
    .nav-item{flex-shrink:0;margin-bottom:0;white-space:nowrap;}
    #backup-status, .sidebar-divider{display:none;}
    .main{padding:18px;}
    .stat-row{grid-template-columns:repeat(2,1fr);}
    .dash-grid{grid-template-columns:1fr !important;}
    .drawer{grid-template-columns:1fr;}
    .cal-cell{min-height:60px;}
    .dash-grid{grid-template-columns:1fr;}
  }
  @media(max-width:520px){
    .roster-row{flex-wrap:wrap;gap:10px;}
    .roster-row .student-name{flex-basis:100%;}
    .seg button{padding:10px 18px;font-size:14px;}
    .detail-btn{padding:10px 14px;}
    .num-input{height:44px;width:70px;}
    .qbtn{height:44px;min-width:48px;}
    .pill{padding:9px 14px;}
  }
</style>
</head>
<body>

<div class="sidebar">
  <div class="brand"><span class="dot"></span>EFL Dashboard</div>
  <a href="../" style="display:flex;align-items:center;gap:6px;color:#7d869c;font-size:12px;text-decoration:none;margin:-16px 0 20px 2px;transition:color .15s;" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='#7d869c'">← Tool Hub</a>
  <div class="nav-item" data-view="dashboard" onclick="navigate('dashboard')">
    <div class="nav-icon-badge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11.5 12 4l9 7.5"/><path d="M5 10v9a1 1 0 0 0 1 1h4v-5h4v5h4a1 1 0 0 0 1-1v-9"/></svg></div>
    Dashboard
  </div>
  <div class="nav-item" data-view="classes" onclick="navigate('classes')">
    <div class="nav-icon-badge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3"/><path d="M2 20c0-3.3 3.1-6 7-6s7 2.7 7 6"/><circle cx="17" cy="7" r="2.5"/><path d="M21 20c0-2.7-1.8-5-4.5-5.8"/></svg></div>
    Classes &amp; Students
  </div>
  <div class="nav-item" data-view="rollcall" onclick="navigate('rollcall')">
    <div class="nav-icon-badge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="4" width="14" height="17" rx="2"/><path d="M9 3h6v3H9z"/><path d="m9 13 2 2 4-4"/></svg></div>
    Roll Call
  </div>
  <div class="nav-item" data-view="calendar" onclick="navigate('calendar')">
    <div class="nav-icon-badge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 10h18"/><path d="M8 3v4"/><path d="M16 3v4"/></svg></div>
    Calendar
  </div>
  <div class="nav-item" data-view="reports" onclick="navigate('reports')">
    <div class="nav-icon-badge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20V10"/><path d="M10 20V4"/><path d="M16 20v-7"/><path d="M3 20h18"/></svg></div>
    Reports
  </div>
  <div class="sidebar-divider"></div>
  <div id="backup-status" style="font-size:11px;color:#7d869c;padding:2px 12px 8px;"></div>
  <div class="nav-item" onclick="exportData()">

/* ---------- storage ---------- */
const STORAGE_PREFIX = 'efl-dashboard:';
async function loadKey(key, fallback){
  try{
    const raw = localStorage.getItem(STORAGE_PREFIX+key);
    return raw !== null ? JSON.parse(raw) : fallback;
  }catch(e){
    console.error('Load failed for', key, e);
    return fallback;
  }
}
async function saveKey(key, value){
  try{
    localStorage.setItem(STORAGE_PREFIX+key, JSON.stringify(value));
  }catch(e){
    console.error('Save failed for', key, e);
  }
}
const saveTimers = {};
function scheduleSave(key, value){
  if(saveTimers[key]) clearTimeout(saveTimers[key]);
  saveTimers[key] = setTimeout(()=>{
    saveKey(key, value);
    if(key==='sessions'){
      const el = document.getElementById('save-indicator');
      if(el) el.textContent = 'Saved at ' + nowTime();
    }
  }, 450);
}

/* ---------- helpers ---------- */
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function pad(n){ return String(n).padStart(2,'0'); }
function todayStr(){ const d=new Date(); return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function dateToStr(y,m,d){ return `${y}-${pad(m+1)}-${pad(d)}`; }
function nowTime(){ const d=new Date(); return pad(d.getHours())+':'+pad(d.getMinutes()); }
function formatDateLong(dateStr){
  return new Date(dateStr+'T00:00:00').toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
}
function formatDateShort(dateStr){
  return new Date(dateStr+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});
}
const DAY_ABBR = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const DAY_FULL = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
function getClassDays(cls){
  if(Array.isArray(cls.days) && cls.days.length) return cls.days;
  if(cls.schedule && SCHEDULE_DAYS[cls.schedule]) return SCHEDULE_DAYS[cls.schedule];
  return [];
}
function scheduleLabel(cls){
  const days = getClassDays(cls);
  return days.length ? days.map(d=>DAY_ABBR[d]).join(' / ') : 'No days set';
}
function classById(id){ return state.classes.find(c=>c.id===id); }
function activeClasses(){ return state.classes.filter(c=>!c.archived); }
function archivedClasses(){ return state.classes.filter(c=>c.archived); }
function studentsInClass(classId){ return state.students.filter(s=>s.classId===classId); }
function getPreviousClassDate(cls, fromDateStr){
  const days = getClassDays(cls);
  if(!days.length) return null;
  let d = new Date(fromDateStr+'T00:00:00');
  for(let i=0; i<60; i++){
    d.setDate(d.getDate()-1);
    const dateStr = dateToStr(d.getFullYear(), d.getMonth(), d.getDate());
    if(days.includes(d.getDay()) && !isHoliday(dateStr)) return dateStr;
  }
  return null;
}
function esc(str){
  return String(str ?? '').replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function eventTypeLabel(type){ return {hw:'Homework',test:'Test',project:'Project',other:'Other'}[type] || type; }
function attendanceLabel(a){ return {present:'Present',late:'Late',absent:'Absent'}[a] || '—'; }
function attendanceBadgeClass(a){ return {present:'green',late:'amber',absent:'red'}[a] || ''; }
function englishLabel(e){ return {excellent:'Excellent',improve:'Needs some reminders',unacceptable:'Needs consistent reminders'}[e] || '—'; }
function englishBadgeClass(e){ return {excellent:'green',improve:'amber',unacceptable:'red'}[e] || ''; }
function splitSessionKey(key){ const i=key.indexOf('_'); return [key.slice(0,i), key.slice(i+1)]; }
function defaultRecord(){ return {attendance:'present', lateMin:0, leftEarlyMin:0, phone:0, hw:100, english:'excellent', participation:'good', notes:''}; }
function getHoliday(dateStr){ return state.holidays.find(h=>h.date===dateStr); }
function isHoliday(dateStr){ return !!getHoliday(dateStr); }
function expectedSessionsForClass(cls, startOverride, endOverride){
  const days = getClassDays(cls);
  if(!days.length) return null;
  const startStr = startOverride || cls.startDate;
  const endStr = endOverride || cls.endDate;
  if(!startStr || !endStr) return null;
  const start = new Date(startStr+'T00:00:00');
  const end = new Date(endStr+'T00:00:00');
  if(start>end) return 0;
  let count=0;
  let d = new Date(start);
  while(d<=end){
    const dow = d.getDay();
    const dateStr = dateToStr(d.getFullYear(), d.getMonth(), d.getDate());
    if(days.includes(dow) && !isHoliday(dateStr)) count++;
    d.setDate(d.getDate()+1);
  }
  return count;
}
function renderDonut(slices, centerLabel, centerSub){
  const total = slices.reduce((s,x)=>s+x.value,0);
  const size=140, stroke=20, r=(size-stroke)/2, c=2*Math.PI*r;
  let acc=0;
  const segs = total ? slices.filter(sl=>sl.value>0).map(sl=>{
    const len = sl.value/total*c;
    const dashoffset = c - acc;
    acc += len;
    return `<circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${sl.color}" stroke-width="${stroke}" stroke-dasharray="${len.toFixed(2)} ${(c-len).toFixed(2)}" stroke-dashoffset="${dashoffset.toFixed(2)}" transform="rotate(-90 ${size/2} ${size/2})"/>`;
  }).join('') : `<circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="var(--border)" stroke-width="${stroke}"/>`;
  return `
    <div class="donut-wrap">
      <div class="donut">
        <svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">${segs}</svg>
        <div class="donut-center">
          <div class="donut-num">${centerLabel}</div>
          <div class="donut-sub">${centerSub}</div>
        </div>
      </div>
      <div class="donut-legend">
        ${slices.map(sl=>`<div class="legend-item"><svg width="10" height="10" viewBox="0 0 10 10" style="flex-shrink:0;"><circle cx="5" cy="5" r="5" fill="${sl.color}"/></svg>${sl.label}: ${sl.value}${sl.unit||''}${total?` (${Math.round(sl.value/total*100)}%)`:''}</div>`).join('')}
      </div>
    </div>`;
}
