<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EFL Teacher Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link id="theme-fonts" href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script>
/* Theme boot. Runs before first paint so a dark theme never flashes white.
   Duplicates the THEME_FONTS map below by necessity: the app's <script> has not parsed yet. */
(function(){
  var F = {
    classic:"family=Sora:wght@500;600;700&family=Inter:wght@400;500;600",
    caderno:"family=Archivo:wght@400;500;600;700&family=Space+Mono:wght@400;700",
    riso:"family=Space+Grotesk:wght@400;500;700&family=DM+Mono:wght@400;500",
    estacao:"family=Barlow+Condensed:wght@500;600;700&family=Barlow:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600",
    noturno:"family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Karla:wght@400;500;600;700"
  };
  var t="classic", s=1;
  try{
    var ui = JSON.parse(localStorage.getItem("efl-dashboard:ui") || "{}");
    if(F[ui.theme]) t = ui.theme;
    if(ui.scale >= 0.9 && ui.scale <= 1.25) s = ui.scale;
  }catch(e){}
  document.documentElement.setAttribute("data-theme", t);
  document.documentElement.style.setProperty("--ui-scale", s);
  var B=["plain","grid","lines","dots","diag","weave","soft","confetti"];
  try{ if(ui.bg && B.indexOf(ui.bg)>=0) document.documentElement.setAttribute("data-bg", ui.bg); }catch(e){}
  document.getElementById("theme-fonts").href =
    "https://fonts.googleapis.com/css2?" + F[t] + "&display=swap";
})();
</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  /* ================= THEME TOKENS =================
     Every colour, font and radius in the app resolves through these.
     A theme is a block below that overrides them; nothing else changes.
  */
  :root{
    --sched:var(--accent);
    /* type */
    --font-body:'Inter',sans-serif;
    --font-head:'Sora',sans-serif;
    --font-mono:'Inter',sans-serif;
    --ui-scale:1;

    /* shell */
    --pattern-ink:rgba(28,36,54,.08);
    --bg:#f4f6fb;
    --bg-image:
      radial-gradient(circle at 100% 0%, #eef1fd 0%, transparent 45%),
      radial-gradient(circle at 0% 100%, #eef7f3 0%, transparent 40%);
    --sidebar-bg:
      radial-gradient(circle at 25% 0%, rgba(79,109,245,.35), transparent 55%),
      radial-gradient(circle at 90% 80%, rgba(139,92,246,.18), transparent 50%),
      linear-gradient(165deg, #1c2436 0%, #20283e 55%, #181f30 100%);
    --sidebar-border:transparent;
    --sidebar-text:#aab3c9;
    --sidebar-strong:#ffffff;
    --sidebar-hover:rgba(255,255,255,.05);
    --sidebar-active:rgba(255,255,255,.06);
    --sidebar-badge:rgba(255,255,255,.06);
    --sidebar-badge-hover:rgba(255,255,255,.12);
    --sidebar-divider:rgba(255,255,255,.08);
    --sidebar-focus:#ffffff;

    /* surfaces */
    --card:#ffffff;
    --surface:#ffffff;          /* inputs, buttons, modals, table heads */
    --surface-alt:#fafbfd;
    --border:#e3e7f0;
    --text:#1c2436;
    --muted:#7d869c;

    /* accents */
    --accent:#4f6df5;
    --accent-soft:#e8ecff;
    --accent-grad: linear-gradient(135deg, #4f6df5 0%, #8b5cf6 100%);
    --on-accent:#ffffff;
    --accent-glow:rgba(79,109,245,.6);

    --green:#1f9d6f;  --green-soft:#e3f7ee;
    --amber:#c98a1c;  --amber-soft:#fbf0dc;
    --red:#d1453d;    --red-soft:#fbe6e4;
    --purple:#8b5cf6; --purple-soft:#efe7ff;
    --gray:#6b7280;   --gray-soft:#eef0f4;
    --teal:#0ea5b8;

    --stripe-a:#ffffff; --stripe-b:#eef0f6;
    --card-shadow:0 1px 2px rgba(16,24,40,.04), 0 8px 24px -12px rgba(16,24,40,.12);
    --radius:16px;
    --radius-sm:10px;
    --border-w:1px;
    color-scheme:light;
  }

  /* ---- 1. Caderno — squared paper, ink, red pen ---- */
  [data-theme="caderno"]{
    --pattern-ink:rgba(22,48,92,.12);
    --font-body:'Archivo',sans-serif;
    --font-head:'Archivo',sans-serif;
    --font-mono:'Space Mono',monospace;
    --bg:#FBFAF6;
    --bg-image:
      linear-gradient(#DFE4EE 1px, transparent 1px),
      linear-gradient(90deg, #DFE4EE 1px, transparent 1px);
    --bg-size:22px 22px;
    --sidebar-bg:rgba(251,250,246,.9);
    --sidebar-border:#E8A9A0;
    --sidebar-text:#16305C;
    --sidebar-strong:#16305C;
    --sidebar-hover:rgba(22,48,92,.05);
    --sidebar-active:rgba(22,48,92,.07);
    --sidebar-badge:rgba(22,48,92,.06);
    --sidebar-badge-hover:rgba(22,48,92,.12);
    --sidebar-divider:#D9DCD4;
    --sidebar-focus:#D8402F;
    --card:#FBFAF6; --surface:#FBFAF6; --surface-alt:#F3F2EC;
    --border:#D9DCD4; --text:#16305C; --muted:#5C6472;
    --accent:#2E5AAC; --accent-soft:#E2E9F6; --accent-grad:#2E5AAC;
    --on-accent:#FBFAF6; --accent-glow:rgba(46,90,172,.35);
    --green:#2F6B4F; --green-soft:#E4EEE8;
    --amber:#9C6A12; --amber-soft:#F5EBD8;
    --red:#D8402F;   --red-soft:#F8E2DE;
    --purple:#6B4FA8;--purple-soft:#E9E4F3;
    --gray:#5C6472;  --gray-soft:#ECEDE8;
    --teal:#1F6E77;
    --stripe-a:#FBFAF6; --stripe-b:#EDEFE8;
    --card-shadow:none;
    --radius:3px; --radius-sm:2px; --border-w:1px;
  }

  /* ---- 2. Risograph — flat overprint inks ---- */
  [data-theme="riso"]{
    --pattern-ink:rgba(29,69,196,.11);
    --font-body:'Space Grotesk',sans-serif;
    --font-head:'Space Grotesk',sans-serif;
    --font-mono:'DM Mono',monospace;
    --bg:#EBF0E7;
    --bg-image:none;
    --sidebar-bg:#EBF0E7;
    --sidebar-border:#14140F;
    --sidebar-text:#14140F;
    --sidebar-strong:#14140F;
    --sidebar-hover:#FFC800;
    --sidebar-active:#FF3E9A;
    --sidebar-badge:transparent;
    --sidebar-badge-hover:transparent;
    --sidebar-divider:#14140F;
    --sidebar-focus:#1D45C4;
    --card:#EBF0E7; --surface:#EBF0E7; --surface-alt:#E1E8DC;
    --border:#14140F; --text:#14140F; --muted:#6E7466;
    --accent:#FF3E9A; --accent-soft:#FFE1EF; --accent-grad:#FF3E9A;
    --on-accent:#EBF0E7; --accent-glow:rgba(255,62,154,.4);
    --green:#1D45C4; --green-soft:#DDE3F7;
    --amber:#8A6A00; --amber-soft:#FFC800;
    --red:#FF3E9A;   --red-soft:#FFE1EF;
    --purple:#1D45C4;--purple-soft:#DDE3F7;
    --gray:#6E7466;  --gray-soft:#E1E8DC;
    --teal:#1D45C4;
    --sched:#8A6A00;
    --stripe-a:#EBF0E7; --stripe-b:#DCE4D7;
    --card-shadow:none;
    --radius:0px; --radius-sm:0px; --border-w:2px;
  }

  /* ---- 3. Estacao — Curitiba BRT signage ---- */
  [data-theme="estacao"]{
    --pattern-ink:rgba(27,31,34,.09);
    --font-body:'Barlow',sans-serif;
    --font-head:'Barlow Condensed',sans-serif;
    --font-mono:'IBM Plex Mono',monospace;
    --bg:#F4F5F3;
    --bg-image:none;
    --sidebar-bg:#1B1F22;
    --sidebar-border:transparent;
    --sidebar-text:#9FB6C0;
    --sidebar-strong:#ffffff;
    --sidebar-hover:rgba(255,255,255,.06);
    --sidebar-active:rgba(232,68,42,.16);
    --sidebar-badge:rgba(255,255,255,.06);
    --sidebar-badge-hover:rgba(255,255,255,.12);
    --sidebar-divider:rgba(255,255,255,.12);
    --sidebar-focus:#E8442A;
    --card:#ffffff; --surface:#ffffff; --surface-alt:#FAFBFA;
    --border:#D5D9D6; --text:#1B1F22; --muted:#3A4247;
    --accent:#E8442A; --accent-soft:#FCE4DF; --accent-grad:#E8442A;
    --on-accent:#ffffff; --accent-glow:rgba(232,68,42,.45);
    --green:#1E7A4F; --green-soft:#E0F0E8;
    --amber:#B37E00; --amber-soft:#FFF3D6;
    --red:#E8442A;   --red-soft:#FCE4DF;
    --purple:#4A5C8A;--purple-soft:#E4E8F2;
    --gray:#3A4247;  --gray-soft:#ECEEED;
    --teal:#0F6E7A;
    --sched:#2456A6;
    --stripe-a:#ffffff; --stripe-b:#E9ECEA;
    --card-shadow:none;
    --radius:2px; --radius-sm:2px; --border-w:1px;
  }

  /* ---- 4. Noturno — evening desk lamp ---- */
  [data-theme="noturno"]{
    --pattern-ink:rgba(242,244,248,.07);
    --font-body:'Karla',sans-serif;
    --font-head:'Fraunces',serif;
    --font-mono:'Karla',sans-serif;
    --bg:#0E1420;
    --bg-image:
      radial-gradient(760px 520px at 12% 4%, rgba(242,180,90,.13), transparent 62%),
      radial-gradient(560px 420px at 88% 96%, rgba(63,167,155,.07), transparent 60%);
    --sidebar-bg:#0B111B;
    --sidebar-border:#232E42;
    --sidebar-text:#8A93A6;
    --sidebar-strong:#E9E5DC;
    --sidebar-hover:#161E2E;
    --sidebar-active:#1D2739;
    --sidebar-badge:rgba(255,255,255,.05);
    --sidebar-badge-hover:rgba(255,255,255,.1);
    --sidebar-divider:#232E42;
    --sidebar-focus:#F2B45A;
    --card:#161E2E; --surface:#1D2739; --surface-alt:#131A28;
    --border:#232E42; --text:#E9E5DC; --muted:#8A93A6;
    --accent:#F2B45A; --accent-soft:#2A2416; --accent-grad:#F2B45A;
    --on-accent:#201603; --accent-glow:rgba(242,180,90,.45);
    --green:#3FA79B; --green-soft:#122A2A;
    --amber:#F2B45A; --amber-soft:#2A2416;
    --red:#E86A5E;   --red-soft:#2C1A19;
    --purple:#9A8BD0;--purple-soft:#221E33;
    --gray:#8A93A6;  --gray-soft:#1B2333;
    --teal:#3FA79B;
    --stripe-a:#161E2E; --stripe-b:#1B2333;
    --card-shadow:0 10px 30px -18px rgba(0,0,0,.8);
    --radius:14px; --radius-sm:9px; --border-w:1px;
    color-scheme:dark;
  }
  /* ================= BACKGROUNDS =================
     A second, theme-independent axis. Each option overrides only the
     pattern (--bg-image/--bg-size); the base color and inks come from the
     active theme, so every background works with every theme. */
  html[data-bg="plain"]{ --bg-image:none; --bg-size:auto; }
  html[data-bg="grid"]{
    --bg-image:linear-gradient(var(--pattern-ink) 1px, transparent 1px),
               linear-gradient(90deg, var(--pattern-ink) 1px, transparent 1px);
    --bg-size:22px 22px; }
  html[data-bg="lines"]{
    --bg-image:linear-gradient(var(--pattern-ink) 1px, transparent 1px);
    --bg-size:100% 27px; }
  html[data-bg="dots"]{
    --bg-image:radial-gradient(var(--pattern-ink) 1.2px, transparent 1.3px);
    --bg-size:18px 18px; }
  html[data-bg="diag"]{
    --bg-image:repeating-linear-gradient(45deg, var(--pattern-ink) 0 1px, transparent 1px 14px);
    --bg-size:auto; }
  html[data-bg="weave"]{
    --bg-image:repeating-linear-gradient(45deg, var(--pattern-ink) 0 1px, transparent 1px 16px),
               repeating-linear-gradient(-45deg, var(--pattern-ink) 0 1px, transparent 1px 16px);
    --bg-size:auto; }
  html[data-bg="soft"]{
    --bg-image:radial-gradient(circle at 85% 8%, var(--accent-soft) 0%, transparent 52%),
               radial-gradient(circle at 8% 92%, var(--accent-soft) 0%, transparent 46%);
    --bg-size:auto; }
  html[data-bg="confetti"]{
    --bg-image:radial-gradient(var(--accent-glow) 1.5px, transparent 1.6px),
               radial-gradient(var(--pattern-ink) 1.3px, transparent 1.4px);
    --bg-size:47px 47px, 31px 31px;
    --bg-pos:0 0, 14px 19px; }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:var(--font-body);
    background-color:var(--bg);
    background-image:var(--bg-image);
    background-size:var(--bg-size, auto);
    background-position:var(--bg-pos, 0 0);
    color:var(--text);
    display:flex;
    min-height:100vh;
  }
  h1,h2,h3{font-family:var(--font-head);margin:0;}
  a{color:var(--accent);cursor:pointer;}

  .app-hidden{display:none !important;}

  /* Sidebar */
  .sidebar{
    width:230px;
    background:var(--sidebar-bg);
    border-right:var(--border-w) solid var(--sidebar-border);
    color:var(--sidebar-text);
    padding:24px 18px;
    flex-shrink:0;
    zoom:var(--ui-scale);
  }
  .sidebar .brand{
    font-family:var(--font-head);
    font-weight:700;
    font-size:18px;
    letter-spacing:-.01em;
    color:var(--sidebar-strong);
    margin-bottom:28px;
    display:flex;
    align-items:center;
    gap:10px;
  }
  .sidebar .brand .dot{
    width:10px;height:10px;border-radius:50%;
    background:var(--accent-grad);
    box-shadow:0 0 10px rgba(79,109,245,.8);
  }
  .nav-item{
    display:flex;align-items:center;gap:12px;
    padding:9px 12px;border-radius:12px;
    font-size:14px;font-weight:500;
    margin-bottom:4px;cursor:pointer;
    color:var(--sidebar-text);
    transition:background .15s, color .15s;
  }
  .nav-item:hover{color:var(--sidebar-strong);background:var(--sidebar-hover);}
  .nav-item.active{
    background:var(--sidebar-active);
    color:var(--sidebar-strong);
  }
  .nav-icon-badge{
    width:30px;height:30px;border-radius:9px;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    background:var(--sidebar-badge);
    color:var(--sidebar-text);
    transition:background .15s, color .15s, box-shadow .15s;
  }
  .nav-icon-badge svg{width:16px;height:16px;}
  .nav-item:hover .nav-icon-badge{background:var(--sidebar-badge-hover);color:var(--sidebar-strong);}
  .nav-item.active .nav-icon-badge{
    background:var(--accent-grad);
    color:var(--on-accent);
    box-shadow:0 4px 14px -2px var(--accent-glow);
  }
  .sidebar-divider{height:1px;background:var(--sidebar-divider);margin:10px 4px 10px;}

  /* Main */
  .main{flex:1;padding:28px 36px;max-width:1180px;zoom:var(--ui-scale);}
  .view{display:none;}
  .view.active{display:block;}

  .topbar{
    display:flex;justify-content:space-between;align-items:flex-start;
    margin-bottom:18px;flex-wrap:wrap;gap:12px;
  }
  .topbar h1{font-size:24px;letter-spacing:-.01em;}
  .topbar .meta{color:var(--muted);font-size:13px;margin-top:4px;}
  .back-btn{margin-bottom:8px;}

  /* shared */
  .card{
    background:var(--card);border:var(--border-w) solid var(--border);border-radius:var(--radius);
    box-shadow:var(--card-shadow);
  }
  .badge{font-size:11px;font-weight:600;padding:3px 9px;border-radius:999px;}
  .badge.green{background:var(--green-soft);color:var(--green);}
  .badge.amber{background:var(--amber-soft);color:var(--amber);}
  .badge.red{background:var(--red-soft);color:var(--red);}
  .badge.hw, .cal-tag.hw{background:var(--accent-soft);color:var(--accent);}
  .badge.test, .cal-tag.test{background:var(--red-soft);color:var(--red);}
  .badge.review, .cal-tag.review{background:var(--amber-soft);color:var(--amber);}
  .badge.project, .cal-tag.project{background:var(--purple-soft);color:var(--purple);}
  .badge.other, .cal-tag.other{background:var(--gray-soft);color:var(--gray);}

  .btn-accent{
    background:var(--accent-grad);color:var(--on-accent);border:none;border-radius:var(--radius-sm);
    padding:10px 18px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;
    box-shadow:0 4px 14px -4px rgba(79,109,245,.5);
    transition:transform .15s, box-shadow .15s, filter .15s;
  }
  .btn-accent:hover{filter:brightness(1.06);transform:translateY(-1px);box-shadow:0 6px 18px -4px rgba(79,109,245,.6);}
  .btn-ghost{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:9px 16px;font-size:13px;font-weight:600;cursor:pointer;color:var(--text);font-family:inherit;}
  .btn-ghost:hover{border-color:var(--accent);color:var(--accent);}
  .btn-ghost.small{padding:6px 12px;font-size:12px;}
  .icon-btn{background:none;border:1px solid var(--border);border-radius:8px;padding:5px 10px;font-size:12px;font-weight:600;cursor:pointer;color:var(--muted);font-family:inherit;}
  /* Class-plan rich editor */
  .plan-toolbar{display:flex;align-items:center;gap:2px;flex-wrap:wrap;padding:6px 8px;border-bottom:1px solid var(--border);background:var(--gray-soft);border-radius:inherit;border-bottom-left-radius:0;border-bottom-right-radius:0;}
  .plan-tb-btn{background:none;border:1px solid transparent;border-radius:6px;min-width:28px;height:28px;padding:0 6px;font-size:13px;cursor:pointer;color:var(--text);font-family:inherit;display:inline-flex;align-items:center;justify-content:center;}
  .plan-tb-btn:hover{background:var(--accent-soft);border-color:var(--border);}
  .plan-tb-sep{width:1px;height:18px;background:var(--border);margin:0 4px;}
  .plan-editor:empty::before{content:attr(data-placeholder);color:var(--muted);pointer-events:none;}
  .plan-editor ul,.plan-editor ol{margin:4px 0;padding-left:22px;}
  .plan-editor:focus{outline:none;}
  /* Class points (ClassDojo-style) */
  .pts-ctrl{display:flex;align-items:center;gap:4px;margin-right:8px;}
  .pts-btn{width:26px;height:26px;border-radius:50%;border:1px solid var(--border);background:none;cursor:pointer;font-size:15px;line-height:1;font-family:inherit;display:inline-flex;align-items:center;justify-content:center;color:var(--muted);}
  .pts-btn.plus:hover{background:#e7f6ec;color:#1c7c3c;border-color:#1c7c3c;}
  .pts-btn.minus:hover{background:#fdeaea;color:#b3261e;border-color:#b3261e;}
  .pts-chip{border:1px solid var(--border);background:var(--accent-soft);color:var(--accent);border-radius:999px;padding:3px 10px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;}
  .pts-chip.neg{background:#fdeaea;color:#b3261e;}
  .pts-total{font-size:32px;font-weight:800;color:var(--accent);}
  .pts-total.neg{color:#b3261e;}
  .pts-total.small{font-size:15px;font-weight:800;color:var(--accent);}
  .pts-total.small.neg{color:#b3261e;}
  .pts-preset-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
  .pts-preset{border:1px solid var(--border);border-radius:10px;background:none;padding:8px 10px;font-size:13px;font-family:inherit;cursor:pointer;text-align:left;display:flex;align-items:center;gap:7px;}
  .pts-preset b{margin-left:auto;}
  .pts-preset.pos:hover{background:#e7f6ec;border-color:#1c7c3c;}
  .pts-preset.neg:hover{background:#fdeaea;border-color:#b3261e;}
  .pts-preset.pos b{color:#1c7c3c;}
  .pts-preset.neg b{color:#b3261e;}
  .pts-history{max-height:220px;overflow-y:auto;border:1px solid var(--border);border-radius:10px;padding:4px 8px;}
  .pts-hist-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);font-size:13px;}
  .pts-hist-row:last-child{border-bottom:none;}
  .pts-delta{font-weight:800;min-width:28px;text-align:center;border-radius:6px;padding:1px 4px;font-size:12px;}
  .pts-delta.pos{background:#e7f6ec;color:#1c7c3c;}
  .pts-delta.neg{background:#fdeaea;color:#b3261e;}
  .pts-board{border:1px solid var(--border);border-radius:10px;padding:4px 10px;max-height:340px;overflow-y:auto;}
  .pts-board-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);}
  .pts-board-row:last-child{border-bottom:none;}
  @media (max-width:700px){ .pts-ctrl{gap:2px;margin-right:4px;} .pts-btn{width:30px;height:30px;} }
  /* Trends sparklines */
  .spark{display:block;}
  .spark-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);width:190px;max-width:100%;}
  .spark-empty{font-size:12px;color:var(--muted);padding:8px 0;}
  .trend-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:12px;}
  .trend-block{border:1px solid var(--border);border-radius:10px;padding:10px 12px;}
  .trend-title{font-size:12px;font-weight:700;color:var(--muted);margin-bottom:6px;}
  /* Activities (A–F) */
  .act-skill-row{display:flex;gap:6px;flex-wrap:wrap;}
  .act-skill-opt input{position:absolute;opacity:0;}
  .act-skill-opt span{display:inline-block;border:1px solid var(--border);border-radius:999px;padding:6px 12px;font-size:13px;cursor:pointer;}
  .act-skill-opt input:checked + span{border-color:var(--accent);background:var(--accent-soft);color:var(--accent);font-weight:700;}
  .act-item{display:flex;align-items:center;gap:8px;width:100%;border:1px solid var(--border);border-radius:8px;background:var(--surface);padding:8px 10px;font-family:inherit;font-size:13px;color:var(--text);cursor:pointer;margin-bottom:6px;}
  .act-item:hover{border-color:var(--accent);}
  .act-grade-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);}
  .act-letter-seg{display:flex;gap:3px;}
  .act-letter{width:32px;height:30px;border:1px solid var(--border);border-radius:7px;background:none;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;color:var(--muted);}
  .act-letter.on{color:#fff;border-color:transparent;}
  .act-letter.on.ga{background:#1c7c3c;}
  .act-letter.on.gm{background:var(--accent);}
  .act-letter.on.gf{background:#b3261e;}
  @media (max-width:700px){ .act-letter{width:36px;height:34px;} }
  .icon-btn.danger{color:var(--red);border-color:var(--red-soft);}
  .icon-btn.danger:hover{background:var(--red-soft);}
  .icon-btn.ec-on{color:var(--amber);border-color:var(--amber-soft);background:var(--amber-soft);}

  .empty{color:var(--muted);font-size:13px;padding:8px 0;}
  .empty-card{padding:34px;text-align:center;color:var(--muted);font-size:14px;}
  .empty-card .btn-accent{margin-top:14px;}
  .color-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;display:inline-block;}

  /* stat row */
  .stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin-bottom:18px;}
  .stat{padding:16px;text-align:center;}
  .stat-num{
    font-family:var(--font-head);font-size:26px;font-weight:700;
    background:var(--accent-grad);-webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .stat-label{font-size:12px;color:var(--muted);margin-top:4px;}

  /* dashboard */
  .dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  .section{padding:18px;}
  .section h3{margin-bottom:12px;font-size:15px;}
  .dash-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);gap:10px;}
  .dash-row:last-child{border-bottom:none;}
  .dash-row-left{display:flex;align-items:center;gap:10px;}
  .dash-row-title{font-weight:600;font-size:13px;}
  .dash-row-sub{font-size:12px;color:var(--muted);margin-top:2px;}
  @media(max-width:900px){.dash-grid{grid-template-columns:1fr;}}

  /* classes & students */
  .class-card{margin-bottom:12px;overflow:hidden;}
  .class-card-head{display:flex;justify-content:space-between;align-items:center;padding:16px;gap:10px;}
  .class-card-head .dash-row-left{flex:1;cursor:pointer;}
  .class-card-actions{display:flex;gap:8px;align-items:center;flex-shrink:0;}
  .chevron{color:var(--muted);font-size:14px;width:14px;text-align:center;}
  .class-card-body{border-top:1px solid var(--border);padding:16px;}
  .add-student-row{display:flex;gap:8px;margin-bottom:12px;}
  .add-student-row input{flex:1;border:1px solid var(--border);border-radius:8px;padding:9px 11px;font-family:inherit;font-size:13px;}
  .student-list-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;}
  .student-list-row:last-child{border-bottom:none;}
  .student-name-link{cursor:pointer;font-weight:500;}
  .student-name-link:hover{color:var(--accent);text-decoration:underline;}

  /* modal */
  .modal-overlay{position:fixed;inset:0;background:rgba(28,36,54,.45);display:flex;align-items:center;justify-content:center;z-index:50;padding:20px;}
  .modal{background:var(--card);border-radius:var(--radius);zoom:var(--ui-scale);padding:24px;width:100%;max-width:440px;max-height:85vh;overflow-y:auto;}
  .modal:focus{outline:none;}
  .modal h3{margin-bottom:16px;font-size:18px;}
  .modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:18px;}
  .modal-section{margin-bottom:16px;}
  .modal-section-label{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px;}
  .modal-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;gap:10px;}
  .modal-row:last-child{border-bottom:none;}
  .modal-row .color-dot{margin-right:6px;}
  .field-row{display:flex;gap:8px;}
  .field-row select{flex:1;}

  .field{margin-bottom:12px;}
  .field label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px;}
  .field.full{grid-column:1/-1;}
  .field input, .field select, .modal select, .modal input{
    width:100%;border:1px solid var(--border);border-radius:8px;padding:9px 11px;font-family:inherit;font-size:14px;
  }
  input, select, textarea{background:var(--surface);color:var(--text);}
  input::placeholder, textarea::placeholder{color:var(--muted);opacity:1;}
  .swatches{display:flex;gap:8px;flex-wrap:wrap;}
  .swatch{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent;}
  .swatch.on{border-color:var(--text);}

  /* roll call */
  .rollcall-controls{display:flex;gap:10px;flex-wrap:wrap;}
  .rollcall-controls select, .rollcall-controls input{border:1px solid var(--border);border-radius:10px;padding:8px 12px;font-family:inherit;font-size:13px;background:#fff;}
  .warn-banner{background:var(--amber-soft);color:var(--amber);border-radius:10px;padding:10px 14px;font-size:13px;margin-bottom:14px;font-weight:500;}
  .rollcall-actions{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
  .save-indicator{font-size:12px;color:var(--muted);}

  .roster-list{display:flex;flex-direction:column;padding:6px 0;}
  .roster-row{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;gap:14px;cursor:pointer;}
  .roster-row + .roster-row, .drawer + .roster-row{border-top:1px solid var(--border);}
  .student-name{font-weight:600;font-size:14px;flex:1;}
  .seg{display:flex;border:1px solid var(--border);border-radius:10px;overflow:hidden;}
  .seg button{border:none;background:var(--surface);padding:7px 14px;font-size:13px;font-weight:600;cursor:pointer;color:var(--muted);font-family:inherit;}
  .seg button + button{border-left:1px solid var(--border);}
  .seg button.present.on{background:var(--green-soft);color:var(--green);}
  .seg button.late.on{background:var(--amber-soft);color:var(--amber);}
  .seg button.absent.on{background:var(--red-soft);color:var(--red);}
  .detail-btn{border:1px solid var(--border);background:var(--surface);border-radius:10px;padding:7px 12px;font-size:13px;font-weight:600;color:var(--accent);font-family:inherit;}

  .drawer{padding:0 16px;background:var(--bg);display:none;grid-template-columns:repeat(2,1fr);gap:14px;}
  .roster-row.open + .drawer{display:grid;padding:16px;border-top:1px solid var(--border);}

  .stepper{display:flex;align-items:center;gap:10px;}
  .stepper button{width:28px;height:28px;border-radius:8px;border:1px solid var(--border);background:var(--surface);font-size:15px;cursor:pointer;font-family:inherit;}
  .stepper .val{font-weight:600;min-width:50px;text-align:center;font-size:13px;}
  .quick-num{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
  .num-input{width:64px;height:38px;border:1px solid var(--border);border-radius:8px;padding:6px 8px;font-family:inherit;font-size:14px;font-weight:600;text-align:center;}
  .qbtn{min-width:44px;height:38px;border-radius:8px;border:1px solid var(--border);background:var(--surface);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--accent);}
  .qbtn:hover{background:var(--accent-soft);}
  .qbtn.zero{color:var(--muted);}
  .ro-val{font-size:14px;font-weight:600;padding:7px 0;color:var(--text);}
  .locked-session .seg button[disabled]{opacity:.55;cursor:not-allowed;}
  .pill-group{display:flex;gap:6px;flex-wrap:wrap;}
  .pill{border:1px solid var(--border);background:var(--surface);border-radius:999px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;color:var(--muted);}
  .pill.on.green{background:var(--green-soft);color:var(--green);border-color:var(--green);}
  .pill.on.amber{background:var(--amber-soft);color:var(--amber);border-color:var(--amber);}
  .pill.on.red{background:var(--red-soft);color:var(--red);border-color:var(--red);}
  textarea{width:100%;border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-family:inherit;font-size:13px;resize:vertical;min-height:50px;}

  /* tables */
  .table-wrap{overflow-x:auto;border-radius:var(--radius);}
  .hist-legend{display:flex;flex-wrap:wrap;gap:4px 14px;margin-top:10px;font-size:11px;color:var(--muted);align-items:baseline;}
  .hist-legend-item{white-space:nowrap;}
  .hist-legend-item b{color:var(--text);}
  .contact-list{display:flex;flex-direction:column;gap:10px;}
  .contact-entry{border:1px solid var(--border);border-radius:10px;padding:12px 14px;break-inside:avoid;}
  .contact-entry-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
  table{width:100%;border-collapse:collapse;font-size:13px;min-width:760px;}
  th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);padding:10px 12px;background:var(--surface-alt);border-bottom:1px solid var(--border);white-space:nowrap;}
  td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle;}
  td:last-child{white-space:normal;min-width:140px;max-width:260px;word-wrap:break-word;}
  tr:last-child td{border-bottom:none;}

  /* calendar */
  .cal-nav{display:flex;align-items:center;gap:10px;}
  .cal-month-label{font-family:var(--font-head);font-weight:600;font-size:15px;min-width:140px;text-align:center;}
  .cal-grid-wrap{padding:16px;}
  .cal-weekdays{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:8px;}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
  .cal-grid-week .cal-cell{min-height:220px;}
  @media (max-width:700px){ .cal-grid-week{grid-template-columns:1fr;} .cal-grid-week .cal-cell{min-height:auto;} }
  .cal-cell{border:1px solid var(--border);border-radius:10px;padding:8px;min-height:90px;cursor:pointer;display:flex;flex-direction:column;gap:4px;}
  .cal-cell:hover{border-color:var(--accent);}
  .cal-cell.empty{border:none;cursor:default;background:transparent;}
  .cal-cell.empty:hover{border:none;}
  .cal-cell.today{background:var(--accent-soft);border-color:var(--accent);}
  .cal-date{font-weight:600;font-size:13px;}
  .cal-items{display:flex;flex-direction:column;gap:3px;overflow:hidden;}
  .cal-tag{font-size:10px;font-weight:600;padding:2px 6px;border-radius:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;border:1px solid transparent;}
  .cal-legend{display:flex;gap:16px;flex-wrap:wrap;margin-top:14px;font-size:12px;color:var(--muted);align-items:center;}
  .legend-item{display:flex;align-items:center;gap:6px;}
  .cal-cell.holiday{background:repeating-linear-gradient(45deg, var(--stripe-a) 0 8px, var(--stripe-b) 8px 16px);}
  .cal-tag.holiday-tag{background:var(--purple-soft);color:var(--purple);}
  .cal-tag.priv-tag{background:var(--surface);color:var(--teal);border:1px dashed var(--teal);font-weight:600;cursor:pointer;}
  .cal-tag.priv-tag:hover{background:var(--accent-soft);}
  .tab{padding:9px 16px;border-radius:999px;font-size:13px;font-weight:600;border:1px solid var(--border);background:var(--card);cursor:pointer;color:var(--muted);}
  .tab.active{background:var(--accent-grad);color:var(--on-accent);border-color:transparent;}
  .tabs{display:flex;gap:8px;flex-wrap:wrap;}

  /* charts */
  .charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:18px;}
  .chart-card{padding:18px;}
  .chart-card h3{margin-bottom:6px;font-size:15px;}
  .chart-card .chart-note{font-size:12px;color:var(--muted);margin-bottom:14px;}
  .donut-wrap{display:flex;align-items:center;gap:20px;flex-wrap:wrap;}
  .donut{width:140px;height:140px;border-radius:50%;position:relative;flex-shrink:0;}
  .donut svg{display:block;width:100%;height:100%;}
  .donut-center{position:absolute;inset:18px;background:var(--card);border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;}
  .donut-num{font-family:var(--font-head);font-weight:700;font-size:20px;}
  .donut-sub{font-size:11px;color:var(--muted);}
  .donut-legend{display:flex;flex-direction:column;gap:6px;font-size:13px;flex:1;}
  .lost-summary{font-size:13px;line-height:1.7;}
  .lost-summary b{font-family:var(--font-head);}
  @media(max-width:900px){.charts-grid{grid-template-columns:1fr;}}

  /* toast (undo) */
  #toast-root{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);z-index:2000;display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none;}
  .toast{pointer-events:auto;background:var(--text);color:var(--bg);border-radius:12px;padding:11px 16px;font-size:13px;display:flex;align-items:center;gap:14px;box-shadow:0 6px 24px rgba(0,0,0,.25);max-width:90vw;animation:toast-in .18s ease;}
  .toast button{background:none;border:none;color:var(--bg);font-weight:700;font-family:inherit;font-size:13px;cursor:pointer;text-decoration:underline;padding:0;white-space:nowrap;}
  @keyframes toast-in{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

  /* print */
  .print-only{display:none;}
  @media print{
    @page{margin:14mm;}
    *{-webkit-print-color-adjust:exact !important;print-color-adjust:exact !important;color-adjust:exact !important;}
    .sidebar, #modal-root, .no-print{display:none !important;}
    /* Themes are for the screen. Paper is always paper. */
    html[data-theme]{
      --bg:#fff; --bg-image:none; --card:#fff; --surface:#fff; --surface-alt:#fff;
      --text:#000; --muted:#444; --border:#ddd; --card-shadow:none;
      --stripe-a:#fff; --stripe-b:#eee; --on-accent:#fff; --ui-scale:1;
    }
    body{display:block;background:#fff;}
    .main{padding:0;max-width:none;}
    .view{display:none !important;}
    .view.active{display:block !important;}
    .print-only{display:block !important;}
    .card{box-shadow:none;border:1px solid #ddd;break-inside:avoid;margin-bottom:10px;}
    .stat-row{grid-template-columns:repeat(3,1fr);}
    .stat-num{
      background:none !important;-webkit-background-clip:initial !important;background-clip:initial !important;
      color:var(--accent) !important;-webkit-text-fill-color:var(--accent) !important;
    }
    .charts-grid{grid-template-columns:1fr 1fr;gap:12px;}
    .donut{width:120px;height:120px;}
    .donut-center{inset:15px;}
    .table-wrap{break-inside:auto;}
    .table-wrap table{min-width:0;font-size:11px;table-layout:fixed;width:100%;}
    .table-wrap table th:last-child,
    .table-wrap table td:last-child{width:28%;white-space:normal;word-wrap:break-word;}
    .table-wrap table th{white-space:nowrap;text-align:center;}
    .hist-legend{display:block !important;margin-top:8px;font-size:9.5px;line-height:1.5;color:#333;}
    thead{display:table-header-group;}
    tr{break-inside:avoid;}
  }

  @media(max-width:760px){
    body{flex-direction:column;}
    .sidebar{width:100%;display:flex;align-items:center;gap:8px;padding:14px 16px;overflow-x:auto;}
    .sidebar .brand{margin-bottom:0;margin-right:8px;flex-shrink:0;}
    .nav-item{flex-shrink:0;margin-bottom:0;white-space:nowrap;}
    .sidebar-divider{display:none;}
    .main{padding:18px;}
    .stat-row{grid-template-columns:repeat(2,1fr);}
    .dash-grid{grid-template-columns:1fr !important;}
    .drawer{grid-template-columns:1fr;}
    .cal-cell{min-height:60px;}
    .dash-grid{grid-template-columns:1fr;}
  }
  @media(max-width:520px){
    .roster-row{flex-wrap:wrap;gap:10px;}
    .roster-row .student-name{flex-basis:100%;}
    .seg button{padding:10px 18px;font-size:14px;}
    .detail-btn{padding:10px 14px;}
    .num-input{height:44px;width:70px;}
    .qbtn{height:44px;min-width:48px;}
    .pill{padding:9px 14px;}
  }

  /* ---------- a11y: real buttons, unchanged appearance ---------- */
  button.nav-item, button.dash-row-left, button.tab, button.pill,
  button.swatch, button.cal-tag, button.cal-date, button.detail-btn,
  button.student-name-link, .linkish{
    font-family:inherit; cursor:pointer;
  }
  button.nav-item{ background:transparent; border:0; color:var(--sidebar-text); width:100%; text-align:left; }
  button.dash-row-left{ background:transparent; border:0; padding:0; width:100%; text-align:left; color:inherit; }
  button.cal-date{ background:transparent; border:0; padding:0; color:inherit; text-align:left; }
  button.cal-date:hover{ text-decoration:underline; }
  button.student-name-link{ background:transparent; border:0; padding:0; color:inherit; font-size:inherit; }
  button.swatch{ padding:0; }
  button.cal-tag{ display:block; width:100%; text-align:left; }
  .dash-row-title, .dash-row-sub, .section-title{ display:block; }
  .section-title{ font-weight:600; font-size:15px; margin-bottom:12px; }
  .linkish{
    background:none; border:0; padding:0; font-size:inherit;
    color:var(--accent); font-weight:500;
  }
  .linkish:hover{ text-decoration:underline; }

  :focus-visible{ outline:2px solid var(--accent); outline-offset:2px; }
  .sidebar :focus-visible{ outline-color:var(--sidebar-focus); outline-offset:1px; }
  .cal-cell :focus-visible{ outline-offset:1px; }
</style>
</head>
<body>

<div id="login-overlay" style="position:fixed;inset:0;background:var(--sidebar-bg);display:flex;align-items:center;justify-content:center;z-index:9999;font-family:var(--font-body);">
  <div style="background:var(--card);border-radius:var(--radius);padding:36px 32px;width:320px;box-shadow:0 20px 60px rgba(0,0,0,.3);">
    <div style="font-family:var(--font-head);font-weight:700;font-size:20px;color:var(--text);margin-bottom:4px;">EFL Dashboard</div>
    <div style="font-size:13px;color:#7d869c;margin-bottom:20px;">Sign in to continue</div>
    <input id="login-email" type="email" autocomplete="username" autofocus placeholder="Email" style="width:100%;padding:11px 12px;border:1px solid #dde2ec;border-radius:8px;font-size:14px;margin-bottom:10px;box-sizing:border-box;" onkeydown="if(event.key==='Enter') doLogin();">
    <input id="login-password" type="password" autocomplete="current-password" placeholder="Password" style="width:100%;padding:11px 12px;border:1px solid #dde2ec;border-radius:8px;font-size:14px;margin-bottom:14px;box-sizing:border-box;" onkeydown="if(event.key==='Enter') doLogin();">
    <button id="login-btn" onclick="doLogin()" style="width:100%;padding:11px;background:var(--accent);color:var(--on-accent);border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;">Sign In</button>
    <div id="login-error" style="color:#d1453d;font-size:12px;margin-top:10px;min-height:14px;"></div>
  </div>
</div>

<nav class="sidebar app-hidden" id="app-sidebar" aria-label="Main navigation">
  <div class="brand"><span class="dot"></span>EFL Dashboard</div>
  <a href="../" style="display:flex;align-items:center;gap:6px;color:#7d869c;font-size:12px;text-decoration:none;margin:-16px 0 20px 2px;transition:color .15s;" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='#7d869c'">← Tool Hub</a>
  <button type="button" onclick="openStudentSearch()" title="Search students (press /)" style="display:flex;align-items:center;gap:8px;width:100%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:#aab3c5;border-radius:9px;padding:8px 11px;font-family:inherit;font-size:13px;cursor:pointer;margin-bottom:16px;text-align:left;">
    <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
    Search students…
  </button>
  <button type="button" class="nav-item" data-view="dashboard" onclick="navigate('dashboard')">
    <span class="nav-icon-badge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11.5 12 4l9 7.5"/><path d="M5 10v9a1 1 0 0 0 1 1h4v-5h4v5h4a1 1 0 0 0 1-1v-9"/></svg></span>
    Dashboard
  </button>

/* ---------- storage (Supabase-backed) ----------
   Safety rules:
   1. Nothing is EVER written until a load has fully succeeded (dataReady).
      A failed read must never turn into a write of empty state.
   2. Saves report success/failure honestly. Failures retry with backoff
      and surface a persistent banner; they are never swallowed.
   3. The browser warns before closing with unsaved work.
*/
let dataReady = false;        // true only after a complete, successful load
let loadedBlobs = {};         // key -> value, from the single batched read
// key -> updated_at string we last saw for that row (from load or our own writes).
// Used for optimistic concurrency: if the server row moved past this, another
// device wrote it and we must not blindly overwrite.
let knownUpdatedAt = {};
let staleConflict = false;    // true once a cross-device conflict is detected
const pendingSaves = new Map();   // key -> latest value awaiting a successful write
const failedSaves = new Set();
let authExpired = false;           // D5: set when the Supabase session has lapsed
let refreshingSession = false;

// Does this error look like an expired/invalid auth session (vs a network blip)?
function isAuthError(e){
  if(!e) return false;
  const code = e.code || e.status || (e.originalError && e.originalError.status);
  if(code===401 || code==='401' || code==='PGRST301') return true;
  const msg = String(e.message || e.error_description || e.msg || '').toLowerCase();
  return msg.includes('jwt') || msg.includes('token') || (msg.includes('auth') && msg.includes('expired')) || msg.includes('not authenticated');
}

async function loadAllKeys(){
  // One round trip instead of 14. Throws on failure — caller must handle.
  const { data, error } = await sb
    .from('dashboard_data')
    .select('key, value, updated_at')
    .eq('user_id', currentUser.id);
  if(error) throw error;
  const map = {};
  knownUpdatedAt = {};
  (data||[]).forEach(row => { map[row.key] = row.value; knownUpdatedAt[row.key] = row.updated_at; });
  return map;
}
// Re-read only the timestamps (cheap) to see if any row changed underneath us.
async function fetchServerTimestamps(){
  const { data, error } = await sb
    .from('dashboard_data')
    .select('key, updated_at')
    .eq('user_id', currentUser.id);
  if(error) throw error;
  const map = {};
  (data||[]).forEach(row => { map[row.key] = row.updated_at; });
  return map;
}
// Reads from the already-fetched blob map. Absent key => fallback (a genuinely new user).
function loadKey(key, fallback){
  return Object.prototype.hasOwnProperty.call(loadedBlobs, key) ? loadedBlobs[key] : fallback;
}

async function saveKey(key, value){
  if(!dataReady){
    console.warn('Blocked save before data was loaded:', key);
    return false;
  }
  if(staleConflict){
    // A cross-device conflict is already showing. Keep the change queued (so a
    // reload/merge can recover it) but do not write over newer server data.
    pendingSaves.set(key, value);
    return false;
  }
  if(authExpired){
    // Session is dead; queue the change and wait for inline re-login to flush it.
    pendingSaves.set(key, value);
    failedSaves.add(key);
    return false;
  }
  const stamp = new Date().toISOString();
  const seen = knownUpdatedAt[key];   // undefined for a key that didn't exist at load
  try{
    // Optimistic concurrency: only write if the row is still at the timestamp we
    // last saw. If it moved, another device wrote it and we must not clobber.
    if(seen === undefined){
      // We believe this key doesn't exist yet — insert. A duplicate-key error
      // means another device created it first (a conflict we must surface).
      const { data, error } = await sb
        .from('dashboard_data')
        .insert({ user_id: currentUser.id, key, value, updated_at: stamp })
        .select('updated_at');
      if(error){
        if(error.code === '23505'){ pendingSaves.set(key, value); await handleConflict(key); return false; }
        throw error;
      }
      knownUpdatedAt[key] = (data && data[0]?.updated_at) || stamp;
    } else {
      const { data, error } = await sb
        .from('dashboard_data')
        .update({ value, updated_at: stamp })
        .eq('user_id', currentUser.id).eq('key', key).eq('updated_at', seen)
        .select('updated_at');
      if(error) throw error;
      if(!data || data.length === 0){
        // 0 rows updated => the guard failed => the row changed under us.
        pendingSaves.set(key, value);
        await handleConflict(key);
        return false;
      }
      knownUpdatedAt[key] = data[0].updated_at;
    }
    pendingSaves.delete(key);
    failedSaves.delete(key);
    renderSaveState();
    return true;
  }catch(e){
    console.error('Save failed for', key, e);
    pendingSaves.set(key, value);
    failedSaves.add(key);
    if(isAuthError(e)){
      // Try a silent refresh first; only prompt for re-login if that fails.
      const recovered = await tryRefreshSession();
      if(recovered){
        renderSaveState();
        scheduleRetry();     // resume pending writes with the fresh token
        return false;
      }
      authExpired = true;    // banner will show the inline re-login form
      renderSaveState();
      return false;          // don't hammer retry while the session is dead
    }
    renderSaveState();
    scheduleRetry();
    return false;
  }
}

// D5: attempt a silent session refresh. Returns true if we got a valid session.
async function tryRefreshSession(){
  if(refreshingSession) return false;
  refreshingSession = true;
  try{
    const { data, error } = await sb.auth.refreshSession();
    if(error || !data?.session) return false;
    currentUser = data.session.user;
    authExpired = false;
    return true;
  }catch(_){
    return false;
  }finally{
    refreshingSession = false;
  }
}

// D5: re-login inline (from the save banner) without a page reload, then resume
// any pending saves so no work is lost.
async function reauthInline(){
  const emailEl = document.getElementById('reauth-email');
  const passEl = document.getElementById('reauth-pass');
  const errEl = document.getElementById('reauth-err');
  const email = emailEl ? emailEl.value.trim() : '';
  const pass = passEl ? passEl.value : '';
  if(errEl) errEl.textContent = '';
  if(!email || !pass){ if(errEl) errEl.textContent = 'Enter your email and password.'; return; }
  try{
    const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
    if(error) throw error;
    currentUser = data.user;
    authExpired = false;
    renderSaveState();
    await retryNow();        // flush everything that was queued while logged out
  }catch(e){
    if(errEl) errEl.textContent = 'Sign-in failed: ' + (e.message || 'try again');
  }
}

// A save was blocked because another device already changed this row.
// We stop all writes and ask the user to reload, rather than overwriting their
// other device's newer work. The unsaved change stays in pendingSaves.
async function handleConflict(key){
  staleConflict = true;
  renderSaveState();
}

let retryTimer = null, retryDelay = 2000;
function scheduleRetry(){
  if(retryTimer) return;
  retryTimer = setTimeout(async ()=>{
    retryTimer = null;
    const entries = [...pendingSaves.entries()];
    for(const [k,v] of entries) await saveKey(k, v);
    if(pendingSaves.size){
      retryDelay = Math.min(retryDelay*2, 30000);
      scheduleRetry();
    }else{
      retryDelay = 2000;
    }
  }, retryDelay);
}
async function retryNow(){
  retryDelay = 2000;
  if(retryTimer){ clearTimeout(retryTimer); retryTimer = null; }
  const entries = [...pendingSaves.entries()];
  for(const [k,v] of entries) await saveKey(k, v);
}

function renderSaveState(){
  const banner = document.getElementById('save-banner');
  const el = document.getElementById('save-indicator');
  if(authExpired){
    if(el){ el.textContent = '⚠ Signed out'; el.style.color = 'var(--red)'; }
    if(banner){
      banner.style.display = 'block';
      banner.innerHTML = `⚠ <b>Your session expired.</b> Sign in again to save your work — nothing on screen is lost, and your ${pendingSaves.size} pending change(s) will save as soon as you're back in.
        <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:10px;">
          <input id="reauth-email" type="email" placeholder="Email" autocomplete="username" style="border:1px solid var(--border);border-radius:8px;padding:7px 10px;font-family:inherit;font-size:13px;">
          <input id="reauth-pass" type="password" placeholder="Password" autocomplete="current-password" onkeydown="if(event.key==='Enter')reauthInline()" style="border:1px solid var(--border);border-radius:8px;padding:7px 10px;font-family:inherit;font-size:13px;">
          <button type="button" class="btn-accent" onclick="reauthInline()">Sign in &amp; save</button>
          <span id="reauth-err" style="color:var(--red);font-size:12px;"></span>
        </div>`;
    }
    return;
  }
  if(staleConflict){
    if(el){ el.textContent = '⚠ Out of date'; el.style.color = 'var(--red)'; }
    if(banner){
      banner.style.display = 'block';
      banner.innerHTML = `⚠ <b>This data was changed on another device.</b> To avoid overwriting that newer work, saving is paused. Your unsaved change is still on screen — copy anything you need, then <button type="button" class="linkish" onclick="location.reload()" style="text-decoration:underline;">reload to get the latest</button>.`;
    }
    return;
  }
  if(failedSaves.size){
    if(el){ el.textContent = '⚠ Not saved'; el.style.color = 'var(--red)'; }
    if(banner){
      banner.style.display = 'block';
      banner.innerHTML = `⚠ <b>Changes not saved.</b> Your work is still on screen but has not reached the server (${failedSaves.size} pending). Keep this tab open. <button type="button" class="linkish" onclick="retryNow()" style="text-decoration:underline;">Retry now</button>`;
    }
  }else{
    if(el){ el.textContent = pendingSaves.size ? 'Saving…' : 'Saved at ' + nowTime(); el.style.color = ''; }
    if(banner) banner.style.display = 'none';
  }
}

const saveTimers = {};
function scheduleSave(key, value){
  pendingSaves.set(key, value);
  const el = document.getElementById('save-indicator');
  if(el && !failedSaves.size){ el.textContent = 'Saving…'; el.style.color = ''; }
  if(saveTimers[key]) clearTimeout(saveTimers[key]);
  saveTimers[key] = setTimeout(()=>{ saveKey(key, value); }, 450);
}

window.addEventListener('beforeunload', (e)=>{
  if(pendingSaves.size){
    e.preventDefault();
    e.returnValue = '';
    return '';
  }
});

// When this tab regains focus, check whether another device changed anything.
// If nothing is pending locally, silently reload the newer data so the stale
// tab can't later overwrite it. If we have unsaved edits and the server also
// moved, surface the conflict banner instead of guessing whose wins.
let checkingFreshness = false;
async function checkFreshnessOnFocus(){
  if(!dataReady || staleConflict || checkingFreshness) return;
  checkingFreshness = true;
  try{
    const server = await fetchServerTimestamps();
    const changedKeys = Object.keys(server).filter(k => server[k] !== knownUpdatedAt[k]);
    if(!changedKeys.length) return;
    const pendingChanged = changedKeys.some(k => pendingSaves.has(k));
    if(pendingChanged){
      staleConflict = true;
      renderSaveState();
    } else if(pendingSaves.size === 0){
      // Safe to just adopt the newer data.
      loadedBlobs = await loadAllKeys();
      BACKUP_KEYS.forEach(k => {
        const fresh = loadKey(k, Array.isArray(state[k]) ? [] : {});
        state[k] = fresh;
      });
      refreshView();
    }
    // else: pending saves exist but on different keys — they'll save fine; the
    // next successful write refreshes their timestamps. No action needed.
  }catch(e){
    console.warn('Freshness check failed (offline?)', e);
  }finally{
    checkingFreshness = false;
  }
}
document.addEventListener('visibilitychange', ()=>{ if(document.visibilityState==='visible') checkFreshnessOnFocus(); });
window.addEventListener('focus', checkFreshnessOnFocus);

/* ---------- JSON backup: export / import ----------
   Independent of Supabase — a local file the teacher controls.
   The state keys in BACKUP_KEYS + backupMeta are the full source of truth.
*/
function setGradeMargin(v){
  state.gradeSettings.margin = Math.max(0, Number(v)||0);
  scheduleSave('gradeSettings', state.gradeSettings);
  refreshView();   // dashboard alert cards react immediately
}

function setDashUpcomingRange(r){
  localStorage.setItem('dashUpcomingRange', r);   // per-device preference, like theme
  refreshView();
}

const BACKUP_KEYS = ['classes','students','sessions','events','holidays','sessionMeta',
  'lessonNotes','homework','promises','privateStudents','privateLessons','payments','checkpoints',
  'learningPoints','classFocus','privateSettings','grades','gradeSettings','pointsLog','activities'];

function daysSinceLastBackup(){
  const last = state.backupMeta?.lastBackupAt;
  if(!last) return Infinity;
  return (Date.now() - new Date(last).getTime()) / 86400000;
}

async function markBackupDone(){
  state.backupMeta = { lastBackupAt: new Date().toISOString() };
  await saveKey('backupMeta', state.backupMeta);
}

function exportBackup(){
  const payload = { exportedAt: new Date().toISOString(), version: 1, data: {} };
  BACKUP_KEYS.forEach(k => { payload.data[k] = state[k]; });
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const stamp = todayStr();
  a.href = url;
  a.download = `efl-dashboard-backup-${stamp}.json`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
  markBackupDone().then(()=>{ refreshView(); });
}

function openBackupModal(){
  const last = state.backupMeta?.lastBackupAt;
  const lastLabel = last ? formatDateLong(last.slice(0,10)) + ' at ' + new Date(last).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) : 'Never';
  showModal(`
    <h2>Backup &amp; Restore</h2>
    <p class="meta" style="margin:6px 0 18px;">A local JSON file of everything in your dashboard, independent of Supabase. Keep a copy somewhere safe (Drive, email to yourself, etc).</p>
    <div class="card section" style="margin-bottom:14px;">
      <h3>Export</h3>
      <p class="meta" style="margin:4px 0 12px;">Last backup: <b>${esc(lastLabel)}</b></p>
      <button class="btn-accent" onclick="exportBackup()">⬇ Download backup (.json)</button>
    </div>
    <div class="card section" style="border-left:4px solid var(--red);">
      <h3>Restore</h3>
      <p class="meta" style="margin:4px 0 12px;">Replaces everything currently in the dashboard with the contents of the chosen file. This cannot be undone — export a current backup first if unsure.</p>
      <input type="file" id="backup-file-input" accept="application/json,.json" style="display:none;" onchange="handleBackupFileChosen(event)">
      <button class="btn-ghost" style="border-color:var(--red);color:var(--red);" onclick="document.getElementById('backup-file-input').click()">⬆ Choose backup file to restore…</button>
    </div>
    <div style="display:flex;justify-content:flex-end;margin-top:16px;">
      <button class="btn-ghost" onclick="closeModal()">Close</button>
    </div>
  `);
}

function handleBackupFileChosen(evt){
  const file = evt.target.files?.[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    let parsed;
    try{ parsed = JSON.parse(reader.result); }
    catch(e){ alert('That file is not valid JSON.'); return; }
    const data = parsed?.data && typeof parsed.data==='object' ? parsed.data : parsed;
    if(!data || typeof data!=='object'){ alert("That file doesn't look like a dashboard backup."); return; }
    const foundKeys = BACKUP_KEYS.filter(k => Object.prototype.hasOwnProperty.call(data,k));
    if(foundKeys.length < 3){ alert("That file doesn't look like a dashboard backup — expected keys like 'classes' and 'students' weren't found."); return; }
    const missing = BACKUP_KEYS.filter(k=>!foundKeys.includes(k));
    const stamp = parsed?.exportedAt ? formatDateLong(parsed.exportedAt.slice(0,10)) : 'unknown date';
    const warn = missing.length ? `\n\nNote: this file is missing ${missing.length} field(s) (${missing.join(', ')}) — those will be reset to empty on restore.` : '';
    if(!confirm(`Restore backup from ${stamp}?\n\nThis will REPLACE all current data in the dashboard with the contents of this file.${warn}\n\nThis cannot be undone.`)) return;
    restoreBackup(data);
  };
  reader.onerror = () => alert('Could not read that file.');
  reader.readAsText(file);
  evt.target.value = '';
}

async function restoreBackup(data){
  closeModal();
  showModal(`<h2>Restoring…</h2><p class="meta">Please don't close this tab.</p>`, true);
  try{
    for(const key of BACKUP_KEYS){
      const value = Object.prototype.hasOwnProperty.call(data,key) ? data[key] : (Array.isArray(state[key]) ? [] : {});
      state[key] = value;
      const ok = await saveKey(key, value);
      if(!ok) throw new Error(`Failed to save "${key}" — restore stopped partway. Check your connection and try again; already-saved keys were written.`);
    }
    await markBackupDone();
    closeModal();
    navigate('dashboard');
    alert('Backup restored successfully.');
  }catch(e){
    closeModal();
    alert('Restore error: ' + (e?.message || String(e)));
  }
}

/* ---------- helpers ---------- */
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function pad(n){ return String(n).padStart(2,'0'); }
function todayStr(){ const d=new Date(); return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function dateToStr(y,m,d){ return `${y}-${pad(m+1)}-${pad(d)}`; }
function nowTime(){ const d=new Date(); return pad(d.getHours())+':'+pad(d.getMinutes()); }
function formatDateLong(dateStr){
  return new Date(dateStr+'T00:00:00').toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
}
function formatDateShort(dateStr){
  return new Date(dateStr+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});
}
const DAY_ABBR = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const DAY_FULL = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
function getClassDays(cls){
  if(Array.isArray(cls.days) && cls.days.length) return cls.days;
  if(cls.schedule && SCHEDULE_DAYS[cls.schedule]) return SCHEDULE_DAYS[cls.schedule];
  return [];
}

  const days = getClassDays(cls);
  return days.length ? days.map(d=>DAY_ABBR[d]).join(' / ') : 'No days set';
}
function classById(id){ return state.classes.find(c=>c.id===id); }
function activeClasses(){ return state.classes.filter(c=>!c.archived); }
function archivedClasses(){ return state.classes.filter(c=>c.archived); }

/* ---------- group level tags & test grades ----------
   Group tags live on the CLASS (not the student). Test regime derives from the tag:
   - Teens / Basic / Intermediate: 3 tests per cycle, need 240 total (avg 80).
     If the running average of entered tests is under 80 -> contact parents.
   - Advanced: 2 TOEFL tests per cycle, per-level target score
     (Adv 1 = 475, Adv 2 = 500, Adv 3 = 525, Adv 4 = 550).
     If any entered test is under the target -> contact parents.
*/
const GROUP_LEVELS = ['Teens 1','Teens 2','Teens 3','Teens 4','Basic 1','Basic 2','Basic 3','Basic 4','Intermediate 1','Intermediate 2','Intermediate 3','Intermediate 4','Advanced 1','Advanced 2','Advanced 3','Advanced 4'];
const TOEFL_TARGETS = {'Advanced 1':475,'Advanced 2':500,'Advanced 3':525,'Advanced 4':550};
const CYCLE_TOTAL_TARGET = 240, CYCLE_AVG_TARGET = 80;
function isAdvancedLevel(lv){ return /^Advanced /.test(lv||''); }
function testCountFor(cls){ return isAdvancedLevel(cls?.level) ? 2 : 3; }
function testLabelFor(cls, i){ return isAdvancedLevel(cls?.level) ? 'TOEFL '+(i+1) : 'Test '+(i+1); }
// Ensures a grades record with at least one cycle exists for a class. Mutates state — never call during a pure render loop.
function classGrades(classId){
  if(!state.grades[classId]) state.grades[classId] = { cycles: [] };
  const g = state.grades[classId];
  if(!g.cycles.length) g.cycles.push({ id: uid(), label: 'Cycle 1', startedAt: todayStr(), scores: {} });
  return g;
}
function studentScores(cycle, studentId, n){
  const arr = ((cycle.scores||{})[studentId]||[]).slice(0, n);
  while(arr.length < n) arr.push(null);
  return arr;
}
// Evaluate a student's standing in a cycle. Returns null if no scores entered yet.
// gradeSettings.margin: also flag students who pass but sit within `margin` points
// of the minimum (e.g. margin 3 flags averages 80–82.9 as "close").
function gradeMargin(){ return Math.max(0, Number(state.gradeSettings?.margin)||0); }
function gradeStatus(cls, cycle, studentId){
  const n = testCountFor(cls);
  const scores = studentScores(cycle, studentId, n);
  const nums = scores.filter(v=>v!=null && v!=='').map(Number).filter(v=>!isNaN(v));
  if(!nums.length) return null;
  const total = nums.reduce((a,b)=>a+b,0);
  const avg = Math.round((total/nums.length)*10)/10;
  const margin = gradeMargin();
  if(isAdvancedLevel(cls.level)){
    const target = TOEFL_TARGETS[cls.level];
    const belowCount = nums.filter(v=>v<target).length;
    const closeCount = nums.filter(v=>v>=target && v<target+margin).length;
    return { advanced:true, target, total, avg, entered:nums.length, of:n, scores,
             under: belowCount>0, belowCount, close: belowCount===0 && closeCount>0, closeCount };
  }
  return { advanced:false, target:CYCLE_AVG_TARGET, totalTarget:CYCLE_TOTAL_TARGET, total, avg, entered:nums.length, of:n, scores,
           under: avg < CYCLE_AVG_TARGET, close: avg >= CYCLE_AVG_TARGET && avg < CYCLE_AVG_TARGET + margin };
}
// Human line describing a status (for dashboard alerts / reports). lang: 'en' | 'pt'
function gradeStatusLine(st, lang){
  const pt = lang==='pt';
  const scoresTxt = st.scores.map(v=>(v==null||v==='')?'—':v).join(' / ');
  if(st.advanced){
    return `TOEFL ${scoresTxt} · ${pt?'meta':'target'} ${st.target}`
      + (st.under ? (pt?` — ${st.belowCount} abaixo da meta`:` — ${st.belowCount} below target`)
         : st.close ? (pt?' — perto da meta':' — close to the target') : '');
  }
  return `${scoresTxt} · ${pt?'total':'total'} ${st.total}/${st.totalTarget} · ${pt?'média':'avg'} ${st.avg}`
    + (st.under ? (pt?' — abaixo da média 80':' — below the 80 average')
       : st.close ? (pt?' — perto da média 80':' — close to the 80 average') : '');
}

function daysAgo(dateStr){ return (Date.now() - new Date(dateStr+'T00:00:00').getTime()) / 86400000; }

// A student's completed, non-holiday attendance records, deduped by date
// (prefer the enrolled class — same rule the report uses), newest first.
function studentAttendanceRecords(student){
  const map = new Map();
  Object.keys(state.sessions).forEach(key=>{
    const [classId, date] = splitSessionKey(key);
    const rec = state.sessions[key][student.id];
    if(!rec || isHoliday(date) || !isSessionCompleted(classId, date)) return;
    const enrolledId = classForStudentOnDate(student, date)?.id;
    const score = (classId===enrolledId ? 2 : 0) + 1;
    const prev = map.get(date);
    if(!prev || score > prev._score) map.set(date, {...rec, date, _classId:classId, _score:score});
  });
  return [...map.values()].sort((a,b)=>b.date.localeCompare(a.date));
}

function getPreviousClassDate(cls, fromDateStr){
  const days = getClassDays(cls);
  if(!days.length) return null;
  let d = new Date(fromDateStr+'T00:00:00');
  for(let i=0; i<60; i++){
    d.setDate(d.getDate()-1);
    const dateStr = dateToStr(d.getFullYear(), d.getMonth(), d.getDate());
    if(days.includes(d.getDay()) && !isHoliday(dateStr)) return dateStr;
  }
  return null;
}
function getNextClassDate(cls, fromDateStr){
  const days = getClassDays(cls);
  if(!days.length) return null;
  let d = new Date(fromDateStr+'T00:00:00');
  for(let i=0; i<60; i++){
    d.setDate(d.getDate()+1);
    const dateStr = dateToStr(d.getFullYear(), d.getMonth(), d.getDate());
    if(cls.endDate && dateStr > cls.endDate) return null;   // course has ended
    if(days.includes(d.getDay()) && !isHoliday(dateStr)) return dateStr;
  }
  return null;
}

}

/* ---------- duration history ---------- */
// A class's duration can change over time. durationHistory = [{from:'YYYY-MM-DD', duration:N}, ...]
// Past sessions keep the duration that was in effect on their date.
function durationHistoryOf(cls){
  if(Array.isArray(cls.durationHistory) && cls.durationHistory.length){
    return cls.durationHistory.slice().sort((a,b)=>a.from.localeCompare(b.from));
  }
  return [{ from: '1900-01-01', duration: Number(cls.duration)||150 }];
}
function durationForDate(cls, dateStr){
  if(!cls) return 150;
  const hist = durationHistoryOf(cls);
  let d = hist[0].duration;
  for(const e of hist){ if(e.from <= dateStr) d = e.duration; else break; }
  return Number(d)||150;
}
function currentDuration(cls){ return durationForDate(cls, todayStr()); }

/* ---------- enrollments (class transfers) ---------- */
// student.enrollments = [{classId, from, to|null}] — 'to' is inclusive last day in that class.
function enrollmentsOf(st){
  if(Array.isArray(st.enrollments) && st.enrollments.length) return st.enrollments;
  const c = classById(st.classId);
  return [{ classId: st.classId, from: c?.startDate || '1900-01-01', to: null }];
}
function classForStudentOnDate(st, dateStr){
  const en = enrollmentsOf(st).find(e => e.from <= dateStr && (!e.to || dateStr <= e.to));
  return classById(en ? en.classId : st.classId);
}

// A4: earliest date this class has any session record for. Used to bound the
// expected-session window when the class has no explicit startDate, so we don't
// count expected sessions from before the class actually began.
function firstSessionDateOf(classId){
  let earliest = null;
  for(const key of Object.keys(state.sessions)){
    const [cid, date] = splitSessionKey(key);
    if(cid !== classId) continue;
    if(!earliest || date < earliest) earliest = date;
  }
  return earliest;
}

function expectedSessionsForClass(cls, startOverride, endOverride){
  const days = getClassDays(cls);
  if(!days.length) return null;
  // A4: if no startDate anywhere, fall back to the first recorded session.
  const startStr = startOverride || cls.startDate || firstSessionDateOf(cls.id);
  // End fallback: an override, the class end, or today (an ongoing class counts
  // only sessions up to now, never into the future).
  const endStr = endOverride || cls.endDate || todayStr();
  if(!startStr || !endStr) return null;
  const start = new Date(startStr+'T00:00:00');
  const end = new Date(endStr+'T00:00:00');
  if(start>end) return 0;
  let count=0;
  let d = new Date(start);
  while(d<=end){
    const dow = d.getDay();
    const dateStr = dateToStr(d.getFullYear(), d.getMonth(), d.getDate());
    if(days.includes(dow) && !isHoliday(dateStr)) count++;
    d.setDate(d.getDate()+1);
  }
  return count;
}

// A3: THE single attendance-rate definition, used by the profile headline, the
// profile donut, and the group report so they can never disagree.
// Preferred: schedule-based (expected − absent) / expected — this punishes
// missed classes against the real schedule. When no schedule/dates give an
// expected count, fall back to recorded-based present/recorded and flag it so
// the UI can label it differently.
// NOTE: `present` already counts everyone who attended, INCLUDING late arrivals
// (arriving late is still being present). `late` is passed only for callers that
// want it; it is a subset of present and must not be added again here.
// Args: expected (number|null), absent, present, late (all counts).
// Returns {rate:0-100|null, basis:'schedule'|'recorded'}.
function attendanceRate(expected, absent, present, late){
  if(expected){
    return { rate: Math.round(100*(expected-absent)/expected), basis:'schedule' };
  }
  const recorded = present + absent;   // present already includes late
  if(recorded) return { rate: Math.round(100*present/recorded), basis:'recorded' };
  return { rate: null, basis:'recorded' };
}
function renderDonut(slices, centerLabel, centerSub){
  const total = slices.reduce((s,x)=>s+x.value,0);
  const size=140, stroke=20, r=(size-stroke)/2, c=2*Math.PI*r;
  let acc=0;
  const segs = total ? slices.filter(sl=>sl.value>0).map(sl=>{
    const len = sl.value/total*c;
    const dashoffset = c - acc;
    acc += len;
    return `<circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${sl.color}" stroke-width="${stroke}" stroke-dasharray="${len.toFixed(2)} ${(c-len).toFixed(2)}" stroke-dashoffset="${dashoffset.toFixed(2)}" transform="rotate(-90 ${size/2} ${size/2})"/>`;
  }).join('') : `<circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="var(--border)" stroke-width="${stroke}"/>`;
  return `
    <div class="donut-wrap">
      <div class="donut">
        <svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">${segs}</svg>
        <div class="donut-center">
          <div class="donut-num">${centerLabel}</div>
          <div class="donut-sub">${centerSub}</div>
        </div>
      </div>
      <div class="donut-legend">
        ${slices.map(sl=>`<div class="legend-item"><svg width="10" height="10" viewBox="0 0 10 10" style="flex-shrink:0;"><circle cx="5" cy="5" r="5" fill="${sl.color}"/></svg>${sl.label}: ${sl.value}${sl.unit||''}${total?` (${Math.round(sl.value/total*100)}%)`:''}</div>`).join('')}
      </div>
    </div>`;
}

/* ---------- modal ----------
   All modals go through showModal(), so dialog semantics, Escape-to-close,
   the focus trap and focus restoration are implemented once, here.
   `persistent` modals (e.g. an in-progress restore) refuse Escape and
   backdrop clicks, but are still focus-trapped.
*/
let modalLastFocus = null;      // element to return focus to on close
let modalPersistent = false;
let modalSeq = 0;

const FOCUSABLE = 'a[href],button:not([disabled]),textarea:not([disabled]),' +
  'input:not([type="hidden"]):not([disabled]),select:not([disabled]),[tabindex]:not([tabindex="-1"])';

function modalFocusable(modal){
  // offsetParent filters out display:none nodes (e.g. the hidden file input)
  return [...modal.querySelectorAll(FOCUSABLE)].filter(el => el.offsetParent !== null || el === document.activeElement);
}

function showModal(html, persistent){
  const root = document.getElementById('modal-root');
  // Only capture the return target when opening from a non-modal context;
  // re-rendering an already-open modal must not overwrite it.
  if(!root.firstElementChild) modalLastFocus = document.activeElement;
  modalPersistent = !!persistent;

  root.innerHTML = `
    <div class="modal-overlay" ${persistent?'':'onclick="if(event.target===this) closeModal()"'}>
      <div class="modal" role="dialog" aria-modal="true" tabindex="-1">${html}</div>
    </div>`;

  const modal = root.querySelector('.modal');
  const heading = modal.querySelector('h2, h3');
  if(heading){
    if(!heading.id) heading.id = 'modal-title-' + (++modalSeq);
    modal.setAttribute('aria-labelledby', heading.id);
  }

  // Focus an explicitly-marked field if there is one, otherwise the dialog
  // itself — so screen readers announce the title instead of a stray input.
  const auto = modal.querySelector('[autofocus]');
  (auto || modal).focus();
}

/* ===== C6: undo toast — recover the last destructive action ===== */
let toastTimer = null;
function showUndoToast(message, undoFn){
  const root = document.getElementById('toast-root');
  if(!root) return;
  if(toastTimer){ clearTimeout(toastTimer); toastTimer = null; }
  root.innerHTML = '';
  const el = document.createElement('div');
  el.className = 'toast';
  const msg = document.createElement('span'); msg.textContent = message;
  const btn = document.createElement('button'); btn.textContent = 'Undo';
  const dismiss = ()=>{ if(toastTimer){clearTimeout(toastTimer);toastTimer=null;} root.innerHTML=''; };
  btn.onclick = ()=>{ dismiss(); try{ undoFn(); }catch(e){ console.error('Undo failed', e); } };
  el.appendChild(msg); el.appendChild(btn);
  root.appendChild(el);
  toastTimer = setTimeout(dismiss, 6000);
}

function closeModal(){
  const root = document.getElementById('modal-root');
  if(!root.firstElementChild) return;
  root.innerHTML = '';
  modalPersistent = false;
  const target = modalLastFocus;
  modalLastFocus = null;
  if(target && document.contains(target) && typeof target.focus === 'function'){
    target.focus();
  }
}

document.addEventListener('keydown', (e)=>{
  const modal = document.querySelector('#modal-root .modal');
  if(!modal) return;

  if(e.key === 'Escape'){
    if(modalPersistent) return;
    e.preventDefault();
    closeModal();
    return;
  }

  if(e.key !== 'Tab') return;

  const items = modalFocusable(modal);
  if(!items.length){ e.preventDefault(); modal.focus(); return; }
  const first = items[0], last = items[items.length-1];

  // Focus sitting on the dialog container: Tab enters, Shift+Tab wraps to the end.
  if(document.activeElement === modal){
    e.preventDefault();
    (e.shiftKey ? last : first).focus();
    return;
  }
  if(e.shiftKey && document.activeElement === first){
    e.preventDefault(); last.focus();
  }else if(!e.shiftKey && document.activeElement === last){
    e.preventDefault(); first.focus();
  }
});

/* ---------- navigation ---------- */
function navigate(view, params={}){
  Object.assign(state, params);
  state.view = view;
  const navMap = {dashboard:'dashboard', classes:'classes', rollcall:'rollcall', calendar:'calendar', student: state.studentProfileReturn||'reports', reports:'reports', 'group-report':'reports', contacts:'contacts', private:'private', 'priv-student':'private'};
  document.querySelectorAll('.nav-item').forEach(n=>{
    const on = n.dataset.view===navMap[view];
    n.classList.toggle('active', on);
    if(n.dataset.view){ on ? n.setAttribute('aria-current','page') : n.removeAttribute('aria-current'); }
  });
  document.querySelectorAll('.view').forEach(v=>v.classList.toggle('active', v.id==='view-'+view));
  refreshView();
}

/* Re-render whatever view is currently open.
   Mutators must call this instead of naming a view: an action reachable from
   two places (e.g. deleting a private lesson from the calendar chip) would
   otherwise repaint a hidden view and leave the visible one stale. */
function refreshView(){
  const v = state.view;
  // A record can be deleted while its own detail view is open; fall back rather than render a ghost.
  if(v==='student' && !state.students.some(s=>s.id===state.studentProfileId)){
    return navigate(state.studentProfileReturn || 'reports');
  }
  if(v==='priv-student' && !privStudent(state.privOpenStudentId)){
    return navigate('private');
  }
  if(v==='dashboard') renderDashboard();
  else if(v==='classes') renderClasses();
  else if(v==='rollcall') renderRollCall();
  else if(v==='calendar') renderCalendar();
  else if(v==='student') renderStudentProfile();
  else if(v==='reports') renderReports();
  else if(v==='group-report') renderGroupReport();
  else if(v==='contacts') renderContacts();
  else if(v==='private') renderPrivate();
  else if(v==='priv-student') renderPrivStudent();
  updatePrivAlertDot();
}
function goToRollCall(classId, date){
  state.rollcall.classId = classId;
  state.rollcall.date = date;
  state.openDrawer = null;
  // If the target class isn't scheduled on that weekday (a makeup opened from
  // the calendar/dashboard), reveal the full list so it stays selectable.
  const cls = classById(classId);
  const dow = new Date(date+'T00:00:00').getDay();
  state.rollcallShowAll = !!(cls && !getClassDays(cls).includes(dow));
  navigate('rollcall');

function renderDashboard(){

function _renderDashboard(el){
  if(!activeClasses().length){
    el.innerHTML = `
      <div class="topbar"><div><h1>Dashboard</h1><div class="meta">${formatDateLong(todayStr())}</div></div></div>
      <div class="card empty-card">
        <p>Welcome! Start by adding your first class.</p>
        <button class="btn-accent" onclick="navigate('classes');setTimeout(openClassModal,0)">+ Add a class</button>
      </div>`;
    return;
  }
  const today = todayStr();
  const todayHoliday = getHoliday(today);
  const dow = new Date(today+'T00:00:00').getDay();
  const todaysClasses = todayHoliday ? [] : activeClasses().filter(c=>{
    if(!getClassDays(c).includes(dow)) return false;
    if(c.startDate && today < c.startDate) return false;
    if(c.endDate && today > c.endDate) return false;
    return true;
  });
  // Upcoming = group class occurrences + calendar events + scheduled private lessons,
  // merged chronologically, filtered by range: Today (default) / Tomorrow / This week.
  const privName = id => state.privateStudents.find(p=>p.id===id)?.name || 'Private student';
  const upRange = localStorage.getItem('dashUpcomingRange') || 'today';
  const addDays = (dstr,n)=>{ const d=new Date(dstr+'T00:00:00'); d.setDate(d.getDate()+n); return dateToStr(d.getFullYear(), d.getMonth(), d.getDate()); };
  const upFrom = upRange==='tomorrow' ? addDays(today,1) : today;
  const upTo   = upRange==='week' ? addDays(today,6) : upFrom;

  // Expand recurring group classes into dated occurrences within the range
  const classOccurrences = [];
  for(let d=upFrom; d<=upTo; d=addDays(d,1)){
    if(isHoliday(d)) continue;
    const wd = new Date(d+'T00:00:00').getDay();
    activeClasses().forEach(c=>{
      if(!getClassDays(c).includes(wd)) return;
      if(c.startDate && d < c.startDate) return;
      if(c.endDate && d > c.endDate) return;
      classOccurrences.push({kind:'class', date:d, time:c.time||'', c});
    });
  }

  const upcoming = [
    ...classOccurrences,
    ...state.events.filter(e=>e.date>=upFrom && e.date<=upTo).map(e=>({kind:'event', date:e.date, time:'', e})),
    ...state.privateLessons.filter(l=>l.status==='scheduled' && l.date>=upFrom && l.date<=upTo)
        .map(l=>({kind:'priv', date:l.date, time:l.time||'', l}))
  ].sort((a,b)=> a.date===b.date ? (a.time||'').localeCompare(b.time||'') : a.date.localeCompare(b.date))
   .slice(0, upRange==='week' ? 24 : 12);

  // — Private lessons whose scheduled time has already passed: remind to flag —
  const nowHM = new Date().toTimeString().slice(0,5);
  const staleLessons = state.privateLessons
    .filter(l=>l.status==='scheduled' && (l.date<today || (l.date===today && l.time && l.time<nowHM)))
    .sort((a,b)=> a.date===b.date ? (a.time||'').localeCompare(b.time||'') : a.date.localeCompare(b.date));

  // — Pending session completions (today + recent past days with data but not marked complete) —
  const pendingCompletions = [];
  activeClasses().forEach(c=>{
    const days = getClassDays(c);
    for(let i=0; i<8; i++){
      const d = new Date(today+'T00:00:00');
      d.setDate(d.getDate()-i);
      const dateStr = dateToStr(d.getFullYear(), d.getMonth(), d.getDate());
      if(!days.includes(d.getDay())) continue;
      if(isHoliday(dateStr)) continue;
      if(c.startDate && dateStr < c.startDate) continue;
      if(c.endDate && dateStr > c.endDate) continue;
      const sessionKey = c.id+'_'+dateStr;
      const hasData = !!state.sessions[sessionKey] && Object.keys(state.sessions[sessionKey]).length>0;
      if(!hasData) continue;
      const completed = isSessionCompleted(c.id, dateStr);
      if(!completed){
        pendingCompletions.push({cls:c, date:dateStr, isToday: dateStr===today});
      }
    }
  });
  pendingCompletions.sort((a,b)=>a.date.localeCompare(b.date));

  // — Today's private lessons (shown even on school holidays; completed ones stay visible) —
  const privTodayList = state.privateLessons
    .filter(l=>l.date===today && l.status!=='cancelled')
    .sort((a,b)=>(a.time||'').localeCompare(b.time||''));
  window._dashPrivTodayIds = privTodayList.map(l=>l.studentId);
  const privTodayHtml = privTodayList.map((l,i)=>`
