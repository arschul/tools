const RC_LEVEL_LABELS_PT = {1:'Precisa melhorar muito',2:'Precisa melhorar',3:'Regular',4:'Muito Bom',5:'Excelente'};
const RC_LEVEL_LABELS_EN = {1:'Needs much improvement',2:'Needs improvement',3:'Satisfactory',4:'Very good',5:'Excellent'};
const RC_CAT_LABELS = {
  behavior:{pt:'Comportamento',en:'Behaviour'},
  homework:{pt:'Lição de casa',en:'Homework'},
  vocab:{pt:'Vocabulário',en:'Vocabulary'},
  grammar:{pt:'Gramática',en:'Grammar'},
  port:{pt:'Uso do português',en:'Portuguese use'}
};

function fmtPct(v){ return v==null ? '—' : v+'%'; }

// Measured percentage -> 1..5 level. Null percentage -> null (no data, no grade).
function partToLevel(p){ if(p==null) return null; if(p>=90) return 5; if(p>=72) return 4; if(p>=48) return 3; if(p>=28) return 2; return 1; }
function hwToLevel(p){ if(p==null) return null; if(p>=90) return 5; if(p>=75) return 4; if(p>=55) return 3; if(p>=35) return 2; return 1; }

// Deterministic phrase pick from a pool given the regenerate nonce.
function rcPhrase(cat, level, nonce){
  const pool = RC_COMMENTS[cat] && RC_COMMENTS[cat][level];
  if(!pool || !pool.length) return '';
  return pool[nonce % pool.length];
}

function initRcState(s){
  rcState = {
    levels: {
      behavior: partToLevel(s.partScore),
      homework: hwToLevel(s.hwAvg),
      vocab: null, grammar: null, port: null
    },
    nonce: 0
  };
}

function buildReportText(s, lang){
  const isPt = lang==='pt';
  const L = isPt ? {
    title:'RELATÓRIO DO ALUNO', clazz:'Turma', period:'Período', allTime:'Todo o período',
    present2:'presente', attendance:'Frequência', lost:'aulas perdidas',
    punctuality:'Pontualidade', late:'atrasos', hw:'Lição de casa', part:'Participação',
    phone:'Uso do celular', na:'sem dados',
    missedHead:'AULAS PERDIDAS', missedTopic:'conteúdo', noTopic:'(sem registro de conteúdo)',
    contactHead:'CONTATO COM RESPONSÁVEIS', pending:'PENDENTE', reason:'Motivo', summary:'Resumo',
    commentHead:'COMENTÁRIOS'
  } : {
    title:'STUDENT REPORT', clazz:'Class', period:'Period', allTime:'All time',
    present2:'present', attendance:'Attendance', lost:'classes missed',
    punctuality:'Punctuality', late:'late arrivals', hw:'Homework', part:'Participation',
    phone:'Phone use', na:'no data',
    missedHead:'CLASSES MISSED', missedTopic:'topic', noTopic:'(no lesson topic recorded)',
    contactHead:'PARENT CONTACT', pending:'PENDING', reason:'Reason', summary:'Summary',
    commentHead:'COMMENTS'
  };
  const per = s.fromVal
    ? `${formatDateShort(s.fromVal)} – ${s.toVal?formatDateShort(s.toVal):L.present2}`
    : L.allTime;

  const out = [];
  out.push(`${L.title} — ${s.name}`);
  const head = [];
  if(s.className) head.push(`${L.clazz}: ${s.className}`);
  head.push(`${L.period}: ${per}`);
  out.push(head.join('  ·  '));
  out.push('');

  // --- metrics ---
  out.push(`${L.attendance}: ${s.attendanceRate!=null?s.attendanceRate+'%':L.na}${s.expected!=null?` (${s.classesLost}/${s.expected} ${L.lost})`:''}`);
  out.push(`${L.punctuality}: ${s.late} ${L.late}`);
  out.push(`${L.hw}: ${fmtPct(s.hwAvg)}`);
  out.push(`${L.part}: ${fmtPct(s.partScore)}`);
  if(s.totalPhone){
    const tl = isPt ? (s.totalPhone===1?'vez':'vezes') : (s.totalPhone===1?'time':'times');
    out.push(`${L.phone}: ${s.totalPhone} ${tl}`);
  }

  // --- grades (test scores) ---
  if(s.grades && s.grades.cycles && s.grades.cycles.length){
    out.push('');
    out.push(isPt ? 'NOTAS' : 'GRADES');
    if(s.grades.level) out.push(`${isPt?'Nível':'Level'}: ${s.grades.level}`);
    s.grades.cycles.forEach(cy=>{
      const st = cy.status;
      const scoresTxt = st.scores.map(v=>(v==null||v==='')?'—':v).join(' / ');
      if(st.advanced){
        out.push(`- ${cy.label}: TOEFL ${scoresTxt} (${isPt?'meta':'target'} ${st.target})${st.under ? (isPt?' — ABAIXO DA META':' — BELOW TARGET') : st.close ? (isPt?' — perto da meta':' — close to the target') : (st.entered===st.of ? (isPt?' — meta atingida':' — target met') : '')}`);
      }else{
        out.push(`- ${cy.label}: ${scoresTxt} — total ${st.total}/240 · ${isPt?'média':'average'} ${st.avg} (${isPt?'mínimo':'min'} 80)${st.under ? (isPt?' — ABAIXO DA MÉDIA':' — BELOW AVERAGE') : st.close ? (isPt?' — perto da média':' — close to the average') : (st.entered===st.of ? (isPt?' — aprovado':' — approved') : '')}`);
      }
    });
  }

  // --- classes missed detail ---
  if(s.missed && s.missed.length){
    out.push('');
    out.push(L.missedHead);
    s.missed.forEach(m=>{
      out.push(`- ${formatDateShort(m.date)}${m.topic?` — ${L.missedTopic}: ${m.topic}`:` ${L.noTopic}`}`);
    });
  }

  // --- comments (from the report-card bank) ---
  const catOrder = ['behavior','homework','vocab','grammar','port'];
  const chosen = catOrder.filter(c=>rcState && rcState.levels[c]);
  if(chosen.length){
    out.push('');
    out.push(L.commentHead);
    chosen.forEach(cat=>{
      const lvl = rcState.levels[cat];
      const phrase = rcPhrase(cat, lvl, rcState.nonce);
      if(phrase){
        const label = RC_CAT_LABELS[cat][isPt?'pt':'en'];
        out.push(`${label}: ${phrase}`);
      }
    });
  }

  // --- parent contact ---
  const hasContact = s.contactPending || (s.contactHistory && s.contactHistory.length);
  if(hasContact){
    out.push('');
    out.push(L.contactHead);
    if(s.contactPending){
      out.push(`- ${L.pending} — ${s.contactPending.category}: ${s.contactPending.reason}`);
    }
    (s.contactHistory||[]).forEach(h=>{
      out.push(`- ${formatDateShort(h.date)} — ${h.category}`);
      if(h.reason)  out.push(`    ${L.reason}: ${h.reason}`);
      if(h.summary) out.push(`    ${L.summary}: ${h.summary}`);
    });
  }

  return out.join('\n');
}

function rcLevelSelect(cat, lang){
  const isPt = lang==='pt';
  const labels = isPt ? RC_LEVEL_LABELS_PT : RC_LEVEL_LABELS_EN;
  const cur = rcState.levels[cat];
  const opts = [`<option value="">${isPt?'— não incluir':'— exclude'}</option>`]
    .concat([1,2,3,4,5].map(n=>`<option value="${n}" ${cur===n?'selected':''}>${n} · ${labels[n]}</option>`))
    .join('');
  return `<label style="display:flex;align-items:center;gap:8px;font-size:13px;">
      <span style="min-width:118px;color:var(--muted);">${RC_CAT_LABELS[cat][isPt?'pt':'en']}</span>
      <select onchange="rcSetLevel('${cat}', this.value)" style="flex:1;">${opts}</select>
    </label>`;
}

function rcSetLevel(cat, val){
  rcState.levels[cat] = val ? Number(val) : null;
  refreshReportTextArea();
}
function rcRegenerate(){
  rcState.nonce = (rcState.nonce + 1) % 8;
  refreshReportTextArea();
}
function refreshReportTextArea(){
  const area = document.getElementById('report-text-area');
  if(area) area.value = buildReportText(lastReportStats, state.reportLang);
}

function openReportTextModal(){
  if(!lastReportStats){ alert('Open a student report first.'); return; }
  if(!rcState) initRcState(lastReportStats);
  const lang = state.reportLang;
  const isPt = lang==='pt';
  const text = buildReportText(lastReportStats, lang);
  const autoNote = isPt
    ? 'Comportamento e lição de casa vêm dos dados. Vocabulário, gramática e português são opcionais — defina se quiser incluí-los.'
    : 'Behaviour and homework are set from the data; vocabulary, grammar and Portuguese use are optional. The comment text is in Portuguese (from the Report Card tool), for a Brazilian report card.';

  showModal(`
    <h2>${isPt?'Texto para o boletim':'Report card text'}</h2>
    <p class="meta" style="margin:6px 0 14px;">${isPt
      ? 'Edite como quiser e copie para o boletim. Alterar os níveis abaixo regenera o texto (perde edições manuais).'
      : 'Edit as needed and copy into the report card. Changing the levels below regenerates the text (manual edits are lost).'}</p>

    <div class="card section" style="padding:14px 16px;margin-bottom:14px;">
      <div style="font-size:12px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);margin-bottom:4px;">${isPt?'Comentários':'Comments'}</div>
      <p class="meta" style="margin:0 0 12px;font-size:12px;">${autoNote}</p>
      <div style="display:grid;gap:8px;">
        ${['behavior','homework','vocab','grammar','port'].map(c=>rcLevelSelect(c, lang)).join('')}
      </div>
      <button class="btn-ghost small" style="margin-top:12px;" onclick="rcRegenerate()">${isPt?'↻ Outra redação':'↻ Reword'}</button>
    </div>

    <textarea id="report-text-area" style="width:100%;min-height:260px;resize:vertical;font-family:var(--font-mono);font-size:13px;line-height:1.5;padding:12px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);">${esc(text)}</textarea>
    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:14px;">
      <button class="btn-ghost" onclick="closeModal()">${isPt?'Fechar':'Close'}</button>
      <button class="btn-accent" id="report-copy-btn" onclick="copyReportText()">${isPt?'Copiar':'Copy'}</button>
    </div>
  `);
}

function copyReportText(){
  const area = document.getElementById('report-text-area');
  const btn = document.getElementById('report-copy-btn');
  const isPt = state.reportLang==='pt';
  const done = ()=>{ if(btn){ btn.textContent = isPt?'Copiado ✓':'Copied ✓'; setTimeout(()=>{ if(btn) btn.textContent = isPt?'Copiar':'Copy'; }, 1600); } };
  const fallback = ()=>{ area.focus(); area.select(); try{ document.execCommand('copy'); done(); }catch(e){ alert(isPt?'Selecione o texto e copie manualmente.':'Select the text and copy manually.'); } };
  if(navigator.clipboard?.writeText){
    navigator.clipboard.writeText(area.value).then(done).catch(fallback);
  } else { fallback(); }
}

function renderStudentProfile(){
  const t = T[state.reportLang];
  const student = state.students.find(s=>s.id===state.studentProfileId);
  const returnView = state.studentProfileReturn || 'reports';
  const returnLabel = returnView==='classes' ? t.backToClasses : returnView==='contacts' ? t.backToContacts : t.backToReports;
  if(!student){
    document.getElementById('view-student').innerHTML = `
      <div class="topbar"><div><button class="btn-ghost back-btn" onclick="navigate('${returnView}')">${returnLabel}</button></div></div>
      <div class="card empty-card">Student not found.</div>`;
    return;
  }
  const cls = classById(student.classId);
  const allRecords = [];
  Object.keys(state.sessions).forEach(key=>{
    const [classId, date] = splitSessionKey(key);
    // Collect records from EVERY class this student has records in (survives transfers)
    if(state.sessions[key][student.id]){
      allRecords.push({date, _classId: classId, ...state.sessions[key][student.id]});
    }
  });

  // A transfer can leave the student with a record under BOTH the old and new
  // class for the same date, producing duplicate rows (and double-counted stats).
  // Keep one record per date: prefer the class the student was enrolled in on that
  // date, then a completed session. Dates with a single record are never dropped.
  const byDate = new Map();
  for(const r of allRecords){
    const enrolledId = classForStudentOnDate(student, r.date)?.id;
    const score = (r._classId===enrolledId ? 2 : 0) + (isSessionCompleted(r._classId, r.date) ? 1 : 0);
    const prev = byDate.get(r.date);
    if(!prev || score > prev._score){ byDate.set(r.date, Object.assign(r, {_score:score})); }
  }
  const dedupedRecords = [...byDate.values()];
  dedupedRecords.sort((a,b)=>b.date.localeCompare(a.date));

  const fromVal = state.reportRange.from || cls?.startDate || '';
  const toVal = state.reportRange.to || cls?.endDate || '';
  const allPeriodRecords = dedupedRecords.filter(r => (!fromVal || r.date>=fromVal) && (!toVal || r.date<=toVal));

  // Separate holiday records from real records
  const holidayDates = allPeriodRecords.filter(r=>isHoliday(r.date)).map(r=>r.date);
  const records = allPeriodRecords.filter(r=>!isHoliday(r.date) && isSessionCompleted(r._classId, r.date));

  // Duration for a record = the duration in effect for *its own class* on *its own date*
  const recDur = r => durationForDate(classById(r._classId) || cls, r.date);

  const total = records.length;
  const absent = records.filter(r=>r.attendance==='absent').length;
  const late = records.filter(r=>r.attendance!=='absent' && (r.lateMin||0)>0).length;
  const present = total - absent;   // attended = present, including those who arrived late
  const totalPhone = records.reduce((sum,r)=>sum+(r.phone||0),0);
  const hwRecords = records.filter(r=>r.hw!=null);
  const hwAvg = hwRecords.length ? Math.round(hwRecords.reduce((s,r)=>{
    const v = typeof r.hw==='number' ? r.hw : (r.hw==='done'?100:0);
    return s+v;
  },0)/hwRecords.length) : null;

  // Expected sessions: sum across every enrollment window overlapping the period
  const expected = (()=>{
    const wins = enrollmentsOf(student);
    let sum = 0, any = false;
    for(const w of wins){
      const c = classById(w.classId);
      if(!c) continue;
      const wFrom = [w.from, fromVal].filter(Boolean).sort().pop();      // max
      const candidates = [w.to, toVal, c.endDate].filter(Boolean);
      const wTo = candidates.length ? candidates.sort()[0] : null;       // min
      if(!wFrom || !wTo || wFrom > wTo) continue;
      const n = expectedSessionsForClass(c, wFrom, wTo);
      if(n!=null){ sum += n; any = true; }
    }
    return any ? sum : null;
  })();
  const classesLost = absent;
  const attRateInfo = attendanceRate(expected, absent, present, late);
  const attendanceRate_ = attRateInfo.rate;
  const attRateBasis = attRateInfo.basis;

  const attended = records.filter(r=>r.attendance!=='absent');
  const totalPossibleMin = records.reduce((s,r)=>s+recDur(r), 0);
  const lostLateMin = attended.reduce((s,r)=>s+(r.lateMin||0),0);
  const lostEarlyMin = attended.reduce((s,r)=>s+(r.leftEarlyMin||0),0);
  const absentMin = records.filter(r=>r.attendance==='absent').reduce((s,r)=>s+recDur(r), 0);
  const inClassMin = Math.max(0, totalPossibleMin - lostLateMin - lostEarlyMin - absentMin);
  const avgDuration = total ? Math.round(totalPossibleMin/total) : (cls?currentDuration(cls):150);
  const duration = avgDuration; // used for display only

  // Participation summary
  const partRecords = attended.filter(r=>r.participation);
  const partGreat = partRecords.filter(r=>r.participation==='great').length;
  const partGood = partRecords.filter(r=>r.participation==='good').length;
  const partLow = partRecords.filter(r=>r.participation==='low').length;
  const partScore = partRecords.length ? Math.round(100*(partGreat*1 + partGood*0.5)/partRecords.length) : null;

  // Time lost equivalent (late + left early + absences), in equivalent classes
  const totalLostMin = lostLateMin + lostEarlyMin + absentMin;
  const lostEquivClasses = avgDuration ? (totalLostMin/avgDuration).toFixed(1) : '0.0';

  // Grades (test scores per cycle) for this student's class
  let gradesInfo = null;
  if(cls){
    const g = state.grades[cls.id];
    if(g && g.cycles && g.cycles.length){
      const cyc = g.cycles
        .map((cy,i)=>({label:cy.label, startedAt:cy.startedAt, isCurrent:i===g.cycles.length-1, status:gradeStatus(cls, cy, student.id)}))
        .filter(x=>x.status);
      if(cyc.length) gradesInfo = { level: cls.level||null, advanced: isAdvancedLevel(cls.level), cycles: cyc };
    }
  }

  // Stash for the plain-text report builder, so it can never disagree with what's shown.
  lastReportStats = {

        <div class="meta">${cls?esc(cls.name):'No class'}</div>
        <div style="font-size:14px;font-weight:600;color:var(--accent);margin-top:6px;">${t.reportPeriod}: ${fromVal?formatDateShort(fromVal):t.allTime}${fromVal||toVal?` – ${toVal?formatDateShort(toVal):t.present2}`:''}</div>

    </div>
    <div class="print-only" style="margin-bottom:14px;font-size:12px;color:var(--muted);">${t.generatedOn} ${formatDateLong(todayStr())}</div>
    <div class="card section no-print" style="margin-bottom:16px;">
      <div class="rollcall-controls" style="flex-wrap:wrap;align-items:center;">
        <label style="font-size:13px;font-weight:600;color:var(--muted);">${t.reportPeriod}:</label>

        ${renderDonut([
          {label:t.present, value:present, color:'var(--green)'},

      </div>
      <div class="card chart-card">
        <h3>${t.timeInClass}</h3>
        <div class="chart-note">${(()=>{
          const counts = {};
          records.forEach(r=>{ const d=recDur(r); counts[d]=(counts[d]||0)+1; });
          const durs = Object.keys(counts).map(Number).sort((a,b)=>a-b);
          if(durs.length<=1) return t.outOf(totalPossibleMin, total, duration);

      ${hwRecords.length ? `
      <div class="card chart-card">

      ${partRecords.length ? `
      <div class="card chart-card">
        <h3>${t.participation}</h3>

        ${renderDonut([
          {label:t.participationLabels.great, value:partGreat, color:'var(--green)'},
          {label:t.participationLabels.good, value:partGood, color:'var(--amber)'},

      </div>` : ''}
    </div>
    ${(()=>{
      const pt = state.reportLang==='pt';
      const allRecs = studentAttendanceRecords(student);
      const attS = attendanceMonthly(allRecs, 10);
      const hwS = hwMonthly(allRecs, 10);
      const gradeS = cls ? studentGradeSeries(cls, student.id) : [];
      const gradeTarget = cls ? (isAdvancedLevel(cls.level) ? TOEFL_TARGETS[cls.level] : CYCLE_AVG_TARGET) : null;
      const ptsS = (cls && cls.pointsEnabled) ? pointsMonthly((state.pointsLog||[]).filter(e=>e.classId===cls.id && e.studentId===student.id), 10) : [];
      if(attS.length<2 && hwS.length<2 && gradeS.length<2 && ptsS.length<2) return '';
      const risk = riskAssess(student);
      const block = (title, series, opts) => series.length<2 ? '' : `
        <div class="trend-block">
          <div class="trend-title">${title}${trendArrow(series)}</div>
          ${sparklineSvg(series, opts)}
        </div>`;
      return `
    <div class="card section">
      <h3>📈 ${pt?'Tendências':'Trends'}</h3>
      <div class="chart-note" style="margin-bottom:10px;">${pt?'Sessões concluídas, feriados excluídos':'Completed sessions only, holidays excluded'}</div>
      ${risk?`<div class="warn-banner" style="margin-bottom:12px;">⚠️ ${pt?'Sinais de risco combinados':'Combined warning signs'}: ${risk.signals.map(sg=>esc(sg.text)).join(' · ')}</div>`:''}
      <div class="trend-grid">

    </div>`;
    })()}
    ${gradesInfo ? `
    <div class="card section" ${gradesInfo.cycles.some(cy=>cy.status.under)?'style="border-left:4px solid var(--red);"':''}>
      <h3>📝 ${state.reportLang==='pt'?'Notas':'Test Grades'}${gradesInfo.level?` <span class="badge other" style="font-size:12px;vertical-align:middle;">${esc(gradesInfo.level)}</span>`:''}</h3>
      <div class="chart-note" style="margin-bottom:8px;">${gradesInfo.advanced
        ? (state.reportLang==='pt' ? `TOEFL — meta por prova: <b>${TOEFL_TARGETS[gradesInfo.level]||'—'}</b>` : `TOEFL — target per test: <b>${TOEFL_TARGETS[gradesInfo.level]||'—'}</b>`)
        : (state.reportLang==='pt' ? `3 provas por ciclo · <b>240 pontos</b> no total (média 80) para aprovação` : `3 tests per cycle · <b>240 points</b> total (average 80) to be approved`)}</div>
      <table>
        <thead><tr><th>${state.reportLang==='pt'?'Ciclo':'Cycle'}</th><th>${state.reportLang==='pt'?'Notas':'Scores'}</th><th style="text-align:center;">Total</th><th style="text-align:center;">${state.reportLang==='pt'?'Média':'Average'}</th><th>Status</th></tr></thead>
        <tbody>
          ${gradesInfo.cycles.map(cy=>{
            const st = cy.status;
            const ok = !st.under && !st.close && st.entered===st.of;
            const statusTxt = st.under
              ? (state.reportLang==='pt' ? (st.advanced?'Abaixo da meta':'Abaixo da média') : (st.advanced?'Below target':'Below average'))
              : st.close
              ? (state.reportLang==='pt' ? (st.advanced?'Perto da meta':'Perto da média') : (st.advanced?'Close to target':'Close to average'))
              : (st.entered<st.of ? (state.reportLang==='pt'?`Em andamento (${st.entered}/${st.of})`:`In progress (${st.entered}/${st.of})`)
                 : (state.reportLang==='pt' ? (st.advanced?'Meta atingida':'Aprovado') : (st.advanced?'Target met':'Approved')));
            return `<tr>
              <td>${esc(cy.label)}${cy.isCurrent?` <span class="badge other" style="font-size:11px;">${state.reportLang==='pt'?'atual':'current'}</span>`:''}</td>
              <td>${st.scores.map(v=>(v==null||v==='')?'—':v).join(' / ')}</td>
              <td style="text-align:center;">${st.total}</td>
              <td style="text-align:center;">${st.avg}</td>
              <td>${st.under?`<span class="badge red">📞 ${statusTxt}</span>`:st.close?`<span class="badge amber">📞 ${statusTxt}</span>`:(ok?`<span class="badge" style="background:var(--green-soft,#e5f7ec);color:var(--green);">✓ ${statusTxt}</span>`:`<span class="badge other">${statusTxt}</span>`)}</td>
            </tr>`;

    <div class="card section">

      ${total ? `<div class="lost-summary" style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border);">${t.timeLost}: <b>${totalLostMin} min ≈ ${lostEquivClasses} ${t.equivClasses}</b>${expected?` (${t.of} ${expected} ${t.expectedShort})`:''}.</div>` : ''}

      </div>`).join('')}
    </div>` : ''}
    <div class="card table-wrap">
      ${records.length||holidayDates.length ? `
      <table>
        <thead><tr><th>${t.date}</th><th>${t.attendance}</th><th title="${t.histCols.late.full}">${t.histCols.late.abbr}</th><th title="${t.histCols.early.full}">${t.histCols.early.abbr}</th><th title="${t.histCols.phone.full}">${t.histCols.phone.abbr}</th><th title="${t.histCols.hw.full}">${t.histCols.hw.abbr}</th><th title="${t.histCols.hwLate.full}">${t.histCols.hwLate.abbr}</th><th title="${t.histCols.eng.full}">${t.histCols.eng.abbr}</th><th title="${t.histCols.part.full}">${t.histCols.part.abbr}</th><th>${t.notes}</th></tr></thead>
        <tbody>
          ${(()=>{
            const partLabel = p => p?({great:t.participationLabels.great,good:t.participationLabels.good,low:t.participationLabels.low}[p]):null;
            const partBadge = p => p==='great'?'green':p==='good'?'amber':'red';
            // Merge records and holiday rows, sort by date descending
            const allRows = [
              ...records.map(r=>({...r, _type:'record'})),
              ...holidayDates.map(date=>({date, _type:'holiday', _label: getHoliday(date)?.label||'Holiday'}))
            ].sort((a,b)=>b.date.localeCompare(a.date));
            return allRows.map(r=>{
              if(r._type==='holiday') return `
                <tr style="background:var(--purple-soft);">
                  <td>${formatDateShort(r.date)}</td>
                  <td colspan="9" style="color:var(--purple);font-weight:600;">🎉 ${esc(r._label)}</td>
                </tr>`;
              const lessonNote = getLessonNote(r._classId || student.classId, r.date);
              const missedRow = (r.attendance==='absent' && lessonNote) ? `
                <tr style="background:var(--red-soft);">
                  <td></td>
                  <td colspan="9" style="font-size:12px;color:var(--red);font-style:italic;">${t.missedLabel}: ${esc(lessonNote)}</td>
                </tr>` : '';
              return `
                <tr>
                  <td>${formatDateShort(r.date)}</td>
                  <td><span class="badge ${attendanceBadgeClass(r.attendance)}">${t.attendanceLabels[r.attendance]||r.attendance}</span></td>
                  <td>${r.lateMin?r.lateMin+' min':'—'}</td>
                  <td>${r.leftEarlyMin?r.leftEarlyMin+' min':'—'}</td>
                  <td>${r.phone||'—'}</td>
                  <td>${r.hw!=null?(typeof r.hw==='number'?r.hw+'%':(r.hw==='done'?'100%':'0%')):'—'}</td>
                  <td>${r.lateHwOutcome ? `<span class="badge ${r.lateHwOutcome==='late'?'green':'red'}">${t.lateHwLabels[r.lateHwOutcome]||r.lateHwOutcome}</span>` : '—'}</td>
                  <td>${r.english?`<span class="badge ${englishBadgeClass(r.english)}">${t.englishLabels[r.english]||r.english}</span>`:'—'}</td>
                  <td>${r.participation?`<span class="badge ${partBadge(r.participation)}">${partLabel(r.participation)}</span>`:'—'}</td>
                  <td>${r.notes?esc(r.notes):'—'}</td>
                </tr>${missedRow}`;
            }).join('');
          })()}
        </tbody>
      </table>
      <div class="hist-legend">
        <b>${t.histLegendTitle}:</b>
        ${[t.histCols.late,t.histCols.early,t.histCols.phone,t.histCols.hw,t.histCols.hwLate,t.histCols.eng,t.histCols.part]
          .map(c=>`<span class="hist-legend-item"><b>${c.abbr}</b> = ${c.full}</span>`).join('')}
      </div>
      ` : `<div class="empty-card">${t.noRecords}</div>`}
    </div>
  `;
}
function toggleReportLang(){
  state.reportLang = state.reportLang==='en' ? 'pt' : 'en';
  refreshView();
}
function setReportRange(which, val){
  state.reportRange[which] = val || '';
  refreshView();
}

  state.reportRange = {from:'', to:''};
  refreshView();
}

/* ================= REPORTS ================= */

  const selClassId = state.reportsSelection.classId;
  const fromVal = state.reportRange.from;
  const toVal   = state.reportRange.to;
  const active = activeClasses();
  const archived = archivedClasses();

  document.getElementById('view-reports').innerHTML = `
    <div class="topbar"><div><h1>Reports</h1><div class="meta">Printable attendance &amp; observation reports per student</div></div></div>
    ${state.classes.length ? `
      <div class="card section" style="margin-bottom:16px;">
        <div class="rollcall-controls" style="flex-wrap:wrap;align-items:center;">
          <select onchange="setReportsClass(this.value)">
            ${active.length?`<optgroup label="Active">${active.map(c=>`<option value="${c.id}" ${c.id===selClassId?'selected':''}>${esc(c.name)}</option>`).join('')}</optgroup>`:''}
            ${archived.length?`<optgroup label="Archived">${archived.map(c=>`<option value="${c.id}" ${c.id===selClassId?'selected':''}>${esc(c.name)} (archived)</option>`).join('')}</optgroup>`:''}
          </select>
          <label style="font-size:13px;font-weight:600;color:var(--muted);">Period:</label>
          <input type="date" value="${fromVal}" onchange="setReportRangeFromReports('from',this.value)" placeholder="From">
          <span style="color:var(--muted);font-size:13px;">–</span>
          <input type="date" value="${toVal}" onchange="setReportRangeFromReports('to',this.value)" placeholder="To">
          <button class="btn-ghost small" onclick="resetReportRangeFromReports()">All time</button>
          <button class="btn-accent" onclick="navigate('group-report')">Group Report →</button>
        </div>
      </div>
    ` : ''}
    ${state.classes.length ? state.classes.filter(c=>!selClassId||c.id===selClassId).map(c=>`
      <div class="card section" style="margin-bottom:12px;">
        <h3 style="display:flex;align-items:center;gap:8px;"><span class="color-dot" style="background:${c.color}"></span>${esc(c.name)}${c.archived?` <span class="badge other">Archived</span>`:''}</h3>
        ${studentsInClass(c.id).length ? studentsInClass(c.id).map(s=>`
          <div class="dash-row">
            <div class="dash-row-title">${esc(s.name)}${s.englishClub?` <span class="badge amber">⭐ English Club</span>`:''}</div>
            <button class="btn-ghost small" onclick="navigate('student',{studentProfileId:'${s.id}', studentProfileReturn:'reports'})">View report →</button>
          </div>
        `).join('') : `<div class="empty">No students in this class yet.</div>`}
      </div>
    `).join('') : `<div class="card empty-card">Add a class and students first in <button type="button" class="linkish" onclick="navigate('classes')">Classes &amp; Students</button>.</div>`}
  `;
}
function setReportsClass(classId){
  state.reportsSelection.classId = classId;
  refreshView();
}
function setReportRangeFromReports(which, val){
  state.reportRange[which] = val || '';
  refreshView();
}
function resetReportRangeFromReports(){
  state.reportRange = {from:'', to:''};
  refreshView();
}

/* ================= CONTACTS ================= */
/* A management surface for LOGGED contacts (contactParentsHistory) across every
   student — the place to fix a contact that was marked done by mistake. Group
   and private students are separated; searchable by name; each entry can be
   edited, deleted, or printed. */

// Flatten every logged contact into rows tagged with student + class context.
// Private students are excluded — "contact parents" reports are a group-class
// concept; private students are adults and their reminders aren't reportable.
function allContactRows(){
  const rows = [];
  state.students.forEach(s=>{
    const c = classById(s.classId);
    (s.contactParentsHistory||[]).forEach((h,idx)=>{
      rows.push({ studentId:s.id, studentName:s.name, kind:'group',
        classId: s.classId, className: c?c.name:'—', classColor: c?c.color:'var(--muted)',
        archived: !!c?.archived, entry:h, idx });
    });
  });
  // newest first
  rows.sort((a,b)=> (b.entry.date||'').localeCompare(a.entry.date||''));
  return rows;
}
// Resolve an entry by id (preferred) or by student+index (legacy entries w/o id).
function findContactEntry(studentId, entryId, idx){
  const s = anyStudent(studentId);
  if(!s || !Array.isArray(s.contactParentsHistory)) return null;
  let i = -1;
  if(entryId) i = s.contactParentsHistory.findIndex(h=>h.id===entryId);
  if(i<0 && idx!=null && s.contactParentsHistory[idx]) i = Number(idx);
  if(i<0) return null;
  return { student:s, list:s.contactParentsHistory, index:i, entry:s.contactParentsHistory[i] };
}

function renderContacts(){
  const q = (state.contactsFilter.search||'').trim().toLowerCase();
  const classFilter = state.contactsFilter.classId||'';
  let rows = allContactRows();
  if(q) rows = rows.filter(r=>r.studentName.toLowerCase().includes(q));
  if(classFilter) rows = rows.filter(r=>r.classId===classFilter);

  // group rows by class (order: active classes, archived, then private)
  const groups = new Map();
  rows.forEach(r=>{ if(!groups.has(r.classId)) groups.set(r.classId, {name:r.className, color:r.classColor, archived:r.archived, items:[]}); groups.get(r.classId).items.push(r); });
  // stable display order
  const order = [...activeClasses().map(c=>c.id), ...archivedClasses().map(c=>c.id)];
  const orderedIds = [...groups.keys()].sort((a,b)=>{ const ia=order.indexOf(a), ib=order.indexOf(b); return (ia<0?99:ia)-(ib<0?99:ib); });

  const total = allContactRows().length;
  const shown = rows.length;

  // class filter options — only classes that actually have contacts
  const classesWithContacts = [...new Set(allContactRows().map(r=>r.classId))];
  const classOpts = classesWithContacts.map(cid=>{
    const c = classById(cid);
    return `<option value="${cid}" ${classFilter===cid?'selected':''}>${esc(c?c.name:'—')}${c?.archived?' (archived)':''}</option>`;
  }).join('');

  document.getElementById('view-contacts').innerHTML = `
    <div class="topbar">
      <div><h1>Contacts</h1><div class="meta">Every logged parent contact &amp; reminder — edit, delete, or print</div></div>
      <div class="no-print" style="display:flex;gap:10px;">
        <button class="btn-accent" onclick="printContactsReport()" ${total?'':'disabled'}>🖨️ Print</button>
      </div>
    </div>
    <div class="card section no-print" style="margin-bottom:16px;">
      <div class="rollcall-controls" style="flex-wrap:wrap;align-items:center;">
        <input type="text" value="${esc(state.contactsFilter.search)}" oninput="setContactsSearch(this.value)" placeholder="Search student…" style="border:1px solid var(--border);border-radius:8px;padding:8px 11px;font-family:inherit;font-size:14px;min-width:200px;">
        <select onchange="setContactsClass(this.value)">
          <option value="">All classes</option>
          ${classOpts}
        </select>
        ${(q||classFilter)?`<button class="btn-ghost small" onclick="clearContactsFilter()">Clear</button>`:''}
        <span style="font-size:12px;color:var(--muted);margin-left:auto;">${shown} of ${total} contact${total===1?'':'s'}</span>
      </div>
    </div>

    <div id="contacts-print-title" class="print-only" style="margin-bottom:12px;">
      <h1 style="margin:0;">Contact Log</h1>
      <div style="color:#444;font-size:13px;">${q?`Student: ${esc(state.contactsFilter.search)} · `:''}${classFilter?`${esc(groups.get(classFilter)?.name||'')} · `:''}Generated ${formatDateLong(todayStr())}</div>
    </div>

    ${total===0 ? `<div class="card empty-card">No contacts have been logged yet. When you mark a Contact Parents flag as done, it's recorded here.</div>`
      : shown===0 ? `<div class="card empty-card">No contacts match your search.</div>`
      : orderedIds.map(cid=>{
        const g = groups.get(cid);
        return `
        <div class="card section" style="margin-bottom:14px;break-inside:avoid;">
          <h3 style="display:flex;align-items:center;gap:8px;margin-top:0;">
            <span class="color-dot" style="background:${g.color}"></span>${esc(g.name)}
            ${g.archived?`<span class="badge other">Archived</span>`:''}
            <span style="font-size:12px;color:var(--muted);font-weight:400;">${g.items.length} contact${g.items.length===1?'':'s'}</span>
          </h3>
          <div class="contact-list">
            ${g.items.map(r=>{
              const e = r.entry;
              const eid = e.id||'';
              return `
              <div class="contact-entry">
                <div style="display:flex;align-items:baseline;justify-content:space-between;gap:10px;flex-wrap:wrap;">
                  <div style="font-weight:700;">${esc(r.studentName)} <span class="badge ${r.kind==='private'?'hw':'red'}" style="margin-left:4px;">${esc(e.category||'—')}</span></div>
                  <div style="font-size:12px;color:var(--muted);white-space:nowrap;">${e.date?formatDateShort(e.date):'—'}</div>
                </div>
                ${e.reason?`<div style="font-size:13px;color:var(--muted);margin-top:4px;"><b>Reason:</b> ${esc(e.reason)}</div>`:''}
                ${e.summary?`<div style="font-size:13px;margin-top:4px;"><b>Summary:</b> ${esc(e.summary)}</div>`:`<div style="font-size:13px;margin-top:4px;color:var(--muted);font-style:italic;">No summary recorded</div>`}
                <div class="contact-entry-actions no-print">
                  <button class="btn-ghost small" onclick="navigate('${r.kind==='private'?'priv-student':'student'}',${r.kind==='private'?`{privOpenStudentId:'${r.studentId}'}`:`{studentProfileId:'${r.studentId}',studentProfileReturn:'contacts'}`})">Open student →</button>
                  <button class="icon-btn" onclick="openEditContactModal('${r.studentId}','${eid}',${r.idx})">✏️ Edit</button>
                  <button class="icon-btn danger" onclick="deleteContact('${r.studentId}','${eid}',${r.idx})">🗑 Delete</button>
                </div>
              </div>`;
            }).join('')}
          </div>
        </div>`;
      }).join('')}
  `;
}

function setContactsSearch(v){ state.contactsFilter.search = v; renderContacts(); }
function setContactsClass(v){ state.contactsFilter.classId = v; renderContacts(); }
function clearContactsFilter(){ state.contactsFilter = {search:'', classId:''}; renderContacts(); }

function openEditContactModal(studentId, entryId, idx){
  const found = findContactEntry(studentId, entryId, idx);
  if(!found){ alert('Could not find this contact.'); return; }
  const s = anyStudent(studentId);
  const e = found.entry;
  const isPriv = !!privStudent(studentId);
  const cats = isPriv
    ? ['Send material','Send link','Homework','Follow-up','Other']
    : ['English Club','Grades','Behavior','Other'];
  if(e.category && !cats.includes(e.category)) cats.push(e.category);
  showModal(`
    <h3>${isPriv?'⏰ Edit reminder':'📞 Edit contact'} — ${esc(s.name)}</h3>
    <div class="field"><label>Date</label><input id="ec-date" type="date" value="${e.date||todayStr()}"></div>
    <div class="field"><label>Category</label>
      <select id="ec-cat">${cats.map(c=>`<option value="${c}" ${e.category===c?'selected':''}>${c}</option>`).join('')}</select>
    </div>
    <div class="field"><label>Reason</label>
      <textarea id="ec-reason" rows="2" style="width:100%;border:1px solid var(--border);border-radius:8px;padding:8px;font-family:inherit;font-size:14px;">${esc(e.reason||'')}</textarea>
    </div>
    <div class="field"><label>Summary</label>
      <textarea id="ec-summary" rows="4" style="width:100%;border:1px solid var(--border);border-radius:8px;padding:8px;font-family:inherit;font-size:14px;">${esc(e.summary||'')}</textarea>
    </div>
    <div class="modal-actions" style="justify-content:space-between;flex-wrap:wrap;gap:8px;">
      <button class="btn-ghost" style="color:var(--red);" onclick="deleteContact('${studentId}','${entryId}',${idx})">🗑 Delete</button>
      <span style="display:flex;gap:8px;">
        <button class="btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn-accent" onclick="saveEditContact('${studentId}','${entryId}',${idx})">Save</button>
      </span>
    </div>
  `);
}
function saveEditContact(studentId, entryId, idx){
  const found = findContactEntry(studentId, entryId, idx);
  if(!found) return;
  const e = found.entry;
  e.date = document.getElementById('ec-date').value || e.date;
  e.category = document.getElementById('ec-cat').value;
  e.reason = document.getElementById('ec-reason').value.trim();
  e.summary = document.getElementById('ec-summary').value.trim();
  if(!e.id) e.id = uid();   // backfill id on legacy entries we touch
  const isPriv = !!privStudent(studentId);
  if(isPriv) persistPrivate(); else scheduleSave('students', state.students);
  closeModal();
  refreshView();
}
function deleteContact(studentId, entryId, idx){
  const found = findContactEntry(studentId, entryId, idx);
  if(!found) return;
  const s = found.student;
  const snapshot = {...found.entry};
  const at = found.index;
  if(!confirm(`Delete this logged contact for ${s.name} (${found.entry.date||'—'})?\n\nIt will no longer appear on their report.`)) return;
  found.list.splice(at, 1);
  const isPriv = !!privStudent(studentId);
  if(isPriv) persistPrivate(); else scheduleSave('students', state.students);
  closeModal();
  refreshView();
  showUndoToast(`Deleted contact for ${s.name}`, ()=>{
    const st = anyStudent(studentId);
    if(st){
      if(!st.contactParentsHistory) st.contactParentsHistory = [];
      st.contactParentsHistory.splice(Math.min(at, st.contactParentsHistory.length), 0, snapshot);
      if(privStudent(studentId)) persistPrivate(); else scheduleSave('students', state.students);
      refreshView();
    }
  });
}
function printContactsReport(){
  // The contacts view already renders print-friendly (filters hidden, title shown).
  window.print();
}

/* ================= GROUP REPORT ================= */
function renderGroupReport(){
  const t = T[state.reportLang];
  const cls = classById(state.reportsSelection.classId);
  if(!cls){
    document.getElementById('view-group-report').innerHTML = `
      <div class="topbar"><div><button class="btn-ghost back-btn no-print" onclick="navigate('reports')">← Back to Reports</button></div></div>
      <div class="card empty-card">Select a class on the Reports page first.</div>`;
    return;
  }
  const students = studentsInClass(cls.id);
  const fromVal = state.reportRange.from || cls.startDate || '';
  const toVal   = state.reportRange.to   || cls.endDate   || '';
  const duration = currentDuration(cls);
  const dur = d => durationForDate(cls, d);

  const rows = students.map(s=>{
    const recs = [];
    Object.keys(state.sessions).forEach(key=>{
      const [cid, date] = splitSessionKey(key);
      if(cid===cls.id && state.sessions[key][s.id])
        recs.push({date, ...state.sessions[key][s.id]});
    });
    const filtered = recs.filter(r=>(!fromVal||r.date>=fromVal)&&(!toVal||r.date<=toVal)&&!isHoliday(r.date)&&isSessionCompleted(cls.id, r.date));
    const total   = filtered.length;
    const absent  = filtered.filter(r=>r.attendance==='absent').length;
    const late    = filtered.filter(r=>r.attendance!=='absent'&&(r.lateMin||0)>0).length;
    const present = total - absent;   // attended, including late arrivals
    const lostLate  = filtered.filter(r=>r.attendance!=='absent').reduce((s,r)=>s+(r.lateMin||0),0);
    const lostEarly = filtered.filter(r=>r.attendance!=='absent').reduce((s,r)=>s+(r.leftEarlyMin||0),0);
    const absentMin = filtered.filter(r=>r.attendance==='absent').reduce((s,r)=>s+dur(r.date),0);
    const totalPoss = filtered.reduce((s,r)=>s+dur(r.date),0);
    const inClass   = Math.max(0, totalPoss - lostLate - lostEarly - absentMin);
    const expected  = expectedSessionsForClass(cls, fromVal||null, toVal||null);
    const attInfo   = attendanceRate(expected, absent, present, late);
    const attRate   = attInfo.rate;
    const attBasis  = attInfo.basis;
    const hwRecs    = filtered.filter(r=>r.hw!=null);
    const hwAvg     = hwRecs.length ? Math.round(hwRecs.reduce((s,r)=>{ const v=typeof r.hw==='number'?r.hw:(r.hw==='done'?100:0); return s+v; },0)/hwRecs.length) : null;
    const phone     = filtered.reduce((s,r)=>s+(r.phone||0),0);
    const partRecs  = filtered.filter(r=>r.attendance!=='absent'&&r.participation);
    const partAvg   = partRecs.length ? Math.round(100*(partRecs.filter(r=>r.participation==='great').length + partRecs.filter(r=>r.participation==='good').length*0.5)/partRecs.length) : null;
    const absRate   = expected ? Math.round(100*absent/expected) : null;
    return {s, total, present, late, absent, attRate, attBasis, absRate, inClass, totalPoss, hwAvg, phone, partAvg};
  });

  // Stash for CSV export so the file matches exactly what's shown.
  window._groupReportExport = { className: cls.name, fromVal, toVal, rows };

  // group averages
  const avg = (arr, key) => { const v=arr.filter(r=>r[key]!=null); return v.length?Math.round(v.reduce((s,r)=>s+r[key],0)/v.length):null; };
  const attAvg = avg(rows,'attRate');
  const hwAvg  = avg(rows,'hwAvg');
  const partGroupAvg = avg(rows,'partAvg');
  const phoneTotal = rows.reduce((s,r)=>s+r.phone,0);

  const badgeForPct = (pct, invert=false) => {
    if(pct==null) return '—';
    const good = invert ? pct<=10 : pct>=80;
    const bad  = invert ? pct>=30 : pct<=50;
    const cls2 = good?'green':bad?'red':'amber';
    return `<span class="badge ${cls2}">${pct}%</span>`;
  };

  document.getElementById('view-group-report').innerHTML = `
    <div class="topbar">
      <div>
        <button class="btn-ghost back-btn no-print" onclick="navigate('reports')">← Back to Reports</button>
        <h1>${esc(cls.name)}</h1>
        <div class="meta">${fromVal?formatDateShort(fromVal):'Start'} – ${toVal?formatDateShort(toVal):'Present'} · ${students.length} students</div>
      </div>
      <div style="display:flex;gap:10px;" class="no-print">
        <button class="btn-ghost" onclick="toggleGroupReportLang()">${t.langToggle}</button>
        <button class="btn-ghost" onclick="exportGroupReportCsv()">⬇ CSV</button>
        <button class="btn-accent" onclick="window.print()">🖨️ ${state.reportLang==='pt'?'Imprimir':'Print'}</button>
      </div>
    </div>
    <div class="stat-row">
      <div class="card stat"><div class="stat-num">${students.length}</div><div class="stat-label">${state.reportLang==='pt'?'Alunos':'Students'}</div></div>
      <div class="card stat"><div class="stat-num">${attAvg!=null?attAvg+'%':'—'}</div><div class="stat-label">${t.attendance} (${state.reportLang==='pt'?'média':'avg'})</div></div>
      <div class="card stat"><div class="stat-num">${hwAvg!=null?hwAvg+'%':'—'}</div><div class="stat-label">${t.homeworkDone} (${state.reportLang==='pt'?'média':'avg'})</div></div>
      <div class="card stat"><div class="stat-num">${partGroupAvg!=null?partGroupAvg+'%':'—'}</div><div class="stat-label">${t.participation} (${state.reportLang==='pt'?'média':'avg'})</div></div>
      <div class="card stat"><div class="stat-num">${phoneTotal}</div><div class="stat-label">${t.phoneUses}</div></div>
    </div>
    <div class="card table-wrap">
      <table>
        <thead>
          <tr>
            <th>${state.reportLang==='pt'?'Aluno':'Student'}</th>
            <th>${state.reportLang==='pt'?'Aulas':'Sessions'}</th>
            <th>${t.present}</th>
            <th>${t.ofWhichLate}</th>
            <th>${t.absent}</th>
            <th>${state.reportLang==='pt'?'% Presença':'Att. rate'}</th>
            <th>${state.reportLang==='pt'?'% Ausência':'Abs. rate'}</th>
            <th>${state.reportLang==='pt'?'Tempo em aula':'In class'}</th>
            <th>${t.hw} (${state.reportLang==='pt'?'média':'avg'})</th>
            <th>${t.participation}</th>
            <th>${t.phone}</th>
            <th>English Club</th>
          </tr>
        </thead>
        <tbody>
          ${rows.map(({s,total,present,late,absent,attRate,absRate,inClass,totalPoss,hwAvg,phone,partAvg})=>`
            <tr>
              <td style="font-weight:600;"><button type="button" class="student-name-link" onclick="navigate('student',{studentProfileId:'${s.id}',studentProfileReturn:'reports'})">${esc(s.name)}</button></td>
              <td>${total}</td>
              <td>${present}</td>
              <td>${late}</td>
              <td>${absent}</td>
              <td>${badgeForPct(attRate)}</td>
              <td>${badgeForPct(absRate, true)}</td>
              <td>${total?Math.round(inClass/totalPoss*100)+'%':'—'}</td>
              <td>${hwAvg!=null?badgeForPct(hwAvg):'—'}</td>
              <td>${partAvg!=null?badgeForPct(partAvg):'—'}</td>
              <td>${phone||'—'}</td>
              <td style="text-align:center;">${s.englishClub?'⭐':''}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
    <div style="font-size:11px;color:var(--muted);margin-top:10px;" class="no-print">
      ${state.reportLang==='pt'?'Clique no nome do aluno para ver o relatório individual.':'Click a student name to view their individual report.'}
    </div>
  `;
}
function toggleGroupReportLang(){
  state.reportLang = state.reportLang==='en' ? 'pt' : 'en';
  refreshView();
}

/* ===== D4: CSV export helpers ===== */
function downloadCsv(filename, rows){
  const q = v => `"${String(v??'').replace(/"/g,'""')}"`;
  const body = rows.map(r=>r.map(q).join(',')).join('\r\n');
  const blob = new Blob(['\uFEFF'+body], {type:'text/csv;charset=utf-8;'});   // BOM so Excel reads accents
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
}
function slugify(s){ return String(s||'').replace(/[^a-z0-9]+/gi,'-').toLowerCase().replace(/^-|-$/g,''); }

function exportGroupReportCsv(){
  const data = window._groupReportExport;
  if(!data){ alert('Open a group report first.'); return; }
  const header = ['Student','Attendance %','Attendance basis','Present','Late','Absent','In-class min','Total min','Homework %','Phone uses','Participation %'];
  const rows = [header].concat(data.rows.map(r=>[
    r.s.name, r.attRate??'', r.attBasis||'', r.present, r.late, r.absent,
    r.inClass, r.totalPoss, r.hwAvg??'', r.phone, r.partAvg??''
  ]));
  const period = `${data.fromVal||'start'}_${data.toVal||'present'}`;
  downloadCsv(`group-report-${slugify(data.className)}-${period}.csv`, rows);
}

function exportGradesCsv(){
  const c = classById(gmClassId);
  const g = classGrades(gmClassId);
  const cycle = g.cycles[gmCycleIdx];
  if(!c || !cycle) return;
  const n = testCountFor(c);
  const students = studentsInClass(gmClassId);
  const header = ['Student', ...Array.from({length:n},(_,i)=>testLabelFor(c,i)), 'Total','Avg','Status'];
  const rows = [header].concat(students.map(s=>{
    const scores = studentScores(cycle, s.id, n);
    const st = gradeStatus(c, cycle, s.id);
    const statusTxt = !st ? '' : st.under ? (st.advanced?`below ${st.target}`:'avg under 80')
      : st.close ? 'close' : (st.entered<st.of ? `on track (${st.entered}/${st.of})` : (st.advanced?'target met':'approved'));
    return [s.name, ...scores.map(v=>v==null?'':v), st?st.total:'', st?st.avg:'', statusTxt];
  }));
  downloadCsv(`grades-${slugify(c.name)}-${slugify(cycle.label)}.csv`, rows);
}

// Shared inner-content builder for one calendar day (used by month + week views).
function calDayItemsHtml(dateStr){
  const dow = new Date(dateStr+'T00:00:00').getDay();
  const holiday = getHoliday(dateStr);
  const classesToday = activeClasses().filter(c=>{
    if(!getClassDays(c).includes(dow)) return false;
    if(c.startDate && dateStr < c.startDate) return false;
    if(c.endDate && dateStr > c.endDate) return false;
    return true;
  });
  const eventsToday = state.events.filter(e=>e.date===dateStr);
  const privToday = state.privateLessons.filter(l=>l.date===dateStr && l.status!=='cancelled')
    .sort((a,b)=>(a.time||'').localeCompare(b.time||''));
  return `
    ${holiday?`<div class="cal-tag holiday-tag">🎉 ${esc(holiday.label)}</div>`:''}
    ${!holiday?classesToday.map(c=>{
      const hasInfo = !!(getLessonNote(c.id, dateStr) || getHomework(c.id, dateStr) || getPromise(c.id, dateStr));
      return `<button type="button" class="cal-tag" title="Open class view (attendance, lesson content, homework, class plan)" style="background:${c.color}22;color:${c.color};border-color:${c.color}55;cursor:pointer;" onclick="event.stopPropagation();goToRollCall('${c.id}','${dateStr}')">${esc(c.name)}${c.time?' '+c.time:''}${hasInfo?' •':''}</button>`;
    }).join(''):''}
    ${eventsToday.map(e=>`<div class="cal-tag ${e.type}">${esc(e.title)}</div>`).join('')}
    ${privToday.map(l=>{
      const st = privStudent(l.studentId);
      return `<button type="button" class="cal-tag priv-tag" title="Click to reschedule" onclick="event.stopPropagation();openRescheduleModal('${l.id}')">👤 ${st?esc(st.name.split(' ')[0]):'?'}${l.time?' '+l.time:''}</button>`;
    }).join('')}`;
}

function renderCalendar(){
  if(state.calView === 'week') return renderCalendarWeek();
  const {year, month} = state.calendar;
  const firstDay = new Date(year, month, 1);
  const startWeekday = firstDay.getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const monthName = firstDay.toLocaleString('en-US',{month:'long'});

  let cells = '';
  for(let i=0;i<startWeekday;i++) cells += `<div class="cal-cell empty"></div>`;
  for(let d=1; d<=daysInMonth; d++){
    const dateStr = dateToStr(year, month, d);
    const isToday = dateStr===todayStr();
    const holiday = getHoliday(dateStr);
    cells += `
      <div class="cal-cell ${isToday?'today':''} ${holiday?'holiday':''}" onclick="openDayModal('${dateStr}')">
        <button type="button" class="cal-date" aria-label="${formatDateLong(dateStr)}${holiday?', holiday':''}" onclick="event.stopPropagation();openDayModal('${dateStr}')">${d}</button>
        <div class="cal-items">${calDayItemsHtml(dateStr)}</div>
      </div>`;
  }

  document.getElementById('view-calendar').innerHTML = `
    <div class="topbar">

  if(!state.calWeekStart){
    const t = new Date(todayStr()+'T00:00:00');
    t.setDate(t.getDate()-t.getDay());
    state.calWeekStart = dateToStr(t.getFullYear(), t.getMonth(), t.getDate());
  }
  const start = new Date(state.calWeekStart+'T00:00:00');
  const days = [];
  for(let i=0;i<7;i++){
    const d = new Date(start); d.setDate(d.getDate()+i);

  }
  const endStr = days[6];

/* ---------- private helpers ---------- */
function privStudent(id){ return state.privateStudents.find(s=>s.id===id); }
function round2(n){ return Math.round(n*100)/100; }
function daysBetween(a,b){
  const d1=new Date(a+'T00:00:00'), d2=new Date(b+'T00:00:00');
  return Math.round((d1-d2)/86400000);
}
function money(n){ return 'R$ ' + (Number(n)||0).toFixed(2); }
// Balance is stored as amount OWED (positive = student owes).
// Displayed from the student's perspective: owing shows negative & red, credit positive & green.
function balanceColor(b){ return b > 0.005 ? 'var(--red)' : 'var(--green)'; }
function balanceText(b){
  if(b > 0.005) return '-' + money(b);
  if(b < -0.005) return '+' + money(Math.abs(b));
  return money(0);
}
function balanceDisplay(b){
  return `<span style="color:${balanceColor(b)};font-weight:600;">${balanceText(b)}</span>`;
}

  scheduleSave('privateStudents', state.privateStudents);
  scheduleSave('privateLessons', state.privateLessons);
  scheduleSave('payments', state.payments);
  scheduleSave('checkpoints', state.checkpoints);
  scheduleSave('learningPoints', state.learningPoints);
  scheduleSave('privateSettings', state.privateSettings);

function lessonCost(s){
  if(!s) return 0;
  if(s.pricingType==='package'){
    const size=Number(s.packageSize)||0, price=Number(s.packagePrice)||0;
    return size>0 ? round2(price/size) : 0;
  }
  if(s.pricingType==='hourly'){
    const dur = (s.recurring && s.recurring[0]?.duration) || 60;
    return round2((Number(s.rate)||0) * dur/60);
  }
  return Number(s.rate)||0; // perLesson
}
function computeLedger(studentId){
  const s = privStudent(studentId);
  const billable = state.privateLessons
    .filter(l=>l.studentId===studentId && (l.status==='completed'||l.status==='no-show'))
    .sort((a,b)=> a.date===b.date ? (a.time||'').localeCompare(b.time||'') : a.date.localeCompare(b.date));
  const cost = lessonCost(s);
  const totalBilled = round2(billable.length * cost);
  const totalPaid = round2(state.payments.filter(p=>p.studentId===studentId).reduce((sum,p)=>sum+(Number(p.amount)||0),0));
  const balance = round2(totalBilled - totalPaid);
  let remaining = totalPaid, oldestUnpaidDate = null;
  for(const l of billable){
    if(cost<=0) continue;
    if(remaining >= cost - 0.005){ remaining -= cost; }
    else { oldestUnpaidDate = l.date; break; }
  }
  const threshold = Number(state.privateSettings.overdueThresholdDays)||14;
  let overdue = false;
  if(oldestUnpaidDate && balance > 0.005){
    overdue = daysBetween(todayStr(), oldestUnpaidDate) >= threshold;
  }
  return { totalBilled, totalPaid, balance, oldestUnpaidDate, overdue, lessonsBilled: billable.length, cost };
}

/* ---------- recurring generation ---------- */
/* Recurring occurrences are rebuilt from the student's weekly slots on every
   load. Deleting or moving one leaves its slot empty, so without a record of
   the teacher's intent regeneration would simply put it back. A "skip" is a
   tombstone marking one slot as deliberately vacated.
   Stored on the student, so it rides along with the existing privateStudents key. */
function slotKey(date, time){ return date + '|' + (time || ''); }

function addRecurringSkip(studentId, date, time){
  const s = privStudent(studentId);
  if(!s) return;
  const key = slotKey(date, time);
  s.skips = s.skips || [];
  if(!s.skips.includes(key)) s.skips.push(key);
}

function pruneSkips(s, today){
  // Regeneration only ever touches today onwards, so past skips are dead weight.
  if(!s.skips || !s.skips.length) return;
  s.skips = s.skips.filter(k => k.split('|')[0] >= today);
}

function regenerateRecurring(s){
  const today = todayStr();
  pruneSkips(s, today);
  // remove future auto-generated placeholders for this student
  state.privateLessons = state.privateLessons.filter(l =>
    !(l.studentId===s.id && l.isRecurring && l.status==='scheduled' && l.date >= today)
  );
  if(!s.recurring || !s.recurring.length || s.status!=='active') return;
  // Window: from max(today, startDate) through endDate, or 8 weeks if open-ended
  const startBound = (s.startDate && s.startDate > today) ? s.startDate : today;
  let endBound;
  if(s.endDate){
    endBound = s.endDate;
  } else {
    const e = new Date(startBound+'T00:00:00');
    e.setDate(e.getDate() + RECUR_HORIZON_WEEKS*7);
    endBound = dateToStr(e.getFullYear(), e.getMonth(), e.getDate());
  }
  if(endBound < startBound) return;
  const skips = new Set(s.skips || []);
  const cur = new Date(startBound+'T00:00:00');
  const end = new Date(endBound+'T00:00:00');
  let guard = 0;
  while(cur <= end && guard++ < 800){
    const ds = dateToStr(cur.getFullYear(), cur.getMonth(), cur.getDate());
    const dow = cur.getDay();
    for(const slot of s.recurring){
      if(slot.weekday !== dow) continue;
      if(skips.has(slotKey(ds, slot.time))) continue;   // deliberately vacated
      const dup = state.privateLessons.some(l=>l.studentId===s.id && l.date===ds && (l.time||'')===(slot.time||''));
      if(dup) continue;
      state.privateLessons.push({
        id: uid(), studentId: s.id, date: ds, time: slot.time||'',
        duration: Number(slot.duration)||60, status:'scheduled', notes:'', isRecurring:true
      });
    }
    cur.setDate(cur.getDate()+1);
  }
}

/* ---------- placement bridge ---------- */
/* Auto-import placement Focus Areas as learning points (deduped by ptKey) */
function syncFocusToLearningPoints(s){
  const h = getPlacementHistory(s.id);
  if(!h || !h.length) return;
  const sorted = h.slice().sort((a,b)=>String(b.testDate||b.date||'').localeCompare(String(a.testDate||a.date||'')));
  const place = sorted.find(r => Array.isArray(r.focus) && r.focus.length);
  if(!place) return;
  let changed = false;
  place.focus.forEach(f => {
    const bankQ = (PT_QB[f.lvl]||[])[f.qi];
    const recOutcome = f.outcome || place.scores?.[f.lvl]?.[f.qi]?.outcome || '';
    let topic, outcome;
    if(f.tests){ topic = f.tests; outcome = f.outcome || ''; }
    else if(bankQ && (!recOutcome || bankQ.outcome === recOutcome)){ topic = bankQ.tests; outcome = bankQ.outcome; }
    else if(recOutcome){ topic = recOutcome; outcome = recOutcome; }
    else return;
    const key = 'pt:' + f.lvl + ':' + (outcome || ('q' + f.qi));
    const legacyKey = 'pt:' + f.lvl + ':' + f.qi;
    const existing = state.learningPoints.find(p => p.studentId===s.id && p.ptKey===key);
    if(existing){
      // Re-pinning after a dismissal revives the point
      if(existing.dismissed && f.pinnedAt && f.pinnedAt > (existing.dismissedAt || '')){
        existing.dismissed = false;
        delete existing.dismissedAt;
        changed = true;
      }
      return;
    }
    // Avoid duplicating a live legacy-keyed point for the same slot
    if(state.learningPoints.some(p => p.studentId===s.id && p.ptKey===legacyKey && !p.dismissed)) return;
    const sc = place.scores?.[f.lvl]?.[f.qi]?.score;
    state.learningPoints.push({
      id: uid(), studentId: s.id, ptKey: key,
      topic: topic,
      skill: 'grammar',
      grade: '',
      dateIntroduced: todayStr(),
      notes: 'From placement (' + f.lvl + '): ' + (outcome || topic) + (sc!=null ? ' — scored ' + sc + '%' : ''),
      complete: false
    });
    changed = true;
  });
  if(changed) persistPrivate();
}


function getPlacementHistory(studentId){
  try{
    const raw = localStorage.getItem(PT_SK_PREFIX + studentId);
    if(!raw) return null;
    const data = JSON.parse(raw);
    if(Array.isArray(data.history) && data.history.length) return data.history;
    if(data.placement !== undefined || data.name !== undefined) return [data];
    return null;
  }catch{ return null; }
}
function latestPlacement(studentId){
  const h = getPlacementHistory(studentId);
  if(!h) return null;
  return h.slice().sort((a,b)=>String(b.testDate||b.date||'').localeCompare(String(a.testDate||a.date||'')))[0];
}
function studyPointsForLevel(level){
  return PT_QB[level] || null;
}

  state.privCal={year,month};
  refreshView();
}

}

function savePrivStudent(id){

  const defTime = document.getElementById('ps-time').value;
  const defDur = Number(document.getElementById('ps-dur').value)||60;

  if(days.length && !custom && !defTime){ alert('Please set a lesson time (or clear the selected days).'); return; }

function saveReschedule(lessonId){
  const l = state.privateLessons.find(x=>x.id===lessonId);
  if(!l) return;
  const newDate = document.getElementById('rs-date').value;
  if(!newDate){ alert('Pick a date.'); return; }
  const newTime = document.getElementById('rs-time').value;
  const origDate = l.date, origTime = l.time, wasRecurring = !!l.isRecurring;
  // A time-only move vacates the old slot just as surely as a date move does.
  const slotChanged = newDate !== origDate || (newTime||'') !== (origTime||'');
  l.date = newDate;
  l.time = newTime;
  l.duration = Number(document.getElementById('rs-dur').value)||60;
  l.notes = document.getElementById('rs-notes').value;
  l.status = document.getElementById('rs-status').value;
  if(wasRecurring && slotChanged){
    l.isRecurring = false;                                  // detach so regeneration never overwrites it
    addRecurringSkip(l.studentId, origDate, origTime);      // and never refills the slot it left
  }
  persistPrivate();
  closeModal();
  refreshView();
}

  l.studentId = studentId;
  l.date = document.getElementById('pl-date').value;

    if(nx){
      nx.homework = nxHwEl.value;
      nx.promise = document.getElementById('pl-next-promise').value;
    }
  }
  if(!isNew && l.date!==oldDate) l.isRecurring = false;  // detach manually moved lessons
  persistPrivate();

}
function deleteLesson(id){
  const l = state.privateLessons.find(x=>x.id===id);
  if(!l) return;
  const snapshot = {...l};
  const wasRecurring = l.isRecurring;
  let addedSkipKey = null;
  // A recurring occurrence would be regenerated on next load unless we mark the slot.
  if(l.isRecurring){
    const s = privStudent(l.studentId);
    const key = slotKey(l.date, l.time);
    const had = s?.skips?.includes(key);
    addRecurringSkip(l.studentId, l.date, l.time);
    if(!had) addedSkipKey = key;   // only remove on undo if we were the ones who added it
  }
  state.privateLessons = state.privateLessons.filter(x=>x.id!==id);
  persistPrivate();
  closeModal();
  refreshView();
  const name = privStudent(snapshot.studentId)?.name || 'lesson';
  showUndoToast(`Deleted ${name} lesson (${formatDateShort(snapshot.date)})`, ()=>{
    if(addedSkipKey){
      const s = privStudent(snapshot.studentId);
      if(s?.skips) s.skips = s.skips.filter(k=>k!==addedSkipKey);
    }
    if(!state.privateLessons.some(x=>x.id===snapshot.id)) state.privateLessons.push(snapshot);
    persistPrivate();
    refreshView();
  });
}
function setLessonStatus(id, status){
  const l = state.privateLessons.find(x=>x.id===id);
  if(!l) return;
  if((status==='completed' || status==='no-show') && l.date > todayStr()){
    alert('This class is on ' + formatDateShort(l.date) + " — it hasn't happened yet.");
    return;
  }
  l.status = status;

  refreshView();
}

/* ---------- checkpoint modal ---------- */
function openCheckpointModal(id, studentId){
  const c = id ? state.checkpoints.find(x=>x.id===id) : null;
  showModal(`
    <h3>${c?'Edit checkpoint':'New checkpoint'}</h3>
    <div class="field"><label>Date</label><input id="cp-date" type="date" value="${c?.date||todayStr()}"></div>
    ${SKILLS.map(sk=>`
      <div class="field"><label>${sk.label}</label>
        <select id="cp-${sk.key}">
          <option value="">—</option>
          ${GRADE_LETTERS.map(g=>`<option value="${g}" ${c?.grades?.[sk.key]===g?'selected':''}>${g}</option>`).join('')}
        </select>
      </div>`).join('')}
    <div class="field"><label>Notes</label><textarea id="cp-notes" rows="2">${esc(c?.notes||'')}</textarea></div>
    <div class="modal-actions" style="${c?'justify-content:space-between;':''}">
      ${c?`<button class="icon-btn danger" onclick="deleteCheckpoint('${c.id}')">Delete</button>`:''}
      <div style="display:flex;gap:10px;">
        <button class="btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn-accent" onclick="saveCheckpoint(${c?`'${c.id}'`:'null'},'${studentId}')">Save</button>
      </div>
    </div>
  `);
}
function saveCheckpoint(id, studentId){
  let c = id ? state.checkpoints.find(x=>x.id===id) : null;
  if(!c){ c = { id: uid(), studentId }; state.checkpoints.push(c); }
  c.date = document.getElementById('cp-date').value;
  c.notes = document.getElementById('cp-notes').value;
  c.grades = {};
  SKILLS.forEach(sk=>{
    const v = document.getElementById('cp-'+sk.key).value;
    if(v) c.grades[sk.key] = v;
  });
  persistPrivate(); closeModal(); refreshView();
}
function deleteCheckpoint(id){
  if(!confirm('Delete this checkpoint?')) return;
  state.checkpoints = state.checkpoints.filter(c=>c.id!==id);
  persistPrivate(); closeModal(); refreshView();
}

/* ---------- learning point modal ---------- */
function openLearningPointModal(id, studentId){
  const p = id ? state.learningPoints.find(x=>x.id===id) : null;
  showModal(`
    <h3>${p?'Edit learning point':'New learning point'}</h3>
    <div class="field"><label>Topic</label><input id="lp-topic" type="text" value="${esc(p?.topic||'')}" placeholder="e.g. Present perfect with for/since"></div>
    <div class="field-row">
      <div class="field" style="flex:1;"><label>Skill</label>
        <select id="lp-skill">
          <option value="">—</option>
          ${SKILLS.map(sk=>`<option value="${sk.key}" ${p?.skill===sk.key?'selected':''}>${sk.label}</option>`).join('')}
        </select>
      </div>
      <div class="field" style="flex:1;"><label>Grade</label>
        <select id="lp-grade">
          <option value="">—</option>
          ${GRADE_LETTERS.map(g=>`<option value="${g}" ${p?.grade===g?'selected':''}>${g}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="field"><label>Date introduced</label><input id="lp-date" type="date" value="${p?.dateIntroduced||todayStr()}"></div>
    <div class="field"><label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
      <input type="checkbox" id="lp-complete" ${p?.complete?'checked':''}> Mastered / complete
    </label></div>
    <div class="field"><label>Notes</label><textarea id="lp-notes" rows="2">${esc(p?.notes||'')}</textarea></div>
    <div class="modal-actions" style="${p?'justify-content:space-between;':''}">
      ${p?`<button class="icon-btn danger" onclick="deleteLearningPoint('${p.id}')">Delete</button>`:''}
      <div style="display:flex;gap:10px;">
        <button class="btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn-accent" onclick="saveLearningPoint(${p?`'${p.id}'`:'null'},'${studentId}')">Save</button>
      </div>
    </div>
  `);
}
function saveLearningPoint(id, studentId){
  const topic = document.getElementById('lp-topic').value.trim();
  if(!topic){ alert('Topic is required.'); return; }
  let p = id ? state.learningPoints.find(x=>x.id===id) : null;
  if(!p){ p = { id: uid(), studentId }; state.learningPoints.push(p); }
  p.topic = topic;
  p.skill = document.getElementById('lp-skill').value;
  p.grade = document.getElementById('lp-grade').value;
  p.dateIntroduced = document.getElementById('lp-date').value;
  p.notes = document.getElementById('lp-notes').value;
  const wasComplete = p.complete;
  p.complete = document.getElementById('lp-complete').checked;
  if(p.complete && !wasComplete && !p.dateCompleted) p.dateCompleted = todayStr();
  if(!p.complete) p.dateCompleted = '';
  persistPrivate(); closeModal(); refreshView();
}
function deleteLearningPoint(id){
  if(!confirm('Delete this learning point?')) return;
  const p = state.learningPoints.find(x=>x.id===id);
  if(p && p.ptKey){ p.dismissed = true; p.dismissedAt = new Date().toISOString(); }
  else state.learningPoints = state.learningPoints.filter(x=>x.id!==id);
  persistPrivate(); closeModal(); refreshView();
}

window.state = state;

// E2: expose pure/near-pure functions for the test harness. Guarded so it never
// interferes with normal use. See teacher-dashboard-tests.html.
window.__testables = {
  attendanceRate,
  pointsFor,
  letterToNum,
  numToLetter,
  activityAvg,
  studentSkillAverages,
  attendanceMonthly,
  hwMonthly,
  pointsMonthly,
  sigAttendance,

  sanitizePlanHtml,
  planDisplayHtml,

  gradeStatus,
  classLogRows,
  computeLedger,
  isDefaultRecord,
  getNextClassDate,
  // let tests inject fixture state
  _setState: (s)=>{ Object.keys(state).forEach(k=>delete state[k]); Object.assign(state, s); }
};

// One-time cleanup: earlier versions seeded empty records just by opening a
// session. Remove any session whose records are all pristine defaults and that
// isn't marked completed — it carries no information but pollutes "awaiting
// completion" and grows the sessions blob. Runs once per load; only writes if
// it actually removed something.
function isDefaultRecord(r){
  const d = defaultRecord();
  if(!r) return true;
  // lateHwOutcome is set separately and meaningful even on an otherwise-default row
  if(r.lateHwOutcome) return false;
  for(const k of Object.keys(d)){
    if(k === 'notes'){ if((r.notes||'').trim() !== '') return false; }
    else if(r[k] !== d[k]) return false;
  }
  return true;
}
function cleanupEmptySessions(){
  let removed = 0;
  for(const key of Object.keys(state.sessions)){
    if(state.sessionMeta && state.sessionMeta[key]?.completed) continue;   // never touch completed
    const recs = state.sessions[key];
    const ids = Object.keys(recs || {});
    if(ids.length === 0){ delete state.sessions[key]; removed++; continue; }
    if(ids.every(id => isDefaultRecord(recs[id]))){ delete state.sessions[key]; removed++; }
  }
  if(removed){ scheduleSave('sessions', state.sessions); }
  return removed;
}
function showLoadError(err){
  dataReady = false;
  document.getElementById('app-main').innerHTML = `
    <div class="card empty-card" style="max-width:520px;margin:60px auto;text-align:center;">
      <h3 style="color:var(--red);">Couldn't load your data</h3>
      <p class="meta" style="margin:10px 0 4px;">The dashboard did not open, because showing an empty dashboard could overwrite your real records.</p>
      <p class="meta" style="margin:0 0 16px;font-size:12px;">${esc(err?.message || String(err))}</p>
      <button class="btn-accent" onclick="location.reload()">Try again</button>
    </div>`;
}

async function init(){
  // Never proceed on a partial/failed read: an empty state would be written back over good data.
  try{
    loadedBlobs = await loadAllKeys();
  }catch(err){
    console.error('Initial load failed', err);
    showLoadError(err);
    return;
  }
  state.classes = loadKey('classes', []);
  state.students = loadKey('students', []);
  state.sessions = loadKey('sessions', {});
  state.events = loadKey('events', []);
  state.holidays = loadKey('holidays', []);
  state.sessionMeta = loadKey('sessionMeta', {});
  state.lessonNotes = loadKey('lessonNotes', {});
  state.homework = loadKey('homework', {});
  state.promises = loadKey('promises', {});
  state.pointsLog = loadKey('pointsLog', []);
  state.activities = loadKey('activities', []);
  state.privateStudents = loadKey('privateStudents', []);
  state.privateLessons = loadKey('privateLessons', []);
  state.payments = loadKey('payments', []);
  state.checkpoints = loadKey('checkpoints', []);
  state.learningPoints = loadKey('learningPoints', []);
  state.classFocus = loadKey('classFocus', {});
  state.privateSettings = loadKey('privateSettings', { overdueThresholdDays: 14 });
  state.grades = loadKey('grades', {});
  state.gradeSettings = loadKey('gradeSettings', { margin: 0 });
  state.backupMeta = loadKey('backupMeta', { lastBackupAt: null });

  dataReady = true;   // writes unlocked only now

  cleanupEmptySessions();   // drop empty sessions left by older view-creates-data behaviour

  // refresh recurring placeholders for active students on load
  state.privateStudents.filter(x=>x.status==='active').forEach(regenerateRecurring);
  navigate('dashboard');
}

/* ---------- session bootstrap ---------- */
(async function bootstrap(){
  const { data: { session } } = await sb.auth.getSession();
  if(session){
    currentUser = session.user;
    await enterApp();
  }
})();
