<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EFL Teacher Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --sidebar:#1c2436;
    --sidebar-accent:#2a3650;
    --bg:#f4f6fb;
    --card:#ffffff;
    --border:#e3e7f0;
    --text:#1c2436;
    --muted:#7d869c;
    --accent:#4f6df5;
    --accent-soft:#e8ecff;
    --green:#1f9d6f;
    --green-soft:#e3f7ee;
    --amber:#c98a1c;
    --amber-soft:#fbf0dc;
    --red:#d1453d;
    --red-soft:#fbe6e4;
    --purple:#8b5cf6;
    --purple-soft:#efe7ff;
    --gray:#6b7280;
    --gray-soft:#eef0f4;
    --accent-grad: linear-gradient(135deg, #4f6df5 0%, #8b5cf6 100%);
    --radius:16px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Inter',sans-serif;
    background:
      radial-gradient(circle at 100% 0%, #eef1fd 0%, transparent 45%),
      radial-gradient(circle at 0% 100%, #eef7f3 0%, transparent 40%),
      var(--bg);
    color:var(--text);
    display:flex;
    min-height:100vh;
  }
  h1,h2,h3{font-family:'Sora',sans-serif;margin:0;}
  a{color:var(--accent);cursor:pointer;}

  /* Sidebar */
  .sidebar{
    width:230px;
    background:
      radial-gradient(circle at 25% 0%, rgba(79,109,245,.35), transparent 55%),
      radial-gradient(circle at 90% 80%, rgba(139,92,246,.18), transparent 50%),
      linear-gradient(165deg, #1c2436 0%, #20283e 55%, #181f30 100%);
    color:#cfd6e8;
    padding:24px 18px;
    flex-shrink:0;
  }
  .sidebar .brand{
    font-family:'Sora',sans-serif;
    font-weight:700;
    font-size:18px;
    letter-spacing:-.01em;
    color:#fff;
    margin-bottom:28px;
    display:flex;
    align-items:center;
    gap:10px;
  }
  .sidebar .brand .dot{
    width:10px;height:10px;border-radius:50%;
    background:var(--accent-grad);
    box-shadow:0 0 10px rgba(79,109,245,.8);
  }
  .nav-item{
    display:flex;align-items:center;gap:12px;
    padding:9px 12px;border-radius:12px;
    font-size:14px;font-weight:500;
    margin-bottom:4px;cursor:pointer;
    color:#aab3c9;
    transition:background .15s, color .15s;
  }
  .nav-item:hover{color:#fff;background:rgba(255,255,255,.05);}
  .nav-item.active{
    background:rgba(255,255,255,.06);
    color:#fff;
  }
  .nav-icon-badge{
    width:30px;height:30px;border-radius:9px;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    background:rgba(255,255,255,.06);
    color:#aab3c9;
    transition:background .15s, color .15s, box-shadow .15s;
  }
  .nav-icon-badge svg{width:16px;height:16px;}
  .nav-item:hover .nav-icon-badge{background:rgba(255,255,255,.12);color:#fff;}
  .nav-item.active .nav-icon-badge{
    background:var(--accent-grad);
    color:#fff;
    box-shadow:0 4px 14px -2px rgba(79,109,245,.6);
  }
  .sidebar-divider{height:1px;background:rgba(255,255,255,.08);margin:10px 4px 10px;}

  /* Main */
  .main{flex:1;padding:28px 36px;max-width:1180px;}
  .view{display:none;}
  .view.active{display:block;}

  .topbar{
    display:flex;justify-content:space-between;align-items:flex-start;
    margin-bottom:18px;flex-wrap:wrap;gap:12px;
  }
  .topbar h1{font-size:24px;letter-spacing:-.01em;}
  .topbar .meta{color:var(--muted);font-size:13px;margin-top:4px;}
  .back-btn{margin-bottom:8px;}

  /* shared */
  .card{
    background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
    box-shadow:0 1px 2px rgba(28,36,54,.03), 0 10px 30px -16px rgba(28,36,54,.12);
  }
  .badge{font-size:11px;font-weight:600;padding:3px 9px;border-radius:999px;}
  .badge.green{background:var(--green-soft);color:var(--green);}
  .badge.amber{background:var(--amber-soft);color:var(--amber);}
  .badge.red{background:var(--red-soft);color:var(--red);}
  .badge.hw, .cal-tag.hw{background:var(--accent-soft);color:var(--accent);}
  .badge.test, .cal-tag.test{background:var(--red-soft);color:var(--red);}
  .badge.project, .cal-tag.project{background:var(--purple-soft);color:var(--purple);}
  .badge.other, .cal-tag.other{background:var(--gray-soft);color:var(--gray);}

  .btn-accent{
    background:var(--accent-grad);color:#fff;border:none;border-radius:10px;
    padding:10px 18px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;
    box-shadow:0 4px 14px -4px rgba(79,109,245,.5);
    transition:transform .15s, box-shadow .15s, filter .15s;
  }
  .btn-accent:hover{filter:brightness(1.06);transform:translateY(-1px);box-shadow:0 6px 18px -4px rgba(79,109,245,.6);}
  .btn-ghost{background:#fff;border:1px solid var(--border);border-radius:10px;padding:9px 16px;font-size:13px;font-weight:600;cursor:pointer;color:var(--text);font-family:inherit;}
  .btn-ghost:hover{border-color:var(--accent);color:var(--accent);}
  .btn-ghost.small{padding:6px 12px;font-size:12px;}
  .icon-btn{background:none;border:1px solid var(--border);border-radius:8px;padding:5px 10px;font-size:12px;font-weight:600;cursor:pointer;color:var(--muted);font-family:inherit;}
  .icon-btn.danger{color:var(--red);border-color:var(--red-soft);}
  .icon-btn.danger:hover{background:var(--red-soft);}
  .icon-btn.ec-on{color:var(--amber);border-color:var(--amber-soft);background:var(--amber-soft);}

  .empty{color:var(--muted);font-size:13px;padding:8px 0;}
  .empty-card{padding:34px;text-align:center;color:var(--muted);font-size:14px;}
  .empty-card .btn-accent{margin-top:14px;}
  .color-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;display:inline-block;}

  /* stat row */
  .stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin-bottom:18px;}
  .stat{padding:16px;text-align:center;}
  .stat-num{
    font-family:'Sora',sans-serif;font-size:26px;font-weight:700;
    background:var(--accent-grad);-webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .stat-label{font-size:12px;color:var(--muted);margin-top:4px;}

  /* dashboard */
  .dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  .section{padding:18px;}
  .section h3{margin-bottom:12px;font-size:15px;}
  .dash-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);gap:10px;}
  .dash-row:last-child{border-bottom:none;}
  .dash-row-left{display:flex;align-items:center;gap:10px;}
  .dash-row-title{font-weight:600;font-size:13px;}
  .dash-row-sub{font-size:12px;color:var(--muted);margin-top:2px;}
  @media(max-width:900px){.dash-grid{grid-template-columns:1fr;}}

  /* classes & students */
  .class-card{margin-bottom:12px;overflow:hidden;}
  .class-card-head{display:flex;justify-content:space-between;align-items:center;padding:16px;gap:10px;}
  .class-card-head .dash-row-left{flex:1;cursor:pointer;}
  .class-card-actions{display:flex;gap:8px;align-items:center;flex-shrink:0;}
  .chevron{color:var(--muted);font-size:14px;width:14px;text-align:center;}
  .class-card-body{border-top:1px solid var(--border);padding:16px;}
  .add-student-row{display:flex;gap:8px;margin-bottom:12px;}
  .add-student-row input{flex:1;border:1px solid var(--border);border-radius:8px;padding:9px 11px;font-family:inherit;font-size:13px;}
  .student-list-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;}
  .student-list-row:last-child{border-bottom:none;}
  .student-name-link{cursor:pointer;font-weight:500;}
  .student-name-link:hover{color:var(--accent);text-decoration:underline;}

  /* modal */
  .modal-overlay{position:fixed;inset:0;background:rgba(28,36,54,.45);display:flex;align-items:center;justify-content:center;z-index:50;padding:20px;}
  .modal{background:#fff;border-radius:16px;padding:24px;width:100%;max-width:440px;max-height:85vh;overflow-y:auto;}
  .modal h3{margin-bottom:16px;font-size:18px;}
  .modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:18px;}
  .modal-section{margin-bottom:16px;}
  .modal-section-label{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px;}
  .modal-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;gap:10px;}
  .modal-row:last-child{border-bottom:none;}
  .modal-row .color-dot{margin-right:6px;}
  .field-row{display:flex;gap:8px;}
  .field-row select{flex:1;}

  .field{margin-bottom:12px;}
  .field label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px;}
  .field.full{grid-column:1/-1;}
  .field input, .field select, .modal select, .modal input{
    width:100%;border:1px solid var(--border);border-radius:8px;padding:9px 11px;font-family:inherit;font-size:14px;
  }
  .swatches{display:flex;gap:8px;flex-wrap:wrap;}
  .swatch{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent;}
  .swatch.on{border-color:var(--text);}

  /* roll call */
  .rollcall-controls{display:flex;gap:10px;flex-wrap:wrap;}
  .rollcall-controls select, .rollcall-controls input{border:1px solid var(--border);border-radius:10px;padding:8px 12px;font-family:inherit;font-size:13px;background:#fff;}
  .warn-banner{background:var(--amber-soft);color:var(--amber);border-radius:10px;padding:10px 14px;font-size:13px;margin-bottom:14px;font-weight:500;}
  .rollcall-actions{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
  .save-indicator{font-size:12px;color:var(--muted);}

  .roster-list{display:flex;flex-direction:column;padding:6px 0;}
  .roster-row{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;gap:14px;cursor:pointer;}
  .roster-row + .roster-row, .drawer + .roster-row{border-top:1px solid var(--border);}
  .student-name{font-weight:600;font-size:14px;flex:1;}
  .seg{display:flex;border:1px solid var(--border);border-radius:10px;overflow:hidden;}
  .seg button{border:none;background:#fff;padding:7px 14px;font-size:13px;font-weight:600;cursor:pointer;color:var(--muted);font-family:inherit;}
  .seg button + button{border-left:1px solid var(--border);}
  .seg button.present.on{background:var(--green-soft);color:var(--green);}
  .seg button.late.on{background:var(--amber-soft);color:var(--amber);}
  .seg button.absent.on{background:var(--red-soft);color:var(--red);}
  .detail-btn{border:1px solid var(--border);background:#fff;border-radius:10px;padding:7px 12px;font-size:13px;font-weight:600;color:var(--accent);font-family:inherit;}

  .drawer{padding:0 16px;background:var(--bg);display:none;grid-template-columns:repeat(2,1fr);gap:14px;}
  .roster-row.open + .drawer{display:grid;padding:16px;border-top:1px solid var(--border);}

  .stepper{display:flex;align-items:center;gap:10px;}
  .stepper button{width:28px;height:28px;border-radius:8px;border:1px solid var(--border);background:#fff;font-size:15px;cursor:pointer;font-family:inherit;}
  .stepper .val{font-weight:600;min-width:50px;text-align:center;font-size:13px;}
  .quick-num{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
  .num-input{width:64px;height:38px;border:1px solid var(--border);border-radius:8px;padding:6px 8px;font-family:inherit;font-size:14px;font-weight:600;text-align:center;}
  .qbtn{min-width:44px;height:38px;border-radius:8px;border:1px solid var(--border);background:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--accent);}
  .qbtn:hover{background:var(--accent-soft);}
  .qbtn.zero{color:var(--muted);}
  .ro-val{font-size:14px;font-weight:600;padding:7px 0;color:var(--text);}
  .locked-session .seg button[disabled]{opacity:.55;cursor:not-allowed;}
  .pill-group{display:flex;gap:6px;flex-wrap:wrap;}
  .pill{border:1px solid var(--border);background:#fff;border-radius:999px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;color:var(--muted);}
  .pill.on.green{background:var(--green-soft);color:var(--green);border-color:var(--green);}
  .pill.on.amber{background:var(--amber-soft);color:var(--amber);border-color:var(--amber);}
  .pill.on.red{background:var(--red-soft);color:var(--red);border-color:var(--red);}
  textarea{width:100%;border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-family:inherit;font-size:13px;resize:vertical;min-height:50px;}

  /* tables */
  .table-wrap{overflow-x:auto;border-radius:var(--radius);}
  table{width:100%;border-collapse:collapse;font-size:13px;min-width:760px;}
  th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);padding:10px 12px;background:#fafbfd;border-bottom:1px solid var(--border);white-space:nowrap;}
  td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle;}
  td:last-child{white-space:normal;min-width:140px;max-width:260px;word-wrap:break-word;}
  tr:last-child td{border-bottom:none;}

  /* calendar */
  .cal-nav{display:flex;align-items:center;gap:10px;}
  .cal-month-label{font-family:'Sora',sans-serif;font-weight:600;font-size:15px;min-width:140px;text-align:center;}
  .cal-grid-wrap{padding:16px;}
  .cal-weekdays{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:8px;}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
  .cal-cell{border:1px solid var(--border);border-radius:10px;padding:8px;min-height:90px;cursor:pointer;display:flex;flex-direction:column;gap:4px;}
  .cal-cell:hover{border-color:var(--accent);}
  .cal-cell.empty{border:none;cursor:default;background:transparent;}
  .cal-cell.empty:hover{border:none;}
  .cal-cell.today{background:var(--accent-soft);border-color:var(--accent);}
  .cal-date{font-weight:600;font-size:13px;}
  .cal-items{display:flex;flex-direction:column;gap:3px;overflow:hidden;}
  .cal-tag{font-size:10px;font-weight:600;padding:2px 6px;border-radius:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;border:1px solid transparent;}
  .cal-legend{display:flex;gap:16px;flex-wrap:wrap;margin-top:14px;font-size:12px;color:var(--muted);align-items:center;}
  .legend-item{display:flex;align-items:center;gap:6px;}
  .cal-cell.holiday{background:repeating-linear-gradient(45deg, #ffffff 0 8px, #eef0f6 8px 16px);}
  .cal-tag.holiday-tag{background:var(--purple-soft);color:var(--purple);}
  .cal-tag.priv-tag{background:#fff;color:#0ea5b8;border:1px dashed #0ea5b8;font-weight:600;cursor:pointer;}
  .cal-tag.priv-tag:hover{background:#0ea5b811;}
  .tab{padding:9px 16px;border-radius:999px;font-size:13px;font-weight:600;border:1px solid var(--border);background:var(--card);cursor:pointer;color:var(--muted);}
  .tab.active{background:var(--accent-grad);color:#fff;border-color:transparent;}
  .tabs{display:flex;gap:8px;flex-wrap:wrap;}

  /* charts */
  .charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:18px;}
  .chart-card{padding:18px;}
  .chart-card h3{margin-bottom:6px;font-size:15px;}
  .chart-card .chart-note{font-size:12px;color:var(--muted);margin-bottom:14px;}
  .donut-wrap{display:flex;align-items:center;gap:20px;flex-wrap:wrap;}
  .donut{width:140px;height:140px;border-radius:50%;position:relative;flex-shrink:0;}
  .donut svg{display:block;width:100%;height:100%;}
  .donut-center{position:absolute;inset:18px;background:#fff;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;}
  .donut-num{font-family:'Sora',sans-serif;font-weight:700;font-size:20px;}
  .donut-sub{font-size:11px;color:var(--muted);}
  .donut-legend{display:flex;flex-direction:column;gap:6px;font-size:13px;flex:1;}
  .lost-summary{font-size:13px;line-height:1.7;}
  .lost-summary b{font-family:'Sora',sans-serif;}
  @media(max-width:900px){.charts-grid{grid-template-columns:1fr;}}

  /* print */
  .print-only{display:none;}
  @media print{
    @page{margin:14mm;}
    *{-webkit-print-color-adjust:exact !important;print-color-adjust:exact !important;color-adjust:exact !important;}
    .sidebar, #modal-root, .no-print{display:none !important;}
    body{display:block;background:#fff;}
    .main{padding:0;max-width:none;}
    .view{display:none !important;}
    .view.active{display:block !important;}
    .print-only{display:block !important;}
    .card{box-shadow:none;border:1px solid #ddd;break-inside:avoid;margin-bottom:10px;}
    .stat-row{grid-template-columns:repeat(3,1fr);}
    .stat-num{
      background:none !important;-webkit-background-clip:initial !important;background-clip:initial !important;
      color:var(--accent) !important;-webkit-text-fill-color:var(--accent) !important;
    }
    .charts-grid{grid-template-columns:1fr 1fr;gap:12px;}
    .donut{width:120px;height:120px;}
    .donut-center{inset:15px;}
    .table-wrap{break-inside:auto;}
    .table-wrap table{min-width:0;font-size:11px;table-layout:fixed;width:100%;}
    .table-wrap table th:last-child,
    .table-wrap table td:last-child{width:28%;white-space:normal;word-wrap:break-word;}
    thead{display:table-header-group;}
    tr{break-inside:avoid;}
  }

  @media(max-width:760px){
    body{flex-direction:column;}
    .sidebar{width:100%;display:flex;align-items:center;gap:8px;padding:14px 16px;overflow-x:auto;}
    .sidebar .brand{margin-bottom:0;margin-right:8px;flex-shrink:0;}
    .nav-item{flex-shrink:0;margin-bottom:0;white-space:nowrap;}
    #backup-status, .sidebar-divider{display:none;}
    .main{padding:18px;}
    .stat-row{grid-template-columns:repeat(2,1fr);}
    .dash-grid{grid-template-columns:1fr !important;}
    .drawer{grid-template-columns:1fr;}
    .cal-cell{min-height:60px;}
    .dash-grid{grid-template-columns:1fr;}
  }
  @media(max-width:520px){
    .roster-row{flex-wrap:wrap;gap:10px;}
    .roster-row .student-name{flex-basis:100%;}
    .seg button{padding:10px 18px;font-size:14px;}
    .detail-btn{padding:10px 14px;}
    .num-input{height:44px;width:70px;}
    .qbtn{height:44px;min-width:48px;}
    .pill{padding:9px 14px;}
  }
</style>
</head>
<body>

<div class="sidebar">
  <div class="brand"><span class="dot"></span>EFL Dashboard</div>
  <a href="../" style="display:flex;align-items:center;gap:6px;color:#7d869c;font-size:12px;text-decoration:none;margin:-16px 0 20px 2px;transition:color .15s;" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='#7d869c'">← Tool Hub</a>
  <div class="nav-item" data-view="dashboard" onclick="navigate('dashboard')">
    <div class="nav-icon-badge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11.5 12 4l9 7.5"/><path d="M5 10v9a1 1 0 0 0 1 1h4v-5h4v5h4a1 1 0 0 0 1-1v-9"/></svg></div>
    Dashboard
  </div>
  <div class="nav-item" data-view="classes" onclick="navigate('classes')">
    <div class="nav-icon-badge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3"/><path d="M2 20c0-3.3 3.1-6 7-6s7 2.7 7 6"/><circle cx="17" cy="7" r="2.5"/><path d="M21 20c0-2.7-1.8-5-4.5-5.8"/></svg></div>
    Classes &amp; Students
  </div>
  <div class="nav-item" data-view="rollcall" onclick="navigate('rollcall')">
    <div class="nav-icon-badge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="4" width="14" height="17" rx="2"/><path d="M9 3h6v3H9z"/><path d="m9 13 2 2 4-4"/></svg></div>
    Roll Call
  </div>
  <div class="nav-item" data-view="calendar" onclick="navigate('calendar')">
    <div class="nav-icon-badge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 10h18"/><path d="M8 3v4"/><path d="M16 3v4"/></svg></div>
    Calendar
  </div>
  <div class="nav-item" data-view="reports" onclick="navigate('reports')">

/* ---------- storage ---------- */
const STORAGE_PREFIX = 'efl-dashboard:';
async function loadKey(key, fallback){
  try{
    const raw = localStorage.getItem(STORAGE_PREFIX+key);
    return raw !== null ? JSON.parse(raw) : fallback;
  }catch(e){
    console.error('Load failed for', key, e);
    return fallback;
  }
}
async function saveKey(key, value){
  try{
    localStorage.setItem(STORAGE_PREFIX+key, JSON.stringify(value));
  }catch(e){
    console.error('Save failed for', key, e);
  }
}
const saveTimers = {};
function scheduleSave(key, value){
  if(saveTimers[key]) clearTimeout(saveTimers[key]);
  saveTimers[key] = setTimeout(()=>{
    saveKey(key, value);
    if(key==='sessions'){
      const el = document.getElementById('save-indicator');
      if(el) el.textContent = 'Saved at ' + nowTime();
    }
  }, 450);
}

/* ---------- helpers ---------- */
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function pad(n){ return String(n).padStart(2,'0'); }
function todayStr(){ const d=new Date(); return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function dateToStr(y,m,d){ return `${y}-${pad(m+1)}-${pad(d)}`; }
function nowTime(){ const d=new Date(); return pad(d.getHours())+':'+pad(d.getMinutes()); }
function formatDateLong(dateStr){
  return new Date(dateStr+'T00:00:00').toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
}
function formatDateShort(dateStr){
  return new Date(dateStr+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});
}
const DAY_ABBR = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const DAY_FULL = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
function getClassDays(cls){
  if(Array.isArray(cls.days) && cls.days.length) return cls.days;
  if(cls.schedule && SCHEDULE_DAYS[cls.schedule]) return SCHEDULE_DAYS[cls.schedule];
  return [];
}
function scheduleLabel(cls){
  const days = getClassDays(cls);
  return days.length ? days.map(d=>DAY_ABBR[d]).join(' / ') : 'No days set';
}
function classById(id){ return state.classes.find(c=>c.id===id); }
function activeClasses(){ return state.classes.filter(c=>!c.archived); }
function archivedClasses(){ return state.classes.filter(c=>c.archived); }
function studentsInClass(classId){ return state.students.filter(s=>s.classId===classId); }
function getPreviousClassDate(cls, fromDateStr){
  const days = getClassDays(cls);
  if(!days.length) return null;
  let d = new Date(fromDateStr+'T00:00:00');
  for(let i=0; i<60; i++){
    d.setDate(d.getDate()-1);
    const dateStr = dateToStr(d.getFullYear(), d.getMonth(), d.getDate());
    if(days.includes(d.getDay()) && !isHoliday(dateStr)) return dateStr;
  }
  return null;
}
function esc(str){
  return String(str ?? '').replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function eventTypeLabel(type){ return {hw:'Homework',test:'Test',project:'Project',other:'Other'}[type] || type; }
function attendanceLabel(a){ return {present:'Present',late:'Late',absent:'Absent'}[a] || '—'; }
function attendanceBadgeClass(a){ return {present:'green',late:'amber',absent:'red'}[a] || ''; }
function englishLabel(e){ return {excellent:'Excellent',improve:'Needs some reminders',unacceptable:'Needs consistent reminders'}[e] || '—'; }
function englishBadgeClass(e){ return {excellent:'green',improve:'amber',unacceptable:'red'}[e] || ''; }
function splitSessionKey(key){ const i=key.indexOf('_'); return [key.slice(0,i), key.slice(i+1)]; }
function defaultRecord(){ return {attendance:'present', lateMin:0, leftEarlyMin:0, phone:0, hw:100, english:'excellent', participation:'good', notes:''}; }
function getHoliday(dateStr){ return state.holidays.find(h=>h.date===dateStr); }
function isHoliday(dateStr){ return !!getHoliday(dateStr); }
/* ---------- duration history ---------- */
// A class's duration can change over time. durationHistory = [{from:'YYYY-MM-DD', duration:N}, ...]
// Past sessions keep the duration that was in effect on their date.
function durationHistoryOf(cls){
  if(Array.isArray(cls.durationHistory) && cls.durationHistory.length){
    return cls.durationHistory.slice().sort((a,b)=>a.from.localeCompare(b.from));
  }
  return [{ from: '1900-01-01', duration: Number(cls.duration)||150 }];
}
function durationForDate(cls, dateStr){
  if(!cls) return 150;
  const hist = durationHistoryOf(cls);
  let d = hist[0].duration;
  for(const e of hist){ if(e.from <= dateStr) d = e.duration; else break; }
  return Number(d)||150;
}
function currentDuration(cls){ return durationForDate(cls, todayStr()); }

/* ---------- enrollments (class transfers) ---------- */
// student.enrollments = [{classId, from, to|null}] — 'to' is inclusive last day in that class.
function enrollmentsOf(st){
  if(Array.isArray(st.enrollments) && st.enrollments.length) return st.enrollments;
  const c = classById(st.classId);
  return [{ classId: st.classId, from: c?.startDate || '1900-01-01', to: null }];
}
function classForStudentOnDate(st, dateStr){
  const en = enrollmentsOf(st).find(e => e.from <= dateStr && (!e.to || dateStr <= e.to));
  return classById(en ? en.classId : st.classId);
}

function expectedSessionsForClass(cls, startOverride, endOverride){
  const days = getClassDays(cls);
  if(!days.length) return null;
  const startStr = startOverride || cls.startDate;
  const endStr = endOverride || cls.endDate;
  if(!startStr || !endStr) return null;
  const start = new Date(startStr+'T00:00:00');
  const end = new Date(endStr+'T00:00:00');
  if(start>end) return 0;
  let count=0;
  let d = new Date(start);
  while(d<=end){
    const dow = d.getDay();
    const dateStr = dateToStr(d.getFullYear(), d.getMonth(), d.getDate());
    if(days.includes(dow) && !isHoliday(dateStr)) count++;
    d.setDate(d.getDate()+1);
  }
  return count;
}
function renderDonut(slices, centerLabel, centerSub){
  const total = slices.reduce((s,x)=>s+x.value,0);
  const size=140, stroke=20, r=(size-stroke)/2, c=2*Math.PI*r;
  let acc=0;
  const segs = total ? slices.filter(sl=>sl.value>0).map(sl=>{
    const len = sl.value/total*c;
    const dashoffset = c - acc;
    acc += len;
    return `<circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${sl.color}" stroke-width="${stroke}" stroke-dasharray="${len.toFixed(2)} ${(c-len).toFixed(2)}" stroke-dashoffset="${dashoffset.toFixed(2)}" transform="rotate(-90 ${size/2} ${size/2})"/>`;
  }).join('') : `<circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="var(--border)" stroke-width="${stroke}"/>`;
  return `
    <div class="donut-wrap">
      <div class="donut">
        <svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">${segs}</svg>
        <div class="donut-center">
          <div class="donut-num">${centerLabel}</div>
          <div class="donut-sub">${centerSub}</div>
        </div>
      </div>
      <div class="donut-legend">
        ${slices.map(sl=>`<div class="legend-item"><svg width="10" height="10" viewBox="0 0 10 10" style="flex-shrink:0;"><circle cx="5" cy="5" r="5" fill="${sl.color}"/></svg>${sl.label}: ${sl.value}${sl.unit||''}${total?` (${Math.round(sl.value/total*100)}%)`:''}</div>`).join('')}
      </div>
    </div>`;
}

/* ================= DASHBOARD ================= */
function renderDashboard(){
  const el = document.getElementById('view-dashboard');
  try { _renderDashboard(el); }
  catch(e){
    el.innerHTML = `<div class="card empty-card" style="color:var(--red);">
      <b>Dashboard error — please copy this and report it:</b><br><br>
      <code style="font-size:12px;word-break:break-all;">${esc(e?.stack||e?.message||String(e))}</code>
    </div>`;
  }
}
function _renderDashboard(el){
  if(!activeClasses().length){
    el.innerHTML = `
      <div class="topbar"><div><h1>Dashboard</h1><div class="meta">${formatDateLong(todayStr())}</div></div></div>
      <div class="card empty-card">
        <p>Welcome! Start by adding your first class.</p>
        <button class="btn-accent" onclick="navigate('classes');setTimeout(openClassModal,0)">+ Add a class</button>
      </div>`;
    return;
  }
  const today = todayStr();
  const todayHoliday = getHoliday(today);
  const dow = new Date(today+'T00:00:00').getDay();
  const todaysClasses = todayHoliday ? [] : activeClasses().filter(c=>{
    if(!getClassDays(c).includes(dow)) return false;
    if(c.startDate && today < c.startDate) return false;
    if(c.endDate && today > c.endDate) return false;
    return true;
  });
  const upcoming = state.events.filter(e=>e.date>=today).sort((a,b)=>a.date.localeCompare(b.date)).slice(0,6);

  // — Pending session completions (today + recent past days with data but not marked complete) —
  const pendingCompletions = [];
  activeClasses().forEach(c=>{
    const days = getClassDays(c);
    for(let i=0; i<8; i++){
      const d = new Date(today+'T00:00:00');
      d.setDate(d.getDate()-i);
      const dateStr = dateToStr(d.getFullYear(), d.getMonth(), d.getDate());
      if(!days.includes(d.getDay())) continue;
      if(isHoliday(dateStr)) continue;
      if(c.startDate && dateStr < c.startDate) continue;
      if(c.endDate && dateStr > c.endDate) continue;
      const sessionKey = c.id+'_'+dateStr;
      const hasData = !!state.sessions[sessionKey] && Object.keys(state.sessions[sessionKey]).length>0;
      if(!hasData) continue;
      const completed = isSessionCompleted(c.id, dateStr);
      if(!completed){
        pendingCompletions.push({cls:c, date:dateStr, isToday: dateStr===today});
      }
    }
  });
  pendingCompletions.sort((a,b)=>a.date.localeCompare(b.date));

  // — Today's classes —
  let todayHtml = '';
  if(todayHoliday){
    todayHtml = `<div class="empty">🎉 Holiday: ${esc(todayHoliday.label)} — no classes today.</div>`;
  } else if(todaysClasses.length){
    todayHtml = todaysClasses.map(c=>`
      <div class="dash-row">
        <div class="dash-row-left">
          <span class="color-dot" style="background:${c.color}"></span>
          <div>
            <div class="dash-row-title">${esc(c.name)}</div>
            <div class="dash-row-sub">${c.time?c.time+' · ':''}${studentsInClass(c.id).length} students</div>
          </div>
        </div>
        <button class="btn-accent" onclick="goToRollCall('${c.id}','${today}')">Start Roll Call →</button>
      </div>`).join('');
  } else {
    todayHtml = `<div class="empty">No classes scheduled today.</div>`;
  }

  // — Upcoming —
  const upcomingHtml = upcoming.length ? upcoming.map(e=>`
    <div class="dash-row">
      <div class="dash-row-left">
        <span class="badge ${e.type}">${eventTypeLabel(e.type)}</span>
        <div>
          <div class="dash-row-title" style="font-size:15px;">${esc(e.title)}</div>
          <div class="dash-row-sub">${formatDateShort(e.date)}${e.classId?' · '+esc(classById(e.classId)?.name||''):''}</div>
        </div>
      </div>
    </div>`).join('')
    : `<div class="empty">No upcoming items. <a onclick="navigate('calendar')">Add one in Calendar</a></div>`;

  // — Contact Parents —
  const cpStudents = [
    ...state.students.filter(s=>{ const c=classById(s.classId); return s.contactParents?.reason && c && !c.archived; }).map(s=>({...s, _priv:false})),
    ...state.privateStudents.filter(s=>s.contactParents?.reason).map(s=>({...s, _priv:true}))
  ];
  window._dashCpIds = cpStudents.map(s=>s.id);
  const cpHtml = cpStudents.length ? `
    <div class="card section" style="margin-top:16px;border-left:4px solid var(--red);">
      <h3>📞 Contact Parents</h3>
      ${cpStudents.map((s,i)=>{ const c=s._priv?null:classById(s.classId); return `
        <div class="dash-row">
          <div class="dash-row-left">
            ${c?`<span class="color-dot" style="background:${c.color}"></span>`:(s._priv?`<span class="color-dot" style="background:#0ea5b8"></span>`:'')}
            <div>
              <div class="dash-row-title">${esc(s.name)} <span class="badge red" style="margin-left:6px;">${esc(s.contactParents.category)}</span>${s._priv?' <span class="badge hw">Private</span>':''}</div>
              <div class="dash-row-sub">${esc(s.contactParents.reason)}</div>
            </div>
          </div>
          <div style="display:flex;gap:8px;">

      ${pendingCompletions.map((p,i)=>`
        <div class="dash-row">

/* ================= CLASSES & STUDENTS ================= */
function renderClasses(){
  const active = activeClasses();
  const archived = archivedClasses();
  const activeStudentCount = state.students.filter(s=>{ const c=classById(s.classId); return c && !c.archived; }).length;
  document.getElementById('view-classes').innerHTML = `
    <div class="topbar">
      <div><h1>Classes &amp; Students</h1><div class="meta">${active.length} classes · ${activeStudentCount} students</div></div>

      <div class="card empty-card">

      </div>`}

            <div class="student-list">
              ${students.map(s=>`
                <div class="student-list-row">
                  <span class="student-name-link" onclick="navigate('student',{studentProfileId:'${s.id}', studentProfileReturn:'classes'})">${esc(s.name)}</span>
                  <div style="display:flex;align-items:center;gap:8px;">
                    <button class="icon-btn ${s.contactParents?.reason?'danger':''}" onclick="openContactParentsModal('${s.id}')" title="${s.contactParents?.reason?'Contact parents flagged — click to edit':'Flag for contact parents'}">

                    </button>

                    </button>
                    <button class="icon-btn" onclick="openTransferModal('${s.id}')" title="Transfer to another class">⇄ Transfer</button>

function toggleClassExpand(classId){
  state.expandedClassId = state.expandedClassId===classId ? null : classId;
  renderClasses();
}
function openClassModal(classId){
  const c = classId ? classById(classId) : null;
  const currentDays = c ? getClassDays(c) : [1,3]; // default Mon/Wed
  const dayOptions = [
    [1,'Mon'],[2,'Tue'],[3,'Wed'],[4,'Thu'],[5,'Fri'],[6,'Sat'],[0,'Sun']
  ];
  showModal(`
    <h3>${c?'Edit class':'Add class'}</h3>
    <div class="field"><label>Class name</label><input id="cm-name" type="text" value="${c?esc(c.name):''}" placeholder="e.g. Turma B1"></div>
    <div class="field"><label>Days</label>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        ${dayOptions.map(([d,label])=>`
          <label style="display:flex;align-items:center;gap:5px;font-size:13px;font-weight:500;cursor:pointer;
            padding:6px 12px;border:1px solid var(--border);border-radius:999px;
            background:${currentDays.includes(d)?'var(--accent-soft)':'#fff'};

    <div class="field-row">
      <div class="field" style="flex:1;"><label>First class date</label><input id="cm-start" type="date" value="${c?.startDate||''}"></div>
      <div class="field" style="flex:1;"><label>Last class date</label><input id="cm-end" type="date" value="${c?.endDate||''}"></div>
    </div>
    <div class="field"><label>Class duration</label>
      <div id="cm-dur-rows">
        ${(c?durationHistoryOf(c):[{from:'', duration:150}]).map((e,i)=>cmDurRow(i, e, c)).join('')}
      </div>

      <div style="font-size:12px;color:var(--muted);margin-top:6px;">Add a row when the class length changes. Sessions before that date keep the earlier duration.</div>
    </div>
    <div class="field"><label>Color</label>
      <div class="swatches">
        ${PALETTE.map(col=>`<div class="swatch ${ (c?c.color===col:col===PALETTE[0]) ?'on':''}" style="background:${col}" onclick="selectSwatch(this,'${col}')"></div>`).join('')}

function cmDurRow(i, e, c){
  const isFirst = i===0;
  const fromVal = (e.from && e.from!=='1900-01-01') ? e.from : (isFirst ? (c?.startDate||'') : '');
  return `<div class="field-row cm-dur-row" style="align-items:center;margin-bottom:6px;">
    <div style="flex:1;">
      <input class="cm-dur-from" type="date" value="${fromVal}" placeholder="From" style="width:100%;" ${isFirst?'title="From the start of the class"':''}>
      ${isFirst?`<div style="font-size:11px;color:var(--muted);margin-top:2px;">From the start (leave blank = always)</div>`:''}
    </div>
    <input class="cm-dur-min" type="number" min="1" step="5" value="${e.duration||150}" style="width:100px;" title="minutes">
    <span style="font-size:12px;color:var(--muted);">min</span>
    ${isFirst?'<span style="width:34px;"></span>':`<button class="icon-btn danger" onclick="this.closest('.cm-dur-row').remove()">×</button>`}
  </div>`;
}
function cmAddDurRow(){
  const rows = document.getElementById('cm-dur-rows');
  const last = rows.querySelector('.cm-dur-row:last-child .cm-dur-min')?.value || 150;
  rows.insertAdjacentHTML('beforeend', cmDurRow(rows.children.length, {from: todayStr(), duration: last}, null));
}
function updateDayLabel(d){
  const cb = document.getElementById('cm-day-'+d);
  const label = document.getElementById('cm-day-label-'+d);
  if(!cb||!label) return;
  label.style.background = cb.checked ? 'var(--accent-soft)' : '#fff';
  label.style.color = cb.checked ? 'var(--accent)' : 'var(--muted)';
  label.style.borderColor = cb.checked ? 'var(--accent)' : 'var(--border)';
}
function selectSwatch(el, color){
  el.parentElement.querySelectorAll('.swatch').forEach(s=>s.classList.remove('on'));
  el.classList.add('on');
  document.getElementById('cm-color').value = color;
}
function saveClass(classId){
  const name = document.getElementById('cm-name').value.trim();
  if(!name) return;
  const days = [1,2,3,4,5,6,0].filter(d=>document.getElementById('cm-day-'+d)?.checked);
  if(!days.length){ alert('Please select at least one day.'); return; }
  const time = document.getElementById('cm-time').value;
  const color = document.getElementById('cm-color').value;
  const startDate = document.getElementById('cm-start').value || null;
  const endDate = document.getElementById('cm-end').value || null;

  // Build duration history
  const rows = [...document.querySelectorAll('.cm-dur-row')];
  let durationHistory = rows.map((r,i)=>({
    from: (i===0 ? (r.querySelector('.cm-dur-from').value || '1900-01-01') : r.querySelector('.cm-dur-from').value),
    duration: parseInt(r.querySelector('.cm-dur-min').value) || 150
  })).filter(e=>e.from);
  if(!durationHistory.length) durationHistory = [{from:'1900-01-01', duration:150}];
  durationHistory.sort((a,b)=>a.from.localeCompare(b.from));
  // dedupe identical from-dates (last wins)
  const seen = {};
  durationHistory.forEach(e=>{ seen[e.from]=e; });
  durationHistory = Object.values(seen).sort((a,b)=>a.from.localeCompare(b.from));
  const duration = durationHistory[durationHistory.length-1].duration; // compat field = current/latest

  if(classId){
    const c = classById(classId);
    c.name=name; c.days=days; c.time=time; c.color=color; c.startDate=startDate; c.endDate=endDate;
    c.duration=duration; c.durationHistory=durationHistory;
  }else{
    state.classes.push({id:uid(), name, days, time, color, startDate, endDate, duration, durationHistory});
  }
  scheduleSave('classes', state.classes);
  closeModal();
  renderClasses();
}
function deleteClass(classId){
  if(!confirm('Delete this class, its students, and all roll call records for it? This cannot be undone.')) return;
  state.classes = state.classes.filter(c=>c.id!==classId);
  state.students = state.students.filter(s=>s.classId!==classId);
  Object.keys(state.sessions).forEach(k=>{ if(splitSessionKey(k)[0]===classId) delete state.sessions[k]; });
  state.events = state.events.filter(e=>e.classId!==classId);
  if(state.expandedClassId===classId) state.expandedClassId=null;
  scheduleSave('classes', state.classes);
  scheduleSave('students', state.students);
  scheduleSave('sessions', state.sessions);
  scheduleSave('events', state.events);
  renderClasses();
}
function archiveClass(classId){
  const c = classById(classId);
  if(!c) return;
  // Contact Parents must be resolved before archiving (per spec Q1)
  const pending = state.students.filter(s=>s.classId===classId && s.contactParents?.reason);
  if(pending.length){
    alert(`Cannot archive: ${pending.length} student(s) still have an unresolved Contact Parents flag (${pending.map(s=>s.name).join(', ')}). Mark those as done first.`);
    return;
  }
  if(!confirm(`Archive "${c.name}"? It will be removed from Roll Call, Calendar and the Dashboard, but all its data and reports are kept. You can unarchive anytime.`)) return;
  c.archived = true;
  c.archivedAt = todayStr();
  // Clear English Club flags for this class's students (per spec Q1)
  state.students.forEach(s=>{ if(s.classId===classId && s.englishClub) s.englishClub=false; });
  if(state.expandedClassId===classId) state.expandedClassId=null;
  scheduleSave('classes', state.classes);
  scheduleSave('students', state.students);
  renderClasses();
}
function unarchiveClass(classId){
  const c = classById(classId);
  if(!c) return;
  c.archived = false;
  delete c.archivedAt;
  scheduleSave('classes', state.classes);
  renderClasses();
}
function addStudent(classId){
  const input = document.getElementById('new-student-'+classId);
  const name = input.value.trim();
  if(!name) return;
  state.students.push({id:uid(), name, classId});
  scheduleSave('students', state.students);
  renderClasses();
}
function anyStudent(id){ return state.students.find(x=>x.id===id) || state.privateStudents.find(x=>x.id===id); }
function openContactParentsModal(studentId){

function saveContactParents(studentId){
  const s = anyStudent(studentId);
  if(!s) return;
  const cat = document.getElementById('cp-cat').value;
  const reason = document.getElementById('cp-reason').value.trim();
  if(!reason){ alert('Please enter a reason.'); return; }
  s.contactParents = {category: cat, reason};
  const isPriv = !!privStudent(studentId);
  if(isPriv) persistPrivate(); else scheduleSave('students', state.students);
  closeModal();
  if(isPriv){ if(state.view==='priv-student') renderPrivStudent(); else renderPrivate(); }
  else renderClasses();

function clearContactParents(studentId){
  const s = anyStudent(studentId);
  if(!s || !s.contactParents?.reason) return;
  showModal(`
    <h3>📞 Log Call — ${esc(s.name)}</h3>
    <p style="font-size:13px;color:var(--muted);margin:0 0 14px;">Before marking done, write a brief summary of the conversation. This will appear on the student's report.</p>
    <div class="field"><label>Call date</label><input id="cp-call-date" type="date" value="${todayStr()}"></div>
    <div class="field"><label>Summary of conversation</label>
      <textarea id="cp-summary" rows="4" style="width:100%;border:1px solid var(--border);border-radius:8px;padding:8px;font-family:inherit;font-size:13px;" placeholder="e.g. Spoke with mother about attendance. She was unaware of 3 absences and committed to improving punctuality."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn-accent" onclick="confirmCallDone('${studentId}')">Save &amp; Mark Done</button>
    </div>
  `);

function confirmCallDone(studentId){
  const s = anyStudent(studentId);
  if(!s) return;
  const summary = document.getElementById('cp-summary').value.trim();
  const callDate = document.getElementById('cp-call-date').value;
  if(!summary){ alert('Please enter a summary of the conversation.'); return; }
  if(!s.contactParentsHistory) s.contactParentsHistory = [];
  s.contactParentsHistory.unshift({
    date: callDate,
    category: s.contactParents.category,
    reason: s.contactParents.reason,
    summary
  });
  s.contactParents = null;
  const isPriv = !!privStudent(studentId);
  if(isPriv) persistPrivate(); else scheduleSave('students', state.students);
  closeModal();
  if(state.view==='dashboard') renderDashboard();
  if(state.view==='classes') renderClasses();
  if(state.view==='priv-student') renderPrivStudent();
  if(state.view==='private') renderPrivate();
}

function toggleEnglishClub(studentId){
  const s = state.students.find(s=>s.id===studentId);
  if(!s) return;

  scheduleSave('students', state.students);

/* ---------- transfer student between classes ---------- */
function openTransferModal(studentId){
  const st = state.students.find(x=>x.id===studentId);
  if(!st) return;
  const cur = classById(st.classId);
  const targets = activeClasses().filter(c=>c.id!==st.classId);
  if(!targets.length){ alert('There is no other active class to transfer to.'); return; }
  showModal(`
    <h3>⇄ Transfer ${esc(st.name)}</h3>
    <div style="font-size:13px;color:var(--muted);margin:-6px 0 14px;">
      Currently in <b>${cur?esc(cur.name):'—'}</b>. Past roll call records stay attached to the old class and still appear on this student's report.
    </div>
    <div class="field"><label>Transfer to</label>
      <select id="tr-class">
        ${targets.map(c=>`<option value="${c.id}">${esc(c.name)} · ${scheduleLabel(c)}</option>`).join('')}
      </select>
    </div>
    <div class="field"><label>Effective from</label><input id="tr-date" type="date" value="${todayStr()}"></div>
    <div style="font-size:12px;color:var(--muted);margin:-6px 0 12px;">Sessions on or after this date count toward the new class.</div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn-accent" onclick="transferStudent('${st.id}')">Transfer</button>
    </div>
  `);
}
function transferStudent(studentId){
  const st = state.students.find(x=>x.id===studentId);
  if(!st) return;
  const newClassId = document.getElementById('tr-class').value;
  const fromDate = document.getElementById('tr-date').value || todayStr();
  if(newClassId===st.classId){ closeModal(); return; }
  const newCls = classById(newClassId);
  if(!confirm(`Transfer ${st.name} to "${newCls.name}" starting ${formatDateShort(fromDate)}?`)) return;

  // close current enrollment the day before the transfer, open the new one
  const en = enrollmentsOf(st).map(e=>({...e}));
  const open = en.find(e=>!e.to);
  const prevDay = new Date(fromDate+'T00:00:00');
  prevDay.setDate(prevDay.getDate()-1);
  const prevStr = dateToStr(prevDay.getFullYear(), prevDay.getMonth(), prevDay.getDate());
  if(open) open.to = prevStr;
  en.push({ classId: newClassId, from: fromDate, to: null });

  st.enrollments = en;
  st.classId = newClassId;
  scheduleSave('students', state.students);
  closeModal();
  renderClasses();
}
function deleteStudent(studentId){
  if(!confirm('Remove this student from the class?')) return;
  state.students = state.students.filter(s=>s.id!==studentId);
  scheduleSave('students', state.students);
  renderClasses();
}

/* ================= ROLL CALL ================= */
function renderRollCall(){
  const active = activeClasses();
  if(!active.length){
    document.getElementById('view-rollcall').innerHTML = `
      <div class="topbar"><div><h1>Roll Call</h1></div></div>
      <div class="card empty-card">Add a class first in <a onclick="navigate('classes')">Classes &amp; Students</a>.</div>`;
    return;
  }
  if(!classById(state.rollcall.classId) || classById(state.rollcall.classId).archived) state.rollcall.classId = active[0].id;
  const cls = classById(state.rollcall.classId);
  const date = state.rollcall.date;
  const students = studentsInClass(cls.id);
  const sessionKey = cls.id + '_' + date;
  const dow = new Date(date+'T00:00:00').getDay();
  const offSchedule = !getClassDays(cls).includes(dow);
  const holiday = getHoliday(date);

  // Don't create session records for holidays
  if(!holiday){
    if(!state.sessions[sessionKey]) state.sessions[sessionKey] = {};
    const session = state.sessions[sessionKey];
    let created = false;
    students.forEach(s=>{ if(!session[s.id]){ session[s.id]=defaultRecord(); created=true; } });
    if(created) scheduleSave('sessions', state.sessions);
  }

  const session = state.sessions[sessionKey] || {};

  // Find students absent in the immediately preceding non-holiday class session
  const prevDate = getPreviousClassDate(cls, date);
  const prevSessionKey = prevDate ? cls.id+'_'+prevDate : null;
  const prevSession = prevSessionKey ? (state.sessions[prevSessionKey]||{}) : {};
  const absentPrevSession = new Set(
    students.filter(s=>prevSession[s.id]?.attendance==='absent').map(s=>s.id)
  );

  // Only explicitly-completed sessions are read-only (per spec Q5 = option a)
  const locked = !!(state.sessionMeta && state.sessionMeta[cls.id+'_'+date]?.completed);

  document.getElementById('view-rollcall').innerHTML = `
    <div class="topbar">
      <div><h1>Roll Call</h1><div class="meta">${formatDateLong(date)}</div></div>
      <div class="rollcall-controls">
        <select onchange="setRollcallClass(this.value)">
          ${activeClasses().map(c=>`<option value="${c.id}" ${c.id===cls.id?'selected':''}>${esc(c.name)}</option>`).join('')}
        </select>
        <input type="date" value="${date}" onchange="setRollcallDate(this.value)">
      </div>
    </div>
    ${holiday?`<div class="warn-banner" style="font-size:14px;">🎉 <b>${esc(holiday.label)}</b> — ${formatDateLong(date)} is a holiday. No roll call can be taken on this day.</div>`:''}
    ${offSchedule&&!holiday?`<div class="warn-banner">${esc(cls.name)} isn't normally scheduled on ${DAY_NAMES[dow]}s (${scheduleLabel(cls)}).</div>`:''}
    ${!holiday && students.length ? `
      ${(()=>{
        const isFuture = date > todayStr();
        const isToday = date === todayStr();
        const explicitlyCompleted = !!(state.sessionMeta && state.sessionMeta[cls.id+'_'+date]?.completed);
        if(isFuture) return `<div class="warn-banner">📅 This class is in the future — it won't be counted in reports until it takes place.</div>`;
        if(explicitlyCompleted) return `<div class="warn-banner" style="background:var(--green-soft);color:var(--green);">🔒 Completed session — read-only, counts toward reports. <button class="btn-ghost small" style="margin-left:8px;" onclick="toggleSessionCompleted('${cls.id}','${date}')">Reopen to edit</button></div>`;
        if(isToday) return `<div class="warn-banner">⏳ Today's class isn't counted in reports yet. Mark it completed when the class is over. <button class="btn-accent" style="margin-left:8px;" onclick="toggleSessionCompleted('${cls.id}','${date}')">✓ Complete session</button></div>`;
        return `<div class="warn-banner" style="background:var(--green-soft);color:var(--green);">✓ Past session — counts toward reports. <button class="btn-ghost small" style="margin-left:8px;" onclick="toggleSessionCompleted('${cls.id}','${date}')">🔒 Lock (complete)</button></div>`;
      })()}
      <div class="field" style="margin-bottom:14px;">
        <label style="font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px;display:block;">Today's lesson content ${locked?'':'<span style="font-weight:400;">(what was covered — shown on absent reports)</span>'}</label>
        <input type="text" value="${esc(getLessonNote(cls.id, date))}" ${locked?'disabled':''} placeholder="e.g. Unit 7 review, phrasal verbs, p.43 assigned" style="width:100%;border:1px solid var(--border);border-radius:8px;padding:9px 11px;font-family:inherit;font-size:14px;${locked?'background:var(--gray-soft);':''}" oninput="setLessonNote('${cls.id}','${date}', this.value)">
      </div>
      <div class="rollcall-actions">
        ${locked?'':`<button class="btn-ghost" onclick="markAllPresent()">Mark all present</button>`}
        <span class="save-indicator" id="save-indicator"></span>
      </div>
      <div class="card roster-list ${locked?'locked-session':''}">
        ${students.map(s=>renderRosterRow(s, session[s.id], absentPrevSession.has(s.id), locked)).join('')}
      </div>
    ` : !holiday ? `<div class="card empty-card">No students in this class yet. Add students in <a onclick="navigate('classes')">Classes &amp; Students</a>.</div>` : ''}
  `;
}
function getLessonNote(classId, date){
  return (state.lessonNotes && state.lessonNotes[classId+'_'+date]) || '';
}
function setLessonNote(classId, date, val){
  if(!state.lessonNotes) state.lessonNotes = {};
  const key = classId+'_'+date;
  if(val && val.trim()) state.lessonNotes[key] = val;
  else delete state.lessonNotes[key];
  scheduleSave('lessonNotes', state.lessonNotes);
}
function isSessionCompleted(classId, date){
  // Past sessions auto-count; today needs explicit completion; future never counts
  if(date < todayStr()) return true;
  if(date > todayStr()) return false;
  return !!(state.sessionMeta && state.sessionMeta[classId+'_'+date]?.completed);
}
function toggleSessionCompleted(classId, date){
  if(!state.sessionMeta) state.sessionMeta = {};
  const key = classId+'_'+date;
  if(!state.sessionMeta[key]) state.sessionMeta[key] = {};
  state.sessionMeta[key].completed = !state.sessionMeta[key].completed;
  scheduleSave('sessionMeta', state.sessionMeta);
  renderRollCall();
}

function getCurrentRecord(studentId){
  const key = state.rollcall.classId + '_' + state.rollcall.date;
  if(!state.sessions[key]) state.sessions[key] = {};
  if(!state.sessions[key][studentId]) state.sessions[key][studentId] = defaultRecord();
  return state.sessions[key][studentId];
}
function persistSessions(){ scheduleSave('sessions', state.sessions); }
function setAttendance(studentId, val){
  getCurrentRecord(studentId).attendance = val;
  persistSessions();
  renderRollCall();
}
function adjustField(studentId, field, delta){
  const rec = getCurrentRecord(studentId);
  if(field==='hw'){
    rec[field] = Math.min(100, Math.max(0, (rec[field]??100) + delta));
  } else {
    rec[field] = Math.max(0, rec[field] + delta);
  }
  persistSessions();
  renderRollCall();
}
function setNumField(studentId, field, value, min=0, max=Infinity){
  const rec = getCurrentRecord(studentId);
  let n = parseInt(value);
  if(isNaN(n)) n = min;
  rec[field] = Math.min(max, Math.max(min, n));
  persistSessions();
  renderRollCall();
}
function bumpField(studentId, field, delta){
  const rec = getCurrentRecord(studentId);
  rec[field] = Math.max(0, (rec[field]||0) + delta);
  persistSessions();
  renderRollCall();
}
function setField(studentId, field, val){
  const rec = getCurrentRecord(studentId);
  rec[field] = rec[field]===val ? null : val;
  persistSessions();
  renderRollCall();
}
function setLateHwOutcome(studentId, val){
  const rec = getCurrentRecord(studentId);
  rec.lateHwOutcome = val;
  persistSessions();
  renderRollCall();
}
function setNote(studentId, val){
  getCurrentRecord(studentId).notes = val;
  persistSessions();
}
function toggleDrawer(studentId){
  state.openDrawer = state.openDrawer===studentId ? null : studentId;
  renderRollCall();
}
function markAllPresent(){
  studentsInClass(state.rollcall.classId).forEach(s=>{ getCurrentRecord(s.id).attendance='present'; });
  persistSessions();
  renderRollCall();
}
function setRollcallClass(classId){
  state.rollcall.classId = classId;
  state.openDrawer = null;
  renderRollCall();
}
function setRollcallDate(date){
  state.rollcall.date = date;
  state.openDrawer = null;
  renderRollCall();
}

/* ================= STUDENT PROFILE ================= */
function renderStudentProfile(){
  const t = T[state.reportLang];
  const student = state.students.find(s=>s.id===state.studentProfileId);
  const returnView = state.studentProfileReturn || 'reports';
  const returnLabel = returnView==='classes' ? t.backToClasses : t.backToReports;
  if(!student){
    document.getElementById('view-student').innerHTML = `
      <div class="topbar"><div><button class="btn-ghost back-btn" onclick="navigate('${returnView}')">${returnLabel}</button></div></div>
      <div class="card empty-card">Student not found.</div>`;
    return;
  }
  const cls = classById(student.classId);
  const allRecords = [];
  Object.keys(state.sessions).forEach(key=>{
    const [classId, date] = splitSessionKey(key);
    // Collect records from EVERY class this student has records in (survives transfers)
    if(state.sessions[key][student.id]){
      allRecords.push({date, _classId: classId, ...state.sessions[key][student.id]});
    }
  });
  allRecords.sort((a,b)=>b.date.localeCompare(a.date));

  const fromVal = state.reportRange.from || cls?.startDate || '';
  const toVal = state.reportRange.to || cls?.endDate || '';
  const allPeriodRecords = allRecords.filter(r => (!fromVal || r.date>=fromVal) && (!toVal || r.date<=toVal));

  // Separate holiday records from real records
  const holidayDates = allPeriodRecords.filter(r=>isHoliday(r.date)).map(r=>r.date);
  const records = allPeriodRecords.filter(r=>!isHoliday(r.date) && isSessionCompleted(r._classId, r.date));

  // Duration for a record = the duration in effect for *its own class* on *its own date*
  const recDur = r => durationForDate(classById(r._classId) || cls, r.date);

  const total = records.length;
  const absent = records.filter(r=>r.attendance==='absent').length;
  const late = records.filter(r=>r.attendance!=='absent' && (r.lateMin||0)>0).length;
  const present = total - absent - late;
  const totalPhone = records.reduce((sum,r)=>sum+(r.phone||0),0);
  const hwRecords = records.filter(r=>r.hw!=null && r.hw!=='done' && r.hw!=='not_done' ? true : r.hw!=null);
  const hwAvg = hwRecords.length ? Math.round(hwRecords.reduce((s,r)=>{
    const v = typeof r.hw==='number' ? r.hw : (r.hw==='done'?100:0);
    return s+v;
  },0)/hwRecords.length) : null;

  // Expected sessions: sum across every enrollment window overlapping the period
  const expected = (()=>{
    const wins = enrollmentsOf(student);
    let sum = 0, any = false;
    for(const w of wins){
      const c = classById(w.classId);
      if(!c) continue;
      const wFrom = [w.from, fromVal].filter(Boolean).sort().pop();      // max
      const candidates = [w.to, toVal, c.endDate].filter(Boolean);
      const wTo = candidates.length ? candidates.sort()[0] : null;       // min
      if(!wFrom || !wTo || wFrom > wTo) continue;
      const n = expectedSessionsForClass(c, wFrom, wTo);
      if(n!=null){ sum += n; any = true; }
    }
    return any ? sum : null;
  })();
  const classesLost = absent;
  const attendanceRate = expected ? Math.round(100*(expected-classesLost)/expected) : null;

  const attended = records.filter(r=>r.attendance!=='absent');
  const totalPossibleMin = records.reduce((s,r)=>s+recDur(r), 0);
  const lostLateMin = attended.reduce((s,r)=>s+(r.lateMin||0),0);
  const lostEarlyMin = attended.reduce((s,r)=>s+(r.leftEarlyMin||0),0);
  const absentMin = records.filter(r=>r.attendance==='absent').reduce((s,r)=>s+recDur(r), 0);
  const inClassMin = Math.max(0, totalPossibleMin - lostLateMin - lostEarlyMin - absentMin);
  const avgDuration = total ? Math.round(totalPossibleMin/total) : (cls?currentDuration(cls):150);
  const duration = avgDuration; // used for display only

  // Participation summary
  const partRecords = attended.filter(r=>r.participation);
  const partGreat = partRecords.filter(r=>r.participation==='great').length;
  const partGood = partRecords.filter(r=>r.participation==='good').length;
  const partLow = partRecords.filter(r=>r.participation==='low').length;
  const partScore = partRecords.length ? Math.round(100*(partGreat*1 + partGood*0.5)/partRecords.length) : null;

  // Time lost equivalent (late + left early + absences), in equivalent classes
  const totalLostMin = lostLateMin + lostEarlyMin + absentMin;
  const lostEquivClasses = avgDuration ? (totalLostMin/avgDuration).toFixed(1) : '0.0';

  const classesLostHtml = expected!=null
    ? t.classesAbsent(classesLost, expected, fromVal?formatDateShort(fromVal):'?', toVal?formatDateShort(toVal):'?', attendanceRate)
    : t.classesAbsent(classesLost, null) + ` <a class="no-print" onclick="navigate('classes');setTimeout(()=>openClassModal('${cls?.id}'),0)">${t.setDates}</a><span class="print-only">${t.setDates}</span>${t.setDatesRest}`;

  document.getElementById('view-student').innerHTML = `
    <div class="topbar">
      <div>
        <button class="btn-ghost back-btn no-print" onclick="navigate('${returnView}')">${returnLabel}</button>
        <h1>${esc(student.name)}${student.englishClub?` <span class="badge amber" style="font-size:13px;vertical-align:middle;">${t.englishClubBadge}</span>`:''}${student.contactParents?.reason?` <span class="badge red" style="font-size:13px;vertical-align:middle;">📞 ${esc(student.contactParents.category)}</span>`:''}</h1>
        <div class="meta">${cls?esc(cls.name):'No class'}</div>
        <div style="font-size:14px;font-weight:600;color:var(--accent);margin-top:6px;">${t.reportPeriod}: ${fromVal?formatDateShort(fromVal):t.allTime}${fromVal||toVal?` – ${toVal?formatDateShort(toVal):t.present2}`:''}</div>
      </div>
      <div style="display:flex;gap:10px;align-items:center;" class="no-print">
        <button class="btn-ghost" onclick="toggleReportLang()" title="Switch language">${t.langToggle}</button>
        <button class="btn-accent" onclick="window.print()">${t.printBtn}</button>
      </div>
    </div>
    <div class="print-only" style="margin-bottom:14px;font-size:12px;color:var(--muted);">${t.generatedOn} ${formatDateLong(todayStr())}</div>
    <div class="card section no-print" style="margin-bottom:16px;">
      <div class="rollcall-controls" style="flex-wrap:wrap;align-items:center;">
        <label style="font-size:13px;font-weight:600;color:var(--muted);">${t.reportPeriod}:</label>
        <input type="date" value="${fromVal}" onchange="setReportRange('from', this.value)">
        <span style="color:var(--muted);font-size:13px;">${t.to}</span>
        <input type="date" value="${toVal}" onchange="setReportRange('to', this.value)">
        <button class="btn-ghost small" onclick="resetReportRange()">${t.allTime}</button>
        <button class="btn-ghost small" onclick="navigate('${returnView}')" style="margin-left:auto;">← Change</button>
      </div>
    </div>
    <div class="stat-row">
      <div class="card stat"><div class="stat-num">${total}</div><div class="stat-label">${t.sessionsLogged}</div></div>
      <div class="card stat"><div class="stat-num">${present}</div><div class="stat-label">${t.present}</div></div>
      <div class="card stat"><div class="stat-num">${late}</div><div class="stat-label">${t.late}</div></div>
      <div class="card stat"><div class="stat-num">${absent}</div><div class="stat-label">${t.absent}</div></div>
      <div class="card stat"><div class="stat-num">${totalPhone}</div><div class="stat-label">${t.phoneUses}</div></div>
      <div class="card stat"><div class="stat-num">${hwAvg!=null?hwAvg+'%':'—'}</div><div class="stat-label">${t.homeworkDone}</div></div>
      <div class="card stat"><div class="stat-num">${partScore!=null?partScore+'%':'—'}</div><div class="stat-label">${t.participation}</div></div>
    </div>
    <div class="charts-grid" style="grid-template-columns:repeat(auto-fit,minmax(260px,1fr));">
      <div class="card chart-card">
        <h3>${t.attendance}</h3>
        <div class="chart-note">${t.basedOn(total)}</div>
        ${renderDonut([
          {label:t.present, value:present, color:'var(--green)'},
          {label:t.late, value:late, color:'var(--amber)'},
          {label:t.absent, value:absent, color:'var(--red)'}
        ], total?`${Math.round(100*(present+late)/total)}%`:'—', t.attended)}
      </div>
      <div class="card chart-card">
        <h3>${t.timeInClass}</h3>

    </div>
    ${(student.contactParents?.reason || student.contactParentsHistory?.length) ? `
    <div class="card section" style="border-left:4px solid var(--red);">
      <h3>📞 ${state.reportLang==='pt'?'Contato com Responsáveis':'Contact Parents'}</h3>

      <div style="margin-bottom:12px;padding:10px 14px;background:var(--red-soft);border-radius:10px;">
        <div style="font-size:12px;font-weight:600;color:var(--red);margin-bottom:4px;">${state.reportLang==='pt'?'⚠ Pendente':'⚠ Pending'}</div>
        <span class="badge red">${esc(student.contactParents.category)}</span>
        <span style="font-size:13px;color:var(--text);margin-left:8px;">${esc(student.contactParents.reason)}</span>
      </div>` : ''}
      ${(student.contactParentsHistory||[]).map(h=>`
      <div style="padding:10px 0;border-bottom:1px solid var(--border);">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
          <span style="font-size:12px;font-weight:600;color:var(--muted);">${formatDateShort(h.date)}</span>
          <span class="badge red">${esc(h.category)}</span>
        </div>
        <div style="font-size:12px;color:var(--muted);margin-bottom:4px;"><b>${state.reportLang==='pt'?'Motivo':'Reason'}:</b> ${esc(h.reason)}</div>
        <div style="font-size:13px;color:var(--text);"><b>${state.reportLang==='pt'?'Resumo':'Summary'}:</b> ${esc(h.summary)}</div>
      </div>`).join('')}
    </div>` : ''}
    <div class="card table-wrap">
      ${records.length||holidayDates.length ? `
      <table>
        <thead><tr><th>${t.date}</th><th>${t.attendance}</th><th>${t.lateMin}</th><th>${t.leftEarlyMin}</th><th>${t.phone}</th><th>${t.hw}</th><th>${t.lateHwCol}</th><th>${t.englishOnly}</th><th>${t.participation}</th><th>${t.notes}</th></tr></thead>
        <tbody>
          ${(()=>{
            const partLabel = p => p?({great:t.participationLabels.great,good:t.participationLabels.good,low:t.participationLabels.low}[p]):null;
            const partBadge = p => p==='great'?'green':p==='good'?'amber':'red';
            // Merge records and holiday rows, sort by date descending
            const allRows = [
              ...records.map(r=>({...r, _type:'record'})),
              ...holidayDates.map(date=>({date, _type:'holiday', _label: getHoliday(date)?.label||'Holiday'}))
            ].sort((a,b)=>b.date.localeCompare(a.date));
            return allRows.map(r=>{
              if(r._type==='holiday') return `
                <tr style="background:var(--purple-soft);">
                  <td>${formatDateShort(r.date)}</td>
                  <td colspan="9" style="color:var(--purple);font-weight:600;">🎉 ${esc(r._label)}</td>
                </tr>`;
              const lessonNote = getLessonNote(r._classId || student.classId, r.date);
              const missedRow = (r.attendance==='absent' && lessonNote) ? `
                <tr style="background:var(--red-soft);">
                  <td></td>
                  <td colspan="9" style="font-size:12px;color:var(--red);font-style:italic;">${t.missedLabel}: ${esc(lessonNote)}</td>
                </tr>` : '';
              return `
                <tr>
                  <td>${formatDateShort(r.date)}</td>
                  <td><span class="badge ${attendanceBadgeClass(r.attendance)}">${t.attendanceLabels[r.attendance]||r.attendance}</span></td>
                  <td>${r.lateMin?r.lateMin+' min':'—'}</td>
                  <td>${r.leftEarlyMin?r.leftEarlyMin+' min':'—'}</td>
                  <td>${r.phone||'—'}</td>
                  <td>${r.hw!=null?(typeof r.hw==='number'?r.hw+'%':(r.hw==='done'?'100%':'0%')):'—'}</td>
                  <td>${r.lateHwOutcome ? `<span class="badge ${r.lateHwOutcome==='late'?'green':'red'}">${t.lateHwLabels[r.lateHwOutcome]||r.lateHwOutcome}</span>` : '—'}</td>
                  <td>${r.english?`<span class="badge ${englishBadgeClass(r.english)}">${t.englishLabels[r.english]||r.english}</span>`:'—'}</td>
                  <td>${r.participation?`<span class="badge ${partBadge(r.participation)}">${partLabel(r.participation)}</span>`:'—'}</td>
                  <td>${r.notes?esc(r.notes):'—'}</td>
                </tr>${missedRow}`;
            }).join('');
          })()}
        </tbody>
      </table>
      ` : `<div class="empty-card">${t.noRecords}</div>`}

}
