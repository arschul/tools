  // — Today's classes —
  let todayHtml = '';
  if(todayHoliday){
    todayHtml = `<div class="empty">🎉 Holiday: ${esc(todayHoliday.label)} — no classes today.</div>`;
  } else if(todaysClasses.length){
    const allDone = todaysClasses.every(c=>isSessionCompleted(c.id, today));
    todayHtml = (allDone?`<div class="empty" style="padding:4px 0 8px;">✓ All of today's classes are done.</div>`:'') +
      todaysClasses.map(c=>{
        const done = isSessionCompleted(c.id, today);
        const hasHw = !!getHomework(c.id, today);
        const hasProm = !!getPromise(c.id, today);
        return `
      <div class="dash-row" ${done?'style="opacity:.75;"':''}>
        <div class="dash-row-left">
          <span class="color-dot" style="background:${c.color}"></span>
          <div>
            <div class="dash-row-title">${esc(c.name)}${done?' <span class="badge green" style="margin-left:6px;">✓ Done</span>':''}${hasProm?' <span class="badge amber" style="margin-left:6px;">📋 Plan</span>':''}${hasHw?' <span class="badge hw" style="margin-left:6px;">📘 HW due</span>':''}</div>
            <div class="dash-row-sub">${c.time?c.time+' · ':''}${studentsInClass(c.id).length} students</div>
          </div>
        </div>
        ${done
          ? `<button class="btn-ghost small" onclick="goToRollCall('${c.id}','${today}')">View →</button>`
          : `<button class="btn-accent" onclick="goToRollCall('${c.id}','${today}')">Start Roll Call →</button>`}
      </div>`;
      }).join('');
  } else {
    todayHtml = privTodayList.length ? '' : `<div class="empty">No classes scheduled today.</div>`;
  }

  // — Upcoming —
  window._dashUpcomingPrivIds = upcoming.map(u=>u.kind==='priv'?u.l.studentId:null);
  window._dashUpcomingClassIds = upcoming.map(u=>u.kind==='class'?u.c.id:null);
  window._dashUpcomingDates = upcoming.map(u=>u.date);
  const upcomingHtml = upcoming.length ? upcoming.map((u,i)=> u.kind==='class' ? `

      <div class="dash-row-left">
        <span class="badge ${u.e.type}">${eventTypeLabel(u.e.type)}</span>

  // — Contact Parents (group students) —
  const cpStudents = state.students.filter(s=>{ const c=classById(s.classId); return s.contactParents?.reason && c && !c.archived; });
  window._dashCpIds = cpStudents.map(s=>s.id);
  const cpHtml = cpStudents.length ? `
    <div class="card section" style="margin-top:16px;border-left:4px solid var(--red);">

      ${cpStudents.map((s,i)=>{ const c=classById(s.classId); return `

          </div>
        </div>`).join('')}
    </div>` : '';

  const pendingHtml = pendingCompletions.length ? `
    <div class="card section" style="margin-bottom:16px;border-left:4px solid var(--amber);">
      <h3>⏳ Sessions awaiting completion</h3>
      <div style="font-size:12px;color:var(--muted);margin-bottom:8px;">These have roll call data but aren't marked complete yet, so they're not counted in reports.</div>
      ${pendingCompletions.map((p,i)=>`
        <div class="dash-row">
          <div class="dash-row-left">
            <span class="color-dot" style="background:${p.cls.color}"></span>
            <div>
              <div class="dash-row-title">${esc(p.cls.name)}</div>

          <div style="display:flex;gap:8px;">
            <button class="btn-ghost small" onclick="goToRollCall(window._dashPendingClassIds[${i}], window._dashPendingDates[${i}])">Open Roll Call →</button>
            <button class="btn-accent" style="padding:7px 12px;font-size:12px;" onclick="toggleSessionCompleted(window._dashPendingClassIds[${i}], window._dashPendingDates[${i}]); refreshView();">✓ Complete</button>
          </div>

  // — Backup reminder —
  const backupDays = daysSinceLastBackup();
  const backupHtml = backupDays >= 7 ? `
    <div class="card section" style="margin-bottom:16px;border-left:4px solid var(--amber);">
      <div class="dash-row" style="align-items:center;">

            <div class="dash-row-title">🗂 ${backupDays===Infinity?"You've never made a local backup":"It's been "+Math.floor(backupDays)+" days since your last backup"}</div>

  // — Attendance alerts: contact parents —
  // Two consecutive absences (current — their latest two class meetings), and
  // absences on a test/review day. Both flag "contact parents".
  const ALERT_HORIZON = 30, ASSESS_HORIZON = 45;
  const assessmentByDate = {};
  state.events.forEach(e=>{ if((e.type==='test' || e.type==='review') && !e.fromGrades){ (assessmentByDate[e.date] = assessmentByDate[e.date] || []).push(e); } });

  const twoInRow = [], missedAssess = [];
  state.students.filter(s=>{ const c=classById(s.classId); return c && !c.archived; }).forEach(s=>{
    const recs = studentAttendanceRecords(s);
    if(recs.length>=2 && recs[0].attendance==='absent' && recs[1].attendance==='absent' && daysAgo(recs[0].date)<=ALERT_HORIZON){
      twoInRow.push({id:s.id, name:s.name, classId:s.classId, d1:recs[1].date, d2:recs[0].date});
    }
    for(const r of recs){
      if(daysAgo(r.date) > ASSESS_HORIZON) break;   // sorted newest-first
      if(r.attendance!=='absent') continue;
      const evs = assessmentByDate[r.date];
      if(!evs) continue;
      const m = evs.find(e=> !e.classId || e.classId===r._classId);
      if(m){ missedAssess.push({id:s.id, name:s.name, classId:s.classId, date:r.date, title:m.title, type:m.type}); break; }
    }

  window._dashTwoRowIds = twoInRow.map(x=>x.id);
  window._dashMissIds = missedAssess.map(x=>x.id);

  const attnDot = classId => { const c=classById(classId); return c?`<span class="color-dot" style="background:${c.color}"></span>`:''; };
  const attnAlertHtml = (twoInRow.length || missedAssess.length) ? `

      ${twoInRow.length ? `

        ${twoInRow.map((x,i)=>`
          <div class="dash-row">

              ${attnDot(x.classId)}
              <div>

          </div>`).join('')}` : ''}
      ${missedAssess.length ? `

  // Advanced: any entered TOEFL test under the level target, or within the margin.
  const gradeAlerts = [];
  state.students.forEach(s=>{
    const c = classById(s.classId);
    if(!c || c.archived) return;
    const g = state.grades[c.id];
    if(!g || !g.cycles || !g.cycles.length) return;
    const cyc = g.cycles[g.cycles.length-1];
    const st = gradeStatus(c, cyc, s.id);
    if(st && (st.under || st.close)) gradeAlerts.push({ id:s.id, name:s.name, classId:s.classId, st, cycleLabel:cyc.label });

  gradeAlerts.sort((a,b)=>(b.st.under?1:0)-(a.st.under?1:0));

  // Student was marked absent on a scheduled test day (current cycle) and has

  const missedTests = [];
  activeClasses().forEach(c=>{

    const cyc = g.cycles[g.cycles.length-1];

function addClassFocus(classId){
  const input = document.getElementById('focus-input-'+classId);
  if(!input) return;
  const topic = input.value.trim();
  if(!topic) return;
  if(!state.classFocus) state.classFocus = {};
  if(!state.classFocus[classId]) state.classFocus[classId] = [];
  state.classFocus[classId].push({ id: uid(), topic, added: todayStr(), done: false });
  scheduleSave('classFocus', state.classFocus);
  refreshView();
}
function toggleClassFocusDone(classId, id){
  const f = classFocusList(classId).find(x=>x.id===id);
  if(!f) return;
  f.done = !f.done;
  scheduleSave('classFocus', state.classFocus);
  refreshView();
}
function deleteClassFocus(classId, id){
  if(!state.classFocus || !state.classFocus[classId]) return;
  state.classFocus[classId] = state.classFocus[classId].filter(x=>x.id!==id);
  scheduleSave('classFocus', state.classFocus);
  refreshView();
}
function focusToNextClass(classId, id){
  const c = classById(classId);
  const f = classFocusList(classId).find(x=>x.id===id);
  if(!c || !f) return;
  const nextDate = getNextClassDate(c, todayStr());
  if(!nextDate){ alert('No upcoming scheduled class for this class.'); return; }
  // Appends to the class PLAN for that date (not "what we did", which is a
  // record of what actually happened and feeds absent reports).
  const cur = getPromise(classId, nextDate);
  if(htmlToPlain(planDisplayHtml(cur)).toLowerCase().includes(f.topic.trim().toLowerCase())){
    alert(`"${f.topic}" is already in the plan for ${formatDateShort(nextDate)}.`); return;
  }
  const line = `<div>\u{1F4CD} ${esc(f.topic)}</div>`;
  setPromise(classId, nextDate, cur ? planDisplayHtml(cur) + line : line);
  refreshView();
  alert(`Added "${f.topic}" to the class plan for ${formatDateShort(nextDate)}.`);
}
function toggleClassExpand(classId){
  state.expandedClassId = state.expandedClassId===classId ? null : classId;

/* ===== D1: Class Log — chronological teaching history for one class ===== */

function openClassLogModal(classId){
  clLogClassId = classId;

  renderClassLogModal();
}
function clSetRange(which, val){ if(which==='from') clLogFrom = val||''; else clLogTo = val||''; renderClassLogModal(); }
function clResetRange(){ clLogFrom=''; clLogTo=''; renderClassLogModal(); }

// Gather every dated entry for a class: any date that has a session record,
// lesson note, homework, or promise. Returns rows newest-first with an
// attendance summary computed from completed sessions only.
function classLogRows(classId, fromVal, toVal){
  const dates = new Set();
  for(const key of Object.keys(state.sessions)){
    const [cid, date] = splitSessionKey(key);
    if(cid===classId) dates.add(date);
  }
  for(const store of [state.lessonNotes, state.homework, state.promises]){
    if(!store) continue;
    for(const key of Object.keys(store)){
      const [cid, date] = splitSessionKey(key);
      if(cid===classId) dates.add(date);
    }
  }
  const rows = [...dates]
    .filter(d => (!fromVal || d>=fromVal) && (!toVal || d<=toVal))
    .sort((a,b)=>b.localeCompare(a))
    .map(date=>{
      const sess = state.sessions[classId+'_'+date] || {};
      const ids = Object.keys(sess);
      const completed = isSessionCompleted(classId, date);
      const present = ids.filter(id=>sess[id]?.attendance!=='absent').length;
      const absent  = ids.filter(id=>sess[id]?.attendance==='absent').length;
      return {
        date,
        content: getLessonNote(classId, date),
        hw: getHomework(classId, date),
        promise: getPromise(classId, date),
        completed, present, absent, roster: ids.length,
        holiday: isHoliday(date)
      };
    });
  return rows;
}

function renderClassLogModal(){
  const c = classById(clLogClassId);
  if(!c) return;
  const rows = classLogRows(clLogClassId, clLogFrom, clLogTo);
  const body = rows.length ? `

      <table>

              </td>
              <td>${r.content?esc(r.content):'<span style="color:var(--muted);">—</span>'}</td>
              <td>${r.hw?esc(r.hw):'<span style="color:var(--muted);">—</span>'}</td>
              <td>${r.promise?planDisplayHtml(r.promise):'<span style="color:var(--muted);">—</span>'}</td>
              <td style="text-align:center;white-space:nowrap;">${r.roster?`${r.present}/${r.roster}${r.absent?` <span class="badge red">${r.absent} abs</span>`:''}`:'<span style="color:var(--muted);">—</span>'}</td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>` : `<div class="empty">No log entries in this period yet. Lesson content, homework and class plans recorded in Roll Call show up here.</div>`;

  showModal(`
    <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;">
      <h3 style="margin:0;"><span class="color-dot" style="background:${c.color}"></span>📋 Class Log — ${esc(c.name)}</h3>
      <span style="font-size:12px;color:var(--muted);">${rows.length} entr${rows.length===1?'y':'ies'}</span>
    </div>
    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin:12px 0;">
      <label style="font-size:13px;font-weight:600;color:var(--muted);">Period:</label>
      <input type="date" value="${clLogFrom}" onchange="clSetRange('from',this.value)">
      <span style="color:var(--muted);font-size:13px;">–</span>
      <input type="date" value="${clLogTo}" onchange="clSetRange('to',this.value)">
      <button class="btn-ghost small" onclick="clResetRange()">All time</button>
      <button class="btn-ghost small" onclick="exportClassLogCsv()">⬇ Export CSV</button>
    </div>
    ${body}
    <div class="modal-actions"><button class="btn-accent" onclick="closeModal()">Done</button></div>
  `, true);
}

function exportClassLogCsv(){
  const c = classById(clLogClassId);
  if(!c) return;
  const rows = classLogRows(clLogClassId, clLogFrom, clLogTo);
  const header = ['Date','What we did','Homework assigned','Class plan','Present','Absent','Roster','Completed','Holiday'];
  const data = [header].concat(
    rows.map(r=>[r.date, r.content, r.hw, htmlToPlain(planDisplayHtml(r.promise)), r.present, r.absent, r.roster, r.completed?'yes':'no', r.holiday?'yes':'no'])
  );
  downloadCsv(`class-log-${slugify(c.name)}-${todayStr()}.csv`, data);
}

function cmDurRow(i, e, c){
  const isFirst = i===0;
  const fromVal = (e.from && e.from!=='1900-01-01') ? e.from : (isFirst ? (c?.startDate||'') : '');
  return `<div class="field-row cm-dur-row" style="align-items:center;margin-bottom:6px;">
    ${isFirst
      ? `<div style="flex:1;font-size:12px;color:var(--muted);align-self:center;">From the start</div>`
      : `<div style="flex:1;"><input class="cm-dur-from" type="date" value="${fromVal}" placeholder="From" style="width:100%;"></div>`}
    <input class="cm-dur-min" type="number" min="1" step="5" value="${e.duration||150}" style="width:100px;" title="minutes">
    <span style="font-size:12px;color:var(--muted);">min</span>
    ${isFirst?'<span style="width:34px;"></span>':`<button type="button" class="icon-btn danger" aria-label="Remove this duration period" onclick="this.closest('.cm-dur-row').remove()">×</button>`}
  </div>`;
}
function cmAddDurRow(){
  const rows = document.getElementById('cm-dur-rows');
  const last = rows.querySelector('.cm-dur-row:last-child .cm-dur-min')?.value || 150;
  rows.insertAdjacentHTML('beforeend', cmDurRow(rows.children.length, {from: todayStr(), duration: last}, null));
}
function updateDayLabel(d){
  const cb = document.getElementById('cm-day-'+d);
  const label = document.getElementById('cm-day-label-'+d);
  if(!cb||!label) return;
  label.style.background = cb.checked ? 'var(--accent-soft)' : '#fff';
  label.style.color = cb.checked ? 'var(--accent)' : 'var(--muted)';
  label.style.borderColor = cb.checked ? 'var(--accent)' : 'var(--border)';
}
function selectSwatch(el, color){
  el.parentElement.querySelectorAll('.swatch').forEach(s=>{ s.classList.remove('on'); s.setAttribute('aria-pressed','false'); });
  el.classList.add('on');
  el.setAttribute('aria-pressed','true');
  document.getElementById('cm-color').value = color;
}
function saveClass(classId){
  const name = document.getElementById('cm-name').value.trim();
  if(!name) return;
  const days = [1,2,3,4,5,6,0].filter(d=>document.getElementById('cm-day-'+d)?.checked);
  if(!days.length){ alert('Please select at least one day.'); return; }
  const time = document.getElementById('cm-time').value;
  const level = document.getElementById('cm-level')?.value || '';
  const color = document.getElementById('cm-color').value;
  const startDate = document.getElementById('cm-start').value || null;
  const endDate = document.getElementById('cm-end').value || null;
  const pointsEnabled = !!document.getElementById('cm-points')?.checked;

  // Build duration history
  const rows = [...document.querySelectorAll('.cm-dur-row')];
  let durationHistory = rows.map((r,i)=>({
    from: (i===0 ? (r.querySelector('.cm-dur-from')?.value || '1900-01-01') : r.querySelector('.cm-dur-from')?.value),
    duration: parseInt(r.querySelector('.cm-dur-min').value) || 150
  })).filter(e=>e.from);
  if(!durationHistory.length) durationHistory = [{from:'1900-01-01', duration:150}];
  durationHistory.sort((a,b)=>a.from.localeCompare(b.from));
  // dedupe identical from-dates (last wins)
  const seen = {};
  durationHistory.forEach(e=>{ seen[e.from]=e; });
  durationHistory = Object.values(seen).sort((a,b)=>a.from.localeCompare(b.from));
  const duration = durationHistory[durationHistory.length-1].duration; // compat field = current/latest

  if(classId){
    const c = classById(classId);
    c.name=name; c.days=days; c.time=time; c.level=level; c.color=color; c.startDate=startDate; c.endDate=endDate;
    c.duration=duration; c.durationHistory=durationHistory; c.pointsEnabled=pointsEnabled;
  }else{
    state.classes.push({id:uid(), name, days, time, level, color, startDate, endDate, duration, durationHistory, pointsEnabled});
  }
  scheduleSave('classes', state.classes);
  closeModal();
  refreshView();
}
function deleteClass(classId){
  if(!confirm('Delete this class, its students, and all roll call records for it? This cannot be undone.')) return;
  state.classes = state.classes.filter(c=>c.id!==classId);
  state.students = state.students.filter(s=>s.classId!==classId);
  Object.keys(state.sessions).forEach(k=>{ if(splitSessionKey(k)[0]===classId) delete state.sessions[k]; });
  state.events = state.events.filter(e=>e.classId!==classId);
  if((state.pointsLog||[]).some(e=>e.classId===classId)){
    state.pointsLog = state.pointsLog.filter(e=>e.classId!==classId);
    scheduleSave('pointsLog', state.pointsLog);
  }
  if((state.activities||[]).some(a=>a.classId===classId)){
    state.activities = state.activities.filter(a=>a.classId!==classId);
    scheduleSave('activities', state.activities);
  }
  if(state.grades[classId]){ delete state.grades[classId]; scheduleSave('grades', state.grades); }
  if(state.expandedClassId===classId) state.expandedClassId=null;
  scheduleSave('classes', state.classes);
  scheduleSave('students', state.students);
  scheduleSave('sessions', state.sessions);
  scheduleSave('events', state.events);
  refreshView();
}
function archiveClass(classId){

  const pending = state.students.filter(s=>s.classId===classId && s.contactParents?.reason);

    alert(`Cannot archive: ${pending.length} student(s) still have an unresolved Contact Parents flag (${pending.map(s=>s.name).join(', ')}). Mark those as done first.`);

  if(!confirm(`Archive "${c.name}"? It will be removed from Roll Call, Calendar and the Dashboard, but all its data and reports are kept. You can unarchive anytime.`)) return;

  scheduleSave('classes', state.classes);
  scheduleSave('students', state.students);
  refreshView();
}

function transferStudent(studentId){
  const st = state.students.find(x=>x.id===studentId);
  if(!st) return;
  const newClassId = document.getElementById('tr-class').value;
  const fromDate = document.getElementById('tr-date').value || todayStr();
  if(newClassId===st.classId){ closeModal(); return; }
  const newCls = classById(newClassId);
  if(!confirm(`Transfer ${st.name} to "${newCls.name}" starting ${formatDateShort(fromDate)}?`)) return;

  // close current enrollment the day before the transfer, open the new one
  const en = enrollmentsOf(st).map(e=>({...e}));
  const open = en.find(e=>!e.to);
  const prevDay = new Date(fromDate+'T00:00:00');
  prevDay.setDate(prevDay.getDate()-1);
  const prevStr = dateToStr(prevDay.getFullYear(), prevDay.getMonth(), prevDay.getDate());
  if(open) open.to = prevStr;
  en.push({ classId: newClassId, from: fromDate, to: null });

  st.enrollments = en;
  st.classId = newClassId;
  scheduleSave('students', state.students);
  closeModal();
  refreshView();
}

/* ================= GRADES (test scores per cycle) ================= */
let gmClassId = null, gmCycleIdx = 0;

function openGradesModal(classId, cycleIdx){
  const c = classById(classId);
  if(!c) return;
  const g = classGrades(classId);          // ensures at least one cycle exists
  gmClassId = classId;
  gmCycleIdx = (cycleIdx!=null && g.cycles[cycleIdx]) ? cycleIdx : g.cycles.length-1;
  scheduleSave('grades', state.grades);    // persist the auto-created record
  renderGradesModal();
}

function renderGradesModal(){
  const c = classById(gmClassId);
  const g = classGrades(gmClassId);
  const cycle = g.cycles[gmCycleIdx];
  const students = studentsInClass(gmClassId);
  const n = testCountFor(c);
  const adv = isAdvancedLevel(c.level);
  const target = adv ? TOEFL_TARGETS[c.level] : null;
  const isCurrent = gmCycleIdx === g.cycles.length-1;
  const margin = gradeMargin();
  const testDates = (cycle.testDates||[]).slice(0,n); while(testDates.length<n) testDates.push('');

  const ruleNote = !c.level
    ? `⚠ This class has no group tag yet, so it defaults to the 3-test / 240-point rule. <button type="button" class="linkish" onclick="closeModal();openClassModal('${c.id}')">Set the tag</button> for the right rules.`
    : adv
      ? `TOEFL — 2 tests per cycle. Target for ${esc(c.level)}: <b>${target}</b> per test. Any test under the target flags Contact Parents${margin?` · passing scores under <b>${target+margin}</b> are flagged as "close"`:''}.`
      : `3 tests per cycle · <b>240 points total</b> needed (average 80). An average under 80 flags Contact Parents${margin?` · averages under <b>${CYCLE_AVG_TARGET+margin}</b> are flagged as "close"`:''}.`;

  window._gmIds = students.map(s=>s.id);
  showModal(`
    <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;">
      <h3 style="margin:0;">📝 Grades — ${esc(c.name)}${c.level?` <span class="badge other">${esc(c.level)}</span>`:''}</h3>
      <span style="font-size:12px;color:var(--muted);white-space:nowrap;" title="Change in Settings (sidebar)">⚙ Alert margin: +${margin} · set in Settings</span>
    </div>
    <div style="font-size:13px;color:var(--muted);margin:8px 0 12px;">${ruleNote}</div>
    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:12px;">
      <label style="font-size:13px;font-weight:600;color:var(--muted);">Cycle:</label>
      <select onchange="gmSelectCycle(this.value)">
        ${g.cycles.map((cy,i)=>`<option value="${i}" ${i===gmCycleIdx?'selected':''}>${esc(cy.label)} (${formatDateShort(cy.startedAt)})${i===g.cycles.length-1?' · current':''}</option>`).join('')}
      </select>
      <button class="btn-ghost small" onclick="gmRenameCycle()" title="Rename this cycle">✏️ Rename</button>
      <button class="btn-ghost small" onclick="gmNewCycle()">+ New cycle</button>
      ${g.cycles.length>1?`<button class="btn-ghost small" style="color:var(--red);" onclick="gmDeleteCycle()" title="Delete this cycle">🗑 Delete</button>`:''}
      ${!isCurrent?`<span class="badge other">Viewing a past cycle — still editable</span>`:''}
    </div>
    <div class="card" style="padding:10px 14px;margin-bottom:12px;">
      <div style="font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px;">📅 Test days — scheduling a date adds a Test event to the Calendar; absences on that day flag Contact Parents on the Dashboard.</div>
      <div style="display:flex;gap:14px;flex-wrap:wrap;">
        ${testDates.map((d,i)=>`
          <label style="display:flex;align-items:center;gap:6px;font-size:13px;">
            <span style="font-weight:600;">${testLabelFor(c,i)}</span>
            <input type="date" value="${d||''}" onchange="gmSetTestDate(${i}, this.value)">
          </label>`).join('')}
      </div>
    </div>
    ${students.length ? `
    <div class="table-wrap" style="max-height:50vh;overflow:auto;">
      <table>
        <thead><tr><th>Student</th>${Array.from({length:n},(_,i)=>`<th style="text-align:center;">${testLabelFor(c,i)}${testDates[i]?`<div style="font-weight:400;font-size:11px;color:var(--muted);">${formatDateShort(testDates[i])}</div>`:''}</th>`).join('')}<th style="text-align:center;">Total</th><th style="text-align:center;">Avg</th><th>Status</th></tr></thead>
        <tbody>
          ${students.map((s,si)=>{
            const scores = studentScores(cycle, s.id, n);
            const st = gradeStatus(c, cycle, s.id);
            const statusHtml = !st ? '<span style="color:var(--muted);font-size:12px;">—</span>'
              : st.under ? `<span class="badge red">📞 ${adv?'Below '+target:'Avg under 80'}</span>`
              : st.close ? `<span class="badge amber">📞 ${adv?'Close to '+target:'Close to 80'}</span>`
              : (st.entered<st.of ? `<span class="badge other">On track (${st.entered}/${st.of})</span>` : `<span class="badge" style="background:var(--green-soft,#e5f7ec);color:var(--green);">✓ ${adv?'Target met':'Approved'}</span>`);

              <td style="font-weight:600;">${esc(s.name)}</td>

              <td style="text-align:center;">${st?st.total:'—'}</td>
              <td style="text-align:center;">${st?st.avg:'—'}</td>
              <td>${statusHtml}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>` : `<div class="empty">No students in this class yet.</div>`}
    <div class="modal-actions" style="justify-content:space-between;">
      <button class="btn-ghost small" onclick="exportGradesCsv()">⬇ Export CSV</button>
      <button class="btn-accent" onclick="closeModal()">Done</button>
    </div>
  `, true);
}

function gmSetTestDate(testIdx, value){
  const c = classById(gmClassId);
  const g = classGrades(gmClassId);
  const cycle = g.cycles[gmCycleIdx];
  const n = testCountFor(c);
  if(!cycle.testDates) cycle.testDates = [];
  while(cycle.testDates.length<n) cycle.testDates.push(null);
  if(!cycle.testEventIds) cycle.testEventIds = [];
  while(cycle.testEventIds.length<n) cycle.testEventIds.push(null);

  cycle.testDates[testIdx] = value || null;

  // Sync the linked calendar event (type 'test', marked fromGrades)
  const evId = cycle.testEventIds[testIdx];
  const title = `${testLabelFor(c,testIdx)} — ${cycle.label}`;
  if(value){
    const existing = evId ? state.events.find(e=>e.id===evId) : null;
    if(existing){ existing.date = value; existing.title = title; }
    else{
      const id = uid();
      state.events.push({id, date:value, title, type:'test', classId:gmClassId, fromGrades:true});
      cycle.testEventIds[testIdx] = id;
    }
  }else if(evId){
    state.events = state.events.filter(e=>e.id!==evId);
    cycle.testEventIds[testIdx] = null;
  }
  scheduleSave('events', state.events);
  scheduleSave('grades', state.grades);
  renderGradesModal();
}

function gmSetScore(studentId, testIdx, value){
  const c = classById(gmClassId);
  const g = classGrades(gmClassId);
  const cycle = g.cycles[gmCycleIdx];
  if(!cycle.scores) cycle.scores = {};
  const n = testCountFor(c);
  const arr = studentScores(cycle, studentId, n);
  const num = value==='' ? null : Number(value);
  arr[testIdx] = (num==null || isNaN(num)) ? null : num;
  cycle.scores[studentId] = arr;
  scheduleSave('grades', state.grades);
  renderGradesModal();
}

function gmSelectCycle(idx){ gmCycleIdx = Number(idx); renderGradesModal(); }

function gmNewCycle(){
  const g = classGrades(gmClassId);
  if(!confirm('Start a new grading cycle?\n\nThe current cycle stays saved and selectable. Scores do NOT carry over — the new cycle starts empty.')) return;
  const label = prompt('Name for the new cycle:', 'Cycle '+(g.cycles.length+1));
  if(label===null) return;
  g.cycles.push({ id: uid(), label: label.trim() || ('Cycle '+(g.cycles.length+1)), startedAt: todayStr(), scores: {} });
  gmCycleIdx = g.cycles.length-1;
  scheduleSave('grades', state.grades);
  renderGradesModal();
}

function gmRenameCycle(){
  const g = classGrades(gmClassId);
  const cy = g.cycles[gmCycleIdx];
  if(!cy) return;
  const label = prompt('Rename cycle:', cy.label);
  if(label===null) return;
  const trimmed = label.trim();
  if(!trimmed) return;
  cy.label = trimmed;
  // Keep any linked test-day calendar events in sync with the new name.
  const c = classById(gmClassId);
  (cy.testEventIds||[]).forEach((evId, ti)=>{
    if(!evId) return;
    const ev = state.events.find(e=>e.id===evId);
    if(ev) ev.title = `${testLabelFor(c,ti)} — ${trimmed}`;
  });
  scheduleSave('grades', state.grades);
  scheduleSave('events', state.events);
  renderGradesModal();
}

function gmDeleteCycle(){
  const g = classGrades(gmClassId);
  if(g.cycles.length<=1){ alert('A class needs at least one cycle.'); return; }
  const cy = g.cycles[gmCycleIdx];
  if(!cy) return;
  const linked = (cy.testEventIds||[]).filter(Boolean).length;
  if(!confirm(`Delete cycle "${cy.label}"?\n\nAll test scores in it will be removed${linked?`, along with ${linked} test event(s) on the Calendar`:''}.\n\nThis cannot be undone.`)) return;
  // Remove this cycle's linked calendar events.
  const evIds = new Set((cy.testEventIds||[]).filter(Boolean));
  if(evIds.size) state.events = state.events.filter(e=>!evIds.has(e.id));
  g.cycles.splice(gmCycleIdx, 1);
  gmCycleIdx = Math.min(gmCycleIdx, g.cycles.length-1);
  scheduleSave('grades', state.grades);
  if(evIds.size) scheduleSave('events', state.events);
  renderGradesModal();
}

/* ================= ROLL CALL ================= */
function renderRollCall(){
  const active = activeClasses();
  if(!active.length){
    document.getElementById('view-rollcall').innerHTML = `

      <div class="card empty-card">Add a class first in <button type="button" class="linkish" onclick="navigate('classes')">Classes &amp; Students</button>.</div>`;
    return;
  }
  const date = state.rollcall.date;
  const dow = new Date(date+'T00:00:00').getDay();
  const scheduled = active.filter(c=>getClassDays(c).includes(dow));
  let cls = classById(state.rollcall.classId);
  if(!cls || cls.archived){ cls = scheduled[0] || null; state.rollcall.classId = cls ? cls.id : null; }
  if(!cls){
    document.getElementById('view-rollcall').innerHTML = `
      <div class="topbar">
        <div><h1>Roll Call</h1><div class="meta">${formatDateLong(date)}</div></div>
        <div class="rollcall-controls">
          <input type="date" value="${date}" onchange="setRollcallDate(this.value)">
        </div>

    return;

/* ===== Class plan (repurposed promises store) — rich text helpers =====
   The old "promised for today" store now holds the day's class plan.
   Values may be legacy plain text or HTML written by the rich editor.
   No migration needed: legacy text is upgraded to HTML on display. */
function htmlToPlain(html){
  if(!html) return '';
  const d = document.createElement('div');
  d.innerHTML = String(html)
    .replace(/<br\s*\/?>/gi, '\n')
    .replace(/<\/(div|p|li|h1|h2|h3|blockquote)>/gi, '\n');
  return (d.textContent || '').replace(/\u00a0/g,' ').replace(/\n{3,}/g,'\n\n').trim();
}
function looksLikeHtml(val){ return /<[a-z][\s\S]*>/i.test(val||''); }
// Whitelist sanitizer: only formatting tags/attrs the toolbar can produce
// (plus what sensible pasting yields). Everything else is unwrapped to text.
const PLAN_TAGS = new Set(['B','STRONG','I','EM','U','S','STRIKE','BR','DIV','P','UL','OL','LI','SPAN','FONT','H1','H2','H3','BLOCKQUOTE']);
function sanitizePlanHtml(html){
  if(!html) return '';
  const doc = new DOMParser().parseFromString(html, 'text/html');
  const walk = (node)=>{
    for(const child of Array.from(node.childNodes)){
      if(child.nodeType === Node.ELEMENT_NODE){
        if(!PLAN_TAGS.has(child.tagName)){
          // unwrap: keep children, drop the tag (kills script/iframe/img etc.)
          walk(child);
          while(child.firstChild) node.insertBefore(child.firstChild, child);
          node.removeChild(child);
          continue;
        }
        // strip all attributes except a safe subset
        for(const attr of Array.from(child.attributes)){
          const n = attr.name.toLowerCase();
          if(n === 'size' && child.tagName === 'FONT') continue;
          if(n === 'style'){
            // keep only font-size / font-weight / font-style / text-decoration
            const kept = attr.value.split(';').map(s=>s.trim()).filter(s=>
              /^(font-size|font-weight|font-style|text-decoration)\s*:/i.test(s));
            if(kept.length){ child.setAttribute('style', kept.join(';')); continue; }
          }
          child.removeAttribute(attr.name);
        }
        walk(child);
      } else if(child.nodeType !== Node.TEXT_NODE){
        node.removeChild(child); // comments etc.
      }
    }
  };
  walk(doc.body);
  return doc.body.innerHTML;
}
// Display form: legacy plain text -> escaped html with line breaks; html -> sanitized
function planDisplayHtml(val){
  if(!val) return '';
  return looksLikeHtml(val) ? sanitizePlanHtml(val) : esc(val).replace(/\n/g,'<br>');

/* ================= CLASS POINTS (ClassDojo-style, per-class opt-in) =================
   Enabled per class via cls.pointsEnabled. Every award is an append-only log
   entry (never a mutated total), so history, undo and cross-device merging
   all stay safe. Totals are computed, filtered by cls.pointsSince so a
   "new round" keeps old history without counting it. */
const POINT_PRESETS = [
  { emoji:'🙋', label:'Participation',       delta:+1 },
  { emoji:'🗣️', label:'Speaking English',    delta:+1 },
  { emoji:'🤝', label:'Helping a colleague', delta:+1 },
  { emoji:'🌟', label:'Great work',          delta:+2 },
  { emoji:'🇧🇷', label:'Speaking Portuguese', delta:-1 },
  { emoji:'📵', label:'Off task',            delta:-1 },
  { emoji:'📕', label:'No homework',         delta:-1 },
];
function classPointsEnabled(classId){ return !!classById(classId)?.pointsEnabled; }
function pointsFor(studentId, classId, sinceOverride){
  const since = sinceOverride !== undefined ? sinceOverride : (classById(classId)?.pointsSince || '');
  return (state.pointsLog||[]).reduce((t,e)=>
    t + ((e.studentId===studentId && e.classId===classId && (!since || e.date>=since)) ? e.delta : 0), 0);
}
function pointsHistory(studentId, classId){
  return (state.pointsLog||[])
    .filter(e=>e.studentId===studentId && e.classId===classId)
    .sort((a,b)=>(b.ts||0)-(a.ts||0));
}
function awardPoints(classId, studentId, delta, reason, date){
  delta = parseInt(delta, 10);
  if(!delta) return null;
  if(!state.pointsLog) state.pointsLog = [];
  const entry = { id: uid(), classId, studentId, delta, reason:(reason||'').trim(), date: date || todayStr(), ts: Date.now() };
  state.pointsLog.push(entry);
  scheduleSave('pointsLog', state.pointsLog);
  return entry;
}
function quickPoint(classId, studentId, delta, date){
  awardPoints(classId, studentId, delta, '', date || state.rollcall?.date || todayStr());
  refreshView();
}
function deletePointEntry(id, rerender){
  const idx = (state.pointsLog||[]).findIndex(e=>e.id===id);
  if(idx<0) return;
  const snapshot = state.pointsLog[idx];
  state.pointsLog.splice(idx,1);
  scheduleSave('pointsLog', state.pointsLog);
  const s = anyStudent(snapshot.studentId);
  showUndoToast(`Removed ${snapshot.delta>0?'+':''}${snapshot.delta} for ${s?s.name:'student'}`, ()=>{
    state.pointsLog.push(snapshot);
    scheduleSave('pointsLog', state.pointsLog);
    if(typeof rerender==='function') rerender(); else refreshView();
  });
  if(typeof rerender==='function') rerender(); else refreshView();
}

/* ================= TRENDS & AT-RISK (derived, read-only) =================
   Longitudinal views computed from data that already exists (sessions,
   grades, pointsLog). No new state keys — nothing here can corrupt data. */
function monthKeyOf(date){ return (date||'').slice(0,7); }
function monthShortLabel(mk){
  const [y,m] = mk.split('-');
  const names = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return names[(+m)-1] + (todayStr().slice(0,4)===y ? '' : ' '+y.slice(2));
}
// records: attendance records in any order → per-month attendance %.
function attendanceMonthly(records, maxMonths=8){
  const by = {};
  for(const r of records){
    const k = monthKeyOf(r.date);
    by[k] = by[k] || {p:0,a:0};
    if(r.attendance==='absent') by[k].a++; else by[k].p++;
  }
  return Object.keys(by).sort().slice(-maxMonths)
    .map(k=>({ key:k, label:monthShortLabel(k), value: Math.round(100*by[k].p/(by[k].p+by[k].a)), n: by[k].p+by[k].a }));
}
function hwValueOf(r){ return typeof r.hw==='number' ? r.hw : (r.hw==='done' ? 100 : 0); }
function hwMonthly(records, maxMonths=8){
  const by = {};
  for(const r of records){
    if(r.hw==null || r.attendance==='absent') continue;
    const k = monthKeyOf(r.date);
    by[k] = by[k] || {s:0,n:0};
    by[k].s += hwValueOf(r); by[k].n++;
  }
  return Object.keys(by).sort().slice(-maxMonths)
    .map(k=>({ key:k, label:monthShortLabel(k), value: Math.round(by[k].s/by[k].n), n: by[k].n }));
}
function pointsMonthly(entries, maxMonths=8){
  const by = {};
  for(const e of entries){ const k = monthKeyOf(e.date); by[k] = (by[k]||0) + e.delta; }
  return Object.keys(by).sort().slice(-maxMonths)
    .map(k=>({ key:k, label:monthShortLabel(k), value: by[k] }));
}
// One point per grade cycle that has any scores for the student.
function studentGradeSeries(cls, studentId){
  const g = state.grades[cls.id];
  if(!g || !g.cycles) return [];
  return g.cycles
    .map(cy=>({ label: cy.label, st: gradeStatus(cls, cy, studentId) }))
    .filter(x=>x.st)
    .map(x=>({ label:x.label, value:x.st.avg, under:x.st.under, close:x.st.close, advanced:x.st.advanced, target:x.st.target }));
}
function classGradeSeries(cls){
  const g = state.grades[cls.id];
  if(!g || !g.cycles) return [];
  const roster = studentsInClass(cls.id);
  return g.cycles.map(cy=>{
    const avgs = roster.map(s=>gradeStatus(cls, cy, s.id)).filter(Boolean).map(st=>st.avg);
    if(!avgs.length) return null;
    return { label: cy.label, value: Math.round(avgs.reduce((a,b)=>a+b,0)/avgs.length*10)/10, n: avgs.length };
  }).filter(Boolean);
}
/* --- sparkline: dependency-free inline SVG --- */
function sparklineSvg(points, opts){
  const { w=190, h=46, target=null, suffix='', color='var(--accent)' } = opts||{};
  if(!points || !points.length) return `<div class="spark-empty">no data yet</div>`;
  const vals = points.map(p=>p.value);
  let lo = Math.min(...vals, target!=null?target:Infinity);
  let hi = Math.max(...vals, target!=null?target:-Infinity);
  if(lo===hi){ lo -= 1; hi += 1; }
  const span = hi-lo; lo -= span*0.12; hi += span*0.12;
  const pad=5, lw=40, iw=w-pad*2-lw, ih=h-pad*2;
  const x = i => points.length===1 ? pad+iw/2 : pad + i*(iw/(points.length-1));
  const y = v => pad + ih - (v-lo)/(hi-lo)*ih;
  const poly = points.map((p,i)=>`${x(i).toFixed(1)},${y(p.value).toFixed(1)}`).join(' ');
  const last = points[points.length-1];
  return `
  <svg class="spark" viewBox="0 0 ${w} ${h}" width="${w}" height="${h}" role="img" aria-label="trend">
    ${target!=null?`<line x1="${pad}" x2="${pad+iw}" y1="${y(target).toFixed(1)}" y2="${y(target).toFixed(1)}" stroke="var(--muted)" stroke-dasharray="3 3" stroke-width="1" opacity=".55"/>`:''}
    ${points.length>1?`<polyline points="${poly}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>`:''}
    ${points.map((p,i)=>`<circle cx="${x(i).toFixed(1)}" cy="${y(p.value).toFixed(1)}" r="${i===points.length-1?3:2}" fill="${color}"><title>${esc(p.label)}: ${p.value}${suffix}</title></circle>`).join('')}
    <text x="${pad+iw+5}" y="${Math.min(h-4, Math.max(11, y(last.value)+4)).toFixed(1)}" font-size="11" font-weight="700" fill="${color}">${last.value}${suffix}</text>
  </svg>
  <div class="spark-labels"><span>${esc(points[0].label)}</span><span>${esc(last.label)}</span></div>`;
}
function trendDelta(points){
  if(!points || points.length<2) return null;
  return points[points.length-1].value - points[points.length-2].value;
}
function trendArrow(points, goodIsUp=true){
  const d = trendDelta(points);
  if(d==null || d===0) return '';
  const up = d>0;
  const good = up===goodIsUp;
  return ` <span style="font-size:12px;font-weight:700;color:${good?'var(--green)':'var(--red)'};">${up?'▲':'▼'} ${Math.abs(d)}</span>`;
}
/* --- at-risk: combined signals, each pure and individually testable --- */
const RISK = {
  RECENT_N:6, PRIOR_N:6, MIN_RECENT:4,     // attendance windows (class meetings)
  ATT_LOW:75, ATT_DROP:15, ATT_WARN:85,    // % thresholds
  HW_MIN_N:3, HW_LOW:50, HW_WARN:70,       // homework avg thresholds
  GRADE_FALL:8, GRADE_FALL_ADV:15          // cycle-over-cycle drop (regular / TOEFL scale)
};
// records: completed attendance records NEWEST-FIRST (studentAttendanceRecords)
function sigAttendance(records){
  const recent = records.slice(0, RISK.RECENT_N);
  if(recent.length < RISK.MIN_RECENT) return null;
  const rate = arr => Math.round(100*arr.filter(r=>r.attendance!=='absent').length/arr.length);
  const rRecent = rate(recent);
  const prior = records.slice(RISK.RECENT_N, RISK.RECENT_N+RISK.PRIOR_N);
  const rPrior = prior.length >= RISK.MIN_RECENT ? rate(prior) : null;
  if(rRecent < RISK.ATT_LOW)
    return { kind:'attendance', sev:2, recent:rRecent, prior:rPrior,
             text:`Attendance ${rRecent}% in the last ${recent.length} classes${rPrior!=null?` (was ${rPrior}%)`:''}` };
  if(rPrior!=null && rPrior-rRecent >= RISK.ATT_DROP && rRecent < RISK.ATT_WARN)
    return { kind:'attendance', sev:1, recent:rRecent, prior:rPrior, text:`Attendance fell ${rPrior}% → ${rRecent}%` };
  return null;
}
function sigHomework(records){
  const withHw = records.filter(r=>r.attendance!=='absent' && r.hw!=null).slice(0, RISK.RECENT_N);
  if(withHw.length < RISK.HW_MIN_N) return null;
  const avg = Math.round(withHw.reduce((s,r)=>s+hwValueOf(r),0)/withHw.length);
  if(avg < RISK.HW_LOW) return { kind:'homework', sev:2, avg, text:`Homework avg ${avg}% over the last ${withHw.length} classes` };
  if(avg < RISK.HW_WARN) return { kind:'homework', sev:1, avg, text:`Homework avg ${avg}%` };
  return null;
}
// series: chronological [{label, value, under, close, advanced}]
function sigGrades(series){
  if(!series || !series.length) return null;
  const cur = series[series.length-1];
  const prev = series.length>1 ? series[series.length-2] : null;
  const fallBar = cur.advanced ? RISK.GRADE_FALL_ADV : RISK.GRADE_FALL;
  const falling = !!prev && (prev.value - cur.value) >= fallBar;
  if(cur.under) return { kind:'grades', sev:2, avg:cur.value, falling,
    text:`${cur.label}: avg ${cur.value} — ${cur.advanced?'below TOEFL target':'failing'}${falling?` (down from ${prev.value})`:''}` };
  if(falling) return { kind:'grades', sev: cur.close?2:1, avg:cur.value, falling:true,
    text:`Avg fell ${prev.value} → ${cur.value} (${cur.label})` };
  if(cur.close) return { kind:'grades', sev:1, avg:cur.value, falling:false,
    text:`${cur.label}: avg ${cur.value} — close to the minimum` };
  return null;
}
// A student is at-risk only when TWO OR MORE independent signal categories
// fire — single-signal cases are already covered by the contact-parents cards.
function riskAssess(student){
  const cls = classById(student.classId);
  if(!cls || cls.archived) return null;
  const records = studentAttendanceRecords(student);
  const signals = [
    sigAttendance(records),
    sigHomework(records),
    sigGrades(studentGradeSeries(cls, student.id))
  ].filter(Boolean);
  if(signals.length < 2) return null;
  return { studentId: student.id, name: student.name, classId: student.classId,
           signals, score: signals.reduce((s,x)=>s+x.sev,0) };
}

/* ============ ACTIVITIES — A–F skill grades, any level ============
   An activity = one in-class task (e.g. "write a text about your weekend"),

   Independent of the numeric cycle-grade system, so it works for every
   level. Records are created only when the teacher starts an activity —
   never as a side effect of viewing (same lazy principle as sessions). */
const ACTIVITY_SKILLS = [
  { id:'speaking', label:'Speaking', pt:'Fala',      emoji:'🗣️' },
  { id:'writing',  label:'Writing',  pt:'Escrita',   emoji:'✍️' },
  { id:'grammar',  label:'Grammar',  pt:'Gramática', emoji:'📐' },
  { id:'other',    label:'Other',    pt:'Outra',     emoji:'🎯' },
];
const ACTIVITY_LETTERS = ['A','B','C','D','F'];
function skillMeta(id){ return ACTIVITY_SKILLS.find(s=>s.id===id) || ACTIVITY_SKILLS[ACTIVITY_SKILLS.length-1]; }
function letterToNum(l){ const i = ACTIVITY_LETTERS.indexOf(l); return i<0 ? null : 4-i; }
function numToLetter(n){
  if(n==null || isNaN(n)) return null;
  return ACTIVITY_LETTERS[4 - Math.min(4, Math.max(0, Math.round(n)))];
}
function activitiesFor(classId, date){
  return (state.activities||[])
    .filter(a=>a.classId===classId && (!date || a.date===date))
    .sort((a,b)=> a.date<b.date?-1 : a.date>b.date?1 : (a.ts||0)-(b.ts||0));
}
function activityById(id){ return (state.activities||[]).find(a=>a.id===id); }
function activityAvg(a){
  const ns = Object.values(a.grades||{}).map(letterToNum).filter(n=>n!=null);
  return ns.length ? ns.reduce((x,y)=>x+y,0)/ns.length : null;
}
function studentSkillAverages(studentId, classId){
  const acc = {};
  for(const a of (state.activities||[])){
    if(a.classId!==classId) continue;
    const n = letterToNum((a.grades||{})[studentId]);
    if(n==null) continue;
    acc[a.skill] = acc[a.skill] || {s:0,n:0};
    acc[a.skill].s += n; acc[a.skill].n++;
  }
  const out = {};
  for(const k of Object.keys(acc)) out[k] = { avg: acc[k].s/acc[k].n, letter: numToLetter(acc[k].s/acc[k].n), n: acc[k].n };
  return out;
}
function studentActivityGrades(studentId, classId){
  return (state.activities||[])
    .filter(a=>a.classId===classId && (a.grades||{})[studentId])
    .sort((a,b)=> b.date<a.date?-1 : b.date>a.date?1 : (b.ts||0)-(a.ts||0));

function setActivityGrade(activityId, studentId, letter){

function deleteActivity(activityId){
  const idx = (state.activities||[]).findIndex(a=>a.id===activityId);
  if(idx<0) return;
  const snapshot = state.activities[idx];
  const graded = Object.keys(snapshot.grades||{}).length;

  state.activities.splice(idx,1);

    </div>

      <button class="btn-accent" onclick="closeModal();refreshView();">Done</button>
    </div>
  `, true);
}
function isSessionCompleted(classId, date){
  // Past sessions auto-count; today needs explicit completion; future never counts
  if(date < todayStr()) return true;
  if(date > todayStr()) return false;
  return !!(state.sessionMeta && state.sessionMeta[classId+'_'+date]?.completed);
}
function toggleSessionCompleted(classId, date){
  if(!state.sessionMeta) state.sessionMeta = {};
  const key = classId+'_'+date;
  if(!state.sessionMeta[key]) state.sessionMeta[key] = {};
  state.sessionMeta[key].completed = !state.sessionMeta[key].completed;
  scheduleSave('sessionMeta', state.sessionMeta);
  refreshView();
}

function getCurrentRecord(studentId){
  const key = state.rollcall.classId + '_' + state.rollcall.date;
  if(!state.sessions[key]) state.sessions[key] = {};
  if(!state.sessions[key][studentId]) state.sessions[key][studentId] = defaultRecord();
  return state.sessions[key][studentId];
}
function persistSessions(){ scheduleSave('sessions', state.sessions); }
function setAttendance(studentId, val){
  getCurrentRecord(studentId).attendance = val;
  persistSessions();
  refreshView();
}
function adjustField(studentId, field, delta){
  const rec = getCurrentRecord(studentId);
  if(field==='hw'){
    rec[field] = Math.min(100, Math.max(0, (rec[field]??100) + delta));
  } else {
    rec[field] = Math.max(0, rec[field] + delta);
  }
  persistSessions();
  refreshView();
}
function setNumField(studentId, field, value, min=0, max=Infinity){
  const rec = getCurrentRecord(studentId);
  let n = parseInt(value);
  if(isNaN(n)) n = min;
  rec[field] = Math.min(max, Math.max(min, n));
  persistSessions();
  refreshView();
}
function bumpField(studentId, field, delta){
  const rec = getCurrentRecord(studentId);
  rec[field] = Math.max(0, (rec[field]||0) + delta);
  persistSessions();
  refreshView();
}
function setField(studentId, field, val){
  const rec = getCurrentRecord(studentId);
  rec[field] = rec[field]===val ? null : val;
  persistSessions();
  refreshView();
}
function setLateHwOutcome(studentId, val){
  const rec = getCurrentRecord(studentId);
  rec.lateHwOutcome = val;
  persistSessions();
  refreshView();
}
function setNote(studentId, val){
  getCurrentRecord(studentId).notes = val;
  persistSessions();
}
function toggleDrawer(studentId){
  state.openDrawer = state.openDrawer===studentId ? null : studentId;
  refreshView();
}
function toggleClassView(){
  const pref = localStorage.getItem('classViewCollapsed');
  const narrow = window.matchMedia('(max-width: 700px)').matches;
  const collapsed = pref===null ? narrow : pref==='1';
  localStorage.setItem('classViewCollapsed', collapsed ? '0' : '1');
  refreshView();
}
function markAllPresent(){
  studentsInClass(state.rollcall.classId).forEach(s=>{ getCurrentRecord(s.id).attendance='present'; });
  persistSessions();
  refreshView();
}
function setRollcallClass(classId){
  if(classId === '__all__'){   // reveal all active classes for a makeup on this date
    state.rollcallShowAll = true;
    refreshView();
    return;
  }
  state.rollcall.classId = classId;
  state.openDrawer = null;
  refreshView();
}
function setRollcallDate(date){
  state.rollcall.date = date;
  state.openDrawer = null;
  state.rollcallShowAll = false;   // a new date starts from the clean scheduled list
  const dow = new Date(date+'T00:00:00').getDay();
  const cls = classById(state.rollcall.classId);
  if(!cls || !getClassDays(cls).includes(dow)){
    const sched = activeClasses().filter(c=>getClassDays(c).includes(dow));
    state.rollcall.classId = sched[0] ? sched[0].id : null;
  }
  refreshView();
}
function openRollCallNav(){
  const dow = new Date(state.rollcall.date+'T00:00:00').getDay();
  const cls = classById(state.rollcall.classId);
  if(!cls || cls.archived || !getClassDays(cls).includes(dow)){
    const sched = activeClasses().filter(c=>getClassDays(c).includes(dow));
    state.rollcall.classId = sched[0] ? sched[0].id : null;
  }
  navigate('rollcall');
}

olidar e ir além, tentar usar palavras novas logo após aprender é a melhor forma de torná-las permanentes."],"5":["O vocabulário é rico, variado e sofisticado — a comunicação acontece com fluência e precisão impressionantes.","Há domínio excepcional das palavras, usadas de forma criativa e sempre no contexto certo — parabéns!","A precisão e a diversidade no uso do vocabulário são destaque no desempenho — resultado de muito esforço.","O conhecimento lexical é impressionante e reflete dedicação intensa ao aprendizado do idioma.","As palavras são usadas com desenvoltura que eleva toda a comunicação a um nível avançado — excelente!","A escolha de palavras é sempre precisa, rica e adequada ao contexto — um exemplo para toda a turma.","O controle avançado do vocabulário é uma das maiores forças no aprendizado — continue desenvolvendo essa habilidade.","O nível de vocabulário alcançado é resultado de muito esforço e dedicação — parabéns pelo resultado!"]},"grammar":{"1":["A compreensão das regras gramaticais ainda é muito limitada, dificultando a construção de frases coerentes. Rever os fundamentos com um material de apoio do nível básico é o passo mais importante agora.","Erros gramaticais graves e frequentes comprometem a clareza das mensagens. Praticar exercícios curtos de gramática todos os dias, começando pelas estruturas mais simples, pode gerar avanços rápidos.","Há grande dificuldade em aplicar até mesmo as regras básicas do idioma. Usar um caderno para anotar as regras e exemplos explicados em aula pode facilitar bastante a revisão em casa.","A estrutura das frases é constantemente incorreta, o que dificulta muito a comunicação. Praticar a construção de frases simples — sujeito, verbo, complemento — é um bom ponto de partida.","Sem avançar na gramática, será difícil progredir para os próximos conteúdos. Pedir exercícios extras de revisão ao professor pode ajudar a identificar e corrigir os erros mais recorrentes.","Os erros gramaticais são tão frequentes que afetam a compreensão do que é dito. Dedicar tempo de estudo extra à gramática básica — verbo to be, presente simples — é fundamental nesse momento.","As lacunas gramaticais identificadas precisam de atenção urgente e consistente. Praticar com vídeos curtos de gramática no YouTube, revisando uma regra por semana, é uma boa estratégia.","A aplicação das regras gramaticais ainda é um grande desafio. Revisar as anotações de aula em casa, tentando reformular as frases com erro, é um exercício muito eficaz."],"2":["A comunicação é possível, mas erros gramaticais comprometem a precisão com frequência. Identificar os erros mais repetidos e criar um guia pessoal de regras pode ajudar muito na correção.","A estrutura das frases ainda é inconsistente e precisa de prática contínua. Escrever pequenos parágrafos em inglês toda semana é uma forma eficiente de consolidar as regras na prática.","Há conhecimento básico, mas dificuldade em aplicar as regras de forma consistente. Fazer exercícios de completar frases com foco nas estruturas que mais geram dúvida pode acelerar o progresso.","Com foco nas regras fundamentais, o desempenho pode evoluir consideravelmente. Rever a gramática de forma sistemática — uma estrutura por semana — é uma abordagem que funciona muito bem.","Os mesmos erros se repetem com frequência — revisão e prática são fundamentais. Pedir ao professor que marque os erros nos textos escritos é uma excelente forma de identificar padrões problemáticos.","O progresso vai ser acelerado com exercícios específicos nos pontos que mais geram dificuldade. Usar apps de gramática interativos pode tornar a prática mais dinâmica e eficiente.","Ainda há confusão entre estruturas básicas que precisam ser consolidadas. Praticar a produção oral com atenção nas estruturas — mesmo que devagar — ajuda a criar automatismo gramatical.","A gramática ainda dificulta uma comunicação mais clara e natural. Ouvir e repetir frases em inglês em voz alta é uma técnica excelente para internalizar as estruturas corretas."],"3":["A gramática é adequada para a maioria das situações, mas erros ainda ocorrem em construções complexas. Prestar atenção especial a phrasal verbs e tempos compostos pode dar um salto significativo no nível.","Frases são construídas corretamente na maior parte do tempo, mas deslizes ocorrem ocasionalmente. Rever as estruturas que mais causam erros — como question tags e condicionais — pode ajudar a eliminá-los.","O desempenho é consistente, mas há espaço para aprimorar a precisão e a naturalidade das construções. Praticar a reformulação de textos — reescrever parágrafos com estruturas variadas — é um exercício muito útil.","As regras são entendidas, mas há hesitação na aplicação — mais prática oral vai ajudar bastante. Participar das atividades de fala em aula com mais frequência é uma ótima forma de criar automatismo.","A gramática permite comunicação eficiente, mas a fluência pode ser aprimorada com mais prática. Escrever pequenos textos em inglês e pedir feedback ao professor é uma forma concreta de identificar pontos a melhorar.","Com um pouco mais de atenção aos detalhes gramaticais, o nível pode dar um salto significativo. Manter um caderno de erros — anotando a forma correta ao lado de cada erro — é uma estratégia muito eficaz.","O desempenho é sólido, mas ainda há dependência de verificação para construções mais elaboradas. Tentar construir frases complexas sem apoio em aula é uma forma de testar e fortalecer a gramática.","A gramática está bem estabelecida para o nível atual, mas o próximo passo exige mais precisão. Ler textos um pouco acima do nível atual, prestando atenção nas estruturas usadas, pode acelerar muito o progresso."],"4":["A gramática é sólida e as frases são construídas de forma clara e correta na grande maioria das situações. Para alcançar a excelência, vale trabalhar a naturalidade em construções mais complexas, como voz passiva e discurso indireto.","Há ótimo domínio da estrutura da língua, com expressão clara e segura — mas ainda há espaço para refinar. Explorar o uso de conectores e organizadores textuais pode tornar a comunicação ainda mais sofisticada.","Erros gramaticais são raros e as regras são usadas com muita confiança. O próximo passo é praticar estruturas mais avançadas, como condicionais complexas e tempos verbais menos frequentes.","O conhecimento gramatical é excelente e reflete muito comprometimento com o aprendizado. Para chegar ao próximo nível, vale prestar atenção à gramática em textos autênticos — livros, artigos, filmes.","A base gramatical é muito forte e há condições de explorar estruturas mais avançadas. Praticar a escrita formal e acadêmica é uma excelente forma de aprofundar o domínio gramatical.","A precisão gramatical está claramente acima da média da turma, o que é muito positivo. Para crescer ainda mais, tentar usar estruturas novas com intenção — em vez de só as já dominadas — pode ampliar o repertório gramatical.","As estruturas do idioma são dominadas com muita desenvoltura — isso faz diferença real na comunicação. Rever esporadicamente as estruturas que menos aparecem na fala ajuda a mantê-las ativas.","A gramática é um dos pontos fortes e contribui muito para a fluência geral. Para refinar ainda mais, prestar atenção nos erros residuais — pequenos deslizes que ainda ocorrem — é o foco ideal agora."],"5":["A gramática é impecável, permitindo comunicação precisa, elegante e completamente natural — resultado de muito esforço.","Há domínio excepcional das regras e estruturas do idioma — digno de grande reconhecimento e admiração.","A precisão gramatical e a riqueza das construções são destaque no desempenho — parabéns pelo nível alcançado!","O conhecimento gramatical é impressionante e coloca o desempenho no topo da turma — continue assim!","A gramática é usada com uma fluidez que eleva toda a proficiência a um nível muito avançado — excelente!","Os textos e as falas demonstram gramática impecável mesmo em situações de comunicação espontânea — muito bem!","Há controle pleno das estruturas do idioma em todos os contextos — parabéns pelo esforço e pela dedicação!","A gramática exemplar é uma das maiores forças no desempenho e serve de referência para toda a turma."]},"behavior":{"1":["A postura em sala de aula precisa de atenção urgente, pois está prejudicando o aprendizado de todos. Estabelecer uma meta pessoal de manter o foco por pelo menos 10 minutos seguidos pode ser um bom começo.","O excesso de conversas paralelas e agitação compromete o ambiente de aprendizado. Combinar com o professor um sinal discreto para retomar o foco pode ajudar a criar consciência sobre os momentos de distracão.","A postura atual tem impactado negativamente a dinâmica da turma e precisa mudar. Sentar mais próximo do professor durante as aulas pode ajudar a manter o foco e reduzir as distrações.","Há dificuldade em seguir as regras da aula, o que prejudica a própria evolução. Conversar com o professor fora da aula sobre estratégias de foco pode abrir um caminho muito mais produtivo.","Conversas fora de hora e falta de atenção são hábitos que precisam ser corrigidos com urgência. Deixar o celular guardado durante a aula inteira é uma mudança simples que faz uma diferença enorme.","O comportamento atual dificulta o aproveitamento do conteúdo e afeta os colegas ao redor. Tentar uma postura mais ativa — respondendo às perguntas do professor — pode transformar o engajamento na aula.","A falta de respeito às regras da aula é um ponto que precisa ser trabalhado com seriedade. Refletir sobre o impacto do próprio comportamento nos colegas pode ser um exercício muito valioso.","A postura em sala está abaixo do esperado e exige uma mudança de atitude. Criar uma rotina de chegada — guardar o celular, abrir o caderno — pode ajudar a entrar no modo de estudo."],"2":["A participação em sala pode ser mais focada e consistente para aproveitar melhor as aulas. Tentar responder pelo menos uma pergunta por aula é uma boa forma de aumentar o engajamento gradualmente.","O conteúdo é acompanhado, mas as conversas com os colegas acabam dispersando a turma. Sentar próximo a quem mantém o foco pode ajudar a reduzir as distrações durante as explicações.","Há potencial claro, mas a distracão frequente impede que todo o conteúdo seja aproveitado. Anotar os pontos principais durante a aula é uma estratégia simples que ajuda a manter a atenção.","O comportamento é aceitável, mas ainda há muito espaço para evoluir em termos de postura. Estabelecer um desafio pessoal — como ficar uma aula inteira sem usar o celular — pode ser transformador.","Pequenas mudanças de comportamento fariam uma grande diferença no aprendizado. Chegar à aula com uma pergunta preparada pode aumentar o engajamento de forma natural.","Momentos importantes da aula são perdidos às vezes por falta de atenção. Desenvolver o hábito de fazer anotações durante as explicações é uma ótima forma de manter o foco.","Com mais foco e disciplina, o desempenho poderia melhorar consideravelmente. Tentar manter contato visual com o professor durante as explicações pode ajudar muito a manter a concentração.","O comportamento está melhorando, mas ainda há momentos de dispersão que valem ser trabalhados. Pedir ao professor para ser chamado durante as atividades pode aumentar o senso de responsabilidade."],"3":["A participação é geralmente boa, mas há momentos de distracão durante as atividades. Participar mais ativamente das dinâmicas em grupo pode ajudar a manter o engajamento elevado durante toda a aula.","A atenção é mantida na maior parte do tempo, mas há espaço para um envolvimento ainda mais ativo. Tentar iniciar respostas sem esperar a vez pode ser uma forma de aumentar a participação de forma natural.","A postura é adequada, mas há espaço para uma atitude ainda mais ativa e participativa. Fazer perguntas durante as aulas — mesmo que simples — demonstra engajamento e acelera o aprendizado.","O foco é mantido, mas a concentração pode aumentar nos momentos-chave da aula. Tentar rever as anotações logo após a aula, ainda com o conteúdo fresco, pode ajudar muito na fixação.","A postura é consistente, mas o engajamento com a aula poderia ser mais entusiasmado. Encarar a aula com uma atitude de curiosidade — tentando descobrir algo novo em cada encontro — pode transformar a experiência.","O ambiente de sala é respeitado, mas há momentos de desconexão com a dinâmica da aula. Contribuir com exemplos pessoais durante as explicações é uma forma eficaz de manter o engajamento.","Com uma atitude um pouco mais proativa, haveria muito mais aproveitamento das oportunidades de aprendizado. Tentar liderar ou iniciar discussões em atividades de grupo pode desenvolver tanto a participação quanto o idioma.","A postura é tranquila e respeitosa, mas poderia haver mais participação nas discussões. Responder às perguntas do professor — mesmo sem ter certeza — é uma excelente forma de praticar e crescer."],"4":["A postura em sala de aula é muito boa, com participação positiva e construtiva na maioria das aulas. Para chegar ao nível mais alto, vale tentar liderar mais momentos em grupo e incentivar os colegas também.","Há muito engajamento e responsabilidade nas atividades propostas — isso reflete maturidade real. Para crescer ainda mais, participar das partes da aula que são mais desafiadoras pode fazer muita diferença.","O comportamento contribui para um ambiente melhor para todos na turma. O próximo passo seria transformar esse engajamento em liderança — iniciando trocas e discussões de forma espontânea.","O foco é mantido com consistência e a postura favorece muito o próprio aprendizado. Para chegar ao nível de excelência, manter esse engajamento nos momentos de maior cansaço ou dificuldade é o grande desafio.","A presença em sala é sempre positiva e agrega tanto para o grupo quanto para o próprio aprendizado. Para ir além, assumir um papel mais ativo nas dinâmicas de grupo pode enriquecer ainda mais a experiência.","Há respeito consistente pelas regras e pelos colegas, o que é muito valioso. Para alcançar o nível de excelência, vale tentar manter esse mesmo engajamento mesmo quando o conteúdo é mais difícil.","A atitude em sala é muito elogiavel e contribui para um ambiente mais produtivo para todos. Tentar usar o inglês em momentos espontâneos — não só quando solicitado — é um bom próximo passo.","O comportamento demonstra comprometimento real com o aprendizado. Para atingir o nível mais alto, vale tentar engajar ainda mais durante as atividades de prática oral e interação."],"5":["O comportamento em sala é impecável — há respeito, foco e dedicação em cada momento da aula.","É um exemplo de disciplina e postura para toda a turma — a atitude eleva a energia de cada aula.","A participação é sempre ativa e construtiva, contribuindo enormemente para a dinâmica do grupo.","A maturidade e o respeito demonstrados em sala são dignos de muito reconhecimento e admiração.","O comprometimento e a seriedade com que o aprendizado é encarado inspiram os colegas ao redor.","A atitude positiva e engajada torna as aulas mais ricas e produtivas para toda a turma — muito bem!","O entusiasmo é combinado com respeito — uma combinação rara e muito valiosa em sala de aula.","O comportamento exemplar reflete o quanto o próprio desenvolvimento é valorizado — parabéns!"]},"port":{"1":["O uso excessivo do português em sala está comprometendo a imersão e dificultando o progresso. Tentar substituir palavras simples já conhecidas em inglês — como 'yes', 'okay', 'I don't know' — pode ser um bom começo.","É essencial fazer um esforço consciente para se comunicar em inglês durante as aulas. Uma boa estratégia é combinar com o professor uma 'penalidade' divertida para cada vez que o português escapar.","O hábito de recorrer ao português impede o desenvolvimento natural da fluência. Praticar as frases mais usadas no dia a dia em inglês — cumprimentos, pedidos de ajuda, perguntas — pode reduzir muito essa dependência.","A dependência do português limita a prática tanto própria quanto dos colegas. Tentar formular qualquer dúvida primeiro em inglês, mesmo que de forma imperfeita, já é um grande avanço.","Quanto menos o português for usado em aula, mais rápida será a evolução no idioma. Criar um pequeno glossário de frases úteis para usar na aula pode reduzir bastante a dependência do português.","O uso frequente do português é um hábito que precisa mudar para que o aprendizado avançe. Uma dica prática é tentar pensar em inglês antes de falar — mesmo que por um segundo — para criar o hábito.","A imersão em inglês é uma das ferramentas mais poderosas do curso, e ela começa em sala de aula. Escolher uma frase em inglês por aula para usar com os colegas pode ajudar a criar o hábito gradualmente.","Mesmo para perguntas simples, tentar usar o inglês faz uma diferença enorme no aprendizado. Pedir ao professor para ensinar as frases mais úteis em inglês e praticá-las toda aula é uma ótima estratégia."],"2":["O inglês é usado para comunicação básica, mas o português ainda aparece com frequência. Tentar expressar ideias em inglês — mesmo que imperfeitas — é muito mais produtivo do que recorrer ao português.","Há potencial para se comunicar em inglês, mas o uso do português ainda é um obstáculo. Combinar com um colega de sala para se ajudarem a manter o inglês durante as atividades pode ser muito eficaz.","O progresso pode ser acelerado com a redução do uso do português durante as aulas. Tentar usar sempre o inglês quando há outra pessoa por perto para ouvir — a confiança aumenta com a prática.","O uso frequente do português é um hábito que pode ser mudado com determinação. Cada vez que o português 'escapar', tentar repetir a mesma ideia em inglês logo em seguida é uma ótima forma de corrigir.","Cada momento em que o inglês é escolhido em vez do português é uma conquista importante. Desafiar-se a passar uma aula inteira sem usar o português pode ser muito motivador.","Com mais comprometimento com o inglês em sala, a fluência vai evoluir muito mais rápido. Ouvir músicas ou assistir a vídeos curtos em inglês em casa pode criar mais conforto com o idioma.","O uso do português ainda é uma limitação no desenvolvimento da fluência. Preparar com antecedência frases que costumam vir em português — como pedir para repetir — pode ajudar bastante.","O inglês ainda não é a primeira escolha na maioria das situações, mas isso pode mudar com prática. Tentar usar expressões do cotidiano em inglês fora da sala de aula é uma prática muito eficiente."],"3":["O inglês é usado na maior parte do tempo, mas há momentos de recaída para o português. Tentar formular qualquer dúvida em inglês antes de recorrer ao português — mesmo que com erros — é um ótimo desafio.","A tentativa de manter o inglês é notável, mas a disciplina pode ser aprimorada. Em situações de dúvida, tentar adivinhar a palavra em inglês antes de pedir ajuda em português é uma estratégia excelente.","O comportamento está evoluindo bem, mas o português ainda aparece ocasionalmente. Praticar as frases mais usadas em sala — como 'How do you say...?' ou 'Can you repeat that?' — elimina muito da necessidade de recorrer ao português.","Há boa disposição para usar o inglês, mas ainda há momentos de recaída. Cada aula que termina com menos uso do português do que a anterior já é uma vitória — manter esse progresso é o foco.","Mesmo em momentos de dúvida, tentar formular a pergunta em inglês é uma meta alcançável. Anotar as perguntas que costumam vir em português e tentar traduzí-las com antecedência é uma boa preparação.","Com uma pequena mudança de hábito, manter a imersão completa em inglês é totalmente possível. Pedir ao professor que corrija gentilmente cada vez que o português escapar pode ajudar a criar mais consciência.","Está progredindo bem nesse aspecto — um pouco mais de esforço constante pode fazer uma grande diferença. Tentar usar o inglês em pequenas interações do dia a dia — mesmo fora da escola — é um passo importante.","O esforço para manter o inglês é visível e merece reconhecimento. Para dar o próximo passo, o desafio é manter esse esforço também nos momentos mais difíceis ou quando o assunto é mais complexo."],"4":["O inglês é usado com frequência e segurança, contribuindo para um ótimo ambiente de imersão. Para atingir o nível de excelência, vale tentar manter o inglês também nos momentos de maior dificuldade ou frustração.","O esforço para evitar o português em sala é muito notável e impacta diretamente no aprendizado. O próximo passo seria usar o inglês de forma ainda mais espontânea, sem esperar pela atividade estruturada.","Já há muito conforto para se expressar em inglês — isso é um avanço enorme no curso. Para chegar ao nível mais alto, criar o hábito de pensar em inglês — e não apenas falar — pode transformar a fluência.","O comprometimento em falar inglês reflete a seriedade com que o curso é levado. Para ir além, tentar usar o inglês em conversas mais informais com colegas — antes e depois da aula — é um excelente exercício.","O português raramente aparece, o que demonstra muita maturidade e disciplina. Para atingir a imersão total, vale tentar usar o inglês mesmo em situações pequenas, como agradecer ou cumprimentar.","A imersão em sala é consistente e serve de exemplo positivo para os colegas. Para crescer ainda mais, buscar vocabulário em inglês para situações cotidianas — ao invés de traduzir mentalmente do português — pode acelerar muito o progresso.","A compreensão de que falar em inglês o tempo todo é a chave para a fluência já está bem estabelecida. O desafio agora é tornar isso um reflexo automático, sem necessidade de esforço consciente.","O desempenho é muito bom nesse aspecto e está próximo da excelência. Tentar se comunicar exclusivamente em inglês com o professor — inclusive fora das atividades formais — pode ser o passo final."],"5":["O inglês é usado exclusivamente em sala de aula — isso otimiza o aprendizado de forma impressionante.","A disciplina em manter o inglês o tempo todo é um exemplo notável de comprometimento com o aprendizado.","Alto nível de maturidade é demonstrado ao manter a imersão completa durante toda a aula — parabéns!","O uso consistente do inglês contribui imensamente para o desenvolvimento da fluência — continue assim!","A compreensão de que a imersão é a chave do sucesso é aplicada com excelência em cada aula.","Mesmo em situações difíceis, o inglês é mantido — isso faz toda a diferença na evolução do idioma.","A dedicação à imersão em sala é exemplar e inspira os colegas a fazerem o mesmo — muito bem!","É um modelo de como deve ser a postura de alguém comprometido com a fluência real no idioma."]},"homework":{"1":["A entrega das tarefas é muito inconsistente, o que prejudica a fixação do conteúdo. Estabelecer um horário fixo por semana dedicado às tarefas pode ajudar a criar consistência e responsabilidade.","É fundamental começar a realizar todas as tarefas de casa para consolidar o que é aprendido em aula. Separar um horário curto — mesmo que 20 minutos — logo após a aula, enquanto o conteúdo ainda está fresco, pode funcionar muito bem.","A qualidade das tarefas entregues está abaixo do esperado e exige muito mais dedicação. Fazer a tarefa em partes menores — ao invés de deixar para a última hora — pode transformar a qualidade das entregas.","A falta de comprometimento com as tarefas tem impactado negativamente o aprendizado. Pedir ao professor que marque os exercícios mais importantes pode ajudar a priorizar melhor o tempo de estudo em casa.","Sem a prática em casa, o conteúdo visto em aula não se consolida da forma necessária. Começar sempre pela atividade mais fácil das tarefas pode reduzir a resistência inicial e tornar o hábito mais sustentável.","As tarefas são uma extensão essencial do aprendizado da sala de aula — e estão sendo negligenciadas. Combinar com um colega para fazer as tarefas juntos online pode aumentar muito a motivação e a consistência.","A oportunidade de praticar e fixar o conteúdo em casa está sendo perdida com frequência. Usar lembretes no celular para as tarefas pode ajudar a criar o hábito de não deixa-las para depois.","Uma mudança de postura em relação às atividades de casa é necessária para progredir. Conversar com o professor sobre a carga das tarefas — caso seja muito alta — pode ajudar a encontrar um equilíbrio mais viável."],"2":["As tarefas são entregues, mas a qualidade precisa de muito mais cuidado e atenção. Reler a tarefa antes de entregar — pelo menos uma vez — pode reduzir bastante os erros e melhorar a qualidade.","O progresso pode ser acelerado com maior comprometimento nas atividades de casa. Fazer as tarefas em mais de uma sessão curta, revisando o que foi feito em cada uma, pode melhorar bastante a qualidade.","As atividades precisam ser completadas com mais atenção, cuidado e dedicação. Usar o caderno de aula como referência enquanto faz as tarefas pode ajudar a evitar os erros mais comuns.","A dedicação às tarefas está aquém do potencial e pode ser muito aprimorada. Escolher um lugar tranquilo e sem distrações para fazer as tarefas pode fazer uma grande diferença no resultado.","As tarefas entregues mostram que foram feitas com pressa — vale dedicar mais tempo a elas. Começar as tarefas com pelo menos um dia de antecedência permite uma revisão mais calma e cuidadosa.","A consistência nas entregas precisa de melhorias para sustentar o progresso no curso. Pedir ao professor dicas de estudo para cada tipo de atividade pode tornar o tempo de tarefa mais eficiente.","Com mais capricho e atenção nos detalhes, as tarefas vão refletir muito melhor o potencial real. Verificar as respostas usando os recursos de aula — como notas e materiais — antes de entregar é uma boa prática.","Uma entrega incompleta ou descuidada não ajuda na fixação do conteúdo — o esforço extra vale muito. Tentar explicar em voz alta o que foi feito na tarefa é uma forma poderosa de checar a compreensão."],"3":["As tarefas são entregues na
