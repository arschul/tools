}
function cmDurRow(i, e, c){
  const isFirst = i===0;
  const fromVal = (e.from && e.from!=='1900-01-01') ? e.from : (isFirst ? (c?.startDate||'') : '');
  return `<div class="field-row cm-dur-row" style="align-items:center;margin-bottom:6px;">
    ${isFirst
      ? `<div style="flex:1;font-size:12px;color:var(--muted);align-self:center;">From the start</div>`
      : `<div style="flex:1;"><input class="cm-dur-from" type="date" value="${fromVal}" placeholder="From" style="width:100%;"></div>`}
    <input class="cm-dur-min" type="number" min="1" step="5" value="${e.duration||150}" style="width:100px;" title="minutes">
    <span style="font-size:12px;color:var(--muted);">min</span>
    ${isFirst?'<span style="width:34px;"></span>':`<button type="button" class="icon-btn danger" aria-label="Remove this duration period" onclick="this.closest('.cm-dur-row').remove()">×</button>`}
  </div>`;
}
function cmAddDurRow(){
  const rows = document.getElementById('cm-dur-rows');
  const last = rows.querySelector('.cm-dur-row:last-child .cm-dur-min')?.value || 150;
  rows.insertAdjacentHTML('beforeend', cmDurRow(rows.children.length, {from: todayStr(), duration: last}, null));
}
function updateDayLabel(d){
  const cb = document.getElementById('cm-day-'+d);
  const label = document.getElementById('cm-day-label-'+d);
  if(!cb||!label) return;
  label.style.background = cb.checked ? 'var(--accent-soft)' : '#fff';
  label.style.color = cb.checked ? 'var(--accent)' : 'var(--muted)';
  label.style.borderColor = cb.checked ? 'var(--accent)' : 'var(--border)';
}
function selectSwatch(el, color){
  el.parentElement.querySelectorAll('.swatch').forEach(s=>{ s.classList.remove('on'); s.setAttribute('aria-pressed','false'); });
  el.classList.add('on');
  el.setAttribute('aria-pressed','true');
  document.getElementById('cm-color').value = color;
}
function saveClass(classId){
  const name = document.getElementById('cm-name').value.trim();
  if(!name) return;
  const days = [1,2,3,4,5,6,0].filter(d=>document.getElementById('cm-day-'+d)?.checked);
  if(!days.length){ alert('Please select at least one day.'); return; }
  const time = document.getElementById('cm-time').value;
  const level = document.getElementById('cm-level')?.value || '';
  const color = document.getElementById('cm-color').value;
  const startDate = document.getElementById('cm-start').value || null;
  const endDate = document.getElementById('cm-end').value || null;

  // Build duration history
  const rows = [...document.querySelectorAll('.cm-dur-row')];
  let durationHistory = rows.map((r,i)=>({
    from: (i===0 ? (r.querySelector('.cm-dur-from')?.value || '1900-01-01') : r.querySelector('.cm-dur-from')?.value),
    duration: parseInt(r.querySelector('.cm-dur-min').value) || 150
  })).filter(e=>e.from);
  if(!durationHistory.length) durationHistory = [{from:'1900-01-01', duration:150}];
  durationHistory.sort((a,b)=>a.from.localeCompare(b.from));
  // dedupe identical from-dates (last wins)
  const seen = {};
  durationHistory.forEach(e=>{ seen[e.from]=e; });
  durationHistory = Object.values(seen).sort((a,b)=>a.from.localeCompare(b.from));
  const duration = durationHistory[durationHistory.length-1].duration; // compat field = current/latest

  if(classId){
    const c = classById(classId);
    c.name=name; c.days=days; c.time=time; c.level=level; c.color=color; c.startDate=startDate; c.endDate=endDate;
    c.duration=duration; c.durationHistory=durationHistory;
  }else{
    state.classes.push({id:uid(), name, days, time, level, color, startDate, endDate, duration, durationHistory});
  }
  scheduleSave('classes', state.classes);
  closeModal();
  refreshView();
}
function deleteClass(classId){
  if(!confirm('Delete this class, its students, and all roll call records for it? This cannot be undone.')) return;
  state.classes = state.classes.filter(c=>c.id!==classId);
  state.students = state.students.filter(s=>s.classId!==classId);
  Object.keys(state.sessions).forEach(k=>{ if(splitSessionKey(k)[0]===classId) delete state.sessions[k]; });
  state.events = state.events.filter(e=>e.classId!==classId);
  if(state.grades[classId]){ delete state.grades[classId]; scheduleSave('grades', state.grades); }
  if(state.expandedClassId===classId) state.expandedClassId=null;
  scheduleSave('classes', state.classes);
  scheduleSave('students', state.students);
  scheduleSave('sessions', state.sessions);
  scheduleSave('events', state.events);
  refreshView();
}
function archiveClass(classId){
  const c = classById(classId);
  if(!c) return;
  // Contact Parents must be resolved before archiving (per spec Q1)
  const pending = state.students.filter(s=>s.classId===classId && s.contactParents?.reason);
  if(pending.length){
    alert(`Cannot archive: ${pending.length} student(s) still have an unresolved Contact Parents flag (${pending.map(s=>s.name).join(', ')}). Mark those as done first.`);
    return;
  }
  if(!confirm(`Archive "${c.name}"? It will be removed from Roll Call, Calendar and the Dashboard, but all its data and reports are kept. You can unarchive anytime.`)) return;
  c.archived = true;
  c.archivedAt = todayStr();
  // Clear English Club flags for this class's students (per spec Q1)
  state.students.forEach(s=>{ if(s.classId===classId && s.englishClub) s.englishClub=false; });
  if(state.expandedClassId===classId) state.expandedClassId=null;
  scheduleSave('classes', state.classes);
  scheduleSave('students', state.students);
  refreshView();
}
function unarchiveClass(classId){

}

function transferStudent(studentId){
  const st = state.students.find(x=>x.id===studentId);
  if(!st) return;
  const newClassId = document.getElementById('tr-class').value;
  const fromDate = document.getElementById('tr-date').value || todayStr();
  if(newClassId===st.classId){ closeModal(); return; }
  const newCls = classById(newClassId);
  if(!confirm(`Transfer ${st.name} to "${newCls.name}" starting ${formatDateShort(fromDate)}?`)) return;

  // close current enrollment the day before the transfer, open the new one
  const en = enrollmentsOf(st).map(e=>({...e}));
  const open = en.find(e=>!e.to);
  const prevDay = new Date(fromDate+'T00:00:00');
  prevDay.setDate(prevDay.getDate()-1);
  const prevStr = dateToStr(prevDay.getFullYear(), prevDay.getMonth(), prevDay.getDate());
  if(open) open.to = prevStr;
  en.push({ classId: newClassId, from: fromDate, to: null });

  st.enrollments = en;
  st.classId = newClassId;
  scheduleSave('students', state.students);
  closeModal();
  refreshView();
}

  state.students = state.students.filter(s=>s.id!==studentId);
  scheduleSave('students', state.students);
  refreshView();
}

/* ================= GRADES (test scores per cycle) ================= */
let gmClassId = null, gmCycleIdx = 0;

function openGradesModal(classId, cycleIdx){
  const c = classById(classId);
  if(!c) return;
  const g = classGrades(classId);          // ensures at least one cycle exists
  gmClassId = classId;
  gmCycleIdx = (cycleIdx!=null && g.cycles[cycleIdx]) ? cycleIdx : g.cycles.length-1;
  scheduleSave('grades', state.grades);    // persist the auto-created record
  renderGradesModal();
}

function renderGradesModal(){
  const c = classById(gmClassId);
  const g = classGrades(gmClassId);
  const cycle = g.cycles[gmCycleIdx];
  const students = studentsInClass(gmClassId);
  const n = testCountFor(c);
  const adv = isAdvancedLevel(c.level);
  const target = adv ? TOEFL_TARGETS[c.level] : null;
  const isCurrent = gmCycleIdx === g.cycles.length-1;
  const margin = gradeMargin();
  const testDates = (cycle.testDates||[]).slice(0,n); while(testDates.length<n) testDates.push('');

  const ruleNote = !c.level
    ? `⚠ This class has no group tag yet, so it defaults to the 3-test / 240-point rule. <button type="button" class="linkish" onclick="closeModal();openClassModal('${c.id}')">Set the tag</button> for the right rules.`
    : adv
      ? `TOEFL — 2 tests per cycle. Target for ${esc(c.level)}: <b>${target}</b> per test. Any test under the target flags Contact Parents${margin?` · passing scores under <b>${target+margin}</b> are flagged as "close"`:''}.`
      : `3 tests per cycle · <b>240 points total</b> needed (average 80). An average under 80 flags Contact Parents${margin?` · averages under <b>${CYCLE_AVG_TARGET+margin}</b> are flagged as "close"`:''}.`;

  window._gmIds = students.map(s=>s.id);
  showModal(`
    <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;">
      <h3 style="margin:0;">📝 Grades — ${esc(c.name)}${c.level?` <span class="badge other">${esc(c.level)}</span>`:''}</h3>
      <span style="font-size:12px;color:var(--muted);white-space:nowrap;" title="Change in Settings (sidebar)">⚙ Alert margin: +${margin} · set in Settings</span>
    </div>
    <div style="font-size:13px;color:var(--muted);margin:8px 0 12px;">${ruleNote}</div>
    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:12px;">
      <label style="font-size:13px;font-weight:600;color:var(--muted);">Cycle:</label>
      <select onchange="gmSelectCycle(this.value)">
        ${g.cycles.map((cy,i)=>`<option value="${i}" ${i===gmCycleIdx?'selected':''}>${esc(cy.label)} (${formatDateShort(cy.startedAt)})${i===g.cycles.length-1?' · current':''}</option>`).join('')}
      </select>
      <button class="btn-ghost small" onclick="gmNewCycle()">+ Start new cycle</button>
      ${!isCurrent?`<span class="badge other">Viewing a past cycle — still editable</span>`:''}
    </div>
    <div class="card" style="padding:10px 14px;margin-bottom:12px;">
      <div style="font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px;">📅 Test days — scheduling a date adds a Test event to the Calendar; absences on that day flag Contact Parents on the Dashboard.</div>
      <div style="display:flex;gap:14px;flex-wrap:wrap;">
        ${testDates.map((d,i)=>`
          <label style="display:flex;align-items:center;gap:6px;font-size:13px;">
            <span style="font-weight:600;">${testLabelFor(c,i)}</span>
            <input type="date" value="${d||''}" onchange="gmSetTestDate(${i}, this.value)">
          </label>`).join('')}
      </div>
    </div>
    ${students.length ? `
    <div class="table-wrap" style="max-height:50vh;overflow:auto;">
      <table>
        <thead><tr><th>Student</th>${Array.from({length:n},(_,i)=>`<th style="text-align:center;">${testLabelFor(c,i)}${testDates[i]?`<div style="font-weight:400;font-size:11px;color:var(--muted);">${formatDateShort(testDates[i])}</div>`:''}</th>`).join('')}<th style="text-align:center;">Total</th><th style="text-align:center;">Avg</th><th>Status</th></tr></thead>
        <tbody>
          ${students.map((s,si)=>{
            const scores = studentScores(cycle, s.id, n);
            const st = gradeStatus(c, cycle, s.id);
            const statusHtml = !st ? '<span style="color:var(--muted);font-size:12px;">—</span>'
              : st.under ? `<span class="badge red">📞 ${adv?'Below '+target:'Avg under 80'}</span>`
              : st.close ? `<span class="badge amber">📞 ${adv?'Close to '+target:'Close to 80'}</span>`
              : (st.entered<st.of ? `<span class="badge other">On track (${st.entered}/${st.of})</span>` : `<span class="badge" style="background:var(--green-soft,#e5f7ec);color:var(--green);">✓ ${adv?'Target met':'Approved'}</span>`);
            return `<tr>
              <td style="font-weight:600;">${esc(s.name)}</td>
              ${scores.map((v,ti)=>`<td style="text-align:center;"><input type="number" min="0" max="${adv?677:100}" value="${v==null?'':v}" style="width:70px;text-align:center;" onchange="gmSetScore(window._gmIds[${si}], ${ti}, this.value)"></td>`).join('')}
              <td style="text-align:center;">${st?st.total:'—'}</td>
              <td style="text-align:center;">${st?st.avg:'—'}</td>
              <td>${statusHtml}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>` : `<div class="empty">No students in this class yet.</div>`}
    <div class="modal-actions">
      <button class="btn-accent" onclick="closeModal()">Done</button>
    </div>
  `, true);
}

function gmSetTestDate(testIdx, value){
  const c = classById(gmClassId);
  const g = classGrades(gmClassId);
  const cycle = g.cycles[gmCycleIdx];
  const n = testCountFor(c);
  if(!cycle.testDates) cycle.testDates = [];
  while(cycle.testDates.length<n) cycle.testDates.push(null);
  if(!cycle.testEventIds) cycle.testEventIds = [];
  while(cycle.testEventIds.length<n) cycle.testEventIds.push(null);

  cycle.testDates[testIdx] = value || null;

  // Sync the linked calendar event (type 'test', marked fromGrades)
  const evId = cycle.testEventIds[testIdx];
  const title = `${testLabelFor(c,testIdx)} — ${cycle.label}`;
  if(value){
    const existing = evId ? state.events.find(e=>e.id===evId) : null;
    if(existing){ existing.date = value; existing.title = title; }
    else{
      const id = uid();
      state.events.push({id, date:value, title, type:'test', classId:gmClassId, fromGrades:true});
      cycle.testEventIds[testIdx] = id;
    }
  }else if(evId){
    state.events = state.events.filter(e=>e.id!==evId);
    cycle.testEventIds[testIdx] = null;
  }
  scheduleSave('events', state.events);
  scheduleSave('grades', state.grades);
  renderGradesModal();
}

function gmSetScore(studentId, testIdx, value){
  const c = classById(gmClassId);
  const g = classGrades(gmClassId);
  const cycle = g.cycles[gmCycleIdx];
  if(!cycle.scores) cycle.scores = {};
  const n = testCountFor(c);
  const arr = studentScores(cycle, studentId, n);
  const num = value==='' ? null : Number(value);
  arr[testIdx] = (num==null || isNaN(num)) ? null : num;
  cycle.scores[studentId] = arr;
  scheduleSave('grades', state.grades);
  renderGradesModal();
}

function gmSelectCycle(idx){ gmCycleIdx = Number(idx); renderGradesModal(); }

function gmNewCycle(){
  const g = classGrades(gmClassId);
  const label = prompt('Name for the new cycle:', 'Cycle '+(g.cycles.length+1));
  if(label===null) return;
  g.cycles.push({ id: uid(), label: label.trim() || ('Cycle '+(g.cycles.length+1)), startedAt: todayStr(), scores: {} });
  gmCycleIdx = g.cycles.length-1;
  scheduleSave('grades', state.grades);
  renderGradesModal();
}

    return;
  }
  const students = studentsInClass(cls.id);
  const sessionKey = cls.id + '_' + date;
  const offSchedule = !getClassDays(cls).includes(dow);

    ${offSchedule&&!holiday?`<div class="warn-banner">${esc(cls.name)} isn't normally scheduled on ${DAY_NAMES[dow]}s (${scheduleLabel(cls)}).</div>`:''}
    ${!holiday && students.length ? `
      ${(()=>{
        const isFuture = date > todayStr();
        const isToday = date === todayStr();
        const explicitlyCompleted = !!(state.sessionMeta && state.sessionMeta[cls.id+'_'+date]?.completed);
        if(isFuture) return `<div class="warn-banner">📅 This class is in the future — it won't be counted in reports until it takes place.</div>`;
        if(explicitlyCompleted) return `<div class="warn-banner" style="background:var(--green-soft);color:var(--green);">🔒 Completed session — read-only, counts toward reports. <button class="btn-ghost small" style="margin-left:8px;" onclick="toggleSessionCompleted('${cls.id}','${date}')">Reopen to edit</button></div>`;
        if(isToday) return `<div class="warn-banner">⏳ Today's class isn't counted in reports yet. Mark it completed when the class is over. <button class="btn-accent" style="margin-left:8px;" onclick="toggleSessionCompleted('${cls.id}','${date}')">✓ Complete session</button></div>`;
        return `<div class="warn-banner" style="background:var(--green-soft);color:var(--green);">✓ Past session — counts toward reports. <button class="btn-ghost small" style="margin-left:8px;" onclick="toggleSessionCompleted('${cls.id}','${date}')">🔒 Lock (complete)</button></div>`;

      ${(()=>{

        <div class="field" style="margin-bottom:10px;">

          <textarea rows="2" ${locked?'disabled':''} placeholder="e.g. Workbook p.44\u201345, write 150-word essay" style="${taStyle}" oninput="setHomework('${cls.id}','${date}', this.value)">${esc(getHomework(cls.id, date))}</textarea>
        </div>
        <div class="field" style="margin-bottom:10px;">

        <div style="border-top:1px dashed var(--border);padding-top:12px;">

function getPromise(classId, date){

function isSessionCompleted(classId, date){
  // Past sessions auto-count; today needs explicit completion; future never counts
  if(date < todayStr()) return true;
  if(date > todayStr()) return false;
  return !!(state.sessionMeta && state.sessionMeta[classId+'_'+date]?.completed);
}
function toggleSessionCompleted(classId, date){
  if(!state.sessionMeta) state.sessionMeta = {};
  const key = classId+'_'+date;
  if(!state.sessionMeta[key]) state.sessionMeta[key] = {};
  state.sessionMeta[key].completed = !state.sessionMeta[key].completed;
  scheduleSave('sessionMeta', state.sessionMeta);
  refreshView();
}
function renderRosterRow(s, rec, missedHw=false, locked=false){

    <div class="roster-row ${open?'open':''}" onclick="toggleDrawer('${s.id}')">

        ${showFlag ? `<span class="badge amber" style="margin-left:8px;font-size:11px;">⚠ Missed HW</span>` : ''}

        ${missedHw && hwOutcome==='no_hw' ? `<span class="badge red" style="margin-left:8px;font-size:11px;">✗ No HW</span>` : ''}
      </div>
      <div class="seg" onclick="event.stopPropagation()">
        <button class="present ${rec?.attendance!=='absent'?'on':''}" aria-pressed="${rec?.attendance!=='absent'}" ${locked?'disabled':''} onclick="setAttendance('${s.id}','present')">Present</button>
        <button class="absent ${rec?.attendance==='absent'?'on':''}" aria-pressed="${rec?.attendance==='absent'}" ${locked?'disabled':''} onclick="setAttendance('${s.id}','absent')">Absent</button>
      </div>
      <button type="button" class="detail-btn" aria-expanded="${open}" onclick="event.stopPropagation();toggleDrawer('${s.id}')">Details <span aria-hidden="true">${open?'▾':'▸'}</span></button>

    <div class="field"><label>Late (minutes)</label>
      <div class="quick-num">
        <input type="number" min="0" class="num-input" value="${rec.lateMin||0}" onchange="setNumField('${s.id}','lateMin',this.value)">

        <button class="qbtn" onclick="bumpField('${s.id}','leftEarlyMin',10)">+10</button>
        <button class="qbtn" onclick="bumpField('${s.id}','leftEarlyMin',15)">+15</button>
        <button class="qbtn zero" onclick="setNumField('${s.id}','leftEarlyMin',0)">0</button>

      <div class="quick-num">
        <input type="number" min="0" class="num-input" value="${rec.phone||0}" onchange="setNumField('${s.id}','phone',this.value)">
        <button class="qbtn" onclick="bumpField('${s.id}','phone',1)">+1</button>

function getCurrentRecord(studentId){
  const key = state.rollcall.classId + '_' + state.rollcall.date;
  if(!state.sessions[key]) state.sessions[key] = {};
  if(!state.sessions[key][studentId]) state.sessions[key][studentId] = defaultRecord();
  return state.sessions[key][studentId];
}
function persistSessions(){ scheduleSave('sessions', state.sessions); }
function setAttendance(studentId, val){
  getCurrentRecord(studentId).attendance = val;
  persistSessions();
  refreshView();
}
function adjustField(studentId, field, delta){
  const rec = getCurrentRecord(studentId);
  if(field==='hw'){
    rec[field] = Math.min(100, Math.max(0, (rec[field]??100) + delta));
  } else {
    rec[field] = Math.max(0, rec[field] + delta);
  }
  persistSessions();
  refreshView();
}
function setNumField(studentId, field, value, min=0, max=Infinity){
  const rec = getCurrentRecord(studentId);
  let n = parseInt(value);
  if(isNaN(n)) n = min;
  rec[field] = Math.min(max, Math.max(min, n));
  persistSessions();
  refreshView();
}
function bumpField(studentId, field, delta){
  const rec = getCurrentRecord(studentId);
  rec[field] = Math.max(0, (rec[field]||0) + delta);
  persistSessions();
  refreshView();
}
function setField(studentId, field, val){
  const rec = getCurrentRecord(studentId);
  rec[field] = rec[field]===val ? null : val;
  persistSessions();
  refreshView();
}
function setLateHwOutcome(studentId, val){
  const rec = getCurrentRecord(studentId);
  rec.lateHwOutcome = val;
  persistSessions();
  refreshView();
}
function setNote(studentId, val){
  getCurrentRecord(studentId).notes = val;
  persistSessions();
}
function toggleDrawer(studentId){
  state.openDrawer = state.openDrawer===studentId ? null : studentId;
  refreshView();
}
function markAllPresent(){
  studentsInClass(state.rollcall.classId).forEach(s=>{ getCurrentRecord(s.id).attendance='present'; });
  persistSessions();
  refreshView();
}
function setRollcallClass(classId){
  state.rollcall.classId = classId;
  state.openDrawer = null;
  refreshView();
}
function setRollcallDate(date){
  state.rollcall.date = date;
  state.openDrawer = null;
  const dow = new Date(date+'T00:00:00').getDay();
  const cls = classById(state.rollcall.classId);
  if(!cls || !getClassDays(cls).includes(dow)){
    const sched = activeClasses().filter(c=>getClassDays(c).includes(dow));
    state.rollcall.classId = sched[0] ? sched[0].id : null;
  }
  refreshView();
}
function openRollCallNav(){
  const dow = new Date(state.rollcall.date+'T00:00:00').getDay();
  const cls = classById(state.rollcall.classId);
  if(!cls || cls.archived || !getClassDays(cls).includes(dow)){
    const sched = activeClasses().filter(c=>getClassDays(c).includes(dow));
    state.rollcall.classId = sched[0] ? sched[0].id : null;
  }
  navigate('rollcall');
}

const RC_COMMENTS = {"vocab":{"1":["O vocabulário ainda é muito limitado, dificultando até situações básicas de comunicação. Uma boa estratégia é reservar 10 minutos por dia para revisar palavras novas usando aplicativos como Anki ou Quizlet.","A escassez de palavras está impedindo o progresso de forma significativa. Manter um caderno de vocabulário e anotar pelo menos cinco palavras novas por aula pode fazer uma grande diferença.","A dificuldade em encontrar as palavras certas compromete muito a comunicação em inglês. Criar listas temáticas de vocabulário e reviá-las semanalmente pode ajudar bastante.","O repertório de palavras ainda está muito restrito para o nível esperado nesta etapa. Ler textos simples em inglês toda semana é um ótimo começo para absorver palavras de forma natural.","Sem uma base vocabular mais sólida, fica difícil avançar para conteúdos mais complexos. O uso diário de flashcards é uma das formas mais eficazes de superar essa lacuna.","A falta de variedade de palavras limita muito a expressão em inglês. Assistir a vídeos curtos em inglês com legendas pode ajudar a expandir o repertório de forma envolvente.","O vocabulário atual torna a comunicação muito difícil e exige atenção imediata. Criar o hábito de anotar e revisar todas as palavras novas que aparecem nas aulas é fundamental nesse momento.","O repertório precisa ser ampliado com urgência para que o aprendizado avançe. Repetir palavras novas em voz alta e usá-las em frases próprias é uma excelente forma de fixação."],"2":["O vocabulário cobre situações básicas, mas precisa ser ampliado para comunicação mais fluente. Ler notícias ou histórias curtas em inglês toda semana pode expandir o repertório de forma natural.","A comunicação em inglês é possível, mas erros de vocabulário ainda afetam a precisão. Rever as palavras aprendidas em aula e criar exemplos próprios com elas ajuda muito na fixação.","A falta de variedade no vocabulário ainda limita a expressão. Tentar usar palavras novas em fr truturas corretas."],"3":["A gramática é adequada para a maioria das situações, mas erros ainda ocorrem em construções complexas. Prestar atenção especial a phrasal verbs e tempos compostos pode dar um salto significativo no nível.","Frases são construídas corretamente na maior parte do tempo, mas deslizes ocorrem ocasionalmente. Rever as estruturas que mais causam erros — como question tags e condicionais — pode ajudar a eliminá-los.","O desempenho é consistente, mas há espaço para aprimorar a precisão e a naturalidade das construções. Praticar a reformulação de textos — reescrever parágrafos com estruturas variadas — é um exercício muito útil.","As regras são entendidas, mas há hesitação na aplicação — mais prática oral vai ajudar bastante. Participar das atividades de fala em aula com mais frequência é uma ótima forma de criar automatismo.","A gramática permite comunicação eficiente, mas a fluência pode ser aprimorada com mais prática. Escrever pequenos textos em inglês e pedir feedback ao professor é uma forma concreta de identificar pontos a melhorar.","Com um pouco mais de atenção aos detalhes gramaticais, o nível pode dar um salto significativo. Manter um caderno de erros — anotando a forma correta ao lado de cada erro — é uma estratégia muito eficaz.","O desempenho é sólido, mas ainda há dependência de verificação para construções mais elaboradas. Tentar construir frases complexas sem apoio em aula é uma forma de testar e fortalecer a gramática.","A gramática está bem estabelecida para o nível atual, mas o próximo passo exige mais precisão. Ler textos um pouco acima do nível atual, prestando atenção nas estruturas usadas, pode acelerar muito o progresso."],"4":["A gramática é sólida e as frases são construídas de forma clara e correta na grande maioria das situações. Para alcançar a excelência, vale trabalhar a naturalidade em construções mais complexas, como voz passiva e discurso indireto.","Há ótimo domínio da estrutura da língua, com expressão clara e se uito bem!","Há controle pleno das estruturas do idioma em todos os contextos — parabéns pelo esforço e pela dedicação!","A gramática exemplar é uma das maiores forças no desempenho e serve de referência para toda a turma."]},"behavior":{"1":["A postura em sala de aula precisa de atenção urgente, pois está prejudicando o aprendizado de todos. Estabelecer uma meta pessoal de manter o foco por pelo menos 10 minutos seguidos pode ser um bom começo.","O excesso de conversas paralelas e agitação compromete o ambiente de aprendizado. Combinar com o professor um sinal discreto para retomar o foco pode ajudar a criar consciência sobre os momentos de distracão.","A postura atual tem impactado negativamente a dinâmica da turma e precisa mudar. Sentar mais próximo do professor durante as aulas pode ajudar a manter o foco e reduzir as distrações.","Há dificuldade em seguir as regras da aula, o que prejudica a própria evolução. Conversar com o professor fora da aula sobre estratégias de foco pode abrir um caminho muito mais produtivo.","Conversas fora de hora e falta de atenção são hábitos que precisam ser corrigidos com urgência. Deixar o celular guardado durante a aula inteira é uma mudança simples que faz uma diferença enorme.","O comportamento atual dificulta o aproveitamento do conteúdo e afeta os colegas ao redor. Tentar uma postura mais ativa — respondendo às perguntas do professor — pode transformar o engajamento na aula.","A falta de respeito às regras da aula é um ponto que precisa ser trabalhado com seriedade. Refletir sobre o impacto do próprio comportamento nos colegas pode ser um exercício muito valioso.","A postura em sala está abaixo do esperado e exige uma mudança de atitude. Criar uma rotina de chegada — guardar o celular, abrir o caderno — pode ajudar a entrar no modo de estudo."],"2":["A participação em sala pode ser mais focada e consistente para aproveitar melhor as aulas. Tentar responder pelo menos uma pergunta por aula é uma boa forma de aumentar o engajamento gradualmente.","O conteúdo é acompanhado, mas as conversas com os colegas acabam dispersando a turma. Sentar próximo a quem mantém o foco pode ajudar a reduzir as distrações durante as explicações.","Há potencial claro, mas a distracão frequente impede que todo o conteúdo seja aproveitado. Anotar os pontos principais durante a aula é uma estratégia simples que ajuda a manter a atenção.","O comportamento é aceitável, mas ainda há muito espaço para evoluir em termos de postura. Estabelecer um desafio pessoal — como ficar uma aula inteira sem usar o celular — pode ser transformador.","Pequenas mudanças de comportamento fariam uma grande diferença no aprendizado. Chegar à aula com uma pergunta preparada pode aumentar o engajamento de forma natural.","Momentos importantes da aula são perdidos às vezes por falta de atenção. Desenvolver o hábito de fazer anotações durante as explicações é uma ótima forma de manter o foco.","Com mais foco e disciplina, o desempenho poderia melhorar consideravelmente. Tentar manter contato visual com o professor durante as explicações pode ajudar muito a manter a concentração.","O comportamento está melhorando, mas ainda há momentos de dispersão que valem ser trabalhados. Pedir ao professor para ser chamado durante as atividades pode aumentar o senso de responsabilidade."],"3":["A participação é geralmente boa, mas há momentos de distracão durante as atividades. Participar mais ativamente das dinâmicas em grupo pode ajudar a manter o engajamento elevado durante toda a aula.","A atenção é mantida na maior parte do tempo, mas há espaço para um envolvimento ainda mais ativo. Tentar iniciar respostas sem esperar a vez pode ser uma forma de aumentar a participação de forma natural.","A postura é adequada, mas há espaço para uma atitude ainda mais ativa e participativa. Fazer perguntas durante as aulas — mesmo que simples — demonstra engajamento e acelera o aprendizado.","O foco é mantido, mas a concentração pode aumentar nos momentos-chave ortuguês limita a prática tanto própria quanto dos colegas. Tentar formular qualquer dúvida primeiro em inglês, mesmo que de forma imperfeita, já é um grande avanço.","Quanto menos o português for usado em aula, mais rápida será a evolução no idioma. Criar um pequeno glossário de frases úteis para usar na aula pode reduzir bastante a dependência do português.","O uso frequente do português é um hábito que precisa mudar para que o aprendizado avançe. Uma dica prática é tentar pensar em inglês antes de falar — mesmo que por um segundo — para criar o hábito.","A imersão em inglês é uma das ferramentas mais poderosas do curso, e ela começa em sala de aula. Escolher uma frase em inglês por aula para usar com os colegas pode ajudar a criar o hábito gradualmente.","Mesmo para perguntas simples, tentar usar o inglês faz uma diferença enorme no aprendizado. Pedir ao professor para ensinar as frases mais úteis em inglês e praticá-las toda aula é uma ótima estratégia."],"2":["O inglês é usado para comunicação básica, mas o português ainda aparece com frequência. Tentar expressar ideias em inglês — mesmo que imperfeitas — é muito mais produtivo do que recorrer ao português.","Há potencial para se comunicar em inglês, mas o uso do português ainda é um obstáculo. Combinar com um colega de sala para se ajudarem a manter o inglês durante as atividades pode ser muito eficaz.","O progresso pode ser acelerado com a redução do uso do português durante as aulas. Tentar usar sempre o inglês quando há outra pessoa por perto para ouvir — a confiança aumenta com a prática.","O uso frequente do português é um hábito que pode ser mudado com determinação. Cada vez que o português 'escapar', tentar repetir a mesma ideia em inglês logo em seguida é uma ótima forma de corrigir.","Cada momento em que o inglês é escolhido em vez do português é uma conquista importante. Desafiar-se a passar uma aula inteira sem usar o português pode ser muito motivador.","Com mais comprometimento com o inglês em sala, a fluência vai evoluir muito mais rápido. Ouvir músicas ou assistir a vídeos curtos em inglês em casa pode criar mais conforto com o idioma.","O uso do português ainda é uma limitação no desenvolvimento da fluência. Preparar com antecedência frases que costumam vir em português — como pedir para repetir — pode ajudar bastante.","O inglês ainda não é a primeira escolha na maioria das situações, mas isso pode mudar com prática. Tentar usar expressões do cotidiano em inglês fora da sala de aula é uma prática muito eficiente."],"3":["O inglês é usado na maior parte do tempo, mas há momentos de recaída para o português. Tentar formular qualquer dúvida em inglês antes de recorrer ao português — mesmo que com erros — é um ótimo desafio.","A tentativa de manter o inglês é notável, mas a disciplina pode ser aprimorada. Em situações de dúvida, tentar adivinhar a palavra em inglês antes de pedir ajuda em português é uma estratégia excelente.","O comportamento está evoluindo bem, mas o português ainda aparece ocasionalmente. Praticar as frases mais usadas em sala — como 'How do you say...?' ou 'Can you repeat that?' — elimina muito da necessidade de recorrer ao português.","Há boa disposição para usar o inglês, mas ainda há momentos de recaída. Cada aula que termina com menos uso do português do que a anterior já é uma vitória — manter esse progresso é o foco.","Mesmo em momentos de dúvida, tentar formular a pergunta em inglês é uma meta alcançável. Anotar as perguntas que costumam vir em português e tentar traduzí-las com antecedência é uma boa preparação.","Com uma pequena mudança de hábito, manter a imersão completa em inglês é totalmente possível. Pedir ao professor que corrija gentilmente cada vez que o português escapar pode ajudar a criar mais consciência.","Está progredindo bem nesse aspecto — um pouco mais de esforço constante pode fazer uma grande diferença. Tentar usar o inglês em pequenas interações do dia a dia — mesmo fora da escola — é um passo importante.","O esforço para manter o inglês é visível e merece reconhecimento. Para dar o próximo passo, o desafio é manter esse esforço também nos momentos mais difíceis ou quando o assunto é mais complexo."],"4":["O inglês é usado com frequência e segurança, contribuindo para um ótimo ambiente de imersão. Para atingir o nível de excelência, vale tentar manter o inglês também nos momentos de maior dificuldade ou frustração.","O esforço para evitar o português em sala é muito notável e impacta diretamente no aprendizado. O próximo passo seria usar o inglês de forma ainda mais espontânea, sem esperar pela atividade estruturada.","Já há muito conforto para se expressar em inglês — isso é um avanço enorme no curso. Para chegar ao nível mais alto, criar o hábito de pensar em inglês — e não apenas falar — pode transformar a fluência.","O comprometimento em falar inglês reflete a seriedade com que o curso é levado. Para ir além, tentar usar o inglês em conversas mais informais com colegas — antes e depois da aula — é um excelente exercício.","O português raramente aparece, o que demonstra muita maturidade e disciplina. Para atingir a imersão total, vale tentar usar o inglês mesmo em situações pequenas, como agradecer ou cumprimentar.","A imersão em sala é consistente e serve de exemplo positivo para os colegas. Para crescer ainda mais, buscar vocabulário em inglês para situações cotidianas — ao invés de traduzir mentalmente do português — pode acelerar muito o progresso.","A compreensão de que falar em inglês o tempo todo é a chave para a fluência já está bem estabelecida. O desafio agora é tornar isso um reflexo automático, sem necessidade de esforço consciente.","O desempenho é muito bom nesse aspecto e está próximo da excelência. Tentar se comunicar exclusivamente em inglês com o professor — inclusive fora das atividades formais — pode ser o passo final."],"5":["O inglês é usado exclusivamente em sala de aula — isso otimiza o aprendizado de forma impressionante.","A disciplina em manter o inglês o tempo todo é um exemplo notável de comprometimento com o aprendizado.","Alto nível de maturidade é demonstrado ao manter a imersão completa durante toda a aula — parabéns!","O uso consistente do inglês contribui imensamente para o desenvolvimento da fluência — continue assim!","A compreensão de que a imersão é a chave do sucesso é aplicada com excelência em cada aula.","Mesmo em situações difíceis, o inglês é mantido — isso faz toda a diferença na evolução do idioma.","A dedicação à imersão em sala é exemplar e inspira os colegas a fazerem o mesmo — muito bem!","É um modelo de como deve ser a postura de alguém comprometido com a fluência real no idioma."]},"homework":{"1":["A entrega das tarefas é muito inconsistente, o que prejudica a fixação do conteúdo. Estabelecer um horário fixo por semana dedicado às tarefas pode ajudar a criar consistência e responsabilidade.","É fundamental começar a realizar todas as tarefas de casa para consolidar o que é aprendido em aula. Separar um horário curto — mesmo que 20 minutos — logo após a aula, enquanto o conteúdo ainda está fresco, pode funcionar muito bem.","A qualidade das tarefas entregues está abaixo do esperado e exige muito mais dedicação. Fazer a tarefa em partes menores — ao invés de deixar para a última hora — pode transformar a qualidade das entregas.","A falta de comprometimento com as tarefas tem impactado negativamente o aprendizado. Pedir ao professor que marque os exercícios mais importantes pode ajudar a priorizar melhor o tempo de estudo em casa.","Sem a prática em casa, o conteúdo visto em aula não se consolida da forma necessária. Começar sempre pela atividade mais fácil das tarefas pode reduzir a resistência inicial e tornar o hábito mais sustentável.","As tarefas são uma extensão essencial do aprendizado da sala de aula — e estão sendo negligenciadas. Combinar com um colega para fazer as tarefas juntos online pode aumentar muito a motivação e a consistência.","A oportunidade de praticar e fixar o conteúdo em casa está sendo perdida com frequência. Usar lembretes no celular para as tarefas pode ajudar a criar o hábito de não deixa-las para depois.","Uma mudança de postura em relação às atividades de casa é necessária para progredir. Conversar com o professor sobre a carga das tarefas — caso seja muito alta — pode ajudar a encontrar um equilíbrio mais viável."],"2":["As tarefas são entregues, mas a qualidade precisa de muito mais cuidado e atenção. Reler a tarefa antes de entregar — pelo menos uma vez — pode reduzir bastante os erros e melhorar a qualidade.","O progresso pode ser acelerado com maior comprometimento nas atividades de casa. Fazer as tarefas em mais de uma sessão curta, revisando o que foi feito em cada uma, pode melhorar bastante a qualidade.","As atividades precisam ser completadas com mais atenção, cuidado e dedicação. Usar o caderno de aula como referência enquanto faz as tarefas pode ajudar a evitar os erros mais comuns.","A dedicação às tarefas está aquém do potencial e pode ser muito aprimorada. Escolher um lugar tranquilo e sem distrações para fazer as tarefas pode fazer uma grande diferença no resultado.","As tarefas entregues mostram que foram feitas com pressa — vale dedicar mais tempo a elas. Começar as tarefas com pelo menos um dia de antecedência permite uma revisão mais calma e cuidadosa.","A consistência nas entregas precisa de melhorias para sustentar o progresso no curso. Pedir ao professor dicas de estudo para cada tipo de atividade pode tornar o tempo de tarefa mais eficiente.","Com mais capricho e atenção nos detalhes, as tarefas vão refletir muito melhor o potencial real. Verificar as respostas usando os recursos de aula — como notas e materiais — antes de entregar é uma boa prática.","Uma entrega incompleta ou descuidada não ajuda na fixação do conteúdo — o esforço extra vale muito. Tentar explicar em voz alta o que foi feito na tarefa é uma forma poderosa de checar a compreensão."],"3":["As tarefas são entregues na maior parte do tempo, mas a qualidade pode variar bastante. Fazer uma releitura rápida antes de entregar — buscando erros de escrita e gramática — pode melhorar bastante a consistência.","A dedicação às atividades de casa é consistente, mas ainda pode ser aprimorada. Anotar as dúvidas que surgem ao fazer as tarefas e trazê-las para a aula seguinte transforma o dever de casa em aprendizado ativo.","O caminho está certo com as tarefas, mas a revisão do trabalho é fundamental para evitar erros desnecessários. Fazer as tarefas um dia antes do prazo garante tempo para reler com calma e corrigir pequenos deslizes.","A atenção aos detalhes nas tarefas de casa pode ser aprimorada. Verificar especificamente os pontos gramaticais trabalhados em cada aula durante a realização das tarefas pode ajudar muito na precisão.","As tarefas são entregues com regularidade, mas às vezes parecem não ter sido revisadas antes da entrega. Criar o hábito de reler o que foi escrito em voz alta ajuda a perceber erros que passam despercebidos na leitura silenciosa.","O desempenho é bom, mas pode se beneficiar de maior esforço e cuidado em cada atividade. Fazer as tarefas com o caderno de aula ao lado, conferindo as explicações, pode torná-las muito mais precisas.","A regularidade nas entregas é muito positiva — agora o foco pode ser melhorar a qualidade. Tentar fazer a tarefa sem consultar a tradução diretamente — usando o raciocínio em inglês primeiro — é um ótimo exercício.","O hábito de entregar as tarefas está bem estabelecido. Para crescer ainda mais, tentar ir além do mínimo pedido — fazendo exemplos extras ou escrevendo um pouco mais — pode acelerar bastante o aprendizado."],"4":["As tarefas são entregues com consistência e qualidade — um reflexo muito claro do comprometimento com o curso. Para alcançar a excelência, tentar ir além do que é pedido — com exemplos extras ou frases adicionais — pode fazer uma grande diferença.","A qualidade do trabalho é muito boa e demonstra real dedicação. Para chegar ao nível mais alto, vale revisar as tarefas com um olhar crítico — buscando pequenos erros que podem escapar na primeira leitura.","Há comprometimento sólido com as atividades de casa e isso tem impacto positivo claro na performance. Para crescer ainda mais, usar as tarefas como oportunidade de experimentar estruturas e vocabulário novos pode enriquecer muito as entregas.","As tarefas são sempre em dia, o que demonstra ótima organização e disciplina. Para ir além, antecipar a tarefa — começando antes do prazo — permite uma revisão mais cuidadosa e um resultado ainda melhor.","A qualidade e a regularidade das entregas estão claramente acima da média. Para atingir o nível de excelência, vale prestar atenção aos pequenos detalhes que ainda geram imprecisão — como pontuação e concórdia.","As tarefas são levadas a sério, e isso faz toda a diferença nos resultados alcançados. Para crescer ainda mais, buscar feedback específico do professor sobre as tarefas — perguntando o que poderia ter sido feito melhor — é uma prática muito valiosa.","A dedicação fora da sala de aula é um dos fatores que mais contribuem para o progresso. Para alcançar o mais alto nível, enriquecer as respostas com mais contexto e detalhes — em vez de apenas responder o mínimo — pode transformar a qualidade.","O comprometimento com as tarefas é muito sólido e próximo da excelência. Para dar o passo final, tentar reler cada tarefa do ponto de vista de quem vai lê-la ajuda a refinar a comunicação de forma significativa."],"5":["Todas as tarefas são entregues dentro do prazo e com qualidade excepcional — parabéns pelo comprometimento!","A dedicação às atividades de casa é um exemplo para toda a turma — o esforço é muito digno de reconhecimento.","A organização e o comprometimento com as tarefas são simplesmente impecáveis — continue assim!","Cada trabalho entregue reflete seriedade, cuidado e dedicação genuína — isso faz toda a diferença no aprendizado.","A performance com as tarefas está em um nível exemplar — o esforço é digno de muito reconhecimento e admiração.","Nunca há falhas nas entregas, e os trabalhos apresentam sempre altíssima qualidade — excelente!","A disciplina fora da sala de aula é um dos maiores diferenciais no aprendizado — um exemplo inspirador.","Cada tarefa entregue reflete cuidado, atenção e dedicação genuína — continue nesse ritmo excelente!"]}};
const RC_LEVEL_LABELS_PT = {1:'Precisa melhorar muito',2:'Precisa melhorar',3:'Regular',4:'Muito Bom',5:'Excelente'};
const RC_LEVEL_LABELS_EN = {1:'Needs much improvement',2:'Needs improvement',3:'Satisfactory',4:'Very good',5:'Excellent'};
const RC_CAT_LABELS = {
  behavior:{pt:'Comportamento',en:'Behaviour'},
  homework:{pt:'Lição de casa',en:'Homework'},
  vocab:{pt:'Vocabulário',en:'Vocabulary'},
  grammar:{pt:'Gramática',en:'Grammar'},
  port:{pt:'Uso do português',en:'Portuguese use'}
};

function fmtPct(v){ return v==null ? '—' : v+'%'; }

// Measured percentage -> 1..5 level. Null percentage -> null (no data, no grade).
function partToLevel(p){ if(p==null) return null; if(p>=90) return 5; if(p>=72) return 4; if(p>=48) return 3; if(p>=28) return 2; return 1; }
function hwToLevel(p){ if(p==null) return null; if(p>=90) return 5; if(p>=75) return 4; if(p>=55) return 3; if(p>=35) return 2; return 1; }

// Deterministic phrase pick from a pool given the regenerate nonce.
function rcPhrase(cat, level, nonce){
  const pool = RC_COMMENTS[cat] && RC_COMMENTS[cat][level];
  if(!pool || !pool.length) return '';
  return pool[nonce % pool.length];
}

function initRcState(s){
  rcState = {
    levels: {
      behavior: partToLevel(s.partScore),
      homework: hwToLevel(s.hwAvg),
      vocab: null, grammar: null, port: null
    },
    nonce: 0
  };
}

function buildReportText(s, lang){
  const isPt = lang==='pt';
  const L = isPt ? {
    title:'RELATÓRIO DO ALUNO', clazz:'Turma', period:'Período', allTime:'Todo o período',
    present2:'presente', attendance:'Frequência', lost:'aulas perdidas',
    punctuality:'Pontualidade', late:'atrasos', hw:'Lição de casa', part:'Participação',
    phone:'Uso do celular', na:'sem dados',
    missedHead:'AULAS PERDIDAS', missedTopic:'conteúdo', noTopic:'(sem registro de conteúdo)',
    contactHead:'CONTATO COM RESPONSÁVEIS', pending:'PENDENTE', reason:'Motivo', summary:'Resumo',
    commentHead:'COMENTÁRIOS'
  } : {
    title:'STUDENT REPORT', clazz:'Class', period:'Period', allTime:'All time',
    present2:'present', attendance:'Attendance', lost:'classes missed',
    punctuality:'Punctuality', late:'late arrivals', hw:'Homework', part:'Participation',
    phone:'Phone use', na:'no data',
    missedHead:'CLASSES MISSED', missedTopic:'topic', noTopic:'(no lesson topic recorded)',
    contactHead:'PARENT CONTACT', pending:'PENDING', reason:'Reason', summary:'Summary',
    commentHead:'COMMENTS'
  };
  const per = s.fromVal
    ? `${formatDateShort(s.fromVal)} – ${s.toVal?formatDateShort(s.toVal):L.present2}`
    : L.allTime;

  const out = [];
  out.push(`${L.title} — ${s.name}`);
  const head = [];
  if(s.className) head.push(`${L.clazz}: ${s.className}`);
  head.push(`${L.period}: ${per}`);
  out.push(head.join('  ·  '));
  out.push('');

  // --- metrics ---
  out.push(`${L.attendance}: ${s.attendanceRate!=null?s.attendanceRate+'%':L.na}${s.expected!=null?` (${s.classesLost}/${s.expected} ${L.lost})`:''}`);
  out.push(`${L.punctuality}: ${s.late} ${L.late}`);
  out.push(`${L.hw}: ${fmtPct(s.hwAvg)}`);
  out.push(`${L.part}: ${fmtPct(s.partScore)}`);
  if(s.totalPhone){
    const tl = isPt ? (s.totalPhone===1?'vez':'vezes') : (s.totalPhone===1?'time':'times');
    out.push(`${L.phone}: ${s.totalPhone} ${tl}`);
  }

  // --- grades (test scores) ---
  if(s.grades && s.grades.cycles && s.grades.cycles.length){
    out.push('');
    out.push(isPt ? 'NOTAS' : 'GRADES');
    if(s.grades.level) out.push(`${isPt?'Nível':'Level'}: ${s.grades.level}`);
    s.grades.cycles.forEach(cy=>{
      const st = cy.status;
      const scoresTxt = st.scores.map(v=>(v==null||v==='')?'—':v).join(' / ');
      if(st.advanced){
        out.push(`- ${cy.label}: TOEFL ${scoresTxt} (${isPt?'meta':'target'} ${st.target})${st.under ? (isPt?' — ABAIXO DA META':' — BELOW TARGET') : st.close ? (isPt?' — perto da meta':' — close to the target') : (st.entered===st.of ? (isPt?' — meta atingida':' — target met') : '')}`);
      }else{
        out.push(`- ${cy.label}: ${scoresTxt} — total ${st.total}/240 · ${isPt?'média':'average'} ${st.avg} (${isPt?'mínimo':'min'} 80)${st.under ? (isPt?' — ABAIXO DA MÉDIA':' — BELOW AVERAGE') : st.close ? (isPt?' — perto da média':' — close to the average') : (st.entered===st.of ? (isPt?' — aprovado':' — approved') : '')}`);
      }
    });
  }

  // --- classes missed detail ---
  if(s.missed && s.missed.length){
    out.push('');
    out.push(L.missedHead);
    s.missed.forEach(m=>{
      out.push(`- ${formatDateShort(m.date)}${m.topic?` — ${L.missedTopic}: ${m.topic}`:` ${L.noTopic}`}`);
    });
  }

  // --- comments (from the report-card bank) ---
  const catOrder = ['behavior','homework','vocab','grammar','port'];
  const chosen = catOrder.filter(c=>rcState && rcState.levels[c]);
  if(chosen.length){
    out.push('');
    out.push(L.commentHead);
    chosen.forEach(cat=>{
      const lvl = rcState.levels[cat];
      const phrase = rcPhrase(cat, lvl, rcState.nonce);
      if(phrase){
        const label = RC_CAT_LABELS[cat][isPt?'pt':'en'];
        out.push(`${label}: ${phrase}`);
      }
    });
  }

  // --- parent contact ---
  const hasContact = s.contactPending || (s.contactHistory && s.contactHistory.length);
  if(hasContact){
    out.push('');
    out.push(L.contactHead);
    if(s.contactPending){
      out.push(`- ${L.pending} — ${s.contactPending.category}: ${s.contactPending.reason}`);
    }
    (s.contactHistory||[]).forEach(h=>{
      out.push(`- ${formatDateShort(h.date)} — ${h.category}`);
      if(h.reason)  out.push(`    ${L.reason}: ${h.reason}`);
      if(h.summary) out.push(`    ${L.summary}: ${h.summary}`);
    });
  }

  return out.join('\n');
}

function rcLevelSelect(cat, lang){
  const isPt = lang==='pt';
  const labels = isPt ? RC_LEVEL_LABELS_PT : RC_LEVEL_LABELS_EN;
  const cur = rcState.levels[cat];
  const opts = [`<option value="">${isPt?'— não incluir':'— exclude'}</option>`]
    .concat([1,2,3,4,5].map(n=>`<option value="${n}" ${cur===n?'selected':''}>${n} · ${labels[n]}</option>`))
    .join('');
  return `<label style="display:flex;align-items:center;gap:8px;font-size:13px;">
      <span style="min-width:118px;color:var(--muted);">${RC_CAT_LABELS[cat][isPt?'pt':'en']}</span>
      <select onchange="rcSetLevel('${cat}', this.value)" style="flex:1;">${opts}</select>
    </label>`;
}

function rcSetLevel(cat, val){
  rcState.levels[cat] = val ? Number(val) : null;
  refreshReportTextArea();
}
function rcRegenerate(){
  rcState.nonce = (rcState.nonce + 1) % 8;
  refreshReportTextArea();
}
function refreshReportTextArea(){
  const area = document.getElementById('report-text-area');
  if(area) area.value = buildReportText(lastReportStats, state.reportLang);
}

function openReportTextModal(){
  if(!lastReportStats){ alert('Open a student report first.'); return; }
  if(!rcState) initRcState(lastReportStats);
  const lang = state.reportLang;
  const isPt = lang==='pt';
  const text = buildReportText(lastReportStats, lang);
  const autoNote = isPt
    ? 'Comportamento e lição de casa vêm dos dados. Vocabulário, gramática e português são opcionais — defina se quiser incluí-los.'
    : 'Behaviour and homework are set from the data; vocabulary, grammar and Portuguese use are optional. The comment text is in Portuguese (from the Report Card tool), for a Brazilian report card.';

  showModal(`
    <h2>${isPt?'Texto para o boletim':'Report card text'}</h2>
    <p class="meta" style="margin:6px 0 14px;">${isPt
      ? 'Edite como quiser e copie para o boletim. Alterar os níveis abaixo regenera o texto (perde edições manuais).'
      : 'Edit as needed and copy into the report card. Changing the levels below regenerates the text (manual edits are lost).'}</p>

    <div class="card section" style="padding:14px 16px;margin-bottom:14px;">
      <div style="font-size:12px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);margin-bottom:4px;">${isPt?'Comentários':'Comments'}</div>
      <p class="meta" style="margin:0 0 12px;font-size:12px;">${autoNote}</p>
      <div style="display:grid;gap:8px;">
        ${['behavior','homework','vocab','grammar','port'].map(c=>rcLevelSelect(c, lang)).join('')}
      </div>
      <button class="btn-ghost small" style="margin-top:12px;" onclick="rcRegenerate()">${isPt?'↻ Outra redação':'↻ Reword'}</button>
    </div>

    <textarea id="report-text-area" style="width:100%;min-height:260px;resize:vertical;font-family:var(--font-mono);font-size:13px;line-height:1.5;padding:12px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);">${esc(text)}</textarea>
    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:14px;">
      <button class="btn-ghost" onclick="closeModal()">${isPt?'Fechar':'Close'}</button>
      <button class="btn-accent" id="report-copy-btn" onclick="copyReportText()">${isPt?'Copiar':'Copy'}</button>
    </div>
  `);
}

function copyReportText(){
  const area = document.getElementById('report-text-area');
  const btn = document.getElementById('report-copy-btn');
  const isPt = state.reportLang==='pt';
  const done = ()=>{ if(btn){ btn.textContent = isPt?'Copiado ✓':'Copied ✓'; setTimeout(()=>{ if(btn) btn.textContent = isPt?'Copiar':'Copy'; }, 1600); } };
  const fallback = ()=>{ area.focus(); area.select(); try{ document.execCommand('copy'); done(); }catch(e){ alert(isPt?'Selecione o texto e copie manualmente.':'Select the text and copy manually.'); } };
  if(navigator.clipboard?.writeText){
    navigator.clipboard.writeText(area.value).then(done).catch(fallback);
  } else { fallback(); }
}

function renderStudentProfile(){
  const t = T[state.reportLang];
  const student = state.students.find(s=>s.id===state.studentProfileId);
  const returnView = state.studentProfileReturn || 'reports';
  const returnLabel = returnView==='classes' ? t.backToClasses : t.backToReports;
  if(!student){
    document.getElementById('view-student').innerHTML = `
      <div class="topbar"><div><button class="btn-ghost back-btn" onclick="navigate('${returnView}')">${returnLabel}</button></div></div>
      <div class="card empty-card">Student not found.</div>`;
    return;
  }
  const cls = classById(student.classId);
  const allRecords = [];
  Object.keys(state.sessions).forEach(key=>{
    const [classId, date] = splitSessionKey(key);
    // Collect records from EVERY class this student has records in (survives transfers)
    if(state.sessions[key][student.id]){
      allRecords.push({date, _classId: classId, ...state.sessions[key][student.id]});
    }
  });

  // A transfer can leave the student with a record under BOTH the old and new
  // class for the same date, producing duplicate rows (and double-counted stats).
  // Keep one record per date: prefer the class the student was enrolled in on that
  // date, then a completed session. Dates with a single record are never dropped.
  const byDate = new Map();
  for(const r of allRecords){
    const enrolledId = classForStudentOnDate(student, r.date)?.id;
    const score = (r._classId===enrolledId ? 2 : 0) + (isSessionCompleted(r._classId, r.date) ? 1 : 0);
    const prev = byDate.get(r.date);
    if(!prev || score > prev._score){ byDate.set(r.date, Object.assign(r, {_score:score})); }
  }
  const dedupedRecords = [...byDate.values()];
  dedupedRecords.sort((a,b)=>b.date.localeCompare(a.date));

  const fromVal = state.reportRange.from || cls?.startDate || '';
  const toVal = state.reportRange.to || cls?.endDate || '';
  const allPeriodRecords = dedupedRecords.filter(r => (!fromVal || r.date>=fromVal) && (!toVal || r.date<=toVal));

  // Separate holiday records from real records
  const holidayDates = allPeriodRecords.filter(r=>isHoliday(r.date)).map(r=>r.date);
  const records = allPeriodRecords.filter(r=>!isHoliday(r.date) && isSessionCompleted(r._classId, r.date));

  // Duration for a record = the duration in effect for *its own class* on *its own date*
  const recDur = r => durationForDate(classById(r._classId) || cls, r.date);

  const total = records.length;
  const absent = records.filter(r=>r.attendance==='absent').length;
  const late = records.filter(r=>r.attendance!=='absent' && (r.lateMin||0)>0).length;
  const present = total - absent - late;
  const totalPhone = records.reduce((sum,r)=>sum+(r.phone||0),0);
  const hwRecords = records.filter(r=>r.hw!=null && r.hw!=='done' && r.hw!=='not_done' ? true : r.hw!=null);
  const hwAvg = hwRecords.length ? Math.round(hwRecords.reduce((s,r)=>{
    const v = typeof r.hw==='number' ? r.hw : (r.hw==='done'?100:0);
    return s+v;
  },0)/hwRecords.length) : null;

  // Expected sessions: sum across every enrollment window overlapping the period
  const expected = (()=>{
    const wins = enrollmentsOf(student);
    let sum = 0, any = false;
    for(const w of wins){
      const c = classById(w.classId);
      if(!c) continue;
      const wFrom = [w.from, fromVal].filter(Boolean).sort().pop();      // max
      const candidates = [w.to, toVal, c.endDate].filter(Boolean);
      const wTo = candidates.length ? candidates.sort()[0] : null;       // min
      if(!wFrom || !wTo || wFrom > wTo) continue;
      const n = expectedSessionsForClass(c, wFrom, wTo);
      if(n!=null){ sum += n; any = true; }
    }
    return any ? sum : null;
  })();
  const classesLost = absent;
  const attendanceRate = expected ? Math.round(100*(expected-classesLost)/expected) : null;

  const attended = records.filter(r=>r.attendance!=='absent');
  const totalPossibleMin = records.reduce((s,r)=>s+recDur(r), 0);
  const lostLateMin = attended.reduce((s,r)=>s+(r.lateMin||0),0);
  const lostEarlyMin = attended.reduce((s,r)=>s+(r.leftEarlyMin||0),0);
  const absentMin = records.filter(r=>r.attendance==='absent').reduce((s,r)=>s+recDur(r), 0);
  const inClassMin = Math.max(0, totalPossibleMin - lostLateMin - lostEarlyMin - absentMin);
  const avgDuration = total ? Math.round(totalPossibleMin/total) : (cls?currentDuration(cls):150);
  const duration = avgDuration; // used for display only

  // Participation summary
  const partRecords = attended.filter(r=>r.participation);
  const partGreat = partRecords.filter(r=>r.participation==='great').length;
  const partGood = partRecords.filter(r=>r.participation==='good').length;
  const partLow = partRecords.filter(r=>r.participation==='low').length;
  const partScore = partRecords.length ? Math.round(100*(partGreat*1 + partGood*0.5)/partRecords.length) : null;

  // Time lost equivalent (late + left early + absences), in equivalent classes
  const totalLostMin = lostLateMin + lostEarlyMin + absentMin;
  const lostEquivClasses = avgDuration ? (totalLostMin/avgDuration).toFixed(1) : '0.0';

  // Grades (test scores per cycle) for this student's class
  let gradesInfo = null;
  if(cls){
    const g = state.grades[cls.id];
    if(g && g.cycles && g.cycles.length){
      const cyc = g.cycles
        .map((cy,i)=>({label:cy.label, startedAt:cy.startedAt, isCurrent:i===g.cycles.length-1, status:gradeStatus(cls, cy, student.id)}))
        .filter(x=>x.status);
      if(cyc.length) gradesInfo = { level: cls.level||null, advanced: isAdvancedLevel(cls.level), cycles: cyc };
    }
  }

  // Stash for the plain-text report builder, so it can never disagree with what's shown.
  lastReportStats = {
    name: student.name, className: cls?cls.name:null,
    grades: gradesInfo,
    fromVal, toVal,
    total, present, late, absent, totalPhone,
    hwAvg, partScore, expected, classesLost, attendanceRate,
    totalLostMin, lostEquivClasses, avgDuration,
    contactPending: student.contactParents?.reason ? student.contactParents : null,
    contactHistory: (student.contactParentsHistory||[]).slice().sort((a,b)=>b.date.localeCompare(a.date)),
    missed: records.filter(r=>r.attendance==='absent')
      .map(r=>({date:r.date, topic:getLessonNote(r._classId||student.classId, r.date)||null}))
      .sort((a,b)=>b.date.localeCompare(a.date)),
    lateDetail: attended.filter(r=>(r.lateMin||0)>0)
      .map(r=>({date:r.date, min:r.lateMin}))
      .sort((a,b)=>b.date.localeCompare(a.date))
  };
  rcState = null;  // recomputed per student when the text modal opens

  const classesLostHtml = expected!=null
    ? t.classesAbsent(classesLost, expected, fromVal?formatDateShort(fromVal):'?', toVal?formatDateShort(toVal):'?', attendanceRate)
    : t.classesAbsent(classesLost, null) + ` <button type="button" class="linkish no-print" onclick="navigate('classes');setTimeout(()=>openClassModal('${cls?.id}'),0)">${t.setDates}</button><span class="print-only">${t.setDates}</span>${t.setDatesRest}`;

  document.getElementById('view-student').innerHTML = `
    <div class="topbar">
      <div>
        <button class="btn-ghost back-btn no-print" onclick="navigate('${returnView}')">${returnLabel}</button>
        <h1>${esc(student.name)}${student.englishClub?` <span class="badge amber" style="font-size:13px;vertical-align:middle;">${t.englishClubBadge}</span>`:''}${student.contactParents?.reason?` <span class="badge red" style="font-size:13px;vertical-align:middle;">📞 ${esc(student.contactParents.category)}</span>`:''}</h1>
        <div class="meta">${cls?esc(cls.name):'No class'}</div>
        <div style="font-size:14px;font-weight:600;color:var(--accent);margin-top:6px;">${t.reportPeriod}: ${fromVal?formatDateShort(fromVal):t.allTime}${fromVal||toVal?` – ${toVal?formatDateShort(toVal):t.present2}`:''}</div>
      </div>
      <div style="display:flex;gap:10px;align-items:center;" class="no-print">
        <button class="btn-ghost" onclick="toggleReportLang()" title="Switch language">${t.langToggle}</button>
        <button class="btn-ghost" onclick="openReportTextModal()">${t.copyTextBtn}</button>
        <button class="btn-accent" onclick="window.print()">${t.printBtn}</button>
      </div>
    </div>
    <div class="print-only" style="margin-bottom:14px;font-size:12px;color:var(--muted);">${t.generatedOn} ${formatDateLong(todayStr())}</div>
    <div class="card section no-print" style="margin-bottom:16px;">
      <div class="rollcall-controls" style="flex-wrap:wrap;align-items:center;">
        <label style="font-size:13px;font-weight:600;color:var(--muted);">${t.reportPeriod}:</label>
        <input type="date" value="${fromVal}" onchange="setReportRange('from', this.value)">
        <span style="color:var(--muted);font-size:13px;">${t.to}</span>
        <input type="date" value="${toVal}" onchange="setReportRange('to', this.value)">
        <button class="btn-ghost small" onclick="resetReportRange()">${t.allTime}</button>
        <button class="btn-ghost small" onclick="navigate('${returnView}')" style="margin-left:auto;">← Change</button>
      </div>
    </div>
    <div class="stat-row">
      <div class="card stat"><div class="stat-num">${total}</div><div class="stat-label">${t.sessionsLogged}</div></div>
      <div class="card stat"><div class="stat-num">${present}</div><div class="stat-label">${t.present}</div></div>
      <div class="card stat"><div class="stat-num">${late}</div><div class="stat-label">${t.late}</div></div>
      <div class="card stat"><div class="stat-num">${absent}</div><div class="stat-label">${t.absent}</div></div>
      <div class="card stat"><div class="stat-num">${totalPhone}</div><div class="stat-label">${t.phoneUses}</div></div>
      <div class="card stat"><div class="stat-num">${hwAvg!=null?hwAvg+'%':'—'}</div><div class="stat-label">${t.homeworkDone}</div></div>
      <div class="card stat"><div class="stat-num">${partScore!=null?partScore+'%':'—'}</div><div class="stat-label">${t.participation}</div></div>
    </div>
    <div class="charts-grid" style="grid-template-columns:repeat(auto-fit,minmax(260px,1fr));">
      <div class="card chart-card">
        <h3>${t.attendance}</h3>
        <div class="chart-note">${t.basedOn(total)}</div>
        ${renderDonut([
          {label:t.present, value:present, color:'var(--green)'},
          {label:t.late, value:late, color:'var(--amber)'},
          {label:t.absent, value:absent, color:'var(--red)'}
        ], total?`${Math.round(100*(present+late)/total)}%`:'—', t.attended)}
      </div>
      <div class="card chart-card">
        <h3>${t.timeInClass}</h3>
        <div class="chart-note">${t.outOf(totalPossibleMin, total, duration)}${(()=>{const ds=[...new Set(records.map(recDur))];return ds.length>1?` <span style="color:var(--amber);">· duration varies (${ds.sort((a,b)=>a-b).join('/')} min)</span>`:'';})()}</div>
        ${renderDonut([
          {label:t.inClass, value:inClassMin, color:'var(--green)', unit:' min'},
          {label:t.lateArrivals, value:lostLateMin, color:'var(--amber)', unit:' min'},
          {label:t.leftEarly, value:lostEarlyMin, color:'var(--purple)', unit:' min'},
          {label:t.absent, value:absentMin, color:'var(--red)', unit:' min'}
        ], (lostLateMin+lostEarlyMin+absentMin)+' min', t.timeMissed)}
      </div>
      ${hwRecords.length ? `
      <div class="card chart-card">
        <h3>${t.homeworkDone}</h3>
        <div class="chart-note">${t.basedOn(hwRecords.length)}</div>
        ${(()=>{
          const avg = hwAvg??0;
          return renderDonut([
            {label:state.reportLang==='pt'?'Feito (média)':'Done (avg)', value:avg, color:'var(--green)', unit:'%'},
            {label:state.reportLang==='pt'?'Incompleto (média)':'Incomplete (avg)', value:100-avg, color:'var(--red)', unit:'%'}
          ], avg+'%', state.reportLang==='pt'?'média':'average');
        })()}
      </div>` : ''}
      ${partRecords.length ? `
      <div class="card chart-card">
        <h3>${t.participation}</h3>
        <div class="chart-note">${t.basedOn(partRecords.length)}</div>
        ${renderDonut([
          {label:t.participationLabels.great, value:partGreat, color:'var(--green)'},
          {label:t.participationLabels.good, value:partGood, color:'var(--amber)'},
          {label:t.participationLabels.low, value:partLow, color:'var(--red)'}
        ], partScore!=null?partScore+'%':'—', t.participation)}
      </div>` : ''}
    </div>
    ${gradesInfo ? `
    <div class="card section" ${gradesInfo.cycles.some(cy=>cy.status.under)?'style="border-left:4px solid var(--red);"':''}>
      <h3>📝 ${state.reportLang==='pt'?'Notas':'Test Grades'}${gradesInfo.level?` <span class="badge other" style="font-size:12px;vertical-align:middle;">${esc(gradesInfo.level)}</span>`:''}</h3>
      <div class="chart-note" style="margin-bottom:8px;">${gradesInfo.advanced
        ? (state.reportLang==='pt' ? `TOEFL — meta por prova: <b>${TOEFL_TARGETS[gradesInfo.level]||'—'}</b>` : `TOEFL — target per test: <b>${TOEFL_TARGETS[gradesInfo.level]||'—'}</b>`)
        : (state.reportLang==='pt' ? `3 provas por ciclo · <b>240 pontos</b> no total (média 80) para aprovação` : `3 tests per cycle · <b>240 points</b> total (average 80) to be approved`)}</div>
      <table>
        <thead><tr><th>${state.reportLang==='pt'?'Ciclo':'Cycle'}</th><th>${state.reportLang==='pt'?'Notas':'Scores'}</th><th style="text-align:center;">Total</th><th style="text-align:center;">${state.reportLang==='pt'?'Média':'Average'}</th><th>Status</th></tr></thead>
        <tbody>
          ${gradesInfo.cycles.map(cy=>{
            const st = cy.status;
            const ok = !st.under && !st.close && st.entered===st.of;
            const statusTxt = st.under
              ? (state.reportLang==='pt' ? (st.advanced?'Abaixo da meta':'Abaixo da média') : (st.advanced?'Below target':'Below average'))
              : st.close
              ? (state.reportLang==='pt' ? (st.advanced?'Perto da meta':'Perto da média') : (st.advanced?'Close to target':'Close to average'))
              : (st.entered<st.of ? (state.reportLang==='pt'?`Em andamento (${st.entered}/${st.of})`:`In progress (${st.entered}/${st.of})`)
                 : (state.reportLang==='pt' ? (st.advanced?'Meta atingida':'Aprovado') : (st.advanced?'Target met':'Approved')));
            return `<tr>
              <td>${esc(cy.label)}${cy.isCurrent?` <span class="badge other" style="font-size:11px;">${state.reportLang==='pt'?'atual':'current'}</span>`:''}</td>
              <td>${st.scores.map(v=>(v==null||v==='')?'—':v).join(' / ')}</td>
              <td style="text-align:center;">${st.total}</td>
              <td style="text-align:center;">${st.avg}</td>
              <td>${st.under?`<span class="badge red">📞 ${statusTxt}</span>`:st.close?`<span class="badge amber">📞 ${statusTxt}</span>`:(ok?`<span class="badge" style="background:var(--green-soft,#e5f7ec);color:var(--green);">✓ ${statusTxt}</span>`:`<span class="badge other">${statusTxt}</span>`)}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>` : ''}
    <div class="card section">
      <h3>${t.classesLost}</h3>
      <div class="lost-summary">${classesLostHtml}</div>
      ${total ? `<div class="lost-summary" style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border);">${t.timeLost}: <b>${totalLostMin} min ≈ ${lostEquivClasses} ${t.equivClasses}</b>${expected?` (${t.of} ${expected} ${t.expectedShort})`:''}.</div>` : ''}
    </div>
    ${(student.contactParents?.reason || student.contactParentsHistory?.length) ? `
    <div class="card section" style="border-left:4px solid var(--red);">
      <h3>📞 ${state.reportLang==='pt'?'Contato com Responsáveis':'Contact Parents'}</h3>
      ${student.contactParents?.reason ? `
      <div style="margin-bottom:12px;padding:10px 14px;background:var(--red-soft);border-radius:10px;">
        <div style="font-size:12px;font-weight:600;color:var(--red);margin-bottom:4px;">${state.reportLang==='pt'?'⚠ Pendente':'⚠ Pending'}</div>
        <span class="badge red">${esc(student.contactParents.category)}</span>
        <span style="font-size:13px;color:var(--text);margin-left:8px;">${esc(student.contactParents.reason)}</span>
      </div>` : ''}
      ${(student.contactParentsHistory||[]).map(h=>`
      <div style="padding:10px 0;border-bottom:1px solid var(--border);">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
          <span style="font-size:12px;font-weight:600;color:var(--muted);">${formatDateShort(h.date)}</span>
          <span class="badge red">${esc(h.category)}</span>
        </div>
        <div style="font-size:12px;color:var(--muted);margin-bottom:4px;"><b>${state.reportLang==='pt'?'Motivo':'Reason'}:</b> ${esc(h.reason)}</div>
        <div style="font-size:13px;color:var(--text);"><b>${state.reportLang==='pt'?'Resumo':'Summary'}:</b> ${esc(h.summary)}</div>
      </div>`).join('')}
    </div>` : ''}
    <div class="card table-wrap">
      ${records.length||holidayDates.length ? `
      <table>
        <thead><tr><th>${t.date}</th><th>${t.attendance}</th><th>${t.lateMin}</th><th>${t.leftEarlyMin}</th><th>${t.phone}</th><th>${t.hw}</th><th>${t.lateHwCol}</th><th>${t.englishOnly}</th><th>${t.participation}</th><th>${t.notes}</th></tr></thead>
        <tbody>
          ${(()=>{
            const partLabel = p => p?({great:t.participationLabels.great,good:t.participationLabels.good,low:t.participationLabels.low}[p]):null;
            const partBadge = p => p==='great'?'green':p==='good'?'amber':'red';
            // Merge records and holiday rows, sort by date descending
            const allRows = [
              ...records.map(r=>({...r, _type:'record'})),
              ...holidayDates.map(date=>({date, _type:'holiday', _label: getHoliday(date)?.label||'Holiday'}))
            ].sort((a,b)=>b.date.localeCompare(a.date));
            return allRows.map(r=>{
              if(r._type==='holiday') return `
                <tr style="background:var(--purple-soft);">
                  <td>${formatDateShort(r.date)}</td>
                  <td colspan="9" style="color:var(--purple);font-weight:600;">🎉 ${esc(r._label)}</td>
                </tr>`;
              const lessonNote = getLessonNote(r._classId || student.classId, r.date);
              const missedRow = (r.attendance==='absent' && lessonNote) ? `
                <tr style="background:var(--red-soft);">
                  <td></td>
                  <td colspan="9" style="font-size:12px;color:var(--red);font-style:italic;">${t.missedLabel}: ${esc(lessonNote)}</td>
                </tr>` : '';
              return `
                <tr>
                  <td>${formatDateShort(r.date)}</td>
                  <td><span class="badge ${attendanceBadgeClass(r.attendance)}">${t.attendanceLabels[r.attendance]||r.attendance}</span></td>
                  <td>${r.lateMin?r.lateMin+' min':'—'}</td>
                  <td>${r.leftEarlyMin?r.leftEarlyMin+' min':'—'}</td>
                  <td>${r.phone||'—'}</td>
                  <td>${r.hw!=null?(typeof r.hw==='number'?r.hw+'%':(r.hw==='done'?'100%':'0%')):'—'}</td>
                  <td>${r.lateHwOutcome ? `<span class="badge ${r.lateHwOutcome==='late'?'green':'red'}">${t.lateHwLabels[r.lateHwOutcome]||r.lateHwOutcome}</span>` : '—'}</td>
                  <td>${r.english?`<span class="badge ${englishBadgeClass(r.english)}">${t.englishLabels[r.english]||r.english}</span>`:'—'}</td>
                  <td>${r.participation?`<span class="badge ${partBadge(r.participation)}">${partLabel(r.participation)}</span>`:'—'}</td>
                  <td>${r.notes?esc(r.notes):'—'}</td>
                </tr>${missedRow}`;
            }).join('');
          })()}
        </tbody>
      </table>
      ` : `<div class="empty-card">${t.noRecords}</div>`}
    </div>
  `;
}
function toggleReportLang(){
  state.reportLang = state.reportLang==='en' ? 'pt' : 'en';
  refreshView();
}
function setReportRange(which, val){
  state.reportRange[which] = val || '';
  refreshView();
}
function resetReportRange(){
  state.reportRange = {from:'', to:''};
  refreshView();
}

/* ================= REPORTS ================= */
function renderReports(){
  if(!classById(state.reportsSelection.classId)) state.reportsSelection.classId = state.classes[0]?.id || '';
  const selClassId = state.reportsSelection.classId;
  const fromVal = state.reportRange.from;
  const toVal   = state.reportRange.to;
  const active = activeClasses();
  const archived = archivedClasses();

  document.getElementById('view-reports').innerHTML = `
    <div class="topbar"><div><h1>Reports</h1><div class="meta">Printable attendance &amp; observation reports per student</div></div></div>
    ${state.classes.length ? `
      <div class="card section" style="margin-bottom:16px;">
        <div class="rollcall-controls" style="flex-wrap:wrap;align-items:center;">
          <select onchange="setReportsClass(this.value)">
            ${active.length?`<optgroup label="Active">${active.map(c=>`<option value="${c.id}" ${c.id===selClassId?'selected':''}>${esc(c.name)}</option>`).join('')}</optgroup>`:''}
            ${archived.length?`<optgroup label="Archived">${archived.map(c=>`<option value="${c.id}" ${c.id===selClassId?'selected':''}>${esc(c.name)} (archived)</option>`).join('')}</optgroup>`:''}
          </select>
          <label style="font-size:13px;font-weight:600;color:var(--muted);">Period:</label>
          <input type="date" value="${fromVal}" onchange="setReportRangeFromReports('from',this.value)" placeholder="From">
          <span style="color:var(--muted);font-size:13px;">–</span>
          <input type="date" value="${toVal}" onchange="setReportRangeFromReports('to',this.value)" placeholder="To">
          <button class="btn-ghost small" onclick="resetReportRangeFromReports()">All time</button>
          <button class="btn-accent" onclick="navigate('group-report')">Group Report →</button>
        </div>
      </div>
    ` : ''}
    ${state.classes.length ? state.classes.filter(c=>!selClassId||c.id===selClassId).map(c=>`
      <div class="card section" style="margin-bottom:12px;">
        <h3 style="display:flex;align-items:center;gap:8px;"><span class="color-dot" style="background:${c.color}"></span>${esc(c.name)}${c.archived?` <span class="badge other">Archived</span>`:''}</h3>
        ${studentsInClass(c.id).length ? studentsInClass(c.id).map(s=>`
          <div class="dash-row">
            <div class="dash-row-title">${esc(s.name)}${s.englishClub?` <span class="badge amber">⭐ English Club</span>`:''}</div>
            <button class="btn-ghost small" onclick="navigate('student',{studentProfileId:'${s.id}', studentProfileReturn:'reports'})">View report →</button>
          </div>
        `).join('') : `<div class="empty">No students in this class yet.</div>`}
      </div>
    `).join('') : `<div class="card empty-card">Add a class and students first in <button type="button" class="linkish" onclick="navigate('classes')">Classes &amp; Students</button>.</div>`}
  `;
}
function setReportsClass(classId){
  state.reportsSelection.classId = classId;
  refreshView();
}
function setReportRangeFromReports(which, val){
  state.reportRange[which] = val || '';
  refreshView();
}
function resetReportRangeFromReports(){
