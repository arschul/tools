<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EFL Teacher Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --sidebar:#1c2436;
    --sidebar-accent:#2a3650;
    --bg:#f4f6fb;
    --card:#ffffff;
    --border:#e3e7f0;
    --text:#1c2436;
    --muted:#7d869c;
    --accent:#4f6df5;
    --accent-soft:#e8ecff;
    --green:#1f9d6f;
    --green-soft:#e3f7ee;
    --amber:#c98a1c;
    --amber-soft:#fbf0dc;
    --red:#d1453d;
    --red-soft:#fbe6e4;
    --purple:#8b5cf6;
    --purple-soft:#efe7ff;
    --gray:#6b7280;
    --gray-soft:#eef0f4;
    --accent-grad: linear-gradient(135deg, #4f6df5 0%, #8b5cf6 100%);
    --radius:16px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Inter',sans-serif;
    background:
      radial-gradient(circle at 100% 0%, #eef1fd 0%, transparent 45%),
      radial-gradient(circle at 0% 100%, #eef7f3 0%, transparent 40%),
      var(--bg);
    color:var(--text);
    display:flex;
    min-height:100vh;
  }
  h1,h2,h3{font-family:'Sora',sans-serif;margin:0;}
  a{color:var(--accent);cursor:pointer;}

  /* Sidebar */
  .sidebar{
    width:230px;
    background:
      radial-gradient(circle at 25% 0%, rgba(79,109,245,.35), transparent 55%),
      radial-gradient(circle at 90% 80%, rgba(139,92,246,.18), transparent 50%),
      linear-gradient(165deg, #1c2436 0%, #20283e 55%, #181f30 100%);
    color:#cfd6e8;
    padding:24px 18px;
    flex-shrink:0;
  }
  .sidebar .brand{
    font-family:'Sora',sans-serif;
    font-weight:700;
    font-size:18px;
    letter-spacing:-.01em;
    color:#fff;
    margin-bottom:28px;
    display:flex;
    align-items:center;
    gap:10px;
  }
  .sidebar .brand .dot{
    width:10px;height:10px;border-radius:50%;
    background:var(--accent-grad);
    box-shadow:0 0 10px rgba(79,109,245,.8);
  }
  .nav-item{
    display:flex;align-items:center;gap:12px;
    padding:9px 12px;border-radius:12px;
    font-size:14px;font-weight:500;
    margin-bottom:4px;cursor:pointer;
    color:#aab3c9;
    transition:background .15s, color .15s;
  }
  .nav-item:hover{color:#fff;background:rgba(255,255,255,.05);}
  .nav-item.active{
    background:rgba(255,255,255,.06);
    color:#fff;
  }
  .nav-icon-badge{
    width:30px;height:30px;border-radius:9px;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    background:rgba(255,255,255,.06);
    color:#aab3c9;
    transition:background .15s, color .15s, box-shadow .15s;
  }
  .nav-icon-badge svg{width:16px;height:16px;}
  .nav-item:hover .nav-icon-badge{background:rgba(255,255,255,.12);color:#fff;}
  .nav-item.active .nav-icon-badge{
    background:var(--accent-grad);
    color:#fff;
    box-shadow:0 4px 14px -2px rgba(79,109,245,.6);
  }
  .sidebar-divider{height:1px;background:rgba(255,255,255,.08);margin:10px 4px 10px;}

  /* Main */
  .main{flex:1;padding:28px 36px;max-width:1180px;}
  .view{display:none;}
  .view.active{display:block;}

  .topbar{
    display:flex;justify-content:space-between;align-items:flex-start;
    margin-bottom:18px;flex-wrap:wrap;gap:12px;
  }
  .topbar h1{font-size:24px;letter-spacing:-.01em;}
  .topbar .meta{color:var(--muted);font-size:13px;margin-top:4px;}
  .back-btn{margin-bottom:8px;}

  /* shared */
  .card{
    background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
    box-shadow:0 1px 2px rgba(28,36,54,.03), 0 10px 30px -16px rgba(28,36,54,.12);
  }
  .badge{font-size:11px;font-weight:600;padding:3px 9px;border-radius:999px;}
  .badge.green{background:var(--green-soft);color:var(--green);}
  .badge.amber{background:var(--amber-soft);color:var(--amber);}
  .badge.red{background:var(--red-soft);color:var(--red);}
  .badge.hw, .cal-tag.hw{background:var(--accent-soft);color:var(--accent);}
  .badge.test, .cal-tag.test{background:var(--red-soft);color:var(--red);}
  .badge.project, .cal-tag.project{background:var(--purple-soft);color:var(--purple);}
  .badge.other, .cal-tag.other{background:var(--gray-soft);color:var(--gray);}

  .btn-accent{
    background:var(--accent-grad);color:#fff;border:none;border-radius:10px;
    padding:10px 18px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;
    box-shadow:0 4px 14px -4px rgba(79,109,245,.5);
    transition:transform .15s, box-shadow .15s, filter .15s;
  }
  .btn-accent:hover{filter:brightness(1.06);transform:translateY(-1px);box-shadow:0 6px 18px -4px rgba(79,109,245,.6);}
  .btn-ghost{background:#fff;border:1px solid var(--border);border-radius:10px;padding:9px 16px;font-size:13px;font-weight:600;cursor:pointer;color:var(--text);font-family:inherit;}
  .btn-ghost:hover{border-color:var(--accent);color:var(--accent);}
  .btn-ghost.small{padding:6px 12px;font-size:12px;}
  .icon-btn{background:none;border:1px solid var(--border);border-radius:8px;padding:5px 10px;font-size:12px;font-weight:600;cursor:pointer;color:var(--muted);font-family:inherit;}
  .icon-btn.danger{color:var(--red);border-color:var(--red-soft);}
  .icon-btn.danger:hover{background:var(--red-soft);}

  .empty{color:var(--muted);font-size:13px;padding:8px 0;}
  .empty-card{padding:34px;text-align:center;color:var(--muted);font-size:14px;}
  .empty-card .btn-accent{margin-top:14px;}
  .color-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;display:inline-block;}

  /* stat row */
  .stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin-bottom:18px;}
  .stat{padding:16px;text-align:center;}
  .stat-num{
    font-family:'Sora',sans-serif;font-size:26px;font-weight:700;
    background:var(--accent-grad);-webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .stat-label{font-size:12px;color:var(--muted);margin-top:4px;}

  /* dashboard */
  .dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  .section{padding:18px;}
  .section h3{margin-bottom:12px;font-size:15px;}
  .dash-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);gap:10px;}
  .dash-row:last-child{border-bottom:none;}
  .dash-row-left{display:flex;align-items:center;gap:10px;}
  .dash-row-title{font-weight:600;font-size:13px;}
  .dash-row-sub{font-size:12px;color:var(--muted);margin-top:2px;}
  @media(max-width:900px){.dash-grid{grid-template-columns:1fr;}}

  /* classes & students */
  .class-card{margin-bottom:12px;overflow:hidden;}
  .class-card-head{display:flex;justify-content:space-between;align-items:center;padding:16px;gap:10px;}
  .class-card-head .dash-row-left{flex:1;cursor:pointer;}
  .class-card-actions{display:flex;gap:8px;align-items:center;flex-shrink:0;}
  .chevron{color:var(--muted);font-size:14px;width:14px;text-align:center;}
  .class-card-body{border-top:1px solid var(--border);padding:16px;}
  .add-student-row{display:flex;gap:8px;margin-bottom:12px;}
  .add-student-row input{flex:1;border:1px solid var(--border);border-radius:8px;padding:9px 11px;font-family:inherit;font-size:13px;}
  .student-list-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;}
  .student-list-row:last-child{border-bottom:none;}
  .student-name-link{cursor:pointer;font-weight:500;}
  .student-name-link:hover{color:var(--accent);text-decoration:underline;}

  /* modal */
  .modal-overlay{position:fixed;inset:0;background:rgba(28,36,54,.45);display:flex;align-items:center;justify-content:center;z-index:50;padding:20px;}
  .modal{background:#fff;border-radius:16px;padding:24px;width:100%;max-width:440px;max-height:85vh;overflow-y:auto;}
  .modal h3{margin-bottom:16px;font-size:18px;}
  .modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:18px;}
  .modal-section{margin-bottom:16px;}
  .modal-section-label{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px;}
  .modal-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;gap:10px;}
  .modal-row:last-child{border-bottom:none;}
  .modal-row .color-dot{margin-right:6px;}
  .field-row{display:flex;gap:8px;}
  .field-row select{flex:1;}

  .field{margin-bottom:12px;}
  .field label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px;}
  .field.full{grid-column:1/-1;}
  .field input, .field select, .modal select, .modal input{
    width:100%;border:1px solid var(--border);border-radius:8px;padding:9px 11px;font-family:inherit;font-size:14px;
  }
  .swatches{display:flex;gap:8px;flex-wrap:wrap;}
  .swatch{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent;}
  .swatch.on{border-color:var(--text);}

  /* roll call */
  .rollcall-controls{display:flex;gap:10px;flex-wrap:wrap;}
  .rollcall-controls select, .rollcall-controls input{border:1px solid var(--border);border-radius:10px;padding:8px 12px;font-family:inherit;font-size:13px;background:#fff;}
  .warn-banner{background:var(--amber-soft);color:var(--amber);border-radius:10px;padding:10px 14px;font-size:13px;margin-bottom:14px;font-weight:500;}
  .rollcall-actions{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
  .save-indicator{font-size:12px;color:var(--muted);}

  .roster-list{display:flex;flex-direction:column;padding:6px 0;}
  .roster-row{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;gap:14px;cursor:pointer;}
  .roster-row + .roster-row, .drawer + .roster-row{border-top:1px solid var(--border);}
  .student-name{font-weight:600;font-size:14px;flex:1;}
  .seg{display:flex;border:1px solid var(--border);border-radius:10px;overflow:hidden;}
  .seg button{border:none;background:#fff;padding:7px 14px;font-size:13px;font-weight:600;cursor:pointer;color:var(--muted);font-family:inherit;}
  .seg button + button{border-left:1px solid var(--border);}
  .seg button.present.on{background:var(--green-soft);color:var(--green);}
  .seg button.late.on{background:var(--amber-soft);color:var(--amber);}
  .seg button.absent.on{background:var(--red-soft);color:var(--red);}
  .detail-btn{border:1px solid var(--border);background:#fff;border-radius:10px;padding:7px 12px;font-size:13px;font-weight:600;color:var(--accent);font-family:inherit;}

  .drawer{padding:0 16px;background:var(--bg);display:none;grid-template-columns:repeat(2,1fr);gap:14px;}
  .roster-row.open + .drawer{display:grid;padding:16px;border-top:1px solid var(--border);}

  .stepper{display:flex;align-items:center;gap:10px;}
  .stepper button{width:28px;height:28px;border-radius:8px;border:1px solid var(--border);background:#fff;font-size:15px;cursor:pointer;font-family:inherit;}
  .stepper .val{font-weight:600;min-width:50px;text-align:center;font-size:13px;}
  .pill-group{display:flex;gap:6px;flex-wrap:wrap;}
  .pill{border:1px solid var(--border);background:#fff;border-radius:999px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;color:var(--muted);}
  .pill.on.green{background:var(--green-soft);color:var(--green);border-color:var(--green);}
  .pill.on.amber{background:var(--amber-soft);color:var(--amber);border-color:var(--amber);}
  .pill.on.red{background:var(--red-soft);color:var(--red);border-color:var(--red);}
  textarea{width:100%;border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-family:inherit;font-size:13px;resize:vertical;min-height:50px;}

  /* tables */
  .table-wrap{overflow-x:auto;border-radius:var(--radius);}
  table{width:100%;border-collapse:collapse;font-size:13px;min-width:760px;}
  th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);padding:10px 12px;background:#fafbfd;border-bottom:1px solid var(--border);white-space:nowrap;}
  td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle;}
  tr:last-child td{border-bottom:none;}

  /* calendar */
  .cal-nav{display:flex;align-items:center;gap:10px;}
  .cal-month-label{font-family:'Sora',sans-serif;font-weight:600;font-size:15px;min-width:140px;text-align:center;}
  .cal-grid-wrap{padding:16px;}
  .cal-weekdays{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:8px;}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
  .cal-cell{border:1px solid var(--border);border-radius:10px;padding:8px;min-height:90px;cursor:pointer;display:flex;flex-direction:column;gap:4px;}
  .cal-cell:hover{border-color:var(--accent);}
  .cal-cell.empty{border:none;cursor:default;background:transparent;}
  .cal-cell.empty:hover{border:none;}
  .cal-cell.today{background:var(--accent-soft);border-color:var(--accent);}
  .cal-date{font-weight:600;font-size:13px;}
  .cal-items{display:flex;flex-direction:column;gap:3px;overflow:hidden;}
  .cal-tag{font-size:10px;font-weight:600;padding:2px 6px;border-radius:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;border:1px solid transparent;}
  .cal-legend{display:flex;gap:16px;flex-wrap:wrap;margin-top:14px;font-size:12px;color:var(--muted);align-items:center;}
  .legend-item{display:flex;align-items:center;gap:6px;}
  .cal-cell.holiday{background:repeating-linear-gradient(45deg, #ffffff 0 8px, #eef0f6 8px 16px);}
  .cal-tag.holiday-tag{background:var(--purple-soft);color:var(--purple);}

  /* charts */
  .charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:18px;}
  .chart-card{padding:18px;}
  .chart-card h3{margin-bottom:6px;font-size:15px;}
  .chart-card .chart-note{font-size:12px;color:var(--muted);margin-bottom:14px;}
  .donut-wrap{display:flex;align-items:center;gap:20px;flex-wrap:wrap;}
  .donut{width:140px;height:140px;border-radius:50%;position:relative;flex-shrink:0;}
  .donut svg{display:block;width:100%;height:100%;}
  .donut-center{position:absolute;inset:18px;background:#fff;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;}
  .donut-num{font-family:'Sora',sans-serif;font-weight:700;font-size:20px;}
  .donut-sub{font-size:11px;color:var(--muted);}
  .donut-legend{display:flex;flex-direction:column;gap:6px;font-size:13px;flex:1;}
  .lost-summary{font-size:13px;line-height:1.7;}
  .lost-summary b{font-family:'Sora',sans-serif;}
  @media(max-width:900px){.charts-grid{grid-template-columns:1fr;}}

  /* print */
  .print-only{display:none;}
  @media print{
    @page{margin:14mm;}
    *{-webkit-print-color-adjust:exact !important;print-color-adjust:exact !important;color-adjust:exact !important;}
    .sidebar, #modal-root, .no-print{display:none !important;}
    body{display:block;background:#fff;}
    .main{padding:0;max-width:none;}
    .view{display:none !important;}
    .view.active{display:block !important;}
    .print-only{display:block !important;}
    .card{box-shadow:none;border:1px solid #ddd;break-inside:avoid;margin-bottom:10px;}
    .stat-row{grid-template-columns:repeat(3,1fr);}
    .stat-num{
      background:none !important;-webkit-background-clip:initial !important;background-clip:initial !important;
      color:var(--accent) !important;-webkit-text-fill-color:var(--accent) !important;
    }
    .charts-grid{grid-template-columns:1fr 1fr;gap:12px;}
    .donut{width:120px;height:120px;}
    .donut-center{inset:15px;}
    .table-wrap{break-inside:auto;}
    .table-wrap table{min-width:0;font-size:11px;}
    thead{display:table-header-group;}
    tr{break-inside:avoid;}
  }

  @media(max-width:760px){
    body{flex-direction:column;}
    .sidebar{width:100%;display:flex;align-items:center;gap:8px;padding:14px 16px;overflow-x:auto;}
    .sidebar .brand{margin-bottom:0;margin-right:8px;flex-shrink:0;}
    .nav-item{flex-shrink:0;margin-bottom:0;white-space:nowrap;}
    .main{padding:18px;}
    .stat-row{grid-template-columns:repeat(2,1fr);}
    .dash-grid{grid-template-columns:1fr;}
    .drawer{grid-template-columns:1fr;}
    .cal-cell{min-height:60px;}
  }

  .back-link {
    position: fixed;
    top: 16px;
    left: 16px;
    z-index: 100000;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    background: rgba(0,0,0,0.55);
    color: #fff;
    text-decoration: none;
    border-radius: 999px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, Arial, sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.01em;
    backdrop-filter: blur(6px);
    border: 1px solid rgba(255,255,255,0.18);
    transition: background 0.2s ease, transform 0.2s ease;
  }
  .back-link:hover {
    background: rgba(0,0,0,0.78);
    transform: translateX(-2px);
  }
</style>
</head>
<body>
<a class="back-link" href="../">← Tool Hub</a>

<div class="sidebar">
  <div class="brand"><span class="dot"></span>EFL Dashboard</div>
  <div class="nav-item" data-view="dashboard" onclick="navigate('dashboard')">
    <div class="nav-icon-badge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11.5 12 4l9 7.5"/><path d="M5 10v9a1 1 0 0 0 1 1h4v-5h4v5h4a1 1 0 0 0 1-1v-9"/></svg></div>
    Dashboard
  </div>
  <div class="nav-item" data-view="classes" onclick="navigate('classes')">
    <div class="nav-icon-badge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3"/><path d="M2 20c0-3.3 3.1-6 7-6s7 2.7 7 6"/><circle cx="17" cy="7" r="2.5"/><path d="M21 20c0-2.7-1.8-5-4.5-5.8"/></svg></div>
    Classes &amp; Students
  </div>
  <div class="nav-item" data-view="rollcall" onclick="navigate('rollcall')">
    <div class="nav-icon-badge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="4" width="14" height="17" rx="2"/><path d="M9 3h6v3H9z"/><path d="m9 13 2 2 4-4"/></svg></div>
    Roll Call
  </div>
  <div class="nav-item" data-view="calendar" onclick="navigate('calendar')">
    <div class="nav-icon-badge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 10h18"/><path d="M8 3v4"/><path d="M16 3v4"/></svg></div>
    Calendar
  </div>
  <div class="nav-item" data-view="reports" onclick="navigate('reports')">
    <div class="nav-icon-badge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20V10"/><path d="M10 20V4"/><path d="M16 20v-7"/><path d="M3 20h18"/></svg></div>
    Reports
  </div>
  <div class="sidebar-divider"></div>
  <div class="nav-item" onclick="exportData()">
    <div class="nav-icon-badge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12"/><path d="m7 10 5 5 5-5"/><path d="M5 21h14"/></svg></div>
    Backup data
  </div>
  <label class="nav-item" style="margin-bottom:0;">
    <div class="nav-icon-badge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21V9"/><path d="m7 14 5-5 5 5"/><path d="M5 3h14"/></svg></div>
    Restore backup
    <input type="file" accept="application/json" style="display:none;" onchange="importData(this.files[0]); this.value='';">
  </label>
</div>

<div class="main">
  <div id="view-dashboard" class="view"></div>
  <div id="view-classes" class="view"></div>
  <div id="view-rollcall" class="view"></div>
  <div id="view-calendar" class="view"></div>
  <div id="view-student" class="view"></div>
  <div id="view-reports" class="view"></div>
</div>

<div id="modal-root"></div>

<script>
/* ---------- constants ---------- */
const SCHEDULE_DAYS = { MW:[1,3], TT:[2,4], FLEX:[] };
const PALETTE = ['#4f6df5','#1f9d6f','#c98a1c','#d1453d','#8b5cf6','#0ea5b8','#e8618c','#6b7280'];
const DAY_NAMES = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

/* ---------- state ---------- */
let state = {
  classes: [],
  students: [],
  sessions: {},
  events: [],
  holidays: [],
  view: 'dashboard',
  rollcall: { classId: null, date: todayStr() },
  bookedSessions: [],
  calendar: { year: new Date().getFullYear(), month: new Date().getMonth() },
  expandedClassId: null,
  openDrawer: null,
  studentProfileId: null,
  studentProfileReturn: 'reports',
  reportRange: { from: '', to: '' },
  reportsSelection: { classId: '', studentId: '' }
};

/* ---------- storage ---------- */
const STORAGE_PREFIX = 'efl-dashboard:';
async function loadKey(key, fallback){
  try{
    const raw = localStorage.getItem(STORAGE_PREFIX+key);
    return raw !== null ? JSON.parse(raw) : fallback;
  }catch(e){
    console.error('Load failed for', key, e);
    return fallback;
  }
}
async function saveKey(key, value){
  try{
    localStorage.setItem(STORAGE_PREFIX+key, JSON.stringify(value));
  }catch(e){
    console.error('Save failed for', key, e);
  }
}
const saveTimers = {};
function scheduleSave(key, value){
  if(saveTimers[key]) clearTimeout(saveTimers[key]);
  saveTimers[key] = setTimeout(()=>{
    saveKey(key, value);
    if(key==='sessions'){
      const el = document.getElementById('save-indicator');
      if(el) el.textContent = 'Saved at ' + nowTime();
    }
  }, 450);
}

/* ---------- helpers ---------- */
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function pad(n){ return String(n).padStart(2,'0'); }
function todayStr(){ const d=new Date(); return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function dateToStr(y,m,d){ return `${y}-${pad(m+1)}-${pad(d)}`; }
function nowTime(){ const d=new Date(); return pad(d.getHours())+':'+pad(d.getMinutes()); }
function formatDateLong(dateStr){
  return new Date(dateStr+'T00:00:00').toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
}
function formatDateShort(dateStr){
  return new Date(dateStr+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});
}
function scheduleLabel(s){ return {MW:'Mon / Wed',TT:'Tue / Thu',FLEX:'Flexible'}[s]||s; }
function classById(id){ return state.classes.find(c=>c.id===id); }
function studentsInClass(classId){ return state.students.filter(s=>s.classId===classId); }
function esc(str){
  return String(str ?? '').replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

/* ─── placement tracker integration ─── */
const PLK = 'efl-dashboard:placement:';
function loadPlacementData(sid){
  try{ return JSON.parse(localStorage.getItem(PLK+sid)); }catch{ return null; }
}
function placementAssessed(d){
  if(!d?.scores) return 0;
  return Object.values(d.scores).flat().filter(q=>q.score!==null).length;
}
function placementAvg(d){
  if(!d?.scores) return null;
  const all=Object.values(d.scores).flat().filter(q=>q.score!==null);
  return all.length?Math.round(all.reduce((s,q)=>s+q.score,0)/all.length):null;
}
function placementUrl(sid, name, view=''){
  const base='../placement-test.html';
  const p=new URLSearchParams({studentId:sid, name});
  if(view) p.set('view',view);
  return base+'?'+p;
}
function levelColor(d){
  const avg=placementAvg(d);
  if(avg===null) return 'var(--accent)';
  if(avg>=80) return 'var(--green)';
  if(avg>=65) return 'var(--amber)';
  return 'var(--red)';
}
function eventTypeLabel(type){ return {hw:'Homework',test:'Test',project:'Project',other:'Other'}[type] || type; }
function attendanceLabel(a){ return {present:'Present',late:'Late',absent:'Absent'}[a] || '—'; }
function attendanceBadgeClass(a){ return {present:'green',late:'amber',absent:'red'}[a] || ''; }
function englishLabel(e){ return {excellent:'Excellent',improve:'Room for improvement',unacceptable:'Unacceptable'}[e] || '—'; }
function englishBadgeClass(e){ return {excellent:'green',improve:'amber',unacceptable:'red'}[e] || ''; }
function splitSessionKey(key){ const i=key.indexOf('_'); return [key.slice(0,i), key.slice(i+1)]; }
function defaultRecord(){ return {attendance:'present', lateMin:0, leftEarlyMin:0, phone:0, hw:'done', english:'excellent', notes:''}; }
function getHoliday(dateStr){ return state.holidays.find(h=>h.date===dateStr); }
function isHoliday(dateStr){ return !!getHoliday(dateStr); }
function expectedSessionsForClass(cls, startOverride, endOverride){
  const startStr = startOverride || cls.startDate;
  const endStr   = endOverride   || cls.endDate;
  if(!startStr || !endStr) return null;
  if(cls.schedule === 'FLEX'){
    return state.bookedSessions.filter(s =>
      s.classId===cls.id && s.date>=startStr && s.date<=endStr && !isHoliday(s.date)
    ).length;
  }
  const start = new Date(startStr+'T00:00:00');
  const end   = new Date(endStr+'T00:00:00');
  if(start>end) return 0;
  let count=0, d=new Date(start);
  while(d<=end){
    const dow=d.getDay();
    const dateStr=dateToStr(d.getFullYear(),d.getMonth(),d.getDate());
    if(SCHEDULE_DAYS[cls.schedule].includes(dow) && !isHoliday(dateStr)) count++;
    d.setDate(d.getDate()+1);
  }
  return count;
}
function renderDonut(slices, centerLabel, centerSub){
  const total = slices.reduce((s,x)=>s+x.value,0);
  const size=140, stroke=20, r=(size-stroke)/2, c=2*Math.PI*r;
  let acc=0;
  const segs = total ? slices.filter(sl=>sl.value>0).map(sl=>{
    const len = sl.value/total*c;
    const dashoffset = c - acc;
    acc += len;
    return `<circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${sl.color}" stroke-width="${stroke}" stroke-dasharray="${len.toFixed(2)} ${(c-len).toFixed(2)}" stroke-dashoffset="${dashoffset.toFixed(2)}" transform="rotate(-90 ${size/2} ${size/2})"/>`;
  }).join('') : `<circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="var(--border)" stroke-width="${stroke}"/>`;
  return `
    <div class="donut-wrap">
      <div class="donut">
        <svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">${segs}</svg>
        <div class="donut-center">
          <div class="donut-num">${centerLabel}</div>
          <div class="donut-sub">${centerSub}</div>
        </div>
      </div>
      <div class="donut-legend">
        ${slices.map(sl=>`<div class="legend-item"><svg width="10" height="10" viewBox="0 0 10 10" style="flex-shrink:0;"><circle cx="5" cy="5" r="5" fill="${sl.color}"/></svg>${sl.label}: ${sl.value}${sl.unit||''}${total?` (${Math.round(sl.value/total*100)}%)`:''}</div>`).join('')}
      </div>
    </div>`;
}

/* ---------- modal ---------- */
function showModal(html){
  document.getElementById('modal-root').innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this) closeModal()">
      <div class="modal">${html}</div>
    </div>`;
}
function closeModal(){ document.getElementById('modal-root').innerHTML = ''; }

/* ---------- navigation ---------- */
function navigate(view, params={}){
  Object.assign(state, params);
  state.view = view;
  const navMap = {dashboard:'dashboard', classes:'classes', rollcall:'rollcall', calendar:'calendar', student: state.studentProfileReturn||'reports', reports:'reports'};
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.toggle('active', n.dataset.view===navMap[view]));
  document.querySelectorAll('.view').forEach(v=>v.classList.toggle('active', v.id==='view-'+view));
  if(view==='dashboard') renderDashboard();
  if(view==='classes') renderClasses();
  if(view==='rollcall') renderRollCall();
  if(view==='calendar') renderCalendar();
  if(view==='student') renderStudentProfile();
  if(view==='reports') renderReports();
}
function goToRollCall(classId, date){
  state.rollcall.classId = classId;
  state.rollcall.date = date;
  state.openDrawer = null;
  navigate('rollcall');
}

/* ================= DASHBOARD ================= */
function renderDashboard(){
  if(!state.classes.length){
    document.getElementById('view-dashboard').innerHTML = `
      <div class="topbar"><div><h1>Dashboard</h1><div class="meta">${formatDateLong(todayStr())}</div></div></div>
      <div class="card empty-card">
        <p>Welcome! Start by adding your first class.</p>
        <button class="btn-accent" onclick="navigate('classes');setTimeout(openClassModal,0)">+ Add a class</button>
      </div>`;
    return;
  }
  const today = todayStr();
  const todayHoliday = getHoliday(today);
  const dow = new Date(today+'T00:00:00').getDay();
  const todaysClasses = todayHoliday ? [] : [
    ...state.classes.filter(c=>c.schedule!=='FLEX' && SCHEDULE_DAYS[c.schedule].includes(dow)),
    ...state.classes.filter(c=>c.schedule==='FLEX' && state.bookedSessions.some(s=>s.classId===c.id&&s.date===today))
  ];
  const upcoming = state.events.filter(e=>e.date>=today).sort((a,b)=>a.date.localeCompare(b.date)).slice(0,6);

  document.getElementById('view-dashboard').innerHTML = `
    <div class="topbar"><div><h1>Dashboard</h1><div class="meta">${formatDateLong(today)}</div></div></div>
    <div class="stat-row">
      <div class="card stat"><div class="stat-num">${state.classes.length}</div><div class="stat-label">Classes</div></div>
      <div class="card stat"><div class="stat-num">${state.students.length}</div><div class="stat-label">Students</div></div>
      <div class="card stat"><div class="stat-num">${todaysClasses.length}</div><div class="stat-label">Classes today</div></div>
    </div>
    <div class="dash-grid">
      <div class="card section">
        <h3>Today's Classes</h3>
        ${todayHoliday ? `<div class="empty">🎉 Holiday: ${esc(todayHoliday.label)} — no classes today.</div>` : (todaysClasses.length ? todaysClasses.map(c=>`
          <div class="dash-row">
            <div class="dash-row-left">
              <span class="color-dot" style="background:${c.color}"></span>
              <div>
                <div class="dash-row-title">${esc(c.name)}</div>
                <div class="dash-row-sub">${c.time?c.time+' · ':''}${studentsInClass(c.id).length} students</div>
              </div>
            </div>
            <button class="btn-accent" onclick="goToRollCall('${c.id}','${today}')">Start Roll Call →</button>
          </div>
        `).join('') : `<div class="empty">No classes scheduled today.</div>`)}
      </div>
      <div class="card section">
        <h3>Upcoming</h3>
        ${upcoming.length ? upcoming.map(e=>`
          <div class="dash-row">
            <div class="dash-row-left">
              <span class="badge ${e.type}">${eventTypeLabel(e.type)}</span>
              <div>
                <div class="dash-row-title">${esc(e.title)}</div>
                <div class="dash-row-sub">${formatDateShort(e.date)}${e.classId?(' · '+esc(classById(e.classId)?.name||'')):''}</div>
              </div>
            </div>
          </div>
        `).join('') : `<div class="empty">No upcoming items. <a onclick="navigate('calendar')">Add one in Calendar</a></div>`}
      </div>
    </div>
  `;
}

/* ================= CLASSES & STUDENTS ================= */
function renderClasses(){
  document.getElementById('view-classes').innerHTML = `
    <div class="topbar">
      <div><h1>Classes &amp; Students</h1><div class="meta">${state.classes.length} classes · ${state.students.length} students</div></div>
      <button class="btn-accent" onclick="openClassModal()">+ Add class</button>
    </div>
    ${state.classes.length ? state.classes.map(renderClassCard).join('') : `
      <div class="card empty-card">
        <p>No classes yet.</p>
        <button class="btn-accent" onclick="openClassModal()">+ Add your first class</button>
      </div>`}
  `;
}
function renderClassCard(c){
  const students = studentsInClass(c.id);
  const expanded = state.expandedClassId === c.id;
  return `
    <div class="card class-card">
      <div class="class-card-head">
        <div class="dash-row-left" onclick="toggleClassExpand('${c.id}')">
          <span class="color-dot" style="background:${c.color}"></span>
          <div>
            <div class="dash-row-title">${esc(c.name)}</div>
            <div class="dash-row-sub">${scheduleLabel(c.schedule)}${c.time?' · '+c.time:''} · ${students.length} students</div>
          </div>
          <span class="chevron" style="margin-left:8px;">${expanded?'▾':'▸'}</span>
        </div>
        <div class="class-card-actions">
          <button class="icon-btn" onclick="openClassModal('${c.id}')">Edit</button>
          <button class="icon-btn danger" onclick="deleteClass('${c.id}')">Delete</button>
        </div>
      </div>
      ${expanded ? `
        <div class="class-card-body">
          <div class="add-student-row">
            <input type="text" id="new-student-${c.id}" placeholder="Student name" onkeydown="if(event.key==='Enter') addStudent('${c.id}')">
            <button class="btn-accent" onclick="addStudent('${c.id}')">+ Add student</button>
          </div>
          ${students.length ? `
            <div class="student-list">
              ${students.map(s=>`
                <div class="student-list-row">
                  <span class="student-name-link" onclick="navigate('student',{studentProfileId:'${s.id}', studentProfileReturn:'classes'})">${esc(s.name)}</span>
                  <button class="icon-btn danger" onclick="deleteStudent('${s.id}')">Remove</button>
                </div>
              `).join('')}
            </div>
          ` : `<div class="empty">No students yet. Add the first one above.</div>`}
        </div>
      ` : ''}
    </div>
  `;
}
function toggleClassExpand(classId){
  state.expandedClassId = state.expandedClassId===classId ? null : classId;
  renderClasses();
}
function openClassModal(classId){
  const c = classId ? classById(classId) : null;
  showModal(`
    <h3>${c?'Edit class':'Add class'}</h3>
    <div class="field"><label>Class name</label><input id="cm-name" type="text" value="${c?esc(c.name):''}" placeholder="e.g. Turma B1"></div>
    <div class="field"><label>Schedule</label>
      <select id="cm-schedule">
        <option value="MW" ${c?.schedule==='MW'?'selected':''}>Monday / Wednesday</option>
        <option value="TT" ${c?.schedule==='TT'?'selected':''}>Tuesday / Thursday</option>
        <option value="FLEX" ${c?.schedule==='FLEX'?'selected':''}>Flexible (custom schedule)</option>
      </select>
    </div>
    <div class="field"><label>Time (optional)</label><input id="cm-time" type="time" value="${c?.time||''}"></div>
    <div class="field-row">
      <div class="field" style="flex:1;"><label>First class date</label><input id="cm-start" type="date" value="${c?.startDate||''}"></div>
      <div class="field" style="flex:1;"><label>Last class date</label><input id="cm-end" type="date" value="${c?.endDate||''}"></div>
    </div>
    <div class="field"><label>Class duration (minutes)</label><input id="cm-duration" type="number" min="1" step="5" value="${c?.duration||150}"></div>
    <div class="field"><label>Color</label>
      <div class="swatches">
        ${PALETTE.map(col=>`<div class="swatch ${ (c?c.color===col:col===PALETTE[0]) ?'on':''}" style="background:${col}" onclick="selectSwatch(this,'${col}')"></div>`).join('')}
      </div>
      <input type="hidden" id="cm-color" value="${c?.color||PALETTE[0]}">
    </div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn-accent" onclick="saveClass(${c?`'${c.id}'`:'null'})">${c?'Save changes':'Add class'}</button>
    </div>
  `);
}
function selectSwatch(el, color){
  el.parentElement.querySelectorAll('.swatch').forEach(s=>s.classList.remove('on'));
  el.classList.add('on');
  document.getElementById('cm-color').value = color;
}
function saveClass(classId){
  const name = document.getElementById('cm-name').value.trim();
  if(!name) return;
  const schedule = document.getElementById('cm-schedule').value;
  const time = document.getElementById('cm-time').value;
  const color = document.getElementById('cm-color').value;
  const startDate = document.getElementById('cm-start').value || null;
  const endDate = document.getElementById('cm-end').value || null;
  const duration = parseInt(document.getElementById('cm-duration').value) || 150;
  if(classId){
    const c = classById(classId);
    c.name=name; c.schedule=schedule; c.time=time; c.color=color; c.startDate=startDate; c.endDate=endDate; c.duration=duration;
  }else{
    state.classes.push({id:uid(), name, schedule, time, color, startDate, endDate, duration});
  }
  scheduleSave('classes', state.classes);
  closeModal();
  renderClasses();
}
function deleteClass(classId){
  if(!confirm('Delete this class, its students, and all roll call records for it? This cannot be undone.')) return;
  state.classes = state.classes.filter(c=>c.id!==classId);
  state.students = state.students.filter(s=>s.classId!==classId);
  Object.keys(state.sessions).forEach(k=>{ if(splitSessionKey(k)[0]===classId) delete state.sessions[k]; });
  state.events = state.events.filter(e=>e.classId!==classId);
  if(state.expandedClassId===classId) state.expandedClassId=null;
  scheduleSave('classes', state.classes);
  scheduleSave('students', state.students);
  scheduleSave('sessions', state.sessions);
  scheduleSave('events', state.events);
  renderClasses();
}
function addStudent(classId){
  const input = document.getElementById('new-student-'+classId);
  const name = input.value.trim();
  if(!name) return;
  state.students.push({id:uid(), name, classId});
  scheduleSave('students', state.students);
  renderClasses();
}
function deleteStudent(studentId){
  if(!confirm('Remove this student from the class?')) return;
  state.students = state.students.filter(s=>s.id!==studentId);
  scheduleSave('students', state.students);
  renderClasses();
}

/* ================= ROLL CALL ================= */
function renderRollCall(){
  if(!state.classes.length){
    document.getElementById('view-rollcall').innerHTML = `
      <div class="topbar"><div><h1>Roll Call</h1></div></div>
      <div class="card empty-card">Add a class first in <a onclick="navigate('classes')">Classes &amp; Students</a>.</div>`;
    return;
  }
  if(!classById(state.rollcall.classId)) state.rollcall.classId = state.classes[0].id;
  const cls = classById(state.rollcall.classId);
  const date = state.rollcall.date;
  const students = studentsInClass(cls.id);
  const sessionKey = cls.id + '_' + date;
  if(!state.sessions[sessionKey]) state.sessions[sessionKey] = {};
  const session = state.sessions[sessionKey];
  let created = false;
  students.forEach(s=>{ if(!session[s.id]){ session[s.id]=defaultRecord(); created=true; } });
  if(created) scheduleSave('sessions', state.sessions);

  const dow = new Date(date+'T00:00:00').getDay();
  const offSchedule = cls.schedule!=='FLEX' && !SCHEDULE_DAYS[cls.schedule].includes(dow);
  const holiday = getHoliday(date);

  document.getElementById('view-rollcall').innerHTML = `
    <div class="topbar">
      <div><h1>Roll Call</h1><div class="meta">${formatDateLong(date)}</div></div>
      <div class="rollcall-controls">
        <select onchange="setRollcallClass(this.value)">
          ${state.classes.map(c=>`<option value="${c.id}" ${c.id===cls.id?'selected':''}>${esc(c.name)}</option>`).join('')}
        </select>
        <input type="date" value="${date}" onchange="setRollcallDate(this.value)">
      </div>
    </div>
    ${holiday?`<div class="warn-banner">🎉 ${formatDateLong(date)} is marked as a holiday: ${esc(holiday.label)}.</div>`:''}
    ${offSchedule?`<div class="warn-banner">${esc(cls.name)} isn't normally scheduled on ${DAY_NAMES[dow]}s (${scheduleLabel(cls.schedule)}).</div>`:''}
    ${students.length ? `
      <div class="rollcall-actions">
        <button class="btn-ghost" onclick="markAllPresent()">Mark all present</button>
        <span class="save-indicator" id="save-indicator"></span>
      </div>
      <div class="card roster-list">
        ${students.map(s=>renderRosterRow(s, session[s.id])).join('')}
      </div>
    ` : `<div class="card empty-card">No students in this class yet. Add students in <a onclick="navigate('classes')">Classes &amp; Students</a>.</div>`}
  `;
}
function renderRosterRow(s, rec){
  const open = state.openDrawer === s.id;
  return `
    <div class="roster-row ${open?'open':''}" onclick="toggleDrawer('${s.id}')">
      <div class="student-name">${esc(s.name)}</div>
      <div class="seg" onclick="event.stopPropagation()">
        <button class="present ${rec.attendance!=='absent'?'on':''}" onclick="setAttendance('${s.id}','present')">Present</button>
        <button class="absent ${rec.attendance==='absent'?'on':''}" onclick="setAttendance('${s.id}','absent')">Absent</button>
      </div>
      <div class="detail-btn">Details ${open?'▾':'▸'}</div>
    </div>
    <div class="drawer">${open?renderDrawer(s, rec):''}</div>
  `;
}

        <button onclick="adjustField('${s.id}','lateMin',1)">+</button>
      </div>
    </div>
    <div class="field"><label>Left early (minutes)</label>
      <div class="stepper">
        <button onclick="adjustField('${s.id}','leftEarlyMin',-1)">−</button>
        <span class="val">${rec.leftEarlyMin} min</span>
        <button onclick="adjustField('${s.id}','leftEarlyMin',1)">+</button>
      </div>
    </div>
    <div class="field"><label>Phone used (times)</label>
      <div class="stepper">
        <button onclick="adjustField('${s.id}','phone',-1)">−</button>
        <span class="val">${rec.phone}</span>
        <button onclick="adjustField('${s.id}','phone',1)">+</button>
      </div>
    </div>
    <div class="field"><label>Homework</label>
      <div class="pill-group">
        <div class="pill green ${rec.hw==='done'?'on':''}" onclick="setField('${s.id}','hw','done')">Done</div>
        <div class="pill red ${rec.hw==='not_done'?'on':''}" onclick="setField('${s.id}','hw','not_done')">Not done</div>
      </div>
    </div>
    <div class="field full"><label>English only</label>
      <div class="pill-group">
        <div class="pill green ${rec.english==='excellent'?'on':''}" onclick="setField('${s.id}','english','excellent')">Excellent</div>
        <div class="pill amber ${rec.english==='improve'?'on':''}" onclick="setField('${s.id}','english','improve')">Room for improvement</div>
        <div class="pill red ${rec.english==='unacceptable'?'on':''}" onclick="setField('${s.id}','english','unacceptable')">Unacceptable</div>
      </div>
    </div>
    <div class="field full"><label>Behavior notes</label>
      <textarea oninput="setNote('${s.id}', this.value)" placeholder="e.g. helped a classmate with the pair activity">${esc(rec.notes)}</textarea>
    </div>
  `;
}
function getCurrentRecord(studentId){
  const key = state.rollcall.classId + '_' + state.rollcall.date;
  if(!state.sessions[key]) state.sessions[key] = {};
  if(!state.sessions[key][studentId]) state.sessions[key][studentId] = defaultRecord();
  return state.sessions[key][studentId];
}
function persistSessions(){ scheduleSave('sessions', state.sessions); }
function setAttendance(studentId, val){
  getCurrentRecord(studentId).attendance = val;
  persistSessions();
  renderRollCall();
}
function adjustField(studentId, field, delta){
  const rec = getCurrentRecord(studentId);
  rec[field] = Math.max(0, rec[field] + delta);
  persistSessions();
  renderRollCall();
}
function setField(studentId, field, val){
  const rec = getCurrentRecord(studentId);
  rec[field] = rec[field]===val ? null : val;
  persistSessions();
  renderRollCall();
}
function setNote(studentId, val){
  getCurrentRecord(studentId).notes = val;
  persistSessions();
}
function toggleDrawer(studentId){
  state.openDrawer = state.openDrawer===studentId ? null : studentId;
  renderRollCall();
}
function markAllPresent(){
  studentsInClass(state.rollcall.classId).forEach(s=>{ getCurrentRecord(s.id).attendance='present'; });
  persistSessions();
  renderRollCall();
}
function setRollcallClass(classId){
  state.rollcall.classId = classId;
  state.openDrawer = null;
  renderRollCall();
}
function setRollcallDate(date){
  state.rollcall.date = date;
  state.openDrawer = null;
  renderRollCall();
}

/* ================= STUDENT PROFILE ================= */
function renderStudentProfile(){
  const student = state.students.find(s=>s.id===state.studentProfileId);
  const returnView = state.studentProfileReturn || 'reports';
  const returnLabel = returnView==='classes' ? '← Back to Classes &amp; Students' : '← Back to Reports';
  if(!student){
    document.getElementById('view-student').innerHTML = `
      <div class="topbar"><div><button class="btn-ghost back-btn" onclick="navigate('${returnView}')">${returnLabel}</button></div></div>
      <div class="card empty-card">Student not found.</div>`;
    return;
  }
  const cls = classById(student.classId);
  const allRecords = [];
  Object.keys(state.sessions).forEach(key=>{
    const [classId, date] = splitSessionKey(key);
    if(classId===student.classId && state.sessions[key][student.id]){
      allRecords.push({date, ...state.sessions[key][student.id]});
    }
  });
  allRecords.sort((a,b)=>b.date.localeCompare(a.date));

  const fromVal = state.reportRange.from || cls?.startDate || '';
  const toVal = state.reportRange.to || cls?.endDate || '';
  const records = allRecords.filter(r => (!fromVal || r.date>=fromVal) && (!toVal || r.date<=toVal));

  const total = records.length;
  const absent = records.filter(r=>r.attendance==='absent').length;
  const late = records.filter(r=>r.attendance!=='absent' && (r.lateMin||0)>0).length;
  const present = total - absent - late;
  const totalPhone = records.reduce((sum,r)=>sum+(r.phone||0),0);
  const hwTotal = records.filter(r=>r.hw!=null).length;
  const hwDone = records.filter(r=>r.hw==='done').length;

  const duration = cls?.duration || 150;
  const expected = cls ? expectedSessionsForClass(cls, fromVal||null, toVal||null) : null;
  const classesLost = absent;
  const attendanceRate = expected ? Math.round(100*(expected-classesLost)/expected) : null;

  const attended = records.filter(r=>r.attendance!=='absent');
  const totalPossibleMin = total * duration;
  const lostLateMin = attended.reduce((s,r)=>s+(r.lateMin||0),0);
  const lostEarlyMin = attended.reduce((s,r)=>s+(r.leftEarlyMin||0),0);
  const absentMin = absent * duration;
  const inClassMin = Math.max(0, totalPossibleMin - lostLateMin - lostEarlyMin - absentMin);

  document.getElementById('view-student').innerHTML = `
    <div class="topbar">
      <div>
        <button class="btn-ghost back-btn no-print" onclick="navigate('${returnView}')">${returnLabel}</button>
        <h1>${esc(student.name)}</h1>
        <div class="meta">${cls?esc(cls.name):'No class'}${cls?.startDate&&cls?.endDate?` · ${formatDateShort(cls.startDate)} – ${formatDateShort(cls.endDate)}`:''}</div>
      </div>
      <button class="btn-accent no-print" onclick="window.print()">🖨️ Print Report</button>
    </div>
    <div class="print-only" style="margin-bottom:14px;font-size:12px;color:var(--muted);">Generated ${formatDateLong(todayStr())}</div>
    <div class="card section no-print" style="margin-bottom:16px;">
      <div class="rollcall-controls" style="flex-wrap:wrap;align-items:center;">
        <label style="font-size:13px;font-weight:600;color:var(--muted);">Report period:</label>
        <input type="date" value="${fromVal}" onchange="setReportRange('from', this.value)">
        <span style="color:var(--muted);font-size:13px;">to</span>
        <input type="date" value="${toVal}" onchange="setReportRange('to', this.value)">
        <button class="btn-ghost small" onclick="resetReportRange()">All time</button>
      </div>
    </div>
    ${ (function(){
      const pd = loadPlacementData(student.id);
      const assessed = pd ? placementAssessed(pd) : 0;
      const avg = pd ? placementAvg(pd) : null;
      const lvlColor = pd ? levelColor(pd) : 'var(--accent)';
      const testDate = pd ? new Date(pd.testDate).toLocaleDateString('pt-BR',{day:'2-digit',month:'short',year:'numeric'}) : '';
      return `
        <div class="card section no-print" style="margin-bottom:16px;border-left:4px solid ${lvlColor}">
          <h3 style="margin-bottom:14px;display:flex;align-items:center;gap:10px;">
            Placement &amp; Progress
            ${pd ? `<span class="badge green" style="background:${lvlColor}22;color:${lvlColor};border:1px solid ${lvlColor}55">${esc(pd.placement)}</span>` : ''}
          </h3>
          ${pd ? `
            <div class="stat-row" style="margin-bottom:14px;">
              <div class="card stat"><div style="font-family:'Sora',sans-serif;font-size:22px;font-weight:700;color:${lvlColor}">${esc(pd.placement)}</div><div class="stat-label">Placed at</div></div>
              <div class="card stat"><div class="stat-num">${assessed}/162</div><div class="stat-label">Assessed</div></div>
              <div class="card stat"><div class="stat-num" style="background:none;-webkit-background-clip:initial;color:${avg!==null?lvlColor:'var(--muted)'}">${avg!==null?avg+'%':'—'}</div><div class="stat-label">Overall avg</div></div>
              <div class="card stat"><div class="stat-label" style="margin-bottom:4px">Test date</div><div style="font-size:13px;font-weight:600">${testDate}</div></div>
            </div>
            <div style="display:flex;gap:8px;flex-wrap:wrap;">
              <a class="btn-accent" href="${placementUrl(student.id,student.name,'tracker')}" target="_blank">📊 Open Tracker</a>
              <a class="btn-ghost" href="${placementUrl(student.id,student.name)}" target="_blank">🔄 Run New Test</a>
            </div>
          ` : `
            <p style="color:var(--muted);font-size:13px;margin-bottom:12px;">No placement test on record for this student.</p>
            <a class="btn-accent" href="${placementUrl(student.id,student.name)}" target="_blank">Run Placement Test →</a>
          `}
        </div>`;
    })()}
    <div class="print-only" style="margin-bottom:10px;font-size:12px;color:var(--muted);">
      Period: ${fromVal?formatDateShort(fromVal):'Start'} – ${toVal?formatDateShort(toVal):'Present'}
    </div>
    <div class="stat-row">
      <div class="card stat"><div class="stat-num">${total}</div><div class="stat-label">Sessions logged</div></div>
      <div class="card stat"><div class="stat-num">${present}</div><div class="stat-label">Present</div></div>
      <div class="card stat"><div class="stat-num">${late}</div><div class="stat-label">Late</div></div>
      <div class="card stat"><div class="stat-num">${absent}</div><div class="stat-label">Absent</div></div>
      <div class="card stat"><div class="stat-num">${totalPhone}</div><div class="stat-label">Phone uses (total)</div></div>
      <div class="card stat"><div class="stat-num">${hwTotal?Math.round(100*hwDone/hwTotal)+'%':'—'}</div><div class="stat-label">Homework done</div></div>
    </div>
    <div class="charts-grid">
      <div class="card chart-card">
        <h3>Attendance</h3>
        <div class="chart-note">Based on ${total} recorded session${total===1?'':'s'}.</div>
        ${renderDonut([
          {label:'Present', value:present, color:'var(--green)'},
          {label:'Late', value:late, color:'var(--amber)'},
          {label:'Absent', value:absent, color:'var(--red)'}
        ], total?`${Math.round(100*(present+late)/total)}%`:'—', 'attended')}
      </div>
      <div class="card chart-card">
        <h3>Time in class</h3>
        <div class="chart-note">Out of ${totalPossibleMin} min possible (${total} session${total===1?'':'s'} × ${duration} min).</div>
        ${renderDonut([
          {label:'In class', value:inClassMin, color:'var(--green)', unit:' min'},
          {label:'Late arrivals', value:lostLateMin, color:'var(--amber)', unit:' min'},
          {label:'Left early', value:lostEarlyMin, color:'var(--purple)', unit:' min'},
          {label:'Absent', value:absentMin, color:'var(--red)', unit:' min'}
        ], (lostLateMin+lostEarlyMin+absentMin)+' min', 'time missed')}
      </div>
    </div>
    <div class="card section">
      <h3>Classes lost</h3>
      <div class="lost-summary">
        <b>${classesLost}</b> class${classesLost===1?'':'es'} marked absent${expected!=null ? `
        out of <b>${expected}</b> expected class${expected===1?'':'es'}
        (${fromVal?formatDateShort(fromVal):'?'} – ${toVal?formatDateShort(toVal):'?'}, holidays excluded).<br>
        Attendance rate: <b>${attendanceRate}%</b>.` : ` so far. <a class="no-print" onclick="navigate('classes');setTimeout(()=>openClassModal('${cls?.id}'),0)">Set first/last class dates</a><span class="print-only">Set first/last class dates</span> on this class to calculate an expected total and attendance rate.`}
      </div>
    </div>
    <div class="card table-wrap">
      ${records.length ? `
      <table>
        <thead><tr><th>Date</th><th>Attendance</th><th>Late</th><th>Left early</th><th>Phone</th><th>HW</th><th>English only</th><th>Notes</th></tr></thead>
        <tbody>
          ${records.map(r=>`
            <tr>
              <td>${formatDateShort(r.date)}</td>
              <td><span class="badge ${attendanceBadgeClass(r.attendance)}">${attendanceLabel(r.attendance)}</span></td>
              <td>${r.lateMin?r.lateMin+' min':'—'}</td>
              <td>${r.leftEarlyMin?r.leftEarlyMin+' min':'—'}</td>
              <td>${r.phone||'—'}</td>
              <td>${r.hw?(r.hw==='done'?'Yes':'No'):'—'}</td>
              <td>${r.english?`<span class="badge ${englishBadgeClass(r.english)}">${englishLabel(r.english)}</span>`:'—'}</td>
              <td>${r.notes?esc(r.notes):'—'}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
      ` : `<div class="empty-card">No session records in this period.</div>`}
    </div>
  `;
}
function setReportRange(which, val){
  state.reportRange[which] = val || '';
  renderStudentProfile();
}
function resetReportRange(){
  state.reportRange = {from:'', to:''};
  renderStudentProfile();
}

/* ================= REPORTS ================= */
function renderReports(){
  if(!classById(state.reportsSelection.classId)) state.reportsSelection.classId = state.classes[0]?.id || '';
  const selClassId = state.reportsSelection.classId;
  const studentsForClass = selClassId ? studentsInClass(selClassId) : [];
  if(!studentsForClass.find(s=>s.id===state.reportsSelection.studentId)){
    state.reportsSelection.studentId = studentsForClass[0]?.id || '';
  }
  const selStudentId = state.reportsSelection.studentId;

  document.getElementById('view-reports').innerHTML = `
    <div class="topbar"><div><h1>Reports</h1><div class="meta">Printable attendance &amp; observation reports per student</div></div></div>
    ${state.classes.length ? `
      <div class="card section" style="margin-bottom:16px;">
        <div class="rollcall-controls" style="flex-wrap:wrap;align-items:center;">
          <select onchange="setReportsClass(this.value)">
            ${state.classes.map(c=>`<option value="${c.id}" ${c.id===selClassId?'selected':''}>${esc(c.name)}</option>`).join('')}
          </select>
          <select onchange="setReportsStudent(this.value)" ${studentsForClass.length?'':'disabled'}>
            ${studentsForClass.length ? studentsForClass.map(s=>`<option value="${s.id}" ${s.id===selStudentId?'selected':''}>${esc(s.name)}</option>`).join('') : `<option>No students in this class</option>`}
          </select>
          <button class="btn-accent" ${selStudentId?'':'disabled'} onclick="navigate('student',{studentProfileId:'${selStudentId}', studentProfileReturn:'reports'})">View Report →</button>
        </div>
      </div>
    ` : ''}
    ${state.classes.length ? state.classes.map(c=>`
      <div class="card section" style="margin-bottom:12px;">
        <h3 style="display:flex;align-items:center;gap:8px;"><span class="color-dot" style="background:${c.color}"></span>${esc(c.name)}</h3>
        ${studentsInClass(c.id).length ? studentsInClass(c.id).map(s=>`
          <div class="dash-row">
            <div class="dash-row-left" style="gap:8px">${(()=>{const _pd=loadPlacementData(s.id);return _pd?`<span class="badge green" style="font-size:10px">${esc(_pd.placement)}</span>`:''})()}<div class="dash-row-title">${esc(s.name)}</div></div>
            <button class="btn-ghost small" onclick="navigate('student',{studentProfileId:'${s.id}', studentProfileReturn:'reports'})">View report →</button>
          </div>
        `).join('') : `<div class="empty">No students in this class yet.</div>`}
      </div>
    `).join('') : `<div class="card empty-card">Add a class and students first in <a onclick="navigate('classes')">Classes &amp; Students</a>.</div>`}
  `;
}
function setReportsClass(classId){
  state.reportsSelection.classId = classId;
  state.reportsSelection.studentId = '';
  renderReports();
}
function setReportsStudent(studentId){
  state.reportsSelection.studentId = studentId;
}

/* ================= CALENDAR ================= */
function renderCalendar(){
  const {year, month} = state.calendar;
  const firstDay = new Date(year, month, 1);
  const startWeekday = firstDay.getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const monthName = firstDay.toLocaleString('en-US',{month:'long'});

  let cells = '';
  for(let i=0;i<startWeekday;i++) cells += `<div class="cal-cell empty"></div>`;
  for(let d=1; d<=daysInMonth; d++){
    const dateStr = dateToStr(year, month, d);
    const dow = new Date(year, month, d).getDay();
    const classesToday = state.classes.filter(c=>c.schedule!=='FLEX'&&SCHEDULE_DAYS[c.schedule].includes(dow));
    const flexToday = state.bookedSessions.filter(s=>s.date===dateStr).map(s=>({cls:classById(s.classId),time:s.time})).filter(x=>x.cls);
    const eventsToday = state.events.filter(e=>e.date===dateStr);
    const isToday = dateStr===todayStr();
    const holiday = getHoliday(dateStr);
    cells += `
      <div class="cal-cell ${isToday?'today':''} ${holiday?'holiday':''}" onclick="openDayModal('${dateStr}')">
        <div class="cal-date">${d}</div>
        <div class="cal-items">
          ${holiday?`<div class="cal-tag holiday-tag">🎉 ${esc(holiday.label)}</div>`:''}
          ${!holiday?[...classesToday.map(c=>`<div class="cal-tag" style="background:${c.color}22;color:${c.color};border-color:${c.color}55">${esc(c.name)}</div>`),...flexToday.map(x=>`<div class="cal-tag" style="background:${x.cls.color}22;color:${x.cls.color};border-color:${x.cls.color}55">${esc(x.cls.name)}${x.time?' &middot; '+x.time:''}</div>`)].join(''):''}
          ${eventsToday.map(e=>`<div class="cal-tag ${e.type}">${esc(e.title)}</div>`).join('')}
        </div>
      </div>`;
  }

  document.getElementById('view-calendar').innerHTML = `
    <div class="topbar">
      <div><h1>Calendar</h1></div>
      <div class="cal-nav">
        <button class="btn-ghost" onclick="changeMonth(-1)">←</button>
        <div class="cal-month-label">${monthName} ${year}</div>
        <button class="btn-ghost" onclick="changeMonth(1)">→</button>
        <button class="btn-ghost" onclick="goToCurrentMonth()">Today</button>
      </div>
    </div>
    <div class="card cal-grid-wrap">
      <div class="cal-weekdays">${['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d=>`<div>${d}</div>`).join('')}</div>
      <div class="cal-grid">${cells}</div>
    </div>
    <div class="cal-legend">
      ${state.classes.map(c=>`<div class="legend-item"><span class="color-dot" style="background:${c.color}"></span>${esc(c.name)}</div>`).join('')}
      <div class="legend-item"><span class="badge hw">HW</span> Homework due</div>
      <div class="legend-item"><span class="badge test">Test</span> Test</div>
      <div class="legend-item"><span class="badge project">Project</span> Project</div>
      <div class="legend-item"><span class="badge other">Other</span> Other</div>
      <div class="legend-item">🎉 Holiday</div>
    </div>
  `;
}
function changeMonth(delta){
  let {year, month} = state.calendar;
  month += delta;
  if(month<0){ month=11; year--; }
  if(month>11){ month=0; year++; }
  state.calendar = {year, month};
  renderCalendar();
}
function goToCurrentMonth(){
  const now = new Date();
  state.calendar = {year: now.getFullYear(), month: now.getMonth()};
  renderCalendar();
}
function openDayModal(dateStr){
  const dow = new Date(dateStr+'T00:00:00').getDay();
  const classesToday = state.classes.filter(c=>c.schedule!=='FLEX'&&SCHEDULE_DAYS[c.schedule].includes(dow));
  const bookedToday  = state.bookedSessions.filter(s=>s.date===dateStr);
  const eventsToday  = state.events.filter(e=>e.date===dateStr);
  const holiday      = getHoliday(dateStr);
  const flexClasses  = state.classes.filter(c=>c.schedule==='FLEX');
  showModal(`
    <h3>${formatDateLong(dateStr)}</h3>
    <div class="modal-section">
      <div class="modal-section-label">Holiday</div>
      ${holiday ? `
        <div class="modal-row">
          <span>🎉 ${esc(holiday.label)}</span>
          <button class="icon-btn danger" onclick="removeHoliday('${dateStr}')">Remove</button>
        </div>
      ` : `
        <div class="field-row">
          <input id="holiday-label" type="text" placeholder="e.g. Carnival, school break" style="flex:1;">
          <button class="btn-ghost small" onclick="markHoliday('${dateStr}')">Mark as holiday</button>
        </div>
      `}
    </div>
    ${classesToday.length ? `
      <div class="modal-section">
        <div class="modal-section-label">Classes</div>
        ${classesToday.map(c=>`
          <div class="modal-row">
            <span><span class="color-dot" style="background:${c.color}"></span>${esc(c.name)}${c.time?' · '+c.time:''}</span>
            <button class="btn-ghost small" onclick="goToRollCall('${c.id}','${dateStr}');closeModal();">Roll Call →</button>
          </div>
        `).join('')}
      </div>
    ` : ''}
    ${bookedToday.length ? `
      <div class="modal-section">
        <div class="modal-section-label">Booked Sessions</div>
        ${bookedToday.map(s=>{ const c=classById(s.classId); return c?`
          <div class="modal-row">
            <span><span class="color-dot" style="background:${c.color}"></span>${esc(c.name)}${s.time?' · '+s.time:''}</span>
            <div style="display:flex;gap:6px">
              <button class="btn-ghost small" onclick="goToRollCall('${s.classId}','${dateStr}');closeModal();">Roll Call →</button>
              <button class="icon-btn danger" onclick="removeBookedSession('${s.id}','${dateStr}')">×</button>
            </div>
          </div>
        `:''}).join('')}
      </div>
    ` : ''}
    ${flexClasses.length ? `
      <div class="modal-section">
        <div class="modal-section-label">Book a Session</div>
        <div class="field-row">
          <select id="bs-class" style="flex:1">
            ${flexClasses.map(c=>`<option value="${c.id}">${esc(c.name)}</option>`).join('')}
          </select>
          <input type="time" id="bs-time" style="width:110px" placeholder="Time (optional)">
          <button class="btn-ghost small" onclick="bookSession('${dateStr}')">Book</button>
        </div>
      </div>
    ` : ''}
    <div class="modal-section">
      <div class="modal-section-label">Events</div>
      ${eventsToday.length ? eventsToday.map(e=>`
        <div class="modal-row">
          <span><span class="badge ${e.type}">${eventTypeLabel(e.type)}</span> ${esc(e.title)}${e.classId?' · '+esc(classById(e.classId)?.name||''):''}</span>
          <button class="icon-btn danger" onclick="deleteEvent('${e.id}','${dateStr}')">×</button>
        </div>
      `).join('') : `<div class="empty">No events.</div>`}
    </div>
    <div class="modal-section">
      <div class="modal-section-label">Add event</div>
      <div class="field"><input id="ev-title" type="text" placeholder="e.g. Vocab quiz, Project due"></div>
      <div class="field-row">
        <select id="ev-type">
          <option value="hw">Homework due</option>
          <option value="test">Test</option>
          <option value="project">Project</option>
          <option value="other">Other</option>
        </select>
        <select id="ev-class">
          <option value="">No class</option>
          ${state.classes.map(c=>`<option value="${c.id}">${esc(c.name)}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeModal()">Close</button>
      <button class="btn-accent" onclick="addEvent('${dateStr}')">Add event</button>
    </div>
  `);
}
function bookSession(dateStr){
  const classId = document.getElementById('bs-class').value;
  const time    = document.getElementById('bs-time').value || null;
  if(!classId) return;
  state.bookedSessions.push({id:uid(), classId, date:dateStr, time});
  scheduleSave('bookedSessions', state.bookedSessions);
  renderCalendar();
  openDayModal(dateStr);
}
function removeBookedSession(sessionId, dateStr){
  state.bookedSessions = state.bookedSessions.filter(s=>s.id!==sessionId);
  scheduleSave('bookedSessions', state.bookedSessions);
  renderCalendar();
  openDayModal(dateStr);
}
function addEvent(dateStr){
  const title = document.getElementById('ev-title').value.trim();
  if(!title) return;
  const type = document.getElementById('ev-type').value;
  const classId = document.getElementById('ev-class').value || null;
  state.events.push({id:uid(), date:dateStr, title, type, classId});
  scheduleSave('events', state.events);
  closeModal();
  renderCalendar();
}
function deleteEvent(eventId, dateStr){
  state.events = state.events.filter(e=>e.id!==eventId);
  scheduleSave('events', state.events);
  renderCalendar();
  openDayModal(dateStr);
}
function markHoliday(dateStr){
  const label = document.getElementById('holiday-label').value.trim() || 'Holiday';
  state.holidays.push({id:uid(), date:dateStr, label});
  scheduleSave('holidays', state.holidays);
  renderCalendar();
  openDayModal(dateStr);
}
function removeHoliday(dateStr){
  state.holidays = state.holidays.filter(h=>h.date!==dateStr);
  scheduleSave('holidays', state.holidays);
  renderCalendar();
  openDayModal(dateStr);
}

/* ================= BACKUP / RESTORE ================= */
function exportData(){
  const data = {
    app: 'efl-teacher-dashboard',
    exportedAt: new Date().toISOString(),
    classes: state.classes,
    students: state.students,
    sessions: state.sessions,
    events: state.events,
    holidays: state.holidays,
    bookedSessions: state.bookedSessions
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `efl-dashboard-backup-${todayStr()}.json`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}
function importData(file){
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (e)=>{
    let data;
    try{
      data = JSON.parse(e.target.result);
    }catch(err){
      alert("Could not read this file — make sure it's a backup JSON exported from this dashboard.");
      return;
    }
    if(!data || !Array.isArray(data.classes)){
      alert("This file doesn't look like a valid dashboard backup.");
      return;
    }
    if(!confirm('This will replace ALL current classes, students, roll call records, calendar events, and holidays with the contents of this backup. Continue?')) return;
    state.classes = data.classes || [];
    state.students = data.students || [];
    state.sessions = data.sessions || {};
    state.events = data.events || [];
    state.holidays = data.holidays || [];
    state.bookedSessions = data.bookedSessions || [];
    saveKey('classes', state.classes);
    saveKey('students', state.students);
    saveKey('sessions', state.sessions);
    saveKey('events', state.events);
    saveKey('holidays', state.holidays);
    saveKey('bookedSessions', state.bookedSessions);
    state.expandedClassId = null;
    state.openDrawer = null;
    state.reportsSelection = {classId:'', studentId:''};
    navigate('dashboard');
    alert('Backup restored.');
  };
  reader.readAsText(file);
}

/* ================= INIT ================= */
async function init(){
  state.classes = await loadKey('classes', []);
  state.students = await loadKey('students', []);
  state.sessions = await loadKey('sessions', {});
  state.events = await loadKey('events', []);
  state.holidays = await loadKey('holidays', []);
  state.bookedSessions = await loadKey('bookedSessions', []);
  navigate('dashboard');
}
init();
</script>
