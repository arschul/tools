/* ---------- navigation ---------- */
function navigate(view, params={}){
  Object.assign(state, params);
  state.view = view;
  const navMap = {dashboard:'dashboard', classes:'classes', rollcall:'rollcall', calendar:'calendar', student: state.studentProfileReturn||'reports', reports:'reports', 'group-report':'reports'};
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.toggle('active', n.dataset.view===navMap[view]));
  document.querySelectorAll('.view').forEach(v=>v.classList.toggle('active', v.id==='view-'+view));
  if(view==='dashboard') renderDashboard();
  if(view==='classes') renderClasses();
  if(view==='rollcall') renderRollCall();
  if(view==='calendar') renderCalendar();
  if(view==='student') renderStudentProfile();
  if(view==='reports') renderReports();
  if(view==='group-report') renderGroupReport();
}
function goToRollCall(classId, date){
  state.rollcall.classId = classId;
  state.rollcall.date = date;
  state.openDrawer = null;
  navigate('rollcall');
}

/* ================= DASHBOARD ================= */
function renderDashboard(){
  const el = document.getElementById('view-dashboard');
  try { _renderDashboard(el); }
  catch(e){
    el.innerHTML = `<div class="card empty-card" style="color:var(--red);">
      <b>Dashboard error — please copy this and report it:</b><br><br>
      <code style="font-size:12px;word-break:break-all;">${esc(e?.stack||e?.message||String(e))}</code>
    </div>`;
  }
}
function _renderDashboard(el){
  if(!activeClasses().length){
    el.innerHTML = `
      <div class="topbar"><div><h1>Dashboard</h1><div class="meta">${formatDateLong(todayStr())}</div></div></div>
      <div class="card empty-card">
        <p>Welcome! Start by adding your first class.</p>
        <button class="btn-accent" onclick="navigate('classes');setTimeout(openClassModal,0)">+ Add a class</button>
      </div>`;
    return;
  }
  const today = todayStr();
  const todayHoliday = getHoliday(today);
  const dow = new Date(today+'T00:00:00').getDay();
  const todaysClasses = todayHoliday ? [] : activeClasses().filter(c=>{
    if(!getClassDays(c).includes(dow)) return false;
    if(c.startDate && today < c.startDate) return false;
    if(c.endDate && today > c.endDate) return false;
    return true;
  });
  const upcoming = state.events.filter(e=>e.date>=today).sort((a,b)=>a.date.localeCompare(b.date)).slice(0,6);

  // — Pending session completions (today + recent past days with data but not marked complete) —
  const pendingCompletions = [];
  activeClasses().forEach(c=>{
    const days = getClassDays(c);
    for(let i=0; i<8; i++){
      const d = new Date(today+'T00:00:00');
      d.setDate(d.getDate()-i);
      const dateStr = dateToStr(d.getFullYear(), d.getMonth(), d.getDate());
      if(!days.includes(d.getDay())) continue;
      if(isHoliday(dateStr)) continue;
      if(c.startDate && dateStr < c.startDate) continue;
      if(c.endDate && dateStr > c.endDate) continue;
      const sessionKey = c.id+'_'+dateStr;
      const hasData = !!state.sessions[sessionKey] && Object.keys(state.sessions[sessionKey]).length>0;
      if(!hasData) continue;
      const completed = isSessionCompleted(c.id, dateStr);
      if(!completed){
        pendingCompletions.push({cls:c, date:dateStr, isToday: dateStr===today});
      }
    }
  });
  pendingCompletions.sort((a,b)=>a.date.localeCompare(b.date));

  // — Today's classes —
  let todayHtml = '';
  if(todayHoliday){
    todayHtml = `<div class="empty">🎉 Holiday: ${esc(todayHoliday.label)} — no classes today.</div>`;
  } else if(todaysClasses.length){
    todayHtml = todaysClasses.map(c=>`
      <div class="dash-row">
        <div class="dash-row-left">
          <span class="color-dot" style="background:${c.color}"></span>
          <div>
            <div class="dash-row-title">${esc(c.name)}</div>
            <div class="dash-row-sub">${c.time?c.time+' · ':''}${studentsInClass(c.id).length} students</div>
          </div>
        </div>
        <button class="btn-accent" onclick="goToRollCall('${c.id}','${today}')">Start Roll Call →</button>
      </div>`).join('');
  } else {
    todayHtml = `<div class="empty">No classes scheduled today.</div>`;
  }

  // — Upcoming —
  const upcomingHtml = upcoming.length ? upcoming.map(e=>`
    <div class="dash-row">
      <div class="dash-row-left">
        <span class="badge ${e.type}">${eventTypeLabel(e.type)}</span>
        <div>
          <div class="dash-row-title" style="font-size:15px;">${esc(e.title)}</div>
          <div class="dash-row-sub">${formatDateShort(e.date)}${e.classId?' · '+esc(classById(e.classId)?.name||''):''}</div>
        </div>
      </div>
    </div>`).join('')
    : `<div class="empty">No upcoming items. <a onclick="navigate('calendar')">Add one in Calendar</a></div>`;

  // — Contact Parents —
  const cpStudents = state.students.filter(s=>{ const c=classById(s.classId); return s.contactParents?.reason && c && !c.archived; });
  window._dashCpIds = cpStudents.map(s=>s.id);
  const cpHtml = cpStudents.length ? `
    <div class="card section" style="margin-top:16px;border-left:4px solid var(--red);">
      <h3>📞 Contact Parents</h3>
      ${cpStudents.map((s,i)=>{ const c=classById(s.classId); return `
        <div class="dash-row">
          <div class="dash-row-left">
            ${c?`<span class="color-dot" style="background:${c.color}"></span>`:''}
            <div>
              <div class="dash-row-title">${esc(s.name)} <span class="badge red" style="margin-left:6px;">${esc(s.contactParents.category)}</span></div>
              <div class="dash-row-sub">${esc(s.contactParents.reason)}</div>
            </div>
          </div>
          <div style="display:flex;gap:8px;">
            <button class="btn-ghost small" onclick="navigate('student',{studentProfileId:window._dashCpIds[${i}],studentProfileReturn:'reports'})">Report →</button>
            <button class="icon-btn" onclick="clearContactParents(window._dashCpIds[${i}])">✓ Done</button>          </div>
        </div>`; }).join('')}
    </div>` : '';

  // — English Club —
  const ecStudents = state.students.filter(s=>{ const c=classById(s.classId); return s.englishClub && c && !c.archived; });
  window._dashEcIds = ecStudents.map(s=>s.id);
  const ecHtml = ecStudents.length ? `
    <div class="card section" style="margin-top:16px;">
      <div class="dash-row-left" style="cursor:pointer;" onclick="state.showDashEC=!state.showDashEC;renderDashboard();">
        <span class="chevron">${state.showDashEC?'▾':'▸'}</span>
        <h3 style="margin:0;">⭐ English Club (${ecStudents.length})</h3>
      </div>
      ${state.showDashEC ? ecStudents.map((s,i)=>{ const c=classById(s.classId); return `
        <div class="dash-row">
          <div class="dash-row-left">
            ${c?`<span class="color-dot" style="background:${c.color}"></span>`:''}
            <div>
              <div class="dash-row-title">${esc(s.name)}</div>
              <div class="dash-row-sub">${c?esc(c.name):'No class'}</div>
            </div>
          </div>
          <button class="btn-ghost small" onclick="navigate('student',{studentProfileId:window._dashEcIds[${i}],studentProfileReturn:'reports'})">Report →</button>
        </div>`; }).join('') : ''}
    </div>` : '';

  // — Pending completions —
  window._dashPendingClassIds = pendingCompletions.map(p=>p.cls.id);
  window._dashPendingDates = pendingCompletions.map(p=>p.date);
  const pendingHtml = pendingCompletions.length ? `
    <div class="card section" style="margin-bottom:16px;border-left:4px solid var(--amber);">
      <h3>⏳ Sessions awaiting completion</h3>
      <div style="font-size:12px;color:var(--muted);margin-bottom:8px;">These have roll call data but aren't marked complete yet, so they're not counted in reports.</div>
      ${pendingCompletions.map((p,i)=>`
        <div class="dash-row">
          <div class="dash-row-left">
            <span class="color-dot" style="background:${p.cls.color}"></span>
            <div>
              <div class="dash-row-title">${esc(p.cls.name)}</div>
              <div class="dash-row-sub">${formatDateShort(p.date)}${p.isToday?' · Today':''}</div>
            </div>
          </div>
          <div style="display:flex;gap:8px;">
            <button class="btn-ghost small" onclick="goToRollCall(window._dashPendingClassIds[${i}], window._dashPendingDates[${i}])">Open Roll Call →</button>
            <button class="btn-accent" style="padding:7px 12px;font-size:12px;" onclick="toggleSessionCompleted(window._dashPendingClassIds[${i}], window._dashPendingDates[${i}]); renderDashboard();">✓ Complete</button>
          </div>
        </div>`).join('')}
    </div>` : '';

  el.innerHTML = `
    <div class="topbar"><div><h1>Dashboard</h1><div class="meta">${formatDateLong(today)}</div></div></div>
    <div class="stat-row">
      <div class="card stat"><div class="stat-num">${activeClasses().length}</div><div class="stat-label">Classes</div></div>
      <div class="card stat"><div class="stat-num">${state.students.filter(s=>{const c=classById(s.classId);return c&&!c.archived;}).length}</div><div class="stat-label">Students</div></div>
      <div class="card stat"><div class="stat-num">${todaysClasses.length}</div><div class="stat-label">Classes today</div></div>
    </div>
    ${pendingHtml}
    <div class="dash-grid" style="grid-template-columns:1fr 2fr;">
      <div class="card section"><h3>Today's Classes</h3>${todayHtml}</div>
      <div class="card section"><h3>Upcoming</h3>${upcomingHtml}</div>
    </div>
    ${cpHtml}
    ${ecHtml}
  `;
}

/* ================= CLASSES & STUDENTS ================= */
function renderClasses(){
  const active = activeClasses();
  const archived = archivedClasses();
  const activeStudentCount = state.students.filter(s=>{ const c=classById(s.classId); return c && !c.archived; }).length;
  document.getElementById('view-classes').innerHTML = `
    <div class="topbar">
      <div><h1>Classes &amp; Students</h1><div class="meta">${active.length} classes · ${activeStudentCount} students</div></div>
      <button class="btn-accent" onclick="openClassModal()">+ Add class</button>
    </div>
    ${active.length ? active.map(c=>renderClassCard(c,false)).join('') : `
      <div class="card empty-card">
        <p>No active classes.</p>
        <button class="btn-accent" onclick="openClassModal()">+ Add your first class</button>
      </div>`}
    ${archived.length ? `
      <div style="margin-top:24px;">
        <div class="dash-row-left" style="cursor:pointer;margin-bottom:8px;" onclick="state.showArchived=!state.showArchived;renderClasses();">
          <span class="chevron">${state.showArchived?'▾':'▸'}</span>
          <h3 style="font-size:15px;color:var(--muted);">Archived classes (${archived.length})</h3>
        </div>
        ${state.showArchived ? archived.map(c=>renderClassCard(c,true)).join('') : ''}
      </div>` : ''}
  `;
}
function renderClassCard(c, isArchived){
  const students = studentsInClass(c.id);
  const expanded = state.expandedClassId === c.id;
  return `
    <div class="card class-card" ${isArchived?'style="opacity:.75;"':''}>
      <div class="class-card-head">
        <div class="dash-row-left" onclick="toggleClassExpand('${c.id}')">
          <span class="color-dot" style="background:${c.color}"></span>
          <div>
            <div class="dash-row-title">${esc(c.name)}${isArchived?` <span class="badge other" style="margin-left:6px;">Archived</span>`:''}</div>
            <div class="dash-row-sub">${scheduleLabel(c)}${c.time?' · '+c.time:''} · ${students.length} students</div>
          </div>
          <span class="chevron" style="margin-left:8px;">${expanded?'▾':'▸'}</span>
        </div>
        <div class="class-card-actions">
          ${isArchived
            ? `<button class="icon-btn" onclick="unarchiveClass('${c.id}')">↩ Unarchive</button>
               <button class="icon-btn danger" onclick="deleteClass('${c.id}')">Delete</button>`
            : `<button class="icon-btn" onclick="openClassModal('${c.id}')">Edit</button>
               <button class="icon-btn" onclick="archiveClass('${c.id}')">📦 Archive</button>`}
        </div>
      </div>
      ${expanded ? `
        <div class="class-card-body">
          <div class="add-student-row">
            <input type="text" id="new-student-${c.id}" placeholder="Student name" onkeydown="if(event.key==='Enter') addStudent('${c.id}')">
            <button class="btn-accent" onclick="addStudent('${c.id}')">+ Add student</button>
          </div>
          ${students.length ? `
            <div class="student-list">
              ${students.map(s=>`
                <div class="student-list-row">
                  <span class="student-name-link" onclick="navigate('student',{studentProfileId:'${s.id}', studentProfileReturn:'classes'})">${esc(s.name)}</span>
                  <div style="display:flex;align-items:center;gap:8px;">
                    <button class="icon-btn ${s.contactParents?.reason?'danger':''}" onclick="openContactParentsModal('${s.id}')" title="${s.contactParents?.reason?'Contact parents flagged — click to edit':'Flag for contact parents'}">
                      📞${s.contactParents?.reason?' ●':''}
                    </button>
                    <button class="icon-btn ${s.englishClub?'ec-on':''}" onclick="toggleEnglishClub('${s.id}')" title="English Club">
                      ${s.englishClub?'⭐ English Club':'☆ English Club'}
                    </button>
                    <button class="icon-btn danger" onclick="deleteStudent('${s.id}')">Remove</button>
                  </div>
                </div>
              `).join('')}
            </div>
          ` : `<div class="empty">No students yet. Add the first one above.</div>`}
        </div>
      ` : ''}
    </div>
  `;
}
function toggleClassExpand(classId){
  state.expandedClassId = state.expandedClassId===classId ? null : classId;
  renderClasses();
}
function openClassModal(classId){
  const c = classId ? classById(classId) : null;
  const currentDays = c ? getClassDays(c) : [1,3]; // default Mon/Wed
  const dayOptions = [
    [1,'Mon'],[2,'Tue'],[3,'Wed'],[4,'Thu'],[5,'Fri'],[6,'Sat'],[0,'Sun']
  ];
  showModal(`
    <h3>${c?'Edit class':'Add class'}</h3>
    <div class="field"><label>Class name</label><input id="cm-name" type="text" value="${c?esc(c.name):''}" placeholder="e.g. Turma B1"></div>
    <div class="field"><label>Days</label>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        ${dayOptions.map(([d,label])=>`
          <label style="display:flex;align-items:center;gap:5px;font-size:13px;font-weight:500;cursor:pointer;
            padding:6px 12px;border:1px solid var(--border);border-radius:999px;
            background:${currentDays.includes(d)?'var(--accent-soft)':'#fff'};
            color:${currentDays.includes(d)?'var(--accent)':'var(--muted)'};"
            id="cm-day-label-${d}">
            <input type="checkbox" id="cm-day-${d}" value="${d}" ${currentDays.includes(d)?'checked':''}
              style="display:none;" onchange="updateDayLabel(${d})">
            ${label}
          </label>`).join('')}
      </div>
    </div>
    <div class="field"><label>Time (optional)</label><input id="cm-time" type="time" value="${c?.time||''}"></div>
    <div class="field-row">
      <div class="field" style="flex:1;"><label>First class date</label><input id="cm-start" type="date" value="${c?.startDate||''}"></div>
      <div class="field" style="flex:1;"><label>Last class date</label><input id="cm-end" type="date" value="${c?.endDate||''}"></div>
    </div>
    <div class="field"><label>Class duration (minutes)</label><input id="cm-duration" type="number" min="1" step="5" value="${c?.duration||150}"></div>
    <div class="field"><label>Color</label>
      <div class="swatches">
        ${PALETTE.map(col=>`<div class="swatch ${ (c?c.color===col:col===PALETTE[0]) ?'on':''}" style="background:${col}" onclick="selectSwatch(this,'${col}')"></div>`).join('')}
      </div>
      <input type="hidden" id="cm-color" value="${c?.color||PALETTE[0]}">
    </div>
    <div class="modal-actions" style="${c?'justify-content:space-between;':''}">
      ${c?`<button class="icon-btn danger" onclick="closeModal();deleteClass('${c.id}')">Delete class</button>`:''}
      <div style="display:flex;gap:10px;">
        <button class="btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn-accent" onclick="saveClass(${c?`'${c.id}'`:'null'})">${c?'Save changes':'Add class'}</button>
      </div>
    </div>
  `);
}
function updateDayLabel(d){
  const cb = document.getElementById('cm-day-'+d);
  const label = document.getElementById('cm-day-label-'+d);
  if(!cb||!label) return;
  label.style.background = cb.checked ? 'var(--accent-soft)' : '#fff';
  label.style.color = cb.checked ? 'var(--accent)' : 'var(--muted)';
  label.style.borderColor = cb.checked ? 'var(--accent)' : 'var(--border)';
}
function selectSwatch(el, color){
  el.parentElement.querySelectorAll('.swatch').forEach(s=>s.classList.remove('on'));
  el.classList.add('on');
  document.getElementById('cm-color').value = color;
}
function saveClass(classId){
  const name = document.getElementById('cm-name').value.trim();
  if(!name) return;
  const days = [1,2,3,4,5,6,0].filter(d=>document.getElementById('cm-day-'+d)?.checked);
  if(!days.length){ alert('Please select at least one day.'); return; }
  const time = document.getElementById('cm-time').value;
  const color = document.getElementById('cm-color').value;
  const startDate = document.getElementById('cm-start').value || null;
  const endDate = document.getElementById('cm-end').value || null;
  const duration = parseInt(document.getElementById('cm-duration').value) || 150;
  if(classId){
    const c = classById(classId);
    c.name=name; c.days=days; c.time=time; c.color=color; c.startDate=startDate; c.endDate=endDate; c.duration=duration;
  }else{
    state.classes.push({id:uid(), name, days, time, color, startDate, endDate, duration});
  }
  scheduleSave('classes', state.classes);
  closeModal();
  renderClasses();
}
function deleteClass(classId){
  if(!confirm('Delete this class, its students, and all roll call records for it? This cannot be undone.')) return;
  state.classes = state.classes.filter(c=>c.id!==classId);
  state.students = state.students.filter(s=>s.classId!==classId);
  Object.keys(state.sessions).forEach(k=>{ if(splitSessionKey(k)[0]===classId) delete state.sessions[k]; });
  state.events = state.events.filter(e=>e.classId!==classId);
  if(state.expandedClassId===classId) state.expandedClassId=null;
  scheduleSave('classes', state.classes);
  scheduleSave('students', state.students);
  scheduleSave('sessions', state.sessions);
  scheduleSave('events', state.events);
  renderClasses();
}
function archiveClass(classId){
  const c = classById(classId);
  if(!c) return;
  // Contact Parents must be resolved before archiving (per spec Q1)
  const pending = state.students.filter(s=>s.classId===classId && s.contactParents?.reason);
  if(pending.length){
    alert(`Cannot archive: ${pending.length} student(s) still have an unresolved Contact Parents flag (${pending.map(s=>s.name).join(', ')}). Mark those as done first.`);
    return;
  }
  if(!confirm(`Archive "${c.name}"? It will be removed from Roll Call, Calendar and the Dashboard, but all its data and reports are kept. You can unarchive anytime.`)) return;
  c.archived = true;
  c.archivedAt = todayStr();
  // Clear English Club flags for this class's students (per spec Q1)
  state.students.forEach(s=>{ if(s.classId===classId && s.englishClub) s.englishClub=false; });
  if(state.expandedClassId===classId) state.expandedClassId=null;
  scheduleSave('classes', state.classes);
  scheduleSave('students', state.students);
  renderClasses();
}
function unarchiveClass(classId){
  const c = classById(classId);
  if(!c) return;
  c.archived = false;
  delete c.archivedAt;
  scheduleSave('classes', state.classes);
  renderClasses();
}
function addStudent(classId){
  const input = document.getElementById('new-student-'+classId);
  const name = input.value.trim();
  if(!name) return;
  state.students.push({id:uid(), name, classId});
  scheduleSave('students', state.students);
  renderClasses();
}
function openContactParentsModal(studentId){
  const s = state.students.find(st=>st.id===studentId);
  if(!s) return;
  const cp = s.contactParents || {};
  showModal(`
    <h3>📞 Contact Parents — ${esc(s.name)}</h3>
    <div class="field"><label>Reason category</label>
      <select id="cp-cat">
        <option value="English Club" ${cp.category==='English Club'?'selected':''}>English Club</option>
        <option value="Grades" ${cp.category==='Grades'?'selected':''}>Grades</option>
        <option value="Behavior" ${cp.category==='Behavior'?'selected':''}>Behavior</option>
        <option value="Other" ${cp.category==='Other'||!cp.category?'selected':''}>Other</option>
      </select>
    </div>
    <div class="field"><label>Notes / reason</label>
      <textarea id="cp-reason" rows="3" style="width:100%;border:1px solid var(--border);border-radius:8px;padding:8px;font-family:inherit;font-size:14px;">${esc(cp.reason||'')}</textarea>
    </div>
    <div class="modal-actions">
      ${cp.reason?`<button class="btn-ghost" onclick="closeModal();clearContactParents('${studentId}')">✓ Mark done</button>`:''}      <button class="btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn-accent" onclick="saveContactParents('${studentId}')">Save flag</button>
    </div>
  `);
}
function saveContactParents(studentId){
  const s = state.students.find(st=>st.id===studentId);
  if(!s) return;
  const cat = document.getElementById('cp-cat').value;
  const reason = document.getElementById('cp-reason').value.trim();
  if(!reason){ alert('Please enter a reason.'); return; }
  s.contactParents = {category: cat, reason};
  scheduleSave('students', state.students);
  closeModal();
  renderClasses();
}
function clearContactParents(studentId){
  const s = state.students.find(st=>st.id===studentId);
  if(!s || !s.contactParents?.reason) return;
  showModal(`
    <h3>📞 Log Call — ${esc(s.name)}</h3>
    <p style="font-size:13px;color:var(--muted);margin:0 0 14px;">Before marking done, write a brief summary of the conversation. This will appear on the student's report.</p>
    <div class="field"><label>Call date</label><input id="cp-call-date" type="date" value="${todayStr()}"></div>
    <div class="field"><label>Summary of conversation</label>
      <textarea id="cp-summary" rows="4" style="width:100%;border:1px solid var(--border);border-radius:8px;padding:8px;font-family:inherit;font-size:13px;" placeholder="e.g. Spoke with mother about attendance. She was unaware of 3 absences and committed to improving punctuality."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn-accent" onclick="confirmCallDone('${studentId}')">Save &amp; Mark Done</button>
    </div>
  `);
}
function confirmCallDone(studentId){
  const s = state.students.find(st=>st.id===studentId);
  if(!s) return;
  const summary = document.getElementById('cp-summary').value.trim();
  const callDate = document.getElementById('cp-call-date').value;
  if(!summary){ alert('Please enter a summary of the conversation.'); return; }
  if(!s.contactParentsHistory) s.contactParentsHistory = [];
  s.contactParentsHistory.unshift({
    date: callDate,
    category: s.contactParents.category,
    reason: s.contactParents.reason,
    summary
  });
  s.contactParents = null;
  scheduleSave('students', state.students);
  closeModal();
  if(state.view==='dashboard') renderDashboard();
  if(state.view==='classes') renderClasses();
}

function toggleEnglishClub(studentId){
  const s = state.students.find(s=>s.id===studentId);
  if(!s) return;
  s.englishClub = !s.englishClub;
  scheduleSave('students', state.students);
  renderClasses();
}
function deleteStudent(studentId){
  if(!confirm('Remove this student from the class?')) return;
  state.students = state.students.filter(s=>s.id!==studentId);
  scheduleSave('students', state.students);
  renderClasses();
}

/* ================= ROLL CALL ================= */
function renderRollCall(){
  const active = activeClasses();
  if(!active.length){
    document.getElementById('view-rollcall').innerHTML = `
      <div class="topbar"><div><h1>Roll Call</h1></div></div>
      <div class="card empty-card">Add a class first in <a onclick="navigate('classes')">Classes &amp; Students</a>.</div>`;
    return;
  }
  if(!classById(state.rollcall.classId) || classById(state.rollcall.classId).archived) state.rollcall.classId = active[0].id;
  const cls = classById(state.rollcall.classId);
  const date = state.rollcall.date;
  const students = studentsInClass(cls.id);
  const sessionKey = cls.id + '_' + date;
  const dow = new Date(date+'T00:00:00').getDay();
  const offSchedule = !getClassDays(cls).includes(dow);
  const holiday = getHoliday(date);

  // Don't create session records for holidays
  if(!holiday){
    if(!state.sessions[sessionKey]) state.sessions[sessionKey] = {};
    const session = state.sessions[sessionKey];
    let created = false;
    students.forEach(s=>{ if(!session[s.id]){ session[s.id]=defaultRecord(); created=true; } });
    if(created) scheduleSave('sessions', state.sessions);
  }

  const session = state.sessions[sessionKey] || {};

  // Find students absent in the immediately preceding non-holiday class session
  const prevDate = getPreviousClassDate(cls, date);
  const prevSessionKey = prevDate ? cls.id+'_'+prevDate : null;
  const prevSession = prevSessionKey ? (state.sessions[prevSessionKey]||{}) : {};
  const absentPrevSession = new Set(
    students.filter(s=>prevSession[s.id]?.attendance==='absent').map(s=>s.id)
  );

  // Only explicitly-completed sessions are read-only (per spec Q5 = option a)
  const locked = !!(state.sessionMeta && state.sessionMeta[cls.id+'_'+date]?.completed);

  document.getElementById('view-rollcall').innerHTML = `
    <div class="topbar">
      <div><h1>Roll Call</h1><div class="meta">${formatDateLong(date)}</div></div>
      <div class="rollcall-controls">
        <select onchange="setRollcallClass(this.value)">
          ${activeClasses().map(c=>`<option value="${c.id}" ${c.id===cls.id?'selected':''}>${esc(c.name)}</option>`).join('')}
        </select>
        <input type="date" value="${date}" onchange="setRollcallDate(this.value)">
      </div>
    </div>
    ${holiday?`<div class="warn-banner" style="font-size:14px;">🎉 <b>${esc(holiday.label)}</b> — ${formatDateLong(date)} is a holiday. No roll call can be taken on this day.</div>`:''}
    ${offSchedule&&!holiday?`<div class="warn-banner">${esc(cls.name)} isn't normally scheduled on ${DAY_NAMES[dow]}s (${scheduleLabel(cls)}).</div>`:''}
    ${!holiday && students.length ? `
      ${(()=>{
        const isFuture = date > todayStr();
        const isToday = date === todayStr();
        const explicitlyCompleted = !!(state.sessionMeta && state.sessionMeta[cls.id+'_'+date]?.completed);
        if(isFuture) return `<div class="warn-banner">📅 This class is in the future — it won't be counted in reports until it takes place.</div>`;
        if(explicitlyCompleted) return `<div class="warn-banner" style="background:var(--green-soft);color:var(--green);">🔒 Completed session — read-only, counts toward reports. <button class="btn-ghost small" style="margin-left:8px;" onclick="toggleSessionCompleted('${cls.id}','${date}')">Reopen to edit</button></div>`;
        if(isToday) return `<div class="warn-banner">⏳ Today's class isn't counted in reports yet. Mark it completed when the class is over. <button class="btn-accent" style="margin-left:8px;" onclick="toggleSessionCompleted('${cls.id}','${date}')">✓ Complete session</button></div>`;
        return `<div class="warn-banner" style="background:var(--green-soft);color:var(--green);">✓ Past session — counts toward reports. <button class="btn-ghost small" style="margin-left:8px;" onclick="toggleSessionCompleted('${cls.id}','${date}')">🔒 Lock (complete)</button></div>`;
      })()}
      <div class="field" style="margin-bottom:14px;">
        <label style="font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px;display:block;">Today's lesson content ${locked?'':'<span style="font-weight:400;">(what was covered — shown on absent reports)</span>'}</label>
        <input type="text" value="${esc(getLessonNote(cls.id, date))}" ${locked?'disabled':''} placeholder="e.g. Unit 7 review, phrasal verbs, p.43 assigned" style="width:100%;border:1px solid var(--border);border-radius:8px;padding:9px 11px;font-family:inherit;font-size:14px;${locked?'background:var(--gray-soft);':''}" oninput="setLessonNote('${cls.id}','${date}', this.value)">
      </div>
      <div class="rollcall-actions">
        ${locked?'':`<button class="btn-ghost" onclick="markAllPresent()">Mark all present</button>`}
        <span class="save-indicator" id="save-indicator"></span>
      </div>
      <div class="card roster-list ${locked?'locked-session':''}">
        ${students.map(s=>renderRosterRow(s, session[s.id], absentPrevSession.has(s.id), locked)).join('')}
      </div>
    ` : !holiday ? `<div class="card empty-card">No students in this class yet. Add students in <a onclick="navigate('classes')">Classes &amp; Students</a>.</div>` : ''}
  `;
}
function getLessonNote(classId, date){
  return (state.lessonNotes && state.lessonNotes[classId+'_'+date]) || '';
}
function setLessonNote(classId, date, val){
  if(!state.lessonNotes) state.lessonNotes = {};
  const key = classId+'_'+date;
  if(val && val.trim()) state.lessonNotes[key] = val;
  else delete state.lessonNotes[key];
  scheduleSave('lessonNotes', state.lessonNotes);
}
function isSessionCompleted(classId, date){
  // Past sessions auto-count; today needs explicit completion; future never counts
  if(date < todayStr()) return true;
  if(date > todayStr()) return false;
  return !!(state.sessionMeta && state.sessionMeta[classId+'_'+date]?.completed);
}
function toggleSessionCompleted(classId, date){
  if(!state.sessionMeta) state.sessionMeta = {};
  const key = classId+'_'+date;
  if(!state.sessionMeta[key]) state.sessionMeta[key] = {};
  state.sessionMeta[key].completed = !state.sessionMeta[key].completed;
  scheduleSave('sessionMeta', state.sessionMeta);
  renderRollCall();
}
function renderRosterRow(s, rec, missedHw=false, locked=false){
  const open = state.openDrawer === s.id;
  const hwOutcome = rec?.lateHwOutcome || null;
  const showFlag = missedHw && !hwOutcome;
  return `
    <div class="roster-row ${open?'open':''}" onclick="toggleDrawer('${s.id}')">
      <div class="student-name">
        ${esc(s.name)}
        ${showFlag ? `<span class="badge amber" style="margin-left:8px;font-size:11px;">⚠ Missed HW</span>` : ''}
        ${missedHw && hwOutcome==='late' ? `<span class="badge green" style="margin-left:8px;font-size:11px;">✓ Late HW</span>` : ''}
        ${missedHw && hwOutcome==='no_hw' ? `<span class="badge red" style="margin-left:8px;font-size:11px;">✗ No HW</span>` : ''}
      </div>
      <div class="seg" onclick="event.stopPropagation()">
        <button class="present ${rec?.attendance!=='absent'?'on':''}" ${locked?'disabled':''} onclick="setAttendance('${s.id}','present')">Present</button>
        <button class="absent ${rec?.attendance==='absent'?'on':''}" ${locked?'disabled':''} onclick="setAttendance('${s.id}','absent')">Absent</button>
      </div>
      <div class="detail-btn">Details ${open?'▾':'▸'}</div>
    </div>
    <div class="drawer">${open?renderDrawer(s, rec, missedHw, locked):''}</div>
  `;
}
function renderDrawer(s, rec, missedHw=false, locked=false){
  const hwOutcome = rec?.lateHwOutcome || null;
  if(locked){
    // Read-only summary view
    return `
      <div class="field"><label>Late (minutes)</label><div class="ro-val">${rec.lateMin||0} min</div></div>
      <div class="field"><label>Left early (minutes)</label><div class="ro-val">${rec.leftEarlyMin||0} min</div></div>
      <div class="field"><label>Phone used (times)</label><div class="ro-val">${rec.phone||0}</div></div>
      <div class="field"><label>Homework (%)</label><div class="ro-val">${rec.hw??100}%</div></div>
      <div class="field"><label>English only</label><div class="ro-val">${englishLabel(rec.english)}</div></div>
      <div class="field"><label>Participation</label><div class="ro-val">${rec.participation?({great:'Great',good:'Good',low:'Low'}[rec.participation]):'—'}</div></div>
      <div class="field full"><label>Behavior notes</label><div class="ro-val">${rec.notes?esc(rec.notes):'—'}</div></div>
    `;
  }
  return `
    ${missedHw ? `
    <div class="field full" style="grid-column:1/-1;background:var(--amber-soft);border-radius:10px;padding:12px 14px;">
      <label style="color:var(--amber);">⚠ Previous session HW (was absent)</label>
      <div class="pill-group" style="margin-top:8px;">
        <div class="pill green ${hwOutcome==='late'?'on':''}" onclick="setLateHwOutcome('${s.id}','late')">✓ Brought late</div>
        <div class="pill red ${hwOutcome==='no_hw'?'on':''}" onclick="setLateHwOutcome('${s.id}','no_hw')">✗ Did not bring</div>
        ${hwOutcome ? `<div class="pill" onclick="setLateHwOutcome('${s.id}',null)" style="color:var(--muted);">Clear</div>` : ''}
      </div>
    </div>` : ''}
    <div class="field"><label>Late (minutes)</label>
      <div class="quick-num">
        <input type="number" min="0" class="num-input" value="${rec.lateMin||0}" onchange="setNumField('${s.id}','lateMin',this.value)">
        <button class="qbtn" onclick="bumpField('${s.id}','lateMin',5)">+5</button>
        <button class="qbtn" onclick="bumpField('${s.id}','lateMin',10)">+10</button>
        <button class="qbtn" onclick="bumpField('${s.id}','lateMin',15)">+15</button>
        <button class="qbtn zero" onclick="setNumField('${s.id}','lateMin',0)">0</button>
      </div>
    </div>
    <div class="field"><label>Left early (minutes)</label>
      <div class="quick-num">
        <input type="number" min="0" class="num-input" value="${rec.leftEarlyMin||0}" onchange="setNumField('${s.id}','leftEarlyMin',this.value)">
        <button class="qbtn" onclick="bumpField('${s.id}','leftEarlyMin',5)">+5</button>
        <button class="qbtn" onclick="bumpField('${s.id}','leftEarlyMin',10)">+10</button>
        <button class="qbtn" onclick="bumpField('${s.id}','leftEarlyMin',15)">+15</button>
        <button class="qbtn zero" onclick="setNumField('${s.id}','leftEarlyMin',0)">0</button>
      </div>
    </div>
    <div class="field"><label>Phone used (times)</label>
      <div class="quick-num">
        <input type="number" min="0" class="num-input" value="${rec.phone||0}" onchange="setNumField('${s.id}','phone',this.value)">
        <button class="qbtn" onclick="bumpField('${s.id}','phone',1)">+1</button>
        <button class="qbtn zero" onclick="setNumField('${s.id}','phone',0)">0</button>
      </div>
    </div>
    <div class="field"><label>Homework (%)</label>
      <div class="quick-num">
        <input type="number" min="0" max="100" step="10" class="num-input" value="${rec.hw??100}" onchange="setNumField('${s.id}','hw',this.value,0,100)">
        <button class="qbtn" onclick="setNumField('${s.id}','hw',0,0,100)">0</button>
        <button class="qbtn" onclick="setNumField('${s.id}','hw',50,0,100)">50</button>
        <button class="qbtn" onclick="setNumField('${s.id}','hw',100,0,100)">100</button>
      </div>
    </div>
    <div class="field full"><label>English only</label>
      <div class="pill-group">
        <div class="pill green ${rec.english==='excellent'?'on':''}" onclick="setField('${s.id}','english','excellent')">Excellent</div>
        <div class="pill amber ${rec.english==='improve'?'on':''}" onclick="setField('${s.id}','english','improve')">Needs some reminders</div>
        <div class="pill red ${rec.english==='unacceptable'?'on':''}" onclick="setField('${s.id}','english','unacceptable')">Needs consistent reminders</div>
      </div>
    </div>
    <div class="field full"><label>Participation</label>
      <div class="pill-group">
        <div class="pill green ${rec.participation==='great'?'on':''}" onclick="setField('${s.id}','participation','great')">Great</div>
        <div class="pill amber ${rec.participation==='good'?'on':''}" onclick="setField('${s.id}','participation','good')">Good</div>
        <div class="pill red ${rec.participation==='low'?'on':''}" onclick="setField('${s.id}','participation','low')">Low</div>
      </div>
    </div>
    <div class="field full"><label>Behavior notes</label>
      <textarea oninput="setNote('${s.id}', this.value)" placeholder="e.g. helped a classmate with the pair activity">${esc(rec.notes)}</textarea>
    </div>
  `;
}
function getCurrentRecord(studentId){
  const key = state.rollcall.classId + '_' + state.rollcall.date;
  if(!state.sessions[key]) state.sessions[key] = {};
  if(!state.sessions[key][studentId]) state.sessions[key][studentId] = defaultRecord();
  return state.sessions[key][studentId];
}
function persistSessions(){ scheduleSave('sessions', state.sessions); }
function setAttendance(studentId, val){
  getCurrentRecord(studentId).attendance = val;
  persistSessions();
  renderRollCall();
}
function adjustField(studentId, field, delta){
  const rec = getCurrentRecord(studentId);
  if(field==='hw'){
    rec[field] = Math.min(100, Math.max(0, (rec[field]??100) + delta));
  } else {
    rec[field] = Math.max(0, rec[field] + delta);
  }
  persistSessions();
  renderRollCall();
}
function setNumField(studentId, field, value, min=0, max=Infinity){
  const rec = getCurrentRecord(studentId);
  let n = parseInt(value);
  if(isNaN(n)) n = min;
  rec[field] = Math.min(max, Math.max(min, n));
  persistSessions();
  renderRollCall();
}
function bumpField(studentId, field, delta){
  const rec = getCurrentRecord(studentId);
  rec[field] = Math.max(0, (rec[field]||0) + delta);
  persistSessions();
  renderRollCall();
}
function setField(studentId, field, val){
  const rec = getCurrentRecord(studentId);
  rec[field] = rec[field]===val ? null : val;
  persistSessions();
  renderRollCall();
}
function setLateHwOutcome(studentId, val){
  const rec = getCurrentRecord(studentId);
  rec.lateHwOutcome = val;
  persistSessions();
  renderRollCall();
}
function setNote(studentId, val){
  getCurrentRecord(studentId).notes = val;
  persistSessions();
}
function toggleDrawer(studentId){
  state.openDrawer = state.openDrawer===studentId ? null : studentId;
  renderRollCall();
}
function markAllPresent(){
  studentsInClass(state.rollcall.classId).forEach(s=>{ getCurrentRecord(s.id).attendance='present'; });
  persistSessions();
  renderRollCall();
}
function setRollcallClass(classId){
  state.rollcall.classId = classId;
  state.openDrawer = null;
  renderRollCall();
}
function setRollcallDate(date){
  state.rollcall.date = date;
  state.openDrawer = null;
  renderRollCall();
}

/* ================= STUDENT PROFILE ================= */
function renderStudentProfile(){
  const t = T[state.reportLang];
  const student = state.students.find(s=>s.id===state.studentProfileId);
  const returnView = state.studentProfileReturn || 'reports';
  const returnLabel = returnView==='classes' ? t.backToClasses : t.backToReports;
  if(!student){
    document.getElementById('view-student').innerHTML = `
      <div class="topbar"><div><button class="btn-ghost back-btn" onclick="navigate('${returnView}')">${returnLabel}</button></div></div>
      <div class="card empty-card">Student not found.</div>`;
    return;
  }
  const cls = classById(student.classId);
  const allRecords = [];
  Object.keys(state.sessions).forEach(key=>{
    const [classId, date] = splitSessionKey(key);
    if(classId===student.classId && state.sessions[key][student.id]){
      allRecords.push({date, ...state.sessions[key][student.id]});
    }
  });
  allRecords.sort((a,b)=>b.date.localeCompare(a.date));

  const fromVal = state.reportRange.from || cls?.startDate || '';
  const toVal = state.reportRange.to || cls?.endDate || '';
  const allPeriodRecords = allRecords.filter(r => (!fromVal || r.date>=fromVal) && (!toVal || r.date<=toVal));

  // Separate holiday records from real records
  const holidayDates = allPeriodRecords.filter(r=>isHoliday(r.date)).map(r=>r.date);
  const records = allPeriodRecords.filter(r=>!isHoliday(r.date) && isSessionCompleted(student.classId, r.date));

  const total = records.length;
  const absent = records.filter(r=>r.attendance==='absent').length;
  const late = records.filter(r=>r.attendance!=='absent' && (r.lateMin||0)>0).length;
  const present = total - absent - late;
  const totalPhone = records.reduce((sum,r)=>sum+(r.phone||0),0);
  const hwRecords = records.filter(r=>r.hw!=null && r.hw!=='done' && r.hw!=='not_done' ? true : r.hw!=null);
  const hwAvg = hwRecords.length ? Math.round(hwRecords.reduce((s,r)=>{
    const v = typeof r.hw==='number' ? r.hw : (r.hw==='done'?100:0);
    return s+v;
  },0)/hwRecords.length) : null;

  const duration = cls?.duration || 150;
  const expected = cls ? expectedSessionsForClass(cls, fromVal||null, toVal||null) : null;
  const classesLost = absent;
  const attendanceRate = expected ? Math.round(100*(expected-classesLost)/expected) : null;

  const attended = records.filter(r=>r.attendance!=='absent');
  const totalPossibleMin = total * duration;
  const lostLateMin = attended.reduce((s,r)=>s+(r.lateMin||0),0);
  const lostEarlyMin = attended.reduce((s,r)=>s+(r.leftEarlyMin||0),0);
  const absentMin = absent * duration;
  const inClassMin = Math.max(0, totalPossibleMin - lostLateMin - lostEarlyMin - absentMin);

  // Participation summary
  const partRecords = attended.filter(r=>r.participation);
  const partGreat = partRecords.filter(r=>r.participation==='great').length;
  const partGood = partRecords.filter(r=>r.participation==='good').length;
  const partLow = partRecords.filter(r=>r.participation==='low').length;
  const partScore = partRecords.length ? Math.round(100*(partGreat*1 + partGood*0.5)/partRecords.length) : null;

  // Time lost equivalent (late + left early + absences), in equivalent classes
  const totalLostMin = lostLateMin + lostEarlyMin + absentMin;
  const lostEquivClasses = (totalLostMin/duration).toFixed(1);

  const classesLostHtml = expected!=null
    ? t.classesAbsent(classesLost, expected, fromVal?formatDateShort(fromVal):'?', toVal?formatDateShort(toVal):'?', attendanceRate)
    : t.classesAbsent(classesLost, null) + ` <a class="no-print" onclick="navigate('classes');setTimeout(()=>openClassModal('${cls?.id}'),0)">${t.setDates}</a><span class="print-only">${t.setDates}</span>${t.setDatesRest}`;

  document.getElementById('view-student').innerHTML = `
    <div class="topbar">
      <div>
        <button class="btn-ghost back-btn no-print" onclick="navigate('${returnView}')">${returnLabel}</button>
        <h1>${esc(student.name)}${student.englishClub?` <span class="badge amber" style="font-size:13px;vertical-align:middle;">${t.englishClubBadge}</span>`:''}${student.contactParents?.reason?` <span class="badge red" style="font-size:13px;vertical-align:middle;">📞 ${esc(student.contactParents.category)}</span>`:''}</h1>
        <div class="meta">${cls?esc(cls.name):'No class'}</div>
        <div style="font-size:14px;font-weight:600;color:var(--accent);margin-top:6px;">${t.reportPeriod}: ${fromVal?formatDateShort(fromVal):t.allTime}${fromVal||toVal?` – ${toVal?formatDateShort(toVal):t.present2}`:''}</div>
      </div>
      <div style="display:flex;gap:10px;align-items:center;" class="no-print">
        <button class="btn-ghost" onclick="toggleReportLang()" title="Switch language">${t.langToggle}</button>
        <button class="btn-accent" onclick="window.print()">${t.printBtn}</button>
      </div>
    </div>
    <div class="print-only" style="margin-bottom:14px;font-size:12px;color:var(--muted);">${t.generatedOn} ${formatDateLong(todayStr())}</div>
    <div class="card section no-print" style="margin-bottom:16px;">
      <div class="rollcall-controls" style="flex-wrap:wrap;align-items:center;">
        <label style="font-size:13px;font-weight:600;color:var(--muted);">${t.reportPeriod}:</label>
        <input type="date" value="${fromVal}" onchange="setReportRange('from', this.value)">
        <span style="color:var(--muted);font-size:13px;">${t.to}</span>
        <input type="date" value="${toVal}" onchange="setReportRange('to', this.value)">
        <button class="btn-ghost small" onclick="resetReportRange()">${t.allTime}</button>
        <button class="btn-ghost small" onclick="navigate('${returnView}')" style="margin-left:auto;">← Change</button>
      </div>
    </div>
    <div class="stat-row">
      <div class="card stat"><div class="stat-num">${total}</div><div class="stat-label">${t.sessionsLogged}</div></div>
      <div class="card stat"><div class="stat-num">${present}</div><div class="stat-label">${t.present}</div></div>
      <div class="card stat"><div class="stat-num">${late}</div><div class="stat-label">${t.late}</div></div>
      <div class="card stat"><div class="stat-num">${absent}</div><div class="stat-label">${t.absent}</div></div>
      <div class="card stat"><div class="stat-num">${totalPhone}</div><div class="stat-label">${t.phoneUses}</div></div>
      <div class="card stat"><div class="stat-num">${hwAvg!=null?hwAvg+'%':'—'}</div><div class="stat-label">${t.homeworkDone}</div></div>
      <div class="card stat"><div class="stat-num">${partScore!=null?partScore+'%':'—'}</div><div class="stat-label">${t.participation}</div></div>
    </div>
    <div class="charts-grid" style="grid-template-columns:repeat(auto-fit,minmax(260px,1fr));">
      <div class="card chart-card">
        <h3>${t.attendance}</h3>
        <div class="chart-note">${t.basedOn(total)}</div>
        ${renderDonut([
          {label:t.present, value:present, color:'var(--green)'},
          {label:t.late, value:late, color:'var(--amber)'},
          {label:t.absent, value:absent, color:'var(--red)'}
        ], total?`${Math.round(100*(present+late)/total)}%`:'—', t.attended)}
      </div>
      <div class="card chart-card">
        <h3>${t.timeInClass}</h3>
        <div class="chart-note">${t.outOf(totalPossibleMin, total, duration)}</div>
        ${renderDonut([
          {label:t.inClass, value:inClassMin, color:'var(--green)', unit:' min'},
          {label:t.lateArrivals, value:lostLateMin, color:'var(--amber)', unit:' min'},
          {label:t.leftEarly, value:lostEarlyMin, color:'var(--purple)', unit:' min'},
          {label:t.absent, value:absentMin, color:'var(--red)', unit:' min'}
        ], (lostLateMin+lostEarlyMin+absentMin)+' min', t.timeMissed)}
      </div>
      ${hwRecords.length ? `
      <div class="card chart-card">
        <h3>${t.homeworkDone}</h3>
        <div class="chart-note">${t.basedOn(hwRecords.length)}</div>
        ${(()=>{
          const avg = hwAvg??0;
          return renderDonut([
            {label:state.reportLang==='pt'?'Feito (média)':'Done (avg)', value:avg, color:'var(--green)', unit:'%'},
            {label:state.reportLang==='pt'?'Incompleto (média)':'Incomplete (avg)', value:100-avg, color:'var(--red)', unit:'%'}
          ], avg+'%', state.reportLang==='pt'?'média':'average');
        })()}
      </div>` : ''}
      ${partRecords.length ? `
      <div class="card chart-card">
        <h3>${t.participation}</h3>
        <div class="chart-note">${t.basedOn(partRecords.length)}</div>
        ${renderDonut([
          {label:t.participationLabels.great, value:partGreat, color:'var(--green)'},
          {label:t.participationLabels.good, value:partGood, color:'var(--amber)'},
          {label:t.participationLabels.low, value:partLow, color:'var(--red)'}
        ], partScore!=null?partScore+'%':'—', t.participation)}
      </div>` : ''}
    </div>
    <div class="card section">
      <h3>${t.classesLost}</h3>
      <div class="lost-summary">${classesLostHtml}</div>
      ${total ? `<div class="lost-summary" style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border);">${t.timeLost}: <b>${totalLostMin} min ≈ ${lostEquivClasses} ${t.equivClasses}</b>${expected?` (${t.of} ${expected} ${t.expectedShort})`:''}.</div>` : ''}
    </div>
    ${(student.contactParents?.reason || student.contactParentsHistory?.length) ? `
    <div class="card section" style="border-left:4px solid var(--red);">
      <h3>📞 ${state.reportLang==='pt'?'Contato com Responsáveis':'Contact Parents'}</h3>
      ${student.contactParents?.reason ? `
      <div style="margin-bottom:12px;padding:10px 14px;background:var(--red-soft);border-radius:10px;">
        <div style="font-size:12px;font-weight:600;color:var(--red);margin-bottom:4px;">${state.reportLang==='pt'?'⚠ Pendente':'⚠ Pending'}</div>
        <span class="badge red">${esc(student.contactParents.category)}</span>
        <span style="font-size:13px;color:var(--text);margin-left:8px;">${esc(student.contactParents.reason)}</span>
      </div>` : ''}
      ${(student.contactParentsHistory||[]).map(h=>`
      <div style="padding:10px 0;border-bottom:1px solid var(--border);">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
          <span style="font-size:12px;font-weight:600;color:var(--muted);">${formatDateShort(h.date)}</span>
          <span class="badge red">${esc(h.category)}</span>
        </div>
        <div style="font-size:12px;color:var(--muted);margin-bottom:4px;"><b>${state.reportLang==='pt'?'Motivo':'Reason'}:</b> ${esc(h.reason)}</div>
        <div style="font-size:13px;color:var(--text);"><b>${state.reportLang==='pt'?'Resumo':'Summary'}:</b> ${esc(h.summary)}</div>
      </div>`).join('')}
    </div>` : ''}
    <div class="card table-wrap">
      ${records.length||holidayDates.length ? `
      <table>
        <thead><tr><th>${t.date}</th><th>${t.attendance}</th><th>${t.lateMin}</th><th>${t.leftEarlyMin}</th><th>${t.phone}</th><th>${t.hw}</th><th>${t.lateHwCol}</th><th>${t.englishOnly}</th><th>${t.participation}</th><th>${t.notes}</th></tr></thead>
        <tbody>
          ${(()=>{
            const partLabel = p => p?({great:t.participationLabels.great,good:t.participationLabels.good,low:t.participationLabels.low}[p]):null;
            const partBadge = p => p==='great'?'green':p==='good'?'amber':'red';
            // Merge records and holiday rows, sort by date descending
            const allRows = [
              ...records.map(r=>({...r, _type:'record'})),
              ...holidayDates.map(date=>({date, _type:'holiday', _label: getHoliday(date)?.label||'Holiday'}))
            ].sort((a,b)=>b.date.localeCompare(a.date));
            return allRows.map(r=>{
              if(r._type==='holiday') return `
                <tr style="background:var(--purple-soft);">
                  <td>${formatDateShort(r.date)}</td>
                  <td colspan="9" style="color:var(--purple);font-weight:600;">🎉 ${esc(r._label)}</td>
                </tr>`;
              const lessonNote = getLessonNote(student.classId, r.date);
              const missedRow = (r.attendance==='absent' && lessonNote) ? `
                <tr style="background:var(--red-soft);">
                  <td></td>
                  <td colspan="9" style="font-size:12px;color:var(--red);font-style:italic;">${t.missedLabel}: ${esc(lessonNote)}</td>
                </tr>` : '';
              return `
                <tr>
                  <td>${formatDateShort(r.date)}</td>
                  <td><span class="badge ${attendanceBadgeClass(r.attendance)}">${t.attendanceLabels[r.attendance]||r.attendance}</span></td>
                  <td>${r.lateMin?r.lateMin+' min':'—'}</td>
                  <td>${r.leftEarlyMin?r.leftEarlyMin+' min':'—'}</td>
                  <td>${r.phone||'—'}</td>
                  <td>${r.hw!=null?(typeof r.hw==='number'?r.hw+'%':(r.hw==='done'?'100%':'0%')):'—'}</td>
                  <td>${r.lateHwOutcome ? `<span class="badge ${r.lateHwOutcome==='late'?'green':'red'}">${t.lateHwLabels[r.lateHwOutcome]||r.lateHwOutcome}</span>` : '—'}</td>
                  <td>${r.english?`<span class="badge ${englishBadgeClass(r.english)}">${t.englishLabels[r.english]||r.english}</span>`:'—'}</td>
                  <td>${r.participation?`<span class="badge ${partBadge(r.participation)}">${partLabel(r.participation)}</span>`:'—'}</td>
                  <td>${r.notes?esc(r.notes):'—'}</td>
                </tr>${missedRow}`;
            }).join('');
          })()}
        </tbody>
      </table>
      ` : `<div class="empty-card">${t.noRecords}</div>`}
    </div>
  `;
}
function toggleReportLang(){
  state.reportLang = state.reportLang==='en' ? 'pt' : 'en';
  renderStudentProfile();
}
function setReportRange(which, val){
  state.reportRange[which] = val || '';
  renderStudentProfile();
}
function resetReportRange(){
  state.reportRange = {from:'', to:''};
  renderStudentProfile();
}

/* ================= REPORTS ================= */
function renderReports(){
  if(!classById(state.reportsSelection.classId)) state.reportsSelection.classId = state.classes[0]?.id || '';
  const selClassId = state.reportsSelection.classId;
  const fromVal = state.reportRange.from;
  const toVal   = state.reportRange.to;
  const active = activeClasses();
  const archived = archivedClasses();

  document.getElementById('view-reports').innerHTML = `
    <div class="topbar"><div><h1>Reports</h1><div class="meta">Printable attendance &amp; observation reports per student</div></div></div>
    ${state.classes.length ? `
      <div class="card section" style="margin-bottom:16px;">
        <div class="rollcall-controls" style="flex-wrap:wrap;align-items:center;">
          <select onchange="setReportsClass(this.value)">
            ${active.length?`<optgroup label="Active">${active.map(c=>`<option value="${c.id}" ${c.id===selClassId?'selected':''}>${esc(c.name)}</option>`).join('')}</optgroup>`:''}
            ${archived.length?`<optgroup label="Archived">${archived.map(c=>`<option value="${c.id}" ${c.id===selClassId?'selected':''}>${esc(c.name)} (archived)</option>`).join('')}</optgroup>`:''}
          </select>
          <label style="font-size:13px;font-weight:600;color:var(--muted);">Period:</label>
          <input type="date" value="${fromVal}" onchange="setReportRangeFromReports('from',this.value)" placeholder="From">
          <span style="color:var(--muted);font-size:13px;">–</span>
          <input type="date" value="${toVal}" onchange="setReportRangeFromReports('to',this.value)" placeholder="To">
          <button class="btn-ghost small" onclick="resetReportRangeFromReports()">All time</button>
          <button class="btn-accent" onclick="navigate('group-report')">Group Report →</button>
        </div>
      </div>
    ` : ''}
    ${state.classes.length ? state.classes.filter(c=>!selClassId||c.id===selClassId).map(c=>`
      <div class="card section" style="margin-bottom:12px;">
        <h3 style="display:flex;align-items:center;gap:8px;"><span class="color-dot" style="background:${c.color}"></span>${esc(c.name)}${c.archived?` <span class="badge other">Archived</span>`:''}</h3>
        ${studentsInClass(c.id).length ? studentsInClass(c.id).map(s=>`
          <div class="dash-row">
            <div class="dash-row-title">${esc(s.name)}${s.englishClub?` <span class="badge amber">⭐ English Club</span>`:''}</div>

          </div>
        `).join('') : `<div class="empty">No students in this class yet.</div>`}
      </div>
    `).join('') : `<div class="card empty-card">Add a class and students first in <a onclick="navigate('classes')">Classes &amp; Students</a>.</div>`}
  `;
}
function setReportsClass(classId){
  state.reportsSelection.classId = classId;
  renderReports();
}
function setReportRangeFromReports(which, val){
  state.reportRange[which] = val || '';
  renderReports();
}
function resetReportRangeFromReports(){
  state.reportRange = {from:'', to:''};
  renderReports();
}

/* ================= GROUP REPORT ================= */
function renderGroupReport(){
  const t = T[state.reportLang];
  const cls = classById(state.reportsSelection.classId);
  if(!cls){
    document.getElementById('view-group-report').innerHTML = `
      <div class="topbar"><div><button class="btn-ghost back-btn no-print" onclick="navigate('reports')">← Back to Reports</button></div></div>
      <div class="card empty-card">Select a class on the Reports page first.</div>`;
    return;
  }
  const students = studentsInClass(cls.id);
  const fromVal = state.reportRange.from || cls.startDate || '';
  const toVal   = state.reportRange.to   || cls.endDate   || '';
  const duration = cls.duration || 150;

  const rows = students.map(s=>{
    const recs = [];
    Object.keys(state.sessions).forEach(key=>{
      const [cid, date] = splitSessionKey(key);
      if(cid===cls.id && state.sessions[key][s.id])
        recs.push({date, ...state.sessions[key][s.id]});
    });
    const filtered = recs.filter(r=>(!fromVal||r.date>=fromVal)&&(!toVal||r.date<=toVal)&&!isHoliday(r.date)&&isSessionCompleted(cls.id, r.date));
    const total   = filtered.length;
    const absent  = filtered.filter(r=>r.attendance==='absent').length;
    const late    = filtered.filter(r=>r.attendance!=='absent'&&(r.lateMin||0)>0).length;
    const present = total - absent - late;
    const lostLate  = filtered.filter(r=>r.attendance!=='absent').reduce((s,r)=>s+(r.lateMin||0),0);
    const lostEarly = filtered.filter(r=>r.attendance!=='absent').reduce((s,r)=>s+(r.leftEarlyMin||0),0);
    const absentMin = absent * duration;
    const totalPoss = total * duration;
    const inClass   = Math.max(0, totalPoss - lostLate - lostEarly - absentMin);
    const attRate   = total ? Math.round(100*(present+late)/total) : null;
    const hwRecs    = filtered.filter(r=>r.hw!=null);
    const hwAvg     = hwRecs.length ? Math.round(hwRecs.reduce((s,r)=>{ const v=typeof r.hw==='number'?r.hw:(r.hw==='done'?100:0); return s+v; },0)/hwRecs.length) : null;
    const phone     = filtered.reduce((s,r)=>s+(r.phone||0),0);
    const partRecs  = filtered.filter(r=>r.attendance!=='absent'&&r.participation);
    const partAvg   = partRecs.length ? Math.round(100*(partRecs.filter(r=>r.participation==='great').length + partRecs.filter(r=>r.participation==='good').length*0.5)/partRecs.length) : null;
    const expected  = expectedSessionsForClass(cls, fromVal||null, toVal||null);
    const absRate   = expected ? Math.round(100*absent/expected) : null;
    return {s, total, present, late, absent, attRate, absRate, inClass, totalPoss, hwAvg, phone, partAvg};
  });

  // group averages
  const avg = (arr, key) => { const v=arr.filter(r=>r[key]!=null); return v.length?Math.round(v.reduce((s,r)=>s+r[key],0)/v.length):null; };
  const attAvg = avg(rows,'attRate');
  const hwAvg  = avg(rows,'hwAvg');
  const partGroupAvg = avg(rows,'partAvg');
  const phoneTotal = rows.reduce((s,r)=>s+r.phone,0);

  const badgeForPct = (pct, invert=false) => {
    if(pct==null) return '—';
    const good = invert ? pct<=10 : pct>=80;
    const bad  = invert ? pct>=30 : pct<=50;
    const cls2 = good?'green':bad?'red':'amber';
    return `<span class="badge ${cls2}">${pct}%</span>`;
  };

  document.getElementById('view-group-report').innerHTML = `
    <div class="topbar">
      <div>
        <button class="btn-ghost back-btn no-print" onclick="navigate('reports')">← Back to Reports</button>
        <h1>${esc(cls.name)}</h1>
        <div class="meta">${fromVal?formatDateShort(fromVal):'Start'} – ${toVal?formatDateShort(toVal):'Present'} · ${students.length} students</div>
      </div>
      <div style="display:flex;gap:10px;" class="no-print">
        <button class="btn-ghost" onclick="toggleGroupReportLang()">${t.langToggle}</button>
        <button class="btn-accent" onclick="window.print()">🖨️ ${state.reportLang==='pt'?'Imprimir':'Print'}</button>
      </div>
    </div>
    <div class="stat-row">
      <div class="card stat"><div class="stat-num">${students.length}</div><div class="stat-label">${state.reportLang==='pt'?'Alunos':'Students'}</div></div>
      <div class="card stat"><div class="stat-num">${attAvg!=null?attAvg+'%':'—'}</div><div class="stat-label">${t.attendance} (${state.reportLang==='pt'?'média':'avg'})</div></div>
      <div class="card stat"><div class="stat-num">${hwAvg!=null?hwAvg+'%':'—'}</div><div class="stat-label">${t.homeworkDone} (${state.reportLang==='pt'?'média':'avg'})</div></div>
      <div class="card stat"><div class="stat-num">${partGroupAvg!=null?partGroupAvg+'%':'—'}</div><div class="stat-label">${t.participation} (${state.reportLang==='pt'?'média':'avg'})</div></div>
      <div class="card stat"><div class="stat-num">${phoneTotal}</div><div class="stat-label">${t.phoneUses}</div></div>
    </div>
    <div class="card table-wrap">
      <table>
        <thead>
          <tr>
            <th>${state.reportLang==='pt'?'Aluno':'Student'}</th>
            <th>${state.reportLang==='pt'?'Aulas':'Sessions'}</th>
            <th>${t.present}</th>
            <th>${t.late}</th>
            <th>${t.absent}</th>
            <th>${state.reportLang==='pt'?'% Presença':'Att. rate'}</th>
            <th>${state.reportLang==='pt'?'% Ausência':'Abs. rate'}</th>
            <th>${state.reportLang==='pt'?'Tempo em aula':'In class'}</th>
            <th>${t.hw} (${state.reportLang==='pt'?'média':'avg'})</th>
            <th>${t.participation}</th>
            <th>${t.phone}</th>
            <th>English Club</th>
          </tr>
        </thead>
        <tbody>
          ${rows.map(({s,total,present,late,absent,attRate,absRate,inClass,totalPoss,hwAvg,phone,partAvg})=>`
            <tr>
              <td style="font-weight:600;cursor:pointer;" onclick="navigate('student',{studentProfileId:'${s.id}',studentProfileReturn:'reports'})">${esc(s.name)}</td>
              <td>${total}</td>
              <td>${present}</td>
              <td>${late}</td>
              <td>${absent}</td>
              <td>${badgeForPct(attRate)}</td>
              <td>${badgeForPct(absRate, true)}</td>
              <td>${total?Math.round(inClass/totalPoss*100)+'%':'—'}</td>
              <td>${hwAvg!=null?badgeForPct(hwAvg):'—'}</td>
              <td>${partAvg!=null?badgeForPct(partAvg):'—'}</td>
              <td>${phone||'—'}</td>
              <td style="text-align:center;">${s.englishClub?'⭐':''}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
    <div style="font-size:11px;color:var(--muted);margin-top:10px;" class="no-print">
      ${state.reportLang==='pt'?'Clique no nome do aluno para ver o relatório individual.':'Click a student name to view their individual report.'}
    </div>
  `;
}
function toggleGroupReportLang(){
  state.reportLang = state.reportLang==='en' ? 'pt' : 'en';
  renderGroupReport();
}

/* ================= CALENDAR ================= */
function renderCalendar(){
  const {year, month} = state.calendar;
  const firstDay = new Date(year, month, 1);
  const startWeekday = firstDay.getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const monthName = firstDay.toLocaleString('en-US',{month:'long'});

  let cells = '';
  for(let i=0;i<startWeekday;i++) cells += `<div class="cal-cell empty"></div>`;
  for(let d=1; d<=daysInMonth; d++){
    const dateStr = dateToStr(year, month, d);
    const dow = new Date(year, month, d).getDay();
    const classesToday = activeClasses().filter(c=>{
      if(!getClassDays(c).includes(dow)) return false;
      if(c.startDate && dateStr < c.startDate) return false;
      if(c.endDate && dateStr > c.endDate) return false;
      return true;
    });
    const eventsToday = state.events.filter(e=>e.date===dateStr);
    const isToday = dateStr===todayStr();
    const holiday = getHoliday(dateStr);
    cells += `
      <div class="cal-cell ${isToday?'today':''} ${holiday?'holiday':''}" onclick="openDayModal('${dateStr}')">
        <div class="cal-date">${d}</div>
        <div class="cal-items">
          ${holiday?`<div class="cal-tag holiday-tag">🎉 ${esc(holiday.label)}</div>`:''}
          ${!holiday?classesToday.map(c=>`<div class="cal-tag" style="background:${c.color}22;color:${c.color};border-color:${c.color}55">${esc(c.name)}</div>`).join(''):''}
          ${eventsToday.map(e=>`<div class="cal-tag ${e.type}">${esc(e.title)}</div>`).join('')}
        </div>
      </div>`;
  }

  document.getElementById('view-calendar').innerHTML = `
    <div class="topbar">
      <div><h1>Calendar</h1></div>
      <div class="cal-nav">
        <button class="btn-ghost" onclick="changeMonth(-1)">←</button>
        <div class="cal-month-label">${monthName} ${year}</div>
        <button class="btn-ghost" onclick="changeMonth(1)">→</button>
        <button class="btn-ghost" onclick="goToCurrentMonth()">Today</button>
      </div>
    </div>
    <div class="card cal-grid-wrap">
      <div class="cal-weekdays">${['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d=>`<div>${d}</div>`).join('')}</div>
      <div class="cal-grid">${cells}</div>
    </div>
    <div class="cal-legend">
      ${activeClasses().map(c=>`<div class="legend-item"><span class="color-dot" style="background:${c.color}"></span>${esc(c.name)}</div>`).join('')}
      <div class="legend-item"><span class="badge hw">HW</span> Homework due</div>
      <div class="legend-item"><span class="badge test">Test</span> Test</div>
      <div class="legend-item"><span class="badge project">Project</span> Project</div>
      <div class="legend-item"><span class="badge other">Other</span> Other</div>
      <div class="legend-item">🎉 Holiday</div>
    </div>
  `;
}
function changeMonth(delta){
  let {year, month} = state.calendar;
  month += delta;
  if(month<0){ month=11; year--; }
  if(month>11){ month=0; year++; }
  state.calendar = {year, month};
  renderCalendar();
}
function goToCurrentMonth(){
  const now = new Date();
  state.calendar = {year: now.getFullYear(), month: now.getMonth()};
  renderCalendar();
}
function openDayModal(dateStr){
  const dow = new Date(dateStr+'T00:00:00').getDay();
  const classesToday = activeClasses().filter(c=>getClassDays(c).includes(dow));
  const eventsToday = state.events.filter(e=>e.date===dateStr);
  const holiday = getHoliday(dateStr);
  showModal(`
    <h3>${formatDateLong(dateStr)}</h3>
    <div class="modal-section">
      <div class="modal-section-label">Holiday</div>
      ${holiday ? `
        <div class="modal-row">
          <span>🎉 ${esc(holiday.label)}</span>
          <button class="icon-btn danger" onclick="removeHoliday('${dateStr}')">Remove</button>
        </div>
      ` : `
        <div class="field-row">
          <input id="holiday-label" type="text" placeholder="e.g. Carnival, school break" style="flex:1;">
          <button class="btn-ghost small" onclick="markHoliday('${dateStr}')">Mark as holiday</button>
        </div>
      `}
    </div>
    ${classesToday.length ? `
      <div class="modal-section">
        <div class="modal-section-label">Classes</div>
        ${classesToday.map(c=>`
          <div class="modal-row">
            <span><span class="color-dot" style="background:${c.color}"></span>${esc(c.name)}${c.time?' · '+c.time:''}</span>
            <button class="btn-ghost small" onclick="goToRollCall('${c.id}','${dateStr}');closeModal();">Roll Call →</button>
          </div>
        `).join('')}
      </div>
    ` : ''}
    <div class="modal-section">
      <div class="modal-section-label">Events</div>
      ${eventsToday.length ? eventsToday.map(e=>`
        <div class="modal-row">
          <span><span class="badge ${e.type}">${eventTypeLabel(e.type)}</span> ${esc(e.title)}${e.classId?' · '+esc(classById(e.classId)?.name||''):''}</span>
          <button class="icon-btn danger" onclick="deleteEvent('${e.id}','${dateStr}')">×</button>
        </div>
      `).join('') : `<div class="empty">No events.</div>`}
    </div>
    <div class="modal-section">
      <div class="modal-section-label">Add event</div>
      <div class="field"><input id="ev-title" type="text" placeholder="e.g. Vocab quiz, Project due"></div>
      <div class="field-row">
        <select id="ev-type">
          <option value="hw">Homework due</option>
          <option value="test">Test</option>
          <option value="project">Project</option>
          <option value="other">Other</option>
        </select>
        <select id="ev-class">
          <option value="">No class</option>
          ${activeClasses().map(c=>`<option value="${c.id}">${esc(c.name)}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeModal()">Close</button>
      <button class="btn-accent" onclick="addEvent('${dateStr}')">Add event</button>
    </div>
  `);
}
function addEvent(dateStr){
  const title = document.getElementById('ev-title').value.trim();
  if(!title) return;
  const type = document.getElementById('ev-type').value;
  const classId = document.getElementById('ev-class').value || null;
  state.events.push({id:uid(), date:dateStr, title, type, classId});
  scheduleSave('events', state.events);
  closeModal();
  renderCalendar();
}
function deleteEvent(eventId, dateStr){
  state.events = state.events.filter(e=>e.id!==eventId);
  scheduleSave('events', state.events);
  renderCalendar();
  openDayModal(dateStr);
}
function markHoliday(dateStr){
  const label = document.getElementById('holiday-label').value.trim() || 'Holiday';
  state.holidays.push({id:uid(), date:dateStr, label});
  scheduleSave('holidays', state.holidays);
  renderCalendar();
  openDayModal(dateStr);
}
function removeHoliday(dateStr){
  state.holidays = state.holidays.filter(h=>h.date!==dateStr);
  scheduleSave('holidays', state.holidays);
  renderCalendar();
  openDayModal(dateStr);
}

/* ================= BACKUP / RESTORE ================= */
function exportData(){
  const data = {
    app: 'efl-teacher-dashboard',
    exportedAt: new Date().toISOString(),
    classes: state.classes,
    students: state.students,
    sessions: state.sessions,
    events: state.events,
    holidays: state.holidays,
    sessionMeta: state.sessionMeta,
    lessonNotes: state.lessonNotes
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `efl-dashboard-backup-${todayStr()}.json`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
  try{ localStorage.setItem(STORAGE_PREFIX+'lastBackup', todayStr()); }catch(e){}
  updateBackupStatus();
}
function updateBackupStatus(){
  const el = document.getElementById('backup-status');
  if(!el) return;
  let last = null;
  try{ last = localStorage.getItem(STORAGE_PREFIX+'lastBackup'); }catch(e){}
  if(!last){
    el.innerHTML = `<span style="color:#e0a94a;">● Never backed up</span>`;
    return;
  }
  const days = Math.floor((new Date(todayStr()) - new Date(last)) / 86400000);
  if(days>=14){
    el.innerHTML = `<span style="color:#e0a94a;">● Backup recommended (${days}d ago)</span>`;
  }else{
    el.innerHTML = `Last backup: ${formatDateShort(last)}`;
  }
}
function importData(file){
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (e)=>{
    let data;
    try{
      data = JSON.parse(e.target.result);
    }catch(err){
      alert("Could not read this file — make sure it's a backup JSON exported from this dashboard.");
      return;
    }
    if(!data || !Array.isArray(data.classes)){
      alert("This file doesn't look like a valid dashboard backup.");
      return;
    }
    if(!confirm('This will replace ALL current classes, students, roll call records, calendar events, and holidays with the contents of this backup. Continue?')) return;
    state.classes = data.classes || [];
    state.students = data.students || [];
    state.sessions = data.sessions || {};
    state.events = data.events || [];
    state.holidays = data.holidays || [];
    state.sessionMeta = data.sessionMeta || {};
    state.lessonNotes = data.lessonNotes || {};
    saveKey('classes', state.classes);
    saveKey('students', state.students);
    saveKey('sessions', state.sessions);
    saveKey('events', state.events);
    saveKey('holidays', state.holidays);
    saveKey('sessionMeta', state.sessionMeta);
    saveKey('lessonNotes', state.lessonNotes);
    state.expandedClassId = null;
    state.openDrawer = null;
    state.reportsSelection = {classId:'', studentId:''};
    navigate('dashboard');
    alert('Backup restored.');
  };
  reader.readAsText(file);
}

/* ================= INIT ================= */
async function init(){
  state.classes = await loadKey('classes', []);
  state.students = await loadKey('students', []);
  state.sessions = await loadKey('sessions', {});
  state.events = await loadKey('events', []);
  state.holidays = await loadKey('holidays', []);
  state.sessionMeta = await loadKey('sessionMeta', {});
  state.lessonNotes = await loadKey('lessonNotes', {});
  updateBackupStatus();
  navigate('dashboard');
}
init();
</script>
