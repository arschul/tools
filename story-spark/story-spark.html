<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StorySpark ✨</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #fdf6ee;
      --card: #ffffff;
      --accent1: #ff6b6b;
      --accent2: #ffd93d;
      --accent3: #6bcb77;
      --accent4: #4d96ff;
      --accent5: #c77dff;
      --text: #2d2d2d;
      --muted: #888;
      --border: #e8e0d5;
      --shadow: 0 4px 20px rgba(0,0,0,0.08);
      --radius: 18px;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
      background-image:
        radial-gradient(circle at 10% 20%, rgba(255,107,107,0.08) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(77,150,255,0.08) 0%, transparent 40%),
        radial-gradient(circle at 50% 50%, rgba(107,203,119,0.05) 0%, transparent 60%);
    }

    /* HEADER */
    header {
      text-align: center;
      margin-bottom: 2rem;
    }
    header h1 {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(2.4rem, 6vw, 3.6rem);
      color: var(--text);
      letter-spacing: 1px;
      line-height: 1;
    }
    header h1 span { color: var(--accent1); }
    header p {
      margin-top: 0.5rem;
      font-size: 1.05rem;
      color: var(--muted);
      font-weight: 600;
    }

    /* LAYOUT */
    .app-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.5rem;
      max-width: 900px;
      margin: 0 auto;
    }
    @media (min-width: 700px) {
      .app-grid { grid-template-columns: 1fr 1fr; }
      .full-width { grid-column: 1 / -1; }
    }

    /* CARDS */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 1.5rem;
      box-shadow: var(--shadow);
      border: 2px solid var(--border);
    }
    .card-title {
      font-family: 'Fredoka One', cursive;
      font-size: 1.25rem;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    /* GENRE FILTER */
    .genre-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 1.2rem;
    }
    .genre-btn {
      padding: 0.3rem 0.9rem;
      border-radius: 999px;
      border: 2px solid transparent;
      font-family: 'Nunito', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      background: #f0eae0;
      color: var(--text);
    }
    .genre-btn:hover { transform: translateY(-2px); box-shadow: 0 3px 8px rgba(0,0,0,0.12); }
    .genre-btn.active { color: white; border-color: transparent; }
    .genre-btn[data-genre="all"].active  { background: var(--text); }
    .genre-btn[data-genre="fantasy"].active  { background: var(--accent5); }
    .genre-btn[data-genre="adventure"].active { background: var(--accent3); }
    .genre-btn[data-genre="horror"].active    { background: var(--accent1); }
    .genre-btn[data-genre="action"].active    { background: var(--accent4); }

    /* INSPIRE BUTTON */
    .inspire-btn {
      display: block;
      width: 100%;
      padding: 1rem;
      font-family: 'Fredoka One', cursive;
      font-size: 1.4rem;
      letter-spacing: 1px;
      color: white;
      background: linear-gradient(135deg, #ff6b6b, #ffd93d);
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(255,107,107,0.35);
      transition: transform 0.15s, box-shadow 0.15s;
      position: relative;
      overflow: hidden;
    }
    .inspire-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.2), transparent);
      opacity: 0;
      transition: opacity 0.2s;
    }
    .inspire-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 28px rgba(255,107,107,0.45); }
    .inspire-btn:hover::after { opacity: 1; }
    .inspire-btn:active { transform: translateY(0); }

    /* RESULT DISPLAY */
    .result-box {
      min-height: 90px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 1rem;
      background: #fdf6ee;
      border-radius: 12px;
      border: 2px dashed var(--border);
      text-align: center;
      transition: all 0.3s;
    }
    .result-box.has-result {
      background: white;
      border-style: solid;
      border-color: var(--accent2);
    }
    .result-main {
      font-family: 'Fredoka One', cursive;
      font-size: 1.3rem;
      color: var(--text);
      margin-bottom: 0.3rem;
    }
    .result-desc {
      font-size: 0.88rem;
      color: var(--muted);
      font-weight: 600;
      line-height: 1.4;
    }
    .result-placeholder {
      font-size: 0.95rem;
      color: #bbb;
      font-weight: 700;
    }

    /* WORD DISPLAY */
    .word-badge {
      display: inline-block;
      font-family: 'Fredoka One', cursive;
      font-size: 1.6rem;
      padding: 0.4rem 1.2rem;
      border-radius: 999px;
      margin-bottom: 0.4rem;
      transition: all 0.3s;
    }
    .word-badge.fantasy   { background: #f3e8ff; color: var(--accent5); }
    .word-badge.adventure { background: #e8fff0; color: #28a745; }
    .word-badge.horror    { background: #fff0f0; color: var(--accent1); }
    .word-badge.action    { background: #e8f0ff; color: var(--accent4); }
    .word-badge.all       { background: #fff8e0; color: #c47900; }
    .word-genre-label {
      font-size: 0.78rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--muted);
    }

    /* HISTORY */
    .history-list {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      max-height: 260px;
      overflow-y: auto;
      padding-right: 4px;
    }
    .history-list::-webkit-scrollbar { width: 5px; }
    .history-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    .history-item {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.6rem 0.8rem;
      background: #fdf6ee;
      border-radius: 10px;
      font-size: 0.88rem;
      font-weight: 700;
      animation: slideIn 0.3s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-10px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    .history-item .h-num {
      font-family: 'Fredoka One', cursive;
      color: var(--muted);
      min-width: 22px;
    }
    .history-item .h-element { flex: 1; color: var(--text); }
    .history-item .h-word {
      padding: 0.15rem 0.6rem;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 800;
    }
    .history-empty {
      color: #bbb;
      font-weight: 700;
      font-size: 0.9rem;
      text-align: center;
      padding: 1rem;
    }

    /* NOTEPAD */
    .notepad {
      width: 100%;
      min-height: 180px;
      padding: 1rem;
      font-family: 'Nunito', sans-serif;
      font-size: 0.98rem;
      font-weight: 600;
      color: var(--text);
      background: #fffdf7;
      border: 2px solid var(--border);
      border-radius: 12px;
      resize: vertical;
      outline: none;
      line-height: 1.8;
      transition: border-color 0.2s;
    }
    .notepad:focus { border-color: var(--accent4); }
    .notepad::placeholder { color: #ccc; }
    .notepad-actions {
      display: flex;
      justify-content: flex-end;
      gap: 0.6rem;
      margin-top: 0.7rem;
    }
    .btn-small {
      padding: 0.4rem 1rem;
      border-radius: 999px;
      border: 2px solid var(--border);
      background: white;
      font-family: 'Nunito', sans-serif;
      font-size: 0.85rem;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-small:hover { background: var(--bg); transform: translateY(-1px); }
    .btn-small.danger { border-color: var(--accent1); color: var(--accent1); }
    .btn-small.danger:hover { background: #fff0f0; }

    /* MODAL */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-backdrop.show { display: flex; }
    .modal {
      background: white;
      border-radius: var(--radius);
      padding: 2rem;
      max-width: 360px;
      width: 90%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      animation: popIn 0.2s ease;
    }
    @keyframes popIn {
      from { transform: scale(0.85); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }
    .modal h2 { font-family: 'Fredoka One', cursive; font-size: 1.5rem; margin-bottom: 0.5rem; }
    .modal p { color: var(--muted); font-size: 0.95rem; font-weight: 600; margin-bottom: 1.5rem; }
    .modal-btns { display: flex; gap: 0.8rem; justify-content: center; }
    .modal-btns button {
      padding: 0.6rem 1.4rem;
      border-radius: 999px;
      border: 2px solid var(--border);
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .modal-btns .confirm {
      background: var(--accent1);
      border-color: var(--accent1);
      color: white;
    }
    .modal-btns .confirm:hover { background: #e55; }
    .modal-btns .cancel:hover { background: var(--bg); }

    /* COUNT BADGE */
    .count-badge {
      display: inline-block;
      background: var(--accent2);
      color: #7a5700;
      font-size: 0.78rem;
      font-weight: 800;
      padding: 0.1rem 0.55rem;
      border-radius: 999px;
      margin-left: 0.4rem;
      vertical-align: middle;
    }

    /* LEVEL TOGGLE */
    .level-row {
      display: flex;
      gap: 0.6rem;
      margin-bottom: 1.1rem;
    }
    .level-btn {
      flex: 1;
      padding: 0.55rem 0.5rem;
      border-radius: 12px;
      border: 2.5px solid var(--border);
      background: #f7f2eb;
      font-family: 'Fredoka One', cursive;
      font-size: 1rem;
      cursor: pointer;
      color: var(--muted);
      transition: all 0.18s;
      text-align: center;
      line-height: 1.2;
    }
    .level-btn small {
      display: block;
      font-family: 'Nunito', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      margin-top: 1px;
    }
    .level-btn:hover { transform: translateY(-2px); box-shadow: 0 3px 10px rgba(0,0,0,0.1); }
    .level-btn.active[data-level="beginner"] {
      background: #e8fff0; border-color: var(--accent3); color: #1a7a32;
    }
    .level-btn.active[data-level="intermediate"] {
      background: #eef3ff; border-color: var(--accent4); color: #1a3a8a;
    }

    /* HISTORY level pill */
    .h-level {
      font-size: 0.7rem;
      font-weight: 800;
      padding: 0.1rem 0.45rem;
      border-radius: 999px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      flex-shrink: 0;
    }
    .h-level.beginner   { background: #e8fff0; color: #1a7a32; }
    .h-level.intermediate { background: #eef3ff; color: #1a3a8a; }

    /* HISTORY EMOJI */
    .history-emoji-area {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.6rem 0 0.2rem;
      min-height: 80px;
    }
    .history-emoji {
      font-size: 3.6rem;
      line-height: 1;
      display: inline-block;
      filter: drop-shadow(0 0 10px rgba(255,210,80,0.6)) drop-shadow(0 0 22px rgba(255,150,50,0.35));
      animation: floatEmoji 3s ease-in-out infinite;
      transition: opacity 0.4s, transform 0.4s;
      opacity: 0;
    }
    .history-emoji.visible {
      opacity: 1;
    }
    @keyframes floatEmoji {
      0%   { transform: translateY(0px) scale(1); filter: drop-shadow(0 0 10px rgba(255,210,80,0.6)) drop-shadow(0 0 22px rgba(255,150,50,0.35)); }
      50%  { transform: translateY(-10px) scale(1.07); filter: drop-shadow(0 0 18px rgba(255,220,80,0.9)) drop-shadow(0 0 36px rgba(255,160,60,0.55)); }
      100% { transform: translateY(0px) scale(1); filter: drop-shadow(0 0 10px rgba(255,210,80,0.6)) drop-shadow(0 0 22px rgba(255,150,50,0.35)); }
    }

    /* SPARK ANIMATION */
    @keyframes spark {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.06); }
      100% { transform: scale(1); }
    }
    .sparking { animation: spark 0.35s ease; }
  </style>
</head>
<body>

<header>
  <h1>Story<span>Spark</span> ✨</h1>
  <p>Get inspired. Build your story. Have fun!</p>
</header>

<div class="app-grid">

  <!-- LEFT: Generator -->
  <div class="card">
    <div class="card-title">🎲 Your Spark</div>

    <!-- Level Toggle -->
    <div class="level-row">
      <button class="level-btn active" data-level="beginner" onclick="setLevel('beginner')">
        🌱 Beginner <small>Simple words &amp; ideas</small>
      </button>
      <button class="level-btn" data-level="intermediate" onclick="setLevel('intermediate')">
        🚀 Intermediate <small>Richer story elements</small>
      </button>
    </div>

    <!-- Genre Filter -->
    <div class="genre-row">
      <button class="genre-btn active" data-genre="all">All</button>
      <button class="genre-btn" data-genre="fantasy">🧙 Fantasy</button>
      <button class="genre-btn" data-genre="adventure">🗺️ Adventure</button>
      <button class="genre-btn" data-genre="horror">👻 Horror</button>
      <button class="genre-btn" data-genre="action">⚔️ Action</button>
    </div>

    <button class="inspire-btn" onclick="inspire()">✨ Inspire Me!</button>

    <div style="margin-top:1.2rem;">
      <div style="font-size:0.8rem;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:0.5rem;">Story Element</div>
      <div class="result-box" id="elementBox">
        <span class="result-placeholder">Hit Inspire Me to get started!</span>
      </div>
    </div>

    <div style="margin-top:1rem; text-align:center;">
      <div style="font-size:0.8rem;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:0.5rem;">Spark Word</div>
      <div class="result-box" id="wordBox" style="align-items:center;">
        <span class="result-placeholder">—</span>
      </div>
    </div>
  </div>

  <!-- RIGHT: History -->
  <div class="card">
    <div class="card-title">
      📜 History
      <span class="count-badge" id="historyCount">0</span>
    </div>
    <div class="history-list" id="historyList">
      <div class="history-empty">No sparks yet — hit Inspire Me!</div>
    </div>
    <div class="history-emoji-area">
      <span class="history-emoji" id="historyEmoji"></span>
    </div>
    <div style="margin-top:0.6rem;text-align:right;">
      <button class="btn-small danger" onclick="showResetModal()">🗑️ Reset All</button>
    </div>
  </div>

  <!-- BOTTOM: Notepad -->
  <div class="card full-width">
    <div class="card-title">📝 My Story Notes</div>
    <textarea class="notepad" id="notepad" placeholder="Use your sparks to start writing! Jot down characters, plot ideas, or anything that comes to mind..."></textarea>
    <div class="notepad-actions">
      <button class="btn-small" onclick="copyNotes()">📋 Copy</button>
      <button class="btn-small danger" onclick="clearNotes()">Clear</button>
    </div>
  </div>

</div>

<!-- Reset Modal -->
<div class="modal-backdrop" id="resetModal">
  <div class="modal">
    <h2>Reset everything?</h2>
    <p>This will clear your history and all used elements. Your story notes will stay safe!</p>
    <div class="modal-btns">
      <button class="cancel" onclick="hideResetModal()">Keep it</button>
      <button class="confirm" onclick="confirmReset()">Yes, reset!</button>
    </div>
  </div>
</div>

<script>
// ── DATA ────────────────────────────────────────────────────────────────────

const storyElements = {

// ── STATE ────────────────────────────────────────────────────────────────────

let currentLevel = 'beginner';
let currentGenre = 'all';

function activeElements()     { return currentLevel === 'beginner' ? beginnerElements : storyElements; }
function activeWordsByGenre() { return currentLevel === 'beginner' ? beginnerWordsByGenre : wordsByGenre; }

function buildWordPool(src) {
  return Object.fromEntries(Object.keys(src).map(g => [g, [...src[g]]]));
}

let remainingElements = Object.keys(beginnerElements);
let remainingWords    = buildWordPool(beginnerWordsByGenre);
let historyItems = [];

// ── LEVEL TOGGLE ─────────────────────────────────────────────────────────────

function setLevel(level) {
  if (level === currentLevel) return;
  currentLevel = level;
  document.querySelectorAll('.level-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.level === level);
  });
  remainingElements = Object.keys(activeElements());
  remainingWords    = buildWordPool(activeWordsByGenre());
  const eBox = document.getElementById('elementBox');
  eBox.classList.remove('has-result');
  eBox.innerHTML = '<span class="result-placeholder">Hit Inspire Me to get started!</span>';
  const wBox = document.getElementById('wordBox');
  wBox.classList.remove('has-result');
  wBox.innerHTML = '<span class="result-placeholder">—</span>';
}

// ── GENRE FILTER ─────────────────────────────────────────────────────────────

document.querySelectorAll('.genre-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.genre-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentGenre = btn.dataset.genre;
  });
});

// ── CORE LOGIC ───────────────────────────────────────────────────────────────

function pickRandom(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function getWord() {
  const src    = activeWordsByGenre();
  const genres = currentGenre === 'all' ? Object.keys(src) : [currentGenre];
  const available = genres.filter(g => remainingWords[g] && remainingWords[g].length > 0);
  if (available.length === 0) {
    genres.forEach(g => { remainingWords[g] = [...src[g]]; });
    return getWord();
  }
  const genre = pickRandom(available);
  const pool  = remainingWords[genre];
  const idx   = Math.floor(Math.random() * pool.length);
  const word  = pool.splice(idx, 1)[0];
  return { word, genre };
}

function inspire() {
  const elems = activeElements();
  if (remainingElements.length === 0) remainingElements = Object.keys(elems);
  const eIdx    = Math.floor(Math.random() * remainingElements.length);
  const element = remainingElements.splice(eIdx, 1)[0];
  const desc    = elems[element];

  // Pick word
  const { word, genre } = getWord();

  // Update element box
  const eBox = document.getElementById('elementBox');
  eBox.classList.add('has-result');
  eBox.innerHTML = `<div class="result-main">${element}</div><div class="result-desc">${desc}</div>`;
  eBox.classList.remove('sparking');
  void eBox.offsetWidth;
  eBox.classList.add('sparking');

  // Update word box
  const wBox = document.getElementById('wordBox');
  wBox.classList.add('has-result');
  wBox.innerHTML = `<span class="word-badge ${genre}">${word}</span><div class="word-genre-label">${genre === 'all' ? 'word' : genre}</div>`;
  wBox.classList.remove('sparking');
  void wBox.offsetWidth;
  wBox.classList.add('sparking');

  // Add to history
  addHistory(element, word, genre, currentLevel);
}

function addHistory(element, word, genre, level) {
  historyItems.unshift({ element, word, genre, level });
  renderHistory();
  updateHistoryEmoji(word, element);
}

const genreDefaultEmoji = {
  fantasy: '🧙', adventure: '🗺️', horror: '👻', action: '⚔️', all: '✨'
};

function emojiForWord(word, element, genre) {
  const w = (word || '').toLowerCase();
  if (wordEmojiMap[w]) return wordEmojiMap[w];
  // try partial match in element text
  const el = (element || '').toLowerCase();
  for (const [key, emoji] of Object.entries(wordEmojiMap)) {
    if (el.includes(key)) return emoji;
  }
  return genreDefaultEmoji[genre] || '✨';
}

function updateHistoryEmoji(word, element) {
  const el = document.getElementById('historyEmoji');
  const genre = historyItems[0]?.genre || 'all';
  const emoji = emojiForWord(word, element, genre);
  el.classList.remove('visible');
  setTimeout(() => {
    el.textContent = emoji;
    el.classList.add('visible');
  }, 120);
}



function renderHistory() {
  const list = document.getElementById('historyList');
  document.getElementById('historyCount').textContent = historyItems.length;

  if (historyItems.length === 0) {
    list.innerHTML = '<div class="history-empty">No sparks yet — hit Inspire Me!</div>';
    return;
  }

  const genreColors = {
    fantasy:   '#c77dff',
    adventure: '#28a745',
    horror:    '#ff6b6b',
    action:    '#4d96ff'
  };

  list.innerHTML = historyItems.map((item, i) => `
    <div class="history-item">
      <span class="h-num">#${historyItems.length - i}</span>
      <span class="h-level ${item.level}">${item.level === 'beginner' ? '🌱' : '🚀'}</span>
      <span class="h-element">${item.element}</span>
      <span class="h-word" style="background:${genreColors[item.genre] || '#ffd93d'}22; color:${genreColors[item.genre] || '#c47900'};">${item.word}</span>
    </div>
  `).join('');
}

// ── NOTES ────────────────────────────────────────────────────────────────────

function copyNotes() {
  const text = document.getElementById('notepad').value;
  if (!text.trim()) return;
  navigator.clipboard.writeText(text).then(() => {
    const btn = event.target;
    btn.textContent = '✅ Copied!';
    setTimeout(() => btn.textContent = '📋 Copy', 1500);
  });
}

function clearNotes() {
  if (document.getElementById('notepad').value.trim()) {
    if (confirm('Clear your story notes?')) document.getElementById('notepad').value = '';
  }
}

// ── RESET MODAL ───────────────────────────────────────────────────────────────

function showResetModal() { document.getElementById('resetModal').classList.add('show'); }
function hideResetModal() { document.getElementById('resetModal').classList.remove('show'); }

function confirmReset() {
  remainingElements = Object.keys(activeElements());
  remainingWords    = buildWordPool(activeWordsByGenre());
  historyItems = [];
  renderHistory();
  const he = document.getElementById('historyEmoji');
  he.classList.remove('visible');
  he.textContent = '';
  document.getElementById('elementBox').classList.remove('has-result');
  document.getElementById('elementBox').innerHTML = '<span class="result-placeholder">Hit Inspire Me to get started!</span>';
  document.getElementById('wordBox').classList.remove('has-result');
  document.getElementById('wordBox').innerHTML = '<span class="result-placeholder">—</span>';
  hideResetModal();
}

// Close modal on backdrop click
document.getElementById('resetModal').addEventListener('click', function(e) {
  if (e.target === this) hideResetModal();
});
