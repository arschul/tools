<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EFL Tournament</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0d0f14;
    --surface:   #161923;
    --surface2:  #1e2330;
    --border:    #2a3040;
    --blue:      #2563eb;
    --blue-lt:   #3b82f6;
    --cyan:      #06b6d4;
    --green:     #22c55e;
    --amber:     #f59e0b;
    --red:       #ef4444;
    --text:      #f1f5f9;
    --muted:     #64748b;
    --accent-stripe: repeating-linear-gradient(
      -55deg,
      transparent,
      transparent 6px,
      rgba(37,99,235,0.08) 6px,
      rgba(37,99,235,0.08) 12px
    );
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HEADER ────────────────────────────────── */
  header {
    background: var(--surface);
    border-bottom: 3px solid var(--blue);
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 26px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo-badge {
    background: var(--blue);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 3px;
    letter-spacing: 1px;
  }
  .header-meta {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1px;
    color: var(--muted);
    text-transform: uppercase;
  }

  /* ── LAYOUT ─────────────────────────────────── */
  main { max-width: 1100px; margin: 0 auto; padding: 32px 20px 60px; }

  /* ── SECTION CARD ───────────────────────────── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 28px;
    margin-bottom: 20px;
  }
  .card-header {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-header::before {
    content: '';
    display: block;
    width: 3px;
    height: 14px;
    background: var(--blue);
    border-radius: 2px;
  }

  /* ── FORM ELEMENTS ──────────────────────────── */
  label { font-size: 13px; color: var(--muted); font-weight: 600; letter-spacing: 0.5px; display: block; margin-bottom: 6px; }
  input[type="number"], input[type="text"], select {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    font-size: 15px;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }
  input[type="number"] { width: 80px; text-align: center; }
  input:focus, select:focus { border-color: var(--blue-lt); }
  .form-row { display: flex; align-items: flex-end; gap: 16px; flex-wrap: wrap; margin-bottom: 18px; }
  .form-group { display: flex; flex-direction: column; }

  /* ── BUTTONS ────────────────────────────────── */
  .btn {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    border: none;
    border-radius: 6px;
    padding: 11px 24px;
    cursor: pointer;
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 7px;
  }
  .btn-blue   { background: var(--blue); color: #fff; }
  .btn-blue:hover { background: var(--blue-lt); transform: translateY(-1px); }
  .btn-green  { background: var(--green); color: #000; }
  .btn-green:hover { filter: brightness(1.1); transform: translateY(-1px); }
  .btn-amber  { background: var(--amber); color: #000; }
  .btn-amber:hover { filter: brightness(1.1); transform: translateY(-1px); }
  .btn-red    { background: var(--red); color: #fff; }
  .btn-red:hover { filter: brightness(1.1); transform: translateY(-1px); }
  .btn-ghost  { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .btn-ghost:hover { color: var(--text); border-color: var(--muted); }
  .btn-sm { font-size: 12px; padding: 7px 14px; }

  /* ── STUDENT GRID ───────────────────────────── */
  .student-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .student-slot { display: flex; flex-direction: column; }
  .slot-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 5px;
  }

  /* ── PROGRESS BAR ───────────────────────────── */
  .progress-wrap {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 99px;
    height: 10px;
    overflow: hidden;
    margin-bottom: 6px;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--blue), var(--cyan));
    border-radius: 99px;
    transition: width 0.4s ease;
  }
  .progress-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  /* ── MATCH CARD ─────────────────────────────── */
  .match-arena {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 12px;
  }
  .match-arena-top {
    background: var(--accent-stripe);
    border-bottom: 1px solid var(--border);
    padding: 10px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .match-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
  }
  .match-round-badge {
    background: var(--blue);
    color: #fff;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 2px 8px;
    border-radius: 3px;
    text-transform: uppercase;
  }
  .match-versus {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    padding: 24px 20px;
    gap: 12px;
  }
  .player-block {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    text-align: center;
  }
  .player-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 22px;
    font-weight: 800;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text);
    margin-bottom: 4px;
  }
  .player-record {
    font-size: 12px;
    color: var(--muted);
    font-weight: 600;
  }
  .vs-badge {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 28px;
    font-weight: 900;
    color: var(--muted);
    letter-spacing: 2px;
    text-align: center;
  }
  .result-buttons {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    padding: 0 20px 20px;
  }
  .result-btn {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    border: none;
    border-radius: 6px;
    padding: 12px 8px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }
  .result-btn:hover { transform: translateY(-2px); filter: brightness(1.15); }
  .result-btn.p1 { background: var(--green); color: #000; }
  .result-btn.draw { background: var(--surface); color: var(--amber); border: 1px solid var(--amber); }
  .result-btn.p2 { background: var(--red); color: #fff; }
  .result-btn-label { font-size: 10px; letter-spacing: 1px; opacity: 0.75; margin-bottom: 3px; }
  .result-btn-name { font-size: 15px; }

  /* match actions */
  .match-actions {
    display: flex;
    gap: 8px;
    padding: 0 20px 16px;
    justify-content: flex-end;
  }

  /* ── COMPLETE STATE ─────────────────────────── */
  .tournament-complete {
    text-align: center;
    padding: 40px 20px;
  }
  .champion-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 52px;
    font-weight: 900;
    text-transform: uppercase;
    color: var(--amber);
    letter-spacing: 2px;
    line-height: 1;
    margin: 12px 0;
  }
  .champion-sub {
    font-size: 14px;
    color: var(--muted);
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* ── LEADERBOARD ────────────────────────────── */
  .lb-row {
    display: flex;
    align-items: center;
    padding: 12px 16px;
    border-radius: 7px;
    gap: 10px;
    margin-bottom: 6px;
    transition: background 0.2s;
    border: 1px solid transparent;
  }
  .lb-right { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; flex-shrink: 0; }
  .lb-row:hover { background: var(--surface2); }
  .lb-row.rank-1 {
    background: linear-gradient(90deg, rgba(245,158,11,0.12), transparent);
    border-color: rgba(245,158,11,0.3);
  }
  .lb-row.rank-2 { background: linear-gradient(90deg, rgba(148,163,184,0.08), transparent); }
  .lb-row.rank-3 { background: linear-gradient(90deg, rgba(180,120,80,0.08), transparent); }
  .lb-rank {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 20px;
    font-weight: 900;
    color: var(--muted);
    text-align: center;
  }
  .lb-row.rank-1 .lb-rank { color: var(--amber); }
  .lb-row.rank-2 .lb-rank { color: #94a3b8; }
  .lb-row.rank-3 .lb-rank { color: #b47850; }
  .lb-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 18px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .lb-pts {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 20px;
    font-weight: 900;
    text-align: right;
    color: var(--blue-lt);
  }
  .lb-row.rank-1 .lb-pts { color: var(--amber); }
  .lb-record {
    display: flex;
    gap: 4px;
    justify-content: flex-end;
  }
  .rec-chip {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 4px;
    letter-spacing: 0.5px;
  }
  .rec-w { background: rgba(34,197,94,0.2); color: var(--green); }
  .rec-d { background: rgba(245,158,11,0.2); color: var(--amber); }
  .rec-l { background: rgba(239,68,68,0.2); color: var(--red); }

  /* tiebreaker note */
  .tb-note {
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    margin-top: 10px;
    letter-spacing: 0.5px;
    font-style: italic;
  }

  /* ── HISTORY ────────────────────────────────── */
  .history-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 9px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    margin-bottom: 6px;
    font-size: 14px;
    gap: 12px;
  }
  .history-item.win-p1 { border-left: 3px solid var(--green); }
  .history-item.win-p2 { border-left: 3px solid var(--red); }
  .history-item.draw   { border-left: 3px solid var(--amber); }
  .history-result { font-weight: 600; flex: 1; }
  .history-meta { font-size: 12px; color: var(--muted); white-space: nowrap; }
  .undo-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 4px;
    padding: 3px 9px;
    font-size: 11px;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
  }
  .undo-btn:hover { color: var(--red); border-color: var(--red); }

  /* ── MAIN LAYOUT ───────────────────────────── */
  .tournament-grid {
    display: grid;
    grid-template-columns: 1fr 340px;
    gap: 20px;
  }
  @media (max-width: 800px) {
    .tournament-grid { grid-template-columns: 1fr; }
    .match-versus { grid-template-columns: 1fr auto 1fr; }
  }

  .hidden { display: none !important; }

  /* ── SKIP OVERLAY ─────────────────────────── */
  .skip-reason-wrap { padding: 0 20px 16px; display: none; }
  .skip-reason-wrap.visible { display: block; }
</style>
</head>
<body>

<header>
  <div class="logo">
    EFL <span class="logo-badge">TOURNAMENT</span>
  </div>
  <div class="header-meta" id="headerMeta">Setup</div>
</header>

<main>

  <!-- STEP 1 -->
  <div id="step1" class="card">
    <div class="card-header">Tournament Setup</div>
    <div class="form-row">
      <div class="form-group">
        <label for="studentCount">Competitors</label>
        <input type="number" id="studentCount" min="2" max="20" value="4">
      </div>
      <div class="form-group" style="flex:1; min-width:220px;">
        <label for="tournamentFormat">Format</label>
        <select id="tournamentFormat">
          <option value="single">Single Round-Robin (each pair plays once)</option>
          <option value="double">Double Round-Robin (each pair plays twice)</option>
        </select>
      </div>
      <button class="btn btn-blue" onclick="setupStudents()">Next →</button>
    </div>
  </div>

  <!-- STEP 2 -->
  <div id="step2" class="card hidden">
    <div class="card-header">Register Competitors</div>
    <div id="studentInputs" class="student-grid"></div>
    <button class="btn btn-blue" onclick="generateMatches()">Launch Tournament →</button>
  </div>

  <!-- TOURNAMENT -->
  <div id="tournamentSection" class="hidden">

    <!-- Progress -->
    <div style="margin-bottom:20px;">
      <div class="progress-label">
        <span id="progressText">Match 0 of 0</span>
        <span id="progressPct">0%</span>
      </div>
      <div class="progress-wrap">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
    </div>

    <div class="tournament-grid">

      <!-- LEFT: Match + History -->
      <div>
        <!-- Current Match -->
        <div class="card" style="padding:0; overflow:hidden;">
          <div id="currentMatchArea"></div>
        </div>

        <!-- History -->
        <div class="card">
          <div class="card-header">Match Log</div>
          <div id="matchHistory"></div>
          <div id="historyEmpty" style="font-size:13px; color:var(--muted); text-align:center; padding:10px 0;">No matches played yet.</div>
        </div>
      </div>

      <!-- RIGHT: Leaderboard -->
      <div>
        <div class="card">
          <div class="card-header">Standings</div>
          <div id="leaderboard"></div>
          <div class="tb-note" id="tbNote"></div>
        </div>
      </div>

    </div>
  </div>

</main>

<script>
// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
let students = [];
let matches = [];
let currentMatchIndex = 0;
let results = {};
let tournamentFormat = 'single';
let matchHistory = [];

// ═══════════════════════════════════════════════
// AUDIO
// ═══════════════════════════════════════════════
const AudioCtx = window.AudioContext || window.webkitAudioContext;
function playSound(type) {
  try {
    const ctx = new AudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    const freqMap = { win: [660, 880], draw: [440, 440], loss: [330, 220], setup: [520, 780] };
    const [f1, f2] = freqMap[type] || [440, 440];
    osc.frequency.setValueAtTime(f1, ctx.currentTime);
    osc.frequency.linearRampToValueAtTime(f2, ctx.currentTime + 0.15);
    osc.type = 'triangle';
    gain.gain.setValueAtTime(0.25, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.35);
    osc.start(); osc.stop(ctx.currentTime + 0.35);
  } catch(e) {}
}

// ═══════════════════════════════════════════════
// SETUP
// ═══════════════════════════════════════════════
function setupStudents() {
  const count = parseInt(document.getElementById('studentCount').value);
  if (count < 2) { alert('Need at least 2 competitors.'); return; }
  playSound('setup');
  const container = document.getElementById('studentInputs');
  container.innerHTML = '';
  for (let i = 0; i < count; i++) {
    const d = document.createElement('div');
    d.className = 'student-slot';
    d.innerHTML = `<div class="slot-label">Player ${i+1}</div>
      <input type="text" id="s${i}" value="Player ${i+1}" placeholder="Name">`;
    container.appendChild(d);
  }
  document.getElementById('step2').classList.remove('hidden');
  document.getElementById('step2').scrollIntoView({ behavior: 'smooth' });
}

// ═══════════════════════════════════════════════
// SCHEDULE GENERATION
// ═══════════════════════════════════════════════
function generateOptimalSchedule(players) {
  const all = [];
  const rounds = tournamentFormat === 'double' ? 2 : 1;
  for (let r = 0; r < rounds; r++) {
    for (let i = 0; i < players.length; i++)
      for (let j = i+1; j < players.length; j++)
        all.push({ p1: players[i], p2: players[j], result: null, round: r+1 });
  }
  const scheduled = [];
  const lastSeen = {};
  players.forEach(p => lastSeen[p] = -1);
  const remaining = [...all];
  while (remaining.length) {
    let best = null, bestScore = -Infinity, bestIdx = -1;
    for (let i = 0; i < remaining.length; i++) {
      const m = remaining[i];
      const score = (scheduled.length - lastSeen[m.p1]) + (scheduled.length - lastSeen[m.p2]);
      if (score > bestScore) { bestScore = score; best = m; bestIdx = i; }
    }
    scheduled.push(best);
    lastSeen[best.p1] = scheduled.length - 1;
    lastSeen[best.p2] = scheduled.length - 1;
    remaining.splice(bestIdx, 1);
  }
  return scheduled;
}

function generateMatches() {
  tournamentFormat = document.getElementById('tournamentFormat').value;
  students = [];
  document.querySelectorAll('#studentInputs input').forEach(inp => {
    if (inp.value.trim()) students.push(inp.value.trim());
  });
  if (students.length < 2) { alert('Enter at least 2 names.'); return; }
  playSound('setup');
  matches = generateOptimalSchedule(students);
  currentMatchIndex = 0;
  matchHistory = [];
  results = {};
  students.forEach(s => {
    results[s] = { name: s, points: 0, wins: 0, draws: 0, losses: 0, gf: 0, ga: 0, headToHead: {} };
  });
  document.getElementById('tournamentSection').classList.remove('hidden');
  document.getElementById('tournamentSection').scrollIntoView({ behavior: 'smooth' });
  document.getElementById('historyEmpty').style.display = 'block';
  render();
}

// ═══════════════════════════════════════════════
// RECORD RESULT
// ═══════════════════════════════════════════════
function recordResult(p1, p2, outcome) {
  const match = matches[currentMatchIndex];
  match.result = outcome;
  playSound(outcome === 'p1' ? 'win' : outcome === 'draw' ? 'draw' : 'loss');

  const r1 = results[p1], r2 = results[p2];
  if (outcome === 'p1') {
    r1.points += 3; r1.wins++; r1.gf += 1;
    r2.losses++; r2.ga += 1;
  } else if (outcome === 'p2') {
    r2.points += 3; r2.wins++; r2.gf += 1;
    r1.losses++; r1.ga += 1;
  } else {
    r1.points += 1; r1.draws++; r1.gf += 0.5; r1.ga += 0.5;
    r2.points += 1; r2.draws++; r2.gf += 0.5; r2.ga += 0.5;
  }

  // Head-to-head tracking
  if (!r1.headToHead[p2]) r1.headToHead[p2] = 0;
  if (!r2.headToHead[p1]) r2.headToHead[p1] = 0;
  if (outcome === 'p1') { r1.headToHead[p2] += 3; }
  else if (outcome === 'p2') { r2.headToHead[p1] += 3; }
  else { r1.headToHead[p2] += 1; r2.headToHead[p1] += 1; }

  matchHistory.push({ p1, p2, outcome, matchNum: currentMatchIndex + 1, round: match.round });
  currentMatchIndex++;
  render();
}

// ═══════════════════════════════════════════════
// UNDO
// ═══════════════════════════════════════════════
function undoMatch(histIdx) {
  if (histIdx < 0 || histIdx >= matchHistory.length) return;
  const entry = matchHistory[histIdx];
  // Only allow undoing if it's the last result before the current index
  // For safety, only undo the most recent entry
  if (histIdx !== matchHistory.length - 1) return;

  const { p1, p2, outcome } = entry;
  const r1 = results[p1], r2 = results[p2];
  if (outcome === 'p1') {
    r1.points -= 3; r1.wins--; r1.gf -= 1;
    r2.losses--; r2.ga -= 1;
    r1.headToHead[p2] -= 3;
  } else if (outcome === 'p2') {
    r2.points -= 3; r2.wins--; r2.gf -= 1;
    r1.losses--; r1.ga -= 1;
    r2.headToHead[p1] -= 3;
  } else {
    r1.points -= 1; r1.draws--; r1.gf -= 0.5; r1.ga -= 0.5;
    r2.points -= 1; r2.draws--; r2.gf -= 0.5; r2.ga -= 0.5;
    r1.headToHead[p2] -= 1; r2.headToHead[p1] -= 1;
  }
  matches[currentMatchIndex - 1].result = null;
  matchHistory.splice(histIdx, 1);
  currentMatchIndex--;
  render();
}

// ═══════════════════════════════════════════════
// SKIP
// ═══════════════════════════════════════════════
function skipMatch() {
  if (currentMatchIndex >= matches.length) return;
  matches[currentMatchIndex].skipped = true;
  matchHistory.push({
    p1: matches[currentMatchIndex].p1,
    p2: matches[currentMatchIndex].p2,
    outcome: 'skip',
    matchNum: currentMatchIndex + 1,
    round: matches[currentMatchIndex].round
  });
  currentMatchIndex++;
  render();
}

// ═══════════════════════════════════════════════
// TIEBREAKER SORT
// Always produces a strict 1-2-3 ordering.
// Chain: 1) Points  2) H2H pts (direct)  3) Goal diff
//        4) Wins  5) Fewest losses  6) Name (alphabet)
// ═══════════════════════════════════════════════
function getSortedStandings() {
  const arr = Object.values(results);

  return arr.sort((a, b) => {
    // 1. Points
    if (b.points !== a.points) return b.points - a.points;

    // 2. Head-to-head (direct result between these two players)
    const h2h_a = (a.headToHead[b.name] || 0);
    const h2h_b = (b.headToHead[a.name] || 0);
    if (h2h_a !== h2h_b) return h2h_b - h2h_a;

    // 3. Goal difference
    const gd_a = a.gf - a.ga, gd_b = b.gf - b.ga;
    if (gd_a !== gd_b) return gd_b - gd_a;

    // 4. Most wins
    if (b.wins !== a.wins) return b.wins - a.wins;

    // 5. Fewest losses
    if (a.losses !== b.losses) return a.losses - b.losses;

    // 6. Alphabetical — guarantees no two players ever share a rank
    return a.name.localeCompare(b.name);
  });
}

// Returns which tiebreaker(s) are actually in use right now
function getTiebreakerNote(sorted) {
  const usedBreakers = [];
  for (let i = 0; i < sorted.length - 1; i++) {
    const a = sorted[i], b = sorted[i + 1];
    if (a.points === b.points) {
      const h2h_a = (a.headToHead[b.name] || 0);
      const h2h_b = (b.headToHead[a.name] || 0);
      if (h2h_a !== h2h_b) { if (!usedBreakers.includes('H2H')) usedBreakers.push('H2H'); continue; }
      const gd_a = a.gf - a.ga, gd_b = b.gf - b.ga;
      if (gd_a !== gd_b) { if (!usedBreakers.includes('GD')) usedBreakers.push('GD'); continue; }
      if (a.wins !== b.wins) { if (!usedBreakers.includes('Wins')) usedBreakers.push('Wins'); continue; }
      if (a.losses !== b.losses) { if (!usedBreakers.includes('Losses')) usedBreakers.push('Losses'); continue; }
      if (!usedBreakers.includes('A–Z')) usedBreakers.push('A–Z');
    }
  }
  if (!usedBreakers.length) return '';
  const labels = { 'H2H': 'head-to-head', 'GD': 'goal diff', 'Wins': 'wins', 'Losses': 'fewest losses', 'A–Z': 'alphabetical' };
  return 'Tiebreaker applied: ' + usedBreakers.map(k => labels[k]).join(' → ');
}

// ═══════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════
function render() {
  updateProgress();
  renderCurrentMatch();
  renderLeaderboard();
  renderHistory();
  updateHeaderMeta();
}

function updateProgress() {
  const played = matchHistory.length;
  const total = matches.length;
  const pct = total ? Math.round((played / total) * 100) : 0;
  document.getElementById('progressText').textContent = `Match ${played} of ${total}`;
  document.getElementById('progressPct').textContent = `${pct}%`;
  document.getElementById('progressFill').style.width = pct + '%';
}

function updateHeaderMeta() {
  const played = matchHistory.filter(m => m.outcome !== 'skip').length;
  const total = matches.length;
  document.getElementById('headerMeta').textContent =
    currentMatchIndex < total ? `${total - currentMatchIndex} matches remaining` : 'Tournament complete';
}

function renderCurrentMatch() {
  const area = document.getElementById('currentMatchArea');
  if (currentMatchIndex >= matches.length) {
    const sorted = getSortedStandings();
    const champ = sorted[0];
    area.innerHTML = `
      <div class="tournament-complete">
        <div style="font-size:40px; margin-bottom:8px;">🏆</div>
        <div class="champion-sub">Tournament Champion</div>
        <div class="champion-name">${champ.name}</div>
        <div style="color:var(--muted); font-size:14px; margin-top:8px;">
          ${champ.wins}W ${champ.draws}D ${champ.losses}L · ${champ.points} pts
        </div>
        <div style="margin-top:20px;">
          <button class="btn btn-blue" onclick="restartTournament()">New Tournament</button>
        </div>
      </div>`;
    return;
  }

  const match = matches[currentMatchIndex];
  const p1 = match.p1, p2 = match.p2;
  const r1 = results[p1], r2 = results[p2];
  const roundBadge = tournamentFormat === 'double' ? `Round ${match.round}` : '';

  area.innerHTML = `
    <div class="match-arena-top">
      <span class="match-label">Match ${currentMatchIndex + 1} of ${matches.length}</span>
      ${roundBadge ? `<span class="match-round-badge">${roundBadge}</span>` : ''}
    </div>
    <div class="match-versus">
      <div class="player-block">
        <div class="player-name">${p1}</div>
        <div class="player-record">${r1.wins}W ${r1.draws}D ${r1.losses}L · ${r1.points}pts</div>
      </div>
      <div class="vs-badge">VS</div>
      <div class="player-block">
        <div class="player-name">${p2}</div>
        <div class="player-record">${r2.wins}W ${r2.draws}D ${r2.losses}L · ${r2.points}pts</div>
      </div>
    </div>
    <div class="result-buttons">
      <button class="result-btn p1" onclick="recordResult('${p1}','${p2}','p1')">
        <div class="result-btn-label">Winner</div>
        <div class="result-btn-name">${p1}</div>
      </button>
      <button class="result-btn draw" onclick="recordResult('${p1}','${p2}','draw')">
        <div class="result-btn-label">Result</div>
        <div class="result-btn-name">Draw</div>
      </button>
      <button class="result-btn p2" onclick="recordResult('${p1}','${p2}','p2')">
        <div class="result-btn-label">Winner</div>
        <div class="result-btn-name">${p2}</div>
      </button>
    </div>
    <div class="match-actions">
      <button class="btn btn-ghost btn-sm" onclick="skipMatch()">⏭ Skip Match</button>
    </div>
  `;
}

function renderLeaderboard() {
  const sorted = getSortedStandings();
  const container = document.getElementById('leaderboard');
  container.innerHTML = sorted.map((s, i) => {
    const rank = i + 1; // Always unique — tiebreakers guarantee strict ordering
    const rankClass = rank === 1 ? 'rank-1' : rank === 2 ? 'rank-2' : rank === 3 ? 'rank-3' : '';
    const medal = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : '';
    return `
      <div class="lb-row ${rankClass}">
        <div class="lb-rank">${medal || rank}</div>
        <div class="lb-name">${s.name}</div>
        <div class="lb-pts">${s.points}<span style="font-size:11px;color:var(--muted);font-weight:400;margin-left:2px;">PTS</span></div>
        <div class="lb-record">
          <span class="rec-chip rec-w">${s.wins}W</span>
          <span class="rec-chip rec-d">${s.draws}D</span>
          <span class="rec-chip rec-l">${s.losses}L</span>
        </div>
      </div>`;
  }).join('');
  document.getElementById('tbNote').textContent = getTiebreakerNote(sorted);
}

function renderHistory() {
  const container = document.getElementById('matchHistory');
  const empty = document.getElementById('historyEmpty');
  if (matchHistory.length === 0) {
    container.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  container.innerHTML = [...matchHistory].reverse().map((entry, revIdx) => {
    const actualIdx = matchHistory.length - 1 - revIdx;
    if (entry.outcome === 'skip') {
      return `
        <div class="history-item" style="border-left:3px solid var(--muted);">
          <span class="history-result" style="color:var(--muted);">⏭ ${entry.p1} vs ${entry.p2} — skipped</span>
          <span class="history-meta">Match ${entry.matchNum}</span>
          ${actualIdx === matchHistory.length - 1
            ? `<button class="undo-btn" onclick="undoMatch(${actualIdx})">Undo</button>` : ''}
        </div>`;
    }
    const cls = entry.outcome === 'p1' ? 'win-p1' : entry.outcome === 'p2' ? 'win-p2' : 'draw';
    let resultText = '';
    if (entry.outcome === 'p1') resultText = `<strong>${entry.p1}</strong> beat ${entry.p2}`;
    else if (entry.outcome === 'p2') resultText = `<strong>${entry.p2}</strong> beat ${entry.p1}`;
    else resultText = `${entry.p1} drew with ${entry.p2}`;
    const rnd = tournamentFormat === 'double' && entry.round ? ` · R${entry.round}` : '';
    return `
      <div class="history-item ${cls}">
        <span class="history-result">${resultText}</span>
        <span class="history-meta">M${entry.matchNum}${rnd}</span>
        ${actualIdx === matchHistory.length - 1
          ? `<button class="undo-btn" onclick="undoMatch(${actualIdx})">Undo</button>` : ''}
      </div>`;
  }).join('');
}

// ═══════════════════════════════════════════════
// RESTART
// ═══════════════════════════════════════════════
function restartTournament() {
  document.getElementById('tournamentSection').classList.add('hidden');
  document.getElementById('step2').classList.add('hidden');
  document.getElementById('step1').scrollIntoView({ behavior: 'smooth' });
}
</script>
</body>
</html>
