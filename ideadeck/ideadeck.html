<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IdeaDeck</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f13;
    --surface: #1a1a22;
    --surface2: #22222e;
    --border: #2e2e3e;
    --text: #e8e8f0;
    --muted: #7878a0;
    --accent: #f0c040;
    --accent2: #60c4a0;
    --accent3: #c078f0;
    --danger: #f07060;
    --radius: 12px;
    --header-bg-start: #16161f;
  }

  body.light {
    --bg: #f4f4f0;
    --surface: #ffffff;
    --surface2: #ededea;
    --border: #d8d8d0;
    --text: #1a1a22;
    --muted: #7878a0;
    --accent: #c49a00;
    --accent2: #2a9a78;
    --accent3: #8040c8;
    --danger: #d04030;
    --header-bg-start: #e8e8e2;
  }

  body.light header {
    background: linear-gradient(180deg, var(--header-bg-start) 0%, var(--bg) 100%);
  }

  body.light .card:hover {
    box-shadow: 0 8px 32px rgba(0,0,0,0.12);
  }

  body.light .step-content strong { color: var(--text); }
  body.light .title-block h1 { color: var(--text); }
  body.light .detail-title { color: var(--text); }

  /* THEME TOGGLE */
  .theme-toggle {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 50%;
    color: var(--text);
    cursor: pointer;
    font-size: 18px;
    height: 36px;
    width: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .theme-toggle:hover { border-color: var(--accent); transform: rotate(20deg); }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    padding: 48px 40px 32px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, #16161f 0%, var(--bg) 100%);
    position: sticky;
    top: 0;
    z-index: 10;
    backdrop-filter: blur(12px);
  }

  .header-inner {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    align-items: flex-end;
    gap: 32px;
    flex-wrap: wrap;
  }

  .title-block h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(28px, 4vw, 44px);
    font-weight: 900;
    letter-spacing: -0.5px;
    line-height: 1;
    color: #fff;
  }

  .title-block h1 span {
    color: var(--accent);
  }

  .title-block p {
    margin-top: 6px;
    color: var(--muted);
    font-size: 14px;
    font-weight: 300;
    letter-spacing: 0.5px;
  }

  .controls {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-left: auto;
    align-items: center;
  }

  .search-wrap {
    position: relative;
  }

  .search-wrap input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 9px 14px 9px 36px;
    outline: none;
    width: 220px;
    transition: border-color 0.2s;
  }

  .search-wrap input:focus { border-color: var(--accent); }

  .search-icon {
    position: absolute;
    left: 11px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 15px;
    pointer-events: none;
  }

  .cat-filters {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .cat-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.5px;
    padding: 6px 12px;
    text-transform: uppercase;
    transition: all 0.15s;
  }

  .cat-btn:hover { border-color: var(--accent); color: var(--accent); }
  .cat-btn.active { background: var(--accent); border-color: var(--accent); color: #111; }

  /* COUNT BAR */
  .count-bar {
    max-width: 1200px;
    margin: 20px auto 0;
    padding: 0 40px;
    color: var(--muted);
    font-size: 13px;
  }

  /* GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
    max-width: 1200px;
    margin: 24px auto;
    padding: 0 40px 60px;
  }

  /* CARD */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    cursor: pointer;
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding: 20px;
    position: relative;
    transition: transform 0.18s, border-color 0.18s, box-shadow 0.18s;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--card-accent, var(--accent));
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.2s;
  }

  .card:hover {
    border-color: var(--card-accent, var(--accent));
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    transform: translateY(-3px);
  }

  .card:hover::before { transform: scaleX(1); }

  .card-icon {
    font-size: 28px;
    line-height: 1;
  }

  .card-title {
    font-family: 'Playfair Display', serif;
    font-size: 17px;
    font-weight: 700;
    color: #fff;
    line-height: 1.2;
  }

  .card-subtitle {
    color: var(--muted);
    font-size: 12px;
    font-weight: 300;
    line-height: 1.4;
  }

  .card-footer {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
    margin-top: auto;
    padding-top: 10px;
    border-top: 1px solid var(--border);
  }

  .tag {
    border-radius: 4px;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.4px;
    padding: 3px 7px;
    text-transform: uppercase;
  }

  .tag-cat {
    background: var(--surface2);
    color: var(--muted);
    border: 1px solid var(--border);
  }

  .tag-beg { background: rgba(96,196,160,0.15); color: var(--accent2); border: 1px solid rgba(96,196,160,0.3); }
  .tag-int { background: rgba(240,192,64,0.15); color: var(--accent); border: 1px solid rgba(240,192,64,0.3); }
  .tag-adv { background: rgba(192,120,240,0.15); color: var(--accent3); border: 1px solid rgba(192,120,240,0.3); }

  body.light .detail-title { color: var(--text); }
  body.light .card-title { color: var(--text); }

  /* DETAIL VIEW */
  #view-grid, #view-detail { transition: opacity 0.18s; }
  #view-detail { display: none; }
  #view-detail.active { display: block; }

  .detail-page {
    max-width: 860px;
    margin: 0 auto;
    padding: 32px 40px 80px;
  }

  .detail-back {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 8px 14px;
    margin-bottom: 36px;
    transition: all 0.15s;
  }
  .detail-back:hover { border-color: var(--accent); color: var(--accent); }

  .detail-hero {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 32px;
    padding-bottom: 28px;
    border-bottom: 1px solid var(--border);
  }

  .detail-icon { font-size: 48px; line-height: 1; flex-shrink: 0; }
  .detail-meta { flex: 1; }

  .detail-cat {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .detail-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(22px, 3.5vw, 32px);
    font-weight: 900;
    color: var(--text);
    line-height: 1.1;
    margin-bottom: 8px;
  }

  .detail-tagline {
    color: var(--muted);
    font-size: 14px;
    font-weight: 300;
    line-height: 1.5;
  }

  /* ACCORDION */
  .accordion { display: flex; flex-direction: column; gap: 10px; }

  .acc-item { border-radius: 12px; overflow: hidden; border: 1px solid var(--border); }

  .acc-btn {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 18px 22px;
    background: var(--surface);
    border: none;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    text-align: left;
    transition: background 0.15s;
  }
  .acc-btn:hover { background: var(--surface2); }
  .acc-item.open .acc-btn { background: var(--surface2); }

  .acc-badge {
    border-radius: 6px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.6px;
    padding: 4px 10px;
    text-transform: uppercase;
    flex-shrink: 0;
  }

  .acc-label { font-size: 15px; font-weight: 500; flex: 1; }
  .acc-cefr { font-size: 12px; color: var(--muted); flex-shrink: 0; }

  .acc-arrow {
    font-size: 12px;
    color: var(--muted);
    transition: transform 0.25s;
    flex-shrink: 0;
  }
  .acc-item.open .acc-arrow { transform: rotate(180deg); }

  /* Level colours */
  .acc-beg .acc-badge { background: rgba(96,196,160,0.18); color: var(--accent2); }
  .acc-beg .acc-label { color: var(--accent2); }
  .acc-beg .acc-step-num { background: var(--accent2); }
  .acc-beg.open { border-color: rgba(96,196,160,0.35); }
  .acc-beg .acc-btn { border-left: 3px solid var(--accent2); }

  .acc-int .acc-badge { background: rgba(240,192,64,0.18); color: var(--accent); }
  .acc-int .acc-label { color: var(--accent); }
  .acc-int .acc-step-num { background: var(--accent); }
  .acc-int.open { border-color: rgba(240,192,64,0.35); }
  .acc-int .acc-btn { border-left: 3px solid var(--accent); }

  .acc-adv .acc-badge { background: rgba(192,120,240,0.18); color: var(--accent3); }
  .acc-adv .acc-label { color: var(--accent3); }
  .acc-adv .acc-step-num { background: var(--accent3); }
  .acc-adv.open { border-color: rgba(192,120,240,0.35); }
  .acc-adv .acc-btn { border-left: 3px solid var(--accent3); }

  /* PANEL */
  .acc-panel {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.35s cubic-bezier(0.4,0,0.2,1);
    background: var(--bg);
  }
  .acc-item.open .acc-panel { max-height: 2000px; }

  .acc-panel-inner {
    padding: 20px 24px 24px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px 28px;
  }

  @media (max-width: 600px) {
    .acc-panel-inner { grid-template-columns: 1fr; }
  }

  .acc-step {
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }

  .acc-step-num {
    border-radius: 50%;
    color: #111;
    font-size: 11px;
    font-weight: 700;
    height: 22px;
    min-width: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 2px;
    flex-shrink: 0;
  }

  .acc-step-text strong {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 2px;
  }

  .acc-step-text p {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.5;
    font-weight: 300;
  }

  .acc-tip {
    grid-column: 1 / -1;
    margin-top: 6px;
    padding: 12px 16px;
    border-radius: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    font-size: 12px;
    color: var(--muted);
    line-height: 1.6;
    font-style: italic;
  }
  .acc-tip::before { content: '💡 '; font-style: normal; }

  /* NO RESULTS */
  .no-results {
    grid-column: 1/-1;
    text-align: center;
    color: var(--muted);
    padding: 60px 0;
    font-size: 15px;
  }

  @media (max-width: 820px) {
    .detail-page { padding: 24px 20px 60px; }
    .detail-hero { flex-direction: column; align-items: flex-start; gap: 12px; }
  }

  @media (max-width: 600px) {
    header { padding: 20px 16px 16px; }
    .grid { padding: 0 16px 40px; }
    .count-bar { padding: 0 16px; }
    .header-inner { flex-direction: column; align-items: flex-start; gap: 14px; }
    .controls { margin-left: 0; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="title-block">
      <h1>Idea<span>Deck</span></h1>
      <p>EFL Speaking &amp; Presentation Activities</p>
    </div>
    <div class="controls">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="search" placeholder="Search activities…" oninput="filterCards()">
      </div>
      <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Toggle light/dark mode">🌙</button>
      <div class="cat-filters" id="catFilters"></div>
    </div>
  </div>
</header>

<div class="count-bar" id="countBar"></div>

<div id="view-grid">
  <div class="grid" id="grid"></div>
</div>

<div id="view-detail">
  <div class="detail-page" id="detailPage"></div>
</div>

<script>
const CATEGORIES = {
  'World & Culture': { icon: '🌍', color: '#60c4a0', items: ['New Country','Festivals Around the World','Historical Era','Myths and Legends','Culinary Journey','Food Fusion Revolution','Global Garden','Educational Time Travel','Cultural Exchange'] },
  'Creative & Design': { icon: '🎨', color: '#f0c040', items: ['Unseen Artwork','Futuristic Fashion','Design a Robot','Design a Theme Park','Eco-Friendly City','Alien Planet','Digital Art Gallery','Sustainable Fashion Show','Virtual Reality Museum','Street Art Project'] },
  'Science & Future': { icon: '🔬', color: '#c078f0', items: ['Future Predictions','Innovative Technology','Space Colony','Alternate Universe','Digital Democracy','Future of Education','Futuristic City','Climate Change Solutions','Medical Breakthrough'] },
  'Survival & Adventure': { icon: '🏕️', color: '#f07060', items: ['Deserted Island','Pandemic Survival Plan','Underwater Adventure','Time Travel Trip','Alien Encounter','Prison System','Extreme Expedition'] },
  'Entertainment': { icon: '🎬', color: '#60a0f0', items: ['Famous Figure','Book','Movie','Virtual Concert','Celebrity Interview','Dream Concert','Virtual Reality','Olympic Games','Plan a Music Festival','Escape Room Challenge','Create a Board Game','Talk Show Host'] },
  'Personal & Social': { icon: '👤', color: '#f08040', items: ['Who Am I?','Roommates','Bucket List','Lottery Winners','Money Countdown','What\'s on the news?','Perfect School','Wildlife Conservation','Life Coach'] },
  'Innovation & Business': { icon: '💡', color: '#a0e040', items: ['Invention','Entrepreneurial Venture','Invent a Language','Global News Network','Digital Time Capsule','Story World','Crowdfunding Campaign'] },
  'Fantasy & Sci-Fi': { icon: '🚀', color: '#e040a0', items: ['Superheroes and Villains','A new place in town','Travel Credits'] },
};

const DATA = [
  {
    title: 'New Country',
    icon: '🌍',
    tagline: 'Combine the best of six real countries into one imaginary nation.',
    steps: ['Name six random countries','Choose one aspect per country: Geography, Language, Culture, Government, Weather, Food','Describe how these aspects combine in your new country','Name your new country','Share the results'],
    beg: {
      steps: [
        { title: 'Pick 6 countries', desc: 'Each student or pair names one country they know. Write them on the board.' },
        { title: 'Choose one feature', desc: 'Assign one category per country: geography, language, culture, government, weather, or food. Students choose the best example.' },
        { title: 'Name the country', desc: 'Invent a simple name. Example: "Braziland" or "Sunland".' },
        { title: 'Share 3 sentences', desc: 'Each group says 3 sentences about their country using simple present: "Our country has tropical weather. We speak English. We eat sushi."' },
      ],
      tip: 'Provide a sentence frame on the board: "Our country is called ___. It has ___ weather. People speak ___ and eat ___."'
    },
    int: {
      steps: [
        { title: 'Research & select', desc: 'Each group randomly picks 6 countries (use a random spinner or folded cards). Assign each country one category.' },
        { title: 'Describe each feature', desc: 'Write 2–3 sentences for each feature, explaining why it was chosen and what it\'s like.' },
        { title: 'Build a profile', desc: 'Create a short country profile: flag colors, capital city, national sport or hobby.' },
        { title: 'Name & present', desc: 'Name the country with a creative hybrid name. Present for 2 minutes using descriptive language.' },
        { title: 'Q&A', desc: 'Other groups ask at least 2 questions using "What / Why / How".' },
      ],
      tip: 'Encourage use of comparatives: "Unlike Brazil, our country has…" or "Similar to Japan, we value…"'
    },
    adv: {
      steps: [
        { title: 'Random selection', desc: 'Randomly assign 6 countries. Each member researches their assigned aspect independently.' },
        { title: 'Deep dive', desc: 'Each feature must include: one real-world example, one original adaptation, and one potential challenge. E.g., "We adopted Japan\'s train system but adapted it for our mountainous geography."' },
        { title: 'Conflicts & solutions', desc: 'Identify at least 2 cultural or logistical conflicts that might arise from combining these aspects and propose solutions.' },
        { title: 'Full presentation', desc: 'Deliver a structured 4–5 minute presentation with an intro, body (one speaker per feature), and conclusion. Create a simple visual aid if possible.' },
        { title: 'Class vote & debate', desc: 'The class votes on which new country they\'d most want to live in, then defends or debates their choice.' },
      ],
      tip: 'Push for conditional structures: "If we combined German efficiency with Brazilian hospitality, we would…" Great for practicing cohesive devices (however, therefore, on the other hand).'
    }
  },
  {
    title: 'Endangered Animal',
    icon: '🦏',
    tagline: 'Explore the story of a species fighting for survival.',
    steps: ['Origin','Characteristics','Curiosities','Current situation','Future'],
    beg: {
      steps: [
        { title: 'Pick an animal', desc: 'Choose a well-known endangered animal (e.g. panda, tiger, whale). Teacher can provide a list with pictures.' },
        { title: 'Basic facts', desc: 'Find out: where it lives, what it eats, what it looks like. Use simple vocabulary.' },
        { title: 'Why is it endangered?', desc: 'One sentence: "The ___ is endangered because ___."' },
        { title: 'Share', desc: 'Say 4–5 sentences about the animal to the class.' },
      ],
      tip: 'Use visual support — show pictures and label body parts together before students present.'
    },
    int: {
      steps: [
        { title: 'Research', desc: 'Find origin, habitat, diet, appearance, and one surprising curiosity.' },
        { title: 'Current situation', desc: 'How many are left? Why are they endangered? (habitat loss, hunting, climate)' },
        { title: 'Curiosity spotlight', desc: 'Share one unusual or little-known fact to engage the audience.' },
        { title: 'What\'s being done?', desc: 'Mention one conservation effort in place.' },
        { title: 'Present', desc: '2–3 minute group presentation using past and present tenses.' },
      ],
      tip: 'Teach "used to" for before/now contrast: "Polar bears used to live in larger territories, but now…"'
    },
    adv: {
      steps: [
        { title: 'Origin & evolution', desc: 'Where and when did this species evolve? What ecological role does it play? Discuss food chains and ecosystems.' },
        { title: 'Full profile', desc: 'Characteristics (physical and behavioral), lifespan, reproduction, and unique adaptations.' },
        { title: 'Threat analysis', desc: 'Rank the top 3 threats by severity. Support with approximate statistics.' },
        { title: 'Intervention & future', desc: 'Evaluate current conservation efforts. Are they working? What more could be done? Project whether the species will survive 50 years from now.' },
        { title: 'Persuasive close', desc: 'End with a call to action. Students must persuade classmates to care about this species specifically.' },
      ],
      tip: 'Challenge students with passive voice: "This species is threatened by…" and modal verbs of speculation: "It could disappear by 2050 unless…"'
    }
  },
  {
    title: 'Invention',
    icon: '💡',
    tagline: 'Design a never-before-seen product to solve a real problem.',
    steps: ['Choose a modern day problem','Set the rules (realistic, magic, etc.)','Create an innovative product','Share the results'],
    beg: {
      steps: [
        { title: 'Name a problem', desc: 'What is something that bothers people daily? (e.g. forgetting your keys, being late, feeling tired)' },
        { title: 'Invent!', desc: 'Think of a simple invention. Give it a name. What does it do in one sentence?' },
        { title: 'Draw it', desc: 'Quick sketch of the invention with labeled parts.' },
        { title: 'Share', desc: 'Say: "My invention is called ___. It ___. It helps people because ___."' },
      ],
      tip: 'Limit to one problem + one solution to avoid overwhelm. Focus on fluency over accuracy.'
    },
    int: {
      steps: [
        { title: 'Problem first', desc: 'Identify and describe a real, specific problem. Who is affected? How often?' },
        { title: 'Set parameters', desc: 'Is the invention realistic or futuristic/magical? What are the rules?' },
        { title: 'Design the product', desc: 'Name, appearance, how it works, who uses it, how much it costs.' },
        { title: 'Pitch it', desc: '2-minute pitch using persuasive language: "Our invention will… People need this because…"' },
        { title: 'Field questions', desc: 'Classmates ask questions about the product.' },
      ],
      tip: 'Model a simple product pitch structure: Problem → Solution → Benefits → Call to action.'
    },
    adv: {
      steps: [
        { title: 'Market research', desc: 'Identify an existing problem in society. Who are the main groups affected? Discuss scale and impact.' },
        { title: 'Prototype planning', desc: 'Design the product in detail: materials, mechanism, user experience, cost of production vs retail price.' },
        { title: 'Ethics & drawbacks', desc: 'What could go wrong? Any ethical concerns? Environmental impact? Potential misuse?' },
        { title: 'Marketing angle', desc: 'Who is the target audience? How would you sell it? Name, slogan, and one advertisement concept.' },
        { title: 'Full pitch', desc: '4–5 minutes. Simulate a Shark Tank-style presentation. Other students role-play as investors with questions.' },
      ],
      tip: 'Great opportunity for conditionals (second/third) and modals: "If we launched this in Brazil, it would…" / "This could revolutionize the way people…"'
    }
  },
  {
    title: 'Travel Credits',
    icon: '✈️',
    tagline: 'Budget your way around the world on a limited credit allowance.',
    steps: ['Students start with 5–10 credits','Each credit lets them go to a different place','Plan the trip','Share the results'],
    beg: {
      steps: [
        { title: 'Set the credits', desc: 'Each student has 5 credits. Each credit = one destination.' },

    itemToCategory[item] = cat;
    itemToColor[item] = color;
  });
});

  wrap.appendChild(allBtn);

  Object.entries(CATEGORIES).forEach(([cat, { icon }]) => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn';
    btn.textContent = icon + ' ' + cat;
    btn.onclick = () => setFilter(cat, btn);
    wrap.appendChild(btn);
  });
}

function setFilter(cat, btn) {
  activeFilter = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCards();
}

function filterCards() {
  renderCards();
}

function renderCards() {
  const query = document.getElementById('search').value.toLowerCase();
  const grid = document.getElementById('grid');
  const bar = document.getElementById('countBar');
  grid.innerHTML = '';

  const filtered = DATA.filter(d => {
    const cat = getCat(d.title);
    const matchCat = activeFilter === 'All' || cat === activeFilter;
    const matchQuery = !query || d.title.toLowerCase().includes(query) || d.tagline.toLowerCase().includes(query);
    return matchCat && matchQuery;
  });

  bar.textContent = filtered.length + ' activit' + (filtered.length === 1 ? 'y' : 'ies');

  if (filtered.length === 0) {
    const el = document.createElement('div');
    el.className = 'no-results';
    el.textContent = 'No activities match your search.';
    grid.appendChild(el);
    return;
  }

  filtered.forEach((d, i) => {
    const cat = getCat(d.title);
    const color = getColor(d.title);
    const card = document.createElement('div');
    card.className = 'card';
    card.style.setProperty('--card-accent', color);
    card.style.animationDelay = (i * 30) + 'ms';
    card.innerHTML = `
      <div class="card-icon">${d.icon}</div>
      <div class="card-title">${d.title}</div>
      <div class="card-subtitle">${d.tagline}</div>
      <div class="card-footer">
        <span class="tag tag-cat">${cat}</span>
        <span class="tag tag-beg">A1–A2</span>
        <span class="tag tag-int">B1</span>
        <span class="tag tag-adv">B2</span>
      </div>
    `;
    card.onclick = () => openDetail(d);
    grid.appendChild(card);
  });
}

function buildAccordion(levelData, cls, badge, label, cefr, idx) {
  const steps = levelData.steps.map((s, i) => `
    <div class="acc-step">
      <div class="acc-step-num">${i + 1}</div>
      <div class="acc-step-text">
        <strong>${s.title}</strong>
        <p>${s.desc}</p>
      </div>
    </div>
  `).join('');

  return `
    <div class="acc-item ${cls}" id="acc-${idx}">
      <button class="acc-btn" onclick="toggleAcc(${idx})">
        <span class="acc-badge">${badge}</span>
        <span class="acc-label">${label}</span>
        <span class="acc-cefr">${cefr}</span>
        <span class="acc-arrow">▼</span>
      </button>
      <div class="acc-panel">
        <div class="acc-panel-inner">
          ${steps}
          ${levelData.tip ? `<div class="acc-tip">${levelData.tip}</div>` : ''}
        </div>
      </div>
    </div>
  `;
}

function toggleAcc(idx) {
  const item = document.getElementById('acc-' + idx);
  const isOpen = item.classList.contains('open');
  // close all
  document.querySelectorAll('.acc-item').forEach(i => i.classList.remove('open'));
  // open this one unless it was already open
  if (!isOpen) item.classList.add('open');
}

function openDetail(d) {
  currentCard = d;
  const cat = getCat(d.title);

  const html = `
    <button class="detail-back" onclick="closeDetail()">← Back to IdeaDeck</button>
    <div class="detail-hero">
      <div class="detail-icon">${d.icon}</div>
      <div class="detail-meta">
        <div class="detail-cat">${cat}</div>
        <div class="detail-title">${d.title}</div>
        <div class="detail-tagline">${d.tagline}</div>
      </div>
    </div>
    <div class="accordion">
      ${buildAccordion(d.beg, 'acc-beg', 'A1–A2', '🌱 Beginner', 'Elementary', 0)}
      ${buildAccordion(d.int, 'acc-int', 'B1', '📗 Pre-Intermediate', 'Pre-Intermediate', 1)}
      ${buildAccordion(d.adv, 'acc-adv', 'B2', '🚀 Upper-Intermediate', 'Upper-Intermediate', 2)}
    </div>
  `;

  document.getElementById('detailPage').innerHTML = html;
  document.getElementById('view-grid').style.display = 'none';
  document.getElementById('countBar').style.display = 'none';
  document.getElementById('view-detail').classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function closeDetail() {
  document.getElementById('view-detail').classList.remove('active');
  document.getElementById('view-grid').style.display = '';
  document.getElementById('countBar').style.display = '';
  window.scrollTo({ top: 0, behavior: 'instant' });
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeDetail();
});

buildFilters();
renderCards();

function toggleTheme() {
  const isLight = document.body.classList.toggle('light');
  document.getElementById('themeToggle').textContent = isLight ? '☀️' : '🌙';
  localStorage.setItem('phTheme', isLight ? 'light' : 'dark');
}

// Restore saved theme
if (localStorage.getItem('phTheme') === 'light') {
  document.body.classList.add('light');
  document.getElementById('themeToggle').textContent = '☀️';
}
</script>
</body>
</html>
