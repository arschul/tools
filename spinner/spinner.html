            mint: '#34d399',
            mintGlow: 'rgba(52, 211, 153, 0.2)',
            coral: '#f472b6',

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f1119; overflow-x: hidden; }

    .glow-accent { box-shadow: 0 0 40px rgba(99, 102, 241, 0.3), 0 0 80px rgba(99, 102, 241, 0.1); }
    .glow-mint { box-shadow: 0 0 30px rgba(52, 211, 153, 0.3); }
    .glow-coral { box-shadow: 0 0 30px rgba(244, 114, 182, 0.3); }

    .spinner-text {
      transition: opacity 0.05s;
    }

    .spinning .spinner-text {
      animation: textBlur 0.1s infinite alternate;
    }

    @keyframes textBlur {
      0% { filter: blur(0px); opacity: 1; }
      100% { filter: blur(1.5px); opacity: 0.85; }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .fade-in-up { animation: fadeInUp 0.5s ease-out; }

    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 0 20px rgba(99, 102, 241, 0.2); }
      50% { box-shadow: 0 0 40px rgba(99, 102, 241, 0.5), 0 0 80px rgba(99, 102, 241, 0.2); }
    }

    .pulse-glow { animation: pulseGlow 2s ease-in-out infinite; }

    @keyframes landed {
      0% { transform: scale(1); }
      50% { transform: scale(1.02); }
      100% { transform: scale(1); }
    }

    .land-bounce { animation: landed 0.4s ease-out; }

    .category-chip {
      transition: all 0.2s ease;
    }
    .category-chip:hover {
      transform: translateY(-2px);
    }
    .category-chip.active {
      transform: translateY(-2px);
    }

    .stopwatch-ring {
      transition: stroke-dashoffset 1s linear;
    }

    .bg-grid {
      background-image:
        linear-gradient(rgba(99, 102, 241, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(99, 102, 241, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    .question-display {
      min-height: 160px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-spin {
      background: linear-gradient(135deg, #6366f1 0%, #818cf8 100%);
      transition: all 0.3s ease;
    }
    .btn-spin:hover:not(:disabled) {
      background: linear-gradient(135deg, #818cf8 0%, #6366f1 100%);
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(99, 102, 241, 0.4);
    }
    .btn-spin:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .counter-badge {
      font-variant-numeric: tabular-nums;
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #181a27; }
    ::-webkit-scrollbar-thumb { background: #2a2d3e; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #3a3d5e; }
  </style>

          </svg>

            <span class="text-xs text-textSecondary mt-1" id="timerLabel">min : sec</span>
          </div>
        </div>

        <!-- Timer Controls -->
        <div class="flex items-center gap-3">
          <button id="timerStartBtn" class="flex items-center gap-2 bg-mint/10 border border-mint/30 text-mint font-medium px-5 py-2.5 rounded-xl hover:bg-mint/20 transition-colors">
            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
              <path d="M8 5v14l11-7z" />
            </svg>
            Start
          </button>
          <button id="timerPauseBtn" class="flex items-center gap-2 bg-surface border border-border text-textSecondary font-medium px-5 py-2.5 rounded-xl hover:text-textPrimary hover:border-textSecondary/30 transition-colors" style="display:none;">
            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
              <path d="M6 4h4v16H6zm8 0h4v16h-4z" />
            </svg>
            Pause
          </button>
          <button id="timerResetBtn" class="flex items-center gap-2 bg-surface border border-border text-textSecondary font-medium px-5 py-2.5 rounded-xl hover:text-coral hover:border-coral/30 transition-colors">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
            </svg>
            Reset
          </button>
        </div>
      </div>
    </section>

    <!-- All Done Banner (hidden by default) -->
    <section id="allDoneBanner" class="bg-card border border-mint/30 rounded-2xl p-6 text-center hidden">
      <div class="flex flex-col items-center gap-3">

        "Beer or Wine?","Realistic Art or Surrealist Art?","Antique Furniture or Modern Furniture?","Oven or Grill?","Wine or Whiskey?","Camping or Glamping?","Hot Springs or Cold Plunge Pool?","Penthouse or Countryside Villa?","Formal Dinner or Casual Picnic?","Stone Pathway or Wooden Pathway?","Paperback or E-Reader?","Classical Ballet or Contemporary Dance?","Hard Cheese or Soft Cheese?","Wine And Cheese or Beer and Pretzels?","Tea Ceremony or Wine Tasting?","Marble Statue or Bronze Statue?","Art Deco or Minimalism?","Fresh Flowers or Silk Flowers?","Farmers Market or Flea Market?","Tap Dance or Ballet?","Terracotta Pot or Glass Vase?","Charcoal Grilling or Gas Grilling?","Backyard BBQ Area or Gourmet Kitchen?","Ceiling Fan or Tabletop / Floor Fan?","White Glove Service or Self-Service?","Fishing Boat or Luxury Yacht?","Crossword Puzzle or Sudoku?","Classical Music or Blues?","Cowabunga or Yabba Dabba Doo?","Cross-Country Skiing or Downhill Skiing?","Jazz Club or Piano Bar?","Art Auction or Garage Sale?","Bed And Breakfast or Luxury Hotel?","Couch Potato or Gym Rat?","Rare Book Collection or Wine Collection?","Real Estate or Stocks?","Opera or Jazz Club?","Casual Brunch or Formal Dinner?","Hot Air Balloon Ride or Helicopter Tour?","Caviar or Truffles?","Food Truck Hopping or Gourmet Food Tour?","Rural Living or Urban Living?","Summer Vacation or Winter Holiday?","Spa Retreat or Adventure Travel?","Wine Tasting or Brewery Tour?","Vintage Car or Electric Car?","Bouncing Castle for Adults or Treehouse for Adults?","Square Dance or River Dance?","Art Gallery or History Museum Visit?","Symphony or Rock Concert?","Skyscraper Apartment or Bungalow?","Morning Jog or Evening Walk?","In-Person Meeting or Video Conference?","Snorkeling or SCUBA Diving?","Aerobics or Yoga?","Online Newspaper or Print Newspaper?","Full Moon Beach Party or New Moon Rooftop Party?","Indoor Plants or Outdoor Garden?","Tent Camping or RV Camping?","Off the Rack Clothes or Designer Brands?","Instant Coffee or French Press?","Yacht or Private Jet?","Birdwatching or Stargazing?","Oil Painting or Sculpture?","Golf or NASCAR?","Jazz Band or Symphony Orchestra?","Luxury Car or Classic Car?","Weekend Getaway or Staycation?","Gourmet Dining or Street Food?","Physical Book or Kindle?","Black-Tie Gala or Cocktail Party?","Opera or Rock Concert?","Pottery Class or Glassblowing Class?","Manual or Automatic?","Past was Better or Future will be Better?","Farmers Market or Grocery Store?","Crystal Chandelier or Minimalist Light?","Cooking Class or Painting Class?","Live Theater or Comedy Show?","Electric or Gas Stovetop?"
      ]
    };

    // ── STATE ──
    const usedQuestions = {};
    let currentCategory = null;
    let isSpinning = false;

    // Timer state
    let timerInterval = null;
    let timerSeconds = 0;
    let timerRunning = false;

    // ── DOM REFS ──
    const categoryContainer = document.getElementById('categoryContainer');
    const categoryLabel = document.getElementById('categoryLabel');
    const questionText = document.getElementById('questionText');
    const questionBox = document.getElementById('questionBox');
    const spinBtn = document.getElementById('spinBtn');
    const spinBtnText = document.getElementById('spinBtnText');
    const spinIcon = document.getElementById('spinIcon');
    const counterBadge = document.getElementById('counterBadge');
    const questionCount = document.getElementById('questionCount');
    const spinnerCard = document.getElementById('spinnerCard');
    const allDoneBanner = document.getElementById('allDoneBanner');
    const resetCategoryBtn = document.getElementById('resetCategoryBtn');

    const timerDisplay = document.getElementById('timerDisplay');
    const timerRing = document.getElementById('timerRing');
    const timerStartBtn = document.getElementById('timerStartBtn');
    const timerPauseBtn = document.getElementById('timerPauseBtn');
    const timerResetBtn = document.getElementById('timerResetBtn');

    // Category colors mapping
    const categoryColors = {
      "General": { bg: 'bg-accent/10', border: 'border-accent/40', text: 'text-accentLight', activeBg: 'bg-accent', activeText: 'text-white' },
      "Funny": { bg: 'bg-coral/10', border: 'border-coral/40', text: 'text-coral', activeBg: 'bg-coral', activeText: 'text-white' },
      "Food": { bg: 'bg-amber-500/10', border: 'border-amber-500/40', text: 'text-amber-400', activeBg: 'bg-amber-500', activeText: 'text-white' },
      "Deep": { bg: 'bg-sky-500/10', border: 'border-sky-500/40', text: 'text-sky-400', activeBg: 'bg-sky-500', activeText: 'text-white' },
      "Couples": { bg: 'bg-rose-500/10', border: 'border-rose-500/40', text: 'text-rose-400', activeBg: 'bg-rose-500', activeText: 'text-white' },
      "Adults": { bg: 'bg-emerald-500/10', border: 'border-emerald-500/40', text: 'text-emerald-400', activeBg: 'bg-emerald-500', activeText: 'text-white' },
    };

    // ── INIT CATEGORIES ──
    Object.keys(questions).forEach(cat => {
      usedQuestions[cat] = new Set();
      const colors = categoryColors[cat];
      const btn = document.createElement('button');
      btn.className = `category-chip ${colors.bg} border ${colors.border} ${colors.text} font-medium px-4 py-2 rounded-xl text-sm`;
      btn.textContent = cat;
      btn.dataset.category = cat;
      btn.addEventListener('click', () => selectCategory(cat));
      categoryContainer.appendChild(btn);
    });

    // ── SELECT CATEGORY ──
    function selectCategory(cat) {
      if (isSpinning) return;
      currentCategory = cat;

      // Update chips
      document.querySelectorAll('.category-chip').forEach(chip => {
        const c = chip.dataset.category;
        const colors = categoryColors[c];
        if (c === cat) {
          chip.className = `category-chip ${colors.activeBg} ${colors.activeText} font-semibold px-4 py-2 rounded-xl text-sm active border border-transparent`;
        } else {
          chip.className = `category-chip ${colors.bg} border ${colors.border} ${colors.text} font-medium px-4 py-2 rounded-xl text-sm`;
        }
      });

      categoryLabel.textContent = cat + ' Questions';
      spinBtn.disabled = false;
      counterBadge.style.display = 'flex';
      allDoneBanner.classList.add('hidden');
      updateCounter();

      questionText.textContent = 'Hit spin to get a question!';
      questionBox.classList.remove('land-bounce');
    }

    // ── UPDATE COUNTER ──
    function updateCounter() {
      if (!currentCategory) return;
      const total = questions[currentCategory].length;
      const used = usedQuestions[currentCategory].size;
      const remaining = total - used;
      questionCount.textContent = `${remaining} / ${total}`;
    }

    // ── GET RANDOM UNUSED QUESTION ──
    function getRandomQuestion(cat) {
      const all = questions[cat];
      const used = usedQuestions[cat];
      const available = all.filter((_, i) => !used.has(i));
      if (available.length === 0) return null;
      const idx = Math.floor(Math.random() * available.length);
      const q = available[idx];
      const originalIdx = all.indexOf(q);
      used.add(originalIdx);
      return q;
    }

    // ── SPIN ──
    spinBtn.addEventListener('click', () => {
      if (isSpinning || !currentCategory) return;

      const total = questions[currentCategory].length;
      const used = usedQuestions[currentCategory].size;
      if (used >= total) {
        allDoneBanner.classList.remove('hidden');
        spinBtn.disabled = true;
        return;
      }

      isSpinning = true;
      spinBtn.disabled = true;
      spinBtnText.textContent = 'Spinning...';
      spinnerCard.classList.add('spinning');
      questionBox.classList.remove('land-bounce');

      const allQuestions = questions[currentCategory];
      let spinCount = 0;
      const totalSpins = 25 + Math.floor(Math.random() * 15);
      let delay = 40;

      function spinStep() {
        const randomIdx = Math.floor(Math.random() * allQuestions.length);
        questionText.textContent = allQuestions[randomIdx];

        spinCount++;
        if (spinCount < totalSpins) {
          // Ease out: slow down towards the end
          if (spinCount > totalSpins * 0.6) {
            delay += 15;
          }
          if (spinCount > totalSpins * 0.8) {
            delay += 30;
          }
          setTimeout(spinStep, delay);
        } else {
          // Land on the actual question
          const finalQuestion = getRandomQuestion(currentCategory);
          if (finalQuestion) {
            questionText.textContent = finalQuestion;
          }
          spinnerCard.classList.remove('spinning');
          questionBox.classList.add('land-bounce');
          isSpinning = false;
          spinBtnText.textContent = 'Spin';
          updateCounter();

          // Check if all used up
          const nowUsed = usedQuestions[currentCategory].size;
          if (nowUsed >= allQuestions.length) {
            allDoneBanner.classList.remove('hidden');
            spinBtn.disabled = true;
          } else {
            spinBtn.disabled = false;
          }
        }
      }

      spinStep();
    });

    // ── RESET CATEGORY ──
    resetCategoryBtn.addEventListener('click', () => {
      if (!currentCategory) return;
      usedQuestions[currentCategory] = new Set();
      allDoneBanner.classList.add('hidden');
      spinBtn.disabled = false;
      updateCounter();
      questionText.textContent = 'Hit spin to get a question!';
    });

    // ── STOPWATCH ──
    const RING_CIRCUMFERENCE = 515.22;
    const MAX_TIMER_SECONDS = 300; // 5 minutes for the ring visual

    function formatTime(sec) {
      const m = Math.floor(sec / 60).toString().padStart(2, '0');
      const s = (sec % 60).toString().padStart(2, '0');
      return `${m}:${s}`;
    }

    function updateTimerRing() {
      const progress = Math.min(timerSeconds / MAX_TIMER_SECONDS, 1);
      const offset = RING_CIRCUMFERENCE * (1 - progress);
      timerRing.setAttribute('stroke-dashoffset', offset);

      // Color shift as time goes on
      if (timerSeconds > 180) {
        timerRing.setAttribute('stroke', '#ef4444');
      } else if (timerSeconds > 120) {
        timerRing.setAttribute('stroke', '#f59e0b');
      } else {
        timerRing.setAttribute('stroke', '#f472b6');
      }
    }

    function tickTimer() {
      timerSeconds++;
      timerDisplay.textContent = formatTime(timerSeconds);
      updateTimerRing();
    }

    timerStartBtn.addEventListener('click', () => {
      if (timerRunning) return;
      timerRunning = true;
      timerInterval = setInterval(tickTimer, 1000);
      timerStartBtn.style.display = 'none';
      timerPauseBtn.style.display = 'flex';
    });

    timerPauseBtn.addEventListener('click', () => {
      timerRunning = false;
      clearInterval(timerInterval);
      timerStartBtn.style.display = 'flex';
      timerPauseBtn.style.display = 'none';
    });

    timerResetBtn.addEventListener('click', () => {
      timerRunning = false;
      clearInterval(timerInterval);
      timerSeconds = 0;
      timerDisplay.textContent = '00:00';
      timerRing.setAttribute('stroke-dashoffset', '0');
      timerRing.setAttribute('stroke', '#f472b6');
      timerStartBtn.style.display = 'flex';
      timerPauseBtn.style.display = 'none';
    });

    // ── KEYBOARD SHORTCUT ──
    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space' && !isSpinning && currentCategory) {
        e.preventDefault();
        spinBtn.click();
      }
    });
  </script>

</body>
