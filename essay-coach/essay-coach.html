<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Essay Coach — Tool Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,800;9..144,900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
    --bg: #f4f2ec;
    --panel: #ffffff;
    --panel2: #eceadf;
    --border: #ddd8c8;
    --text: #23262e;
    --muted: #6b6f7c;
    --accent: #b07d1f;
    --accent-soft: rgba(176,125,31,.14);
    --hook: #b07d1f;
    --thesis: #0e9668;
    --topic: #1d7fc4;
    --example: #c04a8c;
    --linker: #7a5cc9;
    --shadow: 0 8px 28px rgba(30,30,20,.10);
}
html[data-theme="dark"] {
    --bg: #10141f;
    --panel: #1a2030;
    --panel2: #232b3f;
    --border: #303a52;
    --text: #eaedf5;
    --muted: #96a0b8;
    --accent: #f0b94e;
    --accent-soft: rgba(240,185,78,.14);
    --hook: #f0b94e;
    --thesis: #5fe0ab;
    --topic: #6fc3f7;
    --example: #f791c8;
    --linker: #b8a3f5;
    --shadow: 0 10px 32px rgba(0,0,0,.4);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    transition: background .3s, color .3s;
}
@media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation: none !important; transition: none !important; }
    html { scroll-behavior: auto; }
}

.back-link {
    position: fixed; top: 14px; left: 14px; z-index: 100000;
    background: rgba(20,24,36,.72); color: #fff;
    padding: 8px 16px; border-radius: 999px;
    font-size: .85rem; font-weight: 600; text-decoration: none;
    backdrop-filter: blur(6px);
    border: 1px solid rgba(255,255,255,.18);
}
.back-link:hover { background: rgba(20,24,36,.9); }

.theme-btn {
    position: fixed; top: 14px; right: 14px; z-index: 100000;
    background: var(--panel); color: var(--text);
    border: 1px solid var(--border); border-radius: 999px;
    width: 40px; height: 40px; font-size: 1.1rem; cursor: pointer;
    box-shadow: var(--shadow);
}

.wrap { max-width: 1060px; margin: 0 auto; padding: 68px 22px 80px; }

header.hero { text-align: center; margin-bottom: 26px; }
.hero h1 {
    font-family: 'Fraunces', serif; font-weight: 900;
    font-size: clamp(2.3rem, 5.5vw, 3.4rem);
    letter-spacing: -.01em; line-height: 1.05;
}
.hero h1 .ink { color: var(--accent); font-style: italic; }
.hero p { color: var(--muted); margin-top: 8px; font-size: 1.02rem; }

/* ---------- Tabs ---------- */
.tabs {
    display: flex; justify-content: center; gap: 8px; margin: 22px 0 26px;
    flex-wrap: wrap;
}
.tab-btn {
    font-family: 'Inter', sans-serif; font-weight: 700; font-size: 1rem;
    padding: 12px 26px; border-radius: 999px; cursor: pointer;
    border: 1px solid var(--border); background: var(--panel); color: var(--muted);
    transition: all .2s;
}
.tab-btn.active { background: var(--accent); border-color: var(--accent); color: #16130a; }
.tab-btn:not(.active):hover { color: var(--text); border-color: var(--accent); }

.view { display: none; }
.view.active { display: block; animation: fadeUp .3s ease; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

/* ---------- Level chips ---------- */
.level-row { display: flex; justify-content: center; gap: 10px; margin-bottom: 22px; flex-wrap: wrap; }
.chip {
    padding: 9px 20px; border-radius: 999px; cursor: pointer;
    border: 1px solid var(--border); background: var(--panel);
    font-weight: 700; font-size: .95rem; color: var(--muted); transition: all .15s;
}
.chip:hover { border-color: var(--accent); color: var(--text); }
.chip.active { background: var(--accent); border-color: var(--accent); color: #16130a; }
.level-tagline { text-align: center; color: var(--muted); font-size: .95rem; margin-bottom: 20px; }
.level-tagline b { color: var(--text); }

/* ---------- Step navigator ---------- */
.step-dots { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin-bottom: 18px; }
.dot {
    width: 34px; height: 34px; border-radius: 50%; border: 1px solid var(--border);
    background: var(--panel); color: var(--muted); font-weight: 700; font-size: .85rem;
    cursor: pointer; transition: all .15s;
}
.dot:hover { border-color: var(--accent); color: var(--text); }
.dot.active { background: var(--accent); border-color: var(--accent); color: #16130a; transform: scale(1.12); }
.dot.done { border-color: var(--accent); color: var(--accent); }

.step-card {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 18px; box-shadow: var(--shadow);
    padding: clamp(22px, 4vw, 40px);
}
.step-eyebrow {
    color: var(--accent); font-weight: 800; font-size: .8rem;
    text-transform: uppercase; letter-spacing: .12em; margin-bottom: 8px;
}
.step-card h2 {
    font-family: 'Fraunces', serif; font-weight: 800;
    font-size: clamp(1.5rem, 3.4vw, 2.1rem); margin-bottom: 14px; line-height: 1.15;
}
.step-body { font-size: 1.06rem; line-height: 1.65; }
.step-body p { margin-bottom: 12px; }
.step-body ul, .step-body ol { margin: 0 0 12px 22px; }
.step-body li { margin-bottom: 6px; }
.step-body b { color: var(--accent); }

.ex {
    background: var(--panel2); border-left: 4px solid var(--accent);
    border-radius: 0 12px 12px 0; padding: 14px 18px; margin: 14px 0;
    font-size: 1.04rem;
}
.ex .lbl {
    display: block; font-size: .72rem; font-weight: 800; letter-spacing: .1em;
    text-transform: uppercase; color: var(--accent); margin-bottom: 5px;
}
.ex.bad { border-left-color: var(--example); }
.ex.bad .lbl { color: var(--example); }

.phrases { display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0; }
.phrase {
    background: var(--accent-soft); color: var(--text);
    border: 1px solid var(--accent); border-radius: 999px;
    padding: 6px 14px; font-size: .95rem; font-weight: 600;
}

.tryit {
    margin-top: 20px; padding: 16px 18px; border-radius: 12px;
    border: 1.5px dashed var(--accent); background: transparent;
}
.tryit .lbl {
    font-size: .72rem; font-weight: 800; letter-spacing: .1em;
    text-transform: uppercase; color: var(--accent); display: block; margin-bottom: 5px;
}

.step-nav { display: flex; justify-content: space-between; align-items: center; margin-top: 22px; gap: 12px; }
.nav-btn {
    padding: 12px 26px; border-radius: 12px; font-weight: 700; font-size: 1rem;
    cursor: pointer; border: 1px solid var(--border); background: var(--panel);
    color: var(--text); transition: all .15s;
}
.nav-btn.primary { background: var(--accent); border-color: var(--accent); color: #16130a; }
.nav-btn:disabled { opacity: .35; cursor: default; }
.nav-btn:not(:disabled):hover { transform: translateY(-1px); box-shadow: var(--shadow); }
.step-count { color: var(--muted); font-weight: 600; font-size: .92rem; }

/* ---------- Essay anatomy (model) ---------- */
.legend { display: flex; flex-wrap: wrap; gap: 8px; margin: 16px 0 6px; }
.leg {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 6px 13px; border-radius: 999px; cursor: pointer;
    border: 1px solid var(--border); background: var(--panel2);
    font-size: .87rem; font-weight: 700; color: var(--text); transition: all .15s;
}
.leg::before { content: ""; width: 11px; height: 11px; border-radius: 3px; background: var(--c); }
.leg.on { border-color: var(--c); background: var(--panel); box-shadow: 0 0 0 2px var(--c) inset; }
.legend-hint { color: var(--muted); font-size: .85rem; margin-bottom: 10px; }

.model {
    background: var(--panel2); border: 1px solid var(--border);
    border-radius: 14px; padding: 22px 24px; margin-top: 10px;
    font-size: 1.1rem; line-height: 1.9;
}
.model .mprompt {
    font-family: 'Fraunces', serif; font-weight: 800; font-size: 1.12rem;
    margin-bottom: 14px; padding-bottom: 12px; border-bottom: 1px solid var(--border);
}
.model p { margin-bottom: 14px; }
.model p:last-child { margin-bottom: 0; }
.pt { border-bottom: 3px solid var(--c); padding: 1px 2px; border-radius: 3px; transition: all .2s; }
.pt-hook { --c: var(--hook); }
.pt-thesis { --c: var(--thesis); }
.pt-topic { --c: var(--topic); }
.pt-example { --c: var(--example); }
.pt-linker { --c: var(--linker); }
.model.focusing .pt { border-bottom-color: transparent; opacity: .45; }
.model.focusing .pt.spot { border-bottom-color: var(--c); background: color-mix(in srgb, var(--c) 22%, transparent); opacity: 1; }

/* ---------- Prompt bank ---------- */
.bank-controls {
    display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
    justify-content: center; margin-bottom: 10px;
}
.bank-controls .search {
    flex: 1 1 240px; max-width: 340px;
    padding: 11px 16px; border-radius: 12px;
    border: 1px solid var(--border); background: var(--panel); color: var(--text);
    font-size: .98rem; font-family: 'Inter', sans-serif;
}
.bank-controls .search:focus { outline: 2px solid var(--accent); border-color: var(--accent); }
.random-btn {
    padding: 11px 22px; border-radius: 12px; border: none; cursor: pointer;
    background: var(--accent); color: #16130a; font-weight: 800; font-size: .98rem;
    font-family: 'Inter', sans-serif; transition: transform .15s;
}
.random-btn:hover { transform: translateY(-1px); }
.filter-row { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin: 8px 0 6px; }
.filter-row .chip { padding: 7px 15px; font-size: .87rem; }
.bank-count { text-align: center; color: var(--muted); font-size: .88rem; margin: 8px 0 16px; }

.prompt-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
    gap: 14px;
}
.prompt-card {
    background: var(--panel); border: 1px solid var(--border); border-radius: 14px;
    padding: 18px; cursor: pointer; transition: all .18s;
    display: flex; flex-direction: column; gap: 10px;
}
.prompt-card:hover { transform: translateY(-3px); box-shadow: var(--shadow); border-color: var(--accent); }
.prompt-card .ptext { font-size: 1rem; line-height: 1.5; flex: 1; }
.badges { display: flex; gap: 6px; flex-wrap: wrap; }
.badge {
    font-size: .72rem; font-weight: 800; letter-spacing: .06em;
    padding: 4px 10px; border-radius: 999px; text-transform: uppercase;
}
.badge.lvl { background: var(--accent-soft); color: var(--accent); border: 1px solid var(--accent); }
.badge.cat { background: var(--panel2); color: var(--muted); border: 1px solid var(--border); }
.no-results { text-align: center; color: var(--muted); padding: 40px 0; font-size: 1.05rem; }

/* ---------- Spotlight overlay ---------- */
.spotlight {
    position: fixed; inset: 0; z-index: 200000;
    background: rgba(8,10,18,.92); backdrop-filter: blur(6px);
    display: none; align-items: center; justify-content: center; padding: 30px;
}
.spotlight.open { display: flex; animation: fadeUp .25s ease; }
.spot-card {
    max-width: 900px; width: 100%; text-align: center;
    max-height: 90vh; overflow-y: auto;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 22px; padding: clamp(28px, 5vw, 52px); box-shadow: var(--shadow);
    position: relative;
}
.spot-card .badges { justify-content: center; margin-bottom: 18px; }
.spot-text {
    font-family: 'Fraunces', serif; font-weight: 800;
    font-size: clamp(1.35rem, 3.2vw, 2.2rem); line-height: 1.3;
}
.linker-title {
    text-align: center; font-weight: 800; font-size: .78rem;
    letter-spacing: .1em; text-transform: uppercase; color: var(--muted);
    margin: 26px 0 4px; padding-top: 22px; border-top: 1px solid var(--border);
}
.linker-title b { color: var(--accent); }
.linker-groups {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
    gap: 16px 22px; text-align: left; margin-top: 16px;
}
.lgroup h5 {
    font-size: .74rem; font-weight: 800; letter-spacing: .07em;
    text-transform: uppercase; color: var(--accent); margin-bottom: 8px;
}
.lgroup .lchips { display: flex; flex-wrap: wrap; gap: 6px; }
.lchip {
    background: var(--panel2); border: 1px solid var(--border);
    border-radius: 8px; padding: 5px 11px; font-size: .93rem; font-weight: 600;
    color: var(--text);
}
.spot-actions { display: flex; gap: 12px; justify-content: center; margin-top: 28px; flex-wrap: wrap; }
.spot-close {
    position: absolute; top: 14px; right: 14px;
    background: var(--panel2); border: 1px solid var(--border); color: var(--text);
    width: 38px; height: 38px; border-radius: 50%; font-size: 1.1rem; cursor: pointer;
}

@media (max-width: 560px) {
    .wrap { padding-top: 74px; }
    .step-card h2 { font-size: 1.4rem; }
    .model { font-size: 1rem; }
}
button:focus-visible, a:focus-visible, input:focus-visible, .prompt-card:focus-visible {
    outline: 2px solid var(--accent); outline-offset: 2px;
}
</style>
</head>
<body>
<a class="back-link" href="../">← Tool Hub</a>
<button class="theme-btn" onclick="toggleTheme()" aria-label="Toggle light/dark theme" id="themeBtn">☀️</button>

<div class="wrap">
    <header class="hero">
        <h1>Essay <span class="ink">Coach</span></h1>
        <p>Learn to build an essay step by step — then practise with TOEFL-style prompts.</p>
    </header>

    <div class="tabs" role="tablist">
        <button class="tab-btn active" id="tabLearn" onclick="showTab('learn')">✍️ Learn to Write</button>
        <button class="tab-btn" id="tabBank" onclick="showTab('bank')">🗂️ Prompt Bank</button>
    </div>

    <!-- ============ LEARN VIEW ============ -->
    <section class="view active" id="viewLearn">
        <div class="level-row" id="levelRow"></div>
        <div class="level-tagline" id="levelTagline"></div>
        <div class="step-dots" id="stepDots"></div>
        <div class="step-card" id="stepCard"></div>
        <div class="step-nav">
            <button class="nav-btn" id="prevBtn" onclick="moveStep(-1)">← Previous</button>
            <span class="step-count" id="stepCount"></span>
            <button class="nav-btn primary" id="nextBtn" onclick="moveStep(1)">Next →</button>
        </div>
    </section>

    <!-- ============ PROMPT BANK VIEW ============ -->
    <section class="view" id="viewBank">
        <div class="bank-controls">
            <input type="text" class="search" id="promptSearch" placeholder="Search prompts…" oninput="renderBank()">
            <button class="random-btn" onclick="randomPrompt()">🎲 Random Prompt</button>
        </div>
        <div class="filter-row" id="levelFilters"></div>
        <div class="filter-row" id="catFilters"></div>
        <div class="bank-count" id="bankCount"></div>
        <div class="prompt-grid" id="promptGrid"></div>
        <div class="no-results" id="noResults" style="display:none;">No prompts match your filters.</div>
    </section>
</div>

<!-- Spotlight -->
<div class="spotlight" id="spotlight" onclick="if(event.target===this)closeSpotlight()">
    <div class="spot-card">
        <button class="spot-close" onclick="closeSpotlight()" aria-label="Close">✕</button>
        <div class="badges" id="spotBadges"></div>
        <div class="spot-text" id="spotText"></div>
        <div id="spotLinkers"></div>
        <div class="spot-actions">
            <button class="nav-btn primary" onclick="randomPrompt()">🎲 Another one</button>
            <button class="nav-btn" onclick="closeSpotlight()">Close</button>
        </div>
    </div>
</div>

<script>
/* ================= THEME ================= */
function toggleTheme() {
    const html = document.documentElement;
    const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
    updateThemeBtn();
}
function updateThemeBtn() {
    document.getElementById('themeBtn').textContent =
        document.documentElement.getAttribute('data-theme') === 'dark' ? '☀️' : '🌙';
}
(function() {
    const saved = localStorage.getItem('theme');
    if (saved) document.documentElement.setAttribute('data-theme', saved);
})();

/* ================= LESSON DATA ================= */
const LEGEND = [
    { key: 'hook',    label: 'Hook / opener',   cls: 'pt-hook' },
    { key: 'thesis',  label: 'Opinion / thesis', cls: 'pt-thesis' },
    { key: 'topic',   label: 'Topic sentence',  cls: 'pt-topic' },
    { key: 'example', label: 'Example / detail', cls: 'pt-example' },
    { key: 'linker',  label: 'Linking word',    cls: 'pt-linker' }
];

const LESSONS = {
    A2: {
        tagline: 'Target: a short opinion text of <b>60–80 words</b> — one strong paragraph (or two short ones).',
        steps: [
        {
            title: 'What is an opinion text?',
            body: `
            <p>At A2, an "essay" is a <b>short opinion text</b>. It has three jobs:</p>
            <ol>
                <li><b>Say your opinion</b> in one clear sentence.</li>
                <li><b>Give reasons</b> — two is perfect.</li>
                <li><b>Finish</b> with a closing sentence.</li>
            </ol>
            <div class="ex"><span class="lbl">Shape of the text</span>
            My opinion → Reason 1 → Reason 2 → Closing sentence</div>
            <p>That's it. Short and clear beats long and confusing.</p>`,
            tryIt: 'As a class: is pizza better than hamburger? Say one opinion sentence and one reason out loud.'
        },
        {
            title: 'Read the question carefully',
            body: `
            <p>Before you write, find <b>what the question asks</b>. Underline the key words.</p>
            <div class="ex"><span class="lbl">Question</span>
            Do you prefer <u>weekends at home</u> or <u>weekends outside</u>? <u>Why</u>?</div>
            <p>This question asks for <b>two things</b>:</p>
            <ul>
                <li>Your <b>choice</b> (home or outside)</li>
                <li>Your <b>reasons</b> (the "why")</li>
            </ul>
            <p>If you forget the "why", your answer is incomplete!</p>`,
            tryIt: 'Show a prompt from the Prompt Bank. Students underline the key words and say what the question asks for.'
        },
        {
            title: 'Plan with a mini-map',
            body: `
            <p>Don't start writing immediately. Make a <b>mini-map</b> first — just words, not sentences:</p>
            <div class="ex"><span class="lbl">Mini-map (30 seconds)</span>
            My choice: <b>outside</b><br>
            Reason 1: friends → park, football<br>
            Reason 2: fresh air → feel happy</div>
            <p>Two reasons with one detail each. Now writing is easy — you just turn each line into a sentence.</p>`,
            tryIt: 'Give students 1 minute to make a mini-map for a prompt. Words only — no full sentences allowed!'
        },
        {
            title: 'Start with your opinion',
            body: `
            <p>Your first sentence gives your <b>opinion</b>. Use one of these openers:</p>
            <div class="phrases">
                <span class="phrase">I think…</span>
                <span class="phrase">In my opinion…</span>
                <span class="phrase">For me…</span>
                <span class="phrase">I prefer… because…</span>
            </div>
            <div class="ex"><span class="lbl">Good first sentence</span>
            In my opinion, weekends outside are better than weekends at home.</div>
            <div class="ex bad"><span class="lbl">Too vague</span>
            Weekends are nice. <i>(Nice? Which weekends? What is your opinion?)</i></div>`,
            tryIt: 'Students write only the first sentence for their mini-map. Read three aloud and vote: is the opinion clear?'
        },
        {
            title: 'Connect your reasons',
            body: `
            <p>Now turn your two reasons into sentences. Use <b>connectors</b> to join ideas:</p>
            <div class="phrases">
                <span class="phrase">because</span>
                <span class="phrase">and</span>
                <span class="phrase">but</span>
                <span class="phrase">also</span>
                <span class="phrase">so</span>
                <span class="phrase">For example,</span>
            </div>
            <div class="ex"><span class="lbl">Reasons with connectors</span>
            First, I can see my friends. For example, we play football in the park. Also, the fresh air is good, so I feel happy.</div>
            <p>One connector per sentence is enough. Don't use them all at once!</p>`,
            tryIt: 'Sentence-building game: give a reason ("friends"), students must say a full sentence with one connector.'
        },
        {
            title: 'Close it',
            body: `
            <p>Finish with <b>one closing sentence</b>. It repeats your opinion with different words:</p>
            <div class="phrases">
                <span class="phrase">That is why…</span>
                <span class="phrase">So, for me…</span>
                <span class="phrase">This is why I prefer…</span>
            </div>
            <div class="ex"><span class="lbl">Closing sentence</span>
            That is why weekends outside are the best for me.</div>
            <p>Then <b>check your work</b>:</p>
            <ul>
                <li>✅ Is my opinion in the first sentence?</li>
                <li>✅ Do I have two reasons?</li>
                <li>✅ Do all sentences start with a capital letter and end with a full stop?</li>
                <li>✅ Did I answer the "why"?</li>
            </ul>`,
            tryIt: 'Students swap texts with a partner and check the four boxes above on each other\'s work.'
        }
        ],
        model: {
            prompt: 'Do you prefer weekends at home or weekends outside? Why?',
            html: `
            <p><span class="pt pt-thesis">In my opinion, weekends outside are better than weekends at home.</span>
            <span class="pt pt-linker">First,</span> <span class="pt pt-topic">I can see my friends.</span>
            <span class="pt pt-linker">For example,</span> <span class="pt pt-example">we play football in the park near my house.</span>
            <span class="pt pt-linker">Also,</span> <span class="pt pt-topic">the fresh air is good for me,</span>
            <span class="pt pt-linker">so</span> <span class="pt pt-example">I feel happy and relaxed after.</span>
            <span class="pt pt-linker">But</span> sometimes it rains, and then home is nice too.
            <span class="pt pt-thesis">That is why weekends outside are the best for me.</span></p>`
        }
    },

    B1: {
        tagline: 'Target: a <b>3–4 paragraph essay</b> of <b>120–150 words</b> with an introduction, body and conclusion.',
        steps: [
        {
            title: 'The essay skeleton',

        { type: 'Showing a result', items: ['so'] }
    ],
    B1: [
        { type: 'Giving your opinion', items: ['In my opinion,', 'I believe (that)…', 'I think that…'] },
        { type: 'Adding ideas', items: ['In addition,', 'Also,', 'Moreover,'] },
        { type: 'Giving reasons', items: ['because', 'since', 'as'] },
        { type: 'Showing results', items: ['so', 'therefore', 'as a result'] },
        { type: 'Contrast', items: ['however', 'on the other hand', 'although'] },
        { type: 'Giving examples', items: ['for example', 'for instance', 'such as'] },
        { type: 'Sequencing', items: ['First,', 'Second,', 'Next,', 'Finally,'] },
        { type: 'Condition', items: ['if', 'unless'] },
        { type: 'Concluding', items: ['In conclusion,', 'To sum up,'] }
    ],
    B2: [
        { type: 'Stating a position', items: ['In my view,', 'I would argue that…', 'It seems to me that…'] },
        { type: 'Adding / building', items: ['Furthermore,', 'Moreover,', 'What is more,', 'In addition,'] },
        { type: 'Cause / reason', items: ['because', 'since', 'due to', 'owing to'] },
        { type: 'Result / consequence', items: ['therefore', 'consequently', 'as a result', 'thus'] },
        { type: 'Contrast', items: ['however', 'nevertheless', 'in contrast', 'whereas', 'on the other hand'] },
        { type: 'Concession', items: ['admittedly', 'it is true that…', 'even though', 'despite (this)'] },
        { type: 'Condition', items: ['provided that', 'as long as', 'unless', 'if'] },
        { type: 'Exemplifying', items: ['for instance', 'to illustrate', 'namely', 'such as'] },
        { type: 'Concluding', items: ['In conclusion,', 'To conclude,', 'Ultimately,'] }
    ]
};

/* ================= LEARN STATE ================= */
const LEVELS = ['A2', 'B1', 'B2'];
let curLevel = 'B1';
let curStep = 0;
let focusPart = null;

function buildLevelRow() {
    const row = document.getElementById('levelRow');
    row.innerHTML = LEVELS.map(l =>
        `<button class="chip ${l === curLevel ? 'active' : ''}" onclick="setLevel('${l}')">${l}</button>`
    ).join('');
}
function setLevel(l) {
    curLevel = l;
    curStep = 0;
    focusPart = null;
    buildLevelRow();
    renderLesson();
}
function totalSteps() {
    return LESSONS[curLevel].steps.length + 1; // +1 for the model essay step
}
function moveStep(dir) {
    const t = totalSteps();
    const next = curStep + dir;
    if (next < 0 || next >= t) return;
    curStep = next;
    focusPart = null;
    renderLesson();
    document.getElementById('stepCard').scrollIntoView({ block: 'nearest' });
}
function goStep(i) {
    curStep = i;
    focusPart = null;
    renderLesson();
}
function renderLesson() {
    const lesson = LESSONS[curLevel];
    const t = totalSteps();
    document.getElementById('levelTagline').innerHTML = lesson.tagline;

    // dots
    document.getElementById('stepDots').innerHTML = Array.from({ length: t }, (_, i) => {
        const cls = i === curStep ? 'active' : (i < curStep ? 'done' : '');
        const label = i === t - 1 ? '★' : (i + 1);
        return `<button class="dot ${cls}" onclick="goStep(${i})" aria-label="Step ${i + 1}">${label}</button>`;
    }).join('');

    // card
    const card = document.getElementById('stepCard');
    if (curStep < lesson.steps.length) {
        const s = lesson.steps[curStep];
        card.innerHTML = `
            <div class="step-eyebrow">${curLevel} · Step ${curStep + 1} of ${t}</div>
            <h2>${s.title}</h2>
            <div class="step-body">${s.body}</div>
            ${s.tryIt ? `<div class="tryit"><span class="lbl">🎯 Try it in class</span>${s.tryIt}</div>` : ''}
        `;
    } else {
        card.innerHTML = `
            <div class="step-eyebrow">${curLevel} · Model essay</div>
            <h2>Study the model</h2>
            <div class="step-body">
                <p>Every part of this essay is doing a job. Click a label below to spotlight that part in the text.</p>
            </div>
            <div class="legend">${LEGEND.map(p =>
                `<button class="leg ${focusPart === p.key ? 'on' : ''}" style="--c:var(--${p.key})" onclick="toggleFocus('${p.key}')">${p.label}</button>`
            ).join('')}</div>
            <div class="legend-hint">Click again to show everything.</div>
            <div class="model ${focusPart ? 'focusing' : ''}" id="modelBox">
                <div class="mprompt">${lesson.model.prompt}</div>
                ${lesson.model.html}
            </div>
        `;
        applyFocus();
    }

    // nav
    document.getElementById('prevBtn').disabled = curStep === 0;
    document.getElementById('nextBtn').disabled = curStep === t - 1;
    document.getElementById('stepCount').textContent = `${curStep + 1} / ${t}`;
}
function toggleFocus(key) {
    focusPart = (focusPart === key) ? null : key;
    document.querySelectorAll('.leg').forEach(el => {
        el.classList.toggle('on', el.textContent === LEGEND.find(p => p.key === focusPart)?.label);
    });
    const box = document.getElementById('modelBox');
    box.classList.toggle('focusing', !!focusPart);
    applyFocus();
}
function applyFocus() {
    const box = document.getElementById('modelBox');
    if (!box) return;
    const cls = focusPart ? 'pt-' + focusPart : null;
    box.querySelectorAll('.pt').forEach(el => {
        el.classList.toggle('spot', !!cls && el.classList.contains(cls));
    });
}

/* ================= PROMPT BANK ================= */
let bankLevel = 'All';
let bankCat = 'All';
let lastSpot = -1;

function buildFilters() {
    const lv = ['All', ...LEVELS];
    document.getElementById('levelFilters').innerHTML = lv.map(l =>
        `<button class="chip ${l === bankLevel ? 'active' : ''}" onclick="setBankLevel('${l}')">${l === 'All' ? 'All levels' : l}</button>`
    ).join('');
    const ct = ['All', ...CATS];
    document.getElementById('catFilters').innerHTML = ct.map(c =>
        `<button class="chip ${c === bankCat ? 'active' : ''}" onclick="setBankCat('${c.replace(/'/g, "\\'")}')">${c === 'All' ? 'All types' : c}</button>`
    ).join('');
}
function setBankLevel(l) { bankLevel = l; buildFilters(); renderBank(); }
function setBankCat(c) { bankCat = c; buildFilters(); renderBank(); }

function filteredPrompts() {
    const q = document.getElementById('promptSearch').value.trim().toLowerCase();
    return PROMPTS.map((p, i) => ({ ...p, i }))
        .filter(p => (bankLevel === 'All' || p.level === bankLevel))
        .filter(p => (bankCat === 'All' || p.cat === bankCat))
        .filter(p => !q || p.text.toLowerCase().includes(q));
}
function renderBank() {
    const list = filteredPrompts();
    const grid = document.getElementById('promptGrid');
    document.getElementById('noResults').style.display = list.length ? 'none' : 'block';
    document.getElementById('bankCount').textContent =
        `${list.length} prompt${list.length === 1 ? '' : 's'} shown`;
    grid.innerHTML = list.map(p => `
        <div class="prompt-card" tabindex="0" role="button"
             onclick="openSpotlight(${p.i})"
             onkeydown="if(event.key==='Enter')openSpotlight(${p.i})">
            <div class="badges">
                <span class="badge lvl">${p.level}</span>
                <span class="badge cat">${p.cat}</span>
            </div>
            <div class="ptext">${p.text}</div>
        </div>
    `).join('');
}

function openSpotlight(i) {
    const p = PROMPTS[i];
    lastSpot = i;
    document.getElementById('spotBadges').innerHTML =
        `<span class="badge lvl">${p.level}</span><span class="badge cat">${p.cat}</span>`;
    document.getElementById('spotText').textContent = p.text;
    const groups = LINKERS[p.level] || [];
    document.getElementById('spotLinkers').innerHTML =
        `<div class="linker-title">Linking words to use — <b>${p.level}</b></div>
         <div class="linker-groups">` +
        groups.map(g =>
            `<div class="lgroup"><h5>${g.type}</h5><div class="lchips">` +
            g.items.map(w => `<span class="lchip">${w}</span>`).join('') +
            `</div></div>`
        ).join('') +
        `</div>`;
    document.getElementById('spotlight').classList.add('open');
}
function closeSpotlight() {
    document.getElementById('spotlight').classList.remove('open');
}
function randomPrompt() {
    const list = filteredPrompts();
    if (!list.length) return;
    let pick;
    do {
        pick = list[Math.floor(Math.random() * list.length)];
    } while (list.length > 1 && pick.i === lastSpot);
    openSpotlight(pick.i);
}
document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeSpotlight();
});

/* ================= TABS ================= */
function showTab(t) {
    document.getElementById('viewLearn').classList.toggle('active', t === 'learn');
    document.getElementById('viewBank').classList.toggle('active', t === 'bank');
    document.getElementById('tabLearn').classList.toggle('active', t === 'learn');
    document.getElementById('tabBank').classList.toggle('active', t === 'bank');
}

/* ================= INIT ================= */
updateThemeBtn();
buildLevelRow();
renderLesson();
buildFilters();
renderBank();
</script>
