<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Story Dice ✨</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,700;0,900;1,400;1,700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0b14;
    --surface: #1a1628;
    --surface2: #241e38;
    --text: #f0eaff;
    --text-muted: #8b82a8;
    --border: rgba(255,255,255,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; overflow-x: hidden; }
  body::before {
    content: ''; position: fixed; inset: 0;
    background:
      radial-gradient(ellipse at 10% 20%, rgba(199,125,255,0.1) 0%, transparent 50%),
      radial-gradient(ellipse at 90% 80%, rgba(77,150,255,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, rgba(255,107,107,0.04) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }
  .container { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; padding: 2rem 1.5rem 5rem; }

  /* HEADER */
  header { text-align: center; padding: 2rem 0 1.8rem; }
  header h1 {
    font-family: 'Fraunces', serif;
    font-size: clamp(2.2rem, 5vw, 4rem); font-weight: 900; line-height: 1;
    background: linear-gradient(135deg, #ff6b6b, #ffd93d, #c77dff);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    margin-bottom: 0.4rem; letter-spacing: -2px;
  }
  header p { color: var(--text-muted); font-size: 0.95rem; }

  /* SETUP SCREEN */
  .setup-screen { animation: fadeUp 0.4s ease; }
  .setup-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 1.4rem 1.6rem; margin-bottom: 1.2rem;
  }
  .setup-label {
    font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--text-muted); font-weight: 600; margin-bottom: 0.9rem;
  }

  /* THEME PILLS */
  .theme-pills { display: flex; gap: 0.6rem; flex-wrap: wrap; }
  .theme-pill {
    display: flex; align-items: center; gap: 0.45rem;
    padding: 0.5rem 1rem; border-radius: 50px; border: 2px solid transparent;
    cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 0.85rem; font-weight: 600;
    transition: all 0.2s; user-select: none; background: var(--surface2); color: var(--text-muted);
  }
  .theme-pill.active-fantasy   { border-color: #c77dff; color: #c77dff; background: rgba(199,125,255,0.12); }
  .theme-pill.active-futuristic{ border-color: #4d96ff; color: #4d96ff; background: rgba(77,150,255,0.12); }
  .theme-pill.active-adventure { border-color: #ffd93d; color: #ffd93d; background: rgba(255,217,61,0.12); }
  .theme-pill.active-horror    { border-color: #ff6b6b; color: #ff6b6b; background: rgba(255,107,107,0.12); }
  .theme-pill:hover { opacity: 0.85; }

  /* COUNT PILLS */
  .count-row { display: flex; gap: 0.5rem; flex-wrap: wrap; }
  .count-pill {
    width: 40px; height: 40px; border-radius: 50%;
    border: 2px solid var(--border); background: var(--surface2);
    color: var(--text-muted); cursor: pointer; font-size: 0.9rem; font-weight: 600;
    font-family: 'DM Sans', sans-serif; transition: all 0.2s;
    display: flex; align-items: center; justify-content: center;
  }
  .count-pill.active { background: #c77dff; border-color: #c77dff; color: white; }
  .count-pill:hover:not(.active) { border-color: #c77dff; color: #c77dff; }

  /* TEAM SETUP */
  .teams-grid { display: flex; flex-direction: column; gap: 0.7rem; }
  .team-row {
    display: flex; align-items: center; gap: 0.75rem;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 14px; padding: 0.65rem 1rem;
  }
  .team-color-dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
  .team-name-input {
    flex: 1; background: transparent; border: none; color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 0.95rem; font-weight: 500;
    outline: none; min-width: 0;
  }
  .team-name-input::placeholder { color: var(--text-muted); }
  .team-remove-btn {
    background: transparent; border: none; color: var(--text-muted);
    cursor: pointer; font-size: 1rem; padding: 0.2rem; line-height: 1;
    transition: color 0.2s;
  }
  .team-remove-btn:hover { color: #ff6b6b; }
  .add-team-btn {
    display: flex; align-items: center; gap: 0.5rem;
    background: transparent; border: 1px dashed var(--border);
    border-radius: 14px; padding: 0.65rem 1rem;
    color: var(--text-muted); cursor: pointer; font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem; transition: all 0.2s; width: 100%;
  }
  .add-team-btn:hover { border-color: #c77dff; color: #c77dff; }

  /* START BUTTON */
  .start-btn {
    display: flex; align-items: center; justify-content: center; gap: 0.7rem;
    width: 100%; background: linear-gradient(135deg, #ff6b6b, #c77dff);
    color: white; border: none; border-radius: 50px; padding: 1rem 2rem;
    font-family: 'Fraunces', serif; font-size: 1.2rem; font-weight: 700;
    cursor: pointer; transition: all 0.25s; box-shadow: 0 4px 24px rgba(255,107,107,0.3);
    margin-top: 0.5rem;
  }
  .start-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(255,107,107,0.45); }
  .start-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

  /* ─── GAME SCREEN ────────────────────────────────────────────── */
  .game-screen { display: none; animation: fadeUp 0.4s ease; }

  /* SCOREBOARD */
  .scoreboard {
    display: flex; gap: 0.8rem; flex-wrap: wrap;
    margin-bottom: 1.5rem;
  }
  .score-card {
    flex: 1; min-width: 140px;
    background: var(--surface); border: 2px solid var(--border);
    border-radius: 16px; padding: 0.9rem 1.1rem;
    transition: all 0.3s; cursor: pointer; position: relative;
  }
  .score-card.active-team {
    box-shadow: 0 0 0 2px currentColor, 0 8px 24px rgba(0,0,0,0.3);
  }
  .score-card-header {
    display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem;
  }
  .score-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .score-name {
    font-family: 'Fraunces', serif; font-weight: 700; font-size: 0.95rem;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .score-count {
    font-size: 1.6rem; font-weight: 700; font-family: 'Fraunces', serif;
    line-height: 1;
  }
  .score-label { font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; }
  .score-pool-preview {
    display: flex; flex-wrap: wrap; gap: 2px; margin-top: 0.5rem;
  }
  .score-pool-preview span { font-size: 1rem; }

  /* TURN BANNER */
  .turn-banner {
    text-align: center; margin-bottom: 1.4rem; padding: 1rem 1.5rem;
    background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
  }
  .turn-banner .whose-turn {
    font-family: 'Fraunces', serif; font-size: 1.4rem; font-weight: 700; font-style: italic;
    margin-bottom: 0.3rem;
  }
  .turn-banner .turn-sub { font-size: 0.82rem; color: var(--text-muted); }

  /* GAME CONTROLS */
  .game-controls {
    display: flex; gap: 0.8rem; justify-content: center;
    flex-wrap: wrap; margin-bottom: 1.5rem;
  }
  .dice-count-selector {
    display: flex; align-items: center; gap: 0.5rem;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 50px; padding: 0.45rem 0.9rem;
  }
  .dice-count-selector span { color: var(--text-muted); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; }
  .roll-btn {
    display: flex; align-items: center; gap: 0.6rem;
    background: linear-gradient(135deg, #ff6b6b, #c77dff);
    color: white; border: none; border-radius: 50px; padding: 0.85rem 2rem;
    font-family: 'Fraunces', serif; font-size: 1.1rem; font-weight: 700;
    cursor: pointer; transition: all 0.25s; box-shadow: 0 4px 20px rgba(255,107,107,0.3);
  }
  .roll-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(255,107,107,0.45); }
  .roll-btn:active { transform: scale(0.97); }
  .roll-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
  .roll-btn .dice-icon { font-size: 1.2rem; display: inline-block; transition: transform 0.3s; }
  .roll-btn:hover .dice-icon { transform: rotate(20deg); }
  .reset-btn {
    background: transparent; color: var(--text-muted); border: 1px solid var(--border);
    border-radius: 50px; padding: 0.85rem 1.4rem;
    font-family: 'DM Sans', sans-serif; font-size: 0.88rem; cursor: pointer; transition: all 0.2s;
  }
  .reset-btn:hover { border-color: #ffd93d; color: #ffd93d; }

  /* DICE ROLL AREA */
  .roll-area-label {
    text-align: center; font-size: 0.72rem; text-transform: uppercase;
    letter-spacing: 0.1em; color: var(--text-muted); font-weight: 600;
    margin-bottom: 0.8rem; display: none;
  }
  .dice-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(175px, 1fr));
    gap: 1rem; margin-bottom: 1.5rem; min-height: 50px;
  }
  .dice-grid.few-dice {
    grid-template-columns: repeat(auto-fit, minmax(220px, 300px));
    justify-content: center;
  }

  /* DIE CARD */
  .die {
    background: var(--surface); border: 2px solid var(--border);
    border-radius: 20px; padding: 1.4rem 1rem 1.2rem;
    text-align: center; position: relative; overflow: hidden;
    animation: dieAppear 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
    cursor: default;
  }
  .die.pickable {
    cursor: pointer;
  }
  .die.pickable:hover {
    transform: translateY(-6px) scale(1.02);
    box-shadow: 0 16px 40px rgba(0,0,0,0.5);
  }
  .die.pickable:hover .pick-hint { opacity: 1; }
  .die.picked {
    border-color: currentColor;
    box-shadow: 0 0 0 1px currentColor, 0 8px 30px rgba(0,0,0,0.4);
    animation: pickedPulse 0.4s ease;
  }
  @keyframes pickedPulse {
    0%   { transform: scale(1); }
    50%  { transform: scale(1.06); }
    100% { transform: scale(1); }
  }
  .die::before {
    content: ''; position: absolute; inset: 0; border-radius: 20px;
    opacity: 0; transition: opacity 0.3s;
    background: radial-gradient(circle at 50% 0%, rgba(255,255,255,0.07), transparent 60%);
  }
  .die.pickable:hover::before { opacity: 1; }
  @keyframes dieAppear {
    from { opacity: 0; transform: scale(0.5) rotate(-10deg); }
    to   { opacity: 1; transform: scale(1) rotate(0deg); }
  }
  .die.rolling { animation: rolling 0.5s ease-in-out; }
  @keyframes rolling {
    0%   { transform: rotate(0deg) scale(1); }
    25%  { transform: rotate(-15deg) scale(0.9); }
    50%  { transform: rotate(15deg) scale(1.1); }
    75%  { transform: rotate(-8deg) scale(0.95); }
    100% { transform: rotate(0deg) scale(1); }
  }
  .pick-hint {
    position: absolute; top: 10px; right: 11px;
    font-size: 0.6rem; color: var(--text-muted);
    opacity: 0; transition: opacity 0.2s;
    background: var(--surface2); border-radius: 50px;
    padding: 0.15rem 0.5rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em;
  }
  .die-badge {
    position: absolute; top: 11px; left: 12px;
    font-size: 0.6rem; font-weight: 600; color: var(--text-muted);
    letter-spacing: 0.08em; text-transform: uppercase;
  }
  .die-emoji {
    font-size: 3.5rem; line-height: 1; margin: 0.4rem 0 0.8rem; display: block;
    filter: drop-shadow(0 4px 10px rgba(0,0,0,0.4)); transition: transform 0.3s;
  }
  .die.pickable:hover .die-emoji { transform: scale(1.15) rotate(5deg); }
  .die-theme-tag {
    display: inline-block; font-size: 0.58rem; text-transform: uppercase;
    letter-spacing: 0.1em; font-weight: 700; border-radius: 50px;
    padding: 0.12rem 0.5rem; margin-bottom: 0.3rem;
  }
  .die-cat { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600; margin-bottom: 0.3rem; opacity: 0.7; }
  .die-name { font-family: 'Fraunces', serif; font-size: 1.05rem; font-weight: 700; margin-bottom: 0.4rem; }
  .die-def { font-size: 0.73rem; color: var(--text-muted); line-height: 1.5; }
  .die-color-bar { position: absolute; bottom: 0; left: 0; right: 0; height: 3px; border-radius: 0 0 20px 20px; }

  /* PICKED BADGE ON CARD */
  .picked-badge {
    position: absolute; top: 10px; right: 11px;
    font-size: 0.62rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em;
    border-radius: 50px; padding: 0.15rem 0.55rem;
    background: var(--surface2); border: 1px solid currentColor;
  }

  /* PICK CONFIRMATION */
  .pick-confirm {
    text-align: center; margin-bottom: 1.3rem; display: none;
    animation: fadeUp 0.3s ease;
  }
  .pick-confirm-inner {
    display: inline-flex; align-items: center; gap: 1rem;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 0.9rem 1.4rem;
  }
  .pick-confirm-text { font-size: 0.88rem; color: var(--text-muted); }
  .pick-confirm-text strong { color: var(--text); font-family: 'Fraunces', serif; font-size: 1rem; }
  .confirm-btn {
    background: linear-gradient(135deg, #6bcb77, #48dbfb);
    color: #0d0b14; border: none; border-radius: 50px;
    padding: 0.6rem 1.4rem; font-family: 'Fraunces', serif;
    font-size: 0.95rem; font-weight: 700; cursor: pointer; transition: all 0.2s;
  }
  .confirm-btn:hover { transform: scale(1.04); }
  .cancel-pick-btn {
    background: transparent; border: 1px solid var(--border);
    color: var(--text-muted); border-radius: 50px; padding: 0.6rem 1rem;
    font-size: 0.82rem; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.2s;
  }
  .cancel-pick-btn:hover { border-color: #ff6b6b; color: #ff6b6b; }

  /* TEAM POOL VIEWER — all teams visible */
  .pools-section { margin-top: 1.2rem; }
  .pools-section-title {
    font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--text-muted); font-weight: 600; margin-bottom: 0.8rem;
  }
  .pools-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 0.9rem;
  }
  .team-pool-card {
    background: var(--surface); border: 2px solid var(--border);
    border-radius: 18px; padding: 1rem 1.1rem;
    transition: border-color 0.3s;
  }
  .team-pool-card.active-team { border-color: var(--team-color); }
  .team-pool-card-header {
    display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.75rem;
  }
  .team-pool-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .team-pool-name {
    font-family: 'Fraunces', serif; font-weight: 700; font-size: 0.95rem;
    flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .team-pool-count {
    font-size: 0.72rem; color: var(--text-muted);
    background: var(--surface2); border-radius: 50px;
    padding: 0.1rem 0.55rem; font-weight: 600;
  }
  .team-pool-items { display: flex; flex-wrap: wrap; gap: 0.4rem; }
  .pool-item {
    display: flex; align-items: center; gap: 0.35rem;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 50px; padding: 0.25rem 0.7rem;
    font-size: 0.75rem; animation: dieAppear 0.35s ease both;
    position: relative; cursor: default;
  }
  .pool-item:hover { border-color: rgba(255,255,255,0.2); }
  .pool-item-emoji { font-size: 0.95rem; }
  /* Tooltip — positioned via JS to stay in viewport */
  .pool-item-tooltip {
    position: fixed;
    background: #1e1830; border: 1px solid rgba(255,255,255,0.14);
    border-radius: 10px; padding: 0.55rem 0.8rem;
    width: 210px; text-align: left;
    box-shadow: 0 8px 24px rgba(0,0,0,0.55);
    pointer-events: none;
    opacity: 0; visibility: hidden;
    transition: opacity 0.15s, visibility 0.15s;
    z-index: 9999;
  }
  .pool-item-tooltip.visible { opacity: 1; visibility: visible; }
  .tooltip-arrow {
    position: absolute; width: 0; height: 0;
    border: 6px solid transparent;
  }
  .tooltip-arrow.down { border-top-color: #1e1830; top: 100%; }
  .tooltip-arrow.up   { border-bottom-color: #1e1830; bottom: 100%; }
  .tooltip-name {
    font-family: 'Fraunces', serif; font-weight: 700; font-size: 0.82rem;
    color: var(--text); margin-bottom: 0.25rem;
  }
  .tooltip-def { font-size: 0.72rem; color: var(--text-muted); line-height: 1.5; }
  .pool-empty { color: var(--text-muted); font-style: italic; font-size: 0.8rem; }

  /* GENRE BAR (in-game) */
  .genre-bar {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 0.75rem 1.1rem;
    margin-bottom: 1.2rem;
    display: flex; align-items: center; gap: 0.8rem; flex-wrap: wrap;
  }
  .genre-bar-label {
    font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--text-muted); font-weight: 600; white-space: nowrap;
  }
  .genre-pills { display: flex; gap: 0.5rem; flex-wrap: wrap; }
  .genre-pill {
    display: flex; align-items: center; gap: 0.35rem;
    padding: 0.35rem 0.85rem; border-radius: 50px; border: 2px solid transparent;
    cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 0.8rem; font-weight: 600;
    transition: all 0.18s; user-select: none; background: var(--surface2); color: var(--text-muted);
  }
  .genre-pill.active-fantasy   { border-color: #c77dff; color: #c77dff; background: rgba(199,125,255,0.12); }
  .genre-pill.active-futuristic{ border-color: #4d96ff; color: #4d96ff; background: rgba(77,150,255,0.12); }
  .genre-pill.active-adventure { border-color: #ffd93d; color: #ffd93d; background: rgba(255,217,61,0.12); }
  .genre-pill.active-horror    { border-color: #ff6b6b; color: #ff6b6b; background: rgba(255,107,107,0.12); }
  .genre-pill:hover { opacity: 0.82; }
  .genre-pool-note { font-size: 0.72rem; color: var(--text-muted); margin-left: auto; white-space: nowrap; }

  /* EMPTY / MISC */
  .empty-state {
    grid-column: 1/-1; text-align: center; padding: 3rem 1rem; color: var(--text-muted);
  }
  .empty-state .big-emoji { font-size: 4rem; display: block; margin-bottom: 0.8rem; animation: float 3s ease-in-out infinite; }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
  .empty-state p { font-family: 'Fraunces', serif; font-style: italic; font-size: 1rem; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  footer { text-align: center; padding: 2.5rem 0 0; color: var(--text-muted); font-size: 0.78rem; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Story Dice 🎲</h1>
    <p>Roll, pick, and build your team's story pool.</p>
  </header>

  <!-- ══ SETUP SCREEN ══════════════════════════════════════════ -->
  <div class="setup-screen" id="setupScreen">

    <div class="setup-card">
      <div class="setup-label">🌍 Universe — pick one or mix many</div>
      <div class="theme-pills" id="themePills"></div>
    </div>

    <div class="setup-card">
      <div class="setup-label">🎲 Dice per roll</div>
      <div class="count-row" id="diceCountRow"></div>
    </div>

    <div class="setup-card">
      <div class="setup-label">👥 Teams</div>
      <div class="teams-grid" id="teamsGrid"></div>
      <button class="add-team-btn" id="addTeamBtn" onclick="addTeam()" style="margin-top:0.7rem">
        + Add team
      </button>
    </div>

    <button class="start-btn" id="startBtn" onclick="startGame()">
      <span>🎲</span> Start Game
    </button>
  </div>

  <!-- ══ GAME SCREEN ═══════════════════════════════════════════ -->
  <div class="game-screen" id="gameScreen">

    <!-- Scoreboard -->
    <div class="scoreboard" id="scoreboard"></div>

    <!-- Turn banner -->
    <div class="turn-banner" id="turnBanner">
      <div class="whose-turn" id="whoseTurn"></div>
      <div class="turn-sub" id="turnSub"></div>
    </div>

    <!-- Genre selector (live) -->
    <div class="genre-bar">
      <span class="genre-bar-label">🎭 Genre</span>
      <div class="genre-pills" id="genrePills"></div>
      <span class="genre-pool-note" id="genrePoolNote"></span>
    </div>

    <!-- Controls -->
    <div class="game-controls">
      <button class="roll-btn" id="rollBtn" onclick="rollDice()">
        <span class="dice-icon">🎲</span> Roll!
      </button>
      <button class="reset-btn" onclick="goToSetup()">↩ Setup</button>
    </div>

    <!-- Roll area label -->

//  TEAM COLOURS

const TEAM_COLORS = [
  { name:'Team Red',    color:'#ff6b6b', bg:'rgba(255,107,107,0.12)' },
  { name:'Team Blue',   color:'#4d96ff', bg:'rgba(77,150,255,0.12)' },
  { name:'Team Green',  color:'#6bcb77', bg:'rgba(107,203,119,0.12)' },
  { name:'Team Yellow', color:'#ffd93d', bg:'rgba(255,217,61,0.12)' },
  { name:'Team Purple', color:'#c77dff', bg:'rgba(199,125,255,0.12)' },
  { name:'Team Teal',   color:'#48dbfb', bg:'rgba(72,219,251,0.12)' },
];

// ══════════════════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════════════════
let activeThemes = new Set(['fantasy']);
let diceCount    = 4;
let teams        = [];          // [{name, color, bg, pool:[]}]
let usedKeys     = new Set();   // prevent repeats across session
let currentTeamIdx = 0;
let currentRoll    = [];        // items shown this turn
let pendingPick    = null;      // item selected but not confirmed
let hasRolled      = false;     // whether current turn has rolled

// ══════════════════════════════════════════════════════════════════
//  SETUP SCREEN INIT
// ══════════════════════════════════════════════════════════════════

// Theme pills
const pillsContainer = document.getElementById('themePills');
Object.entries(THEMES).forEach(([id, theme]) => {
  const pill = document.createElement('div');
  pill.className = 'theme-pill' + (activeThemes.has(id) ? ` active-${id}` : '');
  pill.dataset.theme = id;
  pill.innerHTML = `<span style="font-size:1.05rem">${theme.icon}</span>${theme.label}`;
  pill.onclick = () => {
    if (activeThemes.has(id)) activeThemes.delete(id);
    else activeThemes.add(id);
    pill.className = 'theme-pill' + (activeThemes.has(id) ? ` active-${id}` : '');
    validateStart();
  };
  pillsContainer.appendChild(pill);
});

// Dice count pills
const diceCountRow = document.getElementById('diceCountRow');
[1,2,3,4,5,6].forEach(n => {
  const btn = document.createElement('button');
  btn.className = 'count-pill' + (n === diceCount ? ' active' : '');
  btn.textContent = n;
  btn.onclick = () => {
    diceCount = n;
    document.querySelectorAll('.count-pill').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  };
  diceCountRow.appendChild(btn);
});

// Default 2 teams
function addTeam(customName) {
  if (teams.length >= 6) return;
  const idx = teams.length;
  const defaults = TEAM_COLORS[idx] || TEAM_COLORS[idx % TEAM_COLORS.length];
  teams.push({ name: customName || defaults.name, color: defaults.color, bg: defaults.bg, pool: [] });
  renderTeamSetup();
  validateStart();
}
function removeTeam(idx) {
  teams.splice(idx, 1);
  renderTeamSetup();
  validateStart();
}
function renderTeamSetup() {
  const grid = document.getElementById('teamsGrid');
  grid.innerHTML = '';
  teams.forEach((t, i) => {
    const row = document.createElement('div');
    row.className = 'team-row';
    row.innerHTML = `
      <div class="team-color-dot" style="background:${t.color}"></div>
      <input class="team-name-input" value="${t.name}" maxlength="24"
        oninput="teams[${i}].name=this.value" placeholder="Team name…" />
      ${teams.length > 2 ? `<button class="team-remove-btn" onclick="removeTeam(${i})">✕</button>` : ''}
    `;
    grid.appendChild(row);
  });
  document.getElementById('addTeamBtn').style.display = teams.length >= 6 ? 'none' : 'flex';
}
function validateStart() {
  document.getElementById('startBtn').disabled = activeThemes.size === 0 || teams.length < 2;
}

addTeam(); addTeam();
validateStart();

// ══════════════════════════════════════════════════════════════════
//  GAME LOGIC
// ══════════════════════════════════════════════════════════════════

function getAvailablePool() {
  const pool = [];
  activeThemes.forEach(id => {
    THEMES[id].items.forEach(item => {
      const key = `${id}::${item.name}`;
      if (!usedKeys.has(key)) pool.push({ ...item, themeId: id, key });
    });
  });
  return pool;
}

function buildGenrePills() {
  const container = document.getElementById('genrePills');
  container.innerHTML = '';
  Object.entries(THEMES).forEach(([id, theme]) => {
    const pill = document.createElement('div');
    pill.className = 'genre-pill' + (activeThemes.has(id) ? ` active-${id}` : '');
    pill.dataset.gid = id;
    pill.innerHTML = `<span style="font-size:1rem">${theme.icon}</span>${theme.label}`;
    pill.onclick = () => {
      if (pendingPick) return; // don't switch mid-pick
      if (activeThemes.has(id)) {
        if (activeThemes.size === 1) return; // always keep at least 1
        activeThemes.delete(id);
      } else {
        activeThemes.add(id);
      }
      pill.className = 'genre-pill' + (activeThemes.has(id) ? ` active-${id}` : '');
      updateGenrePoolNote();
    };
    container.appendChild(pill);
  });
  updateGenrePoolNote();
}

function updateGenrePoolNote() {
  const available = getAvailablePool().length;
  document.getElementById('genrePoolNote').textContent = `${available} elements available`;
}

function startGame() {
  teams.forEach(t => t.pool = []);
  usedKeys.clear();
  currentTeamIdx = 0;
  currentRoll    = [];
  pendingPick    = null;
  hasRolled      = false;

  document.getElementById('setupScreen').style.display = 'none';
  document.getElementById('gameScreen').style.display  = 'block';

  buildGenrePills();
  renderScoreboard();
  renderTurnBanner();
  renderPoolViewer();
  document.getElementById('diceGrid').innerHTML = `
    <div class="empty-state">
      <span class="big-emoji">🎲</span>
      <p>Hit Roll to see your dice…</p>
    </div>`;
  document.getElementById('rollAreaLabel').style.display = 'none';
  document.getElementById('pickConfirm').style.display   = 'none';
}

function goToSetup() {
  document.getElementById('gameScreen').style.display  = 'none';
  document.getElementById('setupScreen').style.display = 'block';
}

// ─── ROLL ────────────────────────────────────────────────────────
function rollDice() {
  if (pendingPick) return; // must confirm/cancel first

  let pool = getAvailablePool();
  if (pool.length < diceCount) { usedKeys.clear(); pool = getAvailablePool(); }

  const shuffled = pool.sort(() => Math.random() - 0.5);
  currentRoll = shuffled.slice(0, diceCount);
  hasRolled   = true;
  pendingPick = null;

  const team = teams[currentTeamIdx];
  document.getElementById('rollAreaLabel').style.display = 'block';
  document.getElementById('rollAreaLabel').textContent   = `Pick 1 element for ${team.name}`;
  document.getElementById('pickConfirm').style.display   = 'none';
  document.getElementById('rollBtn').disabled            = true;

  renderDice(true);
}

// ─── RENDER DICE ─────────────────────────────────────────────────
function renderDice(pickable) {
  const grid = document.getElementById('diceGrid');
  grid.className = 'dice-grid' + (diceCount <= 2 ? ' few-dice' : '');
  grid.innerHTML  = '';

  currentRoll.forEach((item, i) => {
    const theme = THEMES[item.themeId];
    const [c1, c2] = theme.catColors[item.cat] || ['#c77dff','#4d96ff'];
    const [g1, g2] = theme.colors.grad;
    const isPicked = pendingPick && pendingPick.key === item.key;

    const die = document.createElement('div');
    die.className = 'die' + (pickable ? ' pickable' : '') + (isPicked ? ' picked' : '');
    if (isPicked) die.style.color = teams[currentTeamIdx].color;
    die.style.animationDelay = `${i * 0.07}s`;
    die.innerHTML = `
      <div class="die-badge">${i + 1}</div>
      ${pickable && !isPicked ? '<div class="pick-hint">Pick</div>' : ''}
      ${isPicked ? `<div class="picked-badge" style="color:${teams[currentTeamIdx].color}">✓ Selected</div>` : ''}
      <span class="die-emoji">${item.emoji}</span>
      <div class="die-theme-tag" style="background:${theme.colors.tagBg};color:${theme.colors.tagColor}">${theme.icon} ${theme.label}</div>
      <div class="die-cat" style="color:${c1}">${item.cat}</div>
      <div class="die-name">${item.name}</div>
      <div class="die-def">${item.def}</div>
      <div class="die-color-bar" style="background:linear-gradient(90deg,${g1},${g2})"></div>
    `;
    if (pickable) die.onclick = () => selectPick(item);
    grid.appendChild(die);
  });
}

// ─── PICK ─────────────────────────────────────────────────────────
function selectPick(item) {
  pendingPick = item;
  renderDice(true);

  const team = teams[currentTeamIdx];
  document.getElementById('pickConfirmName').textContent = `${item.emoji} ${item.name}`;
  document.getElementById('pickConfirm').style.display = 'flex';
  document.getElementById('pickConfirm').style.justifyContent = 'center';
}

function cancelPick() {
  pendingPick = null;
  renderDice(true);
  document.getElementById('pickConfirm').style.display = 'none';
}

function confirmPick() {
  const team = teams[currentTeamIdx];
  team.pool.push(pendingPick);
  usedKeys.add(pendingPick.key);
  pendingPick = null;
  hasRolled   = false;

  // Advance turn
  currentTeamIdx = (currentTeamIdx + 1) % teams.length;

  renderDice(false);
  document.getElementById('rollAreaLabel').style.display = 'none';
  document.getElementById('pickConfirm').style.display   = 'none';
  document.getElementById('rollBtn').disabled            = false;
  renderScoreboard();
  renderTurnBanner();
  renderPoolViewer();
  updateGenrePoolNote();

  // Animate dice out
  document.getElementById('diceGrid').innerHTML = `
    <div class="empty-state">
      <span class="big-emoji">🎲</span>
      <p>Hit Roll to see your dice…</p>
    </div>`;
}

// ─── SCOREBOARD ───────────────────────────────────────────────────
function renderScoreboard() {
  const sb = document.getElementById('scoreboard');
  sb.innerHTML = '';
  teams.forEach((t, i) => {
    const card = document.createElement('div');
    card.className = 'score-card' + (i === currentTeamIdx ? ' active-team' : '');
    card.style.color = t.color;
    card.style.borderColor = i === currentTeamIdx ? t.color : '';
    card.onclick = () => {};
    const preview = t.pool.slice(-8).map(p => `<span title="${p.name}">${p.emoji}</span>`).join('');
    card.innerHTML = `
      <div class="score-card-header">
        <div class="score-dot" style="background:${t.color}"></div>
        <div class="score-name" style="color:${t.color}">${t.name}</div>
      </div>
      <div class="score-count" style="color:${t.color}">${t.pool.length}</div>
      <div class="score-label">elements</div>
      ${t.pool.length > 0 ? `<div class="score-pool-preview">${preview}</div>` : ''}
    `;
    sb.appendChild(card);
  });
}

// ─── TURN BANNER ──────────────────────────────────────────────────
function renderTurnBanner() {
  const team = teams[currentTeamIdx];
  document.getElementById('whoseTurn').innerHTML =
    `<span style="color:${team.color}">${team.name}</span> — your turn`;
  document.getElementById('turnSub').textContent = hasRolled
    ? 'Pick one element from the dice below'
    : `Roll ${diceCount} dice, then pick 1 to keep`;
}

// ─── POOL VIEWER — all teams ──────────────────────────────────────
function renderPoolViewer() {
  const grid = document.getElementById('poolsGrid');
  grid.innerHTML = '';
  teams.forEach((t, i) => {
    const card = document.createElement('div');
    card.className = 'team-pool-card' + (i === currentTeamIdx ? ' active-team' : '');
    card.style.setProperty('--team-color', t.color);

    const itemsHtml = t.pool.length === 0
      ? '<div class="pool-empty">No elements yet…</div>'
      : t.pool.map(item => `
          <div class="pool-item">
            <span class="pool-item-emoji">${item.emoji}</span>
            <span>${item.name}</span>
            <div class="pool-item-tooltip">
              <div class="tooltip-arrow down"></div>
              <div class="tooltip-name">${item.emoji} ${item.name}</div>
              <div class="tooltip-def">${item.def}</div>
            </div>
          </div>`).join('');

    card.innerHTML = `
      <div class="team-pool-card-header">
        <div class="team-pool-dot" style="background:${t.color}"></div>
        <div class="team-pool-name" style="color:${t.color}">${t.name}</div>
        <div class="team-pool-count">${t.pool.length}</div>
      </div>
      <div class="team-pool-items">${itemsHtml}</div>
    `;
    grid.appendChild(card);
  });

  // Attach smart tooltip positioning to every pool item
  grid.querySelectorAll('.pool-item').forEach(item => {
    const tip = item.querySelector('.pool-item-tooltip');
    const arrow = item.querySelector('.tooltip-arrow');
    if (!tip) return;

    item.addEventListener('mouseenter', () => {
      const rect = item.getBoundingClientRect();
      const TW = 210, GAP = 10;
      const vw = window.innerWidth, vh = window.innerHeight;

      // Horizontal: centre on item, clamp to viewport with 8px margin
      let left = rect.left + rect.width / 2 - TW / 2;
      left = Math.max(8, Math.min(left, vw - TW - 8));

      // Arrow offset relative to tooltip
      const arrowLeft = (rect.left + rect.width / 2) - left;

      // Prefer above; fall back to below if not enough room
      const spaceAbove = rect.top;
      const spaceBelow = vh - rect.bottom;
      let top, showAbove;
      if (spaceAbove >= 80 || spaceAbove >= spaceBelow) {
        // above
        tip.style.top = '';
        top = rect.top - GAP;
        tip.style.bottom = (vh - top) + 'px';
        showAbove = true;
      } else {
        // below
        tip.style.bottom = '';
        top = rect.bottom + GAP;
        tip.style.top = top + 'px';
        showAbove = false;
      }

      tip.style.left   = left + 'px';
      tip.style.bottom = showAbove ? (vh - rect.top + GAP) + 'px' : '';
      tip.style.top    = showAbove ? '' : (rect.bottom + GAP) + 'px';

      // Arrow direction and position
      arrow.className = 'tooltip-arrow ' + (showAbove ? 'down' : 'up');
      const clampedArrow = Math.max(12, Math.min(arrowLeft, TW - 12));
      arrow.style.left = clampedArrow + 'px';
      arrow.style.transform = 'translateX(-50%)';
      if (showAbove) { arrow.style.top = '100%'; arrow.style.bottom = ''; }
      else           { arrow.style.bottom = '100%'; arrow.style.top = ''; }

      tip.classList.add('visible');
    });

    item.addEventListener('mouseleave', () => tip.classList.remove('visible'));
  });
}

</script>
</body>
</html>
