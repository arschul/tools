<meta charset="UTF-8">

<title>Role Play Roulette</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0f;
    --surface: #16161a;
    --card: #1e1e24;
    --accent1: #f5c842;
    --accent2: #e8553e;
    --accent3: #4ec9b0;
    --accent4: #c586c0;
    --text: #f0eff4;
    --muted: #7a7a8c;
    --border: #2a2a35;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.05'/%3E%3C/svg%3E");
    opacity: 0.4;
    pointer-events: none;
    z-index: 999;
  }

  header {
    text-align: center;
    padding: 3rem 1rem 1.5rem;
    position: relative;
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.5rem, 6vw, 4.5rem);
    font-weight: 900;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, var(--accent1) 0%, var(--accent2) 50%, var(--accent4) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  header p {
    color: var(--muted);
    font-size: 1rem;
    margin-top: 0.5rem;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.05em;
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 1rem 1.5rem 4rem;
  }

  /* Controls */
  .controls {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.5rem;
    margin-bottom: 2rem;
    display: flex;
    align-items: center;
    gap: 1.5rem;
    flex-wrap: wrap;
  }

  .controls label {
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }

  .student-selector {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    flex-wrap: wrap;
  }

  .num-btn {
    width: 44px; height: 44px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: transparent;
    color: var(--text);
    font-size: 1.1rem;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'DM Mono', monospace;
    font-weight: 500;
  }

  .num-btn:hover { border-color: var(--accent1); color: var(--accent1); }
  .num-btn.active { border-color: var(--accent1); background: var(--accent1); color: #000; }

  .spin-btn {
    margin-left: auto;
    padding: 0.9rem 2.5rem;
    background: var(--accent1);
    color: #000;
    font-family: 'DM Mono', monospace;
    font-weight: 500;
    font-size: 0.95rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .spin-btn:hover { transform: scale(1.04); box-shadow: 0 0 30px rgba(245,200,66,0.4); }
  .spin-btn:active { transform: scale(0.97); }
  .spin-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* Slot machine area */
  .slots {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    margin-bottom: 1.5rem;
  }

  .slot-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.5rem;
    position: relative;
    overflow: hidden;
    min-height: 130px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .slot-card.full-width { grid-column: 1 / -1; }

  .slot-card::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .slot-card.location::before { background: linear-gradient(135deg, rgba(245,200,66,0.07), transparent); }
  .slot-card.scenario::before { background: linear-gradient(135deg, rgba(232,85,62,0.07), transparent); }
  .slot-card.roles::before { background: linear-gradient(135deg, rgba(78,201,176,0.07), transparent); }

  .slot-card.revealed::before { opacity: 1; }

  .slot-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 0.75rem;
  }

  .slot-card.location .slot-label { color: var(--accent1); }
  .slot-card.scenario .slot-label { color: var(--accent2); }
  .slot-card.roles .slot-label { color: var(--accent3); }

  .slot-display {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.2rem, 3vw, 1.8rem);
    font-weight: 700;
    line-height: 1.3;
    min-height: 2.6rem;
    display: flex;
    align-items: center;
  }

  .slot-display.spinning {
    animation: flicker 0.08s infinite;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 1rem;
  }

  @keyframes flicker {
    0% { opacity: 1; }
    50% { opacity: 0.4; }
    100% { opacity: 1; }
  }

  .slot-card.location .slot-display { color: var(--accent1); }
  .slot-card.scenario .slot-display { color: var(--text); }
  .slot-card.roles .slot-display { color: var(--accent3); }

  .role-list {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    width: 100%;
  }

  .role-item {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    font-size: 1rem;
  }

  .role-badge {
    width: 28px; height: 28px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.75rem;
    font-weight: 600;
    font-family: 'DM Mono', monospace;
    flex-shrink: 0;
  }

  .role-item:nth-child(1) .role-badge { background: rgba(78,201,176,0.2); color: var(--accent3); }
  .role-item:nth-child(2) .role-badge { background: rgba(197,134,192,0.2); color: var(--accent4); }
  .role-item:nth-child(3) .role-badge { background: rgba(245,200,66,0.2); color: var(--accent1); }

  .role-name {
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--text);
  }

  /* Placeholder state */
  .placeholder {
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    letter-spacing: 0.05em;
  }

  /* Tip bar */
  .tip-bar {
    text-align: center;
    padding: 1rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    letter-spacing: 0.05em;
  }

  .tip-bar span { color: var(--accent1); }

  /* Pulse on reveal */
  @keyframes reveal-pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.015); }
    100% { transform: scale(1); }
  }

  .slot-card.pop { animation: reveal-pulse 0.4s ease; }
</style>
</head>

<header>
  <h1>Role Play Roulette</h1>
  <p>// spin to reveal place · scenario · roles</p>
</header>

    Tip: press <span>SPIN</span> again to get a completely new scenario — every combination is unique!

let numStudents = 3;
let isSpinning = false;

// Init
document.querySelectorAll('.num-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.num-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    numStudents = parseInt(btn.dataset.n);
  });
});

document.getElementById('spinBtn').addEventListener('click', spin);

function rand(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function spinText(el, finalText, duration, onDone) {
  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*';
  const scramble = () => {
    let result = '';
    for (let i = 0; i < Math.max(finalText.length, 8); i++) {
      result += rand(chars.split(''));
    }
    return result;
  };

  el.classList.add('spinning');
  el.classList.remove('placeholder');

  const interval = setInterval(() => {
    el.textContent = scramble();
  }, 60);

  setTimeout(() => {
    clearInterval(interval);
    el.classList.remove('spinning');
    el.textContent = finalText;
    if (onDone) onDone();
  }, duration);
}

function spin() {
  if (isSpinning) return;
  isSpinning = true;
  document.getElementById('spinBtn').disabled = true;

  // Pick a place
  const place = rand(DATA.places);
  const scenario = rand(place.scenarios);
  const roles = numStudents === 2 ? rand(place.roles2) : rand(place.roles3);

  const locEl = document.getElementById('displayLocation');
  const scenEl = document.getElementById('displayScenario');
  const rolesEl = document.getElementById('displayRoles');

  const cardLoc = document.getElementById('cardLocation');
  const cardScen = document.getElementById('cardScenario');
  const cardRoles = document.getElementById('cardRoles');

  [cardLoc, cardScen, cardRoles].forEach(c => {
    c.classList.remove('revealed', 'pop');
  });

  // Staggered reveal
  locEl.innerHTML = '';
  locEl.classList.remove('placeholder');
  spinText(locEl, place.name, 1200, () => {
    cardLoc.classList.add('revealed', 'pop');
    setTimeout(() => cardLoc.classList.remove('pop'), 400);
  });

  scenEl.innerHTML = '';
  scenEl.classList.remove('placeholder');
  setTimeout(() => {
    spinText(scenEl, scenario, 1400, () => {
      cardScen.classList.add('revealed', 'pop');
      setTimeout(() => cardScen.classList.remove('pop'), 400);
    });
  }, 700);

  rolesEl.innerHTML = '';
  rolesEl.classList.remove('placeholder');
  setTimeout(() => {
    const tempEl = document.createElement('span');
    tempEl.textContent = '';
    rolesEl.appendChild(tempEl);
    spinText(tempEl, '...', 1600, () => {
      // Build role list
      rolesEl.innerHTML = '';
      const list = document.createElement('div');
      list.className = 'role-list';
      roles.forEach((role, i) => {
        const item = document.createElement('div');
        item.className = 'role-item';
        item.innerHTML = `<div class="role-badge">S${i+1}</div><div class="role-name">${role}</div>`;
        list.appendChild(item);
      });
      rolesEl.appendChild(list);
      cardRoles.classList.add('revealed', 'pop');
      setTimeout(() => cardRoles.classList.remove('pop'), 400);

      // Done
      setTimeout(() => {
        isSpinning = false;
        document.getElementById('spinBtn').disabled = false;
      }, 200);
    });
  }, 1400);
}
